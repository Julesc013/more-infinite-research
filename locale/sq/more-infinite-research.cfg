[mod-setting-description]
ips-require-space-gate=Kur aktivizohet, këto teknologji qëndrojnë të kyçura derisa shkenca e hapësirës të hulumtohet në vanilje ose shkenca e prometiumit të hulumtohet në Epokën e Hapësirës.
mir-science-pack-ingredient-policy=Zgjedh se si MIR shton paketat shkencore tek teknologjitë e krijuara. Opsionet renditen nga konservatore në të gjera: paketat e paracaktuara, paketat e lojës së vonë, paketat e bazuara në progresion, pastaj të gjitha paketat e disponueshme.
mir-automatic-productivity-action=Zgjedh atë që bën MIR me mundësitë e sigurta të produktivitetit që gjenden në recetat me modalitet të instaluar. Me aftësi të kufizuara nuk kryen zbulim automatik. Shikoni ndryshimet e regjistrimeve të kandidatëve të pranuar dhe të anashkaluar në regjistrin e Factorio pa ndryshuar kërkimin. Aplikoni ndryshime të sigurta (parazgjedhja) shton receta të përshtatshme vetëm për kërkimet ekzistuese MIR të përputhshme. Kjo kontrollon veprimin, jo forcën apo pjekurinë; kutitë e kontrollit të krijimit më poshtë janë të ndara. Kontrollet e pronësisë, riciklimit, probabilitetit, katalizatorit, shkencës, laboratorit, parakushteve, objektivit, identitetit, progresionit dhe ciklit zbatohen gjithmonë.
mir-automatic-create-research=Parazgjedhja: joaktiv. Jashtë kufijve Zbatoni ndryshime të sigurta në kërkimet ekzistuese MIR të pajtueshme; kandidatët pa një transmetim të përshtatshëm anashkalohen dhe raportohen. Aktivi lejon një ofrues të regjistruar të kualifikuar të krijojë një teknologji gjenerike të qëndrueshme të produktivitetit të pafund kur nuk përshtatet asnjë kërkim ekzistues. Kutia e kontrollit të të dhënave të rishikuara më poshtë vendos nëse ofruesit eksperimentalë janë të kualifikuar. MIR nuk krijon kurrë një teknologji për modalitet ose recetë, dhe çdo portë e vështirë për sigurinë, shkencën, pronësinë, identitetin, përparimin dhe ciklin vazhdon të zbatohet.
mir-automatic-require-reviewed-data=Parazgjedhja: aktive. Kjo ka rëndësi vetëm kur është aktivizuar Lejo krijimin e ri të kërkimit; ai kurrë nuk bllokon lidhjen e sigurt me kërkimin ekzistues. Në leje vetëm familjet ofruese të shënuara si të shqyrtuara dhe të mbështetura nga provat e zbatueshme të versionit të saktë, kështu që familjet eksperimentale anashkalohen. Off lejon ofruesit e regjistruar eksperimentalë të krijojnë nga provat strukturore gjenerike. Për sjelljen më të gjerë eksperimentale, aktivizoni krijimin e kërkimit dhe çaktivizoni këtë kërkesë. Asnjë vlerë nuk mund të anashkalojë një portë të fortë sigurie.
mir-automatic-compiler-mode=Urë e fshehur e përputhshmërisë për profilet e krijuara përpara ndarjes së kontrolleve automatike të produktivitetit. Një vlerë e trashëguar jo e paracaktuar respektohet vetëm ndërsa të gjitha kontrollet e reja mbeten në standardet e tyre. Ndryshoni çdo kontroll të ri për të marrë kontroll të qartë.
ips-enable-stream=Krijon teknologjinë e pafund të gjeneruar për __1__ kur recetat, efektet, kushtet paraprake dhe paketat shkencore janë të disponueshme. Çaktivizoni këtë për të parandaluar që MIR të gjenerojë këtë teknologji.
ips-cost-base-stream=Kërkohen njësi kërkimore për nivelin e parë të gjeneruar prej __1__. Duhet të jetë së paku 1. Nivelet e mëvonshme llogariten nga kjo vlerë dhe nga faktori i rritjes së kostos.
ips-cost-growth-stream=Shumëzuesi i aplikuar për çdo nivel të mëvonshëm prej __1__. Përdorni 1 për kostot e sheshta, 1.5 për rritje 50% për nivel, ose 2 për dyfishimin e kostove.
ips-max-level-stream=Niveli më i lartë i gjeneruar për __1__. Vendoseni në 0 për nivele të pafundme.
ips-research-time-stream=Sekonda për njësi kërkimore për __1__. Vendoseni në 0 për të përdorur parazgjedhjen e MIR për këtë teknologji. Kjo nuk është koha totale e hulumtimit; koha totale varet gjithashtu nga kostoja e kërkimit, numri i laboratorit, shpejtësia e laboratorit dhe modulet.
mir-enable-base-tech=Lejon __1__ të vazhdojë të kalojë kapakun e tij të vaniljes si një teknologji e pafund. Çaktivizoni këtë nëse dëshironi që MIR të shtojë linja të reja kërkimore pa e zgjatur këtë zinxhir vanilje.
mir-cost-base=Kërkohen njësi kërkimore për nivelin e parë të vazhdimit MIR prej __1__. Vendoseni në 0 për të trashëguar modelin e kostos së zinxhirit të vaniljes kur është e mundur.
mir-cost-growth=Shumëzuesi i aplikuar për çdo nivel të mëvonshëm të vazhdimit MIR prej __1__. Vendoseni në 0 për të trashëguar modelin e rritjes së zinxhirit të vaniljes kur është e mundur.
mir-max-level=Niveli më i lartë i vazhdimit MIR për __1__. Vendoseni në 0 për nivele të pafundme.
mir-research-time=Sekonda për njësi kërkimore për vazhdimin MIR të __1__. Vendoseni në 0 për të trashëguar kohën e njësisë kërkimore të zinxhirit të vaniljes kur është e mundur.
mir-prefer-this-mod-for-competing-techs=Kur aktivizohet, ky mod heq shtesat e zgjedhura konkurruese të pafundme dhe përdor versionet e veta. Çaktivizo për të mbajtur versionet konkurruese nga modalitetet e tjera.
mir-adjust-vanilla-weapon-speed-techs=Kontrollon nëse MIR heq bonuset e shpejtësisë së raketave dhe predhave nga vazhdimi i shpejtësisë së gjeneruar të gjuajtjes me armë kur disponohet mbulim i saktë zëvendësues i pafund. Teknologjitë e fundme të të shtënave me armë vanilje ruajnë shpërblimet e tyre origjinale.
mir-use-installed-space-age-icons=Kur aktivizohet, MIR mund t'i referohet skedarëve zyrtarë të ikonave DLC të instaluara, duke përfshirë Space Age dhe Elevated Rails, edhe kur ato modalitete çaktivizohen për një ekzekutim të lojës bazë. Lëreni këtë jashtë nëse ato skedarë DLC nuk janë instaluar; Factorio nuk mund të rikuperohet me hijeshi nga skedarët e ikonave që mungojnë gjatë ngarkimit të prototipit.
mir-pipeline-extent-multiplier=Shumëzues zbritës vetëm për fillimin për fushat e njohura të shtrirjes së tubacionit të kutisë së lëngjeve nëpër prototipe, jo vetëm entitete tubash. 100% i lë prototipet të pandryshuara dhe nuk ngarkon kalimin e tubacionit ose nuk skanon kutitë e lëngjeve. Vlerat jo-100% janë eksperimentale dhe mund të ndikojnë në makinat, tanket, shtytësit dhe prototipet e modifikuara që përcaktojnë kutitë e lëngjeve.
mir-unrestricted-modules=Eksperimentale dhe balancuese. Kur aktivizohet, çdo recetë ekzistuese pranon të pesë efektet e modulit dhe çdo marrës ekzistues i modulit me lojëra elektronike pranon çdo kategori të zbuluar të modulit. Kjo nuk shton lojëra elektronike ose ndryshon prototipet e moduleve dhe mund të mundësojë produktivitetin, cilësinë dhe ciklin e modulit të modifikuar.
mir-prototype-productivity-cap=Zgjedh nëse MIR lë vetëm kapakët e produktivitetit të recetës ose shkruan një kapak fillestar për çdo recetë jo-parametër, jo riciklim. +300% (i pandryshuar) ruan kapakët ekzistues të recetave; vlerat më të ulëta shkurtojnë shkallëzimin e produktivitetit, ndërsa vlerat më të larta e zgjerojnë atë.
mir-recycling-return-chance=Kontrollon vetëm recetat e riciklimit të krijuara të fshehura. Modaliteti automatik zvogëlon kthimin normal të materialit prej 25% në maksimumi 1 pjesëtuar me shumëzuesin total të prodhimit në kufirin e zgjedhur të produktivitetit. Zgjedhjet fikse shkallëzojnë drejtpërdrejt të njëjtat kthime të gjeneruara. Proceset e dukshme dhe kapakët e produktivitetit të recetave nuk ndryshohen kurrë.
mir-productivity-cap-self-recycling-only=Mbi 1 / riciklues i kthimit - 1, vetëm recetat e prodhimit me një rrugë të provuar vetë-riciklimi jo-gjenerues marrin kapak më të lartë të zgjedhur. Në ose nën atë prag, kjo kuti e kontrollit nuk ka asnjë efekt. Motori i pandryshuar përdor kthimin normal prej 25% si një prag konservativ +300% pa ndryshuar recetat e riciklimit.
mir-prototype-efficiency-cap=Zgjedh se sa efektet e efikasitetit mund të reduktojnë përdorimin e energjisë aktive të makinës. -80% (i pandryshuar) i lë vetëm kufijtë ekzistues të përdorimit të energjisë. Reduktimet më të thella mund t'i afrohen zero përdorimit të energjisë aktive pa ndryshuar kufijtë e ndotjes.
mir-prototype-pollution-cap=Zgjedh se deri ku efektet e reduktimit të ndotjes mund të reduktojnë ndotjen e makinës. -80% (i pandryshuar) i lë vetëm kufijtë ekzistues të ndotjes. Reduktimet më të thella mund t'i afrohen zero ndotjes pa ndryshuar përdorimin e energjisë.
mir-prototype-speed-floor=Zgjedh se deri ku mund të ngadalësojnë efektet negative të shpejtësisë makinat e mbështetura. -80% (i pandryshuar) i lë vetëm kufijtë ekzistues; vlerat më të thella heqin dyshemenë normale deri në një ndalesë afër -99.99%.
mir-prototype-speed-cap=Zgjedh nëse MIR lë vetëm kufijtë e efektit të shpejtësisë së makinës ose shkruan një kapak të ri pozitiv të shpejtësisë. +100000% (i pandryshuar) ruan kufijtë ekzistues; vlerat më të ulëta fiksojnë qëllimisht bonuset me shpejtësi shumë të madhe.
mir-prototype-quality-cap=Zgjedh nëse MIR lë vetëm kufijtë e cilësisë së efektit të makinës ose shkruan një kapak të ri cilësie pozitive. +100000% (i pandryshuar) ruan kufijtë ekzistues dhe nuk ndryshon nivelet e cilësisë ose formulat e probabilitetit të artikujve.
mir-prototype-positive-power-floor=Parazgjedhja e çaktivizuar. Kur aktivizohet, MIR ndryshon prototipet eksplicite aktive të përdorimit të energjisë 0W në 1W gjatë ngarkimit të prototipit, kështu që ikonat paralajmëruese me fuqi të ulët nuk shfaqen në subjektet që duhet të tërheqin një sasi të vogël jo zero. Lëreni për të ruajtur saktësisht prototipet me fuqi zero.
mir-settings-profile-import=Ngjitni një varg të profilit të cilësimeve MIR këtu për të aplikuar vlerat e eksportuara të konfigurimit të nisjes si një shtresë anashkaluese gjatë krijimit të prototipit. Lëreni bosh për cilësimet normale. Eksporto me /mir-settings-export nga një kurs aktiv, më pas rifillo pasi të ndryshosh këtë vlerë.
mir-debug-generation-report=Kur aktivizohet, shkruan një rresht të strukturuar të regjistrit për transmetimin e gjeneruar ose të anashkaluar dhe zgjerimin bazë, duke përfshirë paketat shkencore, parakushtet, numrin e efekteve, statusin e përputhshmërisë së laboratorit dhe burimin e ikonave.
mir-debug-recipe-matches=Kur aktivizohet, shkruan emrat e përputhur të recetave për çdo transmetim të produktivitetit të krijuar. Kjo mund të jetë e zhurmshme në paketat e mëdha të modës.
mir-debug-scripted-effects=Kur aktivizohet, shkruan shënimet e regjistrit të kohës së ekzekutimit kur teknologjitë e skriptuara rillogaritin efektet globale ose të drejtuara nga ngjarjet.
mir-lab-incompatibility-policy=Zgjedh se çfarë bën MIR kur paketat e zgjedhura shkencore nuk mund të hulumtohen nga ndonjë laborator aktiv.
ips-effect-per-level-stream=Vendos efektin primar të nivelit bazë për nivel për __1__. Nivelet dhe efektet e mëvonshme të lidhura janë shkallëzuar proporcionalisht. Efektet në përqindje përdorin pikë përqindjeje; efektet e numërimit dhe distancës përdorin njësitë e tyre amtare.
mir-effect-per-level=Vendos efektin kanonik për nivel për vazhdimin e pafund __1__. Efektet e ndërlidhura janë shkallëzuar proporcionalisht nga vija bazë përfundimtare e vaniljes. Efektet në përqindje përdorin pikë përqindjeje; efektet e numërimit dhe distancës përdorin njësitë e tyre amtare.
mir-note-experimental-spoilage=Eksperimental dhe i çaktivizuar si parazgjedhje në versionin 2.1.0. Ky është një efekt i skriptuar global/e gjerë në hartë. Sjellja ekzistuese e stivës së prishur nuk pretendohet derisa të vërtetohet manualisht.
mir-note-agriculture-growth=Zbatohet për kulturat kulla bujqësore të sapombjellë. Të mbjellat ekzistuese të mbjella nuk rishkallëzohen.
mir-note-cargo-pad-count=Hulumtimi logjistik i Epokës së Hapësirës Speciale. Rrit platformat e uljes së ngarkesave për sipërfaqe dhe mund të ndryshojë ndjeshëm ekuilibrin logjistik.
mir-note-inserter-capacity=i çaktivizuar si parazgjedhje. Kapaciteti shtesë i futësit mund të thyejë futësit e kontrolluar nga qarku dhe të zvogëlojë optimizimet e motorit.
mir-note-native-owner-managed-stream=Nëse një teknologji e instaluar e pafund zotëron tashmë këtë familje kërkimore, të njëjtat cilësime fillestare e konfigurojnë atë pronar në vend që të krijojnë një dublikatë. Standardet e pandryshuara të MIR ruajnë saktësisht prototipin përfundimtar të pronarit. Shpërndarjet e qarta të kostos, kohës, nivelit maksimal dhe efektit zbatohen vetëm pas një ndeshjeje të sigurt të pronarit; çaktivizimi i transmetimit e lë teknologjinë e jashtme të paprekur. Rinisni Factorio pasi të keni ndryshuar cilësimet e nisjes. Një nivel maksimal prej 0 do të thotë pafundësi, dhe vlerat e efektit janë pikë përqindjeje për nivel.

