[technology-description]
more-infinite-research.recipe_productivity=Rrit produktivitetin e recetave për recetat e zgjedhura. Kufiri maksimal i produktivitetit të Factorio ende vlen; Nivelet shtesë të pafundme mund të mos kenë efekt praktik sapo një recetë të arrijë kufirin e saj.
more-infinite-research.direct_effect=Shton një bonus të pafund të përsëritshëm. Paketat shkencore zgjidhen nga laboratorë aktivë, në mënyrë që teknologjia të mbetet e kërkueshme me grupe modash të përputhshme.
more-infinite-research.cargo_bay_unloading_distance=Rrit distancën maksimale midis një platforme uljeje ngarkesash dhe skutave të lidhura të shkarkimit.
more-infinite-research.cargo_landing_pad_count=Rrit numrin e platformave të uljes së ngarkesave që çdo forcë mund të ndërtojë për sipërfaqe.
more-infinite-research.flamethrower_shooting_speed=Rrit shpejtësinë e qitjes për armët flakëhedhëse dhe frëngjitë flakëhedhëse.
more-infinite-research.electric_shooting_speed=Rrit shpejtësinë e qitjes për armët elektrike. Në vanilje kjo ndikon në mbrojtjen e shkarkimit; me Space Age ndikon gjithashtu në armët e Tesla-s kur kategoria e municioneve tesla është e disponueshme.
more-infinite-research.spoilage_preservation=Rrit modifikuesin global të kohës së prishjes përmes një efekti të kufizuar të skriptit. Artikujt ekzistues të prishur mund të mbajnë afatet e tyre aktuale të prishjes derisa të testohen në lojë.
more-infinite-research.agricultural_growth_speed=Shkurton kohën e mbetur të rritjes për impiantet e kullave bujqësore të mbjella rishtazi përmes një efekti skripti të kufizuar.
more-infinite-research.lab_productivity=Rrit progresin e kërkimit të fituar nga çdo paketë shkencore e konsumuar, duke përdorur modifikuesin e produktivitetit të kërkimit laboratorik vendas.

