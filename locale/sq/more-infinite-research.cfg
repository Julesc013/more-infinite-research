mir-recycling-return-chance-percent-0-1=Përmasoni recetat e riciklimit të krijuara të fshehura në një kthim material prej 0,1%.
mir-prototype-efficiency-cap-engine-default=Lëreni vetëm kufirin e efektit të përdorimit të energjisë të çdo makinerie. Makinat pa një kufi të personalizuar përdorin kapakun normal -80% të efektit të përdorimit të energjisë të Factorio, kështu që efektet nuk mund të reduktojnë përdorimin aktiv nën 20%.
mir-prototype-efficiency-cap-saving-25=Shkruani një kapak -25% të përdorimit të energjisë. Përdorimi i energjisë aktive qëndron në 75% ose më shumë pas efekteve të përdorimit të energjisë.
mir-prototype-efficiency-cap-saving-50=Shkruani një kapak -50% të përdorimit të energjisë. Përdorimi i energjisë aktive qëndron në 50% ose më shumë pas efekteve të përdorimit të energjisë në makinat e mbështetura.
mir-prototype-efficiency-cap-saving-75=Shkruani një kapak -75% të përdorimit të energjisë. Përdorimi i energjisë aktive qëndron në 25% ose më shumë pas efekteve të përdorimit të energjisë në makinat e mbështetura.
mir-prototype-efficiency-cap-saving-90=Shkruani një kapak -90% të përdorimit të energjisë. Përdorimi i energjisë aktive mund të bjerë në 10%, që është nën nivelin normal prej 20%.
mir-prototype-efficiency-cap-saving-95=Shkruani një kapak -95% të përdorimit të energjisë. Përdorimi i energjisë aktive mund të bjerë në 5%.
mir-prototype-efficiency-cap-saving-99=Shkruani një kapak -99% të përdorimit të energjisë. Përdorimi i energjisë aktive mund të bjerë në 1%.
mir-prototype-efficiency-cap-saving-999=Shkruani një kapak -99,9% të përdorimit të energjisë. Përdorimi i energjisë aktive mund të bjerë në 0.1%.
mir-prototype-efficiency-cap-saving-9999=Shkruani një kapak të përdorimit të energjisë -99,99%. Ky është pothuajse zero përdorim i energjisë aktive, jo një rishkrim i prototipit me fuqi zero.
mir-prototype-pollution-cap-engine-default=Lëreni vetëm kufirin e efektit të ndotjes së çdo makinerie. Makinat pa një kufi të personalizuar përdorin kapakun normal -80% të efektit të ndotjes të Factorio.
mir-prototype-pollution-cap-saving-25=Shkruani një kapak ndotjeje -25%. Ndotja qëndron në 75% ose më shumë pas efekteve të ndotjes.
mir-prototype-pollution-cap-saving-50=Shkruani një kapak ndotjeje -50%. Ndotja qëndron në 50% ose më shumë pas efekteve të ndotjes në makinat e mbështetura.
mir-prototype-pollution-cap-saving-75=Shkruani një kapak të ndotjes -75%. Ndotja qëndron në 25% ose më shumë pas efekteve të ndotjes në makinat e mbështetura.
mir-prototype-pollution-cap-saving-90=Shkruani një kapak ndotjeje -90%. Ndotja mund të bjerë në 10%, që është nën nivelin normal prej 20%.
mir-prototype-pollution-cap-saving-95=Shkruani një kapak ndotjeje -95%. Ndotja mund të bjerë në 5%.
mir-prototype-pollution-cap-saving-99=Shkruani një kapak të ndotjes -99%. Ndotja mund të bjerë në 1%.
mir-prototype-pollution-cap-saving-999=Shkruani një kapak të ndotjes -99,9%. Ndotja mund të bjerë në 0.1%.
mir-prototype-pollution-cap-saving-9999=Shkruani një kapak ndotjeje -99,99%. Ky është ndotje pothuajse zero, jo një skenar ndotjeje në kohëzgjatje.
mir-prototype-speed-floor-engine-default=Lëreni të qetë kufirin negativ të shpejtësisë së çdo makinerie. Makinat pa kufi të personalizuar përdorin dyshemenë normale -80% të Factorio dhe mbajnë shpejtësinë të paktën 20%.
mir-prototype-speed-floor-saving-25=Mbërtheni efektet negative të shpejtësisë në -25%, duke lënë të paktën 75% shpejtësi.
mir-prototype-speed-floor-saving-50=Mbërtheni efektet negative të shpejtësisë në -50%, duke lënë të paktën 50% shpejtësi.
mir-prototype-speed-floor-saving-75=Mbërtheni efektet negative të shpejtësisë në -75%, duke lënë të paktën 25% shpejtësi.
mir-prototype-speed-floor-saving-90=Lejo efektet negative të shpejtësisë deri në -90%, duke lënë të paktën 10% shpejtësi.
mir-prototype-speed-floor-saving-95=Lejo efektet negative të shpejtësisë deri në -95%, duke lënë të paktën 5% shpejtësi.
mir-prototype-speed-floor-saving-99=Lejo efektet negative të shpejtësisë deri në -99%, duke lënë të paktën 1% shpejtësi.
mir-prototype-speed-floor-saving-999=Lejo efektet negative të shpejtësisë deri në -99,9%, duke lënë të paktën 0,1% shpejtësi.
mir-prototype-speed-floor-saving-9999=Lejo efektet negative të shpejtësisë deri në -99,99%, kufiri më i ulët i prototipit të Factorio. Kjo është një shpejtësi punimi afër ndalimit, jo zero ose negative.
mir-prototype-speed-cap-engine-default=Lëreni kufirin e shpejtësisë së çdo makinerie të qetë. Makinat pa një kufi të personalizuar përdorin tavanin shumë të lartë +100000% të efektit shpejtësi të Factorio.
