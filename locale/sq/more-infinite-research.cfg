[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Nuk kryen zbulim, bashkëngjitje ose krijim automatik. Hulumtimi fiks i MIR mbetet i pandryshuar.
mir-automatic-productivity-action-preview=Zbulon dhe klasifikon kandidatët, më pas shkruan vendimet e pranuara dhe të anashkaluara në regjistrin e Factorio. Ai nuk bashkëngjit receta apo krijon kërkime.
mir-automatic-productivity-action-apply=⟧ E paracaktuar. Zbulon kandidatët dhe bashkëngjit vetëm receta të vërtetuara nga siguria në kërkimin ekzistues MIR të përputhshëm. Ai nuk krijon kërkime në vetvete; dy kutitë e kontrollit më poshtë rregullojnë krijimin.
mir-automatic-compiler-mode-off=Ekuivalenti i trashëgimisë së Personave me aftësi të kufizuara.
mir-automatic-compiler-mode-report=Ekuivalenti i trashëgimisë së ndryshimeve të Paraafishimit.
mir-automatic-compiler-mode-safe-attach=Ekuivalenti i trashëgimisë së Aplikoni ndryshime të sigurta me çaktivizimin e krijimit të kërkimit.
mir-automatic-compiler-mode-exact-pack=Ekuivalenti i trashëgimisë së Aplikoni ndryshime të sigurta me krijimin e kërkimit të aktivizuar dhe kërkohen të dhëna përputhshmërie të rishikuara.
mir-automatic-compiler-mode-safe-generate=Ekuivalenti i trashëgimisë së Aplikoni ndryshime të sigurta me krijimin e kërkimit të aktivizuar për ofruesit e regjistruar eksperimentalë.
mir-adjust-vanilla-weapon-speed-techs-off=Çaktivizo pastrimin opsional të mbivendosjes së raketës/topit të MIR-it.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Hiqni bonuset e mbivendosura të raketës/topave të MIR vetëm kur një teknologji e pafundme e aktivizuar dhe e arritshme ofron efektin e saktë të zëvendësimit.
mir-adjust-vanilla-weapon-speed-techs-always=Hiq gjithmonë bonuset e mbivendosura të raketës/topave të MIR. Përdoreni vetëm nëse dëshironi ndarje të rreptë.
mir-science-pack-ingredient-policy-configured=Përdorni paketat shkencore të konfiguruara të çdo teknologjie të krijuar pa zgjerim opsional të përbërësve. Parazgjedhja e MIR.
mir-science-pack-ingredient-policy-space=Shto shkencën e hapësirës kur të jetë e mundur. Një rritje e thjeshtë e vështirësisë pas raketës.
mir-science-pack-ingredient-policy-space-and-promethium=Shto hapësirë ​​dhe shkencë promethium kur të jetë e mundur. Më e mira për mbytet kërkimore shumë të vonshme të Epokës Hapësinore.
mir-science-pack-ingredient-policy-space-age-progression=Shto vetëm paketat e përparimit të Space Age të nënkuptuara nga paketat e zgjedhura. Nuk shton paketa të modifikuara pa lidhje.
mir-science-pack-ingredient-policy-official-progression=Shto paketat zyrtare të stilit të parakushteve që mungojnë të nënkuptuara nga paketa zyrtare më e avancuar e zgjedhur tashmë.
mir-science-pack-ingredient-policy-mod-progression=Shto paketa që mungojnë të përputhshme me laboratorin, të nxjerra nga progresi i modifikuar i paketës shkencore dhe zhbllokoni parakushtet.
mir-science-pack-ingredient-policy-all-official=Përdorni çdo bazë zyrtare dhe paketë shkencore të Epokës së Hapësirës që ekziston në grupin aktual të modalitetit.
mir-science-pack-ingredient-policy-all=Përdorni çdo paketë shkencore aktive të pajtueshme me laboratorin, duke përfshirë paketat shkencore të modifikuara.
mir-lab-incompatibility-policy-reduce=Mbajeni teknologjinë duke reduktuar paketat e saj shkencore në grupin më të madh të pranuar nga një laborator aktiv. Parazgjedhja më e sigurt për paketat e modës.
mir-lab-incompatibility-policy-skip=Kapërceni teknologjinë nëse asnjë laborator aktiv nuk mund të hulumtojë grupin e tij të zgjedhur të paketave shkencore. Më e rreptë dhe më e lehtë për t'u audituar.
mir-lab-incompatibility-policy-engine-default=Mos e rishkruani kurrë grupin e përzgjedhur të paketës shkencore. MIR ruan të pandryshuar një grup të kërkueshëm në mënyrë të sigurt dhe heq teknologjinë e krijuar kur Factorio nuk mund ta hulumtojë atë grup të saktë.
mir-prototype-productivity-cap-engine-default=Lëreni vetëm kufirin ekzistues të produktivitetit të secilës recetë. Recetat pa kapak të personalizuar përdorin kufirin normal të bonusit të produktivitetit +300% të Factorio.
mir-prototype-productivity-cap-percent-25=Vendosni kufijtë e produktivitetit të recetës pa parametra në +25%. Ky është një kapak i rreptë i hershëm.
mir-prototype-productivity-cap-percent-50=Vendosni kufijtë e produktivitetit të recetës pa parametra në +50%. Kjo është nën kufirin normal dhe bën që hulumtimi i produktivitetit të ndalojë së ndihmuari më shpejt.
mir-prototype-productivity-cap-percent-75=Vendosni kufijtë e produktivitetit të recetës pa parametra në +75%. Kjo është nën kufirin normal dhe bën që hulumtimi i produktivitetit të ndalojë së ndihmuari më shpejt.
mir-prototype-productivity-cap-percent-100=Vendosni kufijtë e produktivitetit të recetës pa parametra në +100%. Kjo është nën kufirin normal dhe bën që hulumtimi i produktivitetit të ndalojë së ndihmuari më shpejt.
mir-prototype-productivity-cap-percent-125=Vendosni kufijtë e produktivitetit të recetës pa parametra në +125%.
mir-prototype-productivity-cap-percent-150=Vendosni kufijtë e produktivitetit të recetës pa parametra në +150%.
mir-prototype-productivity-cap-percent-200=Vendosni kufijtë e produktivitetit të recetës pa parametra në +200%. Kjo është nën kufirin normal dhe bën që hulumtimi i produktivitetit të ndalojë së ndihmuari më shpejt.
mir-prototype-productivity-cap-percent-250=Vendosni kufijtë e produktivitetit të recetës pa parametra në +250%. Kjo është pak më poshtë kapakut normal.
mir-prototype-productivity-cap-percent-400=Vendosni kufijtë e produktivitetit të recetës pa parametra në +400%. Kjo zgjeron shkallëzimin e produktivitetit përtej kapakut normal.
mir-prototype-productivity-cap-percent-500=Vendosni kufijtë e produktivitetit të recetës pa parametra në +500%. Kjo zgjeron shkallëzimin e produktivitetit përtej kapakut normal.
mir-prototype-productivity-cap-percent-750=Vendosni kufijtë e produktivitetit të recetës pa parametra në +750%.
mir-prototype-productivity-cap-percent-1000=Vendosni kufijtë e produktivitetit të recetës pa parametra në +1000%. Përdoreni për kursime të gjata ku kërkimi i produktivitetit duhet të vazhdojë të jetë i rëndësishëm.
mir-prototype-productivity-cap-percent-2500=Vendosni kufijtë e produktivitetit të recetës pa parametra në +2500%. Përdorni për kursime shumë të gjata.
mir-prototype-productivity-cap-percent-5000=Vendosni kufijtë e produktivitetit të recetës pa parametra në +5000%.
mir-prototype-productivity-cap-percent-10000=Vendosni kufijtë e produktivitetit të recetës pa parametra në +10000%. Përdorni vetëm për shkallëzim ekstrem afatgjatë.
mir-prototype-productivity-cap-percent-25000=Vendosni kufijtë e produktivitetit të recetës pa parametra në +25000%. Përdorni vetëm për shkallëzim ekstrem afatgjatë.
mir-prototype-productivity-cap-percent-100000=Vendosni kufijtë e produktivitetit të recetës pa parametra në +100000%. Kjo në mënyrë efektive është e pambuluar për shumicën e kursimeve.
mir-recycling-return-chance-engine-default=Lëreni çdo recetë riciklimi të pandryshuar.
mir-recycling-return-chance-match-productivity-cap=Shfrytëzoje reduktimin automatik të sigurt për recetat e riciklimit të krijuara të fshehura. Përdor 1 / (1 + bonus produktiviteti), i kufizuar në kthimin normal prej 25%: +400% bëhet 20%, dhe +1000% bëhet rreth 9,09%.
mir-recycling-return-chance-percent-25=Mbani recetat e riciklimit të krijuara të fshehura me kthimin normal të materialit prej 25%.
mir-recycling-return-chance-percent-20=Përmasoni recetat e riciklimit të krijuara të fshehura në një kthim material prej 20%.
mir-recycling-return-chance-percent-15=Përmasoni recetat e riciklimit të krijuara të fshehura në një kthim material prej 15%.
