[technology-description]
more-infinite-research.recipe_productivity=Збільшує ефективність вибраних рецептів. Обмеження максимальної продуктивності Factorio все ще діє; додаткові нескінченні рівні можуть не мати практичного ефекту, коли рецепт досягне своєї межі.
more-infinite-research.direct_effect=Додає нескінченний повторюваний бонус. Наукові пакети вибираються з активних лабораторій, тому технологію можна досліджувати за допомогою сумісних наборів модів.
more-infinite-research.cargo_bay_unloading_distance=Збільшує максимальну відстань між вантажним майданчиком і підключеними розвантажувальними майданчиками.
more-infinite-research.cargo_landing_pad_count=Збільшує кількість майданчиків для посадки вантажів, які кожна сила може створити на поверхні.
more-infinite-research.flamethrower_shooting_speed=Збільшує швидкість стрільби для вогнеметної зброї та вогнеметних башт.
more-infinite-research.electric_shooting_speed=Збільшує швидкість стрільби з електричної зброї. У ванілі це впливає на захист виділень; у Space Age це також впливає на зброю Tesla, коли доступна категорія боєприпасів Tesla.
more-infinite-research.spoilage_preservation=Збільшує глобальний модифікатор часу псування за допомогою обмеженого сценарного ефекту. Існуючі предмети, які можна псувати, можуть зберігати поточні терміни псування, доки не будуть перевірені в грі.
more-infinite-research.agricultural_growth_speed=Скорочує час росту, що залишився, для щойно висаджених сільськогосподарських баштових рослин завдяки обмеженому ефекту сценарію.
more-infinite-research.lab_productivity=Збільшує прогрес дослідження, отриманий від кожного використаного наукового пакету, використовуючи рідний модифікатор продуктивності лабораторних досліджень.

