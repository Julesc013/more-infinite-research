mir-prototype-quality-cap-bonus-5000=Затискає позитивні ефекти якості на +5000%. Це не змінює рівні якості або формули ймовірності предметів.
mir-prototype-quality-cap-bonus-10000=Затискає позитивні ефекти якості на +10000%. Це не змінює рівні якості або формули ймовірності предметів.
mir-prototype-quality-cap-bonus-25000=Затискає позитивні ефекти якості на +25000%. Це не змінює рівні якості або формули ймовірності предметів.
mir-prototype-quality-cap-bonus-100000=Чітко напишіть максимальну якість ефекту Factorio. На відміну від незмінених, це перезаписує спеціальні нижні межі.
