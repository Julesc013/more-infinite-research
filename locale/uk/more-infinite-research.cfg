[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Не виконує автоматичного виявлення, вкладення чи створення. Стаціонарні дослідження МІР залишаються без змін.
mir-automatic-productivity-action-preview=Виявляє та класифікує кандидатів, а потім записує прийняті та пропущені рішення в журнал Factorio. Він не додає рецепти та не створює дослідження.
mir-automatic-productivity-action-apply=За замовчуванням. Виявляє кандидатів і додає лише перевірені безпечні рецепти до сумісних існуючих досліджень MIR. Він сам по собі не створює дослідження; два прапорці нижче регулюють створення.
mir-automatic-compiler-mode-off=Застарілий еквівалент Disabled.
mir-automatic-compiler-mode-report=Застарілий еквівалент попередніх змін.
mir-automatic-compiler-mode-safe-attach=Застарілий еквівалент застосування безпечних змін із вимкненим створенням досліджень.
mir-automatic-compiler-mode-exact-pack=Застарілий еквівалент Застосування безпечних змін із увімкненим дослідженням і потрібними перевіреними даними сумісності.
mir-automatic-compiler-mode-safe-generate=Застарілий еквівалент застосування безпечних змін із увімкненим дослідженням для зареєстрованих експериментальних постачальників.
mir-adjust-vanilla-weapon-speed-techs-off=Вимкніть додаткове очищення ракети/гармати, що накладається на MIR.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Видаляйте накладені ракетно-гарматні бонуси MIR лише тоді, коли ввімкнена досяжна нескінченна технологія забезпечує точний ефект заміни.
mir-adjust-vanilla-weapon-speed-techs-always=Завжди видаляйте ракетно-гарматні бонуси MIR, що перекриваються. Використовуйте, лише якщо ви бажаєте суворого розділення.
mir-science-pack-ingredient-policy-configured=Використовуйте налаштовані наукові пакети кожної створеної технології без додаткового розширення інгредієнтів. MIR за замовчуванням.
mir-science-pack-ingredient-policy-space=Додайте космічну науку, якщо доступно. Просте збільшення складності після ракети.
mir-science-pack-ingredient-policy-space-and-promethium=Додайте науку про космос і прометій, якщо доступно. Найкраще підходить для дослідницьких раковин пізньої космічної ери.
mir-science-pack-ingredient-policy-space-age-progression=Додайте лише пакети прогресу Space Age, передбачені вибраними пакетами. Не додає непов’язані модифіковані пакети.
mir-science-pack-ingredient-policy-official-progression=Додайте відсутні офіційні пакети в стилі попередніх умов, передбачені найдосконалішим офіційним пакетом, який уже вибрано.
mir-science-pack-ingredient-policy-mod-progression=Додайте відсутні пакети, сумісні з лабораторією, отримані з модифікованого прогресу наукового пакету, і розблокуйте передумови.
mir-science-pack-ingredient-policy-all-official=Використовуйте кожну офіційну базу та науковий пакет космічної ери, які існують у поточному наборі модів.
mir-science-pack-ingredient-policy-all=Використовуйте всі активні наукові пакети, сумісні з лабораторією, включаючи модифіковані наукові пакети.
mir-lab-incompatibility-policy-reduce=Збережіть технологію, скоротивши її наукові пакети до найбільшого набору, який приймає активна лабораторія. Найбезпечніше за умовчанням для пакетів модів.
mir-lab-incompatibility-policy-skip=Пропустіть технологію, якщо жодна активна лабораторія не може дослідити вибраний набір наукових пакетів. Суворіший і легший аудит.
mir-lab-incompatibility-policy-engine-default=Ніколи не переписуйте вибраний набір наукових пакетів. MIR зберігає безпечно досліджуваний набір без змін і пропускає згенеровану технологію, коли Factorio не може дослідити цей точний набір.
mir-prototype-productivity-cap-engine-default=Залиште існуюче обмеження продуктивності кожного рецепта. Рецепти без спеціального обмеження використовують звичайний ліміт бонусу продуктивності Factorio +300%.
mir-prototype-productivity-cap-percent-25=Встановіть обмеження продуктивності рецепта без параметрів на +25%. Це суворе раннє обмеження.
mir-prototype-productivity-cap-percent-50=Встановіть обмеження продуктивності рецепта без параметрів на +50%. Це нижче звичайного ліміту, тому дослідження продуктивності припиняють допомагати раніше.
mir-prototype-productivity-cap-percent-75=Встановіть обмеження продуктивності рецепта без параметрів на +75%. Це нижче звичайного ліміту, тому дослідження продуктивності припиняють допомагати раніше.
mir-prototype-productivity-cap-percent-100=Встановіть обмеження продуктивності рецепта без параметрів на +100%. Це нижче звичайного ліміту, тому дослідження продуктивності припиняють допомагати раніше.
mir-prototype-productivity-cap-percent-125=Встановіть обмеження продуктивності рецепта без параметрів на +125%.
mir-prototype-productivity-cap-percent-150=Встановіть обмеження продуктивності рецепта без параметрів на +150%.
mir-prototype-productivity-cap-percent-200=Встановіть обмеження продуктивності рецепта без параметрів на +200%. Це нижче звичайного ліміту, тому дослідження продуктивності припиняють допомагати раніше.
mir-prototype-productivity-cap-percent-250=Встановіть обмеження продуктивності рецепта без параметрів на +250%. Це трохи нижче звичайного ліміту.
mir-prototype-productivity-cap-percent-400=Встановіть обмеження продуктивності рецепта без параметрів на +400%. Це розширює масштабування продуктивності за межі звичайного обмеження.
mir-prototype-productivity-cap-percent-500=Встановіть обмеження продуктивності рецепта без параметрів на +500%. Це розширює масштабування продуктивності за межі звичайного обмеження.
mir-prototype-productivity-cap-percent-750=Встановіть обмеження продуктивності рецепта без параметрів на +750%.
mir-prototype-productivity-cap-percent-1000=Встановіть обмеження продуктивності рецепта без параметрів на +1000%. Використовуйте для тривалого збереження, де дослідження продуктивності мають значення.
mir-prototype-productivity-cap-percent-2500=Встановіть обмеження продуктивності рецепта без параметрів на +2500%. Використовуйте для дуже тривалих збереження.
mir-prototype-productivity-cap-percent-5000=Встановіть обмеження продуктивності рецепта без параметрів на +5000%.
mir-prototype-productivity-cap-percent-10000=Встановити обмеження продуктивності рецепта без параметрів на +10000%. Використовуйте лише для екстремального тривалого масштабування.
mir-prototype-productivity-cap-percent-25000=Встановити обмеження продуктивності рецепта без параметрів на +25000%. Використовуйте лише для екстремального тривалого масштабування.
mir-prototype-productivity-cap-percent-100000=Встановіть обмеження продуктивності рецепта без параметрів на +100000%. Це фактично не обмежено для більшості збереження.
mir-recycling-return-chance-engine-default=Залиште будь-який рецепт переробки без змін.
mir-recycling-return-chance-match-productivity-cap=Захищене від експлойтів автоматичне зменшення для прихованих згенерованих рецептів переробки. Використовує 1 / (1 + бонус продуктивності), обмежений нормальним прибутком у 25%: +400% стає 20%, а +1000% стає приблизно 9,09%.
mir-recycling-return-chance-percent-25=Зберігайте приховані згенеровані рецепти переробки за звичайного 25% повернення матеріалу.
mir-recycling-return-chance-percent-20=Масштабуйте приховані генеровані рецепти переробки до 20% повернення матеріалу.
mir-recycling-return-chance-percent-15=Масштабуйте приховані згенеровані рецепти переробки до 15% повернення матеріалу.
mir-recycling-return-chance-percent-12-5=Масштабуйте приховані згенеровані рецепти переробки до 12,5% повернення матеріалу.
mir-recycling-return-chance-percent-10=Масштабуйте приховані згенеровані рецепти переробки до 10% повернення матеріалу.
mir-recycling-return-chance-percent-7-5=Масштабуйте приховані згенеровані рецепти переробки до 7,5% повернення матеріалу.
mir-recycling-return-chance-percent-5=Масштабуйте приховані згенеровані рецепти переробки до 5% повернення матеріалу.
mir-recycling-return-chance-percent-2-5=Масштабуйте приховані згенеровані рецепти переробки до 2,5% повернення матеріалу.
mir-recycling-return-chance-percent-1=Масштабуйте приховані згенеровані рецепти переробки до 1% повернення матеріалу.
mir-recycling-return-chance-percent-0-5=Масштабуйте приховані генеровані рецепти переробки до 0,5% повернення матеріалу.
mir-recycling-return-chance-percent-0-1=Масштабуйте приховані згенеровані рецепти переробки до 0,1% повернення матеріалу.
mir-prototype-efficiency-cap-engine-default=Залиште обмеження на енергоспоживання кожної машини. Машини без спеціального обмеження використовують звичайне обмеження ефекту споживання енергії Factorio -80%, тому ефекти не можуть зменшити активне використання нижче 20%.
mir-prototype-efficiency-cap-saving-25=Напишіть обмеження споживання енергії -25%. Активне споживання енергії залишається на рівні 75% або більше після ефектів споживання енергії.
mir-prototype-efficiency-cap-saving-50=Напишіть ліміт споживання енергії -50%. Активне споживання енергії залишається на рівні 50% або більше після ефектів споживання енергії на підтримуваних машинах.
mir-prototype-efficiency-cap-saving-75=Напишіть обмеження споживання енергії -75%. Активне споживання енергії залишається на рівні 25% або більше після ефектів споживання енергії на підтримуваних машинах.
mir-prototype-efficiency-cap-saving-90=Напишіть обмеження споживання енергії -90%. Споживання активної енергії може знизитися до 10%, що нижче нормальних 20%.
mir-prototype-efficiency-cap-saving-95=Напишіть обмеження споживання енергії -95%. Споживання активної енергії може знизитися до 5%.
mir-prototype-efficiency-cap-saving-99=Напишіть обмеження споживання енергії -99%. Споживання активної енергії може знизитися до 1%.
mir-prototype-efficiency-cap-saving-999=Напишіть обмеження споживання енергії -99,9%. Споживання активної енергії може знизитися до 0,1%.
mir-prototype-efficiency-cap-saving-9999=Напишіть обмеження споживання енергії -99,99%. Це майже нульове споживання активної енергії, а не переробка прототипу з нульовою потужністю.
mir-prototype-pollution-cap-engine-default=Залиште ліміт впливу на забруднення для кожної машини. Машини без спеціального ліміту використовують звичайне обмеження Factorio для впливу на забруднення -80%.
mir-prototype-pollution-cap-saving-25=Напишіть обмеження забруднення -25%. Забруднення залишається на рівні 75% або більше після впливу забруднення.
mir-prototype-pollution-cap-saving-50=Напишіть ліміт забруднення -50%. Рівень забруднення залишається на рівні 50% або більше після впливу забруднення на підтримувані машини.
mir-prototype-pollution-cap-saving-75=Напишіть обмеження забруднення -75%. Рівень забруднення залишається на рівні 25% або більше після впливу забруднення на підтримувані машини.
mir-prototype-pollution-cap-saving-90=Напишіть обмеження забруднення -90%. Рівень забруднення може впасти до 10%, що нижче норми в 20%.
mir-prototype-pollution-cap-saving-95=Напишіть обмеження забруднення -95%. Забруднення може впасти до 5%.
mir-prototype-pollution-cap-saving-99=Напишіть обмеження забруднення -99%. Забруднення може впасти до 1%.
mir-prototype-pollution-cap-saving-999=Напишіть обмеження забруднення -99,9%. Забруднення може впасти до 0,1%.
mir-prototype-pollution-cap-saving-9999=Напишіть обмеження забруднення -99,99%. Це майже нульове забруднення, а не сценарій забруднення під час виконання.
mir-prototype-speed-floor-engine-default=Залиште негативне обмеження швидкості кожної машини. Машини без спеціального обмеження використовують звичайний рівень Factorio -80% і зберігають принаймні 20% швидкості.
mir-prototype-speed-floor-saving-25=Обмеження негативних ефектів швидкості на -25%, залишаючи принаймні 75% швидкості.
mir-prototype-speed-floor-saving-50=Обмеження негативних ефектів швидкості на -50%, залишаючи принаймні 50% швидкості.
mir-prototype-speed-floor-saving-75=Обмеження негативних ефектів швидкості на -75%, залишаючи принаймні 25% швидкості.
mir-prototype-speed-floor-saving-90=Дозволити негативні ефекти швидкості до -90%, залишаючи принаймні 10% швидкості.
mir-prototype-speed-floor-saving-95=Дозволяє негативні ефекти швидкості до -95%, залишаючи принаймні 5% швидкості.
mir-prototype-speed-floor-saving-99=Дозволити негативні ефекти швидкості до -99%, залишаючи принаймні 1% швидкості.
mir-prototype-speed-floor-saving-999=Дозволити негативні ефекти швидкості до -99,9%, залишаючи принаймні 0,1% швидкості.
mir-prototype-speed-floor-saving-9999=Дозволяє негативні ефекти швидкості до -99,99%, найнижча межа прототипу Factorio. Це майже зупинена, а не нульова або негативна швидкість крафта.
mir-prototype-speed-cap-engine-default=Залиште обмеження швидкості кожної машини. Машини без спеціального обмеження використовують дуже високу межу швидкості Factorio +100 000%.
mir-prototype-speed-cap-bonus-25=Позитивний ефект фіксації швидкості на +25%.
mir-prototype-speed-cap-bonus-50=Позитивний ефект фіксації швидкості на +50%. Використовуйте це, щоб зберегти бонуси швидкості жорстко обмеженими.
mir-prototype-speed-cap-bonus-75=Позитивний ефект фіксації швидкості на +75%.
mir-prototype-speed-cap-bonus-100=Позитивний ефект фіксації швидкості на +100%.
mir-prototype-speed-cap-bonus-125=Позитивний ефект фіксації швидкості на +125%.
mir-prototype-speed-cap-bonus-150=Позитивний ефект фіксації швидкості на +150%.
mir-prototype-speed-cap-bonus-200=Позитивний ефект фіксації швидкості на +200%.
mir-prototype-speed-cap-bonus-250=Позитивний ефект фіксації швидкості на +250%.
mir-prototype-speed-cap-bonus-300=Позитивний ефект фіксації швидкості на +300%.
mir-prototype-speed-cap-bonus-400=Позитивний ефект фіксації швидкості на +400%.
mir-prototype-speed-cap-bonus-500=Позитивний ефект фіксації швидкості на +500%.
mir-prototype-speed-cap-bonus-750=Позитивний ефект фіксації швидкості на +750%.
mir-prototype-speed-cap-bonus-1000=Позитивний ефект фіксації швидкості на +1000%.
mir-prototype-speed-cap-bonus-2500=Позитивний ефект фіксації швидкості на +2500%.
mir-prototype-speed-cap-bonus-5000=Позитивний ефект фіксації швидкості на +5000%.
mir-prototype-speed-cap-bonus-10000=Позитивний ефект фіксації швидкості на +10000%.
mir-prototype-speed-cap-bonus-25000=Позитивний ефект фіксації швидкості на +25000%.
mir-prototype-speed-cap-bonus-100000=Напишіть максимальну швидкість ефекту стелі Factorio явно. На відміну від незмінених, це перезаписує спеціальні нижні межі.
mir-prototype-quality-cap-engine-default=Залиште обмеження якості кожної машини. Машини без спеціального обмеження використовують дуже високу межу якості +100 000% Factorio.
mir-prototype-quality-cap-bonus-50=Затискає позитивні ефекти якості на +50%. Це обмежує бонусні ефекти якості машини, а не рівні якості чи формули ймовірності предметів.
mir-prototype-quality-cap-bonus-25=Затискає позитивні ефекти якості на +25%. Це не змінює рівні якості або формули ймовірності предметів.
mir-prototype-quality-cap-bonus-75=Затискає позитивні ефекти якості на +75%. Це не змінює рівні якості або формули ймовірності предметів.
mir-prototype-quality-cap-bonus-100=Затискає позитивні ефекти якості на +100%. Це не змінює рівні якості або формули ймовірності предметів.
mir-prototype-quality-cap-bonus-125=Затискає позитивні ефекти якості на +125%. Це не змінює рівні якості або формули ймовірності предметів.
mir-prototype-quality-cap-bonus-150=Затискає позитивні ефекти якості на +150%. Це не змінює рівні якості або формули ймовірності предметів.
mir-prototype-quality-cap-bonus-200=Затискає позитивні ефекти якості на +200%. Це не змінює рівні якості або формули ймовірності предметів.
mir-prototype-quality-cap-bonus-250=Затискає позитивні ефекти якості на +250%. Це не змінює рівні якості або формули ймовірності предметів.
mir-prototype-quality-cap-bonus-300=Затискає позитивні ефекти якості на +300%. Це не змінює рівні якості або формули ймовірності предметів.
mir-prototype-quality-cap-bonus-400=Затискає позитивні ефекти якості на +400%. Це не змінює рівні якості або формули ймовірності предметів.
