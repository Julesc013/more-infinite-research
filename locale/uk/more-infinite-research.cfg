[mod-setting-description]
ips-require-space-gate=Якщо ввімкнено, ці технології залишаються заблокованими, доки не буде досліджено космічні науки у Vanilla або науку про прометій у Space Age.
mir-science-pack-ingredient-policy=Вибирає, як MIR додає наукові пакети до створених технологій. Варіанти впорядковані від консервативного до широкого: пакети за замовчуванням, пакети для останньої гри, пакети на основі прогресу, потім усі доступні пакети.
mir-automatic-productivity-action=Вибирає, що MIR робитиме з можливостями безпечної продуктивності, знайденими в рецептах встановлених модів. Вимкнено не виконує автоматичного виявлення. Попередній перегляд записів про зміни прийнятих і пропущених кандидатів у журналі Factorio без змін дослідження. Застосувати безпечні зміни (за замовчуванням) додає придатні рецепти лише до сумісних існуючих досліджень MIR. Це контролює дії, а не силу чи зрілість; прапорці створення нижче окремі. Завжди застосовуються перевірки власності, переробки, ймовірності, каталізатора, науки, лабораторії, передумови, цілі, ідентичності, прогресу та циклу.
mir-automatic-create-research=За замовчуванням: вимкнено. Заборонено Застосування безпечних змін до сумісного існуючого дослідження MIR; кандидати без відповідного потоку пропускаються та повідомляються. Увімкнути дозволяє відповідним зареєстрованим постачальникам створити одну стабільну загальну технологію нескінченної продуктивності, коли жодні існуючі дослідження не підходять. Прапорець перевірених даних нижче визначає, чи придатні експериментальні постачальники. MIR ніколи не створює одну технологію для модифікації чи рецепту, і всі жорсткі правила безпеки, науки, власності, ідентичності, прогресу та циклу все ще застосовуються.
mir-automatic-require-reviewed-data=За замовчуванням: увімкнено. Це має значення лише тоді, коли ввімкнено параметр «Дозволити створення нових досліджень». він ніколи не блокує безпечне приєднання до існуючих досліджень. У дозволах лише сімейства постачальників позначені як переглянуті та підтверджені відповідними доказами точної версії, тому експериментальні сімейства пропускаються. Off дозволяє зареєстрованим експериментальним постачальникам створювати загальні структурні докази. Для найширшої експериментальної поведінки дозвольте створення досліджень і вимкніть цю вимогу. Жодна цінність не може обійти жорсткі ворота безпеки.
mir-automatic-compiler-mode=Прихований міст сумісності для профілів, створених до розділення елементів автоматичного керування продуктивністю. Застаріле значення не за умовчанням враховується лише тоді, коли всі нові елементи керування залишаються стандартними. Змініть будь-який новий елемент керування, щоб отримати явний контроль.
ips-enable-stream=Створює згенеровану нескінченну технологію для __1__, коли доступні її рецепти, ефекти, передумови та наукові пакети. Вимкніть це, щоб MIR не генерував цю технологію.
ips-cost-base-stream=Дослідницькі одиниці, необхідні для першого згенерованого рівня __1__. Має бути принаймні 1. Пізніші рівні обчислюються на основі цього значення та коефіцієнта зростання вартості.
ips-cost-growth-stream=Множник, застосований до кожного наступного рівня __1__. Використовуйте 1 для фіксованих витрат, 1,5 для 50% зростання за рівень або 2 для подвоєння витрат.
ips-max-level-stream=Найвищий згенерований рівень для __1__. Встановіть 0 для нескінченних рівнів.
ips-research-time-stream=Секунди на одиницю дослідження для __1__. Встановіть значення 0, щоб використовувати MIR за замовчуванням для цієї технології. Це не загальний час дослідження; загальний час також залежить від вартості дослідження, кількості лабораторій, швидкості лабораторії та модулів.
mir-enable-base-tech=Дозволяє __1__ продовжувати працювати над своєю ванільною кришкою як нескінченна технологія. Вимкніть це, якщо ви хочете, щоб MIR додавав нові дослідницькі лінії без розширення цього ланцюжка.
mir-cost-base=Дослідницькі одиниці, необхідні для першого рівня продовження MIR __1__. Встановіть значення 0, щоб успадкувати модель витрат ланцюга Vanilla, коли це можливо.
mir-cost-growth=Множник, застосований до кожного наступного рівня продовження MIR __1__. Установіть значення 0, щоб успадкувати модель росту ванільного ланцюга, коли це можливо.
mir-max-level=Найвищий рівень продовження MIR для __1__. Встановіть 0 для нескінченних рівнів.
mir-research-time=Секунди на одиницю дослідження для продовження MIR __1__. Установіть значення 0, щоб успадкувати час дослідницької одиниці ланцюга Vanilla, коли це можливо.
mir-prefer-this-mod-for-competing-techs=Якщо ввімкнено, цей мод видаляє вибрані конкуруючі нескінченні розширення та використовує власні версії. Вимкніть, щоб зберегти конкуруючі версії з інших модів.
mir-adjust-vanilla-weapon-speed-techs=Контролює, чи MIR видаляє бонуси швидкості ракет і гарматних снарядів із генерованої продовження швидкості стрільби зі зброї, коли доступне точне нескінченне покриття заміни. Технології кінцевої швидкості стрільби зброї Vanilla зберігають свої початкові бонуси.
mir-use-installed-space-age-icons=Якщо ввімкнено, MIR може посилатися на встановлені офіційні файли піктограм DLC, зокрема Space Age та Elevated Rails, навіть якщо ці моди вимкнено для запуску базової гри. Залиште цю опцію вимкненою, якщо ці файли DLC не інстальовано; Factorio не може грамотно відновити файли значків, які були відсутні під час завантаження прототипу.
mir-pipeline-extent-multiplier=Множник розкривного списку лише для запуску для розпізнаних полів розміру конвеєра рідинної коробки в прототипах, а не лише в конвеєрах. 100% залишає прототипи без змін і не завантажує трубопровід або сканує коробки рідини. Значення, відмінні від 100%, є експериментальними та можуть впливати на машини, баки, двигуни та модифіковані прототипи, які визначають рідинні коробки.
mir-unrestricted-modules=Експериментальний і порушує баланс. Якщо ввімкнено, кожен існуючий рецепт приймає всі п’ять ефектів модуля, а кожен наявний приймач модуля зі слотами приймає кожну категорію виявленого модуля. Це не додає слоти для модулів і не змінює прототипи модулів і може забезпечити продуктивність, якість і модифіковані цикли модулів.
mir-prototype-productivity-cap=Вибирає, чи залишає MIR лише обмеження продуктивності рецептів, чи записує обмеження запуску до кожного непараметричного та непереробного рецепта. +300% (без змін) зберігає існуючі кришки рецептів; нижчі значення скорочують масштабування продуктивності, тоді як вищі значення подовжують його.
mir-recycling-return-chance=Керує лише прихованими згенерованими рецептами переробки. Автоматичний режим зменшує звичайний 25% повернення матеріалу щонайбільше до 1, поділеного на загальний множник виходу за вибраного обмеження продуктивності. Фіксовані варіанти безпосередньо масштабують однакові згенеровані прибутки. Видимі процеси та обмеження продуктивності рецептів ніколи не змінюються.
mir-productivity-cap-self-recycling-only=Понад 1/повернення переробника - 1 лише виробничі рецепти з перевіреним негенеративним шляхом самопереробки отримують вибране вище обмеження. При або нижче цього порогу цей прапорець не діє. Двигун без змін використовує нормальний 25% повернення як консервативний поріг +300% без зміни рецептів переробки.
mir-prototype-efficiency-cap=Вибирає, наскільки ефекти ефективності можуть зменшити активне використання енергії машини. -80% (без змін) залишає без змін існуючі обмеження на використання енергії. Більш глибокі скорочення можуть наблизитися до нульового споживання активної енергії без зміни лімітів забруднення.
mir-prototype-pollution-cap=Вибирає, наскільки ефекти зменшення забруднення можуть зменшити забруднення машин. -80% (без змін) залишає без змін існуючі ліміти забруднення. Більш глибокі скорочення можуть наблизитися до нульового забруднення без зміни використання енергії.
mir-prototype-speed-floor=Вибирає, наскільки негативні ефекти швидкості можуть сповільнити підтримувані машини. -80% (без змін) залишає існуючі обмеження без змін; глибші значення знижують нормальний рівень до майже зупинки на -99,99%.
mir-prototype-speed-cap=Вибирає, чи залишає MIR обмеження на швидкість роботи машини, чи записує нове позитивне обмеження швидкості. +100000% (без змін) зберігає існуючі обмеження; нижчі значення навмисно обмежують дуже великі бонуси швидкості.
mir-prototype-quality-cap=Вибирає, чи залишає MIR обмеження на вплив якості машини, чи записує нове позитивне обмеження якості. +100000% (без змін) зберігає існуючі обмеження та не змінює рівні якості чи формули ймовірності предметів.
mir-prototype-positive-power-floor=За умовчанням вимкнено. Якщо ввімкнути, MIR змінює явні прототипи споживання активної енергії 0 Вт на 1 Вт під час завантаження прототипу, тому піктограми попереджень про низьку потужність не з’являються на об’єктах, які мають споживати незначну кількість, відмінну від нуля. Залиште, щоб точно зберегти прототипи з нульовою потужністю.
mir-settings-profile-import=Вставте сюди рядок профілю налаштувань MIR, щоб застосувати експортовані значення налаштувань запуску як рівень заміни під час створення прототипу. Залиште поле порожнім для звичайних налаштувань. Експортуйте за допомогою /mir-settings-export з активного збереження, а потім перезапустіть після зміни цього значення.
mir-debug-generation-report=Якщо ввімкнено, записує один структурований рядок журналу для кожного створеного або пропущеного потоку та базового розширення, включаючи наукові пакети, попередні умови, кількість ефектів, статус сумісності лабораторії та джерело піктограм.
mir-debug-recipe-matches=Якщо ввімкнено, записує відповідні назви рецептів для кожного згенерованого потоку продуктивності. Це може бути шумно у великих пакетах модів.
mir-debug-scripted-effects=Якщо ввімкнено, записує записи в журнал виконання, коли сценарні технології повторно обчислюють глобальні або керовані подіями ефекти.
mir-lab-incompatibility-policy=Вибирає, що робитиме MIR, коли вибрані наукові пакети не можуть бути досліджені жодною активною лабораторією.
ips-effect-per-level-stream=Встановлює основний ефект базового рівня для кожного рівня для __1__. Відповідні пізніші рівні та ефекти масштабуються пропорційно. Відсоткові ефекти використовують відсоткові пункти; Ефекти підрахунку та відстані використовують власні одиниці.
mir-effect-per-level=Встановлює канонічний ефект для кожного рівня для нескінченного продовження __1__. Пов’язані ефекти масштабуються пропорційно від кінцевої базової лінії. Відсоткові ефекти використовують відсоткові пункти; Ефекти підрахунку та відстані використовують власні одиниці.
mir-note-experimental-spoilage=Експериментальний і вимкнений за замовчуванням у версії 2.1.0. Це глобальний сценарій/ефект для всієї карти. Існуюча поведінка спойлерного стека не заявлена, доки не буде перевірено вручну.
mir-note-agriculture-growth=Застосовується до щойно посаджених сільськогосподарських баштових культур. Існуючі висаджені культури не змінюються.
mir-note-cargo-pad-count=Спеціальне логістичне дослідження космічної ери. Збільшує посадочні площадки для вантажів на поверхню та може суттєво змінити баланс логістики.
mir-note-inserter-capacity=Вимкнено за замовчуванням. Додаткова ємність вставки може порушити роботу вставок, керованих схемою, і зменшити оптимізацію двигуна.
mir-note-native-owner-managed-stream=Якщо інстальована нескінченна технологія вже володіє цим дослідницьким сімейством, ті самі параметри запуску налаштовують цього власника замість створення дубліката. Незмінні параметри MIR за замовчуванням точно зберігають остаточний прототип власника. Явні перевизначення вартості, часу, максимального рівня та ефекту застосовуються лише після збігу безпечного власника; вимкнення потоку залишає зовнішню технологію недоторканою. Перезапустіть Factorio після зміни параметрів запуску. Максимальний рівень 0 означає нескінченність, а значення ефекту є відсотковими пунктами за рівень.

