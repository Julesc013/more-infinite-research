[mod-setting-description]
ips-require-space-gate=활성화되면 이러한 기술은 바닐라에서 우주 과학이 연구되거나 우주 시대에서 프로메튬 과학이 연구될 때까지 잠긴 상태로 유지됩니다.
mir-science-pack-ingredient-policy=MIR이 생성된 기술에 과학 팩을 추가하는 방법을 선택합니다. 옵션은 보수적인 것부터 광범위한 것까지 순서가 지정됩니다(기본 팩, 게임 후반 팩, 진행 기반 팩, 사용 가능한 모든 팩).
mir-automatic-productivity-action=설치된 모드 레시피에서 찾은 안전한 생산성 기회로 MIR이 수행하는 작업을 선택합니다. 비활성화되면 자동 검색을 수행하지 않습니다. 연구를 변경하지 않고 Factorio 로그에서 후보자를 수락하고 건너뛴 변경 사항 기록을 미리 봅니다. 안전한 변경 사항 적용(기본값)은 호환되는 기존 MIR 연구에만 적합한 레시피를 추가합니다. 이는 힘이나 성숙함이 아니라 행동을 통제합니다. 아래의 생성 확인란은 별개입니다. 소유권, 재활용, 확률, 촉매, 과학, 실험실, 전제 조건, 목표, 신원, 진행 및 주기 확인이 항상 적용됩니다.
mir-automatic-create-research=기본값: 꺼짐. 제한 없음 호환 가능한 기존 MIR 연구에 안전한 변경 사항을 적용합니다. 적합한 스트림이 없는 후보자는 건너뛰고 보고됩니다. On을 사용하면 적격 등록 공급자가 기존 연구가 적합하지 않을 때 하나의 안정적인 일반 무한 생산성 기술을 만들 수 있습니다. 아래의 검토된 데이터 확인란을 통해 실험 제공업체의 적격 여부가 결정됩니다. MIR은 모드나 레시피당 하나의 기술을 만들지 않으며 모든 엄격한 안전, 과학, 소유권, 신원, 진행 및 사이클 게이트가 여전히 적용됩니다.
mir-automatic-require-reviewed-data=기본값: 켜짐. 이는 새로운 연구 생성 허용이 켜져 있는 경우에만 중요합니다. 기존 연구에 대한 안전한 애착을 결코 차단하지 않습니다. 허가 시 적용 가능한 정확한 버전 증거로 검토 및 지원되는 것으로 표시된 공급자 제품군만 있으므로 실험 제품군은 건너뜁니다. Off는 등록된 실험 제공자가 일반적인 구조적 증거를 기반으로 생성하는 것을 허용합니다. 가장 광범위한 실험 동작을 위해서는 연구 생성을 활성화하고 이 요구 사항을 끄십시오. 어떤 가치도 단단한 안전문을 우회할 수 없습니다.
mir-automatic-compiler-mode=분할된 자동 생산성 제어 이전에 생성된 프로필에 대한 숨겨진 호환성 브리지입니다. 기본값이 아닌 레거시 값은 모든 새 컨트롤이 기본값으로 유지되는 동안에만 적용됩니다. 명시적인 제어권을 가지려면 새 컨트롤을 변경하십시오.
ips-enable-stream=레시피, 효과, 전제 조건 및 과학 팩을 사용할 수 있을 때 __1__에 대해 생성된 무한 기술을 만듭니다. MIR이 이 기술을 생성하지 못하도록 하려면 이 옵션을 비활성화합니다.
ips-cost-base-stream=__1__의 첫 번째 생성 레벨에 필요한 연구 단위입니다. 1 이상이어야 합니다. 이후 수준은 이 값과 비용 증가율을 사용하여 계산됩니다.
ips-cost-growth-stream=__1__의 각 이후 레벨에 적용되는 승수입니다. 고정 비용에는 1을 사용하고, 레벨당 50% 성장에는 1.5를 사용하고, 비용을 두 배로 늘리려면 2를 사용합니다.
ips-max-level-stream=__1__에 대해 가장 높은 생성 수준. 무한 수준의 경우 0으로 설정합니다.
ips-research-time-stream=__1__에 대한 연구 단위당 초. 이 기술에 대해 MIR의 기본값을 사용하려면 0으로 설정하십시오. 이는 총 조사 시간이 아닙니다. 총 시간은 연구 비용, 연구실 수, 연구실 속도 및 모듈에 따라 달라집니다.
mir-enable-base-tech=__1__은 무한한 기술로서 바닐라 한도를 넘어 계속해서 사용할 수 있습니다. MIR이 이 바닐라 체인을 확장하지 않고 새로운 연구 라인을 추가하도록 하려면 이 옵션을 비활성화하십시오.
mir-cost-base=첫 번째 MIR 연속 수준 __1__에 필요한 연구 단위입니다. 가능한 경우 바닐라 체인의 비용 패턴을 상속하려면 0으로 설정하십시오.
mir-cost-growth=__1__의 각 이후 MIR 연속 수준에 적용되는 승수입니다. 가능한 경우 바닐라 체인의 성장 패턴을 상속하려면 0으로 설정하십시오.
mir-max-level=__1__에 대한 가장 높은 MIR 연속 수준. 무한 수준의 경우 0으로 설정합니다.
mir-research-time=__1__의 MIR 지속을 위한 연구 단위당 초입니다. 가능한 경우 바닐라 체인의 연구 단위 시간을 상속하려면 0으로 설정하십시오.
mir-prefer-this-mod-for-competing-techs=이 모드를 활성화하면 선택된 경쟁 무한 확장 프로그램을 제거하고 자체 버전을 사용합니다. 다른 모드의 경쟁 버전을 유지하려면 비활성화하세요.
mir-adjust-vanilla-weapon-speed-techs=정확한 무한 교체 범위가 가능할 때 MIR이 생성된 무기 발사 속도 지속에서 로켓 및 포탄 속도 보너스를 제거할지 여부를 제어합니다. 유한한 바닐라 무기 사격 속도 기술은 원래 보너스를 유지합니다.
mir-use-installed-space-age-icons=활성화되면 MIR은 기본 게임 실행을 위해 해당 모드가 비활성화된 경우에도 Space Age 및 Elevated Rails를 포함하여 설치된 공식 DLC 아이콘 파일을 참조할 수 있습니다. 해당 DLC 파일이 설치되지 않은 경우 이 옵션을 해제해 두십시오. Factorio는 프로토타입 로딩 중에 누락된 아이콘 파일을 정상적으로 복구할 수 없습니다.
mir-pipeline-extent-multiplier=파이프 엔터티뿐만 아니라 프로토타입 전반에 걸쳐 인식된 유체 상자 파이프라인 범위 필드에 대한 시작 전용 드롭다운 승수입니다. 100%는 프로토타입을 변경하지 않고 그대로 두고 파이프라인 패스를 로드하거나 유체 상자를 스캔하지 않습니다. 100%가 아닌 값은 실험적이며 유체 상자를 정의하는 기계, 탱크, 추진기 및 개조된 프로토타입에 영향을 미칠 수 있습니다.
mir-unrestricted-modules=실험적이며 균형을 깨는 것입니다. 활성화되면 모든 기존 레시피는 5개의 모듈 효과를 모두 허용하고 슬롯이 있는 모든 기존 모듈 수신기는 발견된 모든 모듈 카테고리를 허용합니다. 이는 모듈 슬롯을 추가하거나 모듈 프로토타입을 변경하지 않으며 생산성, 품질 및 모듈 모듈 루프를 활성화할 수 있습니다.
mir-prototype-productivity-cap=MIR이 레시피 생산성 한도를 그대로 둘지 아니면 모든 비매개변수, 비재활용 레시피에 시작 한도를 기록할지 선택합니다. +300%(변경되지 않음)는 기존 레시피 한도를 유지합니다. 값이 낮을수록 생산성 확장이 단축되고 값이 높을수록 확장됩니다.
mir-recycling-return-chance=숨겨진 생성된 재활용 레시피만 제어합니다. 자동 모드는 일반적인 25% 자재 반품을 선택한 생산성 한도의 총 생산량 배율로 나누어 최대 1로 줄입니다. 고정 선택은 동일한 생성 수익을 직접 확장합니다. 눈에 보이는 프로세스 및 레시피 생산성 상한은 변경되지 않습니다.
mir-productivity-cap-self-recycling-only=1 / 재활용업체 반환 - 1 이상인 경우, 검증된 비생성 자체 재활용 경로를 갖춘 생산 레시피만 더 높은 상한선을 받습니다. 해당 임계값 이하에서는 이 확인란이 아무런 효과가 없습니다. 변경되지 않은 엔진은 재활용 방법을 변경하지 않고 보수적인 +300% 임계값으로 일반적인 25% 반환을 사용합니다.
mir-prototype-efficiency-cap=효율성 효과가 활성 기계 에너지 사용을 어느 정도까지 줄일 수 있는지 선택합니다. -80%(변경 없음)는 기존 에너지 사용 제한을 그대로 유지합니다. 더 깊은 감소를 통해 오염 한계를 변경하지 않고도 활성 에너지 사용을 0으로 줄일 수 있습니다.
mir-prototype-pollution-cap=오염 감소 효과가 기계 오염을 어느 정도까지 줄일 수 있는지 선택합니다. -80%(변경 없음)는 기존 오염 제한을 그대로 유지합니다. 더 깊은 감축을 통해 에너지 사용을 변경하지 않고도 오염 제로에 접근할 수 있습니다.
mir-prototype-speed-floor=부정적인 속도 효과로 인해 지원되는 컴퓨터가 얼마나 느려질 수 있는지 선택합니다. -80%(변경 없음)는 기존 제한을 그대로 유지합니다. 값이 높을수록 일반 바닥이 -99.99%에 가까운 정지점까지 제거됩니다.
mir-prototype-speed-cap=MIR이 기계 속도 효과 제한을 그대로 둘지 아니면 새로운 포지티브 속도 제한을 작성할지 선택합니다. +100000%(변경되지 않음)는 기존 제한을 유지합니다. 값이 낮을수록 의도적으로 매우 큰 속도 보너스가 제한됩니다.
mir-prototype-quality-cap=MIR이 기계 품질 효과 한계를 그대로 둘지 아니면 새로운 긍정적인 품질 한도를 작성할지 선택합니다. +100000%(변경되지 않음)는 기존 제한을 유지하며 품질 등급이나 아이템 확률 공식을 변경하지 않습니다.
mir-prototype-positive-power-floor=기본값은 꺼져 있습니다. 활성화되면 MIR은 프로토타입 로딩 중에 명시적인 0W 활성 에너지 사용 프로토타입을 1W로 변경하므로 0이 아닌 작은 양을 그려야 하는 엔터티에 저전력 경고 아이콘이 표시되지 않습니다. 무전력 프로토타입을 정확하게 보존하려면 그대로 두십시오.
mir-settings-profile-import=프로토타입 생성 중에 내보낸 시작 설정 값을 재정의 레이어로 적용하려면 여기에 MIR 설정 프로필 문자열을 붙여넣습니다. 일반 설정의 경우 비워 두세요. 활성 저장에서 /mir-settings-export를 사용하여 내보낸 다음 이 값을 변경한 후 다시 시작하세요.
mir-debug-generation-report=활성화되면 과학 팩, 전제 조건, 효과 개수, 실험실 호환성 상태 및 아이콘 소스를 포함하여 생성되거나 건너뛴 스트림 및 기본 확장당 하나의 구조화된 로그 행을 작성합니다.
mir-debug-recipe-matches=활성화되면 생성된 각 생산성 흐름에 대해 일치하는 레시피 이름을 작성합니다. 대형 모드 팩에서는 소음이 발생할 수 있습니다.
mir-debug-scripted-effects=활성화되면 스크립트 기술이 전역 또는 이벤트 기반 효과를 다시 계산할 때 런타임 로그 항목을 작성합니다.
mir-lab-incompatibility-policy=선택된 과학 팩을 활성 연구실에서 연구할 수 없을 때 MIR이 수행할 작업을 선택합니다.
ips-effect-per-level-stream=__1__의 레벨당 기본 기본 계층 효과를 설정합니다. 관련된 이후 단계와 효과는 비례적으로 조정됩니다. 백분율 효과는 백분율 포인트를 사용합니다. 개수 및 거리 효과는 기본 단위를 사용합니다.
mir-effect-per-level=무한 __1__ 연속에 대한 표준 레벨별 효과를 설정합니다. 관련 효과는 최종 바닐라 기준선에 비례하여 조정됩니다. 백분율 효과는 백분율 포인트를 사용합니다. 개수 및 거리 효과는 기본 단위를 사용합니다.
mir-note-experimental-spoilage=실험적이며 v2.1.0에서는 기본적으로 비활성화되어 있습니다. 이는 글로벌/맵 전체의 스크립트 효과입니다. 기존의 손상될 수 있는 스택 동작은 수동으로 검증될 때까지 주장되지 않습니다.
mir-note-agriculture-growth=새로 심은 농업용 타워작물에 적용됩니다. 기존에 심은 작물의 크기는 조정되지 않습니다.
mir-note-cargo-pad-count=특수우주시대 물류연구. 표면당 화물 착륙 패드를 늘리고 물류 균형을 크게 바꿀 수 있습니다.
mir-note-inserter-capacity=기본적으로 비활성화되어 있습니다. 추가 삽입기 용량은 회로 제어 삽입기를 손상시키고 엔진 최적화를 감소시킬 수 있습니다.
mir-note-native-owner-managed-stream=설치된 무한 기술이 이미 이 연구 제품군을 소유하고 있는 경우 동일한 시작 설정이 복제본을 생성하는 대신 해당 소유자를 구성합니다. 변경되지 않은 MIR 기본값은 소유자의 최종 프로토타입을 정확하게 보존합니다. 명시적인 비용, 시간, 최대 레벨 및 효과 재정의는 안전한 소유자 일치 후에만 적용됩니다. 스트림을 비활성화하면 외부 기술은 그대로 유지됩니다. 시작 설정을 변경한 후 Factorio를 다시 시작하십시오. 최대 레벨이 0이면 무한을 의미하며, 효과 값은 레벨당 백분율 포인트입니다.

