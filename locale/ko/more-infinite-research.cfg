[technology-description]
more-infinite-research.recipe_productivity=선택한 레시피의 레시피 생산성이 향상됩니다. Factorio의 최대 생산성 한도는 여전히 적용됩니다. 레시피가 한도에 도달하면 추가 무한 레벨은 실질적인 효과가 없을 수 있습니다.
more-infinite-research.direct_effect=무한 반복 보너스를 추가합니다. 과학 팩은 활성 실험실에서 선택되므로 해당 기술은 호환 가능한 모드 세트로 계속 연구할 수 있습니다.
more-infinite-research.cargo_bay_unloading_distance=화물 착륙장과 연결된 하역 구역 사이의 최대 거리를 늘립니다.
more-infinite-research.cargo_landing_pad_count=각 군대가 표면당 건설할 수 있는 화물 착륙 패드의 수를 늘립니다.
more-infinite-research.flamethrower_shooting_speed=화염방사기 무기와 화염방사기 포탑의 사격 속도를 높입니다.
more-infinite-research.electric_shooting_speed=전기 무기의 사격 속도가 증가합니다. 바닐라에서는 이것이 방전 방어에 영향을 미칩니다. Space Age에서는 Tesla 탄약 범주를 사용할 수 있는 경우 Tesla 무기에도 영향을 미칩니다.
more-infinite-research.spoilage_preservation=제한된 스크립트 효과를 통해 전역 스포일러 시간 수정자를 늘립니다. 기존의 스포일러성 아이템은 게임 내에서 테스트될 때까지 현재의 스포일러 마감일을 유지할 수 있습니다.
more-infinite-research.agricultural_growth_speed=제한된 스크립트 효과를 통해 새로 심은 농업용 타워 식물의 남은 성장 시간을 단축합니다.
more-infinite-research.lab_productivity=기본 연구실 연구 생산성 수정자를 사용하여 소비된 각 과학 팩에서 얻는 연구 진행률을 높입니다.

