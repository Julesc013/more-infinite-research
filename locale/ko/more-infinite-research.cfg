[string-mod-setting-description]
mir-automatic-productivity-action-disabled=자동 검색, 첨부 또는 생성을 수행하지 않습니다. MIR의 고정 연구는 변경되지 않습니다.
mir-automatic-productivity-action-preview=후보자를 발견하고 분류한 다음 승인된 결정과 건너뛴 결정을 Factorio 로그에 기록합니다. 레시피를 첨부하거나 연구를 생성하지 않습니다.
mir-automatic-productivity-action-apply=기본값. 후보를 발굴하고 호환 가능한 기존 MIR 연구에 안전성이 입증된 레시피만 첨부합니다. 그것은 그 자체로 연구를 창출하지 않습니다. 아래 두 개의 확인란이 생성을 관리합니다.
mir-automatic-compiler-mode-off=기존 장애인과 동일합니다.
mir-automatic-compiler-mode-report=미리보기 변경 사항과 동등한 기존 버전입니다.
mir-automatic-compiler-mode-safe-attach=연구 생성이 비활성화된 상태에서 안전한 변경 사항 적용에 해당하는 레거시입니다.
mir-automatic-compiler-mode-exact-pack=연구 생성이 활성화되고 검토된 호환성 데이터가 필요한 안전한 변경 사항 적용에 해당하는 레거시입니다.
mir-automatic-compiler-mode-safe-generate=등록된 실험 제공자에 대해 연구 생성이 활성화된 안전한 변경 사항 적용에 해당하는 레거시입니다.
mir-adjust-vanilla-weapon-speed-techs-off=MIR의 선택적 중복 로켓/대포 보너스 정리를 비활성화합니다.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=활성화되고 도달 가능한 무한 기술이 정확한 대체 효과를 제공하는 경우에만 MIR의 중복되는 로켓/대포 보너스를 제거합니다.
mir-adjust-vanilla-weapon-speed-techs-always=MIR의 중복되는 로켓/대포 보너스를 항상 제거하세요. 엄격한 분리를 원하는 경우에만 사용하십시오.
mir-science-pack-ingredient-policy-configured=선택적 성분 확장 없이 생성된 각 기술에 구성된 과학 팩을 사용하세요. 미르 기본값.
mir-science-pack-ingredient-policy-space=가능한 경우 우주 과학을 추가하세요. 로켓 발사 후 난이도가 간단하게 증가합니다.
mir-science-pack-ingredient-policy-space-and-promethium=가능한 경우 우주 및 프로메슘 과학을 추가하세요. 매우 늦은 우주 시대 연구 싱크에 가장 적합합니다.
mir-science-pack-ingredient-policy-space-age-progression=선택한 팩에 암시된 우주 시대 진행 팩만 추가하세요. 관련되지 않은 수정된 팩을 추가하지 않습니다.
mir-science-pack-ingredient-policy-official-progression=이미 선택된 가장 발전된 공식 팩에 의해 암시되는 누락된 공식 전제 조건 스타일 팩을 추가합니다.
mir-science-pack-ingredient-policy-mod-progression=수정된 과학 팩 진행 상황에서 유추된 누락된 실험실 호환 팩을 추가하고 전제 조건을 잠금 해제하세요.
mir-science-pack-ingredient-policy-all-official=현재 모드 세트에 존재하는 모든 공식 기지와 우주 시대 과학 팩을 사용하세요.
mir-science-pack-ingredient-policy-all=개조된 과학 팩을 포함하여 모든 활성 실험실 호환 과학 팩을 사용하세요.
mir-lab-incompatibility-policy-reduce=과학 팩을 현재 연구실에서 허용하는 가장 큰 세트로 줄여 기술을 유지하세요. 모드 팩에 대한 가장 안전한 기본값입니다.
mir-lab-incompatibility-policy-skip=선택된 과학 팩 세트를 연구할 수 있는 활성 연구실이 없다면 기술을 건너뛰세요. 더 엄격하고 감사하기가 더 쉽습니다.
mir-lab-incompatibility-policy-engine-default=선택한 과학 팩 세트를 다시 작성하지 마세요. MIR은 안전하게 연구 가능한 세트를 변경하지 않고 보존하고 Factorio가 정확한 세트를 연구할 수 없는 경우 생성된 기술을 생략합니다.
mir-prototype-productivity-cap-engine-default=각 레시피의 기존 생산성 한도는 그대로 둡니다. 맞춤형 한도가 없는 레시피는 Factorio의 일반 +300% 생산성 보너스 한도를 사용합니다.
mir-prototype-productivity-cap-percent-25=매개변수가 아닌 레시피 생산성 상한을 +25%로 설정합니다. 이는 엄격한 초기 제한입니다.
mir-prototype-productivity-cap-percent-50=매개변수가 아닌 레시피 생산성 상한을 +50%로 설정합니다. 이는 일반적인 한도보다 낮으며 생산성 연구가 더 빨리 도움이 되지 않게 만듭니다.
mir-prototype-productivity-cap-percent-75=매개변수가 아닌 레시피 생산성 상한을 +75%로 설정합니다. 이는 일반적인 한도보다 낮으며 생산성 연구가 더 빨리 도움이 되지 않게 만듭니다.
mir-prototype-productivity-cap-percent-100=매개변수가 아닌 레시피 생산성 상한을 +100%로 설정합니다. 이는 일반적인 한도보다 낮으며 생산성 연구가 더 빨리 도움이 되지 않게 만듭니다.
mir-prototype-productivity-cap-percent-125=매개변수가 아닌 레시피 생산성 상한을 +125%로 설정합니다.
mir-prototype-productivity-cap-percent-150=매개변수가 아닌 레시피 생산성 상한을 +150%로 설정합니다.
mir-prototype-productivity-cap-percent-200=매개변수가 아닌 레시피 생산성 상한을 +200%로 설정합니다. 이는 일반적인 한도보다 낮으며 생산성 연구가 더 빨리 도움이 되지 않게 만듭니다.
mir-prototype-productivity-cap-percent-250=매개변수가 아닌 레시피 생산성 상한을 +250%로 설정합니다. 이는 일반 캡보다 약간 낮습니다.
mir-prototype-productivity-cap-percent-400=매개변수가 아닌 레시피 생산성 상한을 +400%로 설정합니다. 이는 생산성 확장을 일반 한도 이상으로 확장합니다.
mir-prototype-productivity-cap-percent-500=매개변수가 아닌 레시피 생산성 상한을 +500%로 설정합니다. 이는 생산성 확장을 일반 한도 이상으로 확장합니다.
mir-prototype-productivity-cap-percent-750=매개변수가 아닌 레시피 생산성 상한을 +750%로 설정합니다.
mir-prototype-productivity-cap-percent-1000=매개변수가 아닌 레시피 생산성 상한을 +1000%로 설정합니다. 생산성 연구가 계속 중요해야 하는 장기 저장에 사용하세요.
mir-prototype-productivity-cap-percent-2500=매개변수가 아닌 레시피 생산성 상한을 +2500%로 설정합니다. 매우 긴 저장에 사용합니다.
mir-prototype-productivity-cap-percent-5000=매개변수가 아닌 레시피 생산성 상한을 +5000%로 설정합니다.
mir-prototype-productivity-cap-percent-10000=매개변수가 아닌 레시피 생산성 상한을 +10000%로 설정합니다. 극단적인 장기 확장에만 사용하십시오.
mir-prototype-productivity-cap-percent-25000=매개변수가 아닌 레시피 생산성 상한을 +25000%로 설정합니다. 극단적인 장기 확장에만 사용하십시오.
mir-prototype-productivity-cap-percent-100000=매개변수가 아닌 레시피 생산성 상한을 +100000%로 설정합니다. 이는 대부분의 저장에 대해 사실상 제한이 없습니다.
mir-recycling-return-chance-engine-default=모든 재활용 방법을 변경하지 않고 그대로 두세요.
mir-recycling-return-chance-match-productivity-cap=숨겨진 생성된 재활용 레시피에 대한 악용 방지 자동 감소입니다. 1 / (1 + 생산성 보너스)를 사용하고 최대 수익률은 일반 25%로 제한됩니다. +400%는 20%가 되고 +1000%는 약 9.09%가 됩니다.
mir-recycling-return-chance-percent-25=숨겨진 생성된 재활용 레시피를 일반 25% 재료 반환으로 유지하세요.
mir-recycling-return-chance-percent-20=숨겨진 생성 재활용 레시피를 20% 재료 반환으로 확장합니다.
mir-recycling-return-chance-percent-15=숨겨진 생성 재활용 레시피를 15% 재료 회수율로 확장합니다.
mir-recycling-return-chance-percent-12-5=숨겨진 생성 재활용 레시피를 12.5%의 재료 회수율로 확장합니다.
mir-recycling-return-chance-percent-10=숨겨진 생성 재활용 레시피를 10% 재료 반환으로 확장합니다.
mir-recycling-return-chance-percent-7-5=숨겨진 생성 재활용 레시피를 7.5% 재료 회수율로 확장합니다.
mir-recycling-return-chance-percent-5=숨겨진 생성 재활용 레시피를 5% 재료 반환으로 확장합니다.
mir-recycling-return-chance-percent-2-5=숨겨진 생성 재활용 레시피를 2.5% 재료 회수율로 확장합니다.
mir-recycling-return-chance-percent-1=숨겨진 생성 재활용 레시피를 1% 재료 반환으로 확장합니다.
mir-recycling-return-chance-percent-0-5=숨겨진 생성 재활용 레시피를 0.5% 재료 회수율로 확장합니다.
mir-recycling-return-chance-percent-0-1=숨겨진 생성 재활용 레시피를 0.1% 재료 회수율로 확장합니다.
mir-prototype-efficiency-cap-engine-default=각 기계의 에너지 사용 효과 제한은 그대로 두십시오. 사용자 정의 제한이 없는 기계는 Factorio의 일반적인 -80% 에너지 사용 효과 한도를 사용하므로 효과는 활성 사용을 20% 미만으로 줄일 수 없습니다.
mir-prototype-efficiency-cap-saving-25=에너지 사용 한도를 -25%로 설정합니다. 활성 에너지 사용은 에너지 사용 효과 후에도 75% 이상으로 유지됩니다.
mir-prototype-efficiency-cap-saving-50=에너지 사용 한도를 -50%로 작성합니다. 활성 에너지 사용은 지원되는 기계에 에너지 사용 효과가 적용된 후에도 50% 이상으로 유지됩니다.
mir-prototype-efficiency-cap-saving-75=에너지 사용 한도를 -75%로 설정합니다. 활성 에너지 사용은 지원되는 기계에 에너지 사용 효과가 발생한 후에도 25% 이상으로 유지됩니다.
mir-prototype-efficiency-cap-saving-90=에너지 사용 한도를 -90%로 작성합니다. 활성 에너지 사용은 10%로 떨어질 수 있으며 이는 정상적인 20% 미만입니다.
mir-prototype-efficiency-cap-saving-95=에너지 사용 한도를 -95%로 작성합니다. 활동적인 에너지 사용은 5%까지 떨어질 수 있습니다.
mir-prototype-efficiency-cap-saving-99=에너지 사용 한도를 -99%로 작성합니다. 활동적인 에너지 사용은 1%까지 떨어질 수 있습니다.
mir-prototype-efficiency-cap-saving-999=-99.9% 에너지 사용 상한을 작성합니다. 활성 에너지 사용은 0.1%까지 떨어질 수 있습니다.
mir-prototype-efficiency-cap-saving-9999=-99.99% 에너지 사용 상한을 작성합니다. 이는 제로 전력 프로토타입 재작성이 아니라 거의 제로에 가까운 활성 에너지 사용입니다.
mir-prototype-pollution-cap-engine-default=각 기계의 오염 영향 한계는 그대로 두십시오. 사용자 지정 제한이 없는 기계는 Factorio의 일반 -80% 오염 영향 제한을 사용합니다.
mir-prototype-pollution-cap-saving-25=-25% 오염 상한선을 작성합니다. 오염 효과 후에도 오염은 75% 이상으로 유지됩니다.
mir-prototype-pollution-cap-saving-50=오염 한도를 -50%로 작성합니다. 지원되는 기계에 오염 효과가 발생한 후에도 오염은 50% 이상으로 유지됩니다.
mir-prototype-pollution-cap-saving-75=오염 한도를 -75%로 작성합니다. 지원되는 기계에 오염 효과가 발생한 후에도 오염은 25% 이상으로 유지됩니다.
mir-prototype-pollution-cap-saving-90=오염 한도를 -90%로 작성합니다. 오염도는 10%까지 떨어질 수 있는데, 이는 정상적인 20% 최저치보다 낮습니다.
mir-prototype-pollution-cap-saving-95=-95% 오염 상한선을 작성합니다. 오염도는 5%까지 떨어질 수 있습니다.
mir-prototype-pollution-cap-saving-99=-99% 오염 한도를 작성합니다. 오염도는 1%까지 떨어질 수 있습니다.
mir-prototype-pollution-cap-saving-999=-99.9% 오염 한도를 작성합니다. 오염도는 0.1%까지 떨어질 수 있습니다.
mir-prototype-pollution-cap-saving-9999=-99.99% 오염 한도를 작성합니다. 이는 런타임 오염 스크립트가 아니라 거의 제로 오염입니다.
mir-prototype-speed-floor-engine-default=각 기계의 음수 속도 제한은 그대로 둡니다. 사용자 지정 제한이 없는 기계는 Factorio의 일반 -80% 바닥을 사용하고 최소 20% 속도를 유지합니다.
mir-prototype-speed-floor-saving-25=속도의 음수 효과를 -25%로 제한하고 속도를 최소 75%로 유지합니다.
mir-prototype-speed-floor-saving-50=음의 속도 효과를 -50%로 제한하고 속도를 최소 50%로 남겨둡니다.
mir-prototype-speed-floor-saving-75=음의 속도 효과를 -75%로 제한하고 속도를 최소 25%로 남겨둡니다.
mir-prototype-speed-floor-saving-90=속도 감소 효과를 -90%까지 허용하고 최소 10%의 속도는 남겨둡니다.
mir-prototype-speed-floor-saving-95=속도 감소 효과를 -95%까지 허용하고 최소 5%의 속도는 남겨둡니다.
mir-prototype-speed-floor-saving-99=속도 감소 효과를 -99%까지 허용하고 최소 1%의 속도는 남겨둡니다.
mir-prototype-speed-floor-saving-999=속도 감소 효과를 -99.9%까지 허용하고 속도는 최소 0.1% 남겨둡니다.
mir-prototype-speed-floor-saving-9999=Factorio 프로토타입 최저 한계인 -99.99%까지 음의 속도 효과를 허용합니다. 이는 0이나 음의 제작 속도가 아닌 거의 정지에 가까운 속도입니다.
mir-prototype-speed-cap-engine-default=각 기계의 속도 제한은 그대로 두십시오. 사용자 지정 제한이 없는 기계는 Factorio의 매우 높은 +100000% 속도 효과 한도를 사용합니다.
