[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Udfører ingen automatisk opdagelse, vedhæftning eller oprettelse. MIRs faste forskning forbliver uændret.
mir-automatic-productivity-action-preview=Opdager og klassificerer kandidater og skriver derefter accepterede og overspringede beslutninger til Factorio-loggen. Den vedlægger ikke opskrifter eller skaber forskning.
mir-automatic-productivity-action-apply=Standard. Opdager kandidater og knytter kun sikkerhedsafprøvede opskrifter til kompatibel eksisterende MIR-forskning. Det skaber ikke forskning i sig selv; de to afkrydsningsfelter nedenfor styrer oprettelsen.
mir-automatic-compiler-mode-off=Ældre svarende til deaktiveret.
mir-automatic-compiler-mode-report=Ældre svarende til forhåndsvisningsændringer.
mir-automatic-compiler-mode-safe-attach=Ældre svarende til Anvend sikre ændringer med forskningsoprettelse deaktiveret.
mir-automatic-compiler-mode-exact-pack=Ældre svarende til Anvend sikre ændringer med forskningsoprettelse aktiveret og gennemgåede kompatibilitetsdata påkrævet.
mir-automatic-compiler-mode-safe-generate=Ældre svarende til Anvend sikre ændringer med forskningsoprettelse aktiveret for registrerede eksperimentelle udbydere.
mir-adjust-vanilla-weapon-speed-techs-off=Deaktiver MIR's valgfri overlappende raket/kanon bonusoprydning.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Fjern kun MIR's overlappende raket-/kanonbonusser, når en aktiveret, tilgængelig uendelig teknologi giver den nøjagtige erstatningseffekt.
mir-adjust-vanilla-weapon-speed-techs-always=Fjern altid MIR's overlappende raket/kanon bonusser. Brug kun, hvis du ønsker streng adskillelse.
mir-science-pack-ingredient-policy-configured=Brug hver genereret teknologis konfigurerede videnskabspakker uden valgfri ingrediensudvidelse. MIR standard.
mir-science-pack-ingredient-policy-space=Tilføj rumvidenskab, når det er tilgængeligt. En simpel post-raket sværhedsgrad stigning.
mir-science-pack-ingredient-policy-space-and-promethium=Tilføj plads og promethiumvidenskab, når det er tilgængeligt. Bedst til forskning i meget sen rumalder.
mir-science-pack-ingredient-policy-space-age-progression=Tilføj kun rumalderens progressionspakker, der er impliceret af de valgte pakker. Tilføjer ikke urelaterede modderede pakker.
mir-science-pack-ingredient-policy-official-progression=Tilføj manglende officielle pakker i form af forudsætninger, som antydes af den mest avancerede officielle pakke, der allerede er valgt.
mir-science-pack-ingredient-policy-mod-progression=Tilføj manglende lab-kompatible pakker udledt af modificeret science-pack-progression, og lås op for forudsætninger.
mir-science-pack-ingredient-policy-all-official=Brug alle officielle base- og rumaldervidenskabspakker, der findes i det aktuelle modsæt.
mir-science-pack-ingredient-policy-all=Brug alle aktive lab-kompatible videnskabspakker, inklusive modderede videnskabspakker.
mir-lab-incompatibility-policy-reduce=Behold teknologien ved at reducere dens videnskabspakker til det største sæt, der accepteres af et aktivt laboratorium. Den sikreste standard for mod-pakker.
mir-lab-incompatibility-policy-skip=Spring over teknologien, hvis intet aktivt laboratorium kan forske i dets udvalgte videnskabspakkesæt. Strengere og nemmere at revidere.
mir-lab-incompatibility-policy-engine-default=Omskriv aldrig det valgte videnskabspakkesæt. MIR bevarer et sikkert researchbart sæt uændret og udelader den genererede teknologi, når Factorio ikke kan forske i det nøjagtige sæt.
mir-prototype-productivity-cap-engine-default=Lad hver opskrifts eksisterende produktivitetsloft stå. Opskrifter uden et brugerdefineret loft bruger Factorios normale produktivitetsbonusgrænse på +300 %.
mir-prototype-productivity-cap-percent-25=Indstil ikke-parameter opskrifts produktivitetsgrænser til +25%. Dette er en streng tidlig cap.
mir-prototype-productivity-cap-percent-50=Indstil ikke-parameter opskrifts produktivitetsgrænser til +50 %. Dette er under det normale loft og gør, at produktivitetsforskning stopper med at hjælpe hurtigere.
mir-prototype-productivity-cap-percent-75=Indstil ikke-parameter opskrifts produktivitetsgrænser til +75%. Dette er under det normale loft og gør, at produktivitetsforskning stopper med at hjælpe hurtigere.
mir-prototype-productivity-cap-percent-100=Indstil ikke-parameter opskrifts produktivitetsgrænser til +100 %. Dette er under det normale loft og gør, at produktivitetsforskning stopper med at hjælpe hurtigere.
mir-prototype-productivity-cap-percent-125=Indstil ikke-parameter opskrifts produktivitetsgrænser til +125%.
mir-prototype-productivity-cap-percent-150=Indstil ikke-parameter opskrifts produktivitetsgrænser til +150 %.
mir-prototype-productivity-cap-percent-200=Indstil ikke-parameter opskrifts produktivitetsgrænser til +200 %. Dette er under det normale loft og gør, at produktivitetsforskning stopper med at hjælpe hurtigere.
mir-prototype-productivity-cap-percent-250=Indstil ikke-parameter opskrifts produktivitetsgrænser til +250 %. Dette er lidt under det normale loft.
mir-prototype-productivity-cap-percent-400=Indstil ikke-parameter opskrifts produktivitetsgrænser til +400%. Dette udvider produktivitetsskaleringen ud over det normale loft.
mir-prototype-productivity-cap-percent-500=Indstil ikke-parameter opskrifts produktivitetsgrænser til +500 %. Dette udvider produktivitetsskaleringen ud over det normale loft.
mir-prototype-productivity-cap-percent-750=Indstil ikke-parameter opskrifts produktivitetsgrænser til +750 %.
mir-prototype-productivity-cap-percent-1000=Indstil ikke-parameter opskrifts produktivitetsgrænser til +1000%. Bruges til lange besparelser, hvor produktivitetsforskning skulle blive ved med at have betydning.
mir-prototype-productivity-cap-percent-2500=Indstil ikke-parameter opskrifts produktivitetsgrænser til +2500%. Bruges til meget lange gemmer.
mir-prototype-productivity-cap-percent-5000=Indstil ikke-parameter opskrifts produktivitetsgrænser til +5000%.
mir-prototype-productivity-cap-percent-10000=Indstil ikke-parameter opskrifts produktivitetsgrænser til +10000%. Brug kun til ekstrem langtidsskalering.
mir-prototype-productivity-cap-percent-25000=Indstil ikke-parameter opskrifts produktivitetsgrænser til +25000%. Brug kun til ekstrem langtidsskalering.
mir-prototype-productivity-cap-percent-100000=Indstil ikke-parameter opskrifts produktivitetsgrænser til +100000%. Dette er effektivt ubegrænset for de fleste redninger.
mir-recycling-return-chance-engine-default=Lad enhver genbrugsopskrift være uændret.
mir-recycling-return-chance-match-productivity-cap=Udnyttelsessikker automatisk reduktion til skjulte genererede genbrugsopskrifter. Bruger 1 / (1 + produktivitetsbonus), begrænset til det normale afkast på 25 %: +400 % bliver 20 %, og +1000 % bliver omkring 9,09 %.
mir-recycling-return-chance-percent-25=Opbevar skjulte genererede genbrugsopskrifter ved den normale 25% materiale retur.
mir-recycling-return-chance-percent-20=Skaler skjulte genererede genbrugsopskrifter til 20 % materialeafkast.
mir-recycling-return-chance-percent-15=Skaler skjulte genererede genbrugsopskrifter til 15 % materialeafkast.
mir-recycling-return-chance-percent-12-5=Skaler skjulte genererede genbrugsopskrifter til et materialeafkast på 12,5 %.
mir-recycling-return-chance-percent-10=Skaler skjulte genererede genbrugsopskrifter til 10 % materialeafkast.
mir-recycling-return-chance-percent-7-5=Skaler skjulte genererede genbrugsopskrifter til et materialeafkast på 7,5 %.
mir-recycling-return-chance-percent-5=Skaler skjulte genererede genbrugsopskrifter til et materialeafkast på 5 %.
mir-recycling-return-chance-percent-2-5=Skaler skjulte genererede genbrugsopskrifter til et materialeafkast på 2,5 %.
mir-recycling-return-chance-percent-1=Skaler skjulte genererede genbrugsopskrifter til et materialeafkast på 1 %.
mir-recycling-return-chance-percent-0-5=Skaler skjulte genererede genbrugsopskrifter til et materialeafkast på 0,5 %.
mir-recycling-return-chance-percent-0-1=Skaler skjulte genererede genbrugsopskrifter til et materialeafkast på 0,1 %.
mir-prototype-efficiency-cap-engine-default=Lad hver maskines effektgrænse for energiforbrug være. Maskiner uden en brugerdefineret begrænsning bruger Factorios normale -80% energiforbrug effekt cap, så effekter kan ikke reducere aktiv brug under 20%.
mir-prototype-efficiency-cap-saving-25=Skriv en -25% energiforbrugshætte. Aktivt energiforbrug forbliver på 75 % eller mere efter energiforbrugseffekter.
mir-prototype-efficiency-cap-saving-50=Skriv en -50% energiforbrugshætte. Aktivt energiforbrug forbliver på 50 % eller mere efter energiforbrugseffekter på understøttede maskiner.
mir-prototype-efficiency-cap-saving-75=Skriv en -75 % energiforbrugshætte. Aktivt energiforbrug forbliver på 25 % eller mere efter energiforbrugseffekter på understøttede maskiner.
mir-prototype-efficiency-cap-saving-90=Skriv en -90% energiforbrugshætte. Aktivt energiforbrug kan falde til 10 %, hvilket er under den normale 20 % bund.
mir-prototype-efficiency-cap-saving-95=Skriv en -95 % energiforbrugshætte. Aktivt energiforbrug kan falde til 5 %.
mir-prototype-efficiency-cap-saving-99=Skriv en -99% energiforbrugshætte. Aktivt energiforbrug kan falde til 1 %.
mir-prototype-efficiency-cap-saving-999=Skriv et -99,9% energiforbrugsloft. Aktivt energiforbrug kan falde til 0,1 %.
mir-prototype-efficiency-cap-saving-9999=Skriv et -99,99 % energiforbrugsloft. Dette er næsten nul aktivt energiforbrug, ikke en nul-power prototype omskrivning.
mir-prototype-pollution-cap-engine-default=Lad hver maskines grænse for forureningseffekt være i fred. Maskiner uden en brugerdefineret grænse bruger Factorios normale -80% forureningseffekt cap.
mir-prototype-pollution-cap-saving-25=Skriv en -25 % forureningsgrænse. Forureningen forbliver på 75 % eller mere efter forureningseffekter.
mir-prototype-pollution-cap-saving-50=Skriv et -50 % forureningsloft. Forureningen forbliver på 50 % eller mere efter forureningspåvirkninger på understøttede maskiner.
mir-prototype-pollution-cap-saving-75=Skriv en -75 % forureningsgrænse. Forureningen forbliver på 25 % eller mere efter forureningseffekter på understøttede maskiner.
mir-prototype-pollution-cap-saving-90=Skriv en -90 % forureningsgrænse. Forureningen kan falde til 10 %, hvilket er under den normale 20 % bund.
mir-prototype-pollution-cap-saving-95=Skriv et -95 % forureningsloft. Forureningen kan falde til 5 %.
mir-prototype-pollution-cap-saving-99=Skriv et -99% forureningsloft. Forureningen kan falde til 1 %.
mir-prototype-pollution-cap-saving-999=Skriv en -99,9% forureningsgrænse. Forureningen kan falde til 0,1 %.
mir-prototype-pollution-cap-saving-9999=Skriv en -99,99 % forureningsgrænse. Dette er næsten nul forurening, ikke et runtime forureningsscript.
mir-prototype-speed-floor-engine-default=Lad hver maskines negative hastighedsgrænse være i fred. Maskiner uden en brugerdefineret grænse bruger Factorios normale -80% gulv og holder mindst 20% hastighed.
mir-prototype-speed-floor-saving-25=Fastspænd negative hastighedseffekter ved -25 %, så der er mindst 75 % hastighed.
mir-prototype-speed-floor-saving-50=Fastspænd negative hastighedseffekter ved -50 %, så der er mindst 50 % hastighed.
mir-prototype-speed-floor-saving-75=Fastspænd negative hastighedseffekter ved -75 %, så der er mindst 25 % hastighed.
mir-prototype-speed-floor-saving-90=Tillad negative hastighedseffekter ned til -90 %, hvilket efterlader mindst 10 % hastighed.
mir-prototype-speed-floor-saving-95=Tillad negative hastighedseffekter ned til -95 %, hvilket efterlader mindst 5 % hastighed.
mir-prototype-speed-floor-saving-99=Tillad negative hastighedseffekter ned til -99%, hvilket efterlader mindst 1% hastighed.
mir-prototype-speed-floor-saving-999=Tillad negative hastighedseffekter ned til -99,9 %, hvilket efterlader mindst 0,1 % hastighed.
mir-prototype-speed-floor-saving-9999=Tillad negative hastighedseffekter ned til -99,99%, den laveste Factorio-prototypegrænse. Dette er et næsten stop, ikke nul eller negativ håndværkshastighed.
mir-prototype-speed-cap-engine-default=Lad hver maskines hastighedsgrænse være i fred. Maskiner uden en brugerdefineret grænse bruger Factorios meget høje +100000% hastighedseffektloft.
mir-prototype-speed-cap-bonus-25=Fastspænd positive hastighedseffekter ved +25%.
mir-prototype-speed-cap-bonus-50=Fastspænd positive hastighedseffekter ved +50%. Brug dette til at holde hastighedsbonusser tæt afgrænsede.
mir-prototype-speed-cap-bonus-75=Fastspænd positive hastighedseffekter ved +75%.
mir-prototype-speed-cap-bonus-100=Fastspænd positive hastighedseffekter ved +100%.
mir-prototype-speed-cap-bonus-125=Fastspænd positive hastighedseffekter ved +125%.
mir-prototype-speed-cap-bonus-150=Fastspænd positive hastighedseffekter ved +150%.
mir-prototype-speed-cap-bonus-200=Fastspænd positive hastighedseffekter ved +200%.
mir-prototype-speed-cap-bonus-250=Fastspænd positive hastighedseffekter ved +250%.
mir-prototype-speed-cap-bonus-300=Fastspænd positive hastighedseffekter ved +300%.
mir-prototype-speed-cap-bonus-400=Fastspænd positive hastighedseffekter ved +400%.
mir-prototype-speed-cap-bonus-500=Fastspænd positive hastighedseffekter ved +500%.
mir-prototype-speed-cap-bonus-750=Fastspænd positive hastighedseffekter ved +750%.
mir-prototype-speed-cap-bonus-1000=Fastspænd positive hastighedseffekter ved +1000%.
mir-prototype-speed-cap-bonus-2500=Fastspænd positive hastighedseffekter ved +2500%.
mir-prototype-speed-cap-bonus-5000=Fastspænd positive hastighedseffekter ved +5000%.
mir-prototype-speed-cap-bonus-10000=Fastspænd positive hastighedseffekter ved +10000%.
mir-prototype-speed-cap-bonus-25000=Fastspænd positive hastighedseffekter ved +25000%.
mir-prototype-speed-cap-bonus-100000=Skriv Factorios maksimale hastighedseffekt-loft eksplicit. I modsætning til uændret overskriver dette tilpassede nedre grænser.
mir-prototype-quality-cap-engine-default=Lad hver maskines kvalitets-effektgrænse være. Maskiner uden en brugerdefineret grænse bruger Factorios meget høje +100000% kvalitetseffektloft.
mir-prototype-quality-cap-bonus-50=Fastspænd positive kvalitetseffekter ved +50%. Dette begrænser maskinkvalitetsbonuseffekter, ikke kvalitetsniveauer eller genstandssandsynlighedsformler.
mir-prototype-quality-cap-bonus-25=Fastspænd positive kvalitetseffekter ved +25%. Dette ændrer ikke kvalitetsniveauer eller varesandsynlighedsformler.
mir-prototype-quality-cap-bonus-75=Fastspænd positive kvalitetseffekter ved +75%. Dette ændrer ikke kvalitetsniveauer eller varesandsynlighedsformler.
