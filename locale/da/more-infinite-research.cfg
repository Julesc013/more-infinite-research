[mod-setting-description]
ips-require-space-gate=Når de er aktiveret, forbliver disse teknologier låste, indtil rumvidenskab er forsket i vanilje, eller promethium-videnskab forskes i rumalderen.
mir-science-pack-ingredient-policy=Vælger, hvordan MIR tilføjer videnskabspakker til genererede teknologier. Valgmulighederne er sorteret fra konservative til brede: standardpakker, sent spilpakker, progressionsbaserede pakker og derefter alle tilgængelige pakker.
mir-automatic-productivity-action=Vælger, hvad MIR gør med sikre produktivitetsmuligheder, der findes i opskrifter med installeret mod. Deaktiveret udfører ingen automatisk registrering. Se forhåndsvisning af ændringer, der er accepteret og oversprungne kandidater i Factorio-loggen uden at ændre forskning. Anvend sikre ændringer (standard) tilføjer kun kvalificerede opskrifter til kompatibel eksisterende MIR-forskning. Dette styrer handling, ikke styrke eller modenhed; afkrydsningsfelterne for oprettelse nedenfor er separate. Ejerskab, genbrug, sandsynlighed, katalysator, videnskab, laboratorie-, forudsætnings-, mål-, identitets-, progressions- og cyklustjek gælder altid.
mir-automatic-create-research=Standard: slukket. Off limits Anvend sikre ændringer til kompatibel eksisterende MIR-forskning; kandidater uden en passende strøm springes over og rapporteres. Til giver en kvalificeret registreret udbyder mulighed for at skabe én stabil generisk uendelig produktivitetsteknologi, når ingen eksisterende forskning passer. Afkrydsningsfeltet for gennemgåede data nedenfor afgør, om eksperimentelle udbydere er kvalificerede. MIR skaber aldrig én teknologi pr. mod eller opskrift, og enhver hård sikkerhed, videnskab, ejerskab, identitet, progression og cykelport gælder stadig.
mir-automatic-require-reviewed-data=Standard: tændt. Dette har kun betydning, når Tillad oprettelse af ny forskning er aktiveret; det blokerer aldrig for sikker tilknytning til eksisterende forskning. På tilladelser er det kun udbyderfamilier, der er markeret som gennemgået og understøttet af gældende eksakt versionsbevis, så eksperimentelle familier springes over. Off tillader registrerede eksperimentelle udbydere at skabe ud fra generiske strukturelle beviser. For den bredeste eksperimentelle adfærd skal du aktivere oprettelse af forskning og slå dette krav fra. Ingen værdi kan omgå en hård sikkerhedsport.
mir-automatic-compiler-mode=Skjult kompatibilitetsbro til profiler oprettet før de opdelte automatiske produktivitetskontroller. En ikke-standard ældre værdi overholdes kun, mens alle nye kontroller forbliver på deres standardværdier. Skift enhver ny kontrol for at tage eksplicit kontrol.
ips-enable-stream=Skaber den genererede uendelige teknologi til __1__, når dens opskrifter, effekter, forudsætninger og videnskabspakker er tilgængelige. Deaktiver dette for at forhindre MIR i at generere denne teknologi.
ips-cost-base-stream=Forskningsenheder påkrævet til det første genererede niveau af __1__. Skal være mindst 1. Senere niveauer beregnes ud fra denne værdi og omkostningsvækstfaktoren.
ips-cost-growth-stream=Multiplikator anvendt på hvert senere niveau af __1__. Brug 1 til faste omkostninger, 1,5 til 50 % vækst pr. niveau eller 2 for at fordoble omkostningerne.
ips-max-level-stream=Højeste genererede niveau for __1__. Indstil til 0 for uendelige niveauer.
ips-research-time-stream=Sekunder pr. forskningsenhed for __1__. Indstil til 0 for at bruge MIR's standard for denne teknologi. Dette er ikke samlet forskningstid; Samlet tid afhænger også af forskningsomkostninger, laboratorieantal, laboratoriehastighed og moduler.
mir-enable-base-tech=Tillader __1__ at fortsætte forbi sin vaniljehætte som en uendelig teknologi. Deaktiver dette, hvis du vil have MIR til at tilføje nye forskningslinjer uden at forlænge denne vaniljekæde.
mir-cost-base=Forskningsenheder påkrævet til det første MIR-fortsættelsesniveau af __1__. Indstil til 0 for at arve vaniljekædens omkostningsmønster, når det er muligt.
mir-cost-growth=Multiplikator anvendt på hvert senere MIR-fortsættelsesniveau af __1__. Indstil til 0 for at arve vaniljekædens vækstmønster, når det er muligt.
mir-max-level=Højeste MIR-fortsættelsesniveau for __1__. Indstil til 0 for uendelige niveauer.
mir-research-time=Sekunder pr. forskningsenhed for MIR-fortsættelsen af ​​__1__. Indstil til 0 for at arve vaniljekædens forskningsenhedstid, når det er muligt.
mir-prefer-this-mod-for-competing-techs=Når den er aktiveret, fjerner denne mod udvalgte konkurrerende uendelige udvidelser og bruger sine egne versioner. Deaktiver for at beholde konkurrerende versioner fra andre mods.
mir-adjust-vanilla-weapon-speed-techs=Kontrollerer, om MIR fjerner raket- og kanonskalhastighedsbonusser fra dens genererede våbenskydehastighedsfortsættelse, når nøjagtig uendelig erstatningsdækning er tilgængelig. Finite vanilje våbenskydehastighedsteknologier beholder deres originale bonusser.
mir-use-installed-space-age-icons=Når det er aktiveret, kan MIR referere til installerede officielle DLC-ikonfiler, inklusive Space Age og Elevated Rails, selv når disse mods er deaktiveret til et basisspil. Lad dette være slået fra, hvis disse DLC-filer ikke er installeret; Factorio kan ikke komme sig elegant fra manglende ikonfiler under indlæsning af prototype.
mir-pipeline-extent-multiplier=Dropdown-multiplikator kun for opstart for anerkendte felter for udstrækning af væskeboksrørledninger på tværs af prototyper, ikke kun rørenheder. 100 % efterlader prototyper uændrede og belaster ikke rørledningspassagen eller scanner væskebokse. Ikke-100 % værdier er eksperimentelle og kan påvirke maskiner, tanke, thrustere og modderede prototyper, der definerer væskebokse.
mir-unrestricted-modules=Eksperimentel og balanceforbrydende. Når den er aktiveret, accepterer hver eksisterende recept alle fem moduleffekter, og hver eksisterende modulmodtager med slots accepterer hver opdaget modulkategori. Dette tilføjer ikke modulslots eller ændrer modulprototyper og muliggør muligvis produktivitet, kvalitet og modderede modulløkker.
mir-prototype-productivity-cap=Vælger, om MIR efterlader opskriftsproduktivitetslofter alene eller skriver et startloft til hver ikke-parameter, ikke-genbrugsopskrift. +300 % (uændret) bevarer eksisterende opskriftshætter; lavere værdier forkorter produktivitetsskalering, mens højere værdier forlænger den.
mir-recycling-return-chance=Styrer kun skjulte genererede genbrugsopskrifter. Automatisk tilstand reducerer den normale 25 % materialeretur til højst 1 divideret med den samlede outputmultiplikator ved det valgte produktivitetsloft. Faste valg skalerer de samme genererede afkast direkte. Synlige processer og opskriftsproduktivitetslofter ændres aldrig.
mir-productivity-cap-self-recycling-only=Over 1 / genbrugsretur - 1 er det kun produktionsopskrifter med en dokumenteret ikke-generativ selvgenanvendelsesvej, der modtager det valgte højere loft. Ved eller under denne tærskel har dette afkrydsningsfelt ingen effekt. Motor uændret bruger det normale 25 % afkast som en konservativ +300 % tærskel uden at ændre genbrugsopskrifter.
mir-prototype-efficiency-cap=Vælger, hvor langt effektivitetseffekter kan reducere det aktive maskinenergiforbrug. -80 % (uændret) lader eksisterende energiforbrugsgrænser stå. Dybere reduktioner kan nærme sig nul aktivt energiforbrug uden at ændre forureningsgrænserne.
mir-prototype-pollution-cap=Vælger, hvor langt forureningsreduktionseffekter kan reducere maskinforurening. -80 % (uændret) lader eksisterende forureningsgrænser stå. Dybere reduktioner kan nærme sig nul forurening uden at ændre energiforbruget.
mir-prototype-speed-floor=Vælger, hvor meget negative hastighedseffekter kan bremse understøttede maskiner. -80 % (uændret) lader eksisterende grænser være alene; dybere værdier fjerner det normale gulv ned til et næsten stop ved -99,99 %.
mir-prototype-speed-cap=Vælger, om MIR lader maskinens hastighedseffektgrænser være alene eller skriver en ny positiv hastighedsgrænse. +100000% (uændret) bevarer eksisterende grænser; lavere værdier bevidst klemme meget store hastighed bonusser.
mir-prototype-quality-cap=Vælger, om MIR lader maskinens kvalitetseffektgrænser alene eller skriver en ny positiv kvalitetsloft. +100000% (uændret) bevarer eksisterende grænser og ændrer ikke kvalitetsniveauer eller varesandsynlighedsformler.
mir-prototype-positive-power-floor=Deaktiveret som standard. Når det er aktiveret, ændrer MIR eksplicitte 0W aktive energiforbrugsprototyper til 1W under prototypeindlæsning, så advarselsikoner for lavt strømforbrug ikke vises på enheder, der skal trække en lille mængde, som ikke er nul. Lad være med at bevare nul-power prototyper nøjagtigt.
mir-settings-profile-import=Indsæt en MIR-indstillingsprofilstreng her for at anvende eksporterede opstartsindstillingsværdier som et tilsidesættelseslag under prototypegenerering. Lad tom for normale indstillinger. Eksporter med /mir-settings-export fra en aktiv lagring, og genstart derefter efter at have ændret denne værdi.
mir-debug-generation-report=Når aktiveret, skriver en struktureret logrække pr. genereret eller sprunget stream og basisudvidelse, inklusive videnskabspakker, forudsætninger, effektantal, laboratoriekompatibilitetsstatus og ikonkilde.
mir-debug-recipe-matches=Når det er aktiveret, skriver matchende opskriftsnavne for hver genereret produktivitetsstrøm. Dette kan være støjende i store mod-pakker.
mir-debug-scripted-effects=Når aktiveret, skriver runtime-logposter, når scriptteknologier genberegner globale eller hændelsesdrevne effekter.
mir-lab-incompatibility-policy=Vælger, hvad MIR gør, når de valgte videnskabspakker ikke kan undersøges af noget aktivt laboratorium.
ips-effect-per-level-stream=Indstiller den primære base-tier-effekt pr. niveau for __1__. Relaterede senere niveauer og effekter skaleres proportionalt. Procentuelle effekter bruger procentpoint; tælle- og afstandseffekter bruger deres oprindelige enheder.
mir-effect-per-level=Indstiller den kanoniske effekt pr. niveau for den uendelige __1__ fortsættelse. Beslægtede effekter skaleres proportionalt fra den endelige vaniljebasislinje. Procentuelle effekter bruger procentpoint; tælle- og afstandseffekter bruger deres oprindelige enheder.
mir-note-experimental-spoilage=Eksperimentel og deaktiveret som standard i v2.1.0. Dette er en global/kortdækkende scriptet effekt. Eksisterende spoilable-stack-adfærd gøres ikke krav på, før den er manuelt valideret.
mir-note-agriculture-growth=Gælder for nyplantede landbrugstårnafgrøder. Eksisterende plantede afgrøder omskaleres ikke.
mir-note-cargo-pad-count=Speciel logistikforskning i rumalderen. Øger lastlandingspladser pr. overflade og kan ændre logistikbalancen væsentligt.
mir-note-inserter-capacity=Deaktiveret som standard. Ekstra indsatskapacitet kan bryde kredsløbskontrollerede indsatse og reducere motoroptimeringer.
mir-note-native-owner-managed-stream=Hvis en installeret uendelig teknologi allerede ejer denne forskningsfamilie, konfigurerer de samme opstartsindstillinger denne ejer i stedet for at oprette en dublet. Uændrede MIR-standarder bevarer ejerens endelige prototype nøjagtigt. Eksplicitte tilsidesættelser af omkostninger, tid, maksimumniveau og effekt gælder kun efter en sikker ejermatch; deaktivering af strømmen efterlader den eksterne teknologi urørt. Genstart Factorio efter ændring af opstartsindstillinger. Et maksimalt niveau på 0 betyder uendeligt, og effektværdier er procentpoint pr. niveau.

