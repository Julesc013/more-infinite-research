[technology-description]
more-infinite-research.recipe_productivity=Øger opskriftsproduktiviteten for de valgte opskrifter. Factorios maksimale produktivitetsloft gælder stadig; yderligere uendelige niveauer har muligvis ingen praktisk effekt, når først en opskrift når sit loft.
more-infinite-research.direct_effect=Tilføjer en uendelig gentagelig bonus. Science packs er udvalgt fra aktive laboratorier, så teknologien forbliver researchbar med kompatible modsæt.
more-infinite-research.cargo_bay_unloading_distance=Øger den maksimale afstand mellem en lastlandingsplads og tilsluttede lossepladser.
more-infinite-research.cargo_landing_pad_count=Øger antallet af lastlandingspuder, hver kraft kan bygge pr. overflade.
more-infinite-research.flamethrower_shooting_speed=Øger skydehastigheden for flammekastervåben og flammekastertårne.
more-infinite-research.electric_shooting_speed=Øger skydehastigheden for elektriske våben. I vanilje påvirker dette udledningsforsvaret; med Space Age påvirker det også Tesla-våben, når tesla-ammunitionskategorien er tilgængelig.
more-infinite-research.spoilage_preservation=Øger den globale spildtidsmodifikator gennem en afgrænset script-effekt. Eksisterende spoilable genstande kan beholde deres nuværende spildeadlines, indtil de er testet i spillet.
more-infinite-research.agricultural_growth_speed=Forkorter den resterende væksttid for nyplantede landbrugstårnplanter gennem en afgrænset scripted effekt.
more-infinite-research.lab_productivity=Øger forskningsfremskridt opnået fra hver forbrugt videnskabspakke ved hjælp af den oprindelige laboratorieforskningsproduktivitetsmodifikator.

