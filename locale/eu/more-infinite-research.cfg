[technology-description]
more-infinite-research.recipe_productivity=Hautatutako errezetetarako errezeten produktibitatea handitzen du. Factorioren gehienezko produktibitate muga oraindik aplikatzen da; maila infinitu gehigarriek eragin praktikorik ez izatea baliteke errezeta bat bere karrera iristen denean.
more-infinite-research.direct_effect=Hobari errepikagarri infinitua gehitzen du. Zientzia-paketeak laborategi aktiboetatik hautatzen dira, teknologiak mod-multzo bateragarriekin ikertu ahal izateko.
more-infinite-research.cargo_bay_unloading_distance=Karga-lurreratze-plaza baten eta konektatutako deskarga-eremuen arteko gehienezko distantzia handitzen du.
more-infinite-research.cargo_landing_pad_count=Indar bakoitzak azalera bakoitzean eraiki ditzakeen zama-lurreratze-kopurua handitzen du.
more-infinite-research.flamethrower_shooting_speed=Tiro-abiadura handitzen du su-jaurtitzaileen armen eta su-jaurtitzaileen dorreetarako.
more-infinite-research.electric_shooting_speed=Arma elektrikoen tiro abiadura handitzen du. Banillan honek isurketaren defentsan eragiten du; Space Age-rekin Teslako armei ere eragiten die tesla munizio kategoria eskuragarri dagoenean.
more-infinite-research.spoilage_preservation=Hondakin-denboraren modifikatzaile globala areagotzen du script-efektu mugatuaren bidez. Lehendik dauden elementu hondagarriek egungo hondatze-epeak mantendu ditzakete jokoan probatu arte.
more-infinite-research.agricultural_growth_speed=Landatu berri diren nekazaritza-dorre-landareen geratzen den hazkuntza-denbora laburtzen du script-efektu mugatuaren bidez.
more-infinite-research.lab_productivity=Kontsumitutako zientzia-pakete bakoitzetik lortutako ikerketa-aurrerapena areagotzen du, laborategiko ikerketaren produktibitate-modalizatzaile natiboa erabiliz.

