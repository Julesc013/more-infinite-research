[mod-setting-description]
ips-require-space-gate=Gaituta dagoenean, teknologia hauek blokeatuta egoten dira espazio-zientzia bainillan ikertu arte edo prometio-zientzia Espazio Aroan ikertu arte.
mir-science-pack-ingredient-policy=MIR-k zientzia-paketeak sortzen dituen teknologietan nola gehitzen dituen aukeratzen du. Aukerak kontserbadoreetatik zabalera ordenatzen dira: pakete lehenetsiak, joko amaierako paketeak, progresioan oinarritutako paketeak, gero eskuragarri dauden pakete guztiak.
mir-automatic-productivity-action=MIR-ek zer egiten duen aukeratzen du instalatutako mod errezetetan aurkitzen diren produktibitate-aukera seguruekin. Desgaitutak ez du aurkikuntza automatikorik egiten. Aurreikusi Faktorioko erregistroan onartutako eta saltatu diren hautagaiak egindako aldaketen erregistroak ikerketa aldatu gabe. Aplikatu aldaketa seguruak (lehenetsia) lehendik dauden MIR ikerketa bateragarrietan soilik gehitzen ditu errezeta hautagarriak. Horrek ekintza kontrolatzen du, ez indarra edo heldutasuna; beheko sorrera-laukiak bereizita daude. Jabetza, birziklapena, probabilitatea, katalizatzailea, zientzia, laborategia, aurrebaldintza, helburua, identitatea, progresioa eta zikloaren egiaztapenak beti aplikatzen dira.
mir-automatic-create-research=Lehenetsia: desaktibatuta. Mugak kanpo Aplikatu aldaketa seguruak dauden MIR ikerketa bateragarrietan; korronte egokirik ez duten hautagaiak saltatu eta jakinarazi egiten dira. On-ek aukera ematen dio erregistratutako hornitzaile egoki bati produktibitate infinituko teknologia generiko egonkor bat sortzeko lehendik dagoen ikerketarik egokitzen ez denean. Beheko berrikusitako datuen kontrol-laukian hornitzaile esperimentalak egokiak diren erabakitzen da. MIR-k ez du inoiz teknologia bat sortzen mod edo errezeta bakoitzeko, eta segurtasun, zientzia, jabetza, identitate, progresio eta ziklo-ate gogor guztiak aplikatzen dira oraindik.
mir-automatic-require-reviewed-data=Lehenetsia: aktibatuta. Horrek axola du Baimendu ikerketa berriak sortzea aktibatuta dagoenean; ez du inoiz blokeatzen lehendik dagoen ikerketekiko atxikimendu segurua. Baimenetan, berrikusi eta bertsio zehatzeko froga aplikagarriak babesten dituzten hornitzaile-familiak soilik saltatzen dira. Off-ek hornitzaile esperimental erregistratuei ebidentzia estruktural generikoetatik sortzeko baimena ematen die. Jokabide esperimental zabalena lortzeko, gaitu ikerketak sortzea eta desaktibatu eskakizun hori. Inongo balioek ezin du segurtasun-ate gogor bat saihestu.
mir-automatic-compiler-mode=Ezkutuko bateragarritasun-zubia banatutako produktibitate automatikoaren kontrolak baino lehen sortutako profiletarako. Lehenetsia ez den ondare-balioa kontrol berri guztiak lehenespenetan mantentzen diren bitartean soilik errespetatzen da. Aldatu edozein kontrol berri kontrol esplizitua hartzeko.
ips-enable-stream=__1__-rako sortutako teknologia infinitua sortzen du bere errezetak, efektuak, aurrebaldintzak eta zientzia-paketeak eskuragarri daudenean. Desgaitu hau MIR-k teknologia hau sortzea saihesteko.
ips-cost-base-stream=__1__ sortutako lehen mailarako beharrezkoak diren ikerketa-unitateak. Gutxienez 1 izan behar du. Geroagoko mailak balio horretatik eta kostuen hazkunde-faktoretik kalkulatzen dira.
ips-cost-growth-stream=__1__ maila bakoitzean aplikatutako biderkatzailea. Erabili 1 kostu lauetarako, 1,5 maila bakoitzeko % 50eko hazkunderako edo 2 kostuak bikoizteko.
ips-max-level-stream=__1__-rako sortutako maila gorena. Ezarri 0 maila infinituetarako.
ips-research-time-stream=__1__ ikerketa-unitate bakoitzeko segundoak. Ezarri 0-n MIR-ren lehenetsia teknologia honetarako erabiltzeko. Hau ez da ikerketa-denbora osoa; denbora osoa ikerketa-kostuaren, laborategi kopuruaren, laborategiaren abiaduraren eta moduluen araberakoa da.
mir-enable-base-tech=__1__ bere bainila-txapelaren gainetik jarraitzeko aukera ematen dio teknologia infinitu gisa. Desgaitu hau MIR-ek ikerketa-lerro berriak gehitzea nahi baduzu, bainila-kate hau luzatu gabe.
mir-cost-base=__1__ lehen MIR jarraipen mailarako beharrezkoak diren ikerketa-unitateak. Ezarri 0-n, ahal denean bainila-katearen kostu-eredua heredatzeko.
mir-cost-growth=__1__ ondorengo MIR jarraipen maila bakoitzean aplikatutako biderkatzailea. Ezarri 0-n, ahal denean bainila-katearen hazkunde-eredua heredatzeko.
mir-max-level=MIR jarraipen maila altuena __1__. Ezarri 0 maila infinituetarako.
mir-research-time=__1__-ren MIR jarraitzeko ikerketa-unitate bakoitzeko segundoak. Ezarri 0-n, ahal denean bainila-katearen ikerketa-unitatearen denbora heredatzeko.
mir-prefer-this-mod-for-competing-techs=Gaituta dagoenean, mod honek aukeratutako luzapen infinitu lehiakideak kentzen ditu eta bere bertsioak erabiltzen ditu. Desgaitu beste mod batzuen bertsio lehiakideak mantentzeko.
mir-adjust-vanilla-weapon-speed-techs=MIR-k suziri eta kanoi-oskolaren abiadura-hobariak kentzen dituen ala ez kontrolatzen du sortutako arma-jaurtiketa-abiaduraren jarraipenetik ordezkapen-estaldura zehatza infinitua eskuragarri dagoenean. Banilazko armak jaurtitzeko abiadura mugatuko teknologiek jatorrizko hobariak mantentzen dituzte.
mir-use-installed-space-age-icons=Gaituta dagoenean, MIR-k instalatutako DLC ikono-fitxategi ofizialak erreferentzia egin ditzake, Space Age eta Elevated Rails barne, nahiz eta mod horiek oinarrizko jokorako exekutatzeko desgaituta egon. Utzi hau desaktibatuta DLC fitxategi horiek instalatuta ez badaude; Factoriok ezin du dotore berreskuratu prototipoa kargatzean falta diren ikono fitxategietatik.
mir-pipeline-extent-multiplier=Abiorako soilik goitibeherako biderkatzailea fluido-kutxen kanalizazio-hedadura-eremuak prototipoetan, ez hodi-entitateetan bakarrik. % 100ek prototipoak aldatu gabe uzten ditu eta ez ditu kanalizazio-pasa edo fluido-kutxak eskaneatzen. %100 ez diren balioak esperimentalak dira eta fluido-kutxak definitzen dituzten makinei, tankeei, bultzagailuei eta prototipo moldatuei eragin diezaiekete.
mir-unrestricted-modules=Esperimentazioa eta oreka-haustura. Gaituta dagoenean, dauden errezeta bakoitzak bost modulu-efektuak onartzen ditu eta zirrikituekin dauden modulu-hartzaile bakoitzak aurkitutako modulu-kategoria guztiak onartzen ditu. Honek ez ditu moduluen zirrikituak gehitzen edo modulu-prototipoak aldatzen, eta baliteke produktibitatea, kalitatea eta modulu-moduluaren begiztak gaitzea.
mir-prototype-productivity-cap=MIR-k errezeten produktibitate-tapak bakarrik uzten dituen aukeratzen du edo birziklatzen ez den parametrorik gabeko errezeta guztietan abiarazte-tapa bat idazten duen. +% 300ek (aldatu gabe) lehendik dauden errezeten txapelak gordetzen ditu; balio baxuek produktibitatearen eskalatzea laburtzen dute, eta balio altuek, berriz, zabaltzen dute.
mir-recycling-return-chance=Sortutako ezkutuko birziklapen errezetak soilik kontrolatzen ditu. Modu automatikoak % 25eko materialaren itzulera normala gehienez 1era murrizten du, aukeratutako produktibitate-mugetan irteera osoaren biderkagaiarekin zatituta. Aukera finkoek sortutako etekin berdinak zuzenean eskalatzen dituzte. Ikusgai dauden prozesuak eta errezeten produktibitate-mugak ez dira inoiz aldatzen.
mir-productivity-cap-self-recycling-only=1etik gora / birziklatzailearen itzulera - 1, sorkuntzarik gabeko autobirziklatze bide frogatua duten ekoizpen-errezetek soilik jasotzen dute hautatutako muga handiagoa. Atalase horretan edo beherago kontrol-lauki honek ez du eraginik. Aldaketarik gabeko motorrak %25eko etekin normala +%300eko atalase kontserbadore gisa erabiltzen du birziklapen errezetak aldatu gabe.
mir-prototype-efficiency-cap=Eraginkortasun-efektuek makinaren energia aktiboaren erabilera zenbateraino murrizten duten aukeratzen du. -% 80k (aldatu gabe) lehendik dauden energia-erabileraren mugak bakarrik uzten ditu. Murrizketa sakonagoak energia aktiboaren erabilera zerora hurbil daitezke kutsadura-mugak aldatu gabe.
mir-prototype-pollution-cap=Kutsadura murrizteko efektuek makinen kutsadura zenbateraino murriztu dezaketen aukeratzen du. -%80ak (aldatu gabe) dauden kutsadura-mugak bakarrik uzten ditu. Murrizketa sakonagoak zero kutsadurara hurbil daitezke energiaren erabilera aldatu gabe.
mir-prototype-speed-floor=Abiadura-efektu negatiboek onartzen dituzten makinak zenbateraino motel ditzaketen aukeratzen du. -%80ak (aldatu gabe) dauden mugak bakarrik uzten ditu; balio sakonagoek zoru arrunta kentzen dute -% 99,99an ia geldialdira.
mir-prototype-speed-cap=MIR-k makinaren abiadura-efektuaren mugak bakarrik uzten dituen edo abiadura-muga positibo berri bat idazten duen aukeratzen du. + 100000% (aldaketarik gabe) dauden mugak gordetzen ditu; balio baxuagoek nahita abiadura handiko hobariak estutzen dituzte.
mir-prototype-quality-cap=MIR-k makinaren kalitate-efektuaren mugak bakarrik uzten dituen aukeratzen du edo kalitatezko muga positibo berri bat idazten duen. +100000% (aldaketarik gabe) lehendik dauden mugak gordetzen ditu eta ez ditu kalitate mailak edo elementuen probabilitate formulak aldatzen.
mir-prototype-positive-power-floor=Lehenetsia desaktibatuta. Gaituta dagoenean, MIR-k 0W-ko energia_erabilera aktiboaren prototipo esplizituak 1W-era aldatzen ditu prototipoak kargatzean, beraz, potentzia baxuko abisu-ikonoak ez dira agertuko zero ez den kopuru txiki bat atera beharko luketen entitateetan. Utzi itzali zero potentziako prototipoak zehazki kontserbatzeko.
mir-settings-profile-import=Itsatsi MIR ezarpenen profil-katea hemen esportatutako abiarazte-ezarpen-balioak gainidazteko geruza gisa aplikatzeko prototipoa sortzean. Utzi hutsik ezarpen arruntetarako. Esportatu /mir-settings-export-ekin gordetze aktibo batetik, eta, ondoren, berrabiarazi balio hau aldatu ondoren.
mir-debug-generation-report=Gaituta dagoenean, erregistro-errenkada egituratu bat idazten du sortutako edo saltatu diren korronte eta oinarrizko luzapen bakoitzeko, zientzia-paketeak, aurrebaldintzak, efektu kopurua, laborategiko bateragarritasun-egoera eta ikono-iturria barne.
mir-debug-recipe-matches=Gaituta dagoenean, bat datozen errezeta-izenak idazten ditu sortutako produktibitate-fluxu bakoitzeko. Hau zaratatsua izan daiteke mod pakete handietan.
mir-debug-scripted-effects=Gaituta dagoenean, exekuzio-denborako erregistro-sarrerak idazten ditu script-en teknologiek efektu globalak edo gertaerak bultzatutakoak berriro kalkulatzen dituztenean.
mir-lab-incompatibility-policy=MIR-k zer egiten duen aukeratzen du, hautatutako zientzia-paketeak laborategi aktibo batek ezin dituenean ikertu.
ips-effect-per-level-stream=__1__ maila bakoitzeko oinarrizko maila-efektua ezartzen du. Geroago lotutako mailak eta efektuak proportzionalki eskalatzen dira. Ehuneko efektuek ehuneko puntuak erabiltzen dituzte; zenbaketa eta distantzia efektuek beren jatorrizko unitateak erabiltzen dituzte.
mir-effect-per-level=__1__ jarraipen infiniturako maila bakoitzeko efektu kanonikoa ezartzen du. Erlazionatutako efektuak proportzionalki eskalatzen dira azken bainila oinarritik. Ehuneko efektuek ehuneko puntuak erabiltzen dituzte; zenbaketa eta distantzia efektuek beren jatorrizko unitateak erabiltzen dituzte.
mir-note-experimental-spoilage=Esperimentala eta desgaituta dago lehenespenez 2.1.0 v2. Hau global/mapa zabaleko script-efektua da. Lehendik dagoen pila hondagarriaren portaera ez da erreklamatzen eskuz baliozkotu arte.
mir-note-agriculture-growth=Landatu berri diren nekazaritza-dorre-laboreei aplikatzen zaie. Lehendik landatutako laboreak ez dira berriro eskalatzen.
mir-note-cargo-pad-count=Espazio Aroko Logistika Ikerketa Berezia. Karga-lurreratze-plataformak gainazal bakoitzeko handitzen ditu eta logistika-oreka nabarmen alda dezake.
mir-note-inserter-capacity=Lehenespenez desgaituta dago. Txertagailuaren ahalmen gehigarriak zirkuitu bidez kontrolatutako txertagailuak hautsi ditzake eta motorraren optimizazioak murrizten ditu.
mir-note-native-owner-managed-stream=Instalatutako infinitu teknologia bat dagoeneko ikerketa-familia honen jabea bada, abiarazte-ezarpen horiek jabea konfiguratzen dute bikoiztu bat sortu beharrean. Aldatu gabeko MIR lehenetsiek jabearen azken prototipoa zehatz-mehatz gordetzen dute. Kostu, denbora, gehienezko maila eta efektuen baliogabetze esplizituak jabea seguru bat etortzearen ondoren soilik aplikatzen dira; korrontea desgaitzeak kanpoko teknologia ukitu gabe uzten du. Berrabiarazi Factorio abiarazteko ezarpenak aldatu ondoren. 0 gehienezko mailak infinitua esan nahi du, eta efektu-balioak maila bakoitzeko ehuneko puntuak dira.

