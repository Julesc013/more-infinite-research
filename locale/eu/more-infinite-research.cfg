[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Ez du aurkikuntza, eranskin edo sorkuntza automatikorik egiten. MIRren ikerketa finkoak ez du aldaketarik izaten.
mir-automatic-productivity-action-preview=Hautagaiak deskubritzen eta sailkatzen ditu, ondoren onartutako eta salatutako erabakiak Faktorioko erregistroan idazten ditu. Ez du errezetarik eransten edo ikerketarik sortzen.
mir-automatic-productivity-action-apply=Lehenetsia. Hautagaiak deskubritzen ditu eta segurtasunean frogatutako errezetak soilik eransten ditu lehendik dauden MIR ikerketa bateragarriei. Ez du berez ikerketa sortzen; beheko bi kontrol-laukiek sorkuntza arautzen dute.
mir-automatic-compiler-mode-off=Desgaituen ondarearen baliokidea.
mir-automatic-compiler-mode-report=Aurrebista aldaketen ondare baliokidea.
mir-automatic-compiler-mode-safe-attach=Oinarrizko baliokidea Aplikatu aldaketa seguruak ikerketa sortzea desgaituta dagoela.
mir-automatic-compiler-mode-exact-pack=Oinarrizko baliokidea Aplikatu aldaketa seguruak ikerketa-sorkuntza gaituta eta berrikusitako bateragarritasun-datuak beharrezkoak.
mir-automatic-compiler-mode-safe-generate=Erregistratutako hornitzaile esperimentalentzat ikerketa-sorkuntza gaituta Aplikatu aldaketa seguruen baliokide ondarea.
mir-adjust-vanilla-weapon-speed-techs-off=Desgaitu MIR-ren hautazko kohete/kanoi gainjarritako garbiketa.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Kendu MIRren kohete/kanoi gainjarritako hobariak gaituta dagoen teknologia infinitu eskuragarri batek ordezko efektu zehatza ematen duenean soilik.
mir-adjust-vanilla-weapon-speed-techs-always=Kendu beti MIRren kohete/kanoi hobariak gainjarriz. Erabili bereizketa zorrotza nahi baduzu bakarrik.
mir-science-pack-ingredient-policy-configured=Erabili sortutako teknologia bakoitzaren konfiguratutako zientzia-paketeak osagaien hautazko hedapenik gabe. MIR lehenetsia.
mir-science-pack-ingredient-policy-space=Gehitu espazio-zientzia eskuragarri dagoenean. Kohetearen ondorengo zailtasuna handitzen da.
mir-science-pack-ingredient-policy-space-and-promethium=Gehitu espazioa eta prometio zientzia eskuragarri dagoenean. Espazio Aroaren oso beranduko ikerketa-hustuetarako onena.
mir-science-pack-ingredient-policy-space-age-progression=Gehitu hautatutako paketeek inplizitutako Space Age progresio-paketeak soilik. Ez du zerikusirik ez duten paketa moldaturik gehitzen.
mir-science-pack-ingredient-policy-official-progression=Gehitu falta diren aurrebaldintza-estilo-pakete ofizialak dagoeneko hautatutako pakete ofizial aurreratuenak inplikatuta.
mir-science-pack-ingredient-policy-mod-progression=Gehitu laborategiarekin bateragarriak diren paketeak aldatutako zientzia-paketearen progresiotik ondorioztatuta eta desblokeatu aurrebaldintzak.
mir-science-pack-ingredient-policy-all-official=Erabili uneko mod multzoan dauden oinarri ofizial eta Espazio Aroko zientzia-pakete guztiak.
mir-science-pack-ingredient-policy-all=Erabili laborategiarekin bateragarriak diren zientzia-pakete aktibo guztiak, baita zientzia-pakete moldatuak ere.
mir-lab-incompatibility-policy-reduce=Mantendu teknologia bere zientzia-paketeak laborategi aktibo batek onartzen duen multzo handienera murriztuz. Lehenetsi seguruena mod paketeetarako.
mir-lab-incompatibility-policy-skip=Saltatu teknologia laborategi aktiborik ez badu bere aukeratutako zientzia-paketeen multzoa ikertu. Zorrotzagoa eta ikuskaritza errazagoa.
mir-lab-incompatibility-policy-engine-default=Ez idatzi inoiz hautatutako zientzia-paketearen multzoa. MIR-ek modu seguruan iker daitekeen multzo bat gordetzen du aldatu gabe eta sortutako teknologia baztertzen du Factoriok multzo zehatz hori ikertu ezin duenean.
mir-prototype-productivity-cap-engine-default=Utzi errezeta bakoitzaren produktibitatearen muga bakarrik. Txapel pertsonalizaturik gabeko errezetek Factorio-ren %300eko produktibitate-susbalioaren muga normala erabiltzen dute.
mir-prototype-productivity-cap-percent-25=Ezarri parametroak ez diren errezeten produktibitate-mugak % 25ean. Hau hasierako muga zorrotza da.
mir-prototype-productivity-cap-percent-50=Ezarri parametroak ez diren errezeten produktibitate-mugak % 50ean. Hau muga arruntaren azpitik dago eta produktibitatearen ikerketak laguntzeari utzi dio lehenago.
mir-prototype-productivity-cap-percent-75=Ezarri parametroak ez diren errezeten produktibitate-mugak % 75ean. Hau muga arruntaren azpitik dago eta produktibitatearen ikerketak laguntzeari utzi dio lehenago.
mir-prototype-productivity-cap-percent-100=Ezarri parametroak ez diren errezeten produktibitate-mugak % 100ean. Hau muga arruntaren azpitik dago eta produktibitatearen ikerketak laguntzeari utzi dio lehenago.
mir-prototype-productivity-cap-percent-125=Ezarri parametroak ez diren errezeten produktibitate-mugak % 125ean.
mir-prototype-productivity-cap-percent-150=Ezarri parametroak ez diren errezeten produktibitate-mugak % 150ean.
mir-prototype-productivity-cap-percent-200=Ezarri parametroak ez diren errezeten produktibitate-mugak % 200ean. Hau muga arruntaren azpitik dago eta produktibitatearen ikerketak laguntzeari utzi dio lehenago.
mir-prototype-productivity-cap-percent-250=Ezarri parametroak ez diren errezeten produktibitate-mugak % 250ean. Hau muga arruntaren azpitik dago.
mir-prototype-productivity-cap-percent-400=Ezarri parametroak ez diren errezeten produktibitate-mugak % 400ean. Horrek produktibitatearen eskalatzea muga arruntetik haratago zabaltzen du.
mir-prototype-productivity-cap-percent-500=Ezarri parametroak ez diren errezeten produktibitate-mugak % 500ean. Horrek produktibitatearen eskalatzea muga arruntetik haratago zabaltzen du.
mir-prototype-productivity-cap-percent-750=Ezarri parametroak ez diren errezeten produktibitate-mugak % 750ean.
mir-prototype-productivity-cap-percent-1000=Ezarri parametroak ez diren errezeten produktibitate-mugak % 1000ean. Erabili produktibitatearen ikerketek garrantzi handia izan behar duten tokietan gordetze luzeetarako.
mir-prototype-productivity-cap-percent-2500=Ezarri parametroak ez diren errezeten produktibitate-mugak % 2500ean. Erabili oso luze gordetzeko.
mir-prototype-productivity-cap-percent-5000=Ezarri parametroak ez diren errezeten produktibitate-mugak % 5000ean.
mir-prototype-productivity-cap-percent-10000=Ezarri parametroak ez diren errezeten produktibitate-mugak % 10000an. Erabili muturreko epe luzerako eskalatzeko soilik.
mir-prototype-productivity-cap-percent-25000=Ezarri parametroak ez diren errezeten produktibitate-mugak % 25000an. Erabili muturreko epe luzerako eskalatzeko soilik.
mir-prototype-productivity-cap-percent-100000=Ezarri parametroak ez diren errezeten produktibitate-mugak % 100000an. Hau modu eraginkorrean kenduko da gordetze gehienetarako.
mir-recycling-return-chance-engine-default=Utzi birziklatzeko errezeta guztiak aldatu gabe.
mir-recycling-return-chance-match-productivity-cap=Ezkutuko birziklapen-errezetetarako ustiapen segurua den murrizketa automatikoa. 1 / erabiltzen du (1 + produktibitate-bonua), % 25eko etekin arruntarekin mugatuta: % 400 % 20 bihurtzen da eta % 1000 % 9,09 inguru.
mir-recycling-return-chance-percent-25=Mantendu sortutako ezkutuko birziklapen errezetak %25eko materialaren itzulera arruntean.
mir-recycling-return-chance-percent-20=Ezkutuko sortutako birziklapen errezetak eskalatu materialaren % 20 itzultzera.
mir-recycling-return-chance-percent-15=Ezkutuko sortutako birziklapen errezetak eskalatu materialaren %15eko itzulerara.
mir-recycling-return-chance-percent-12-5=Ezkutuko sortutako birziklapen errezetak eskalatu materialaren %12,5eko itzulerara.
mir-recycling-return-chance-percent-10=Ezkutuko sortutako birziklapen errezetak eskalatu materialaren %10eko itzulerara.
mir-recycling-return-chance-percent-7-5=Ezkutuko sortutako birziklapen errezetak eskalatu materialaren %7,5eko itzulerara.
mir-recycling-return-chance-percent-5=Ezkutuko sortutako birziklapen errezetak eskalatu materialaren %5eko itzulerara.
mir-recycling-return-chance-percent-2-5=Ezkutuko sortutako birziklapen errezetak eskalatu materialaren %2,5eko itzulerara.
mir-recycling-return-chance-percent-1=Ezkutuko sortutako birziklapen errezetak eskalatu materialaren %1 itzultzera.
mir-recycling-return-chance-percent-0-5=Ezkutuko sortutako birziklapen errezetak eskalatu materialaren %0,5eko itzulerara.
mir-recycling-return-chance-percent-0-1=Ezkutuko sortutako birziklapen errezetak %0,1eko materialaren itzulerara eskalatu.
mir-prototype-efficiency-cap-engine-default=Utzi makina bakoitzaren energia-erabileraren efektuaren muga bakarrik. Muga pertsonalizaturik gabeko makinek Factorioren -%80ko energia-erabileraren efektuaren muga normala erabiltzen dute, beraz, efektuek ezin dute erabilera aktiboa %20tik behera murriztu.
mir-prototype-efficiency-cap-saving-25=Idatzi energia-erabileraren %-25eko muga. Energia-erabilera aktiboa % 75ean edo gehiagoan mantentzen da energia-erabileraren ondorioen ondoren.
mir-prototype-efficiency-cap-saving-50=Idatzi energia-erabileraren %-50eko muga. Energia-erabilera aktiboa % 50ean edo gehiagoan mantentzen da onartzen diren makinetan energia-erabilerak eragin ondoren.
mir-prototype-efficiency-cap-saving-75=Idatzi energia-erabileraren %-75eko muga. Energia-erabilera aktiboa % 25ean edo gehiagoan mantentzen da onartzen diren makinetan energia-erabilerak eragin ondoren.
mir-prototype-efficiency-cap-saving-90=Idatzi energia-erabileraren %-90eko muga. Energia aktiboaren erabilera % 10era jaitsi daiteke, hau da, ohiko % 20ko solairuaren azpitik.
mir-prototype-efficiency-cap-saving-95=Idatzi energia-erabileraren %-95eko muga. Energia aktiboaren erabilera %5era jaitsi daiteke.
