[technology-description]
more-infinite-research.recipe_productivity=Ökar receptproduktiviteten för de valda recepten. Factorios maximala produktivitetstak gäller fortfarande; ytterligare oändliga nivåer kanske inte har någon praktisk effekt när ett recept väl når sitt tak.
more-infinite-research.direct_effect=Lägger till en oändlig upprepningsbar bonus. Vetenskapspaket väljs från aktiva laboratorier så att tekniken förblir forskningsbar med kompatibla mod-set.
more-infinite-research.cargo_bay_unloading_distance=Ökar det maximala avståndet mellan en lastlandningsplatta och anslutna lossningsplatser.
more-infinite-research.cargo_landing_pad_count=Ökar antalet lastlandningsplattor som varje kraft kan bygga per yta.
more-infinite-research.flamethrower_shooting_speed=Ökar skjuthastigheten för eldkastarvapen och eldkastartorn.
more-infinite-research.electric_shooting_speed=Ökar skjuthastigheten för elektriska vapen. I vanilj påverkar detta utsläppsförsvaret; med Space Age påverkar det också Tesla-vapen när tesla-ammunitionskategorin är tillgänglig.
more-infinite-research.spoilage_preservation=Ökar den globala förstörelsetidsmodifieraren genom en avgränsad skripteffekt. Befintliga bortskämda föremål kan behålla sina nuvarande spoil-deadlines tills de testas i spelet.
more-infinite-research.agricultural_growth_speed=Förkortar återstående tillväxttid för nyplanterade lantbrukstornväxter genom en avgränsad skripteffekt.
more-infinite-research.lab_productivity=Ökar forskningsframstegen från varje konsumerat vetenskapspaket med hjälp av den inhemska labforskningsproduktivitetsmodifieraren.

