[mod-setting-description]
ips-require-space-gate=När den är aktiverad förblir dessa tekniker låsta tills rymdvetenskap forskas i vanilj eller prometiumvetenskap under rymdåldern.
mir-science-pack-ingredient-policy=Väljer hur MIR lägger till vetenskapspaket till genererade teknologier. Alternativen är sorterade från konservativa till breda: standardpaket, sena spelpaket, progressionsbaserade paket, sedan alla tillgängliga paket.
mir-automatic-productivity-action=Väljer vad MIR gör med säkra produktivitetsmöjligheter som finns i recept med installerad mod. Inaktiverad utför ingen automatisk upptäckt. Förhandsgranska ändringar av accepterade och överhoppade kandidater i Factorio-loggen utan att ändra forskning. Tillämpa säkra ändringar (standard) lägger endast till kvalificerade recept till kompatibel befintlig MIR-forskning. Detta styr handling, inte styrka eller mognad; kryssrutorna för skapande nedan är separata. Ägarskap, återvinning, sannolikhet, katalysator, vetenskap, labb, förutsättning, mål, identitet, progression och cykelkontroller gäller alltid.
mir-automatic-create-research=Standard: av. Off limits Tillämpa säkra ändringar på kompatibel befintlig MIR-forskning; kandidater utan lämplig ström hoppas över och rapporteras. På tillåter en kvalificerad registrerad leverantör att skapa en stabil generisk oändlig produktivitetsteknologi när ingen befintlig forskning passar. Kryssrutan för granskade data nedan avgör om experimentella leverantörer är kvalificerade. MIR skapar aldrig en teknik per mod eller recept, och alla hårda säkerhets-, vetenskaps-, ägarskaps-, identitets-, progressions- och cykelportar gäller fortfarande.
mir-automatic-require-reviewed-data=Standard: på. Detta spelar bara roll när Tillåt skapande av ny forskning är på; det blockerar aldrig en säker anknytning till befintlig forskning. På tillstånd är endast leverantörsfamiljer markerade som granskade och backas upp av tillämpliga bevis i exakt version, så experimentfamiljer hoppas över. Off tillåter registrerade experimentella leverantörer att skapa från generiska strukturella bevis. För det bredaste experimentella beteendet, aktivera forskningsskapande och inaktivera detta krav. Inget värde kan kringgå en hård säkerhetsgrind.
mir-automatic-compiler-mode=Dold kompatibilitetsbrygga för profiler skapade före de delade automatiska produktivitetskontrollerna. Ett äldre värde som inte är standard upprätthålls endast medan alla nya kontroller förblir på sina standardvärden. Ändra en ny kontroll för att ta explicit kontroll.
ips-enable-stream=Skapar den genererade oändliga tekniken för __1__ när dess recept, effekter, förutsättningar och vetenskapspaket är tillgängliga. Inaktivera detta för att förhindra att MIR genererar den här tekniken.
ips-cost-base-stream=Forskningsenheter som krävs för den första genererade nivån av __1__. Måste vara minst 1. Senare nivåer beräknas utifrån detta värde och kostnadstillväxtfaktorn.
ips-cost-growth-stream=Multiplikator tillämpas på varje senare nivå av __1__. Använd 1 för fasta kostnader, 1,5 för 50 % tillväxt per nivå eller 2 för att fördubbla kostnaderna.
ips-max-level-stream=Högsta genererade nivå för __1__. Ställ in på 0 för oändliga nivåer.
ips-research-time-stream=Sekunder per forskningsenhet för __1__. Ställ in på 0 för att använda MIR:s standard för denna teknik. Detta är inte total forskningstid; Den totala tiden beror också på forskningskostnad, labbantal, labbhastighet och moduler.
mir-enable-base-tech=Tillåter __1__ att fortsätta förbi sin vaniljkapsyl som en oändlig teknologi. Inaktivera detta om du vill att MIR ska lägga till nya forskningslinjer utan att förlänga denna vaniljkedja.
mir-cost-base=Forskningsenheter som krävs för den första MIR-fortsättningsnivån av __1__. Ställ in på 0 för att ärva vaniljkedjans kostnadsmönster när det är möjligt.
mir-cost-growth=Multiplikator tillämpas på varje senare MIR-fortsättningsnivå av __1__. Ställ in på 0 för att ärva vaniljkedjans tillväxtmönster när det är möjligt.
mir-max-level=Högsta MIR-fortsättningsnivå för __1__. Ställ in på 0 för oändliga nivåer.
mir-research-time=Sekunder per forskningsenhet för MIR-fortsättningen av __1__. Sätt till 0 för att ärva vaniljkedjans forskningsenhetstid när det är möjligt.
mir-prefer-this-mod-for-competing-techs=När den är aktiverad tar denna mod bort utvalda konkurrerande oändliga tillägg och använder sina egna versioner. Inaktivera för att behålla konkurrerande versioner från andra moddar.
mir-adjust-vanilla-weapon-speed-techs=Styr huruvida MIR tar bort raket- och kanongranathastighetsbonusar från dess genererade vapenskjuthastighetsfortsättning när exakt oändlig ersättningstäckning är tillgänglig. Finita vaniljvapenhastighetstekniker behåller sina ursprungliga bonusar.
mir-use-installed-space-age-icons=När det är aktiverat kan MIR referera till installerade officiella DLC-ikonfiler, inklusive Space Age och Elevated Rails, även när dessa mods är inaktiverade för ett basspel. Lämna detta avstängt om dessa DLC-filer inte är installerade; Factorio kan inte återhämta sig graciöst från saknade ikonfiler under prototypladdning.
mir-pipeline-extent-multiplier=Dropdown-multiplikator för endast start för erkända fält för vätskelådans rörledningsutbredning över prototyper, inte bara rörenheter. 100 % lämnar prototyper oförändrade och laddar inte rörledningspassage eller skanningsvätskeboxar. Icke-100 %-värden är experimentella och kan påverka maskiner, tankar, propeller och modifierade prototyper som definierar vätskeboxar.
mir-unrestricted-modules=Experimentell och balansbrytande. När det är aktiverat accepterar varje befintligt recept alla fem moduleffekter och varje befintlig modulmottagare med slots accepterar varje upptäckt modulkategori. Detta lägger inte till modulplatser eller ändrar modulprototyper och kan möjliggöra produktivitet, kvalitet och modd-modulslingor.
mir-prototype-productivity-cap=Väljer om MIR lämnar receptproduktivitetstak ensamma eller skriver ett starttak för varje icke-parameter, icke-återvinningsrecept. +300 % (oförändrat) bevarar befintliga receptlock; lägre värden förkortar produktivitetsskalningen, medan högre värden förlänger den.
mir-recycling-return-chance=Kontrollerar endast dolda genererade återvinningsrecept. Automatiskt läge minskar den normala 25 % materialåtergången till högst 1 dividerat med den totala utmatningsmultiplikatorn vid det valda produktivitetstaket. Fasta val skalar samma genererade avkastning direkt. Synliga processer och receptproduktivitetstak ändras aldrig.
mir-productivity-cap-self-recycling-only=Över 1 / återvinning retur - 1, endast produktionsrecept med en beprövad icke-generativ självåtervinningsväg får det valda högre taket. Vid eller under den tröskeln har denna kryssruta ingen effekt. Motor oförändrad använder den normala avkastningen på 25 % som en konservativ +300 % tröskel utan att ändra återvinningsrecept.
mir-prototype-efficiency-cap=Väljer hur långt effektivitetseffekter kan minska den aktiva maskinens energianvändning. -80 % (oförändrat) lämnar befintliga energianvändningsgränser ensamma. Djupare reduktioner kan närma sig noll aktiv energianvändning utan att föroreningsgränserna ändras.
mir-prototype-pollution-cap=Väljer hur långt föroreningsreducerande effekter kan minska maskinföroreningar. -80 % (oförändrat) lämnar befintliga föroreningsgränser ensamma. Djupare minskningar kan närma sig noll föroreningar utan att ändra energianvändningen.
mir-prototype-speed-floor=Väljer hur mycket negativa hastighetseffekter kan bromsa maskiner som stöds. -80 % (oförändrat) lämnar befintliga gränser ifred; djupare värden tar bort det normala golvet ner till ett nästan stopp vid -99,99 %.
mir-prototype-speed-cap=Väljer om MIR lämnar maskinens hastighetseffektgränser ensamma eller skriver ett nytt positivt hastighetstak. +100000% (oförändrat) bevarar befintliga gränser; lägre värden avsiktligt klämma mycket stora hastighet bonusar.
mir-prototype-quality-cap=Väljer om MIR lämnar maskinkvalitetseffektgränserna ensamma eller skriver ett nytt positivt kvalitetstak. +100000% (oförändrat) bevarar befintliga gränser och ändrar inte kvalitetsnivåer eller sannolikhetsformler för objekt.
mir-prototype-positive-power-floor=Standard av. När det är aktiverat ändrar MIR explicita 0W aktiv energianvändningsprototyper till 1W under prototypladdning så att varningsikoner för låg effekt inte visas på enheter som ska dra en liten mängd som inte är noll. Sluta för att bevara nolleffektprototyper exakt.
mir-settings-profile-import=Klistra in en MIR-inställningsprofilsträng här för att tillämpa exporterade startinställningsvärden som ett åsidosättande lager under prototypgenerering. Lämna tomt för normala inställningar. Exportera med /mir-settings-export från en aktiv spara och starta sedan om efter att ha ändrat detta värde.
mir-debug-generation-report=När det är aktiverat, skriver en strukturerad loggrad per genererad eller överhoppad ström och bastillägg, inklusive vetenskapspaket, förutsättningar, effektantal, labbkompatibilitetsstatus och ikonkälla.
mir-debug-recipe-matches=När det är aktiverat, skriver matchade receptnamn för varje genererad produktivitetsström. Detta kan vara bullrigt i stora mod-paket.
mir-debug-scripted-effects=När det är aktiverat, skriver runtime-loggposter när skriptteknologier beräknar om globala eller händelsedrivna effekter.
mir-lab-incompatibility-policy=Väljer vad MIR gör när de valda vetenskapspaketen inte kan undersökas av något aktivt labb.
ips-effect-per-level-stream=Ställer in den primära basnivåeffekten per nivå för __1__. Relaterade senare nivåer och effekter skalas proportionellt. Procentuella effekter använder procentenheter; räkne- och avståndseffekter använder sina ursprungliga enheter.
mir-effect-per-level=Ställer in den kanoniska effekten per nivå för den oändliga __1__ fortsättningen. Relaterade effekter skalas proportionellt från den slutliga vaniljbaslinjen. Procentuella effekter använder procentenheter; räkne- och avståndseffekter använder sina ursprungliga enheter.
mir-note-experimental-spoilage=Experimentell och inaktiverad som standard i v2.1.0. Detta är en global/karta-omfattande skripteffekt. Befintligt spoilable-stack-beteende görs inte anspråk på förrän det har validerats manuellt.
mir-note-agriculture-growth=Gäller nyplanterade lantbrukstorngrödor. Befintliga planterade grödor skalas inte om.
mir-note-cargo-pad-count=Specialforskning i rymdålderns logistik. Ökar lastlandningsplattor per yta och kan väsentligt förändra logistikbalansen.
mir-note-inserter-capacity=Inaktiverad som standard. Extra insatskapacitet kan bryta kretsstyrda insatser och minska motoroptimeringarna.
mir-note-native-owner-managed-stream=Om en installerad oändlig teknologi redan äger denna forskningsfamilj, konfigurerar samma startinställningar den ägaren istället för att skapa en dubblett. Oförändrade MIR-standardvärden bevarar ägarens slutliga prototyp exakt. Explicita kostnader, tid, maximal nivå och effekt åsidosätter endast efter en säker ägare matchning; inaktivering av strömmen lämnar den externa tekniken orörd. Starta om Factorio efter att ha ändrat startinställningarna. En maxnivå på 0 betyder oändlig, och effektvärden är procentenheter per nivå.

