mir-prototype-speed-cap-bonus-100000=Skriv Factorios maximala hastighetseffektstak uttryckligen. Till skillnad från oförändrad, skriver detta över anpassade nedre gränser.
mir-prototype-quality-cap-engine-default=Lämna varje maskins kvalitets-effektgräns ifred. Maskiner utan anpassad gräns använder Factorios mycket höga +100000 % kvalitetseffektstak.
mir-prototype-quality-cap-bonus-50=Kläm positiva kvalitetseffekter vid +50 %. Detta begränsar bonuseffekter för maskinkvalitet, inte kvalitetsnivåer eller sannolikhetsformler för föremål.
mir-prototype-quality-cap-bonus-25=Kläm positiva kvalitetseffekter vid +25 %. Detta ändrar inte kvalitetsnivåer eller sannolikhetsformler för objekt.
mir-prototype-quality-cap-bonus-75=Kläm positiva kvalitetseffekter vid +75 %. Detta ändrar inte kvalitetsnivåer eller sannolikhetsformler för objekt.
mir-prototype-quality-cap-bonus-100=Kläm positiva kvalitetseffekter vid +100 %. Detta ändrar inte kvalitetsnivåer eller sannolikhetsformler för objekt.
