[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Utför ingen automatisk upptäckt, bilaga eller skapande. MIR:s fasta forskning är oförändrad.
mir-automatic-productivity-action-preview=Upptäcker och klassificerar kandidater och skriver sedan accepterade och överhoppade beslut till Factorio-loggen. Den bifogar inte recept eller skapar forskning.
mir-automatic-productivity-action-apply=Standard. Upptäcker kandidater och bifogar endast säkerhetsbeprövade recept till kompatibel befintlig MIR-forskning. Den skapar inte forskning i sig själv; de två kryssrutorna nedan styr skapandet.
mir-automatic-compiler-mode-off=Äldre motsvarighet till funktionshindrade.
mir-automatic-compiler-mode-report=Äldre motsvarighet till förhandsgranskningsändringar.
mir-automatic-compiler-mode-safe-attach=Äldre motsvarighet till Tillämpa säkra ändringar med forskning inaktiverad.
mir-automatic-compiler-mode-exact-pack=Äldre motsvarighet till Tillämpa säkra ändringar med forskningsskapande aktiverat och granskade kompatibilitetsdata krävs.
mir-automatic-compiler-mode-safe-generate=Äldre motsvarighet till Tillämpa säkra ändringar med forskningsskapande aktiverat för registrerade experimentella leverantörer.
mir-adjust-vanilla-weapon-speed-techs-off=Inaktivera MIR:s valfria överlappande raket-/kanonbonusrensning.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Ta bort MIR:s överlappande raket-/kanonbonusar endast när en aktiverad, nåbar oändlig teknologi ger den exakta ersättningseffekten.
mir-adjust-vanilla-weapon-speed-techs-always=Ta alltid bort MIR:s överlappande raket-/kanonbonusar. Använd endast om du vill ha strikt åtskillnad.
mir-science-pack-ingredient-policy-configured=Använd varje genererad tekniks konfigurerade vetenskapspaket utan valfri ingrediensexpansion. MIR standard.
mir-science-pack-ingredient-policy-space=Lägg till rymdvetenskap när det är tillgängligt. En enkel post-raket svårighetsökning.
mir-science-pack-ingredient-policy-space-and-promethium=Lägg till utrymme och prometiumvetenskap när det är tillgängligt. Bäst för forskningssänkor i mycket sen rymdålder.
mir-science-pack-ingredient-policy-space-age-progression=Lägg endast till rymdålderns progressionspaket som antyds av de valda paketen. Lägger inte till orelaterade modderade paket.
mir-science-pack-ingredient-policy-official-progression=Lägg till saknade officiella förutsättningsliknande paket som antyds av det mest avancerade officiella paketet som redan valts.
mir-science-pack-ingredient-policy-mod-progression=Lägg till saknade lab-kompatibla paket som härleds från moddad science-pack-progression och lås upp förutsättningar.
mir-science-pack-ingredient-policy-all-official=Använd alla officiella bas- och rymdåldersvetenskapspaket som finns i den aktuella moduppsättningen.
mir-science-pack-ingredient-policy-all=Använd alla aktiva labbkompatibla vetenskapspaket, inklusive modda vetenskapspaket.
mir-lab-incompatibility-policy-reduce=Behåll tekniken genom att reducera dess vetenskapspaket till den största uppsättningen som accepteras av ett aktivt labb. Säkraste standard för mod-paket.
mir-lab-incompatibility-policy-skip=Hoppa över tekniken om inget aktivt labb kan undersöka dess utvalda vetenskapspaket. Striktare och lättare att granska.
mir-lab-incompatibility-policy-engine-default=Skriv aldrig om det valda vetenskapspaketet. MIR bevarar en säkert forskningsbar uppsättning oförändrad och utelämnar den genererade tekniken när Factorio inte kan forska i den exakta uppsättningen.
mir-prototype-productivity-cap-engine-default=Lämna varje recepts befintliga produktivitetstak ifred. Recept utan ett anpassat tak använder Factorios normala +300 % produktivitetsbonusgräns.
mir-prototype-productivity-cap-percent-25=Ställ in icke-parameterreceptproduktivitetstak till +25 %. Detta är ett strikt tidig tak.
mir-prototype-productivity-cap-percent-50=Ställ in icke-parameterreceptproduktivitetstak till +50 %. Detta är under det normala taket och gör att produktivitetsforskning slutar hjälpa tidigare.
mir-prototype-productivity-cap-percent-75=Ställ in icke-parameterreceptproduktivitetstak till +75 %. Detta är under det normala taket och gör att produktivitetsforskning slutar hjälpa tidigare.
mir-prototype-productivity-cap-percent-100=Ställ in icke-parameterreceptproduktivitetstak till +100 %. Detta är under det normala taket och gör att produktivitetsforskning slutar hjälpa tidigare.
mir-prototype-productivity-cap-percent-125=Ställ in icke-parameterreceptproduktivitetstak till +125 %.
mir-prototype-productivity-cap-percent-150=Ställ in icke-parameterreceptproduktivitetstak till +150 %.
mir-prototype-productivity-cap-percent-200=Ställ in icke-parameterreceptproduktivitetstak till +200 %. Detta är under det normala taket och gör att produktivitetsforskning slutar hjälpa tidigare.
mir-prototype-productivity-cap-percent-250=Ställ in icke-parameterreceptproduktivitetstak till +250 %. Detta är något under det normala taket.
mir-prototype-productivity-cap-percent-400=Ställ in icke-parameterreceptproduktivitetstak till +400 %. Detta utökar produktivitetsskalningen utöver det normala taket.
mir-prototype-productivity-cap-percent-500=Ställ in icke-parameterreceptproduktivitetstak till +500 %. Detta utökar produktivitetsskalningen utöver det normala taket.
mir-prototype-productivity-cap-percent-750=Ställ in icke-parameterreceptproduktivitetstak till +750 %.
mir-prototype-productivity-cap-percent-1000=Ställ in icke-parameterreceptproduktivitetstak till +1000 %. Använd för långa besparingar där produktivitetsforskning bör fortsätta vara viktig.
mir-prototype-productivity-cap-percent-2500=Ställ in icke-parameterreceptproduktivitetstak till +2500 %. Använd för mycket långa besparingar.
mir-prototype-productivity-cap-percent-5000=Ställ in icke-parameterreceptproduktivitetstak till +5000 %.
mir-prototype-productivity-cap-percent-10000=Ställ in icke-parameterreceptproduktivitetstak till +10 000 %. Använd endast för extrem långtidsskalning.
mir-prototype-productivity-cap-percent-25000=Ställ in icke-parameterreceptproduktivitetstak till +25000 %. Använd endast för extrem långtidsskalning.
mir-prototype-productivity-cap-percent-100000=Ställ in icke-parameterreceptproduktivitetstak till +100 000 %. Detta är i praktiken obegränsat för de flesta räddningar.
mir-recycling-return-chance-engine-default=Lämna varje återvinningsrecept oförändrat.
mir-recycling-return-chance-match-productivity-cap=Exploateringssäker automatisk reduktion för dolda genererade återvinningsrecept. Använder 1 / (1 + produktivitetsbonus), begränsat till normal avkastning på 25 %: +400 % blir 20 % och +1 000 % blir cirka 9,09 %.
mir-recycling-return-chance-percent-25=Behåll dolda genererade återvinningsrecept vid normal retur av 25 %.
mir-recycling-return-chance-percent-20=Skala dolda genererade återvinningsrecept till 20 % materialåtervinning.
mir-recycling-return-chance-percent-15=Skala dolda genererade återvinningsrecept till 15 % materialåtervinning.
mir-recycling-return-chance-percent-12-5=Skala dolda genererade återvinningsrecept till 12,5 % materialåtervinning.
mir-recycling-return-chance-percent-10=Skala dolda genererade återvinningsrecept till 10 % materialåtervinning.
mir-recycling-return-chance-percent-7-5=Skala dolda genererade återvinningsrecept till 7,5 % materialåtervinning.
mir-recycling-return-chance-percent-5=Skala dolda genererade återvinningsrecept till 5 % materialåtervinning.
mir-recycling-return-chance-percent-2-5=Skala dolda genererade återvinningsrecept till 2,5 % materialåtervinning.
mir-recycling-return-chance-percent-1=Skala dolda genererade återvinningsrecept till 1 % materialåtervinning.
mir-recycling-return-chance-percent-0-5=Skala dolda genererade återvinningsrecept till 0,5 % materialåtervinning.
mir-recycling-return-chance-percent-0-1=Skala dolda genererade återvinningsrecept till 0,1 % materialåtervinning.
mir-prototype-efficiency-cap-engine-default=Lämna gränsen för varje maskins energianvändningseffekt. Maskiner utan en anpassad gräns använder Factorios normala -80 % energianvändningseffekttak, så effekter kan inte minska aktiv användning under 20 %.
mir-prototype-efficiency-cap-saving-25=Skriv ett -25 % energiförbrukningslock. Aktiv energianvändning stannar på 75 % eller mer efter energianvändningseffekter.
mir-prototype-efficiency-cap-saving-50=Skriv ett -50 % energiförbrukningslock. Aktiv energianvändning stannar på 50 % eller mer efter energianvändningseffekter på maskiner som stöds.
mir-prototype-efficiency-cap-saving-75=Skriv ett -75 % energiförbrukningslock. Aktiv energianvändning stannar på 25 % eller mer efter energianvändningseffekter på maskiner som stöds.
mir-prototype-efficiency-cap-saving-90=Skriv ett -90 % energiförbrukningslock. Aktiv energianvändning kan sjunka till 10 %, vilket är under det normala golvet på 20 %.
mir-prototype-efficiency-cap-saving-95=Skriv ett -95 % energiförbrukningslock. Den aktiva energianvändningen kan sjunka till 5 %.
mir-prototype-efficiency-cap-saving-99=Skriv ett energiförbrukningslock på -99 %. Aktiv energianvändning kan sjunka till 1 %.
mir-prototype-efficiency-cap-saving-999=Skriv ett energiförbrukningstak på -99,9 %. Den aktiva energianvändningen kan sjunka till 0,1 %.
mir-prototype-efficiency-cap-saving-9999=Skriv ett energiförbrukningstak på -99,99 %. Detta är nästan noll aktiv energianvändning, inte en noll-effekt prototyp omskrivning.
mir-prototype-pollution-cap-engine-default=Lämna varje maskins föroreningseffektgräns ifred. Maskiner utan en anpassad gräns använder Factorios normala -80 % föroreningseffekttak.
mir-prototype-pollution-cap-saving-25=Skriv ett -25 % föroreningstak. Föroreningarna stannar på 75 % eller mer efter föroreningseffekter.
mir-prototype-pollution-cap-saving-50=Skriv ett -50 % föroreningstak. Föroreningarna stannar på 50 % eller mer efter föroreningseffekter på maskiner som stöds.
mir-prototype-pollution-cap-saving-75=Skriv ett -75 % föroreningstak. Föroreningarna stannar på 25 % eller mer efter föroreningseffekter på maskiner som stöds.
mir-prototype-pollution-cap-saving-90=Skriv ett -90 % föroreningstak. Föroreningarna kan sjunka till 10 %, vilket är under det normala golvet på 20 %.
mir-prototype-pollution-cap-saving-95=Skriv ett -95 % föroreningstak. Föroreningarna kan sjunka till 5 %.
mir-prototype-pollution-cap-saving-99=Skriv ett -99 % föroreningstak. Föroreningarna kan sjunka till 1 %.
mir-prototype-pollution-cap-saving-999=Skriv ett föroreningstak på -99,9 %. Föroreningarna kan sjunka till 0,1 %.
mir-prototype-pollution-cap-saving-9999=Skriv ett -99,99 % föroreningstak. Detta är nästan noll föroreningar, inte ett runtime-föroreningsskript.
mir-prototype-speed-floor-engine-default=Lämna varje maskins negativa hastighetsgräns ifred. Maskiner utan anpassad gräns använder Factorios normala -80% golv och håller minst 20% hastighet.
mir-prototype-speed-floor-saving-25=Spänn negativa hastighetseffekter vid -25 %, vilket ger minst 75 % hastighet.
mir-prototype-speed-floor-saving-50=Spänn negativa hastighetseffekter vid -50 %, vilket ger minst 50 % hastighet.
mir-prototype-speed-floor-saving-75=Spänn negativa hastighetseffekter vid -75 %, vilket ger minst 25 % hastighet.
mir-prototype-speed-floor-saving-90=Tillåt negativa hastighetseffekter ner till -90 %, vilket ger minst 10 % hastighet.
mir-prototype-speed-floor-saving-95=Tillåt negativa hastighetseffekter ner till -95 %, vilket ger minst 5 % hastighet.
mir-prototype-speed-floor-saving-99=Tillåt negativa hastighetseffekter ner till -99%, vilket ger minst 1% hastighet.
mir-prototype-speed-floor-saving-999=Tillåt negativa hastighetseffekter ner till -99,9 %, vilket ger minst 0,1 % hastighet.
mir-prototype-speed-floor-saving-9999=Tillåt negativa hastighetseffekter ner till -99,99 %, den lägsta Factorio-prototypgränsen. Detta är ett nästan stopp, inte noll eller negativ tillverkningshastighet.
mir-prototype-speed-cap-engine-default=Lämna varje maskins hastighetsgräns ifred. Maskiner utan anpassad gräns använder Factorios mycket höga +100000% hastighetseffekttak.
mir-prototype-speed-cap-bonus-25=Spänn positiva hastighetseffekter vid +25 %.
mir-prototype-speed-cap-bonus-50=Spänn positiva hastighetseffekter vid +50 %. Använd detta för att hålla hastighetsbonusarna snävt begränsade.
mir-prototype-speed-cap-bonus-75=Spänn positiva hastighetseffekter vid +75 %.
mir-prototype-speed-cap-bonus-100=Spänn positiva hastighetseffekter vid +100 %.
mir-prototype-speed-cap-bonus-125=Spänn positiva hastighetseffekter vid +125 %.
