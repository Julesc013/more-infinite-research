[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Ne izvodi automatsko otkrivanje, prilaganje ili stvaranje. MIR-ovo fiksno istraživanje ostaje nepromijenjeno.
mir-automatic-productivity-action-preview=Otkriva i klasificira kandidate, zatim upisuje prihvaćene i preskočene odluke u dnevnik Factorio. Ne prilaže recepte niti stvara istraživanje.
mir-automatic-productivity-action-apply=Zadano. Otkriva kandidate i prilaže samo sigurnosno dokazane recepte kompatibilnom postojećem MIR istraživanju. Ne stvara istraživanje samo po sebi; dva potvrdna okvira u nastavku upravljaju stvaranjem.
mir-automatic-compiler-mode-off=Naslijeđeni ekvivalent Onemogućeno.
mir-automatic-compiler-mode-report=Naslijeđeni ekvivalent promjena Pregleda.
mir-automatic-compiler-mode-safe-attach=Naslijeđeni ekvivalent primjene sigurnih promjena s onemogućenim stvaranjem istraživanja.
mir-automatic-compiler-mode-exact-pack=Naslijeđeni ekvivalent primjene sigurnih promjena s omogućenim istraživanjem i potrebnim pregledanim podacima o kompatibilnosti.
mir-automatic-compiler-mode-safe-generate=Naslijeđeni ekvivalent primjene sigurnih promjena s omogućenim istraživanjem za registrirane eksperimentalne pružatelje usluga.
mir-adjust-vanilla-weapon-speed-techs-off=Onemogući MIR-ovo izborno preklapajuće bonus čišćenje rakete/topa.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Uklonite MIR-ove bonuse za rakete/topove koji se preklapaju samo kada omogućena, dostupna beskonačna tehnologija pruža točan učinak zamjene.
mir-adjust-vanilla-weapon-speed-techs-always=Uvijek uklonite MIR-ove bonuse za rakete/topove koji se preklapaju. Koristite samo ako želite strogo odvajanje.
mir-science-pack-ingredient-policy-configured=Koristite konfigurirane znanstvene pakete svake generirane tehnologije bez dodatnog proširenja sastojaka. MIR default.
mir-science-pack-ingredient-policy-space=Dodajte svemirsku znanost kada je dostupna. Jednostavno povećanje težine nakon raketiranja.
mir-science-pack-ingredient-policy-space-and-promethium=Dodajte svemir i promethium znanost kada su dostupni. Najbolje za vrlo kasno svemirsko doba istraživačkih sudopera.
mir-science-pack-ingredient-policy-space-age-progression=Dodajte samo svemirske pakete napredovanja koje podrazumijevaju odabrani paketi. Ne dodaje nepovezane modificirane pakete.
mir-science-pack-ingredient-policy-official-progression=Dodajte nedostajuće službene pakete u stilu preduvjeta koje podrazumijeva najnapredniji službeni paket koji je već odabran.
mir-science-pack-ingredient-policy-mod-progression=Dodajte pakete kompatibilne s laboratorijem koji nedostaju izvedene iz napredovanja modificiranog znanstvenog paketa i otključajte preduvjete.
mir-science-pack-ingredient-policy-all-official=Koristite sve službene baze i svemirsko doba znanstveni paket koji postoji u trenutnom modu.
mir-science-pack-ingredient-policy-all=Koristite svaki aktivni znanstveni paket kompatibilan s laboratorijem, uključujući modificirane znanstvene pakete.
mir-lab-incompatibility-policy-reduce=Zadržite tehnologiju smanjivanjem njezinih znanstvenih paketa na najveći skup koji prihvaća aktivni laboratorij. Najsigurnija zadana za mod pakete.
mir-lab-incompatibility-policy-skip=Preskočite tehnologiju ako niti jedan aktivni laboratorij ne može istražiti svoj odabrani set znanstvenih paketa. Stroži i lakši za reviziju.
mir-lab-incompatibility-policy-engine-default=Nikada ne prepisivati ​​odabrani set znanstvenih paketa. MIR čuva nepromijenjen skup koji se može sigurno istražiti i izostavlja generiranu tehnologiju kada Factorio ne može istražiti taj točan skup.
mir-prototype-productivity-cap-engine-default=Ostavite postojeće ograničenje produktivnosti svakog recepta. Recepti bez prilagođenog ograničenja koriste Factoriovo normalno ograničenje bonusa produktivnosti od +300%.
mir-prototype-productivity-cap-percent-25=Postavite granice produktivnosti recepata bez parametara na +25%. Ovo je stroga rana granica.
mir-prototype-productivity-cap-percent-50=Postavite granice produktivnosti recepata bez parametara na +50%. To je ispod normalnog ograničenja i čini da istraživanje produktivnosti prestaje pomagati prije.
mir-prototype-productivity-cap-percent-75=Postavite ograničenje produktivnosti recepata bez parametara na +75%. To je ispod normalnog ograničenja i čini da istraživanje produktivnosti prestaje pomagati prije.
mir-prototype-productivity-cap-percent-100=Postavite ograničenja produktivnosti recepata bez parametara na +100%. To je ispod normalnog ograničenja i čini da istraživanje produktivnosti prestaje pomagati prije.
mir-prototype-productivity-cap-percent-125=Postavite ograničenje produktivnosti recepata bez parametara na +125%.
mir-prototype-productivity-cap-percent-150=Postavite ograničenja produktivnosti recepata bez parametara na +150%.
mir-prototype-productivity-cap-percent-200=Postavite ograničenje produktivnosti recepata bez parametara na +200%. To je ispod normalnog ograničenja i čini da istraživanje produktivnosti prestaje pomagati prije.
mir-prototype-productivity-cap-percent-250=Postavite ograničenje produktivnosti recepata bez parametara na +250%. Ovo je malo ispod normalne gornje granice.
mir-prototype-productivity-cap-percent-400=Postavite ograničenje produktivnosti recepata bez parametara na +400%. Ovo proširuje skaliranje produktivnosti izvan normalne granice.
mir-prototype-productivity-cap-percent-500=Postavite granice produktivnosti recepata bez parametara na +500%. Ovo proširuje skaliranje produktivnosti izvan normalne granice.
mir-prototype-productivity-cap-percent-750=Postavite granice produktivnosti recepata bez parametara na +750%.
mir-prototype-productivity-cap-percent-1000=Postavite ograničenja produktivnosti recepata bez parametara na +1000%. Koristite za dugo spremanje gdje bi istraživanje produktivnosti trebalo ostati važno.
mir-prototype-productivity-cap-percent-2500=Postavite ograničenja produktivnosti recepata bez parametara na +2500%. Koristite za vrlo duga spremanja.
mir-prototype-productivity-cap-percent-5000=Postavite ograničenje produktivnosti recepata bez parametara na +5000%.
mir-prototype-productivity-cap-percent-10000=Postavite ograničenje produktivnosti recepata bez parametara na +10000%. Koristite samo za ekstremno dugotrajno skaliranje.
mir-prototype-productivity-cap-percent-25000=Postavite granice produktivnosti recepata bez parametara na +25000%. Koristite samo za ekstremno dugotrajno skaliranje.
mir-prototype-productivity-cap-percent-100000=Postavite ograničenja produktivnosti recepata bez parametara na +100000%. Ovo je efektivno neograničeno za većinu spremanja.
mir-recycling-return-chance-engine-default=Ostavite svaki recept za recikliranje nepromijenjenim.
mir-recycling-return-chance-match-productivity-cap=Automatsko smanjenje zaštićeno od eksploatacije za skriveno generirane recepte za recikliranje. Koristi 1 / (1 + bonus produktivnosti), ograničen na normalnih 25% povrata: +400% postaje 20%, a +1000% postaje oko 9,09%.
mir-recycling-return-chance-percent-25=Čuvajte skrivene generirane recepte za recikliranje uz uobičajeni povrat materijala od 25%.
mir-recycling-return-chance-percent-20=Skalirajte skrivene generirane recepte za recikliranje na povrat materijala od 20%.
mir-recycling-return-chance-percent-15=Skalirajte skrivene generirane recepte za recikliranje na povrat materijala od 15%.
mir-recycling-return-chance-percent-12-5=Skalirajte skrivene generirane recepte za recikliranje na povrat materijala od 12,5%.
mir-recycling-return-chance-percent-10=Skalirajte skrivene generirane recepte za recikliranje na povrat materijala od 10%.
mir-recycling-return-chance-percent-7-5=Skalirajte skrivene generirane recepte za recikliranje na povrat materijala od 7,5%.
mir-recycling-return-chance-percent-5=Skalirajte skrivene generirane recepte za recikliranje na povrat materijala od 5%.
mir-recycling-return-chance-percent-2-5=Skalirajte skrivene generirane recepte za recikliranje na povrat materijala od 2,5%.
mir-recycling-return-chance-percent-1=Skalirajte skrivene generirane recepte za recikliranje na povrat materijala od 1%.
mir-recycling-return-chance-percent-0-5=Skalirajte skrivene generirane recepte za recikliranje na povrat materijala od 0,5%.
mir-recycling-return-chance-percent-0-1=Skalirajte skrivene generirane recepte za recikliranje na povrat materijala od 0,1%.
mir-prototype-efficiency-cap-engine-default=Ostavite ograničenje učinka potrošnje energije za svaki stroj. Strojevi bez prilagođenog ograničenja koriste Factorio normalnu granicu učinka potrošnje energije od -80%, tako da učinci ne mogu smanjiti aktivnu upotrebu ispod 20%.
mir-prototype-efficiency-cap-saving-25=Napišite ograničenje potrošnje energije od -25%. Aktivna potrošnja energije ostaje na 75% ili više nakon učinaka potrošnje energije.
mir-prototype-efficiency-cap-saving-50=Napišite ograničenje potrošnje energije od -50%. Aktivna potrošnja energije ostaje na 50% ili više nakon učinaka potrošnje energije na podržanim strojevima.
mir-prototype-efficiency-cap-saving-75=Napišite ograničenje potrošnje energije od -75%. Aktivna potrošnja energije ostaje na 25% ili više nakon učinaka potrošnje energije na podržanim strojevima.
mir-prototype-efficiency-cap-saving-90=Napišite ograničenje potrošnje energije od -90%. Potrošnja aktivne energije može pasti na 10%, što je ispod normalne granice od 20%.
mir-prototype-efficiency-cap-saving-95=Napišite ograničenje potrošnje energije od -95%. Potrošnja aktivne energije može pasti na 5%.
mir-prototype-efficiency-cap-saving-99=Napišite ograničenje potrošnje energije od -99%. Potrošnja aktivne energije može pasti na 1%.
mir-prototype-efficiency-cap-saving-999=Napišite ograničenje potrošnje energije od -99,9%. Potrošnja aktivne energije može pasti na 0,1%.
mir-prototype-efficiency-cap-saving-9999=Napišite ograničenje potrošnje energije od -99,99%. Ovo je gotovo nulta potrošnja aktivne energije, a ne prepravljanje prototipa s nultom snagom.
mir-prototype-pollution-cap-engine-default=Ostavite ograničenje učinka onečišćenja za svaki stroj. Strojevi bez prilagođenog ograničenja koriste Factorio normalnu granicu učinka onečišćenja od -80%.
mir-prototype-pollution-cap-saving-25=Napišite ograničenje onečišćenja od -25%. Onečišćenje ostaje na 75% ili više nakon učinaka onečišćenja.
mir-prototype-pollution-cap-saving-50=Napišite ograničenje onečišćenja od -50%. Onečišćenje ostaje na 50% ili više nakon utjecaja onečišćenja na podržane strojeve.
mir-prototype-pollution-cap-saving-75=Napišite ograničenje onečišćenja od -75%. Onečišćenje ostaje na 25% ili više nakon utjecaja onečišćenja na podržane strojeve.
