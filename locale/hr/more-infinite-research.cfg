[technology-description]
more-infinite-research.recipe_productivity=Povećava produktivnost recepata za odabrane recepte. Maksimalno ograničenje produktivnosti Factorio još uvijek vrijedi; dodatne beskonačne razine možda neće imati praktičan učinak nakon što recept dosegne svoju gornju granicu.
more-infinite-research.direct_effect=Dodaje beskonačni ponovljivi bonus. Znanstveni paketi biraju se iz aktivnih laboratorija tako da se tehnologija može istražiti s kompatibilnim setovima modifikacija.
more-infinite-research.cargo_bay_unloading_distance=Povećava maksimalnu udaljenost između platforme za slijetanje tereta i povezanih mjesta za istovar.
more-infinite-research.cargo_landing_pad_count=Povećava broj podloga za slijetanje tereta koje svaka sila može izgraditi po površini.
more-infinite-research.flamethrower_shooting_speed=Povećava brzinu pucanja za bacače plamena i kupole za bacače plamena.
more-infinite-research.electric_shooting_speed=Povećava brzinu pucanja za električno oružje. Kod vanilije to utječe na obranu od pražnjenja; sa Space Age također utječe na Tesla oružje kada je dostupna kategorija tesla streljiva.
more-infinite-research.spoilage_preservation=Povećava globalni modifikator vremena kvarenja kroz ograničeni skriptirani učinak. Postojeći predmeti koji se mogu pokvariti mogu zadržati trenutne rokove za pokvariti dok se ne testiraju u igri.
more-infinite-research.agricultural_growth_speed=Skraćuje preostalo vrijeme rasta za novozasađene poljoprivredne biljke kroz ograničeni skriptirani učinak.
more-infinite-research.lab_productivity=Povećava napredak istraživanja dobiven svakim potrošenim znanstvenim paketom, koristeći izvorni modifikator produktivnosti laboratorijskog istraživanja.

