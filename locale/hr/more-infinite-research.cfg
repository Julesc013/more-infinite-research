[mod-setting-description]
ips-require-space-gate=Kada su omogućene, ove tehnologije ostaju zaključane dok se svemirska znanost ne istraži u Vanilla ili dok se ne istraži promethium u Space Age.
mir-science-pack-ingredient-policy=Odabire kako MIR dodaje znanstvene pakete generiranim tehnologijama. Opcije su poredane od konzervativnih do širokih: zadani paketi, paketi za kasnu igru, paketi temeljeni na napredovanju, zatim svi dostupni paketi.
mir-automatic-productivity-action=Odabire što MIR radi sa sigurnim mogućnostima produktivnosti koje se nalaze u receptima instaliranog moda. Onemogućeno ne izvodi automatsko otkrivanje. Pregledajte zapise o promjenama prihvaćenih i preskočenih kandidata u dnevniku Factorio bez mijenjanja istraživanja. Primijeni sigurne promjene (zadano) dodaje prihvatljive recepte samo kompatibilnom postojećem MIR istraživanju. Ovo kontrolira djelovanje, a ne snagu ili zrelost; potvrdni okviri za izradu u nastavku su odvojeni. Uvijek se primjenjuju provjere vlasništva, recikliranja, vjerojatnosti, katalizatora, znanosti, laboratorija, preduvjeta, cilja, identiteta, napredovanja i ciklusa.
mir-automatic-create-research=Zadano: isključeno. Izvan granica Primjena sigurnih promjena na kompatibilno postojeće MIR istraživanje; kandidati bez odgovarajućeg toka se preskaču i prijavljuju. On omogućuje kvalificiranom registriranom pružatelju da stvori jednu stabilnu generičku tehnologiju beskonačne produktivnosti kada nijedno postojeće istraživanje ne odgovara. Potvrdni okvir pregledanih podataka u nastavku odlučuje ispunjavaju li eksperimentalni pružatelji usluga uvjete. MIR nikada ne stvara jednu tehnologiju po modu ili receptu, a svaka tvrda sigurnost, znanost, vlasništvo, identitet, napredovanje i vrata ciklusa i dalje su primjenjiva.
mir-automatic-require-reviewed-data=Zadano: uključeno. Ovo je važno samo kada je uključeno Dopusti stvaranje novog istraživanja; nikada ne blokira sigurno vezivanje za postojeće istraživanje. Na dozvolama samo obitelji pružatelja označene kao pregledane i potkrijepljene primjenjivim dokazima točne verzije, tako da su eksperimentalne obitelji preskočene. Isključeno dopušta registriranim pružateljima eksperimentalnih usluga stvaranje iz generičkih strukturnih dokaza. Za najšire eksperimentalno ponašanje omogućite stvaranje istraživanja i isključite ovaj zahtjev. Nijedna vrijednost ne može zaobići čvrsta sigurnosna vrata.
mir-automatic-compiler-mode=Skriveni most kompatibilnosti za profile stvorene prije podijeljenih kontrola automatske produktivnosti. Naslijeđena vrijednost koja nije zadana poštuje se samo dok sve nove kontrole ostaju na zadanim postavkama. Promijenite bilo koju novu kontrolu da preuzme eksplicitnu kontrolu.
ips-enable-stream=Stvara generiranu beskonačnu tehnologiju za __1__ kada su njegovi recepti, učinci, preduvjeti i znanstveni paketi dostupni. Onemogućite ovo kako biste spriječili MIR da generira ovu tehnologiju.
ips-cost-base-stream=Istraživačke jedinice potrebne za prvu generiranu razinu __1__. Mora biti najmanje 1. Kasnije se razine izračunavaju iz ove vrijednosti i faktora rasta troškova.
ips-cost-growth-stream=Množitelj primijenjen na svaku kasniju razinu __1__. Koristite 1 za fiksne troškove, 1,5 za 50% rasta po razini ili 2 za udvostručenje troškova.
ips-max-level-stream=Najviša generirana razina za __1__. Postavite na 0 za beskonačne razine.
ips-research-time-stream=Sekundi po jedinici istraživanja za __1__. Postavite na 0 za korištenje MIR-ove zadane postavke za ovu tehnologiju. Ovo nije ukupno vrijeme istraživanja; ukupno vrijeme također ovisi o cijeni istraživanja, broju laboratorija, brzini laboratorija i modulima.
mir-enable-base-tech=Omogućuje __1__ da nastavi dalje od svoje kape boje vanilije kao beskonačna tehnologija. Onemogućite ovo ako želite da MIR doda nove istraživačke linije bez proširenja ovog vanilla lanca.
mir-cost-base=Istraživačke jedinice potrebne za prvu razinu nastavka MIR-a __1__. Postavite na 0 da biste naslijedili troškovni obrazac vanilla lanca kada je to moguće.
mir-cost-growth=Množitelj primijenjen na svaku kasniju razinu nastavka MIR-a __1__. Postavite na 0 da biste naslijedili obrazac rasta lanca vanilije kada je to moguće.
mir-max-level=Najviša razina MIR nastavka za __1__. Postavite na 0 za beskonačne razine.
mir-research-time=Sekundi po jedinici istraživanja za MIR nastavak __1__. Postavite na 0 da biste naslijedili vrijeme istraživačke jedinice vanilla lanca kada je to moguće.
mir-prefer-this-mod-for-competing-techs=Kada je omogućen, ovaj mod uklanja odabrana konkurentska beskonačna proširenja i koristi vlastite verzije. Onemogućite da biste zadržali konkurentske verzije iz drugih modova.
mir-adjust-vanilla-weapon-speed-techs=Kontrolira hoće li MIR ukloniti bonuse brzine raketa i topovskih granata iz svog generiranog nastavka brzine gađanja oružjem kada je dostupna točna beskonačna zamjenska pokrivenost. Tehnologije ograničene brzine gađanja oružjem boje vanilije zadržavaju svoje izvorne bonuse.
mir-use-installed-space-age-icons=Kada je omogućeno, MIR može referencirati instalirane službene DLC datoteke ikona, uključujući Space Age i Elevated Rails, čak i kada su ti modovi onemogućeni za pokretanje osnovne igre. Ostavite ovo isključeno ako te DLC datoteke nisu instalirane; Factorio se ne može lijepo oporaviti od datoteka ikona koje nedostaju tijekom učitavanja prototipa.
mir-pipeline-extent-multiplier=Padajući množitelj samo za pokretanje za prepoznata polja opsega cjevovoda fluidne kutije kroz prototipove, ne samo cjevovodne entitete. 100% ostavlja prototipove nepromijenjenima i ne učitava prolaz cjevovoda niti skenira kutije s tekućinom. Vrijednosti koje nisu 100% su eksperimentalne i mogu utjecati na strojeve, spremnike, potisnike i modificirane prototipove koji definiraju kutije s tekućinom.
mir-unrestricted-modules=Eksperimentalno i ruši ravnotežu. Kada je omogućeno, svaki postojeći recept prihvaća svih pet efekata modula i svaki postojeći modul prijemnik s utorima prihvaća svaku otkrivenu kategoriju modula. Ovo ne dodaje utore za module niti mijenja prototipove modula, a može omogućiti produktivnost, kvalitetu i petlje modificiranih modula.
mir-prototype-productivity-cap=Odabire hoće li MIR ostaviti samo ograničenje produktivnosti recepta ili će zapisati početno ograničenje za svaki recept koji nije parametar i koji se ne reciklira. +300% (nepromijenjeno) čuva postojeće kapice recepta; niže vrijednosti skraćuju skaliranje produktivnosti, dok ga više vrijednosti produžuju.
mir-recycling-return-chance=Kontrolira samo skrivene generirane recepte za recikliranje. Automatski način rada smanjuje normalan povrat materijala od 25% na najviše 1 podijeljen s ukupnim izlaznim množiteljem na odabranoj gornjoj granici produktivnosti. Fiksni izbori izravno skaliraju iste generirane povrate. Vidljivi procesi i granice produktivnosti recepata nikada se ne mijenjaju.
mir-productivity-cap-self-recycling-only=Iznad 1 / povrat reciklirača - 1, samo proizvodni recepti s dokazanim negenerativnim putem samorecikliranja dobivaju odabrano veće ograničenje. Na ili ispod tog praga ovaj potvrdni okvir nema učinka. Motor nepromijenjen koristi uobičajeni povrat od 25% kao konzervativni prag od +300% bez mijenjanja recepata za recikliranje.
mir-prototype-efficiency-cap=Odabir koliko učinci učinkovitosti mogu smanjiti aktivnu potrošnju energije stroja. -80% (nepromijenjeno) napušta postojeća ograničenja potrošnje energije. Dublja smanjenja mogu se približiti nultoj potrošnji aktivne energije bez promjene ograničenja onečišćenja.
mir-prototype-pollution-cap=Odabir koliko efekti smanjenja zagađenja mogu smanjiti zagađenje stroja. -80% (nepromijenjeno) ne mijenja postojeća ograničenja onečišćenja. Dublja smanjenja mogu se približiti nultoj razini onečišćenja bez promjene korištenja energije.
mir-prototype-speed-floor=Odabir koliko negativni učinci brzine mogu usporiti podržane strojeve. -80% (nepromijenjeno) napušta postojeća ograničenja; dublje vrijednosti uklanjaju normalnu podnicu do gotovo stope na -99,99%.
mir-prototype-speed-cap=Odabire hoće li MIR ostaviti ograničenje učinka brzine stroja sama ili će napisati novo pozitivno ograničenje brzine. +100000% (nepromijenjeno) zadržava postojeća ograničenja; niže vrijednosti namjerno ograničavaju vrlo velike bonuse brzine.
mir-prototype-quality-cap=Odabire hoće li MIR ostaviti samo ograničenja učinka kvalitete stroja ili će napisati novu pozitivnu granicu kvalitete. +100000% (nepromijenjeno) čuva postojeća ograničenja i ne mijenja razine kvalitete ili formule vjerojatnosti stavke.
mir-prototype-positive-power-floor=Zadano isključeno. Kada je omogućeno, MIR mijenja eksplicitne prototipove potrošnje aktivne energije od 0 W u 1 W tijekom učitavanja prototipa tako da se ikone upozorenja niske potrošnje ne pojavljuju na entitetima koji bi trebali privući malenu količinu različitu od nule. Zaustavite kako biste točno sačuvali prototipove nulte snage.
mir-settings-profile-import=Ovdje zalijepite niz profila postavki MIR-a kako biste primijenili izvezene vrijednosti postavki pokretanja kao sloj nadjačavanja tijekom generiranja prototipa. Ostavite prazno za normalne postavke. Izvezite s /mir-settings-export iz aktivnog spremanja, zatim ponovno pokrenite nakon promjene ove vrijednosti.
mir-debug-generation-report=Kada je omogućeno, zapisuje jedan strukturirani redak dnevnika po generiranom ili preskočenom toku i osnovnom proširenju, uključujući znanstvene pakete, preduvjete, broj učinaka, status kompatibilnosti laboratorija i izvor ikona.
mir-debug-recipe-matches=Kada je omogućeno, piše podudarne nazive recepata za svaki generirani tok produktivnosti. Ovo može biti bučno u velikim mod paketima.
mir-debug-scripted-effects=Kada je omogućeno, zapisuje unose u dnevnik izvođenja kada skriptirane tehnologije ponovno izračunavaju globalne učinke ili efekte vođene događajima.
mir-lab-incompatibility-policy=Odabire što MIR radi kada odabrane znanstvene pakete ne može istražiti niti jedan aktivni laboratorij.
ips-effect-per-level-stream=Postavlja primarni učinak osnovnog sloja po razini za __1__. Povezane kasnije razine i učinci skaliraju se proporcionalno. Postotni učinci koriste postotne bodove; efekti brojanja i udaljenosti koriste svoje izvorne jedinice.
mir-effect-per-level=Postavlja kanonski učinak po razini za beskonačni nastavak __1__. Povezani učinci skaliraju se proporcionalno u odnosu na konačnu baznu liniju vanile. Postotni učinci koriste postotne bodove; efekti brojanja i udaljenosti koriste svoje izvorne jedinice.
mir-note-experimental-spoilage=Eksperimentalno i onemogućeno prema zadanim postavkama u v2.1.0. Ovo je skriptirani efekt na globalnoj razini/na cijeloj karti. Postojeće ponašanje pokvarenog skupa ne zahtijeva se dok se ručno ne potvrdi.
mir-note-agriculture-growth=Odnosi se na novozasađene poljoprivredne usjeve. Postojeći zasađeni usjevi se ne mijenjaju.
mir-note-cargo-pad-count=Posebno istraživanje logistike svemirskog doba. Povećava podloge za slijetanje tereta po površini i može značajno promijeniti logističku ravnotežu.
mir-note-inserter-capacity=Onemogućeno prema zadanim postavkama. Dodatni kapacitet umetača može pokvariti umetke kontrolirane strujnim krugom i smanjiti optimizaciju motora.
mir-note-native-owner-managed-stream=Ako instalirana beskonačna tehnologija već posjeduje ovu obitelj istraživanja, te iste postavke pokretanja konfiguriraju tog vlasnika umjesto stvaranja duplikata. Nepromijenjene MIR zadane postavke točno čuvaju vlasnikov konačni prototip. Eksplicitna nadjačavanja cijene, vremena, maksimalne razine i učinka primjenjuju se samo nakon sigurnog podudaranja vlasnika; onemogućavanje streama ostavlja vanjsku tehnologiju netaknutom. Ponovno pokrenite Factorio nakon promjene postavki pokretanja. Maksimalna razina od 0 znači beskonačno, a vrijednosti učinka su postotni bodovi po razini.

