[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Nu realizează nicio descoperire, atașare sau creare automată. Cercetarea fixă ​​a MIR rămâne neschimbată.
mir-automatic-productivity-action-preview=Descoperă și clasifică candidații, apoi scrie deciziile acceptate și ignorate în jurnalul Factorio. Nu atașează rețete și nu creează cercetări.
mir-automatic-productivity-action-apply=Implicit. Descoperă candidați și atașează doar rețete dovedite în siguranță la cercetările MIR existente compatibile. Nu creează cercetare de la sine; cele două casete de selectare de mai jos guvernează crearea.
mir-automatic-compiler-mode-off=Echivalentul moștenit al Dezactivat.
mir-automatic-compiler-mode-report=Echivalentul vechi al modificărilor de previzualizare.
mir-automatic-compiler-mode-safe-attach=Echivalentul moștenit al Aplicați modificări sigure cu crearea cercetării dezactivată.
mir-automatic-compiler-mode-exact-pack=Echivalentul moștenit al Aplicați modificări sigure cu crearea cercetării activată și datele de compatibilitate revizuite sunt necesare.
mir-automatic-compiler-mode-safe-generate=Echivalentul moștenit al Aplicați modificări sigure cu crearea cercetării activată pentru furnizorii experimentali înregistrați.
mir-adjust-vanilla-weapon-speed-techs-off=Dezactivați curățarea bonusului de rachetă/tun suprapus opțional al MIR.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Eliminați bonusurile suprapuse de rachetă/tun ale MIR numai atunci când o tehnologie infinită activată și accesibilă oferă efectul de înlocuire exact.
mir-adjust-vanilla-weapon-speed-techs-always=Eliminați întotdeauna bonusurile de rachetă/tun care se suprapun MIR. Utilizați numai dacă doriți o separare strictă.
mir-science-pack-ingredient-policy-configured=Utilizați pachetele științifice configurate ale fiecărei tehnologii generate fără extinderea opțională a ingredientelor. MIR implicit.
mir-science-pack-ingredient-policy-space=Adăugați știința spațială atunci când este disponibilă. O simplă creștere a dificultății post-rachetă.
mir-science-pack-ingredient-policy-space-and-promethium=Adăugați spațiu și știință prometiu atunci când sunt disponibile. Cel mai bun pentru chiuvetele de cercetare din Epoca Spațială foarte târzie.
mir-science-pack-ingredient-policy-space-age-progression=Adăugați numai pachetele de progresie Space Age implicate de pachetele selectate. Nu adaugă pachete modificate fără legătură.
mir-science-pack-ingredient-policy-official-progression=Adăugați pachetele oficiale care lipsesc în stilul cerințelor preliminare, implicite de cel mai avansat pachet oficial deja selectat.
mir-science-pack-ingredient-policy-mod-progression=Adăugați pachetele compatibile cu laboratorul lipsă, deduse din progresia pachetului științific modificat și deblocați cerințele prealabile.
mir-science-pack-ingredient-policy-all-official=Utilizați fiecare bază oficială și pachetul științific al Epocii Spațiale care există în setul de mod actual.
mir-science-pack-ingredient-policy-all=Utilizați fiecare pachet științific activ compatibil cu laboratorul, inclusiv pachetele științifice modificate.
mir-lab-incompatibility-policy-reduce=Păstrați tehnologia reducând pachetele sale științifice la cel mai mare set acceptat de un laborator activ. Cel mai sigur implicit pentru pachetele de mod.
mir-lab-incompatibility-policy-skip=Omite tehnologia dacă niciun laborator activ nu poate cerceta setul de pachet științific selectat. Mai strict și mai ușor de auditat.
mir-lab-incompatibility-policy-engine-default=Nu rescrie niciodată setul de pachet științific selectat. MIR păstrează neschimbat un set care poate fi cercetat în siguranță și omite tehnologia generată atunci când Factorio nu poate cerceta acel set exact.
mir-prototype-productivity-cap-engine-default=Lăsați limita de productivitate existentă a fiecărei rețete. Rețetele fără un plafon personalizat folosesc limita normală de bonus de productivitate de +300% a Factorio.
mir-prototype-productivity-cap-percent-25=Setați limitele de productivitate a rețetei fără parametri la +25%. Acesta este un plafon strict de timpuriu.
mir-prototype-productivity-cap-percent-50=Setați limitele de productivitate a rețetei fără parametri la +50%. Aceasta este sub limita normală și face ca cercetarea productivității să nu mai ajute mai devreme.
mir-prototype-productivity-cap-percent-75=Setați limitele de productivitate ale rețetei fără parametri la +75%. Aceasta este sub limita normală și face ca cercetarea productivității să nu mai ajute mai devreme.
mir-prototype-productivity-cap-percent-100=Setați limitele de productivitate a rețetei fără parametri la +100%. Aceasta este sub limita normală și face ca cercetarea productivității să nu mai ajute mai devreme.
mir-prototype-productivity-cap-percent-125=Setați limitele de productivitate ale rețetei fără parametri la +125%.
mir-prototype-productivity-cap-percent-150=Setați limitele de productivitate a rețetei fără parametri la +150%.
mir-prototype-productivity-cap-percent-200=Setați limitele de productivitate a rețetei fără parametri la +200%. Aceasta este sub limita normală și face ca cercetarea productivității să nu mai ajute mai devreme.
mir-prototype-productivity-cap-percent-250=Setați limitele de productivitate ale rețetei fără parametri la +250%. Aceasta este puțin sub limita normală.
mir-prototype-productivity-cap-percent-400=Setați limitele de productivitate ale rețetei fără parametri la +400%. Acest lucru extinde scalarea productivității dincolo de limita normală.
mir-prototype-productivity-cap-percent-500=Setați limitele de productivitate a rețetei fără parametri la +500%. Acest lucru extinde scalarea productivității dincolo de limita normală.
mir-prototype-productivity-cap-percent-750=Setați limitele de productivitate ale rețetei fără parametri la +750%.
mir-prototype-productivity-cap-percent-1000=Setați limitele de productivitate ale rețetei fără parametri la +1000%. Utilizați pentru economii lungi acolo unde cercetarea productivității ar trebui să continue să conteze.
mir-prototype-productivity-cap-percent-2500=Setați limitele de productivitate ale rețetei fără parametri la +2500%. Utilizați pentru salvări foarte lungi.
mir-prototype-productivity-cap-percent-5000=Setați limitele de productivitate ale rețetei fără parametri la +5000%.
mir-prototype-productivity-cap-percent-10000=Setați limitele de productivitate ale rețetei fără parametri la +10000%. Utilizați numai pentru scalare extremă pe termen lung.
mir-prototype-productivity-cap-percent-25000=Setați limitele de productivitate a rețetei fără parametri la +25000%. Utilizați numai pentru scalare extremă pe termen lung.
mir-prototype-productivity-cap-percent-100000=Setați limitele de productivitate ale rețetei fără parametri la +100000%. Acest lucru este efectiv nelimitat pentru majoritatea salvărilor.
mir-recycling-return-chance-engine-default=Lăsați fiecare rețetă de reciclare neschimbată.
mir-recycling-return-chance-match-productivity-cap=Reducere automată sigură pentru exploatare pentru rețetele de reciclare generate ascunse. Utilizează 1 / (1 + bonus de productivitate), plafonat la randamentul normal de 25%: +400% devine 20% și +1000% devine aproximativ 9,09%.
mir-recycling-return-chance-percent-25=Păstrați rețetele de reciclare generate ascunse la returnarea normală a materialului de 25%.
mir-recycling-return-chance-percent-20=Scalați rețetele de reciclare generate ascunse la un randament de material de 20%.
mir-recycling-return-chance-percent-15=Scalați rețetele de reciclare generate ascunse la un randament de material de 15%.
mir-recycling-return-chance-percent-12-5=Scalați rețetele de reciclare generate ascunse la un randament de material de 12,5%.
mir-recycling-return-chance-percent-10=Scalați rețetele de reciclare generate ascunse la un randament de material de 10%.
mir-recycling-return-chance-percent-7-5=Scalați rețetele de reciclare generate ascunse la un randament de material de 7,5%.
mir-recycling-return-chance-percent-5=Scalați rețetele de reciclare generate ascunse la un randament de material de 5%.
mir-recycling-return-chance-percent-2-5=Scalați rețetele de reciclare generate ascunse la un randament de material de 2,5%.
mir-recycling-return-chance-percent-1=Scalați rețetele de reciclare generate ascunse la un randament de material de 1%.
mir-recycling-return-chance-percent-0-5=Scalați rețetele de reciclare generate ascunse la un randament de material de 0,5%.
mir-recycling-return-chance-percent-0-1=Scalați rețetele de reciclare generate ascunse la un randament de material de 0,1%.
mir-prototype-efficiency-cap-engine-default=Lăsați limita de efect al consumului de energie a fiecărei mașini. Aparatele fără o limită personalizată utilizează limita normală a efectului de utilizare a energiei de -80% a Factorio, astfel încât efectele nu pot reduce utilizarea activă sub 20%.
mir-prototype-efficiency-cap-saving-25=Scrieți un plafon de consum de energie de -25%. Utilizarea activă a energiei rămâne la 75% sau mai mult după efectele consumului de energie.
mir-prototype-efficiency-cap-saving-50=Scrieți un plafon de consum de energie de -50%. Utilizarea activă a energiei rămâne la 50% sau mai mult după efectele consumului de energie pe mașinile acceptate.
mir-prototype-efficiency-cap-saving-75=Scrieți un plafon de consum de energie de -75%. Utilizarea activă a energiei rămâne la 25% sau mai mult după efectele consumului de energie pe mașinile acceptate.
mir-prototype-efficiency-cap-saving-90=Scrieți un plafon de consum de energie de -90%. Consumul de energie activă poate scădea la 10%, ceea ce este sub nivelul normal de 20%.
mir-prototype-efficiency-cap-saving-95=Scrieți un plafon de consum de energie de -95%. Consumul de energie activă poate scădea la 5%.
mir-prototype-efficiency-cap-saving-99=Scrieți un plafon de consum de energie de -99%. Consumul de energie activă poate scădea la 1%.
mir-prototype-efficiency-cap-saving-999=Scrieți un plafon de consum de energie de -99,9%. Consumul de energie activă poate scădea la 0,1%.
mir-prototype-efficiency-cap-saving-9999=Scrieți un plafon de consum de energie de -99,99%. Aceasta este o utilizare de energie activă aproape de zero, nu o rescriere a prototipului cu putere zero.
mir-prototype-pollution-cap-engine-default=Lăsați limita de efect de poluare a fiecărei mașini. Mașinile fără o limită personalizată folosesc limita normală a efectului de poluare de -80% de la Factorio.
mir-prototype-pollution-cap-saving-25=Scrieți un plafon de poluare de -25%. Poluarea rămâne la 75% sau mai mult după efectele poluării.
mir-prototype-pollution-cap-saving-50=Scrieți un plafon de poluare de -50%. Poluarea rămâne la 50% sau mai mult după efectele poluării asupra mașinilor suportate.
mir-prototype-pollution-cap-saving-75=Scrieți un plafon de poluare de -75%. Poluarea rămâne la 25% sau mai mult după efectele poluării asupra mașinilor suportate.
mir-prototype-pollution-cap-saving-90=Scrieți un plafon de poluare de -90%. Poluarea poate scădea la 10%, ceea ce este sub nivelul normal de 20%.
mir-prototype-pollution-cap-saving-95=Scrieți un plafon de poluare de -95%. Poluarea poate scădea la 5%.
mir-prototype-pollution-cap-saving-99=Scrieți un plafon de poluare de -99%. Poluarea poate scădea la 1%.
mir-prototype-pollution-cap-saving-999=Scrieți un plafon de poluare de -99,9%. Poluarea poate scădea la 0,1%.
mir-prototype-pollution-cap-saving-9999=Scrieți un plafon de poluare de -99,99%. Acesta este o poluare aproape de zero, nu un script de poluare în timpul rulării.
mir-prototype-speed-floor-engine-default=Lăsați limita de viteză negativă a fiecărei mașini în pace. Mașinile fără limită personalizată folosesc podeaua normală de -80% a lui Factorio și păstrează viteza de cel puțin 20%.
mir-prototype-speed-floor-saving-25=Fixați efectele negative ale vitezei la -25%, lăsând cel puțin 75% viteză.
mir-prototype-speed-floor-saving-50=Fixați efectele negative ale vitezei la -50%, lăsând cel puțin 50% viteză.
mir-prototype-speed-floor-saving-75=Fixați efectele negative ale vitezei la -75%, lăsând cel puțin 25% viteză.
mir-prototype-speed-floor-saving-90=Permite efecte negative de viteză până la -90%, lăsând viteza de cel puțin 10%.
mir-prototype-speed-floor-saving-95=Permite efecte negative de viteză până la -95%, lăsând viteza de cel puțin 5%.
mir-prototype-speed-floor-saving-99=Permite efecte negative de viteză până la -99%, lăsând viteza de cel puțin 1%.
mir-prototype-speed-floor-saving-999=Permite efecte negative de viteză până la -99,9%, lăsând viteza de cel puțin 0,1%.
mir-prototype-speed-floor-saving-9999=Permite efecte negative de viteză până la -99,99%, cea mai mică limită a prototipului Factorio. Aceasta este o viteză de fabricare aproape de oprire, nu zero sau negativă.
mir-prototype-speed-cap-engine-default=Lăsați limita de viteză a fiecărei mașini în pace. Mașinile fără limită personalizată folosesc plafonul foarte mare cu efect de viteză de +100000% al Factorio.
mir-prototype-speed-cap-bonus-25=Fixați efectele pozitive ale vitezei la +25%.
mir-prototype-speed-cap-bonus-50=Fixați efectele pozitive ale vitezei la +50%. Folosește-l pentru a menține strâns delimitate bonusurile de viteză.
mir-prototype-speed-cap-bonus-75=Fixați efectele pozitive ale vitezei la +75%.
mir-prototype-speed-cap-bonus-100=Fixați efectele pozitive ale vitezei la +100%.
mir-prototype-speed-cap-bonus-125=Fixați efectele pozitive ale vitezei la +125%.
mir-prototype-speed-cap-bonus-150=Fixați efectele pozitive ale vitezei la +150%.
