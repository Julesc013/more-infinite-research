[technology-description]
more-infinite-research.recipe_productivity=Mărește productivitatea rețetelor pentru rețetele selectate. Limita maximă de productivitate a Factorio încă se aplică; nivelurile infinite suplimentare pot să nu aibă efect practic odată ce o rețetă își atinge limita.
more-infinite-research.direct_effect=Adaugă un bonus repetabil infinit. Pachetele științifice sunt selectate din laboratoarele active, astfel încât tehnologia rămâne cercetabilă cu seturi de mod compatibile.
more-infinite-research.cargo_bay_unloading_distance=Mărește distanța maximă dintre o platformă de aterizare a mărfii și stațiile de descărcare conectate.
more-infinite-research.cargo_landing_pad_count=Mărește numărul de platforme de aterizare de marfă pe care fiecare forță le poate construi pe suprafață.
more-infinite-research.flamethrower_shooting_speed=Mărește viteza de tragere pentru armele aruncătoare de flăcări și turnulele aruncătoare de flăcări.
more-infinite-research.electric_shooting_speed=Mărește viteza de tragere pentru armele electrice. În vanilie, acest lucru afectează apărarea împotriva scurgerii; cu Space Age, afectează și armele Tesla atunci când categoria de muniție Tesla este disponibilă.
more-infinite-research.spoilage_preservation=Mărește modificatorul global al timpului de distrugere printr-un efect de script limitat. Articolele spoilabile existente își pot păstra termenele limită actuale până la testare în joc.
more-infinite-research.agricultural_growth_speed=Scurtă timpul de creștere rămas pentru plantele turn agricole nou plantate printr-un efect de script limitat.
more-infinite-research.lab_productivity=Mărește progresul în cercetare obținut din fiecare pachet științific consumat, folosind modificatorul nativ de productivitate a cercetării de laborator.

