[mod-setting-description]
ips-require-space-gate=Când sunt activate, aceste tehnologii rămân blocate până când știința spațială este cercetată în vanilie sau știința promethium este cercetată în epoca spațială.
mir-science-pack-ingredient-policy=Alege modul în care MIR adaugă pachete științifice la tehnologiile generate. Opțiunile sunt ordonate de la conservator la larg: pachete implicite, pachete de joc târziu, pachete bazate pe progresie, apoi toate pachetele disponibile.
mir-automatic-productivity-action=Alege ceea ce face MIR cu oportunitățile de productivitate sigure găsite în rețetele de mod instalat. Dezactivat nu efectuează nicio descoperire automată. Previzualizați înregistrările modificărilor acceptate și ignorate în jurnalul Factorio fără a modifica cercetarea. Aplicați modificări sigure (implicit) adaugă rețete eligibile numai cercetărilor MIR existente compatibile. Aceasta controlează acțiunea, nu puterea sau maturitatea; casetele de selectare de creare de mai jos sunt separate. Verificările privind proprietatea, reciclarea, probabilitatea, catalizatorul, știința, laboratorul, condiția prealabilă, ținta, identitatea, progresia și ciclul se aplică întotdeauna.
mir-automatic-create-research=Implicit: dezactivat. Off limits Aplicați modificări sigure cercetărilor MIR existente compatibile; candidații fără un flux adecvat sunt ignorați și raportați. Activat permite unui furnizor înregistrat eligibil să creeze o tehnologie de productivitate infinită generică stabilă atunci când nu se potrivește nicio cercetare existentă. Caseta de selectare a datelor examinate de mai jos decide dacă furnizorii experimentali sunt eligibili. MIR nu creează niciodată o singură tehnologie per mod sau rețetă, iar fiecare siguranță, știință, proprietate, identitate, progresie și poartă de ciclu se aplică în continuare.
mir-automatic-require-reviewed-data=Implicit: activat. Acest lucru contează numai când Permite crearea de noi cercetări este activată; nu blochează niciodată atașarea sigură la cercetarea existentă. Pe permise, numai familiile de furnizori marcate ca revizuite și susținute de dovezi aplicabile pentru versiunea exactă, astfel încât familiile experimentale sunt ignorate. Off permite furnizorilor experimentali înregistrați să creeze din dovezi structurale generice. Pentru cel mai larg comportament experimental, activați crearea cercetării și dezactivați această cerință. Nicio valoare nu poate ocoli o poartă de siguranță dură.
mir-automatic-compiler-mode=Punte de compatibilitate ascunsă pentru profilurile create înainte de divizarea controalelor automate de productivitate. O valoare moștenită care nu este implicită este respectată numai în timp ce toate comenzile noi rămân la valorile implicite. Schimbați orice control nou pentru a prelua controlul explicit.
ips-enable-stream=Creează tehnologia infinită generată pentru __1__ atunci când rețetele, efectele, cerințele preliminare și pachetele științifice ale acesteia sunt disponibile. Dezactivați acest lucru pentru a împiedica MIR să genereze această tehnologie.
ips-cost-base-stream=Unități de cercetare necesare pentru primul nivel generat de __1__. Trebuie să fie cel puțin 1. Nivelurile ulterioare sunt calculate din această valoare și factorul de creștere a costurilor.
ips-cost-growth-stream=Multiplicator aplicat fiecărui nivel ulterior al __1__. Utilizați 1 pentru costuri fixe, 1,5 pentru o creștere de 50% pe nivel sau 2 pentru dublarea costurilor.
ips-max-level-stream=Cel mai înalt nivel generat pentru __1__. Setați la 0 pentru niveluri infinite.
ips-research-time-stream=Secunde per unitate de cercetare pentru __1__. Setați la 0 pentru a utiliza valoarea implicită a MIR pentru această tehnologie. Acesta nu este timpul total de cercetare; timpul total depinde și de costul cercetării, numărul de laboratoare, viteza de laborator și module.
mir-enable-base-tech=Permite lui __1__ să continue dincolo de capacul de vanilie ca o tehnologie infinită. Dezactivați acest lucru dacă doriți ca MIR să adauge noi linii de cercetare fără a extinde acest lanț de vanilie.
mir-cost-base=Unități de cercetare necesare pentru primul nivel de continuare MIR de __1__. Setați la 0 pentru a moșteni modelul de cost al lanțului de vanilie atunci când este posibil.
mir-cost-growth=Multiplicator aplicat fiecărui nivel de continuare MIR ulterior de __1__. Setați la 0 pentru a moșteni modelul de creștere al lanțului de vanilie atunci când este posibil.
mir-max-level=Cel mai înalt nivel de continuare MIR pentru __1__. Setați la 0 pentru niveluri infinite.
mir-research-time=Secunde per unitate de cercetare pentru continuarea MIR a __1__. Setați la 0 pentru a moșteni timpul unității de cercetare a lanțului de vanilie atunci când este posibil.
mir-prefer-this-mod-for-competing-techs=Când este activat, acest mod elimină extensiile infinite concurente selectate și folosește propriile versiuni. Dezactivați pentru a păstra versiunile concurente de la alte moduri.
mir-adjust-vanilla-weapon-speed-techs=Controlează dacă MIR elimină bonusurile de viteză ale rachetelor și ale tunului din continuarea vitezei de tragere a armei generate atunci când este disponibilă o acoperire exactă de înlocuire infinită. Tehnologiile de viteză de tragere cu arme de vanilie finite își păstrează bonusurile originale.
mir-use-installed-space-age-icons=Când este activat, MIR poate face referire la fișierele de pictograme DLC oficiale instalate, inclusiv Space Age și Elevated Rails, chiar și atunci când acele moduri sunt dezactivate pentru rularea jocului de bază. Lăsați această opțiune dacă acele fișiere DLC nu sunt instalate; Factorio nu se poate recupera cu grație din fișierele pictograme lipsă în timpul încărcării prototipului.
mir-pipeline-extent-multiplier=Multiplicator derulant numai pentru pornire pentru câmpurile de extindere a conductei cutiei de fluide recunoscute pe prototipuri, nu numai entități de conducte. 100% lasă prototipurile neschimbate și nu încarcă trecerea conductei sau scanează cutiile de fluide. Valorile non-100% sunt experimentale și pot afecta mașinile, tancurile, propulsoarele și prototipurile modificate care definesc cutiile de fluide.
mir-unrestricted-modules=Experimental și de rupere a echilibrului. Când este activată, fiecare rețetă existentă acceptă toate cele cinci efecte de modul și fiecare receptor de modul existent cu sloturi acceptă fiecare categorie de module descoperită. Acest lucru nu adaugă sloturi pentru module sau nu modifică prototipurile de module și poate activa productivitatea, calitatea și buclele de module modificate.
mir-prototype-productivity-cap=Alege dacă MIR lasă limitele de productivitate ale rețetei în pace sau scrie un plafon de pornire pentru fiecare rețetă fără parametri și fără reciclare. +300% (neschimbat) păstrează limitele de rețetă existente; valorile mai mici scurtează scalarea productivității, în timp ce valorile mai mari o extind.
mir-recycling-return-chance=Controlează numai rețetele de reciclare generate ascunse. Modul automat reduce returnarea normală a materialului de 25% la cel mult 1 împărțit la multiplicatorul total de producție la limita de productivitate selectată. Opțiunile fixe scalează direct aceleași randamente generate. Procesele vizibile și limitele de productivitate ale rețetelor nu sunt niciodată modificate.
mir-productivity-cap-self-recycling-only=Peste 1/retur reciclator - 1, numai rețetele de producție cu o cale de auto-reciclare negenerativă dovedită primesc limita mai mare selectată. La sau sub acel prag, această casetă de selectare nu are niciun efect. Motorul neschimbat folosește randamentul normal de 25% ca un prag conservator de +300% fără a modifica rețetele de reciclare.
mir-prototype-efficiency-cap=Alege în ce măsură efectele de eficiență pot reduce consumul de energie activ al mașinii. -80% (neschimbat) lasă numai limitele existente de utilizare a energiei. Reduceri mai profunde se pot apropia de zero consumul de energie activă fără a modifica limitele de poluare.
mir-prototype-pollution-cap=Alege în ce măsură efectele de reducere a poluării pot reduce poluarea mașinii. -80% (neschimbat) lasă în pace limitele de poluare existente. Reduceri mai profunde se pot apropia de zero poluare fără a modifica utilizarea energiei.
mir-prototype-speed-floor=Alege cât de mult pot încetini efectele negative ale vitezei mașinile acceptate. -80% (neschimbat) lasă în pace limitele existente; valorile mai profunde îndepărtează podeaua normală până la o oprire aproape de -99,99%.
mir-prototype-speed-cap=Alege dacă MIR lasă numai limitele efectului de viteză al mașinii sau scrie o nouă limită de viteză pozitivă. +100000% (neschimbat) păstrează limitele existente; valorile mai mici blochează în mod intenționat bonusurile de viteză foarte mari.
mir-prototype-quality-cap=Alege dacă MIR lasă limitele efectului de calitate al mașinii sau scrie un nou plafon de calitate pozitiv. +100000% (neschimbat) păstrează limitele existente și nu modifică nivelurile de calitate sau formulele de probabilitate a articolului.
mir-prototype-positive-power-floor=Dezactivat implicit. Când este activat, MIR schimbă prototipurile de consum de energie activă de 0W la 1W în timpul încărcării prototipului, astfel încât pictogramele de avertizare de consum redus să nu apară pe entitățile care ar trebui să atragă o cantitate mică diferită de zero. Opriți pentru a păstra exact prototipurile cu putere zero.
mir-settings-profile-import=Lipiți aici un șir de profil de setări MIR pentru a aplica valorile exportate ale setărilor de pornire ca strat de înlocuire în timpul generării prototipului. Lăsați necompletat pentru setările normale. Exportați cu /mir-settings-export dintr-o salvare activă, apoi reporniți după modificarea acestei valori.
mir-debug-generation-report=Când este activat, scrie un rând de jurnal structurat pentru fiecare flux generat sau omis și extensie de bază, inclusiv pachete științifice, cerințe preliminare, numărul de efecte, starea de compatibilitate a laboratorului și sursa de pictograme.
mir-debug-recipe-matches=Când este activat, scrie numele rețetelor potrivite pentru fiecare flux de productivitate generat. Acest lucru poate fi zgomotos în pachetele mari de mod.
mir-debug-scripted-effects=Când este activat, scrie intrări în jurnalul de rulare atunci când tehnologiile scriptate recalculează efectele globale sau bazate pe evenimente.
mir-lab-incompatibility-policy=Alege ce face MIR atunci când pachetele științifice selectate nu pot fi cercetate de niciun laborator activ.
ips-effect-per-level-stream=Setează efectul de nivel de bază primar pe nivel pentru __1__. Nivelurile și efectele ulterioare asociate sunt scalate proporțional. Efectele procentuale folosesc puncte procentuale; efectele de numărare și distanță își folosesc unitățile native.
mir-effect-per-level=Setează efectul canonic pe nivel pentru continuarea infinită __1__. Efectele asociate sunt scalate proporțional față de linia de bază finală de vanilie. Efectele procentuale folosesc puncte procentuale; efectele de numărare și distanță își folosesc unitățile native.
mir-note-experimental-spoilage=Experimental și dezactivat implicit în v2.1.0. Acesta este un efect de script global/la nivel de hartă. Comportamentul de stivă stricat existent nu este revendicat până când nu este validat manual.
mir-note-agriculture-growth=Se aplică culturilor turn agricole nou plantate. Culturile plantate existente nu sunt redimensionate.
mir-note-cargo-pad-count=Cercetare logistică în Epoca Spațială Specială. Mărește platformele de aterizare a mărfurilor pe suprafață și poate schimba substanțial echilibrul logistic.
mir-note-inserter-capacity=Dezactivat implicit. Capacitatea suplimentară a dispozitivului de inserare poate rupe dispozitivele de inserție controlate de circuite și poate reduce optimizările motorului.
mir-note-native-owner-managed-stream=Dacă o tehnologie infinită instalată deține deja această familie de cercetare, aceleași setări de pornire configurează acel proprietar în loc să creeze un duplicat. Valorile implicite MIR neschimbate păstrează exact prototipul final al proprietarului. Costurile explicite, timpul, nivelul maxim și anulările efectului se aplică numai după o potrivire sigură a proprietarului; dezactivarea fluxului lasă tehnologia externă neatinsă. Reporniți Factorio după modificarea setărilor de pornire. Un nivel maxim de 0 înseamnă infinit, iar valorile efectului sunt puncte procentuale pe nivel.

