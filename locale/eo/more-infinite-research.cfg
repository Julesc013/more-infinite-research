[mod-setting-description]
ips-require-space-gate=Kiam ili estas ebligitaj, ĉi tiuj teknologioj restas ŝlositaj ĝis kosmoscienco estas esplorita en vanilo, aŭ prometioscienco estas esplorita en Spaca Epoko.
mir-science-pack-ingredient-policy=Elektas kiel MIR aldonas sciencajn pakaĵojn al generitaj teknologioj. Opcioj estas ordigitaj de konservativa al larĝa: defaŭltaj pakoj, malfruludaj pakoj, progresi-bazitaj pakoj, tiam ĉiuj disponeblaj pakoj.
mir-automatic-productivity-action=Elektas kion MIR faras kun sekuraj produktivecaj ŝancoj trovitaj en instalitaj mod-receptoj. Malŝaltita faras neniun aŭtomatan malkovron. Antaŭrigardu ŝanĝajn registrojn akceptitajn kaj preterlasitajn kandidatojn en la registro de Factorio sen ŝanĝi esploradon. Apliki sekurajn ŝanĝojn (defaŭlte) aldonas elekteblajn receptojn nur al kongrua ekzistanta MIR-esplorado. Ĉi tio kontrolas agon, ne forton aŭ maturecon; la kreaj markobutonoj malsupre estas apartaj. Posedo, reciklado, probablo, katalizilo, scienco, laboratorio, antaŭkondiĉo, celo, identeco, progresado kaj ciklokontroloj ĉiam validas.
mir-automatic-create-research=Defaŭlte: malŝaltita. Eksterlimoj Apliki sekurajn ŝanĝojn al kongrua ekzistanta MIR-esplorado; kandidatoj sen taŭga fluo estas preterlasitaj kaj raportitaj. On permesas al elektebla registrita provizanto krei unu stabilan senfinan produktivecan teknologion kiam neniu ekzistanta esplorado taŭgas. La markobutono de reviziitaj datumoj malsupre decidas ĉu eksperimentaj provizantoj estas elekteblaj. MIR neniam kreas unu teknologion per mod aŭ recepto, kaj ĉiu malfacila sekureco, scienco, posedo, identeco, progresado kaj ciklopordego ankoraŭ validas.
mir-automatic-require-reviewed-data=Defaŭlte: ŝaltita. Ĉi tio gravas nur kiam Permesi novan esplorkreadon estas ŝaltita; ĝi neniam blokas sekuran alligitecon al ekzistanta esplorado. Sur permesoj nur provizantaj familioj markitaj reviziitaj kaj subtenataj de uzeblaj ekzaktaj versioj, do eksperimentaj familioj estas preterlasitaj. Off permesas registritajn eksperimentajn provizantojn krei el senmarka struktura indico. Por la plej larĝa eksperimenta konduto, ebligu esplorkreadon kaj malŝaltu ĉi tiun postulon. Neniu valoro povas preteriri malmolan sekurecan pordegon.
mir-automatic-compiler-mode=Kaŝita kongrua ponto por profiloj kreitaj antaŭ la dividitaj aŭtomataj produktivecaj kontroloj. Ne-defaŭlta hereda valoro estas honorita nur dum ĉiuj novaj kontroloj restas ĉe siaj defaŭltaj. Ŝanĝu ajnan novan kontrolon por preni eksplicitan kontrolon.
ips-enable-stream=Kreas la generitan senfinan teknologion por __1__ kiam ĝiaj receptoj, efikoj, antaŭkondiĉoj kaj sciencaj pakoj estas disponeblaj. Malebligu ĉi tion por malhelpi MIR generi ĉi tiun teknologion.
ips-cost-base-stream=Esplorunuoj necesaj por la unua generita nivelo de __1__. Devas esti almenaŭ 1. Pli postaj niveloj estas kalkulitaj el ĉi tiu valoro kaj la kost-kreskfaktoro.
ips-cost-growth-stream=Multobligilo aplikata al ĉiu posta nivelo de __1__. Uzu 1 por plataj kostoj, 1.5 por 50% kresko per nivelo, aŭ 2 por duobligi kostojn.
ips-max-level-stream=Plej alta generita nivelo por __1__. Agordu al 0 por senfinaj niveloj.
ips-research-time-stream=Sekundoj por esplorunuo por __1__. Agordu al 0 por uzi la defaŭlton de MIR por ĉi tiu teknologio. Ĉi tio ne estas tuta esplortempo; totala tempo ankaŭ dependas de esplorkosto, laboratoriokalkulo, laboratoriorapideco, kaj moduloj.
mir-enable-base-tech=Permesas al __1__ daŭri preter ĝia vanila ĉapo kiel senfina teknologio. Malebligu ĉi tion se vi volas, ke MIR aldonu novajn esplorliniojn sen etendi ĉi tiun vanilan ĉenon.
mir-cost-base=Esplorunuoj necesaj por la unua MIR-daŭriga nivelo de __1__. Agordu al 0 por heredi la kostan ŝablonon de la vanila ĉeno kiam eblas.
mir-cost-growth=Multobligilo aplikita al ĉiu pli posta MIR-daŭriga nivelo de __1__. Agordu al 0 por heredi la kreskan ŝablonon de la vanila ĉeno kiam eblas.
mir-max-level=Plej alta MIR-daŭriga nivelo por __1__. Agordu al 0 por senfinaj niveloj.
mir-research-time=Sekundoj per esplorunuo por la MIR-daŭrigo de __1__. Agordu al 0 por heredi la esploran unuotempon de la vanila ĉeno kiam eblas.
mir-prefer-this-mod-for-competing-techs=Kiam ĝi estas ebligita, ĉi tiu modo forigas elektitajn konkurantajn senfinajn etendaĵojn kaj uzas siajn proprajn versiojn. Malebligu konservi konkurantajn versiojn de aliaj modoj.
mir-adjust-vanilla-weapon-speed-techs=Kontrolas ĉu MIR forigas raketajn kaj kanonŝelajn rapidecgratifikojn de ĝia generita pafadrapideco-daŭrigo kiam preciza senfina anstataŭiga priraportado estas disponebla. Finhavaj teknologioj pri pafado de vanila armilo konservas siajn originalajn gratifikojn.
mir-use-installed-space-age-icons=Kiam ĝi estas ebligita, MIR povas referenci instalitajn oficialajn DLC-ikonodosierojn, inkluzive de Space Age kaj Elevated Rails, eĉ kiam tiuj modoj estas malŝaltitaj por bazluda kuro. Lasu ĉi tion for se tiuj DLC-dosieroj ne estas instalitaj; Factorio ne povas gracie resaniĝi de mankantaj ikondosieroj dum prototipa ŝarĝo.
mir-pipeline-extent-multiplier=Nur-komenca falmenumultiplikato por agnoskitaj fluaĵkesto-dukto-amplekso-kampoj trans prototipoj, ne nur pipaj entoj. 100% lasas prototipojn senŝanĝaj kaj ne ŝarĝas la duktopason aŭ skanas fluidajn skatolojn. Ne-100% valoroj estas eksperimentaj kaj povas influi maŝinojn, tankojn, repuŝojn kaj modditajn prototipojn, kiuj difinas fluidajn skatolojn.
mir-unrestricted-modules=Eksperimenta kaj ekvilibra. Kiam ĝi estas ebligita, ĉiu ekzistanta recepto akceptas ĉiujn kvin modulefikojn kaj ĉiu ekzistanta modulricevilo kun fendoj akceptas ĉiun malkovritan modulkategorion. Ĉi tio ne aldonas modulfendetojn aŭ ŝanĝas modulprototipojn, kaj eble ebligas produktivecon, kvaliton kaj modmodulajn buklojn.
mir-prototype-productivity-cap=Elektas ĉu MIR lasas receptajn produktivemajn ĉapojn sole aŭ skribas komencan ĉapon al ĉiu ne-parametro, ne-reciklada recepto. +300% (senŝanĝe) konservas ekzistantajn receptajn ĉapojn; pli malaltaj valoroj mallongigas produktivecskalon, dum pli altaj valoroj etendas ĝin.
mir-recycling-return-chance=Kontrolas kaŝitajn generitajn reciklajn receptojn nur. Aŭtomata reĝimo reduktas la normalan 25% materialan revenon al maksimume 1 dividita per la totala produktaĵmultiplikato ĉe la elektita produktiveca limo. Fiksaj elektoj skalas la samajn generitajn revenojn rekte. Videblaj procezoj kaj receptaj produktivecaj ĉapoj neniam estas ŝanĝitaj.
mir-productivity-cap-self-recycling-only=Super 1/reciklilo-reveno - 1, nur produktadreceptoj kun pruvita negenerativa mem-recikla vojo ricevas la elektitan pli altan ĉapon. Je aŭ sub tiu sojlo ĉi tiu markobutono ne efikas. Motoro senŝanĝa uzas la normalan 25% revenon kiel konservativa +300% sojlo sen ŝanĝi reciklajn receptojn.
mir-prototype-efficiency-cap=Elektas kiom efikefikoj povas redukti aktivan maŝinan energiuzon. -80% (senŝanĝe) lasas ekzistantajn energiuzolimojn sole. Pli profundaj reduktoj povas alproksimiĝi al nula aktiva energiuzo sen ŝanĝado de poluolimoj.
mir-prototype-pollution-cap=Elektas kiom malpurigo-reduktaj efikoj povas redukti maŝinpoluadon. -80% (senŝanĝe) lasas ekzistantajn poluajn limojn sole. Pli profundaj reduktoj povas alproksimiĝi al nula poluo sen ŝanĝi energiouzon.
mir-prototype-speed-floor=Elektas kiom malrapide negativaj rapidecaj efikoj povas malrapidigi subtenatajn maŝinojn. -80% (senŝanĝe) lasas ekzistantajn limojn solaj; pli profundaj valoroj forigas la normalan plankon malsupren al preskaŭ-halto ĉe -99.99%.
mir-prototype-speed-cap=Elektas ĉu MIR lasas maŝinajn rapid-efikajn limojn sole aŭ skribas novan pozitivan rapideclimon. +100000% (senŝanĝa) konservas ekzistantajn limojn; pli malaltaj valoroj intence krampo tre grandaj rapido gratifikoj.
mir-prototype-quality-cap=Elektas ĉu MIR lasas maŝinajn kvalit-efektajn limojn sole aŭ skribas novan pozitivan kvalitan limon. +100000% (senŝanĝa) konservas ekzistantajn limojn kaj ne ŝanĝas kvalitajn nivelojn aŭ eron-probabloformulojn.
mir-prototype-positive-power-floor=Defaŭlte malŝaltita. Kiam ĝi estas ebligita, MIR ŝanĝas eksplicitajn 0W aktivajn energy_usage-prototipojn al 1W dum prototipa ŝarĝo tiel ke malalt-potencaj avertaj ikonoj ne aperu sur estaĵoj kiuj devus ĉerpi etan ne-nulan kvanton. Forlasu por konservi nul-potencajn prototipojn ĝuste.
mir-settings-profile-import=Algluu MIR-agordan profilŝnuron ĉi tie por apliki eksportitajn start-agordajn valorojn kiel anstataŭan tavolon dum prototipgenerado. Lasu malplena por normalaj agordoj. Eksportu per /mir-settings-export de aktiva konservado, tiam rekomencu post ŝanĝo de ĉi tiu valoro.
mir-debug-generation-report=Kiam ĝi estas ebligita, skribas unu strukturitan protokolvicon per generita aŭ preterlasita rivereto kaj baza etendo, inkluzive de sciencaj pakoj, antaŭkondiĉoj, efektokalkulo, laboratorio-kongruostatuso kaj ikonfonto.
mir-debug-recipe-matches=Kiam ĝi estas ebligita, skribas kongruajn receptnomojn por ĉiu generita produktiveca fluo. Ĉi tio povas esti brua en grandaj mod pakoj.
mir-debug-scripted-effects=Kiam ĝi estas ebligita, skribas rultempajn protokolojn kiam skriptitaj teknologioj rekalkulas tutmondajn aŭ okazaĵajn efikojn.
mir-lab-incompatibility-policy=Elektas kion faras MIR kiam la elektitaj sciencaj pakoj ne povas esti esploritaj de iu ajn aktiva laboratorio.
ips-effect-per-level-stream=Agordas la ĉefan baznivelan efikon per nivelo por __1__. Rilataj pli postaj partoj kaj efikoj estas proporcie skalitaj. Procentaj efikoj uzas procentpunktojn; kalkulo kaj distancaj efikoj uzas siajn denaskajn unuojn.
mir-effect-per-level=Agordas la kanonan po-nivelan efikon por la senfina __1__ daŭrigo. Rilataj efikoj estas skalitaj proporcie de la fina vanila bazlinio. Procentaj efikoj uzas procentpunktojn; kalkulo kaj distancaj efikoj uzas siajn denaskajn unuojn.
mir-note-experimental-spoilage=Eksperimenta kaj malebligita defaŭlte en v2.1.0. Ĉi tio estas tutmonda/mapa skriba efiko. Ekzistanta difektebla-staka konduto ne estas asertita ĝis mane validigita.
mir-note-agriculture-growth=Validas por nove plantitaj agrikulturaj turkultivaĵoj. Ekzistantaj plantitaj kultivaĵoj ne estas reskaligitaj.
mir-note-cargo-pad-count=Loĝistikesplorado de Speciala Spaca Epoko. Pliigas ŝarĝajn surterigejojn per surfaco kaj povas konsiderinde ŝanĝi loĝistikan ekvilibron.
mir-note-inserter-capacity=Malŝaltita defaŭlte. Ekstra enigaĵkapacito povas rompi cirkvit-kontrolitajn enmetilojn kaj redukti motoroptimumigojn.
mir-note-native-owner-managed-stream=Se instalita senfina teknologio jam posedas ĉi tiun esploran familion, ĉi tiuj samaj startaj agordoj agordas tiun posedanton anstataŭ krei duplikaton. Senŝanĝaj MIR-defaŭltoj konservas la finan prototipon de la posedanto precize. Eksplicita kosto, tempo, maksimuma nivelo, kaj efekto superregoj validas nur post sekura posedanto matĉo; malŝalti la rivereton lasas la eksteran teknologion netuŝita. Rekomencu Factorion post ŝanĝo de lanĉaj agordoj. Maksimuma nivelo de 0 signifas senfinan, kaj efikvaloroj estas procentaj punktoj per nivelo.

