[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Faras neniun aŭtomatan malkovron, aldonaĵon aŭ kreadon. La fiksa esplorado de MIR restas senŝanĝa.
mir-automatic-productivity-action-preview=Malkovras kaj klasifikas kandidatojn, poste skribas akceptitajn kaj preterlasitajn decidojn al la registro de Factorio. Ĝi ne aldonas receptojn aŭ kreas esploradon.
mir-automatic-productivity-action-apply=Defaŭlte. Malkovras kandidatojn kaj ligas nur sekurec-pruvitajn receptojn al kongrua ekzistanta MIR-esplorado. Ĝi ne kreas esploron per si mem; la du markobutonoj malsupre regas kreadon.
mir-automatic-compiler-mode-off=Heredaĵo ekvivalento de Disabled.
mir-automatic-compiler-mode-report=Heredaĵo ekvivalento de Antaŭrigardaj ŝanĝoj.
mir-automatic-compiler-mode-safe-attach=Heredaĵo ekvivalento de Apliki sekurajn ŝanĝojn kun esplorkreado malŝaltita.
mir-automatic-compiler-mode-exact-pack=Heredaĵo ekvivalento de Apliki sekurajn ŝanĝojn kun esplorkreado ebligita kaj reviziitaj kongruaj datumoj necesaj.
mir-automatic-compiler-mode-safe-generate=Heredaĵo ekvivalento de Apliki sekurajn ŝanĝojn kun esplorkreado ebligita por registritaj eksperimentaj provizantoj.
mir-adjust-vanilla-weapon-speed-techs-off=Malebligu la laŭvolan superkovritan raketon/kanonan bonuspurigon de MIR.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Forigu la interkovrajn raketojn/kanonajn gratifikojn de MIR nur kiam ebligita, atingebla senfina teknologio provizas la ĝustan anstataŭan efikon.
mir-adjust-vanilla-weapon-speed-techs-always=Ĉiam forigu la supermetitajn raketojn/kanonajn gratifikojn de MIR. Uzu nur se vi volas striktan apartigon.
mir-science-pack-ingredient-policy-configured=Uzu la agorditajn sciencajn pakojn de ĉiu generita teknologio sen laŭvola ingredienca ekspansio. MIR defaŭlta.
mir-science-pack-ingredient-policy-space=Aldonu spacan sciencon kiam disponeblas. Simpla post-raketa malfacileco pliiĝo.
mir-science-pack-ingredient-policy-space-and-promethium=Aldonu spacon kaj prometion sciencon kiam disponeblas. Plej bone por tre malfruaj spac-epokaj esplorlavujoj.
mir-science-pack-ingredient-policy-space-age-progression=Aldonu nur progresajn pakojn de la Spaca Epoko implicitaj de la elektitaj pakoj. Ne aldonas senrilatajn modifitajn pakojn.
mir-science-pack-ingredient-policy-official-progression=Aldonu mankantajn oficialajn antaŭkondiĉajn pakaĵojn implicitajn de la plej altnivela oficiala pako jam elektita.
mir-science-pack-ingredient-policy-mod-progression=Aldonu mankantajn laboratorikongruajn pakaĵojn konkludite el modifita sciencpaka progresado kaj malŝlosu antaŭkondiĉojn.
mir-science-pack-ingredient-policy-all-official=Uzu ĉiun oficialan bazon kaj sciencan pakaĵon de la Spaca Epoko kiu ekzistas en la nuna modifaro.
mir-science-pack-ingredient-policy-all=Uzu ĉiun aktivan laboratorio-kongruan sciencan pakaĵon, inkluzive de modifitaj sciencaj pakoj.
mir-lab-incompatibility-policy-reduce=Konservu la teknologion reduktante ĝiajn sciencajn pakojn al la plej granda aro akceptita de aktiva laboratorio. Plej sekura defaŭlto por mod pakoj.
mir-lab-incompatibility-policy-skip=Preterpasu la teknologion se neniu aktiva laboratorio povas esplori sian elektitan sciencpakaĵon. Pli strikta kaj pli facile auditebla.
mir-lab-incompatibility-policy-engine-default=Neniam reverku la elektitan sciencpakaĵon. MIR konservas sekure esploreblan aron senŝanĝa kaj preterlasas la generitan teknologion kiam Factorio ne povas esplori tiun precizan aron.
mir-prototype-productivity-cap-engine-default=Lasu la ekzistantan produktivecan limon de ĉiu recepto sola. Receptoj sen kutima ĉapo uzas la normalan +300%-produktivecan gratifikon de Factorio.
mir-prototype-productivity-cap-percent-25=Agordu ne-parametrajn receptajn produktivemajn limojn al +25%. Ĉi tio estas strikta frua limo.
mir-prototype-productivity-cap-percent-50=Agordu ne-parametrajn receptajn produktivecajn limojn al +50%. Ĉi tio estas sub la normala limo kaj igas produktiveca esploro ĉesi helpi pli frue.
mir-prototype-productivity-cap-percent-75=Agordu ne-parametrajn receptajn produktivemajn limojn al +75%. Ĉi tio estas sub la normala limo kaj igas produktiveca esploro ĉesi helpi pli frue.
mir-prototype-productivity-cap-percent-100=Agordu ne-parametrajn receptajn produktivemajn limojn al +100%. Ĉi tio estas sub la normala limo kaj igas produktiveca esploro ĉesi helpi pli frue.
mir-prototype-productivity-cap-percent-125=Agordu ne-parametrajn receptajn produktivemajn limojn al +125%.
mir-prototype-productivity-cap-percent-150=Agordu ne-parametrajn receptajn produktivemajn limojn al +150%.
mir-prototype-productivity-cap-percent-200=Agordu ne-parametrajn receptajn produktivemajn limojn al +200%. Ĉi tio estas sub la normala limo kaj igas produktiveca esploro ĉesi helpi pli frue.
mir-prototype-productivity-cap-percent-250=Agordu ne-parametrajn receptajn produktivemajn limojn al +250%. Ĉi tio estas iomete sub la normala ĉapo.
mir-prototype-productivity-cap-percent-400=Agordu ne-parametrajn receptajn produktivemajn limojn al +400%. Ĉi tio etendas produktivecan skalon preter la normala ĉapo.
mir-prototype-productivity-cap-percent-500=Agordu ne-parametrajn receptajn produktivemajn limojn al +500%. Ĉi tio etendas produktivecan skalon preter la normala ĉapo.
mir-prototype-productivity-cap-percent-750=Agordu ne-parametrajn receptajn produktivemajn limojn al +750%.
mir-prototype-productivity-cap-percent-1000=Agordu ne-parametrajn receptajn produktivemajn limojn al +1000%. Uzu por longaj ŝparadoj, kie esploro pri produktiveco daŭre gravas.
mir-prototype-productivity-cap-percent-2500=Agordu ne-parametrajn receptajn produktivemajn limojn al +2500%. Uzu por tre longaj ŝparadoj.
mir-prototype-productivity-cap-percent-5000=Agordu ne-parametrajn receptajn produktivemajn limojn al +5000%.
mir-prototype-productivity-cap-percent-10000=Agordu ne-parametrajn receptajn produktivemajn limojn al +10000%. Uzu nur por ekstrema longdaŭra skalado.
mir-prototype-productivity-cap-percent-25000=Agordu ne-parametrajn receptajn produktivemajn limojn al +25000%. Uzu nur por ekstrema longdaŭra skalado.
mir-prototype-productivity-cap-percent-100000=Agordu ne-parametrajn receptajn produktivemajn limojn al +100000%. Ĉi tio estas efike senkapa por plej multaj ŝparadoj.
mir-recycling-return-chance-engine-default=Lasu ĉiun recikladan recepton senŝanĝa.
mir-recycling-return-chance-match-productivity-cap=Sekura ekspluata aŭtomata redukto por kaŝitaj generitaj reciklaj receptoj. Uzas 1 / (1 + produktiveca gratifiko), limigita je la normala 25% rendimento: +400% iĝas 20%, kaj +1000% iĝas ĉirkaŭ 9,09%.
mir-recycling-return-chance-percent-25=Konservu kaŝitajn generitajn reciklajn receptojn ĉe la normala 25% materiala reveno.
mir-recycling-return-chance-percent-20=Skali kaŝitajn generitajn reciklajn receptojn al 20% materiala reveno.
mir-recycling-return-chance-percent-15=Skali kaŝitajn generitajn reciklajn receptojn al 15% materiala reveno.
mir-recycling-return-chance-percent-12-5=Skali kaŝitajn generitajn reciklajn receptojn al 12.5% ​​materiala reveno.
mir-recycling-return-chance-percent-10=Skali kaŝitajn generitajn reciklajn receptojn al 10% materiala reveno.
mir-recycling-return-chance-percent-7-5=Skali kaŝitajn generitajn reciklajn receptojn al 7.5% materiala reveno.
mir-recycling-return-chance-percent-5=Skali kaŝitajn generitajn reciklajn receptojn al 5% materiala reveno.
mir-recycling-return-chance-percent-2-5=Skali kaŝitajn generitajn reciklajn receptojn al 2.5% materiala reveno.
mir-recycling-return-chance-percent-1=Skali kaŝitajn generitajn reciklajn receptojn al 1% materiala reveno.
mir-recycling-return-chance-percent-0-5=Skali kaŝitajn generitajn reciklajn receptojn al 0.5% materiala reveno.
mir-recycling-return-chance-percent-0-1=Skali kaŝitajn generitajn reciklajn receptojn al 0.1% materiala reveno.
mir-prototype-efficiency-cap-engine-default=Lasu la limon de energio-uzo-efiko de ĉiu maŝino sola. Maŝinoj sen kutima limo uzas la normalan -80% energiuzan efikon de Factorio, do efikoj ne povas redukti aktivan uzon sub 20%.
mir-prototype-efficiency-cap-saving-25=Skribu -25% energiuzan limon. Aktiva energiuzo restas je 75% aŭ pli post energiuzaj efikoj.
mir-prototype-efficiency-cap-saving-50=Skribu -50% energiuzan limon. Aktiva energiuzo restas je 50% aŭ pli post energiuzaj efikoj sur subtenataj maŝinoj.
mir-prototype-efficiency-cap-saving-75=Skribu -75% energiuzan limon. Aktiva energiuzo restas je 25% aŭ pli post energiuzaj efikoj sur subtenataj maŝinoj.
mir-prototype-efficiency-cap-saving-90=Skribu -90% energiuzan limon. Aktiva energiuzo povas fali al 10%, kio estas sub la normala 20% etaĝo.
mir-prototype-efficiency-cap-saving-95=Skribu -95% energiuzan limon. Aktiva energiuzo povas fali al 5%.
mir-prototype-efficiency-cap-saving-99=Skribu -99% energiuzan limon. Aktiva energiuzo povas fali al 1%.
mir-prototype-efficiency-cap-saving-999=Skribu -99.9% energiuzo-kapo. Aktiva energiuzo povas fali al 0,1%.
mir-prototype-efficiency-cap-saving-9999=Skribu -99.99% energiuzo-kapo. Ĉi tio estas preskaŭ nula aktiva energiuzo, ne nul-potenca prototipa reverko.
mir-prototype-pollution-cap-engine-default=Lasu la limon de poluo-efiko de ĉiu maŝino sola. Maŝinoj sen kutima limo uzas la normalan -80%-poluefikan ĉapon de Factorio.
mir-prototype-pollution-cap-saving-25=Skribu -25%-poluan limon. Poluado restas je 75% aŭ pli post poluefikoj.
mir-prototype-pollution-cap-saving-50=Skribu -50%-poluan limon. Poluado restas je 50% aŭ pli post poluado-efikoj sur subtenataj maŝinoj.
mir-prototype-pollution-cap-saving-75=Skribu -75%-poluan limon. Poluado restas je 25% aŭ pli post poluado-efikoj sur subtenataj maŝinoj.
mir-prototype-pollution-cap-saving-90=Skribu -90%-poluan limon. Poluo povas fali al 10%, kio estas sub la normala 20% etaĝo.
mir-prototype-pollution-cap-saving-95=Skribu -95%-poluan limon. Poluo povas fali ĝis 5%.
mir-prototype-pollution-cap-saving-99=Skribu -99%-poluan limon. Poluo povas fali ĝis 1%.
mir-prototype-pollution-cap-saving-999=Skribu -99.9%-poluan limon. Poluo povas fali ĝis 0,1%.
mir-prototype-pollution-cap-saving-9999=Skribu -99.99%-poluan limon. Ĉi tio estas preskaŭ nula poluo, ne rultempa polua skripto.
mir-prototype-speed-floor-engine-default=Lasu la negativan rapidlimon de ĉiu maŝino sola. Maŝinoj sen kutima limo uzas la normalan -80% plankon de Factorio kaj tenas almenaŭ 20% rapidecon.
mir-prototype-speed-floor-saving-25=Krampu negativajn rapidajn efikojn je -25%, lasante almenaŭ 75% da rapideco.
mir-prototype-speed-floor-saving-50=Krampu negativajn rapidajn efikojn ĉe -50%, lasante almenaŭ 50% rapidecon.
mir-prototype-speed-floor-saving-75=Krampu negativajn rapidajn efikojn je -75%, lasante almenaŭ 25% da rapido.
mir-prototype-speed-floor-saving-90=Permesu negativajn rapidajn efikojn ĝis -90%, lasante almenaŭ 10% rapidecon.
mir-prototype-speed-floor-saving-95=Permesu negativajn rapidajn efikojn ĝis -95%, lasante almenaŭ 5% rapidecon.
mir-prototype-speed-floor-saving-99=Permesu negativajn rapidajn efikojn ĝis -99%, lasante almenaŭ 1% da rapido.
mir-prototype-speed-floor-saving-999=Permesu negativajn rapidajn efikojn ĝis -99.9%, lasante almenaŭ 0.1%-rapidecon.
