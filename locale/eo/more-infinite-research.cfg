[technology-description]
more-infinite-research.recipe_productivity=Pliigas receptan produktivecon por la elektitaj receptoj. La maksimuma produktiveca limo de Factorio ankoraŭ validas; kromaj senfinaj niveloj povas havi neniun praktikan efikon post kiam recepto atingas sian ĉapon.
more-infinite-research.direct_effect=Aldonas senfinan ripeteblan gratifikon. Sciencaj pakoj estas elektitaj el aktivaj laboratorioj, do la teknologio restas esplorebla kun kongruaj mod-aroj.
more-infinite-research.cargo_bay_unloading_distance=Pliigas la maksimuman distancon inter ŝarĝa surteriĝo kaj konektitaj malŝarĝaj golfoj.
more-infinite-research.cargo_landing_pad_count=Pliigas la nombron da ŝarĝaj surterigplatoj kiujn ĉiu forto povas konstrui per surfaco.
more-infinite-research.flamethrower_shooting_speed=Pliigas pafrapidecon por flamĵetilaj armiloj kaj flamĵetilaj gvatturetoj.
more-infinite-research.electric_shooting_speed=Pliigas pafrapidecon por elektraj armiloj. En vanilo tio influas malŝarĝan defendon; kun Space Age ĝi ankaŭ influas Tesla-armilojn kiam la tesla municiokategorio estas havebla.
more-infinite-research.spoilage_preservation=Pliigas la tutmondan difektan tempomodifilon per limigita skriba efiko. Ekzistantaj difekteblaj aĵoj povas konservi siajn nunajn difektajn templimojn ĝis testataj en la ludo.
more-infinite-research.agricultural_growth_speed=Mallongigas restantan kreskotempon por nove plantitaj agrikulturaj turplantoj per limigita skriptefiko.
more-infinite-research.lab_productivity=Pliigas esplorprogreson akiritan de ĉiu konsumita scienca pako, uzante la denaskan laboratorio-esploran produktivecon-modifilon.

