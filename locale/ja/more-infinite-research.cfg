[technology-description]
more-infinite-research.recipe_productivity=選択したレシピの生産性を向上させます。 Factorio の最大生産性の上限は引き続き適用されます。レシピが上限に達すると、追加の無限レベルは実際的な効果を持たなくなる可能性があります。
more-infinite-research.direct_effect=無限に繰り返し可能なボーナスを追加します。サイエンス パックはアクティブなラボから選択されるため、テクノロジーは互換性のある MOD セットで引き続き研究可能です。
more-infinite-research.cargo_bay_unloading_distance=貨物着陸パッドと接続された荷降ろしベイの間の最大距離を増やします。
more-infinite-research.cargo_landing_pad_count=各部隊が地表ごとに構築できる貨物着陸パッドの数を増やします。
more-infinite-research.flamethrower_shooting_speed=火炎放射器武器と火炎放射器タレットの射撃速度が増加します。
more-infinite-research.electric_shooting_speed=電気兵器の射撃速度が増加します。バニラでは、これは放電防御に影響します。スペースエイジでは、テスラ弾薬カテゴリが利用可能な場合、テスラ武器にも影響します。
more-infinite-research.spoilage_preservation=制限されたスクリプト効果を通じて、グローバルなスポイルタイム修飾子を増加させます。既存のスポイル可能なアイテムは、ゲーム内でテストされるまで現在のスポイル期限を維持することができます。
more-infinite-research.agricultural_growth_speed=制限されたスクリプト効果を通じて、新しく植えられた農業タワー植物の残りの成長時間を短縮します。
more-infinite-research.lab_productivity=ネイティブのラボ研究生産性修飾子を使用して、消費された各サイエンス パックから得られる研究の進捗状況を増加させます。

