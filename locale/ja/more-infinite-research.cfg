[string-mod-setting-description]
mir-automatic-productivity-action-disabled=自動検出、添付、または作成は実行されません。 MIR の固定研究は変わりません。
mir-automatic-productivity-action-preview=候補を検出して分類し、承認された決定とスキップされた決定を Factorio ログに書き込みます。レシピの添付や研究の作成は行いません。
mir-automatic-productivity-action-apply=デフォルト。候補を発見し、互換性のある既存の MIR 研究に安全性が証明されたレシピのみを添付します。それ自体が研究を生み出すわけではありません。下の 2 つのチェックボックスは作成を制御します。
mir-automatic-compiler-mode-off=従来の「無効」に相当します。
mir-automatic-compiler-mode-report=プレビューの変更に相当するレガシー。
mir-automatic-compiler-mode-safe-attach=研究の作成を無効にして安全な変更を適用するのと同等のレガシー。
mir-automatic-compiler-mode-exact-pack=リサーチの作成が有効になっており、レビューされた互換性データが必要な、安全な変更を適用するのと同等のレガシー。
mir-automatic-compiler-mode-safe-generate=登録された実験プロバイダーに対して研究作成を有効にして安全な変更を適用するのと同等のレガシー。
mir-adjust-vanilla-weapon-speed-techs-off=MIR のオプションの重複ロケット/大砲ボーナス クリーンアップを無効にします。
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=有効化された到達可能な無限テクノロジーが正確な代替効果を提供する場合にのみ、MIR の重複するロケット/大砲ボーナスを削除します。
mir-adjust-vanilla-weapon-speed-techs-always=MIR の重複するロケット/大砲ボーナスを常に削除します。厳密に分離したい場合にのみ使用してください。
mir-science-pack-ingredient-policy-configured=オプションの成分拡張なしで、生成された各テクノロジーの構成済みサイエンス パックを使用します。 MIR のデフォルト。
mir-science-pack-ingredient-policy-space=利用可能な場合は宇宙科学を追加します。単純なロケット後の難易度の増加。
mir-science-pack-ingredient-policy-space-and-promethium=利用可能な場合は宇宙とプロメチウムの科学を追加します。宇宙時代の非常に後期の研究シンクに最適です。
mir-science-pack-ingredient-policy-space-age-progression=選択したパックに含まれる Space Age 進行パックのみを追加します。無関係な改造パックは追加しません。
mir-science-pack-ingredient-policy-official-progression=すでに選択されている最も高度な公式パックによって暗示される、不足している公式前提条件スタイルのパックを追加します。
mir-science-pack-ingredient-policy-mod-progression=改造されたサイエンス パックの進行状況から推測される不足しているラボ互換パックを追加し、前提条件のロックを解除します。
mir-science-pack-ingredient-policy-all-official=現在の MOD セットに存在するすべての公式ベースおよび Space Age サイエンス パックを使用してください。
mir-science-pack-ingredient-policy-all=改造されたサイエンス パックを含む、すべてのアクティブなラボ互換サイエンス パックを使用します。
mir-lab-incompatibility-policy-reduce=サイエンス パックをアクティブな研究室が認める最大のセットに減らすことでテクノロジーを維持します。 MOD パックの最も安全なデフォルト。
mir-lab-incompatibility-policy-skip=選択したサイエンス パック セットを研究できるア​​クティブな研究室がない場合は、テクノロジーをスキップします。監査がより厳格かつ容易になります。
mir-lab-incompatibility-policy-engine-default=選択したサイエンスパックセットを決して書き換えないでください。 MIR は、安全に研究可能なセットを変更せずに保存し、Factorio がその正確なセットを研究できない場合、生成されたテクノロジーを省略します。
mir-prototype-productivity-cap-engine-default=各レシピの既存の生産性上限はそのままにしておきます。カスタムキャップのないレシピでは、Factorio の通常の +300% 生産性ボーナス制限が使用されます。
mir-prototype-productivity-cap-percent-25=パラメータなしのレシピの生産性の上限を +25% に設定します。これは厳密な初期上限です。
mir-prototype-productivity-cap-percent-50=パラメータなしのレシピの生産性の上限を +50% に設定します。これは通常の上限を下回っており、生産性に関する研究がすぐに役に立たなくなることになります。
mir-prototype-productivity-cap-percent-75=パラメータなしのレシピの生産性の上限を +75% に設定します。これは通常の上限を下回っており、生産性に関する研究がすぐに役に立たなくなることになります。
mir-prototype-productivity-cap-percent-100=パラメータなしのレシピの生産性の上限を +100% に設定します。これは通常の上限を下回っており、生産性に関する研究がすぐに役に立たなくなることになります。
mir-prototype-productivity-cap-percent-125=パラメータなしのレシピの生産性の上限を +125% に設定します。
mir-prototype-productivity-cap-percent-150=パラメータなしのレシピの生産性の上限を +150% に設定します。
mir-prototype-productivity-cap-percent-200=パラメータなしのレシピの生産性の上限を +200% に設定します。これは通常の上限を下回っており、生産性に関する研究がすぐに役に立たなくなることになります。
mir-prototype-productivity-cap-percent-250=パラメータなしのレシピの生産性の上限を +250% に設定します。これは通常の上限よりわずかに低いです。
mir-prototype-productivity-cap-percent-400=パラメータなしのレシピの生産性の上限を +400% に設定します。これにより、生産性のスケーリングが通常の上限を超えて拡張されます。
mir-prototype-productivity-cap-percent-500=パラメータなしのレシピの生産性の上限を +500% に設定します。これにより、生産性のスケーリングが通常の上限を超えて拡張されます。
mir-prototype-productivity-cap-percent-750=パラメータなしのレシピの生産性の上限を +750% に設定します。
mir-prototype-productivity-cap-percent-1000=パラメータなしのレシピの生産性の上限を +1000% に設定します。生産性の研究が重要である必要がある場合に、長時間保存する場合に使用します。
mir-prototype-productivity-cap-percent-2500=パラメータなしのレシピの生産性の上限を +2500% に設定します。非常に長い保存に使用します。
mir-prototype-productivity-cap-percent-5000=パラメータなしのレシピの生産性の上限を +5000% に設定します。
mir-prototype-productivity-cap-percent-10000=パラメータなしのレシピの生産性の上限を +10000% に設定します。極端な長期スケーリングにのみ使用してください。
mir-prototype-productivity-cap-percent-25000=パラメータなしのレシピの生産性の上限を +25000% に設定します。極端な長期スケーリングにのみ使用してください。
mir-prototype-productivity-cap-percent-100000=パラメータなしのレシピの生産性の上限を +100000% に設定します。これは、ほとんどの保存では事実上上限がありません。
mir-recycling-return-chance-engine-default=すべてのリサイクル レシピを変更しないでください。
mir-recycling-return-chance-match-productivity-cap=隠された生成されたリサイクルレシピのエクスプロイトセーフな自動削減。 1 / (1 + 生産性ボーナス) を使用し、通常の 25% リターンに上限があります: +400% は 20% になり、+1000% は約 9.09% になります。
mir-recycling-return-chance-percent-25=生成されたリサイクルレシピを通常の 25% マテリアルリターンで隠しておきます。
mir-recycling-return-chance-percent-20=隠れた生成リサイクル レシピを 20% の材料回収率に拡張します。
mir-recycling-return-chance-percent-15=隠れた生成リサイクル レシピを 15% の材料回収率に拡張します。
mir-recycling-return-chance-percent-12-5=隠れた生成リサイクル レシピを 12.5% の材料回収率まで拡張します。
mir-recycling-return-chance-percent-10=非表示の生成リサイクル レシピを 10% の材料回収率に拡張します。
mir-recycling-return-chance-percent-7-5=隠れた生成リサイクル レシピを 7.5% の材料回収率に拡張します。
mir-recycling-return-chance-percent-5=非表示の生成されたリサイクル レシピを 5% の材料回収率にスケールします。
mir-recycling-return-chance-percent-2-5=隠れた生成リサイクル レシピを 2.5% の材料回収率にスケールします。
mir-recycling-return-chance-percent-1=非表示の生成されたリサイクル レシピを 1% の材料回収率にスケールします。
mir-recycling-return-chance-percent-0-5=非表示の生成リサイクル レシピを 0.5% の材料回収率にスケールします。
