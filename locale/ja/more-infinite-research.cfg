[mod-setting-description]
ips-require-space-gate=有効にすると、バニラで宇宙科学が研究されるまで、またはスペースエイジでプロメチウム科学が研究されるまで、これらのテクノロジーはロックされたままになります。
mir-science-pack-ingredient-policy=MIR が生成されたテクノロジーにサイエンス パックを追加する方法を選択します。オプションは、デフォルト パック、ゲーム終盤のパック、進行ベースのパック、利用可能なすべてのパックというように、保守的なものから広範なものまで順序付けされています。
mir-automatic-productivity-action=インストール済み MOD レシピにある安全な生産性の機会を MIR がどのように行うかを選択します。無効にすると、自動検出は実行されません。プレビュー変更は、研究を変更せずに、Factorio ログ内の受け入れられた候補とスキップされた候補の記録を記録します。安全な変更を適用 (デフォルト) は、互換性のある既存の MIR リサーチにのみ適格なレシピを追加します。これは強さや成熟度ではなく、行動を制御します。以下の作成チェックボックスは別のものです。所有権、リサイクル、確率、触媒、科学、実験室、前提条件、ターゲット、アイデンティティ、進行状況、およびサイクルのチェックが常に適用されます。
mir-automatic-create-research=デフォルト: オフ。禁止 互換性のある既存の MIR 研究に安全な変更を適用します。適切なストリームを持たない候補はスキップされ、報告されます。 On では、適格な登録プロバイダーが、既存の研究が適合しない場合に、安定した汎用の無限生産性テクノロジーを 1 つ作成することができます。以下のレビュー済みデータのチェックボックスは、実験的プロバイダーが適格であるかどうかを決定します。 MIR は MOD やレシピごとに 1 つのテクノロジーを作成することはなく、すべてのハードセーフティ、科学、所有権、アイデンティティ、進行状況、およびサイクル ゲートが引き続き適用されます。
mir-automatic-require-reviewed-data=デフォルト: オン。これは、[新しいリサーチの作成を許可する] がオンになっている場合にのみ重要です。既存の研究への安全な接続を妨げることはありません。オンでは、レビュー済みで、該当する正確なバージョンの証拠によって裏付けられているプロバイダー ファミリのみが許可されるため、実験的なファミリはスキップされます。オフでは、登録された実験プロバイダーが一般的な構造証拠から作成することが許可されます。最も広範な実験動作を行うには、研究の作成を有効にし、この要件をオフにします。どのような値もハード セーフティ ゲートを回避することはできません。
mir-automatic-compiler-mode=自動生産性コントロールを分割する前に作成されたプロファイルの非表示の互換性ブリッジ。デフォルト以外のレガシー値は、すべての新しいコントロールがデフォルトのままである場合にのみ受け入れられます。新しいコントロールを変更して、明示的なコントロールを取得します。
ips-enable-stream=__1__ のレシピ、効果、前提条件、サイエンス パックが利用可能な場合、生成された無限テクノロジーを作成します。 MIR がこのテクノロジーを生成しないようにするには、これを無効にします。
ips-cost-base-stream=__1__ の最初に生成されたレベルに必要な研究ユニット。少なくとも 1 である必要があります。後のレベルは、この値とコスト増加率から計算されます。
ips-cost-growth-stream=__1__ の後の各レベルに適用される乗数。コストが一定の場合は 1、レベルごとに 50% 成長する場合は 1.5、コストが 2 倍の場合は 2 を使用します。
ips-max-level-stream=__1__ の最高生成レベル。無限レベルの場合は 0 に設定します。
ips-research-time-stream=__1__ の研究単位あたりの秒数。このテクノロジーに MIR のデフォルトを使用するには、0 に設定します。これは総調査時間ではありません。合計時間は、研究コスト、ラボの数、ラボの速度、モジュールによっても異なります。
mir-enable-base-tech=により、__1__ が無限のテクノロジーとしてバニラの上限を超えて継続できるようになります。このバニラ チェーンを拡張せずに MIR に新しい研究行を追加させたい場合は、これを無効にします。
mir-cost-base=__1__ の最初の MIR 継続レベルに必要な研究ユニット。可能な場合にバニラ チェーンのコスト パターンを継承するには、0 に設定します。
mir-cost-growth=__1__ の後の各 MIR 継続レベルに適用される乗数。可能な場合、バニラ チェーンの成長パターンを継承するには、0 に設定します。
mir-max-level=__1__ の最高 MIR 継続レベル。無限レベルの場合は 0 に設定します。
mir-research-time=__1__ の MIR 継続の研究単位あたりの秒数。可能な場合、バニラ チェーンの研究単位時間を継承するには、0 に設定します。
mir-prefer-this-mod-for-competing-techs=有効にすると、この MOD は選択された競合する無限拡張機能を削除し、独自のバージョンを使用します。他の MOD との競合バージョンを維持するには無効にします。
mir-adjust-vanilla-weapon-speed-techs=正確な無限の交換範囲が利用可能な場合に、MIR が生成された武器の射撃速度の継続からロケット弾と砲弾の速度ボーナスを削除するかどうかを制御します。有限のバニラ武器射撃速度テクノロジーは、元のボーナスを維持します。
mir-use-installed-space-age-icons=有効にすると、基本ゲームの実行で MOD が無効になっている場合でも、MIR は、Space Age や Elevated Rails など、インストールされている公式 DLC アイコン ファイルを参照することがあります。これらの DLC ファイルがインストールされていない場合は、これをオフのままにしておきます。 Factorio は、プロトタイプのロード中に欠落したアイコン ファイルを正常に回復できません。
mir-pipeline-extent-multiplier=パイプ エンティティだけでなく、プロトタイプ全体で認識される流体ボックス パイプライン範囲フィールドの起動専用ドロップダウン乗数。 100% leaves prototypes unchanged and does not load the pipeline pass or scan fluid boxes. Non-100% values are experimental and can affect machines, tanks, thrusters, and modded prototypes that define fluid boxes.
mir-unrestricted-modules=Experimental and balance-breaking.有効にすると、既存のすべてのレシピは 5 つのモジュール エフェクトすべてを受け入れ、スロットを持つすべての既存のモジュール レシーバーは、検出されたすべてのモジュール カテゴリを受け入れます。 This does not add module slots or change module prototypes, and may enable productivity, quality, and modded-module loops.
mir-prototype-productivity-cap=Chooses whether MIR leaves recipe productivity caps alone or writes a startup cap to every non-parameter, non-recycling recipe. +300% (変更なし) は既存のレシピの上限を維持します。 lower values shorten productivity scaling, while higher values extend it.
mir-recycling-return-chance=非表示の生成されたリサイクル レシピのみを制御します。自動モードでは、通常の 25% の材料回収率が、選択した生産性の上限での総生産量乗数で割った最大 1 に削減されます。 Fixed choices scale the same generated returns directly.目に見えるプロセスとレシピの生産性の上限は決して変更されません。
mir-productivity-cap-self-recycling-only=1 / リサイクル業者のリターン - 1 を超えると、非生成的自己リサイクル パスが証明されている生産レシピのみが、選択されたより高い上限を受け取ります。 At or below that threshold this checkbox has no effect.変更されていないエンジンは、リサイクル レシピを変更せずに、保守的な +300% しきい値として通常の 25% リターンを使用します。
mir-prototype-efficiency-cap=効率効果によって稼働中の機械のエネルギー消費量をどこまで削減できるかを設定します。-80%（変更なし）では既存のエネルギー消費制限を維持します。より大きな削減値では、汚染制限を変更せずに稼働時のエネルギー消費量をゼロ近くまで下げられます。
mir-prototype-pollution-cap=汚染低減効果によって機械の汚染をどこまで削減できるかを設定します。-80%（変更なし）では既存の汚染制限を維持します。より大きな削減値では、エネルギー消費量を変更せずに汚染をゼロ近くまで下げられます。
mir-prototype-speed-floor=負の速度効果によってサポートされているマシンがどの程度遅くなるかを選択します。 -80% (unchanged) leaves existing limits alone;値を大きくすると、通常のフロアが -99.99% の停止近くまで削除されます。
mir-prototype-speed-cap=MIR が機械の速度効果制限を変更しないか、新しい正の速度上限を設定するかを選択します。+100000%（変更なし）では既存の制限を維持し、低い値では非常に大きな速度ボーナスを意図的に制限します。
mir-prototype-quality-cap=MIR がマシンの品質効果制限をそのままにするか、新しいプラスの品質上限を書き込むかを選択します。 +100000% (unchanged) preserves existing limits and does not change quality tiers or item probability formulas.
mir-prototype-positive-power-floor=デフォルトはオフです。 MIR を有効にすると、プロトタイプのロード中に明示的な 0W 有効エネルギー使用量プロトタイプが 1W に変更されるため、ゼロ以外の微量を消費するはずのエンティティに低電力警告アイコンが表示されなくなります。ゼロ電力プロトタイプを正確に保存するには、オフのままにします。
mir-settings-profile-import=MIR 設定プロファイル文字列をここに貼り付けて、プロトタイプ生成中にエクスポートされたスタートアップ設定値をオーバーライド レイヤーとして適用します。通常の設定の場合は空白のままにします。 /mir-settings-export を使用してアクティブな保存からエクスポートし、この値を変更した後に再起動します。
mir-debug-generation-report=有効にすると、サイエンス パック、前提条件、エフェクト数、ラボの互換性ステータス、アイコン ソースを含む、生成またはスキップされたストリームおよびベース拡張機能ごとに 1 つの構造化ログ行が書き込まれます。
mir-debug-recipe-matches=有効にすると、生成された生産性ストリームごとに一致するレシピ名が書き込まれます。大規模な MOD パックではノイズが発生する可能性があります。
mir-debug-scripted-effects=有効にすると、スクリプト化されたテクノロジがグローバルまたはイベント駆動型の効果を再計算するときに、ランタイム ログ エントリが書き込まれます。
mir-lab-incompatibility-policy=選択したサイエンス パックがアクティブなラボで研究できない場合に MIR が行うことを選択します。
ips-effect-per-level-stream=__1__ のレベルごとのプライマリ基本層エフェクトを設定します。関連する後続の層と効果は比例してスケールされます。パーセンテージ効果はパーセンテージ ポイントを使用します。カウントと距離の効果では、ネイティブ単位が使用されます。
mir-effect-per-level=無限の __1__ 継続に対する正規のレベルごとの効果を設定します。関連するエフェクトは、最終的なバニラのベースラインから比例してスケールされます。パーセンテージ効果はパーセンテージ ポイントを使用します。カウントと距離の効果では、ネイティブ単位が使用されます。
mir-note-experimental-spoilage=実験的で、v2.1.0 ではデフォルトで無効になっています。これはグローバル/マップ全体のスクリプト効果です。既存の破損しやすいスタックの動作は、手動で検証されるまで要求されません。
mir-note-agriculture-growth=新たに植えられた農業タワー作物に適用されます。既存の作物は再スケールされません。
mir-note-cargo-pad-count=宇宙時代の特別な物流研究。面あたりの貨物着陸パッドが増加し、物流バランスが大幅に変化する可能性があります。
mir-note-inserter-capacity=デフォルトでは無効になっています。インサーターの容量が増えると、回路制御のインサーターが壊れ、エンジンの最適化が低下する可能性があります。
mir-note-native-owner-managed-stream=インストールされている無限テクノロジーがすでにこの研究ファミリーを所有している場合、複製を作成する代わりに、これらの同じ起動設定によってその所有者が構成されます。変更されていない MIR デフォルトでは、所有者の最終プロトタイプが正確に保存されます。明示的なコスト、時間、最大レベル、効果のオーバーライドは、安全な所有者が一致した後にのみ適用されます。ストリームを無効にすると、外部テクノロジーはそのまま残ります。起動設定を変更した後、Factorio を再起動します。最大レベル 0 は無限を意味し、効果値はレベルごとのパーセント ポイントです。

