mir-prototype-efficiency-cap-engine-default=各マシンのエネルギー使用効果の制限はそのままにしておきます。カスタム制限のないマシンは、Factorio の通常の -80% エネルギー使用効果上限を使用するため、効果によってアクティブな使用量を 20% 未満に減らすことはできません。
mir-prototype-efficiency-cap-saving-25=-25% のエネルギー使用量の上限を書き込みます。エネルギー使用効果後も、有効エネルギー使用量は 75% 以上を維持します。
mir-prototype-efficiency-cap-saving-50=エネルギー使用量の -50% の上限を書き込みます。サポートされているマシンでのエネルギー使用の影響後も、アクティブなエネルギー使用は 50% 以上に留まります。
mir-prototype-efficiency-cap-saving-75=-75% のエネルギー使用の上限を書き込みます。サポートされているマシンでのエネルギー使用の影響後も、アクティブなエネルギー使用量は 25% 以上に留まります。
mir-prototype-efficiency-cap-saving-90=エネルギー使用量の -90% の上限を書き込みます。有効エネルギーの使用量は、通常の下限である 20% を下回る 10% に低下する可能性があります。
mir-prototype-efficiency-cap-saving-95=エネルギー使用量の上限を -95% に設定します。有効エネルギーの使用量は 5% まで低下する可能性があります。
mir-prototype-efficiency-cap-saving-99=-99% のエネルギー使用量の上限を書き込みます。有効エネルギーの使用量は 1% まで低下する可能性があります。
mir-prototype-efficiency-cap-saving-999=-99.9% のエネルギー使用量の上限を書き込みます。有効エネルギーの使用量は 0.1% まで低下する可能性があります。
mir-prototype-efficiency-cap-saving-9999=-99.99% のエネルギー使用量の上限を書き込みます。これは有効エネルギーの使用量がほぼゼロであり、電力ゼロのプロトタイプの書き換えではありません。
mir-prototype-pollution-cap-engine-default=各マシンの汚染影響制限をそのままにしておきます。カスタム制限のないマシンは、Factorio の通常の -80% 汚染影響キャップを使用します。
mir-prototype-pollution-cap-saving-25=-25% の汚染上限を書き込みます。汚染の影響後も汚染は 75% 以上にとどまります。
mir-prototype-pollution-cap-saving-50=-50% の汚染上限を書き込みます。サポートされているマシンに汚染の影響が及んだ後も、汚染は 50% 以上にとどまります。
mir-prototype-pollution-cap-saving-75=-75% の汚染上限を書き込みます。サポートされているマシンに対する汚染の影響後も、汚染は 25% 以上にとどまります。
mir-prototype-pollution-cap-saving-90=-90% の汚染上限を書き込みます。汚染は通常の 20% の下限を下回る 10% まで低下する可能性があります。
mir-prototype-pollution-cap-saving-95=-95% の汚染上限を書き込みます。汚染は5%まで低下する可能性があります。
