mir-prototype-pollution-cap-saving-999=-99.9% の汚染上限を書き込みます。汚染は0.1%まで低下する可能性があります。
mir-prototype-pollution-cap-saving-9999=-99.99% の汚染上限を書き込みます。これは実行時汚染スクリプトではなく、ほぼゼロの汚染です。
mir-prototype-speed-floor-engine-default=各マシンの負の速度制限はそのままにしておきます。カスタム制限のないマシンは、Factorio の通常の -80% フロアを使用し、少なくとも 20% の速度を維持します。
mir-prototype-speed-floor-saving-25=マイナスの速度効果を -25% でクランプし、少なくとも 75% の速度を残します。
mir-prototype-speed-floor-saving-50=負の速度効果を -50% でクランプし、少なくとも 50% の速度を残します。
