[mod-setting-description]
ips-require-space-gate=כשהם מופעלים, הטכנולוגיות הללו נשארות נעולות עד שמדע החלל נחקר בוניל, או שמדע פרומתיום נחקר בעידן החלל.
mir-science-pack-ingredient-policy=בוחר כיצד MIR מוסיף חבילות מדעיות לטכנולוגיות שנוצרו. האפשרויות מסודרות משמרנית לרחבה: חבילות ברירת מחדל, חבילות משחק מאוחרות, חבילות מבוססות התקדמות, ואז כל החבילות הזמינות.
mir-automatic-productivity-action=בוחר מה MIR עושה עם הזדמנויות פרודוקטיביות בטוחות שנמצאות במתכוני-מודים מותקנים. מושבת אינו מבצע גילוי אוטומטי. תצוגה מקדימה של שינויים ברשומות שהתקבלו ודילוג על מועמדים ביומן Factorio מבלי לשנות את המחקר. החל שינויים בטוחים (ברירת מחדל) מוסיף מתכונים כשירים רק למחקר MIR קיים תואם. זה שולט בפעולה, לא בכוח או בשלות; תיבות הסימון להלן נפרדות. בדיקות בעלות, מיחזור, הסתברות, זרז, מדע, מעבדה, תנאי מוקדם, יעד, זהות, התקדמות ומחזור חלים תמיד.
mir-automatic-create-research=ברירת מחדל: כבוי. אסור להחיל שינויים בטוחים על מחקר MIR קיים תואם; מדלגים ומדווחים על מועמדים ללא זרם מתאים. On מאפשר לספק רשום זכאי ליצור טכנולוגיית פרודוקטיביות אינסופית גנרית אחת יציבה כאשר אין מחקר קיים מתאים. תיבת הסימון של הנתונים שנבדקו למטה קובעת אם ספקים ניסיוניים כשירים. MIR אף פעם לא יוצרת טכנולוגיה אחת לכל מוד או מתכון, וכל שער בטיחות, מדע, בעלות, זהות, התקדמות ושער מחזור עדיין תקף.
mir-automatic-require-reviewed-data=ברירת מחדל: פועל. זה משנה רק כאשר אפשר יצירת מחקר חדש פועל; זה אף פעם לא חוסם התקשרות בטוחה למחקר קיים. בהיתרים רק משפחות ספקים שסומנו כבדוקות ומגובות בראיות ישימות בגרסה המדויקת, לכן מדלגים על משפחות ניסוי. כבוי מאפשר לספקי ניסויים רשומים ליצור מראיות מבניות גנריות. להתנהגות הניסויית הרחבה ביותר, אפשר יצירת מחקר וכבה את הדרישה הזו. שום ערך לא יכול לעקוף שער בטיחות קשיח.
mir-automatic-compiler-mode=גשר תאימות נסתר לפרופילים שנוצרו לפני פיצול בקרות הפרודוקטיביות האוטומטיות. ערך מדור קודם שאינו ברירת מחדל מכובד רק כאשר כל הפקדים החדשים נשארים בברירת המחדל שלהם. שנה כל פקד חדש כדי לקבל שליטה מפורשת.
ips-enable-stream=יוצר את הטכנולוגיה האינסופית שנוצרה עבור __1__ כאשר המתכונים, האפקטים, הדרישות המוקדמות וחבילות המדע שלה זמינים. השבת זאת כדי למנוע מ-MIR ליצור טכנולוגיה זו.
ips-cost-base-stream=יחידות מחקר נדרשות לרמה הראשונה שנוצרה של __1__. חייב להיות לפחות 1. רמות מאוחרות יותר מחושבות מערך זה ומגורם הגידול בעלויות.
ips-cost-growth-stream=מכפיל מוחל על כל רמה מאוחרת יותר של __1__. השתמש ב-1 עבור עלויות אחידות, 1.5 עבור צמיחה של 50% לכל רמה, או 2 עבור הכפלת עלויות.
ips-max-level-stream=הרמה הגבוהה ביותר שנוצרה עבור __1__. הגדר ל-0 עבור אינסוף רמות.
ips-research-time-stream=שניות ליחידת מחקר עבור __1__. הגדר ל-0 כדי להשתמש בברירת המחדל של MIR עבור טכנולוגיה זו. זה לא זמן מחקר כולל; הזמן הכולל תלוי גם בעלות המחקר, ספירת המעבדה, מהירות המעבדה והמודולים.
mir-enable-base-tech=מאפשר ל__1__ להמשיך מעבר למכסה הווניל שלו כטכנולוגיה אינסופית. השבת זאת אם אתה רוצה ש-MIR יוסיף קווי מחקר חדשים מבלי להרחיב את שרשרת הווניל הזו.
mir-cost-base=נדרשות יחידות מחקר לרמת המשך MIR הראשונה של __1__. הגדר ל-0 כדי לרשת את דפוס העלויות של רשת הווניל במידת האפשר.
mir-cost-growth=מכפיל מוחל על כל רמת המשך MIR מאוחרת יותר של __1__. הגדר ל-0 כדי לרשת את דפוס הצמיחה של שרשרת הווניל במידת האפשר.
mir-max-level=רמת המשך MIR הגבוהה ביותר עבור __1__. הגדר ל-0 עבור אינסוף רמות.
mir-research-time=שניות ליחידת מחקר עבור המשך MIR של __1__. הגדר ל-0 כדי לרשת את זמן יחידת המחקר של רשת הווניל במידת האפשר.
mir-prefer-this-mod-for-competing-techs=כאשר מופעל, מוד זה מסיר הרחבות אינסופיות מתחרות נבחרות ומשתמש בגרסאות משלו. השבת כדי לשמור גרסאות מתחרות ממודים אחרים.
mir-adjust-vanilla-weapon-speed-techs=שולט אם MIR מסיר בונוסים של מהירות רקטות ופגז תותח מהמשך מהירות ירי הנשק שנוצר כאשר קיים כיסוי החלפה אינסופי מדויק. טכנולוגיות מהירות ירי נשק וניל סופיות שומרות על הבונוסים המקוריים שלהן.
mir-use-installed-space-age-icons=כאשר מופעל, MIR עשוי להתייחס לקבצי אייקוני DLC רשמיים מותקנים, כולל Space Age ו-Elevated Rails, גם כאשר האופנים האלה מושבתים להפעלת משחק בסיס. השאר את זה כבוי אם קבצי DLC אלה אינם מותקנים; Factorio לא יכול להתאושש בחן מקבצי אייקונים חסרים במהלך טעינת אב טיפוס.
mir-pipeline-extent-multiplier=מכפיל הנפתח להפעלה בלבד עבור שדות היקף צינורות קופסאות נוזלים מוכרים על פני אבות טיפוס, לא רק ישויות צינור. 100% משאיר אבות טיפוס ללא שינוי ואינו טוען את מעבר הצינור או סורק קופסאות נוזלים. ערכים שאינם 100% הם ניסיוניים ויכולים להשפיע על מכונות, טנקים, דחפים ואבות טיפוס מעודכנים המגדירים קופסאות נוזלים.
mir-unrestricted-modules=ניסיוני ושובר איזון. כאשר מופעל, כל מתכון קיים מקבל את כל חמשת אפקטי המודול וכל מקלט מודול קיים עם חריצים מקבל כל קטגוריית מודול שהתגלה. זה לא מוסיף חריצי מודול או משנה אבות-טיפוס של מודול, והוא עשוי לאפשר פרודוקטיביות, איכות ולולאות מודול מעודן.
mir-prototype-productivity-cap=בוחר אם MIR ישאיר את מכסי הפרודוקטיביות של המתכון לבד או כותב מכסת הפעלה לכל מתכון שאינו פרמטר, שאינו ממוחזר. +300% (ללא שינוי) משמר את מכסי המתכון הקיימים; ערכים נמוכים מקצרים את קנה המידה של הפרודוקטיביות, בעוד שערכים גבוהים יותר מרחיבים אותו.
mir-recycling-return-chance=שולט במתכוני מחזור שנוצרו מוסתרים בלבד. מצב אוטומטי מפחית את החזר החומר הרגיל של 25% ל-1 לכל היותר חלקי מכפיל התפוקה הכולל במכסת הפרודוקטיביות שנבחרה. אפשרויות קבועות מדרגות את אותן התשואות שנוצרו ישירות. תהליכים גלויים ומכסי פרודוקטיביות מתכונים אינם משתנים לעולם.
mir-productivity-cap-self-recycling-only=מעל 1 / החזרת ממחזר - 1, רק מתכוני ייצור עם נתיב מיחזור עצמי מוכח שאינו מחולל מקבלים את המכסה הגבוה שנבחר. בסף הזה או מתחתיו לתיבה זו אין השפעה. מנוע ללא שינוי משתמש בתשואה הרגילה של 25% כסף שמרני של +300% מבלי לשנות מתכוני מיחזור.
mir-prototype-efficiency-cap=בוחר עד כמה השפעות היעילות עשויות להפחית את השימוש הפעיל באנרגיה של המכונה. -80% (ללא שינוי) משאיר את מגבלות השימוש הקיימות באנרגיה לבד. הפחתות עמוקות יותר יכולות להתקרב לאפס שימוש באנרגיה פעילה מבלי לשנות את מגבלות הזיהום.
mir-prototype-pollution-cap=בוחר עד כמה השפעות הפחתת זיהום עשויות להפחית את זיהום המכונה. -80% (ללא שינוי) משאיר את מגבלות הזיהום הקיימות לבד. הפחתות עמוקות יותר יכולות להתקרב לאפס זיהום מבלי לשנות את השימוש באנרגיה.
mir-prototype-speed-floor=בוחר עד כמה השפעות מהירות שליליות עשויות להאט את המכונות הנתמכות. -80% (ללא שינוי) משאיר את הגבולות הקיימים לבדם; ערכים עמוקים יותר מסירים את הרצפה הרגילה עד לכדי עצירה של -99.99%.
mir-prototype-speed-cap=בוחר אם MIR ישאיר את מגבלות אפקט המהירות של המכונה לבד או כותב מכסת מהירות חיובית חדשה. +100000% (ללא שינוי) שומר על גבולות קיימים; ערכים נמוכים מהדקים בכוונה בונוסים מהירות גדולים מאוד.
mir-prototype-quality-cap=בוחר אם MIR משאיר את מגבלות איכות אפקט המכונה לבד או כותב מכסת איכות חיובית חדשה. +100000% (ללא שינוי) שומר על מגבלות קיימות ואינו משנה רמות איכות או נוסחאות הסתברות של פריט.
mir-prototype-positive-power-floor=ברירת מחדל כבויה. כאשר מופעל, MIR משנה אבות-טיפוס מפורשים של צריכת אנרגיה פעילה של 0W ל-1W במהלך טעינת אב-טיפוס, כך שסמלים של אזהרה בהספק נמוך לא יופיעו בישויות שאמורות לצייר כמות זעירה שאינה אפס. עזוב כדי לשמר בדיוק אבות-טיפוס בעלי כוח אפס.
mir-settings-profile-import=הדבק כאן מחרוזת פרופיל הגדרות MIR כדי להחיל ערכי הגדרות הפעלה מיוצאים כשכבת עקיפה במהלך יצירת אב טיפוס. השאר ריק עבור הגדרות רגילות. ייצא עם /mir-settings-export משמירה פעילה, ולאחר מכן הפעל מחדש לאחר שינוי ערך זה.
mir-debug-generation-report=כאשר מופעלת, כותב שורת יומן מובנית אחת לכל זרם ותוסף בסיס שנוצר או דילוג עליו, כולל ערכות מדעיות, דרישות מוקדמות, ספירת אפקטים, סטטוס תאימות למעבדה ומקור אייקונים.
mir-debug-recipe-matches=כאשר מופעל, כותב שמות מתכונים תואמים עבור כל זרם פרודוקטיביות שנוצר. זה יכול להיות רועש בחבילות מוד גדולות.
mir-debug-scripted-effects=כאשר מופעל, כותב ערכי יומן זמן ריצה כאשר טכנולוגיות סקריפט מחשבות מחדש אפקטים גלובליים או מונעי אירועים.
mir-lab-incompatibility-policy=בוחר מה MIR עושה כאשר לא ניתן לחקור את חבילות המדע שנבחרו על ידי אף מעבדה פעילה.
ips-effect-per-level-stream=מגדיר את אפקט שכבת הבסיס הראשית לכל רמה עבור __1__. שכבות והשפעות מאוחרות יותר קשורות מותאמות באופן פרופורציונלי. אחוז ההשפעות משתמש באחוזים; אפקטים של ספירה ומרחק משתמשים ביחידות המקוריות שלהם.
mir-effect-per-level=מגדיר את האפקט הקנוני לכל רמה עבור ההמשך האינסופי __1__. ההשפעות הקשורות מוגדלות באופן פרופורציונלי מקו הבסיס הסופי של הווניל. אחוז ההשפעות משתמש באחוזים; אפקטים של ספירה ומרחק משתמשים ביחידות המקוריות שלהם.
mir-note-experimental-spoilage=ניסיוני ומושבת כברירת מחדל בגרסה 2.1.0. זהו אפקט תסריטאי גלובלי/מפה רחב. התנהגות קיימת של מחסנית מתקלקלת אינה נתבעת עד לאימות ידנית.
mir-note-agriculture-growth=חל על גידולי מגדל חקלאי שנשתלו לאחרונה. גידולים נטועים קיימים אינם מותאמים מחדש.
mir-note-cargo-pad-count=מחקר לוגיסטי מיוחד של עידן החלל. מגדיל את משטחי הנחיתה לכל משטח ויכול לשנות באופן מהותי את האיזון הלוגיסטי.
mir-note-inserter-capacity=מושבת כברירת מחדל. קיבולת נוספת של מוסיף יכולה לשבור מכניסים הנשלטים על ידי מעגל ולהפחית את אופטימיזציית המנוע.
mir-note-native-owner-managed-stream=אם טכנולוגיה אינסופית מותקנת כבר מחזיקה במשפחת המחקר הזו, אותן הגדרות הפעלה מגדירות את הבעלים הזה במקום ליצור כפיל. ברירת המחדל של MIR ללא שינוי משמרת בדיוק את אב הטיפוס הסופי של הבעלים. עקיפות מפורשות של עלות, זמן, רמה מקסימלית ואפקט חלות רק לאחר התאמת בעלים בטוחים; השבתת הזרם משאירה את הטכנולוגיה החיצונית ללא נגיעה. הפעל מחדש את Factorio לאחר שינוי הגדרות האתחול. רמה מקסימלית של 0 פירושה אינסופי, וערכי ההשפעה הם נקודות אחוז לכל רמה.

