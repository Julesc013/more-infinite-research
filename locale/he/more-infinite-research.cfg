[technology-description]
more-infinite-research.recipe_productivity=מגביר את פרודוקטיביות המתכונים עבור המתכונים שנבחרו. מכסת הפרודוקטיביות המקסימלית של פקטוריו עדיין חלה; לרמות אינסופיות נוספות ייתכן שלא תהיה השפעה מעשית ברגע שמתכון מגיע למכסה.
more-infinite-research.direct_effect=מוסיף בונוס אינסופי שניתן לחזור עליו. ערכות מדע נבחרות ממעבדות פעילות כך שהטכנולוגיה נשארת ניתנת למחקר עם ערכות מוד תואמות.
more-infinite-research.cargo_bay_unloading_distance=מגדיל את המרחק המרבי בין משטח נחיתה למפרצי פריקה מחוברים.
more-infinite-research.cargo_landing_pad_count=מגדיל את מספר משטחי הנחיתה של כל כוח יכול לבנות לכל משטח.
more-infinite-research.flamethrower_shooting_speed=מגביר את מהירות הירי עבור כלי נשק של מטיל להביורים וצריחים להביורים.
more-infinite-research.electric_shooting_speed=מגביר את מהירות הירי עבור כלי נשק חשמליים. בווניל זה משפיע על הגנת הפרשות; עם עידן החלל זה משפיע גם על כלי נשק של טסלה כאשר קטגוריית התחמושת של טסלה זמינה.
more-infinite-research.spoilage_preservation=מגדיל את שינוי זמן הקלקול הגלובלי באמצעות אפקט סקריפט מוגבל. פריטים מתקלקלים קיימים עשויים לשמור על מועדי השלל הנוכחיים שלהם עד לבדיקה במשחק.
more-infinite-research.agricultural_growth_speed=מקצר את זמן הצמיחה שנותר עבור צמחי מגדל חקלאי שנשתלו לאחרונה באמצעות אפקט תסריטאי מוגבל.
more-infinite-research.lab_productivity=מגביר את התקדמות המחקר שהושגה מכל חבילת מדעית שנצרכה, תוך שימוש בשינוי פרודוקטיביות המחקר המקורי של המעבדה.

