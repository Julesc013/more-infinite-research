[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Ní dhéantar aon fhionnachtain, ceangaltán ná cruthú uathoibríoch. Níl aon athrú ar thaighde seasta MIR.
mir-automatic-productivity-action-preview=Aimsíonn agus rangaíonn iarrthóirí, scríobhann ansin cinntí a nglactar leo agus rinne sé scipeáil chuig loga Factorio. Ní chuireann sé oidis nó taighde a chruthú.
mir-automatic-productivity-action-apply=Réamhshocrú. Aimsíonn sé iarrthóirí agus ní cheanglaíonn sé ach oidis atá cruthaithe ó thaobh na sábháilteachta de le taighde comhoiriúnach MIR atá ann cheana féin. Ní chruthaíonn sé taighde leis féin; rialaíonn an dá ticbhosca thíos cruthú.
mir-automatic-compiler-mode-off=Coibhéis oidhreachta do Dhaoine faoi Mhíchumas.
mir-automatic-compiler-mode-report=Coibhéis oidhreachta na n-athruithe Réamhamhairc.
mir-automatic-compiler-mode-safe-attach=Coibhéis oidhreachta Cuir athruithe sábháilte i bhfeidhm agus cruthú taighde díchumasaithe.
mir-automatic-compiler-mode-exact-pack=Coibhéis oidhreachta Cuir athruithe sábháilte i bhfeidhm le cruthú taighde cumasaithe agus athbhreithniú ar na sonraí comhoiriúnachta a theastaíonn.
mir-automatic-compiler-mode-safe-generate=Coibhéis oidhreachta Cuir athruithe sábháilte i bhfeidhm le cruthú taighde cumasaithe do sholáthraithe cláraithe turgnamhacha.
mir-adjust-vanilla-weapon-speed-techs-off=Díchumasaigh glanadh bónais roicéad/gunnaí móra forluiteacha roghnacha MIR.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Bain bónais roicéad/gunna forluiteacha MIR ach amháin nuair a sholáthraíonn teicneolaíocht chumasaithe insroichte gan teorainn an iarmhairt athsholáthair bheacht.
mir-adjust-vanilla-weapon-speed-techs-always=Bain bónais roicéad/gunna forluiteacha MIR i gcónaí. Bain úsáid as ach amháin más mian leat scaradh dian.
mir-science-pack-ingredient-policy-configured=Bain úsáid as pacáistí eolaíochta cumraithe gach teicneolaíochta ginte gan leathnú comhábhair roghnach. Réamhshocrú MIR.
mir-science-pack-ingredient-policy-space=Cuir eolaíocht spáis leis nuair atá sé ar fáil. Méadú deacrachta iar-roicéad simplí.
mir-science-pack-ingredient-policy-space-and-promethium=Cuir spás agus eolaíocht promethium leis nuair atá sé ar fáil. Is fearr le haghaidh doirtil taighde Ré an Spáis an-déanach.
mir-science-pack-ingredient-policy-space-age-progression=Cuir leis na pacáistí dul chun cinn Spásaoise amháin atá intuigthe ag na pacáistí roghnaithe. Ní chuireann sé pacáistí modded neamhghaolmhara.
mir-science-pack-ingredient-policy-official-progression=Cuir leis na pacaí oifigiúla réamhriachtanas atá in easnamh atá intuigthe ag an bpacáiste oifigiúil is airde atá roghnaithe cheana féin.
mir-science-pack-ingredient-policy-mod-progression=Cuir leis na pacáistí atá comhoiriúnach le saotharlann atá in easnamh ó dhul chun cinn paca eolaíochta modded agus díghlasáil réamhriachtanais.
mir-science-pack-ingredient-policy-all-official=Bain úsáid as gach bonn oifigiúil agus pacáiste eolaíochta Aois Spáis atá sa tacar mod reatha.
mir-science-pack-ingredient-policy-all=Bain úsáid as gach pacáiste eolaíochta atá comhoiriúnach le saotharlann, lena n-áirítear pacáistí eolaíochta modded.
mir-lab-incompatibility-policy-reduce=Coinnigh an teicneolaíocht trína phacáistí eolaíochta a laghdú go dtí an tacar is mó a nglacann saotharlann gníomhach leis. Réamhshocrú is sábháilte le haghaidh pacáistí mod.
mir-lab-incompatibility-policy-skip=Léim siar ar an teicneolaíocht mura bhfuil aon saotharlann gníomhach in ann taighde a dhéanamh ar an bpacáiste eolaíochta roghnaithe aige. Níos déine agus níos éasca le hiniúchadh.
mir-lab-incompatibility-policy-engine-default=Ná athscríobh an pacáiste eolaíochta roghnaithe choíche. Caomhnaíonn MIR tacar sábháilte in-thaighde gan athrú agus fágtar an teicneolaíocht ginte ar lár nuair nach féidir le Factorio taighde a dhéanamh ar an tacar cruinn sin.
mir-prototype-productivity-cap-engine-default=Fág an teorainn táirgiúlachta atá ag gach oideas faoi láthair. Úsáideann oidis gan caipín saincheaptha gnáth-theorainn bónas táirgiúlachta +300% Factorio.
mir-prototype-productivity-cap-percent-25=Socraigh caipíní táirgiúlachta oidis neamh-pharaiméadair go +25%. Is caipín luath docht é seo.
mir-prototype-productivity-cap-percent-50=Socraigh caipíní táirgiúlachta oidis neamh-pharaiméadair go +50%. Tá sé seo faoi bhun an ghnáth-theip agus cuireann sé stop le taighde táirgiúlachta níos luaithe.
mir-prototype-productivity-cap-percent-75=Socraigh caipíní táirgiúlachta oidis neamh-pharaiméadair go +75%. Tá sé seo faoi bhun an ghnáth-theip agus cuireann sé stop le taighde táirgiúlachta níos luaithe.
mir-prototype-productivity-cap-percent-100=Socraigh caipíní táirgiúlachta oidis neamh-pharaiméadair go +100%. Tá sé seo faoi bhun an ghnáth-theip agus cuireann sé stop le taighde táirgiúlachta níos luaithe.
mir-prototype-productivity-cap-percent-125=Socraigh caipíní táirgiúlachta oidis neamh-pharaiméadair go +125%.
mir-prototype-productivity-cap-percent-150=Socraigh caipíní táirgiúlachta oidis neamh-pharaiméadair go +150%.
mir-prototype-productivity-cap-percent-200=Socraigh caipíní táirgiúlachta oidis neamh-pharaiméadair go +200%. Tá sé seo faoi bhun an ghnáth-theip agus cuireann sé stop le taighde táirgiúlachta níos luaithe.
mir-prototype-productivity-cap-percent-250=Socraigh caipíní táirgiúlachta oidis neamh-pharaiméadair go +250%. Tá sé seo beagán faoi bhun an ghnáthchaipín.
mir-prototype-productivity-cap-percent-400=Socraigh caipíní táirgiúlachta oidis neamh-pharaiméadair go +400%. Leathnaíonn sé seo scálú táirgiúlachta níos faide ná an gnáthchaipín.
mir-prototype-productivity-cap-percent-500=Socraigh caipíní táirgiúlachta oidis neamh-pharaiméadair go +500%. Leathnaíonn sé seo scálú táirgiúlachta níos faide ná an gnáthchaipín.
mir-prototype-productivity-cap-percent-750=Socraigh caipíní táirgiúlachta oidis neamh-pharaiméadair go +750%.
