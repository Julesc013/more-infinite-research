[technology-description]
more-infinite-research.recipe_productivity=Méadaítear táirgiúlacht oidis do na hoidis roghnaithe. Tá feidhm fós ag uasteorainn táirgiúlachta Factorio; d'fhéadfadh sé nach mbeadh aon éifeacht phraiticiúil ag leibhéil bhreise gan teorainn nuair a shroicheann an t-oideas a chaipín.
more-infinite-research.direct_effect=Cuirtear bónas in-athdhéanta gan teorainn leis. Roghnaítear pacáistí eolaíochta ó shaotharlanna gníomhacha agus mar sin is féidir taighde a dhéanamh ar an teicneolaíocht le tacair modúil comhoiriúnacha.
more-infinite-research.cargo_bay_unloading_distance=Méadaíonn sé an t-achar uasta idir eochaircheap tuirlingthe lasta agus bánna díluchtaithe ceangailte.
more-infinite-research.cargo_landing_pad_count=Méaduithe ar líon na bpanna tuirlingthe lasta is féidir le gach fórsa a thógáil in aghaidh an dromchla.
more-infinite-research.flamethrower_shooting_speed=Méaduithe ar luas lámhaigh le haghaidh airm lasrach agus túiríní lasrach.
more-infinite-research.electric_shooting_speed=Méaduithe ar an luas lámhaigh le haghaidh arm leictreach. I vanilla cuireann sé seo isteach ar chosaint scaoilte; leis an Spás Aois bíonn tionchar aige freisin ar airm Tesla nuair a bhíonn an catagóir ammo tesla ar fáil.
more-infinite-research.spoilage_preservation=Méadaíonn sé an modhnóir ama millte domhanda trí éifeacht teorantach scripte. Seans go gcoimeádfaidh míreanna millte atá ann faoi láthair a gcuid spriocdhátaí millte go dtí go ndéanfar tástáil orthu sa chluiche.
more-infinite-research.agricultural_growth_speed=Giorraíonn sé an t-am fáis atá fágtha do phlandaí túir talmhaíochta nua-phlandaithe trí éifeacht scripte teorantach.
more-infinite-research.lab_productivity=Méadaíonn sé an dul chun cinn taighde a ghnóthaítear ó gach pacáiste eolaíochta tomhaltais, ag baint úsáide as modhnóir táirgiúlachta taighde saotharlainne dúchais.

