[mod-setting-description]
ips-require-space-gate=Nuair a bheidh siad cumasaithe, fanann na teicneolaíochtaí seo faoi ghlas go dtí go ndéantar taighde ar eolaíocht spáis i vanilla, nó go ndéantar taighde ar eolaíocht promethium sa Spás Aois.
mir-science-pack-ingredient-policy=Roghnaíonn sé conas a chuireann MIR pacáistí eolaíochta le teicneolaíochtaí ginte. Ordaítear roghanna ó choimeádach go leathan: pacaí réamhshocraithe, pacáistí cluiche déanach, pacaí bunaithe ar dhul chun cinn, ansin gach pacáiste atá ar fáil.
mir-automatic-productivity-action=Roghnaíonn sé cad a dhéanann MIR le deiseanna táirgiúlachta sábháilte a fhaightear in oidis mod suiteáilte. Ní fheidhmíonn míchumasaithe aon fhionnachtain uathoibríoch. Glacadh le réamhamharc ar thaifid athruithe agus rinne sé scipeáil ar iarrthóirí sa loga Factorio gan aon athrú ar an taighde. Cuir athruithe sábháilte i bhfeidhm (réamhshocraithe) ní chuirtear ach oidis incháilithe le taighde comhoiriúnach MIR atá ann cheana féin. Rialaíonn sé seo gníomh, ní neart ná aibíocht; tá na ticbhoscaí cruthaithe thíos ar leithligh. Bíonn feidhm i gcónaí ag seiceálacha úinéireachta, athchúrsáil, dóchúlacht, catalaíoch, eolaíocht, saotharlann, réamhriachtanas, sprioc, aitheantas, dul chun cinn agus timthriall.
mir-automatic-create-research=Réamhshocrú: as. Lasmuigh de theorainneacha Cuir athruithe sábháilte i bhfeidhm ar thaighde MIR atá ag luí cheana féin; déantar iarrthóirí nach bhfuil sruth oiriúnach acu a scipeáil agus a thuairisciú. Ligeann On do sholáthraí cláraithe incháilithe teicneolaíocht táirgiúlachta cineálach gan teorainn chobhsaí amháin a chruthú nuair nach n-oireann aon taighde reatha. Cinneann an ticbhosca sonraí athbhreithnithe thíos an bhfuil soláthraithe turgnamhacha incháilithe. Ní chruthaíonn MIR teicneolaíocht amháin in aghaidh an mod nó an t-oideas, agus tá feidhm fós ag gach geata sábháilteachta, eolaíochta, úinéireachta, aitheantais, dul chun cinn agus rothaíochta.
mir-automatic-require-reviewed-data=Réamhshocrú: ar. Ní bhaineann sé seo ach amháin nuair a bhíonn cruthú taighde nua ar siúl; ní chuireann sé bac ar cheangal sábháilte le taighde atá ann cheana féin. Ar cheadanna ní dhéantar ach teaghlaigh soláthraithe a mharcáil, a athbhreithniú agus a bhfuil fianaise ar leagan beacht infheidhmithe mar thaca acu, mar sin ní dhéantar teaghlaigh thurgnamhach a dhéanamh. Eischeadanna soláthraithe trialacha cláraithe a chruthú ó fhianaise struchtúrach cineálach. Maidir leis an iompar turgnamhach is leithne, cumasaigh cruthú taighde agus múch an riachtanas seo. Ní féidir le luach ar bith geata sábháilteachta crua a sheachbhóthar.
mir-automatic-compiler-mode=Droichead comhoiriúnachta i bhfolach le haghaidh próifílí a cruthaíodh roimh na rialuithe scoilte táirgiúlachta. Ní thugtar luach oidhreachta neamh-mhainneachtana ach amháin fad a fhanann gach rialú nua ag a mainneachtainí. Athraigh aon rialú nua chun smacht follasach a ghlacadh.
ips-enable-stream=Cruthaíonn an teicneolaíocht gan teorainn a ghintear le haghaidh __1__ nuair a bhíonn a oidis, éifeachtaí, réamhriachtanais agus pacáistí eolaíochta ar fáil. Díchumasaigh é seo chun MIR a chosc ón teicneolaíocht seo a ghiniúint.
ips-cost-base-stream=Aonaid taighde a theastaíonn don chéad leibhéal ginte __1__. Caithfidh sé a bheith 1 ar a laghad. Ríomhtar leibhéil níos déanaí ón luach seo agus ón bhfachtóir fáis costais.
ips-cost-growth-stream=Iolraitheoir curtha i bhfeidhm ar gach leibhéal níos déanaí de __1__. Bain úsáid as 1 le haghaidh costais chomhréidh, 1.5 le haghaidh fáis 50% in aghaidh an leibhéil, nó 2 le haghaidh costais a dhúbailt.
ips-max-level-stream=An leibhéal ginte is airde do __1__. Socraigh go 0 le haghaidh leibhéil gan teorainn.
ips-research-time-stream=Soicind in aghaidh an aonaid taighde le haghaidh __1__. Socraigh go 0 chun réamhshocrú MIR a úsáid don teicneolaíocht seo. Ní am taighde iomlán é seo; Braitheann an t-am iomlán freisin ar chostas taighde, ar chomhaireamh saotharlainne, ar luas saotharlainne, agus ar mhodúil.
mir-enable-base-tech=Ligeann sé do __1__ leanúint ar aghaidh thar a chaipín fanaile mar theicneolaíocht gan teorainn. Díchumasaigh é seo más mian leat MIR línte taighde nua a chur leis gan an slabhra fanaile seo a leathnú.
mir-cost-base=Aonaid taighde a theastaíonn don chéad leibhéal leantach MIR de __1__. Socraigh ar 0 le hoidhreacht a dhéanamh ar phatrún costais an tslabhra fanaile nuair is féidir.
mir-cost-growth=Iolraitheoir curtha i bhfeidhm ar gach leibhéal leantach MIR níos déanaí de __1__. Socraigh ar 0 le hoidhreacht a dhéanamh ar phatrún fáis an tslabhra fanaile nuair is féidir.
mir-max-level=An leibhéal leanúnach MIR is airde do __1__. Socraigh go 0 le haghaidh leibhéil gan teorainn.
mir-research-time=Soicind in aghaidh an aonaid taighde chun leanúint ar aghaidh leis an MIR de __1__. Socraigh ar 0 le hoidhreacht a dhéanamh ar aonad taighde an tslabhra fanaile nuair is féidir.
mir-prefer-this-mod-for-competing-techs=Nuair atá sé cumasaithe, baineann an mod seo síntí gan teorainn iomaíocha roghnaithe agus úsáideann sé a leaganacha féin. Díchumasaigh a choinneáil ar leaganacha iomaíocha ó mods eile.
mir-adjust-vanilla-weapon-speed-techs=Rialaíonn sé cibé an mbaineann MIR bónais luais roicéad agus sliogán gunna óna leanúint de luas lámhaigh arm ginte nuair a bhíonn clúdach athsholáthair gan teorainn cruinn ar fáil. Coinníonn teicneolaíochtaí luais lámhach airm fanaile críochta a gcuid bónais bunaidh.
mir-use-installed-space-age-icons=Nuair a bheidh sé cumasaithe, féadfaidh MIR tagairt a dhéanamh do chomhaid oifigiúla deilbhíní DLC suiteáilte, lena n-áirítear Space Age agus Rails Ardaithe, fiú nuair atá na mods sin díchumasaithe le haghaidh rith bonnchluiche. Fág é seo as mura bhfuil na comhaid DLC sin suiteáilte; Ní féidir le Factorio a ghnóthú go galánta ó chomhaid deilbhín atá in easnamh le linn luchtú an fhréamhshamhail.
mir-pipeline-extent-multiplier=Iolraitheoir anuas tosaithe amháin do réimsí fairsinge píblíne bosca sreabhach aitheanta trasna fréamhshamhlacha, ní hamháin eintitis phíobáin. Fágann 100% fréamhshamhlacha gan athrú agus ní luchtaíonn sé pas an phíblíne ná scanadh boscaí sreabhach. Is luachanna turgnamhacha iad na luachanna neamh-100% agus is féidir leo tionchar a imirt ar mheaisíní, umair, thrusters, agus fréamhshamhlacha modded a shainíonn boscaí sreabhach.
mir-unrestricted-modules=Turgnamhach agus cothromaíocht a bhriseadh. Nuair a bhíonn sé cumasaithe, glacann gach oideas atá ann cheana féin na cúig éifeacht mhodúil go léir agus glacann gach glacadóir modúil atá ann cheana féin le sliotáin le gach catagóir modúil a aimsítear. Ní chuireann sé seo sliotáin mhodúil nó fréamhshamhlacha modúil a athrú, agus féadfaidh sé táirgiúlacht, cáilíocht, agus lúba modúil modded a chumasú.
mir-prototype-productivity-cap=Roghnaítear cibé an bhfágann MIR caipíní táirgiúlachta oidis ina n-aonar nó an scríobhann sé caipín tosaithe do gach oideas neamh-pharaiméadair, neamh-athchúrsáil. caomhnaíonn +300% (gan athrú) na caipíní oidis atá ann cheana; giorraíonn luachanna níos ísle scálú táirgiúlachta, agus leathnaíonn luachanna níos airde é.
mir-recycling-return-chance=Rialaíonn sé oidis athchúrsála folaithe amháin. Laghdaíonn modh uathoibríoch an gnáth-aischur ábhar 25% go dtí 1 ar a mhéad roinnte ar an iolraitheoir aschuir iomlán ag an gcaipín táirgiúlachta roghnaithe. Scálaíonn roghanna seasta na torthaí ginte céanna go díreach. Ní athraítear próisis infheicthe agus caipíní táirgiúlachta oidis riamh.
mir-productivity-cap-self-recycling-only=Os cionn 1 / tuairisceán athchúrsálaí - 1, ní fhaigheann ach oidis táirgthe a bhfuil cosán cruthaithe féin-athchúrsáilte neamh-ghineach an caipín níos airde roghnaithe. Ag nó faoi bhun na tairsí sin níl aon éifeacht ag an ticbhosca seo. Úsáideann inneall gan athrú an gnáth-aischur 25% mar thairseach coimeádach +300% gan oidis athchúrsála a athrú.
mir-prototype-efficiency-cap=Roghnaíonn sé cé chomh fada agus is féidir le héifeachtaí éifeachtúlachta úsáid fuinnimh meaisín gníomhach a laghdú. Fágann -80% (gan athrú) na teorainneacha úsáide fuinnimh atá ann faoi láthair amháin. Is féidir le laghduithe níos doimhne druidim le húsáid fuinnimh nialasach gan teorainneacha truaillithe a athrú.
mir-prototype-pollution-cap=Roghnaíonn sé cé chomh fada agus is féidir le héifeachtaí laghdaithe truaillithe truailliú meaisín a laghdú. Fágann -80% (gan athrú) na teorainneacha truaillithe atá ann faoi láthair leo féin. Is féidir le laghduithe níos doimhne druidim le truailliú nialasach gan úsáid fuinnimh a athrú.
mir-prototype-speed-floor=Roghnaíonn sé cé chomh fada agus is féidir le héifeachtaí diúltacha luais meaisíní tacaithe a mhoilliú. -80% (gan athrú) fágtar na teorainneacha atá ann faoi láthair amháin; baineann luachanna níos doimhne an gnáth-urlár síos go dtí gar-stad ag -99.99%.
mir-prototype-speed-cap=Roghnaíonn sé cibé an bhfágann MIR teorainneacha luas-éifeacht an mheaisín ina n-aonar nó an scríobhann sé caipín luais dearfach nua. caomhnaíonn +100000 % (gan athrú) na teorainneacha atá ann cheana; luachanna níos ísle clamp d'aon ghnó bónais luais an-mhór.
mir-prototype-quality-cap=Roghnaíonn sé cibé an bhfágann MIR teorainneacha cáilíochta-éifeacht an mheaisín ina n-aonar nó an scríobhann sé caipín cáilíochta dearfach nua. Coimeádann +100000% (gan athrú) na teorainneacha atá ann faoi láthair agus ní athraíonn sé sraitheanna cáilíochta nó foirmlí dóchúlachta míreanna.
mir-prototype-positive-power-floor=Réamhshocrú as. Nuair a bhíonn sé cumasaithe, athraíonn MIR fréamhshamhlacha soiléir 0W energy_usage gníomhach go 1W le linn luchtú fréamhshamhlacha ionas nach bhfeictear deilbhíní rabhaidh ísealchumhachta ar eintitis ar cheart dóibh méid beag bídeach neamh-nialas a tharraingt. Fág amach chun fréamhshamhlacha nialasacha a chaomhnú go díreach.
mir-settings-profile-import=Greamaigh teaghrán próifíle socruithe MIR anseo chun luachanna socraithe tosaithe easpórtáilte a chur i bhfeidhm mar chiseal sáraithe le linn giniúna fréamhshamhail. Fág bán le haghaidh gnáthshocruithe. Easpórtáil le /mir-settings-export ó shábháil gníomhach, ansin atosú tar éis an luach seo a athrú.
mir-debug-generation-report=Nuair atá sé cumasaithe, scríobhann sé logra struchtúrtha amháin in aghaidh an tsrutha ginte nó scipeálach agus síneadh bonn, lena n-áirítear pacáistí eolaíochta, réamhriachtanais, comhaireamh éifeacht, stádas comhoiriúnachta saotharlainne, agus foinse deilbhíní.
mir-debug-recipe-matches=Nuair atá sé cumasaithe, scríobhann sé ainmneacha oideas comhoiriúnaithe do gach sruth táirgiúlachta ginte. Is féidir é seo a fhuaimniú i bpacáistí móra mod.
mir-debug-scripted-effects=Nuair atá sé cumasaithe, scríobhann sé iontrálacha loga ama rite nuair a ríomhann teicneolaíochtaí scripte éifeachtaí domhanda nó imeachtaí-tiomáinte.
mir-lab-incompatibility-policy=Roghnaíonn sé cad a dhéanann MIR nuair nach féidir le haon saotharlann gníomhach taighde a dhéanamh ar na pacáistí eolaíochta roghnaithe.
ips-effect-per-level-stream=Socraíonn sé an bunéifeacht bonnsraith in aghaidh an leibhéil do __1__. Déantar sraitheanna agus éifeachtaí gaolmhara níos déanaí a scála go comhréireach. Éifeachtaí céatadáin úsáideann pointí céatadáin; úsáideann éifeachtaí comhairimh agus achair a n-aonad dúchais.
mir-effect-per-level=Socraíonn sé an éifeacht chanónach in aghaidh an leibhéil don leanúint gan teorainn __1__. Déantar éifeachtaí gaolmhara a scála go comhréireach ón mbonnlíne fanaile deiridh. Éifeachtaí céatadáin úsáideann pointí céatadáin; úsáideann éifeachtaí comhairimh agus achair a n-aonad dúchais.
mir-note-experimental-spoilage=Turgnamhach agus díchumasaithe de réir réamhshocraithe in v2.1.0. Is éifeacht scriptithe dhomhanda/leathanaigh é seo. Ní éilítear iompar stoic inmhillte atá ann cheana féin go dtí go ndéanfar é a bhailíochtú de láimh.
mir-note-agriculture-growth=Baineann sé seo le barra túir talmhaíochta nua-phlandaithe. Ní dhéantar barraí plandáilte atá ann cheana a athscála.
mir-note-cargo-pad-count=Taighde ar loighistic Spás-Aois Speisialta. Méadaíonn sé pillíní tuirlingthe lasta in aghaidh an dromchla agus féadann sé cothromaíocht lóistíochta a athrú go suntasach.
mir-note-inserter-capacity=Díchumasaithe de réir réamhshocraithe. Is féidir le hacmhainn bhreise ionsaitheoirí ionsaitheoirí ciorcaid-rialaithe a bhriseadh agus leas iomlán a bhaint as innill a laghdú.
mir-note-native-owner-managed-stream=Más le teicneolaíocht gan teorainn suiteáilte an teaghlach taighde seo cheana féin, cumraíonn na socruithe tosaithe céanna an t-úinéir sin seachas dúblach a chruthú. Caomhnaíonn mainneachtainí MIR gan athrú fréamhshamhail deiridh an úinéara go díreach. Ní bheidh feidhm ag sáruithe soiléire ar chostais, ar am, ar uasleibhéil agus ar éifeacht ach amháin tar éis meaitseáil úinéara shábháilte; fágann díchumasú an tsrutha an teicneolaíocht sheachtrach gan teagmháil. Atosaigh Factorio tar éis na socruithe tosaithe a athrú. Ciallaíonn uasleibhéal 0 gan teorainn, agus is ionann luachanna éifeacht agus pointí céatadáin in aghaidh an leibhéil.

