[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Автоматты түрде табуды, тіркемелерді немесе жасауды орындамайды. MIR тұрақты зерттеулері өзгеріссіз қалады.
mir-automatic-productivity-action-preview=Үміткерлерді анықтайды және жіктейді, содан кейін қабылданған және өткізіп алынған шешімдерді Factorio журналына жазады. Ол рецепттерді тіркемейді немесе зерттеулер жасамайды.
mir-automatic-productivity-action-apply=Әдепкі. Үміткерлерді ашады және қолданыстағы MIR зерттеулеріне тек қауіпсіздігі дәлелденген рецепттерді қосады. Ол өздігінен зерттеулер жасамайды; төмендегі екі құсбелгі жасауды басқарады.
mir-automatic-compiler-mode-off=Ажыратылғанның бұрынғы баламасы.
mir-automatic-compiler-mode-report=Алдын ала қарау өзгерістерінің бұрынғы баламасы.
mir-automatic-compiler-mode-safe-attach=Зерттеуді жасау өшірілген кезде қауіпсіз өзгертулерді қолданудың бұрынғы баламасы.
mir-automatic-compiler-mode-exact-pack=Зерттеуді жасау қосылған және тексерілген үйлесімділік деректері қажет қауіпсіз өзгертулерді қолданудың бұрынғы баламасы.
mir-automatic-compiler-mode-safe-generate=Тіркелген эксперименттік провайдерлер үшін зерттеуді жасау қосылған қауіпсіз өзгертулерді қолданудың бұрынғы баламасы.
mir-adjust-vanilla-weapon-speed-techs-off=MIR қосымша қабаттасатын зымыран/зеңбірек бонусын тазалауды өшіріңіз.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Қосылған, қол жететін шексіз технология нақты ауыстыру әсерін қамтамасыз еткенде ғана MIR-дің қабаттасатын ракета/зеңбірек бонустарын алып тастаңыз.
mir-adjust-vanilla-weapon-speed-techs-always=Әрқашан MIR-дің қабаттасатын ракета/зеңбірек бонустарын алып тастаңыз. Қатаң бөлуді қаласаңыз ғана пайдаланыңыз.
mir-science-pack-ingredient-policy-configured=Әрбір жасалған технологияның конфигурацияланған ғылыми бумаларын қосымша ингредиенттерді кеңейтусіз пайдаланыңыз. MIR әдепкі.
mir-science-pack-ingredient-policy-space=Қол жетімді болған кезде ғарыш туралы ғылымды қосыңыз. Зымыраннан кейінгі қарапайым қиындықты арттыру.
mir-science-pack-ingredient-policy-space-and-promethium=Қол жетімді болған кезде ғарыш пен прометий ғылымын қосыңыз. Ғарыш дәуірінің өте кеш зерттеу раковиналары үшін ең жақсы.
mir-science-pack-ingredient-policy-space-age-progression=Таңдалған бумалар білдіретін Space Age прогрессия бумаларын ғана қосыңыз. Байланысты емес модификацияланған бумаларды қоспайды.
mir-science-pack-ingredient-policy-official-progression=Қазірдің өзінде таңдалған ең жетілдірілген ресми бумамен болжайтын ресми алғышарт стиліндегі жетіспейтін бумаларды қосыңыз.
mir-science-pack-ingredient-policy-mod-progression=Модификацияланған ғылыми буманың прогрессінен алынған жетіспейтін зертханалық үйлесімді бумаларды қосыңыз және алғышарттардың құлпын ашыңыз.
mir-science-pack-ingredient-policy-all-official=Ағымдағы мод жинағында бар әрбір ресми базаны және Ғарыш дәуірі ғылыми жинағын пайдаланыңыз.
mir-science-pack-ingredient-policy-all=Модификацияланған ғылыми бумаларды қоса, әрбір белсенді зертханалық үйлесімді ғылыми жинақтарды пайдаланыңыз.
mir-lab-incompatibility-policy-reduce=Ғылыми жинақтарды белсенді зертхана қабылдаған ең үлкен жинаққа дейін азайту арқылы технологияны сақтаңыз. Мод бумалары үшін ең қауіпсіз әдепкі.
mir-lab-incompatibility-policy-skip=Ешбір белсенді зертхана таңдалған ғылыми жинақ жинағын зерттей алмаса, технологияны өткізіп жіберіңіз. Қатаңырақ және тексеру оңайырақ.
mir-lab-incompatibility-policy-engine-default=Таңдалған ғылыми жинақ жинағын ешқашан қайта жазбаңыз. MIR қауіпсіз зерттелетін жинақты өзгеріссіз сақтайды және Factorio дәл осы жинақты зерттей алмаған кезде жасалған технологияны өткізбейді.
mir-prototype-productivity-cap-engine-default=Әрбір рецепттің бар өнімділік шегін жалғыз қалдырыңыз. Пайдаланушы қақпағы жоқ рецепттер Factorio-ның қалыпты +300% өнімділік бонус шегін пайдаланады.
mir-prototype-productivity-cap-percent-25=Параметрлік емес рецепт өнімділігі шектерін +25% етіп орнатыңыз. Бұл қатаң ерте шек.
mir-prototype-productivity-cap-percent-50=Параметрлік емес рецепт өнімділігі шектерін +50% етіп орнатыңыз. Бұл қалыпты шектен төмен және өнімділікті зерттеуді тезірек тоқтатуға мәжбүр етеді.
mir-prototype-productivity-cap-percent-75=Параметрлік емес рецепт өнімділігі шектерін +75% етіп орнатыңыз. Бұл қалыпты шектен төмен және өнімділікті зерттеуді тезірек тоқтатуға мәжбүр етеді.
mir-prototype-productivity-cap-percent-100=Параметрлік емес рецепт өнімділігі шектерін +100% орнатыңыз. Бұл қалыпты шектен төмен және өнімділікті зерттеуді тезірек тоқтатуға мәжбүр етеді.
mir-prototype-productivity-cap-percent-125=Параметрлік емес рецепт өнімділігі шектерін +125% орнатыңыз.
mir-prototype-productivity-cap-percent-150=Параметрлік емес рецепт өнімділігі шектерін +150% етіп орнатыңыз.
mir-prototype-productivity-cap-percent-200=Параметрлік емес рецепт өнімділігі шектерін +200% етіп орнатыңыз. Бұл қалыпты шектен төмен және өнімділікті зерттеуді тезірек тоқтатуға мәжбүр етеді.
mir-prototype-productivity-cap-percent-250=Параметрлік емес рецепт өнімділігі шектерін +250% етіп орнатыңыз. Бұл қалыпты қақпақтан сәл төмен.
mir-prototype-productivity-cap-percent-400=Параметрлік емес рецепт өнімділігі шектерін +400% етіп орнатыңыз. Бұл өнімділік ауқымын қалыпты шекті шектен тыс кеңейтеді.
mir-prototype-productivity-cap-percent-500=Параметрлік емес рецепт өнімділігі шектерін +500% етіп орнатыңыз. Бұл өнімділік ауқымын қалыпты шекті шектен тыс кеңейтеді.
mir-prototype-productivity-cap-percent-750=Параметрлік емес рецепт өнімділігі шектерін +750% етіп орнатыңыз.
mir-prototype-productivity-cap-percent-1000=Параметрлік емес рецепт өнімділігі шектерін +1000% етіп орнатыңыз. Ұзақ уақыт үнемдеу үшін өнімділікті зерттеу маңызды болуы керек жерде пайдаланыңыз.
mir-prototype-productivity-cap-percent-2500=Параметрлік емес рецепт өнімділігі шектерін +2500% етіп орнатыңыз. Өте ұзақ сақтау үшін пайдаланыңыз.
mir-prototype-productivity-cap-percent-5000=Параметрлік емес рецепт өнімділігі шектерін +5000% етіп орнатыңыз.
mir-prototype-productivity-cap-percent-10000=Параметрлік емес рецепт өнімділігі шектерін +10000% етіп орнатыңыз. Тек ұзақ мерзімді масштабтау үшін пайдаланыңыз.
mir-prototype-productivity-cap-percent-25000=Параметрлік емес рецепт өнімділігі шектерін +25000% етіп орнатыңыз. Тек ұзақ мерзімді масштабтау үшін пайдаланыңыз.
mir-prototype-productivity-cap-percent-100000=Параметрлік емес рецепт өнімділігі шектерін +100000% етіп орнатыңыз. Бұл көптеген сақтаулар үшін тиімді түрде жабылады.
mir-recycling-return-chance-engine-default=Қайта өңдеудің әрбір рецептін өзгеріссіз қалдырыңыз.
