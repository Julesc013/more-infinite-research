[mod-setting-description]
ips-require-space-gate=Қосылған кезде, бұл технологиялар ванильде ғарыш ғылымы зерттелмейінше немесе Ғарыш дәуірінде прометий ғылымы зерттелгенше құлыптаулы күйде қалады.
mir-science-pack-ingredient-policy=MIR жасалған технологияларға ғылым бумаларын қосу жолын таңдайды. Опциялар консервативтіден кеңге қарай реттелген: әдепкі пакеттер, ойынның кеш пакеттері, прогресске негізделген бумалар, содан кейін барлық қолжетімді бумалар.
mir-automatic-productivity-action=Орнатылған режим рецептерінде табылған қауіпсіз өнімділік мүмкіндіктерімен MIR не істейтінін таңдайды. Өшірулі автоматты түрде табуды орындамайды. Зерттеуді өзгертпей Factorio журналында қабылданған және өткізіп жіберілген өзгерістер жазбаларын алдын ала қараңыз. Қауіпсіз өзгертулерді қолдану (әдепкі) жарамды рецепттерді тек қолданыстағы MIR зерттеулеріне қосады. Бұл күшті немесе жетілуді емес, әрекетті басқарады; төмендегі жасау құсбелгілері бөлек. Иелік, қайта өңдеу, ықтималдық, катализатор, ғылым, зертхана, алғышарт, мақсат, сәйкестік, прогресс және цикл тексерулері әрқашан қолданылады.
mir-automatic-create-research=Әдепкі: өшірулі. Шектеулі шектеулер Үйлесімді бар MIR зерттеулеріне қауіпсіз өзгерістерді қолдану; сәйкес ағыны жоқ кандидаттар өткізілмейді және хабарланады. Қосулы рұқсаты бар тіркелген провайдерге бұрыннан бар зерттеулер сәйкес келмеген кезде бір тұрақты жалпы шексіз өнімділік технологиясын жасауға мүмкіндік береді. Төмендегі тексерілген деректер құсбелгісі эксперименттік провайдерлердің жарамдылығын анықтайды. MIR ешқашан бір мод немесе рецепт үшін бір технология жасамайды және әрбір қатаң қауіпсіздік, ғылым, иелік, сәйкестік, прогресс және цикл қақпасы әлі де қолданылады.
mir-automatic-require-reviewed-data=Әдепкі: қосулы. Бұл жаңа зерттеу жасауға рұқсат беру қосулы болғанда ғана маңызды; ол бұрыннан бар зерттеулерге қауіпсіз қосылуға ешқашан бөгет жасамайды. Рұқсаттарда тек провайдер отбасылары ғана тексеріліп, нақты нұсқа дәлелдерімен расталған, сондықтан эксперименттік отбасылар өткізілмейді. Өшіру тіркелген эксперименттік провайдерлерге жалпы құрылымдық дәлелдерден жасауға рұқсат береді. Ең кең эксперименттік әрекет үшін зерттеу жасауды қосыңыз және бұл талапты өшіріңіз. Ешбір құндылық қатты қауіпсіздік қақпасын айналып өте алмайды.
mir-automatic-compiler-mode=Бөлінген автоматты өнімділікті басқару элементтері алдында жасалған профильдер үшін жасырын үйлесімділік көпірі. Әдепкі емес бұрынғы мән барлық жаңа басқару элементтері өздерінің әдепкі мәндерінде қалған кезде ғана құрметтеледі. Ашық бақылауды алу үшін кез келген жаңа басқару элементін өзгертіңіз.
ips-enable-stream=__1__ рецепттері, әсерлері, алғышарттары және ғылыми жинақтары қолжетімді болған кезде жасалған шексіз технологияны жасайды. MIR бұл технологияны жасауына жол бермеу үшін мұны өшіріңіз.
ips-cost-base-stream=__1__ бірінші жасалған деңгейі үшін қажет зерттеу бірліктері. Кемінде 1 болуы керек. Кейінгі деңгейлер осы мәннен және шығындардың өсу коэффициентінен есептеледі.
ips-cost-growth-stream=__1__ әрбір кейінгі деңгейлеріне мультипликатор қолданылды. Тұрақты шығындар үшін 1 мәнін, деңгейге 50% өсу үшін 1,5 немесе екі еселенген шығындар үшін 2 пайдаланыңыз.
ips-max-level-stream=__1__ үшін жасалған ең жоғары деңгей. Шексіз деңгейлер үшін 0 мәніне орнатыңыз.
ips-research-time-stream=__1__ үшін зерттеу бірлігіне секунд. Осы технология үшін MIR әдепкі мәнін пайдалану үшін 0 мәніне орнатыңыз. Бұл жалпы зерттеу уақыты емес; жалпы уақыт сонымен қатар зерттеу құнына, зертхана санына, зертханалық жылдамдыққа және модульдерге байланысты.
mir-enable-base-tech=__1__ ваниль қақпағын шексіз технология ретінде жалғастыруға мүмкіндік береді. MIR осы ваниль тізбегін ұзартпай жаңа зерттеу жолдарын қосқыңыз келсе, мұны өшіріңіз.
mir-cost-base=__1__ бірінші MIR жалғастыру деңгейі үшін қажет зерттеу бірліктері. Мүмкін болса, ваниль тізбегінің шығын үлгісін мұраға алу үшін 0 мәніне орнатыңыз.
mir-cost-growth=__1__ әрбір кейінгі MIR жалғастыру деңгейіне мультипликатор қолданылады. Мүмкін болса, ваниль тізбегінің өсу үлгісін алу үшін 0 мәніне орнатыңыз.
mir-max-level=__1__ үшін ең жоғары MIR жалғастыру деңгейі. Шексіз деңгейлер үшін 0 мәніне орнатыңыз.
mir-research-time=__1__ MIR жалғасы үшін зерттеу бірлігіне секунд. Мүмкін болса, ваниль тізбегінің зерттеу бірлігі уақытын мұраға алу үшін 0 мәніне орнатыңыз.
mir-prefer-this-mod-for-competing-techs=Қосылған кезде, бұл режим таңдалған бәсекелес шексіз кеңейтімдерді жояды және өз нұсқаларын пайдаланады. Басқа режимдердің бәсекелес нұсқаларын сақтау үшін өшіріңіз.
mir-adjust-vanilla-weapon-speed-techs=Нақты шексіз ауыстыру қамтылған кезде, MIR қаруды ату жылдамдығының жалғасуынан зымыран және зеңбірек жылдамдығы бонустарын алып тастауын басқарады. Ванильді қаруды ату жылдамдығының шектеулі технологиялары бастапқы бонустарын сақтайды.
mir-use-installed-space-age-icons=Қосылған кезде, MIR бағдарламасы орнатылған ресми DLC белгіше файлдарына, соның ішінде Space Age және Elevated Rails файлдарына сілтеме жасай алады, тіпті бұл режимдер негізгі ойынды іске қосу үшін өшірілген болса да. Бұл DLC файлдары орнатылмаған болса, оны өшіріңіз; Factorio прототипті жүктеу кезінде жетіспейтін белгіше файлдарын керемет түрде қалпына келтіре алмайды.
mir-pipeline-extent-multiplier=Тек құбыр нысандары ғана емес, прототиптердегі сұйықтық қорапшасының құбыр желісінің танылған өрістері үшін тек іске қосуға арналған ашылмалы мультипликатор. 100% прототиптерді өзгеріссіз қалдырады және құбыр өткізгішін жүктемейді немесе сұйықтық қораптарын сканерлемейді. 100% емес мәндер эксперименталды болып табылады және сұйықтық қораптарын анықтайтын машиналарға, резервуарларға, итергіштерге және модификацияланған прототиптерге әсер етуі мүмкін.
mir-unrestricted-modules=Эксперименттік және балансты бұзу. Қосылған кезде, әрбір бар рецепт барлық бес модуль әсерлерін қабылдайды және ұялары бар әрбір бар модуль қабылдағышы әрбір табылған модуль санатын қабылдайды. Бұл модуль ұяшықтарын қоспайды немесе модуль прототиптерін өзгертпейді және өнімділікті, сапаны және модификацияланған модуль циклдерін қосуы мүмкін.
mir-prototype-productivity-cap=MIR рецепт өнімділігі шектерін жалғыз қалдыруын немесе параметрі жоқ, қайта өңделмейтін әрбір рецептке іске қосу қақпағын жазуын таңдайды. +300% (өзгеріссіз) бар рецепт қақпақтарын сақтайды; төмен мәндер өнімділік масштабын қысқартады, ал жоғары мәндер оны кеңейтеді.
mir-recycling-return-chance=Жасырын жасалған қайта өңдеу рецептерін ғана басқарады. Автоматты режим қалыпты 25% материал қайтаруын таңдалған өнімділік шегіндегі жалпы шығару көбейткішіне бөлінген ең көбі 1-ге дейін азайтады. Бекітілген таңдаулар бірдей жасалған қайтаруларды тікелей масштабтайды. Көрінетін процестер мен рецепт өнімділігінің шектері ешқашан өзгертілмейді.
mir-productivity-cap-self-recycling-only=1-ден жоғары / қайта өңдеуші қайтару - 1, генеративті емес өзін-өзі қайта өңдеу жолы дәлелденген өндірістік рецепттер ғана таңдалған жоғарғы қақпақты алады. Бұл шекті мәнде немесе одан төмен бұл құсбелгі әсер етпейді. Қозғалтқыш өзгеріссіз қалыпты 25% қайтарымды консервативті +300% шегі ретінде қайта өңдеу рецептерін өзгертпестен пайдаланады.
mir-prototype-efficiency-cap=Тиімділік әсерлері машинаның белсенді қуатын пайдалануды қаншалықты азайтатынын таңдайды. -80% (өзгеріссіз) бар энергияны пайдалану шектеулерін жалғыз қалдырады. Тереңірек қысқартулар ластану шегін өзгертпестен белсенді энергияны нөлдік тұтынуға жақындай алады.
mir-prototype-pollution-cap=Ластануды азайту әсерлері машинаның ластануын қаншалықты азайтатынын таңдайды. -80% (өзгеріссіз) ластанудың қолданыстағы шектерін жалғыз қалдырады. Тереңірек қысқартулар энергияны пайдалануды өзгертпестен нөлдік ластануға жақындай алады.
mir-prototype-speed-floor=Теріс жылдамдық әсерлері қолдау көрсетілетін машиналарды қаншалықты бәсеңдететінін таңдайды. -80% (өзгеріссіз) бар шектеулерді жалғыз қалдырады; тереңірек мәндер қалыпты еденді -99,99% аялдамаға дейін жояды.
mir-prototype-speed-cap=MIR құрылғының жылдамдық әсерінің шектеулерін жалғыз қалдыруын немесе жаңа оң жылдамдық шегін жазуын таңдайды. +100000% (өзгеріссіз) бар шектеулерді сақтайды; төмен мәндер өте үлкен жылдамдық бонустарын әдейі қысады.
mir-prototype-quality-cap=MIR құрылғының сапа әсерінің шектеулерін жалғыз қалдыруын немесе жаңа оң сапа қақпағын жазуын таңдайды. +100000% (өзгеріссіз) бар шектеулерді сақтайды және сапа деңгейлерін немесе элемент ықтималдығы формулаларын өзгертпейді.
mir-prototype-positive-power-floor=Әдепкі өшірулі. Қосылған кезде, MIR прототипті жүктеу кезінде 0 Вт белсенді энергияны пайдалану прототиптерін 1 Вт етіп өзгертеді, сондықтан нөлден басқа шамалы соманы тартуы керек нысандарда төмен қуат ескерту белгішелері пайда болмайды. Нөлдік қуат прототиптерін дәл сақтау үшін өшіріңіз.
mir-settings-profile-import=Экспортталған іске қосу-параметр мәндерін прототип жасау кезінде қайта анықтау қабаты ретінде қолдану үшін MIR параметрлерінің профиль жолын осы жерге қойыңыз. Қалыпты параметрлер үшін бос қалдырыңыз. Белсенді сақтаудан /mir-settings-export арқылы экспорттаңыз, содан кейін осы мәнді өзгерткеннен кейін қайта іске қосыңыз.
mir-debug-generation-report=Қосылған кезде ғылыми бумаларды, алғышарттарды, әсерлер санын, зертханалық үйлесімділік күйін және белгіше көзін қоса, жасалған немесе өткізіп жіберген ағын мен негізгі кеңейтім үшін бір құрылымдық журнал жолын жазады.
mir-debug-recipe-matches=Қосылған кезде әрбір жасалған өнімділік ағыны үшін сәйкес рецепт атауларын жазады. Бұл үлкен мод пакеттерінде шулы болуы мүмкін.
mir-debug-scripted-effects=Қосылған кезде сценарийленген технологиялар жаһандық немесе оқиғаға негізделген әсерлерді қайта есептегенде, орындау уақыты журналының жазбаларын жазады.
mir-lab-incompatibility-policy=Таңдалған ғылыми бумаларды кез келген белсенді зертхана зерттей алмаған кезде MIR не істейтінін таңдайды.
ips-effect-per-level-stream=__1__ үшін әр деңгейге негізгі негізгі деңгей әсерін орнатады. Қатысты кейінгі деңгейлер мен әсерлер пропорционалды түрде масштабталады. Пайыздық әсерлер пайыздық тармақтарды пайдаланады; санау және қашықтық әсерлері өздерінің төл бірліктерін пайдаланады.
mir-effect-per-level=Шексіз __1__ жалғасы үшін әр деңгейдегі канондық әсерді орнатады. Қатысты әсерлер соңғы ванильдің бастапқы деңгейіне пропорционалды түрде масштабталады. Пайыздық әсерлер пайыздық тармақтарды пайдаланады; санау және қашықтық әсерлері өздерінің төл бірліктерін пайдаланады.
mir-note-experimental-spoilage=Эксперименттік және v2.1.0 нұсқасында әдепкі бойынша өшірілген. Бұл жаһандық/карта бойынша сценарийлік әсер. Қолмен расталмайынша, бар бұзылатын стек әрекеті талап етілмейді.
mir-note-agriculture-growth=Жаңадан отырғызылған ауылшаруашылық мұнара дақылдарына қолданылады. Қолданыстағы егілген дақылдардың масштабы өзгертілмейді.
mir-note-cargo-pad-count=Арнайы ғарыш дәуіріндегі логистикалық зерттеулер. Әр бетке жүк қону алаңдарын көбейтеді және логистикалық балансты айтарлықтай өзгерте алады.
mir-note-inserter-capacity=Әдепкі бойынша өшірілген. Қосымша кірістіргіш сыйымдылығы тізбекпен басқарылатын кірістіргіштерді бұзады және қозғалтқышты оңтайландыруды азайтады.
mir-note-native-owner-managed-stream=Орнатылған шексіз технология осы зерттеу тобына әлдеқашан тиесілі болса, дәл осы іске қосу параметрлері көшірме жасаудың орнына сол иесін конфигурациялайды. Өзгертілмеген MIR әдепкілері иесінің соңғы прототипін дәл сақтайды. Айқын құн, уақыт, максималды деңгей және әсерді қайта анықтау қауіпсіз иесі сәйкес келгеннен кейін ғана қолданылады; ағынды өшіру сыртқы технологияны қозғамайды. Іске қосу параметрлерін өзгерткеннен кейін Factorio бағдарламасын қайта іске қосыңыз. Ең үлкен 0 деңгейі шексіз дегенді білдіреді, ал әсер мәндері әр деңгейге пайыздық нүктелер болып табылады.

