[technology-description]
more-infinite-research.recipe_productivity=Таңдалған рецепттер үшін рецепт өнімділігін арттырады. Factorio ең жоғары өнімділік шегі әлі де қолданылады; Қосымша шексіз деңгейлер рецепт өзінің шегіне жеткенде практикалық әсер етпеуі мүмкін.
more-infinite-research.direct_effect=Шексіз қайталанатын бонус қосады. Ғылыми жинақтар белсенді зертханалардан таңдалады, сондықтан технология үйлесімді мод жиынтықтарымен зерттелетін болып қалады.
more-infinite-research.cargo_bay_unloading_distance=Жүк қону алаңы мен қосылған түсіру орындары арасындағы максималды қашықтықты арттырады.
more-infinite-research.cargo_landing_pad_count=Әрбір күш бір беткей құра алатын жүк қону алаңдарының санын көбейтеді.
more-infinite-research.flamethrower_shooting_speed=Отын қарулары мен от шашатын мұнаралар үшін ату жылдамдығын арттырады.
more-infinite-research.electric_shooting_speed=Электрлік қарулар үшін ату жылдамдығын арттырады. Ванильде бұл разряд қорғанысына әсер етеді; Ғарыш дәуірінде ол Tesla оқ-дәрі санаты қол жетімді болған кезде Tesla қаруларына да әсер етеді.
more-infinite-research.spoilage_preservation=Шектелген сценарий эффектісі арқылы жаһандық бүліну уақытының модификаторын арттырады. Қолданыстағы бүлінетін заттар ойында сыналғанға дейін ағымдағы бүліну мерзімін сақтай алады.
more-infinite-research.agricultural_growth_speed=Шектелген сценарий эффектісі арқылы жаңадан отырғызылған ауылшаруашылық мұнара өсімдіктерінің қалған өсу уақытын қысқартады.
more-infinite-research.lab_productivity=Жергілікті зертханалық зерттеу өнімділігі модификаторын пайдаланып, әрбір тұтынылатын ғылыми бумадан алынған зерттеу прогресін арттырады.

