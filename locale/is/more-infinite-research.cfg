[mod-setting-description]
ips-require-space-gate=Þegar hún er virkjuð haldast þessi tækni læst þar til geimvísindi eru rannsökuð í vanillu eða prómetíum vísindi eru rannsökuð á geimöld.
mir-science-pack-ingredient-policy=Velur hvernig MIR bætir vísindapakka við framleidda tækni. Valmöguleikunum er raðað frá íhaldssamt til breitt: sjálfgefnir pakkar, seinni leikjapakkar, pakkar sem byggja á framvindu, svo allir tiltækir pakkar.
mir-automatic-productivity-action=Velur það sem MIR gerir með öruggum framleiðnitækifærum sem finnast í uppsettum uppskriftum. Óvirkt framkvæma enga sjálfvirka uppgötvun. Forskoðaðu breytingarskrár samþykktar og sleppt umsækjendum í Factorio log án þess að breyta rannsóknum. Notaðu öruggar breytingar (sjálfgefið) bætir gjaldgengum uppskriftum aðeins við samhæfðar MIR rannsóknir sem fyrir eru. Þetta stjórnar virkni, ekki styrk eða þroska; sköpunargátreitirnir hér að neðan eru aðskildir. Eignarhald, endurvinnsla, líkindi, hvati, vísindi, rannsóknarstofa, forsenda, markmið, auðkenni, framvindu og hringrásarathuganir eiga alltaf við.
mir-automatic-create-research=Sjálfgefið: slökkt. Bannað við mörk. Notaðu öruggar breytingar á samhæfum núverandi MIR rannsóknum; Frambjóðendum sem ekki hafa viðeigandi straum er sleppt og greint frá þeim. Kveikt gerir gjaldgengum skráðum veitanda kleift að búa til eina stöðuga almenna óendanlega framleiðnitækni þegar engar fyrirliggjandi rannsóknir passa. Gátreiturinn fyrir yfirfarin gögn hér að neðan ákvarðar hvort tilraunaveitendur séu gjaldgengir. MIR býr aldrei til eina tækni fyrir hverja mod eða uppskrift, og öll erfið öryggis-, vísindi, eignarhald, auðkenni, framfarir og hringrásarhlið eiga enn við.
mir-automatic-require-reviewed-data=Sjálfgefið: kveikt. Þetta skiptir aðeins máli þegar kveikt er á stofnun nýrrar rannsóknar; það hindrar aldrei örugga tengingu við núverandi rannsóknir. Í leyfum eru einungis fjölskyldufjölskyldur sem eru merktar yfirfarnar og studdar viðeigandi sönnunargögnum í nákvæmri útgáfu, þannig að tilraunafjölskyldum er sleppt. Slökkt leyfir skráðum tilraunaveitendum að búa til úr almennum byggingargögnum. Til að fá sem víðtækasta tilraunahegðun, virkjaðu rannsóknarsköpun og slökktu á þessari kröfu. Ekkert gildi getur farið framhjá hörðu öryggishliði.
mir-automatic-compiler-mode=Falin samhæfnibrú fyrir snið sem voru búin til fyrir skiptu sjálfvirku framleiðnistýringarnar. Eldra gildi sem ekki er sjálfgefið er aðeins virt á meðan allar nýjar stýringar eru áfram í sjálfgefnu gildi sínu. Breyttu nýrri stjórn til að taka skýra stjórn.
ips-enable-stream=Býr til óendanlega tækni fyrir __1__ þegar uppskriftir hennar, áhrif, forsendur og vísindapakkar eru tiltækar. Slökktu á þessu til að koma í veg fyrir að MIR myndi þessa tækni.
ips-cost-base-stream=Rannsóknareiningar sem krafist er fyrir fyrsta myndaða stigið af __1__. Verður að vera að minnsta kosti 1. Síðari stig eru reiknuð út frá þessu gildi og kostnaðarvaxtarstuðlinum.
ips-cost-growth-stream=Margfaldari notaður á hvert síðara stig af __1__. Notaðu 1 fyrir flatan kostnað, 1,5 fyrir 50% vöxt á hvert stig eða 2 fyrir tvöföldun kostnaðar.
ips-max-level-stream=Hæsta myndað stig fyrir __1__. Stillt á 0 fyrir óendanlega stig.
ips-research-time-stream=Sekúndur á hverja rannsóknareiningu fyrir __1__. Stilltu á 0 til að nota sjálfgefið MIR fyrir þessa tækni. Þetta er ekki heildar rannsóknartími; Heildartími fer einnig eftir rannsóknarkostnaði, fjölda rannsóknarstofu, hraða rannsóknarstofu og einingum.
mir-enable-base-tech=Leyfir __1__ að halda áfram framhjá vanilluhettunni sinni sem óendanlega tækni. Slökktu á þessu ef þú vilt að MIR bæti við nýjum rannsóknarlínum án þess að lengja þessa vanillukeðju.
mir-cost-base=Rannsóknareiningar sem krafist er fyrir fyrsta MIR framhaldsstig __1__. Stilltu á 0 til að erfa kostnaðarmynstur vanillukeðjunnar þegar mögulegt er.
mir-cost-growth=Margfaldari notaður á hvert síðari MIR framhaldsstig __1__. Stilltu á 0 til að erfa vaxtarmynstur vanillukeðjunnar þegar mögulegt er.
mir-max-level=Hæsta MIR framhaldsstig fyrir __1__. Stillt á 0 fyrir óendanlega stig.
mir-research-time=Sekúndur á hverja rannsóknareiningu fyrir MIR framhald af __1__. Stilltu á 0 til að erfa rannsóknareiningatíma vanillukeðjunnar þegar mögulegt er.
mir-prefer-this-mod-for-competing-techs=Þegar það er virkt fjarlægir þetta mod valdar óendanlega viðbætur í samkeppni og notar sínar eigin útgáfur. Slökktu á til að halda samkeppnisútgáfum frá öðrum stillingum.
mir-adjust-vanilla-weapon-speed-techs=Stjórnar því hvort MIR fjarlægir hraðabónus fyrir eldflaugar og fallbyssur úr mynduðum vopnaskothraðaframhaldi þegar nákvæm óendanleg endurnýjun er tiltæk. Endanleg vanillu vopnaskothraðatækni heldur upprunalegum bónusum sínum.
mir-use-installed-space-age-icons=Þegar virkjað er, getur MIR vísað til uppsettra opinberra DLC táknaskráa, þar á meðal Space Age og Elevated Rails, jafnvel þegar þessi stillingar eru óvirkar til að keyra grunnleik. Slepptu þessu ef þessar DLC skrár eru ekki settar upp; Factorio getur ekki jafnað sig með þokkabót eftir táknskrár sem vantar við hleðslu frumgerðarinnar.
mir-pipeline-extent-multiplier=Ræsing-eingöngu fellivalmagnfaldari fyrir viðurkennda vökvakassa leiðslusvæði þvert á frumgerðir, ekki aðeins pípueiningar. 100% skilur frumgerðir óbreyttar og hleður ekki leiðslupassann eða skannar vökvakassa. Gildi sem ekki eru 100% eru tilraunagildi og geta haft áhrif á vélar, tanka, þrýstivélar og breyttar frumgerðir sem skilgreina vökvabox.
mir-unrestricted-modules=Tilrauna- og jafnvægisrof. Þegar virkjað er, tekur hver uppskrift sem fyrir er öll fimm einingaáhrifin og sérhver núverandi einingamóttakari með raufum tekur við öllum uppgötvuðum einingaflokkum. Þetta bætir ekki við einingaraufum eða breytir frumgerðum eininga, og gæti virkjað framleiðni, gæði og lykkjur með breyttum einingum.
mir-prototype-productivity-cap=Velur hvort MIR lætur framleiðnihettur fyrir uppskriftir vera í friði eða skrifar upphafshöft á hverja uppskrift sem ekki er breytileg, ekki endurvinnanleg. +300% (óbreytt) varðveitir núverandi uppskriftarhettur; Lægri gildi stytta framleiðniskala, en hærri gildi lengja hana.
mir-recycling-return-chance=Stjórnar eingöngu földum endurvinnsluuppskriftum. Sjálfvirk stilling dregur úr eðlilegri 25% efnisávöxtun í að hámarki 1 deilt með heildarframleiðslumargfaldara við valið framleiðnitak. Föst val skala sömu ávöxtun beint. Sýnilegum ferlum og framleiðnihettum uppskrifta er aldrei breytt.
mir-productivity-cap-self-recycling-only=Ofan 1 / endurvinnsluaðila skil - 1, aðeins framleiðsluuppskriftir með sannaða sjálfsendurvinnsluleið sem er ekki framkallandi fá valið hærra þak. Við eða undir þeim þröskuldi hefur þessi gátreit engin áhrif. Vél óbreytt notar venjulega 25% ávöxtun sem íhaldssamt +300% þröskuld án þess að breyta endurvinnsluuppskriftum.
mir-prototype-efficiency-cap=Velur hversu langt skilvirkniáhrif geta dregið úr virkri orkunotkun vélarinnar. -80% (óbreytt) sleppir núverandi orkunotkunarmörkum. Dýpri lækkun getur nálgast núll virka orkunotkun án þess að breyta mengunarmörkum.
mir-prototype-pollution-cap=Velur hversu langt mengunarminnkandi áhrif geta dregið úr vélmengun. -80% (óbreytt) lætur gildandi mengunarmörk vera í friði. Dýpri skerðingar geta nálgast núllmengun án þess að breyta orkunotkun.
mir-prototype-speed-floor=Velur hversu langt neikvæð hraðaáhrif geta hægt á studdum vélum. -80% (óbreytt) skilur núverandi mörk eftir; dýpri gildi fjarlægja venjulega gólfið niður í næstum stöðvun við -99,99%.
mir-prototype-speed-cap=Velur hvort MIR lætur hraðaáhrifamörk vélarinnar vera í friði eða skrifar nýtt jákvætt hraðatak. +100000% (óbreytt) varðveitir núverandi mörk; lægri gildi klemma viljandi mjög stóran hraða bónus.
mir-prototype-quality-cap=Velur hvort MIR lætur gæða-áhrifamörk vélarinnar vera í friði eða skrifar nýja jákvæða gæðahettu. +100000% (óbreytt) varðveitir núverandi mörk og breytir ekki gæðaþrepum eða líkindaformúlum vöru.
mir-prototype-positive-power-floor=Sjálfgefið slökkt. Þegar það er virkt breytir MIR skýrum 0W virkri orkunotkun frumgerðum í 1W við hleðslu frumgerða svo að viðvörunartákn fyrir lágt afl birtast ekki á einingum sem ættu að draga lítið magn sem er ekki núll. Slepptu því til að varðveita núll-afls frumgerð nákvæmlega.
mir-settings-profile-import=Límdu MIR stillingarprófílstreng hér til að beita útfluttum ræsistillingargildum sem hnekkt lag við gerð frumgerða. Skildu eftir autt fyrir venjulegar stillingar. Flyttu út með /mir-settings-export úr virkri vistun, endurræstu síðan eftir að hafa breytt þessu gildi.
mir-debug-generation-report=Þegar það er virkt, skrifar eina skipulagða annálaröð fyrir hverja myndaða eða sleppt straum og grunnviðbót, þar á meðal vísindapakka, forsendur, fjölda áhrifa, stöðu rannsóknarstofusamhæfis og táknuppsprettu.
mir-debug-recipe-matches=Þegar það er virkt, skrifar samsvarandi uppskriftarheiti fyrir hvern framleiðnistraum sem myndast. Þetta getur verið hávær í stórum mod pakkningum.
mir-debug-scripted-effects=Þegar það er virkt, skrifar keyrsluskrárfærslur þegar forskriftartækni endurreikna alþjóðleg eða atburðadrifin áhrif.
mir-lab-incompatibility-policy=Velur hvað MIR gerir þegar ekki er hægt að rannsaka valda vísindapakka af neinni virkri rannsóknarstofu.
ips-effect-per-level-stream=Stillir aðal grunnstigsáhrif fyrir hvert stig fyrir __1__. Tengd síðari stig og áhrif eru skaluð hlutfallslega. Hlutfallsáhrif nota prósentustig; fjölda- og fjarlægðaráhrif nota innfæddar einingar sínar.
mir-effect-per-level=Stillir kanónísk áhrif á hverju stigi fyrir hið óendanlega __1__ framhald. Tengd áhrif eru skaluð hlutfallslega frá loka grunnlínu vanillu. Hlutfallsáhrif nota prósentustig; fjölda- og fjarlægðaráhrif nota innfæddar einingar sínar.
mir-note-experimental-spoilage=Tilraunakennt og óvirkt sjálfgefið í v2.1.0. Þetta er alþjóðlegt/kort-breitt handritsáhrif. Ekki er gert tilkall til núverandi hegðunar með spillanlegum stafla fyrr en hún hefur verið staðfest handvirkt.
mir-note-agriculture-growth=Á við um nýgróðursett landbúnaðarturnræktun. Núverandi gróðursett uppskera er ekki endurskalað.
mir-note-cargo-pad-count=Sérstakar flutningsrannsóknir á geimöld. Eykur farm lendingarpúða á yfirborði og getur verulega breytt flutningsjafnvægi.
mir-note-inserter-capacity=Sjálfgefið óvirkt. Auka afkastageta innsetningartækis getur rofið hringrásarstýrð innsetningartæki og dregið úr hagræðingu vélarinnar.
mir-note-native-owner-managed-stream=Ef uppsett óendanlega tækni á nú þegar þessa rannsóknarfjölskyldu, stilla þessar sömu ræsingarstillingar þann eiganda í stað þess að búa til afrit. Óbreytt MIR vanskil varðveita loka frumgerð eigandans nákvæmlega. Skýr kostnaður, tími, hámarksstig og áhrif hnekkingar eiga aðeins við eftir örugga eigendasamsvörun; að slökkva á straumnum skilur ytri tæknina ósnortna. Endurræstu Factorio eftir að hafa breytt ræsistillingum. Hámarksstig 0 þýðir óendanlegt og áhrifagildi eru prósentustig fyrir hvert stig.

