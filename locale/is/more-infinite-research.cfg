[technology-description]
more-infinite-research.recipe_productivity=Eykur framleiðni uppskrifta fyrir valdar uppskriftir. Hámarksframleiðniþak Factorio gildir enn; óendanleg stig til viðbótar hafa kannski engin hagnýt áhrif þegar uppskrift nær lokinu.
more-infinite-research.direct_effect=Bætir við óendanlega endurteknum bónus. Vísindapakkar eru valdir úr virkum rannsóknarstofum þannig að tæknin er áfram rannsóknarhæf með samhæfum mod settum.
more-infinite-research.cargo_bay_unloading_distance=Eykur hámarksfjarlægð milli farmlendingarpalls og tengdra losunarpláss.
more-infinite-research.cargo_landing_pad_count=Eykur fjölda farmlendingarpúða sem hver kraftur getur byggt á hverju yfirborði.
more-infinite-research.flamethrower_shooting_speed=Eykur skothraða fyrir eldkastaravopn og logakastara.
more-infinite-research.electric_shooting_speed=Eykur tökuhraða fyrir rafvopn. Í vanillu hefur þetta áhrif á losunarvörn; með Space Age hefur það einnig áhrif á Tesla vopn þegar Tesla ammo flokkur er í boði.
more-infinite-research.spoilage_preservation=Eykur alþjóðlega spillingartímabreytileikann með afmörkuðum forskriftaráhrifum. Fyrirliggjandi skemmdir hlutir gætu haldið núverandi spillingarfresti þar til þeir eru prófaðir í leiknum.
more-infinite-research.agricultural_growth_speed=Styttir eftirstandandi vaxtartíma fyrir nýgróðursettar landbúnaðarturnaplöntur með afmörkuðum forskriftaráhrifum.
more-infinite-research.lab_productivity=Eykur framfarir í rannsóknum sem fengnar eru af hverjum neyttum vísindapakka, með því að nota innfædda framleiðnibreytingar rannsóknarstofurannsókna.

