[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Framkvæmir enga sjálfvirka uppgötvun, viðhengi eða sköpun. Fastar rannsóknir MIR haldast óbreyttar.
mir-automatic-productivity-action-preview=Uppgötvar og flokkar umsækjendur, skrifar síðan samþykktar og slepptu ákvarðanir í Factorio dagbókina. Það fylgir ekki uppskriftum eða skapar rannsóknir.
mir-automatic-productivity-action-apply=Sjálfgefið. Uppgötvar umsækjendur og tengir aðeins öryggisprófaðar uppskriftir við samhæfðar MIR rannsóknir. Það skapar ekki rannsóknir af sjálfu sér; gátreitirnir tveir fyrir neðan stjórna sköpun.
mir-automatic-compiler-mode-off=Eldri jafngildi fatlaðra.
mir-automatic-compiler-mode-report=Eldra jafngildi forskoðunarbreytinga.
mir-automatic-compiler-mode-safe-attach=Eldra jafngildi Notaðu öruggar breytingar með gerð rannsókna óvirk.
mir-automatic-compiler-mode-exact-pack=Eldri jafngildi Notaðu öruggar breytingar með kveikt á gerð rannsókna og krafist samhæfnisgagna.
mir-automatic-compiler-mode-safe-generate=Eldri jafngildi Notaðu öruggar breytingar með rannsóknasköpun virkt fyrir skráða tilraunaveitendur.
mir-adjust-vanilla-weapon-speed-techs-off=Slökktu á valfrjálsu hreinsun MIR sem skarast á eldflaugum/fallbyssum.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Fjarlægðu aðeins skarast eldflaugar/byssubónus MIR þegar virkjuð, aðgengileg óendanlega tækni veitir nákvæm skiptiáhrif.
mir-adjust-vanilla-weapon-speed-techs-always=Fjarlægðu alltaf MIR bónusa sem skarast á eldflaugum/fallbyssum. Notaðu aðeins ef þú vilt strangan aðskilnað.
mir-science-pack-ingredient-policy-configured=Notaðu uppsettar vísindapakka hverrar tækni sem myndast án valfrjálsar stækkunar innihaldsefna. MIR sjálfgefið.
mir-science-pack-ingredient-policy-space=Bættu við geimvísindum þegar þau eru tiltæk. Einföld erfiðleikaaukning eftir eldflaugar.
mir-science-pack-ingredient-policy-space-and-promethium=Bættu við plássi og prómetíumvísindum þegar þau eru tiltæk. Best fyrir mjög seint geimaldarrannsóknir.
mir-science-pack-ingredient-policy-space-age-progression=Bættu aðeins við framfarapökkum frá Space Age sem gefið er í skyn með völdum pökkum. Bætir ekki við óskyldum modduðum pökkum.
mir-science-pack-ingredient-policy-official-progression=Bættu við opinberum pökkum í forkröfustíl sem vantar upp á fullkomnasta opinbera pakkann sem þegar hefur verið valinn.
mir-science-pack-ingredient-policy-mod-progression=Bættu við vantar rannsóknarstofusamhæfðum pökkum sem ályktað er af breyttum framvindu vísindapakka og opnaðu forsendur.
mir-science-pack-ingredient-policy-all-official=Notaðu alla opinbera grunn- og geimaldarvísindapakka sem eru til í núverandi mod setti.
mir-science-pack-ingredient-policy-all=Notaðu alla virka rannsóknarstofusamhæfða vísindapakka, þar á meðal breytta vísindapakka.
mir-lab-incompatibility-policy-reduce=Haltu tækninni með því að minnka vísindapakkana í stærsta settið sem virkt rannsóknarstofa samþykkir. Öruggasta sjálfgefið fyrir mod pakka.
mir-lab-incompatibility-policy-skip=Slepptu tækninni ef engin virk rannsóknarstofa getur rannsakað valið vísindapakkasett. Strangari og auðveldara að endurskoða.
mir-lab-incompatibility-policy-engine-default=Aldrei endurskrifa valið vísindapakkasett. MIR varðveitir öruggt rannsakanlegt mengi óbreytt og sleppir tækninni sem myndast þegar Factorio getur ekki rannsakað nákvæmlega það mengi.
mir-prototype-productivity-cap-engine-default=Láttu núverandi framleiðnihettu hverrar uppskrift vera í friði. Uppskriftir án sérsniðins þaks nota venjulega +300% framleiðnibónusmörk Factorio.
mir-prototype-productivity-cap-percent-25=Stilltu framleiðniþak án breytu uppskrifta á +25%. Þetta er strangt snemmtap.
mir-prototype-productivity-cap-percent-50=Stilltu framleiðniþak án breytu uppskrifta á +50%. Þetta er undir venjulegu hámarki og gerir það að verkum að framleiðnirannsóknir hætta að hjálpa fyrr.
mir-prototype-productivity-cap-percent-75=Stilltu framleiðniþak án breytu uppskrifta á +75%. Þetta er undir venjulegu hámarki og gerir það að verkum að framleiðnirannsóknir hætta að hjálpa fyrr.
mir-prototype-productivity-cap-percent-100=Stilltu framleiðniþak án breytu uppskrifta á +100%. Þetta er undir venjulegu hámarki og gerir það að verkum að framleiðnirannsóknir hætta að hjálpa fyrr.
mir-prototype-productivity-cap-percent-125=Stilltu framleiðniþak án breytuuppskrifta á +125%.
mir-prototype-productivity-cap-percent-150=Stilltu framleiðniþak án breytu uppskrifta á +150%.
mir-prototype-productivity-cap-percent-200=Stilltu framleiðniþak án breytu uppskrifta á +200%. Þetta er undir venjulegu hámarki og gerir það að verkum að framleiðnirannsóknir hætta að hjálpa fyrr.
mir-prototype-productivity-cap-percent-250=Stilltu framleiðniþak án breytu uppskrifta á +250%. Þetta er aðeins undir venjulegu hámarki.
mir-prototype-productivity-cap-percent-400=Stilltu framleiðniþak án breytu uppskrifta á +400%. Þetta stækkar framleiðniskalann umfram venjulega þakið.
mir-prototype-productivity-cap-percent-500=Stilltu framleiðniþak án breytu uppskrifta á +500%. Þetta stækkar framleiðniskalann umfram venjulega þakið.
mir-prototype-productivity-cap-percent-750=Stilltu framleiðniþak án breytuuppskrifta á +750%.
mir-prototype-productivity-cap-percent-1000=Stilltu framleiðniþak án breytu uppskrifta á +1000%. Notaðu fyrir langa vistun þar sem framleiðnirannsóknir ættu að halda áfram að skipta máli.
mir-prototype-productivity-cap-percent-2500=Stilltu framleiðniþak án breytu uppskrifta á +2500%. Notaðu fyrir mjög langa vistun.
mir-prototype-productivity-cap-percent-5000=Stilltu framleiðniþak án breytu uppskrifta á +5000%.
mir-prototype-productivity-cap-percent-10000=Stilltu framleiðniþak án breytu uppskrifta á +10000%. Notaðu aðeins fyrir mikla langtíma mælikvarða.
mir-prototype-productivity-cap-percent-25000=Stilltu framleiðniþak án breytuuppskrifta á +25000%. Notaðu aðeins fyrir mikla langtíma mælikvarða.
mir-prototype-productivity-cap-percent-100000=Stilltu framleiðniþak án breytu uppskrifta á +100000%. Þetta er í raun ótakmarkað fyrir flestar vistanir.
mir-recycling-return-chance-engine-default=Skildu hverja endurvinnsluuppskrift óbreytta.
mir-recycling-return-chance-match-productivity-cap=Nýtingarörugg sjálfvirk lækkun fyrir faldar endurvinnsluuppskriftir. Notar 1 / (1 + framleiðnibónus), hámarki við venjulega 25% ávöxtun: +400% verða 20% og +1000% verða um 9,09%.
mir-recycling-return-chance-percent-25=Geymdu faldar endurvinnsluuppskriftir með venjulegri 25% efnisskilum.
mir-recycling-return-chance-percent-20=Skalaðu faldar framleiddar endurvinnsluuppskriftir í 20% efnisávöxtun.
mir-recycling-return-chance-percent-15=Skalaðu faldar framleiddar endurvinnsluuppskriftir í 15% efnisávöxtun.
mir-recycling-return-chance-percent-12-5=Skalaðu faldar framleiddar endurvinnsluuppskriftir í 12,5% efnisávöxtun.
mir-recycling-return-chance-percent-10=Skalaðu faldar framleiddar endurvinnsluuppskriftir í 10% efnisávöxtun.
mir-recycling-return-chance-percent-7-5=Skalaðu faldar framleiddar endurvinnsluuppskriftir í 7,5% efnisávöxtun.
mir-recycling-return-chance-percent-5=Skalaðu faldar framleiddar endurvinnsluuppskriftir í 5% efnisávöxtun.
mir-recycling-return-chance-percent-2-5=Skalaðu faldar framleiddar endurvinnsluuppskriftir í 2,5% efnisávöxtun.
mir-recycling-return-chance-percent-1=Skalaðu faldar framleiddar endurvinnsluuppskriftir í 1% efnisávöxtun.
mir-recycling-return-chance-percent-0-5=Skalaðu faldar framleiddar endurvinnsluuppskriftir í 0,5% efnisávöxtun.
mir-recycling-return-chance-percent-0-1=Skalaðu faldar framleiddar endurvinnsluuppskriftir í 0,1% efnisávöxtun.
mir-prototype-efficiency-cap-engine-default=Látið takmarka orkunotkunaráhrif hvers vélar í friði. Vélar án sérsniðinna takmörkunar nota venjulega -80% orkunotkunaráhrifalok frá Factorio, þannig að áhrif geta ekki dregið úr virkri notkun undir 20%.
mir-prototype-efficiency-cap-saving-25=Skrifaðu -25% orkunotkunarlok. Virk orkunotkun helst í 75% eða meira eftir orkunotkunaráhrif.
mir-prototype-efficiency-cap-saving-50=Skrifaðu -50% orkunotkunarlok. Virk orkunotkun helst í 50% eða meira eftir orkunotkunaráhrif á studdar vélar.
mir-prototype-efficiency-cap-saving-75=Skrifaðu -75% orkunotkunarlok. Virk orkunotkun helst í 25% eða meira eftir orkunotkunaráhrif á studdar vélar.
mir-prototype-efficiency-cap-saving-90=Skrifaðu -90% orkunotkunarlok. Virk orkunotkun getur farið niður í 10%, sem er undir venjulegu 20% gólfi.
mir-prototype-efficiency-cap-saving-95=Skrifaðu -95% orkunotkunarlok. Virk orkunotkun getur farið niður í 5%.
