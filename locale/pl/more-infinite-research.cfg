[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Nie wykonuje automatycznego wykrywania, dołączania ani tworzenia. Stałe badania MIR pozostają niezmienione.
mir-automatic-productivity-action-preview=Wykrywa i klasyfikuje kandydatów, a następnie zapisuje zaakceptowane i pominięte decyzje w dzienniku Factorio. Nie dołącza przepisów ani nie tworzy badań.
mir-automatic-productivity-action-apply=Domyślnie. Odkrywa kandydatów i dołącza tylko sprawdzone receptury do zgodnych istniejących badań MIR. Sama w sobie nie tworzy badań; dwa pola wyboru poniżej regulują tworzenie.
mir-automatic-compiler-mode-off=Starszy odpowiednik opcji Wyłączone.
mir-automatic-compiler-mode-report=Starszy odpowiednik zmian w podglądzie.
mir-automatic-compiler-mode-safe-attach=Starszy odpowiednik opcji Zastosuj bezpieczne zmiany z wyłączonym tworzeniem badań.
mir-automatic-compiler-mode-exact-pack=Starszy odpowiednik Zastosuj bezpieczne zmiany z włączonym tworzeniem badań i wymaganymi sprawdzonymi danymi dotyczącymi zgodności.
mir-automatic-compiler-mode-safe-generate=Starszy odpowiednik opcji Zastosuj bezpieczne zmiany z włączoną możliwością tworzenia badań dla zarejestrowanych dostawców eksperymentalnych.
mir-adjust-vanilla-weapon-speed-techs-off=Wyłącz opcjonalne dodatkowe czyszczenie nakładających się rakiet/dział w MIR.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Usuwaj nakładające się premie rakiet/armat MIR tylko wtedy, gdy włączona, osiągalna nieskończona technologia zapewnia dokładnie taki sam efekt zastępczy.
mir-adjust-vanilla-weapon-speed-techs-always=Zawsze usuwaj nakładające się premie za rakiety/działa MIR. Używaj tylko wtedy, gdy chcesz ścisłej separacji.
mir-science-pack-ingredient-policy-configured=Używaj skonfigurowanych pakietów naukowych każdej wygenerowanej technologii bez opcjonalnego rozszerzania składników. Wartość domyślna MIR.
mir-science-pack-ingredient-policy-space=Dodaj naukę o kosmosie, jeśli jest dostępna. Prosty wzrost trudności po rakiecie.
mir-science-pack-ingredient-policy-space-and-promethium=Dodaj naukę o kosmosie i promecie, jeśli jest dostępna. Najlepsze do zlewów badawczych z bardzo późnej epoki kosmicznej.
mir-science-pack-ingredient-policy-space-age-progression=Dodaj tylko pakiety postępu Ery Kosmicznej sugerowane przez wybrane pakiety. Nie dodaje niepowiązanych modowanych pakietów.
mir-science-pack-ingredient-policy-official-progression=Dodaj brakujące oficjalne pakiety w stylu wymagań wstępnych, sugerowane przez najbardziej zaawansowany, już wybrany oficjalny pakiet.
mir-science-pack-ingredient-policy-mod-progression=Dodaj brakujące pakiety kompatybilne z laboratorium, wywnioskowane z postępów zmodyfikowanych pakietów naukowych i odblokuj wymagania wstępne.
mir-science-pack-ingredient-policy-all-official=Użyj każdej oficjalnej bazy i pakietu naukowego Ery Kosmicznej, który istnieje w bieżącym zestawie modów.
mir-science-pack-ingredient-policy-all=Używaj każdego aktywnego pakietu naukowego kompatybilnego z laboratorium, w tym zmodyfikowanych pakietów naukowych.
mir-lab-incompatibility-policy-reduce=Zachowaj technologię, redukując jej pakiety naukowe do największego zestawu akceptowanego przez aktywne laboratorium. Najbezpieczniejsze ustawienie domyślne dla pakietów modów.
mir-lab-incompatibility-policy-skip=Pomiń tę technologię, jeśli żadne aktywne laboratorium nie może zbadać wybranego zestawu naukowego. Bardziej rygorystyczne i łatwiejsze do kontrolowania.
mir-lab-incompatibility-policy-engine-default=Nigdy nie przepisuj wybranego zestawu pakietu naukowego. MIR zachowuje bez zmian bezpiecznie możliwy do zbadania zestaw i pomija wygenerowaną technologię, gdy Factorio nie może zbadać tego dokładnego zestawu.
mir-prototype-productivity-cap-engine-default=Pozostaw istniejący limit produktywności każdej receptury w spokoju. Przepisy bez niestandardowego limitu korzystają z normalnego limitu premii produktywności Factorio wynoszącej +300%.
mir-prototype-productivity-cap-percent-25=Ustaw limity produktywności receptur nieparametrycznych na +25%. Jest to ścisłe ograniczenie wczesne.
mir-prototype-productivity-cap-percent-50=Ustaw limity produktywności receptur nieparametrycznych na +50%. Jest to wartość poniżej normalnego limitu i sprawia, że ​​badania nad wydajnością szybciej przestają pomagać.
mir-prototype-productivity-cap-percent-75=Ustaw limity produktywności receptur nieparametrycznych na +75%. Jest to wartość poniżej normalnego limitu i sprawia, że ​​badania nad wydajnością szybciej przestają pomagać.
mir-prototype-productivity-cap-percent-100=Ustaw limity produktywności receptur nieparametrycznych na +100%. Jest to wartość poniżej normalnego limitu i sprawia, że ​​badania nad wydajnością szybciej przestają pomagać.
mir-prototype-productivity-cap-percent-125=Ustaw limity produktywności receptur nieparametrycznych na +125%.
mir-prototype-productivity-cap-percent-150=Ustaw limity produktywności receptur nieparametrycznych na +150%.
mir-prototype-productivity-cap-percent-200=Ustaw limity produktywności receptur nieparametrycznych na +200%. Jest to wartość poniżej normalnego limitu i sprawia, że ​​badania nad wydajnością szybciej przestają pomagać.
mir-prototype-productivity-cap-percent-250=Ustaw limity produktywności receptur nieparametrowych na +250%. To nieco poniżej normalnego limitu.
mir-prototype-productivity-cap-percent-400=Ustaw limity produktywności receptur nieparametrycznych na +400%. Wydłuża to skalowanie produktywności poza normalny limit.
mir-prototype-productivity-cap-percent-500=Ustaw limity produktywności receptur nieparametrycznych na +500%. Wydłuża to skalowanie produktywności poza normalny limit.
mir-prototype-productivity-cap-percent-750=Ustaw limity produktywności receptur nieparametrycznych na +750%.
mir-prototype-productivity-cap-percent-1000=Ustaw limity produktywności receptur nieparametrycznych na +1000%. Używaj do długich zapisów, gdy badania produktywności powinny mieć znaczenie.
mir-prototype-productivity-cap-percent-2500=Ustaw limity produktywności receptur nieparametrycznych na +2500%. Używaj do bardzo długich zapisów.
mir-prototype-productivity-cap-percent-5000=Ustaw limity produktywności receptur nieparametrycznych na +5000%.
mir-prototype-productivity-cap-percent-10000=Ustaw limity produktywności receptur nieparametrycznych na +10000%. Używaj tylko do ekstremalnie długoterminowego skalowania.
mir-prototype-productivity-cap-percent-25000=Ustaw limity produktywności receptur nieparametrycznych na +25000%. Używaj tylko do ekstremalnie długoterminowego skalowania.
mir-prototype-productivity-cap-percent-100000=Ustaw limity produktywności receptur nieparametrycznych na +100000%. W przypadku większości zapisów jest to faktycznie nielimitowane.
mir-recycling-return-chance-engine-default=Pozostaw każdy przepis na recykling bez zmian.
mir-recycling-return-chance-match-productivity-cap=Bezpieczna dla exploitów automatyczna redukcja ukrytych, generowanych receptur recyklingu. Używa 1 / (1 + premia za produktywność), ograniczony do normalnego zwrotu w wysokości 25%: +400% staje się 20%, a +1000% wynosi około 9,09%.
mir-recycling-return-chance-percent-25=Zachowaj ukryte wygenerowane receptury recyklingu przy normalnym 25% zwrocie materiału.
mir-recycling-return-chance-percent-20=Skaluj ukryte, wygenerowane receptury recyklingu, aby uzyskać 20% zwrotu materiału.
mir-recycling-return-chance-percent-15=Skaluj ukryte, wygenerowane receptury recyklingu, aby uzyskać 15% zwrotu materiału.
mir-recycling-return-chance-percent-12-5=Skaluj ukryte, wygenerowane receptury recyklingu, aby uzyskać zwrot materiału na poziomie 12,5%.
mir-recycling-return-chance-percent-10=Skaluj ukryte, wygenerowane receptury recyklingu, aby uzyskać 10% zwrotu materiału.
mir-recycling-return-chance-percent-7-5=Skaluj ukryte, wygenerowane receptury recyklingu, aby uzyskać zwrot materiału na poziomie 7,5%.
mir-recycling-return-chance-percent-5=Skaluj ukryte, wygenerowane receptury recyklingu, aby uzyskać 5% zwrotu materiału.
