[technology-description]
more-infinite-research.recipe_productivity=Zwiększa produktywność wybranych receptur. Maksymalny limit produktywności Factorio nadal obowiązuje; dodatkowe nieskończone poziomy mogą nie dawać praktycznego efektu po osiągnięciu limitu danej receptury.
more-infinite-research.direct_effect=Dodaje nieskończenie powtarzalną premię. Pakiety naukowe są wybierane z aktywnych laboratoriów, aby technologia pozostała możliwa do zbadania z kompatybilnymi zestawami modów.
more-infinite-research.cargo_bay_unloading_distance=Zwiększa maksymalną odległość między lądowiskiem ładunkowym a połączonymi zatokami rozładunkowymi.
more-infinite-research.cargo_landing_pad_count=Zwiększa liczbę lądowisk ładunkowych, które każda frakcja może zbudować na powierzchni.
more-infinite-research.flamethrower_shooting_speed=Zwiększa prędkość strzelania z miotaczy ognia i wież z miotaczami ognia.
more-infinite-research.electric_shooting_speed=Zwiększa prędkość strzelania z broni elektrycznej. W wanilii wpływa to na obronę przed wyładowaniami; w Epoce Kosmicznej wpływa to również na broń Tesli, gdy dostępna jest kategoria amunicji Tesli.
more-infinite-research.spoilage_preservation=Zwiększa globalny modyfikator czasu psucia poprzez ograniczony efekt skryptowy. Istniejące przedmioty, które można zepsuć, mogą zachować swoje aktualne terminy, dopóki nie zostaną przetestowane w grze.
more-infinite-research.agricultural_growth_speed=Skraca pozostały czas wzrostu nowo posadzonych roślin wieżowych poprzez ograniczony efekt skryptowy.
more-infinite-research.lab_productivity=Zwiększa postęp badań uzyskany z każdego zużytego pakietu naukowego, wykorzystując natywny modyfikator produktywności badań laboratoryjnych.

