[mod-setting-description]
ips-require-space-gate=Gdy włączone, te technologie pozostają zablokowane do czasu zbadania nauki kosmicznej w grze podstawowej albo nauki prometowej w Space Age.
mir-science-pack-ingredient-policy=Controls extra science packs added to every generated technology. Configured uses each technology's normal packs. Add end-game pack adds space science in base game or promethium science in Space Age. Use all lab science packs adds every active lab input, including compatible modded science packs.
ips-enable-stream=Wyłącz, aby uniemożliwić wygenerowanie __1__ w grze.
ips-cost-base-stream=Jednostki badawcze wymagane do pierwszego poziomu __1__. Wyższe poziomy skalują się od tej wartości, nawet jeśli pierwsze odblokowanie zaczyna się później.
ips-cost-growth-stream=Mnożnik stosowany do kosztu poprzedniego poziomu __1__. Użyj 1 dla stałego kosztu albo większych wartości, aby zwiększać trudność z każdym poziomem.
ips-max-level-stream=Ustaw 0, aby __1__ pozostała nieskończona, albo podaj wartość dodatnią, aby ograniczyć ją do tego poziomu.
ips-research-time-stream=Ustaw 0, aby użyć skonfigurowanego domyślnego czasu badań dla __1__. Podaj wartość dodatnią, aby nadpisać liczbę sekund na poziom.
mir-enable-base-tech=Pozwala __1__ kontynuować po podstawowym limicie jako nieskończone poziomy zgodne z tą samą progresją.
mir-cost-base=Ustaw 0, aby ponownie użyć podstawowego kosztu poziomu 1 dla __1__. Każda wartość dodatnia zastępuje składnik bazowy używany przez formułę nieskończoną.
mir-cost-growth=Ustaw 0, aby kontynuować podstawowe tempo wzrostu dla __1__. Podaj wartość dodatnią, aby zmienić, o ile rośnie koszt każdego nieskończonego poziomu.
mir-research-time=Ustaw 0, aby ponownie użyć podstawowego czasu badań dla __1__. Podaj wartość dodatnią, aby nadpisać liczbę sekund na poziom.
mir-prefer-this-mod-for-competing-techs=Gdy włączone, ten mod usuwa wybrane konkurencyjne nieskończone rozszerzenia i używa własnych wersji. Wyłącz, aby zachować konkurencyjne wersje z innych modów.
mir-adjust-vanilla-weapon-speed-techs=Określa, czy ten mod usuwa premie do szybkostrzelności rakiet i pocisków armatnich z podstawowych technologii szybkostrzelności, gdy dostępne jest osobne badanie zastępcze.
mir-debug-generation-report=Gdy włączone, zapisuje jedną ustrukturyzowaną linię dziennika dla każdego wygenerowanego lub pominiętego strumienia i rozszerzenia bazowego, w tym pakiety naukowe, wymagania, liczbę efektów, stan zgodności laboratoriów oraz źródło ikony.
mir-debug-recipe-matches=When enabled, writes matched recipe names for each generated productivity stream. This can be noisy in large mod packs.
mir-lab-incompatibility-policy=Choose whether incompatible science-pack sets are reduced to the largest lab-compatible subset or skipped entirely.

