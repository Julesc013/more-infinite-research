[mod-setting-description]
ips-require-space-gate=Po włączeniu te technologie pozostają zablokowane do czasu rozpoczęcia badań kosmicznych w wanilii lub prometu w epoce kosmicznej.
mir-science-pack-ingredient-policy=Wybiera sposób, w jaki MIR dodaje pakiety naukowe do generowanych technologii. Opcje są uporządkowane od konserwatywnego do szerokiego: pakiety domyślne, pakiety na koniec gry, pakiety oparte na postępie, a następnie wszystkie dostępne pakiety.
mir-automatic-productivity-action=Wybiera działanie MIR z możliwościami bezpiecznej produktywności, które można znaleźć w przepisach zainstalowanych modów. Opcja Wyłączone nie powoduje automatycznego wykrywania. Podgląd zmian w rekordach zaakceptowanych i pominiętych kandydatów w dzienniku Factorio bez zmiany badań. Zastosuj bezpieczne zmiany (domyślnie) dodaje kwalifikujące się przepisy tylko do zgodnych istniejących badań MIR. To kontroluje działanie, a nie siłę i dojrzałość; poniższe pola wyboru tworzenia są oddzielne. Zawsze obowiązują kontrole własności, recyklingu, prawdopodobieństwa, katalizatora, nauki, laboratorium, warunku wstępnego, celu, tożsamości, postępu i kontroli cyklu.
mir-automatic-create-research=Domyślnie: wyłączone. Wyłączone limity Zastosuj bezpieczne zmiany w kompatybilnych istniejących badaniach MIR; kandydaci bez odpowiedniego strumienia są pomijani i zgłaszani. Opcja Włącz umożliwia kwalifikującemu się zarejestrowanemu dostawcy stworzenie jednej stabilnej, ogólnej technologii o nieskończonej produktywności, gdy nie pasują żadne istniejące badania. Poniższe pole wyboru zweryfikowanych danych decyduje, czy dostawcy eksperymentalni kwalifikują się. MIR nigdy nie tworzy jednej technologii na mod lub przepis, a każde twarde bezpieczeństwo, nauka, własność, tożsamość, postęp i bramka rowerowa nadal mają zastosowanie.
mir-automatic-require-reviewed-data=Domyślnie: włączone. Ma to znaczenie tylko wtedy, gdy włączona jest opcja Zezwalaj na tworzenie nowych badań; nigdy nie blokuje bezpiecznego przywiązania do istniejących badań. Na zezwoleniach dozwolone są tylko rodziny dostawców oznaczone jako sprawdzone i poparte odpowiednimi dowodami w dokładnej wersji, więc rodziny eksperymentalne są pomijane. Opcja Off umożliwia zarejestrowanym dostawcom eksperymentów tworzenie na podstawie ogólnych dowodów strukturalnych. Aby uzyskać jak najszersze zachowanie eksperymentalne, włącz tworzenie badań i wyłącz to wymaganie. Żadna wartość nie może ominąć twardej bramki zabezpieczającej.
mir-automatic-compiler-mode=Ukryty mostek kompatybilności dla profili utworzonych przed rozdzieleniem automatycznych kontroli produktywności. Starsza wartość inna niż domyślna jest honorowana tylko wtedy, gdy wszystkie nowe elementy sterujące pozostają przy ustawieniach domyślnych. Zmień dowolną nową kontrolę, aby przejąć jawną kontrolę.
ips-enable-stream=Tworzy wygenerowaną nieskończoną technologię dla __1__, gdy dostępne są jej przepisy, efekty, wymagania wstępne i pakiety naukowe. Wyłącz tę opcję, aby uniemożliwić MIR generowanie tej technologii.
ips-cost-base-stream=Jednostki badawcze wymagane dla pierwszego wygenerowanego poziomu __1__. Musi wynosić co najmniej 1. Późniejsze poziomy są obliczane na podstawie tej wartości i współczynnika wzrostu kosztów.
ips-cost-growth-stream=Mnożnik zastosowany do każdego późniejszego poziomu __1__. Użyj 1 dla kosztów stałych, 1,5 dla 50% wzrostu na poziom lub 2 dla podwojenia kosztów.
ips-max-level-stream=Najwyższy wygenerowany poziom dla __1__. Ustaw na 0, aby uzyskać nieskończone poziomy.
ips-research-time-stream=Sekundy na jednostkę badawczą dla __1__. Ustaw na 0, aby użyć domyślnej wartości MIR dla tej technologii. To nie jest całkowity czas badań; całkowity czas zależy również od kosztów badań, liczby laboratoriów, szybkości laboratorium i modułów.
mir-enable-base-tech=Umożliwia __1__ kontynuację działania poza swoją podstawową wersją jako nieskończonej technologii. Wyłącz tę opcję, jeśli chcesz, aby MIR dodawał nowe linie badawcze bez przedłużania tego podstawowego łańcucha.
mir-cost-base=Jednostki badawcze wymagane dla pierwszego poziomu kontynuacji MIR __1__. Ustaw na 0, aby odziedziczyć wzorzec kosztów łańcucha waniliowego, jeśli to możliwe.
mir-cost-growth=Mnożnik stosowany do każdego późniejszego poziomu kontynuacji MIR wynoszącego __1__. Ustaw na 0, aby odziedziczyć wzorzec wzrostu łańcucha waniliowego, jeśli to możliwe.
mir-max-level=Najwyższy poziom kontynuacji MIR dla __1__. Ustaw na 0, aby uzyskać nieskończone poziomy.
mir-research-time=Sekundy na jednostkę badawczą dla kontynuacji MIR __1__. Ustaw na 0, aby dziedziczyć czas jednostki badawczej łańcucha waniliowego, jeśli to możliwe.
mir-prefer-this-mod-for-competing-techs=Po włączeniu ten mod usuwa wybrane, konkurencyjne, nieskończone rozszerzenia i używa własnych wersji. Wyłącz, aby zachować konkurencyjne wersje z innych modów.
mir-adjust-vanilla-weapon-speed-techs=Kontroluje, czy MIR usuwa premie do prędkości rakiet i pocisków armatnich z kontynuacji prędkości strzelania generowanej broni, gdy dostępny jest dokładnie nieskończony zasięg wymiany. Skończone technologie szybkości strzelania z broni waniliowej zachowują swoje oryginalne bonusy.
mir-use-installed-space-age-icons=Po włączeniu MIR może odwoływać się do zainstalowanych oficjalnych plików ikon DLC, w tym Space Age i Elevated Rails, nawet jeśli te modyfikacje są wyłączone na potrzeby działania gry podstawowej. Pozostaw tę opcję wyłączoną, jeśli te pliki DLC nie są zainstalowane; Factorio nie może bezpiecznie odzyskać brakujących plików ikon podczas ładowania prototypu.
mir-pipeline-extent-multiplier=Rozwijany mnożnik dostępny tylko podczas uruchamiania dla rozpoznanych pól zasięgu rurociągu ze skrzynią płynową w prototypach, a nie tylko w elementach rurowych. 100% pozostawia prototypy bez zmian i nie ładuje przepustu rurociągu ani nie skanuje skrzynek z płynami. Wartości inne niż 100% są eksperymentalne i mogą mieć wpływ na maszyny, zbiorniki, silniki odrzutowe i zmodyfikowane prototypy, które definiują skrzynki płynowe.
mir-unrestricted-modules=Eksperymentalne i łamiące równowagę. Po włączeniu każda istniejąca receptura akceptuje wszystkie pięć efektów modułów, a każdy istniejący odbiornik modułu ze slotami akceptuje każdą odkrytą kategorię modułów. Nie powoduje to dodania gniazd modułów ani zmiany prototypów modułów i może umożliwić pętle produktywności, jakości i modowanych modułów.
mir-prototype-productivity-cap=Wybiera, czy MIR pozostawia same limity produktywności receptury, czy też zapisuje limit startowy dla każdej receptury nieparametrycznej i niepodlegającej recyklingowi. +300% (bez zmian) zachowuje istniejące limity receptur; niższe wartości skracają skalowanie produktywności, wyższe zaś ją wydłużają.
mir-recycling-return-chance=Kontroluje tylko ukryte, wygenerowane receptury recyklingu. Tryb automatyczny zmniejsza normalny zwrot materiału o 25% do maksymalnie 1 podzielonego przez całkowity mnożnik produkcji przy wybranym limicie produktywności. Stałe wybory bezpośrednio skalują te same generowane zwroty. Widoczne procesy i limity produktywności receptur nigdy nie ulegają zmianie.
mir-productivity-cap-self-recycling-only=Powyżej 1 / zwrot recyklera - 1, tylko receptury produkcyjne ze sprawdzoną, niegeneratywną ścieżką samodzielnego recyklingu otrzymują wybrany wyższy limit. Przy lub poniżej tego progu to pole wyboru nie ma żadnego efektu. Silnik bez zmian wykorzystuje normalne 25% zwrotu jako konserwatywny próg +300% bez zmiany receptur recyklingu.
mir-prototype-efficiency-cap=Wybiera, w jakim stopniu efekty wydajności mogą zmniejszyć aktywne zużycie energii przez maszynę. -80% (bez zmian) pozostawia w spokoju istniejące limity zużycia energii. Głębsze redukcje mogą zbliżyć się do zerowego zużycia energii czynnej bez zmiany limitów zanieczyszczeń.
mir-prototype-pollution-cap=Wybiera, w jakim stopniu efekty redukcji zanieczyszczeń mogą zmniejszyć zanieczyszczenie maszyny. -80% (bez zmian) pozostawia w spokoju istniejące limity zanieczyszczeń. Głębsze redukcje mogą zbliżyć się do zera zanieczyszczeń bez zmiany zużycia energii.
mir-prototype-speed-floor=Wybiera, jak bardzo ujemne efekty prędkości mogą spowolnić obsługiwane maszyny. -80% (bez zmian) pozostawia w spokoju istniejące limity; głębsze wartości usuwają normalną podłogę aż do prawie zatrzymania na poziomie -99,99%.
mir-prototype-speed-cap=Wybiera, czy MIR pozostawia same limity efektu prędkości maszyny, czy zapisuje nowe dodatnie ograniczenie prędkości. +100000% (bez zmian) zachowuje istniejące limity; niższe wartości celowo ograniczają bardzo duże premie do prędkości.
mir-prototype-quality-cap=Wybiera, czy MIR pozostawia same limity wpływu na jakość maszyny, czy zapisuje nowy dodatni limit jakości. +100000% (bez zmian) zachowuje istniejące limity i nie zmienia poziomów jakości ani formuł prawdopodobieństwa przedmiotu.
mir-prototype-positive-power-floor=Domyślnie wyłączone. Po włączeniu funkcja MIR zmienia jawne prototypy zużycia energii czynnej o mocy 0 W na 1 W podczas ładowania prototypu, dzięki czemu ikony ostrzegawcze o niskim poborze mocy nie pojawiają się na elementach, które powinny pobierać niewielką, niezerową ilość. Pomiń, aby dokładnie zachować prototypy o zerowej mocy.
mir-settings-profile-import=Wklej tutaj ciąg profilu ustawień MIR, aby zastosować wyeksportowane wartości ustawień startowych jako warstwę zastępującą podczas generowania prototypu. Pozostaw puste dla normalnych ustawień. Eksportuj za pomocą /mir-settings-export z aktywnego zapisu, a następnie uruchom ponownie po zmianie tej wartości.
mir-debug-generation-report=Po włączeniu zapisuje jeden wiersz dziennika strukturalnego na każdy wygenerowany lub pominięty strumień i rozszerzenie podstawowe, w tym pakiety naukowe, wymagania wstępne, liczbę efektów, stan zgodności laboratorium i źródło ikon.
mir-debug-recipe-matches=Po włączeniu zapisuje dopasowane nazwy receptur dla każdego wygenerowanego strumienia produktywności. Może to być głośne w przypadku dużych pakietów modów.
mir-debug-scripted-effects=Po włączeniu zapisuje wpisy w dzienniku czasu wykonywania, gdy technologie skryptowe ponownie obliczają efekty globalne lub sterowane zdarzeniami.
mir-lab-incompatibility-policy=Wybiera działanie MIR, gdy wybrane pakiety naukowe nie mogą zostać zbadane przez żadne aktywne laboratorium.
ips-effect-per-level-stream=Ustawia podstawowy efekt poziomu podstawowego na poziom dla __1__. Powiązane późniejsze poziomy i efekty są skalowane proporcjonalnie. Efekty procentowe wykorzystują punkty procentowe; Efekty liczenia i odległości wykorzystują swoje natywne jednostki.
mir-effect-per-level=Ustawia efekt kanoniczny na poziomie dla nieskończonej kontynuacji __1__. Powiązane efekty są skalowane proporcjonalnie do ostatecznej waniliowej linii bazowej. Efekty procentowe wykorzystują punkty procentowe; Efekty liczenia i odległości wykorzystują swoje natywne jednostki.
mir-note-experimental-spoilage=Eksperymentalny i domyślnie wyłączony w wersji 2.1.0. Jest to efekt skryptowy globalny/obejmujący całą mapę. Istniejące zachowanie stosu, które można zepsuć, nie jest zgłaszane, dopóki nie zostanie ręcznie sprawdzone.
mir-note-agriculture-growth=Dotyczy nowo posadzonych roślin wieżowych. Istniejące uprawy nie są przeskalowane.
mir-note-cargo-pad-count=Specjalne badania logistyczne z epoki kosmicznej. Zwiększa lądowiska ładunkowe na powierzchnię i może znacząco zmienić równowagę logistyczną.
mir-note-inserter-capacity=Domyślnie wyłączone. Dodatkowa pojemność podajnika może przerwać urządzenia wprowadzające sterowane obwodami i zmniejszyć optymalizację silnika.
mir-note-native-owner-managed-stream=Jeśli zainstalowana nieskończona technologia jest już właścicielem tej rodziny badawczej, te same ustawienia uruchamiania konfigurują tego właściciela, zamiast tworzyć duplikat. Niezmienione ustawienia domyślne MIR dokładnie zachowują ostateczny prototyp właściciela. Jawne zmiany kosztów, czasu, maksymalnego poziomu i efektów mają zastosowanie dopiero po bezpiecznym dopasowaniu właściciela; wyłączenie strumienia pozostawia technologię zewnętrzną nietkniętą. Uruchom ponownie Factorio po zmianie ustawień uruchamiania. Maksymalny poziom 0 oznacza nieskończoność, a wartości efektów są punktami procentowymi na poziom.

