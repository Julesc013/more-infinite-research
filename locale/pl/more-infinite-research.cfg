[string-mod-setting-description]
mir-adjust-vanilla-weapon-speed-techs-off=Do not remove overlapping rocket or cannon-shell bonuses from MIR's generated weapon-speed continuation.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Remove MIR's overlapping rocket/cannon bonuses only when the dedicated replacement research is enabled.
mir-adjust-vanilla-weapon-speed-techs-always=Always remove MIR's overlapping rocket/cannon bonuses. Use only if you want strict separation.
mir-science-pack-ingredient-policy-configured=Use each generated technology's configured science packs. Safest default.
mir-science-pack-ingredient-policy-space=Add space science when available. A simple post-rocket difficulty increase.
mir-science-pack-ingredient-policy-space-and-promethium=Add space and promethium science when available. Best for very late Space Age research sinks.
mir-science-pack-ingredient-policy-space-age-progression=Add only Space Age progression packs implied by the selected packs. Does not add unrelated modded packs.
mir-science-pack-ingredient-policy-official-progression=Add missing official prerequisite-style packs implied by the most advanced official pack already selected.
mir-science-pack-ingredient-policy-mod-progression=Add missing lab-compatible packs inferred from modded science-pack progression and unlock prerequisites.
mir-science-pack-ingredient-policy-all-official=Use every official base and Space Age science pack that exists in the current mod set.
mir-science-pack-ingredient-policy-all=Use every active lab-compatible science pack, including modded science packs.
mir-lab-incompatibility-policy-reduce=Keep the technology by reducing its science packs to the largest set accepted by an active lab. Safest default for mod packs.
mir-lab-incompatibility-policy-skip=Skip the technology if no active lab can research its selected science-pack set. Stricter and easier to audit.
