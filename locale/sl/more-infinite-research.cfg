[mod-setting-description]
ips-require-space-gate=Ko so omogočene, te tehnologije ostanejo zaklenjene, dokler vesoljska znanost ni raziskana v Vanilla ali promethium znanost raziskana v Space Age.
mir-science-pack-ingredient-policy=Izbere, kako MIR dodaja znanstvene pakete ustvarjenim tehnologijam. Možnosti so razvrščene od konzervativnih do širokih: privzeti paketi, paketi za pozne igre, paketi, ki temeljijo na napredovanju, nato vsi razpoložljivi paketi.
mir-automatic-productivity-action=Izbere, kaj počne MIR z možnostmi varne produktivnosti, ki jih najdemo v receptih za nameščene modifikacije. Onemogočeno ne izvaja samodejnega odkrivanja. Predogled sprememb beleži sprejete in preskočene kandidate v dnevniku Factorio brez spreminjanja raziskav. Uporabi varne spremembe (privzeto) doda ustrezne recepte samo združljivim obstoječim raziskavam MIR. To nadzira delovanje, ne moč ali zrelost; spodnja potrditvena polja za ustvarjanje so ločena. Vedno veljajo preverjanja lastništva, recikliranja, verjetnosti, katalizatorja, znanosti, laboratorija, predpogoja, cilja, identitete, napredovanja in cikla.
mir-automatic-create-research=Privzeto: izklopljeno. Brez omejitev Uporabite varne spremembe za združljive obstoječe raziskave MIR; kandidati brez ustreznega toka so preskočeni in prijavljeni. Vklop omogoča upravičenemu registriranemu ponudniku, da ustvari eno stabilno generično tehnologijo neskončne produktivnosti, ko nobena obstoječa raziskava ne ustreza. Spodnje potrditveno polje pregledanih podatkov določa, ali so eksperimentalni ponudniki primerni. MIR nikoli ne ustvari ene tehnologije na mod ali recept in še vedno velja vsaka trdna varnost, znanost, lastništvo, identiteta, napredovanje in cikel.
mir-automatic-require-reviewed-data=Privzeto: vklopljeno. To je pomembno le, če je vklopljeno možnost Dovoli ustvarjanje novih raziskav; nikoli ne blokira varne navezave na obstoječe raziskave. Na dovoljenjih so samo družine ponudnikov označene kot pregledane in podprte z ustreznimi dokazi o natančni različici, zato so poskusne družine preskočene. Off dovoljuje registriranim eksperimentalnim ponudnikom ustvarjanje iz generičnih strukturnih dokazov. Za najširše eksperimentalno vedenje omogočite ustvarjanje raziskav in izklopite to zahtevo. Nobena vrednost ne more zaobiti trdih varnostnih vrat.
mir-automatic-compiler-mode=Skriti združljivostni most za profile, ustvarjene pred razdelitvijo samodejnih kontrolnikov produktivnosti. Podedovana vrednost, ki ni privzeta, se upošteva le, medtem ko vsi novi kontrolniki ostanejo privzeti. Spremenite kateri koli nov kontrolnik, da prevzamete eksplicitni nadzor.
ips-enable-stream=Ustvari ustvarjeno neskončno tehnologijo za __1__, ko so na voljo njegovi recepti, učinki, predpogoji in znanstveni paketi. Onemogočite to, da preprečite, da bi MIR ustvaril to tehnologijo.
ips-cost-base-stream=Raziskovalne enote, potrebne za prvo ustvarjeno raven __1__. Mora biti vsaj 1. Poznejše ravni se izračunajo iz te vrednosti in faktorja rasti stroškov.
ips-cost-growth-stream=Množitelj, uporabljen za vsako kasnejšo raven __1__. Uporabite 1 za pavšalne stroške, 1,5 za 50-odstotno rast na raven ali 2 za podvojitev stroškov.
ips-max-level-stream=Najvišja ustvarjena raven za __1__. Nastavite na 0 za neskončne ravni.
ips-research-time-stream=Sekunde na raziskovalno enoto za __1__. Nastavite na 0, če želite uporabiti privzeto vrednost MIR za to tehnologijo. To ni skupni čas raziskave; skupni čas je odvisen tudi od stroškov raziskave, števila laboratorijev, hitrosti laboratorija in modulov.
mir-enable-base-tech=Omogoča __1__, da kot neskončna tehnologija nadaljuje mimo svoje vanilijeve kapice. Onemogočite to, če želite, da MIR doda nove raziskovalne linije, ne da bi razširil to nizko verigo.
mir-cost-base=Raziskovalne enote, potrebne za prvo stopnjo nadaljevanja MIR __1__. Nastavite na 0, da podedujete stroškovni vzorec verige vanilla, kadar je to mogoče.
mir-cost-growth=Množitelj, uporabljen za vsako poznejšo stopnjo nadaljevanja MIR __1__. Nastavite na 0, da podedujete vzorec rasti verige vanilije, kadar je to mogoče.
mir-max-level=Najvišja raven nadaljevanja MIR za __1__. Nastavite na 0 za neskončne ravni.
mir-research-time=Sekunde na raziskovalno enoto za nadaljevanje MIR __1__. Nastavite na 0, da podedujete čas raziskovalne enote verige vanilla, kadar je to mogoče.
mir-prefer-this-mod-for-competing-techs=Ko je omogočen, ta mod odstrani izbrane konkurenčne neskončne razširitve in uporablja svoje različice. Onemogočite, da ohranite konkurenčne različice iz drugih modov.
mir-adjust-vanilla-weapon-speed-techs=Nadzira, ali MIR odstrani bonuse hitrosti raket in topov iz svojega ustvarjenega nadaljevanja hitrosti streljanja z orožjem, ko je na voljo natančna neskončna nadomestna pokritost. Tehnologije končne hitrosti streljanja orožja Vanilla ohranjajo svoje prvotne bonuse.
mir-use-installed-space-age-icons=Ko je omogočen, se lahko MIR sklicuje na nameščene uradne datoteke z ikonami DLC, vključno s Space Age in Elevated Rails, tudi če so ti načini onemogočeni za izvajanje osnovne igre. To pustite izklopljeno, če te datoteke DLC niso nameščene; Factorio ne more elegantno obnoviti manjkajočih datotek ikon med nalaganjem prototipa.
mir-pipeline-extent-multiplier=Spustni množitelj samo ob zagonu za prepoznana polja obsega cevovoda fluid box v prototipih, ne samo v cevnih entitetah. 100 % pusti prototipe nespremenjene in ne naloži prehoda cevovoda ali skenira tekočinskih škatel. Vrednosti, ki niso 100-odstotne, so eksperimentalne in lahko vplivajo na stroje, rezervoarje, potisne motorje in spremenjene prototipe, ki določajo škatle s tekočino.
mir-unrestricted-modules=Eksperimentalno in ruši ravnovesje. Ko je omogočeno, vsak obstoječi recept sprejme vseh pet učinkov modula in vsak obstoječi sprejemnik modula z režami sprejme vsako odkrito kategorijo modula. To ne dodaja rež za module ali spreminja prototipov modulov in lahko omogoči produktivnost, kakovost in zanke modificiranih modulov.
mir-prototype-productivity-cap=Izbere, ali MIR pusti omejitve produktivnosti receptov pri miru ali zapiše zagonsko omejitev v vsak recept brez parametrov in brez recikliranja. +300 % (nespremenjeno) ohranja obstoječe pokrovčke receptov; nižje vrednosti skrajšajo skaliranje produktivnosti, višje vrednosti pa podaljšajo.
mir-recycling-return-chance=Nadzoruje samo skrite ustvarjene recepte za recikliranje. Samodejni način zmanjša običajni 25-odstotni donos materiala na največ 1, deljeno s skupnim množiteljem proizvodnje pri izbrani zgornji meji produktivnosti. Fiksne izbire neposredno spreminjajo enake ustvarjene donose. Vidni procesi in omejitve produktivnosti receptov se nikoli ne spremenijo.
mir-productivity-cap-self-recycling-only=Nad 1 / vrnitev reciklerja - 1 samo proizvodni recepti z dokazano negenerativno samoreciklažno potjo prejmejo izbrano višjo omejitev. Pri tem pragu ali pod njim to potrditveno polje nima učinka. Motor nespremenjen uporablja običajni 25-odstotni donos kot konzervativni +300-odstotni prag brez spreminjanja receptov za recikliranje.
mir-prototype-efficiency-cap=Izbere, v kolikšni meri lahko učinki učinkovitosti zmanjšajo aktivno porabo energije stroja. -80 % (nespremenjeno) pušča obstoječe omejitve porabe energije. Večja zmanjšanja se lahko približajo ničelni porabi aktivne energije brez spreminjanja mejnih vrednosti onesnaževanja.
mir-prototype-pollution-cap=Izbere, v kolikšni meri lahko učinki zmanjšanja onesnaževanja zmanjšajo onesnaževanje stroja. -80 % (nespremenjeno) pušča obstoječe mejne vrednosti onesnaženja. Večja zmanjšanja se lahko približajo ničelnemu onesnaževanju brez spreminjanja porabe energije.
mir-prototype-speed-floor=Izbere, kako daleč lahko negativni učinki hitrosti upočasnijo podprte stroje. -80 % (nespremenjeno) pušča obstoječe omejitve; globlje vrednosti odstranijo normalno dno do skorajšnje meje pri -99,99 %.
mir-prototype-speed-cap=Izbere, ali MIR pusti omejitve učinka hitrosti stroja pri miru ali zapiše novo pozitivno omejitev hitrosti. +100000 % (nespremenjeno) ohranja obstoječe omejitve; nižje vrednosti namenoma omejijo zelo velike bonuse hitrosti.
mir-prototype-quality-cap=Izbere, ali MIR pusti meje učinka kakovosti stroja pri miru ali zapiše novo pozitivno omejitev kakovosti. +100000 % (nespremenjeno) ohranja obstoječe omejitve in ne spreminja ravni kakovosti ali formul verjetnosti elementov.
mir-prototype-positive-power-floor=Privzeto izklopljeno. Ko je omogočeno, MIR spremeni eksplicitne prototipe porabe aktivne energije 0 W v 1 W med nalaganjem prototipa, tako da se opozorilne ikone nizke porabe energije ne prikažejo na entitetah, ki bi morale črpati majhno količino, ki ni enaka nič. Izključite, da natančno ohranite prototipe brez moči.
mir-settings-profile-import=Tukaj prilepite niz profila nastavitev MIR, da uporabite izvožene vrednosti zagonskih nastavitev kot preglasitveno plast med ustvarjanjem prototipa. Pustite prazno za običajne nastavitve. Izvozite z /mir-settings-export iz aktivnega shranjevanja, nato znova zaženite, ko spremenite to vrednost.
mir-debug-generation-report=Ko je omogočeno, zapiše eno strukturirano vrstico dnevnika na ustvarjen ali preskočen tok in osnovno razširitev, vključno z znanstvenimi paketi, predpogoji, številom učinkov, stanjem združljivosti laboratorija in virom ikon.
mir-debug-recipe-matches=Ko je omogočeno, zapiše ujemajoča se imena receptov za vsak ustvarjen tok produktivnosti. To je lahko hrupno v velikih modnih paketih.
mir-debug-scripted-effects=Ko je omogočeno, piše vnose v dnevnik izvajanja, ko skriptne tehnologije ponovno izračunajo globalne učinke ali učinke, ki jih vodijo dogodki.
mir-lab-incompatibility-policy=Izbere, kaj stori MIR, ko izbranih znanstvenih paketov ne more raziskati noben aktivni laboratorij.
ips-effect-per-level-stream=Nastavi primarni učinek osnovne ravni na raven za __1__. Povezane poznejše stopnje in učinki so sorazmerno povečani. Odstotni učinki uporabljajo odstotne točke; učinki štetja in razdalje uporabljajo svoje domače enote.
mir-effect-per-level=Nastavi kanonični učinek na raven za neskončno nadaljevanje __1__. Povezani učinki so sorazmerno povečani glede na končno osnovno linijo vanilije. Odstotni učinki uporabljajo odstotne točke; učinki štetja in razdalje uporabljajo svoje domače enote.
mir-note-experimental-spoilage=Eksperimentalno in privzeto onemogočeno v v2.1.0. To je globalni skriptni učinek/učinek na zemljevidu. Obstoječe vedenje pokvarljivega sklada ni zahtevano, dokler ni ročno potrjeno.
mir-note-agriculture-growth=Velja za na novo posajene stolpnice. Obstoječi zasajeni pridelki se ne spreminjajo.
mir-note-cargo-pad-count=Posebna logistična raziskava vesoljske dobe. Poveča pristajalne plošče za tovor na površino in lahko bistveno spremeni logistično ravnotežje.
mir-note-inserter-capacity=Privzeto onemogočeno. Dodatna zmogljivost vstavljalnika lahko pokvari vstavljalnike, ki jih krmili tokokrog, in zmanjša optimizacijo motorja.
mir-note-native-owner-managed-stream=Če je nameščena neskončna tehnologija že lastnik te raziskovalne družine, te iste nastavitve zagona konfigurirajo tega lastnika, namesto da bi ustvarili dvojnik. Nespremenjene privzete nastavitve MIR natančno ohranijo lastnikov končni prototip. Izrecne preglasitve stroškov, časa, najvišje ravni in učinka veljajo samo po varnem ujemanju lastnika; onemogočanje toka pusti zunanjo tehnologijo nedotaknjeno. Po spremembi zagonskih nastavitev znova zaženite Factorio. Največja raven 0 pomeni neskončno, vrednosti učinka pa so odstotne točke na raven.

