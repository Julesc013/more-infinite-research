[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Ne izvaja samodejnega odkrivanja, pripenjanja ali ustvarjanja. Fiksna raziskava MIR ostaja nespremenjena.
mir-automatic-productivity-action-preview=Odkrije in razvrsti kandidate, nato pa zapiše sprejete in preskočene odločitve v dnevnik Factorio. Ne prilaga receptov ali ustvarja raziskav.
mir-automatic-productivity-action-apply=Privzeto. Odkrije kandidate in združljivim obstoječim raziskavam MIR doda samo varno dokazane recepte. Samo po sebi ne ustvarja raziskav; dve spodnji potrditveni polji urejata ustvarjanje.
mir-automatic-compiler-mode-off=Starejši ekvivalent Onemogočeno.
mir-automatic-compiler-mode-report=Starejši ekvivalent sprememb predogleda.
mir-automatic-compiler-mode-safe-attach=Podedovan ekvivalent uporabe varnih sprememb z onemogočenim ustvarjanjem raziskav.
mir-automatic-compiler-mode-exact-pack=Podedovani ekvivalent uporabe varnih sprememb z omogočenim ustvarjanjem raziskav in zahtevanimi pregledanimi podatki o združljivosti.
mir-automatic-compiler-mode-safe-generate=Podedovan ekvivalent uporabe varnih sprememb z omogočenim ustvarjanjem raziskav za registrirane poskusne ponudnike.
mir-adjust-vanilla-weapon-speed-techs-off=Onemogoči MIR-jevo izbirno prekrivajoče se bonusno čiščenje rakete/topa.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Odstranite MIR-jeve prekrivajoče se raketne/topove bonuse samo, ko omogočena, dosegljiva neskončna tehnologija zagotavlja natančen nadomestni učinek.
mir-adjust-vanilla-weapon-speed-techs-always=Vedno odstranite MIR-jeve prekrivajoče se bonuse za rakete/topove. Uporabite le, če želite strogo ločitev.
mir-science-pack-ingredient-policy-configured=Uporabite konfigurirane znanstvene pakete vsake ustvarjene tehnologije brez izbirne razširitve sestavin. MIR privzeto.
mir-science-pack-ingredient-policy-space=Dodajte vesoljsko znanost, ko je na voljo. Preprosto povečanje težavnosti po raketi.
mir-science-pack-ingredient-policy-space-and-promethium=Dodajte prostor in znanost o prometiju, ko je na voljo. Najboljše za raziskovalne ponore zelo pozne vesoljske dobe.
mir-science-pack-ingredient-policy-space-age-progression=Dodajte samo pakete napredovanja Space Age, ki jih predvidevajo izbrani paketi. Ne doda nepovezanih modificiranih paketov.
mir-science-pack-ingredient-policy-official-progression=Dodajte manjkajoče uradne pakete v slogu predpogoja, ki jih predvideva že izbran najnaprednejši uradni paket.
mir-science-pack-ingredient-policy-mod-progression=Dodajte manjkajoče pakete, združljive z laboratorijem, izpeljane iz napredovanja spremenjenega znanstvenega paketa, in odklenite predpogoje.
mir-science-pack-ingredient-policy-all-official=Uporabite vsako uradno bazo in znanstveni paket Space Age, ki obstaja v trenutnem naboru modifikacije.
mir-science-pack-ingredient-policy-all=Uporabite vsak aktivni znanstveni paket, združljiv z laboratorijem, vključno s spremenjenimi znanstvenimi paketi.
mir-lab-incompatibility-policy-reduce=Ohranite tehnologijo tako, da zmanjšate njene znanstvene pakete na največji nabor, ki ga sprejema aktivni laboratorij. Najvarnejša privzeta vrednost za mod pakete.
mir-lab-incompatibility-policy-skip=Preskočite tehnologijo, če noben aktivni laboratorij ne more raziskati svojega izbranega nabora znanstvenih paketov. Strožji in lažji za revizijo.
mir-lab-incompatibility-policy-engine-default=Nikoli ne prepisujte izbranega kompleta znanstvenih paketov. MIR ohrani nabor, ki ga je mogoče varno raziskati, nespremenjen in izpusti ustvarjeno tehnologijo, ko Factorio ne more raziskati tega natančnega nabora.
mir-prototype-productivity-cap-engine-default=Pustite obstoječo omejitev produktivnosti vsakega recepta. Recepti brez omejitve po meri uporabljajo Factoriovo običajno +300-odstotno omejitev bonusa produktivnosti.
mir-prototype-productivity-cap-percent-25=Nastavite omejitve produktivnosti receptov brez parametrov na +25%. To je stroga zgodnja omejitev.
mir-prototype-productivity-cap-percent-50=Nastavite omejitve produktivnosti receptov brez parametrov na +50%. To je pod običajno zgornjo mejo in povzroči, da raziskave produktivnosti prej prenehajo pomagati.
mir-prototype-productivity-cap-percent-75=Nastavite omejitve produktivnosti receptov brez parametrov na +75%. To je pod običajno zgornjo mejo in povzroči, da raziskave produktivnosti prej prenehajo pomagati.
mir-prototype-productivity-cap-percent-100=Nastavite omejitve produktivnosti receptov brez parametrov na +100%. To je pod običajno zgornjo mejo in povzroči, da raziskave produktivnosti prej prenehajo pomagati.
mir-prototype-productivity-cap-percent-125=Nastavite omejitve produktivnosti receptov brez parametrov na +125%.
mir-prototype-productivity-cap-percent-150=Nastavite omejitve produktivnosti receptov brez parametrov na +150%.
mir-prototype-productivity-cap-percent-200=Nastavite omejitve produktivnosti receptov brez parametrov na +200%. To je pod običajno zgornjo mejo in povzroči, da raziskave produktivnosti prej prenehajo pomagati.
mir-prototype-productivity-cap-percent-250=Nastavite omejitve produktivnosti receptov brez parametrov na +250%. To je nekoliko pod običajno zgornjo mejo.
mir-prototype-productivity-cap-percent-400=Nastavite omejitve produktivnosti receptov brez parametrov na +400%. To razširi produktivnost nad normalno zgornjo mejo.
mir-prototype-productivity-cap-percent-500=Nastavite omejitve produktivnosti receptov brez parametrov na +500%. To razširi produktivnost nad normalno zgornjo mejo.
mir-prototype-productivity-cap-percent-750=Nastavite omejitve produktivnosti receptov brez parametrov na +750%.
mir-prototype-productivity-cap-percent-1000=Nastavite omejitve produktivnosti receptov brez parametrov na +1000%. Uporabite za dolga shranjevanja, kjer bi morale raziskave produktivnosti še naprej biti pomembne.
mir-prototype-productivity-cap-percent-2500=Nastavite omejitve produktivnosti receptov brez parametrov na +2500%. Uporabite za zelo dolga shranjevanja.
mir-prototype-productivity-cap-percent-5000=Nastavite omejitve produktivnosti receptov brez parametrov na +5000%.
mir-prototype-productivity-cap-percent-10000=Nastavite omejitve produktivnosti receptov brez parametrov na +10000%. Uporabljajte samo za ekstremno dolgoročno skaliranje.
mir-prototype-productivity-cap-percent-25000=Nastavite omejitve produktivnosti receptov brez parametrov na +25000%. Uporabljajte samo za ekstremno dolgoročno skaliranje.
mir-prototype-productivity-cap-percent-100000=Nastavite omejitve produktivnosti receptov brez parametrov na +100000%. To je dejansko neomejeno za večino reševanj.
mir-recycling-return-chance-engine-default=Pustite vsak recept za recikliranje nespremenjen.
mir-recycling-return-chance-match-productivity-cap=Samodejno zmanjšanje, varno pred izkoriščanjem, za skrito ustvarjene recepte za recikliranje. Uporablja 1 / (1 + bonus produktivnosti), omejen na običajni 25-odstotni donos: +400 % postane 20 %, +1000 % pa približno 9,09 %.
mir-recycling-return-chance-percent-25=Hranite skrite ustvarjene recepte za recikliranje pri običajnem 25-odstotnem vračilu materiala.
mir-recycling-return-chance-percent-20=Povečajte skrite ustvarjene recepte za recikliranje na 20 % vračila materiala.
mir-recycling-return-chance-percent-15=Povečajte skrite ustvarjene recepte za recikliranje na 15 % vračila materiala.
mir-recycling-return-chance-percent-12-5=Povečajte skrite ustvarjene recepte za recikliranje na 12,5 % povračila materiala.
mir-recycling-return-chance-percent-10=Povečajte skrite ustvarjene recepte za recikliranje na 10 % vračila materiala.
mir-recycling-return-chance-percent-7-5=Povečajte skrite ustvarjene recepte za recikliranje na 7,5-odstotni materialni donos.
mir-recycling-return-chance-percent-5=Povečajte skrite ustvarjene recepte za recikliranje na 5 % vračila materiala.
mir-recycling-return-chance-percent-2-5=Povečajte skrite ustvarjene recepte za recikliranje na 2,5 % povračila materiala.
mir-recycling-return-chance-percent-1=Povečajte skrite ustvarjene recepte za recikliranje na 1 % povračila materiala.
mir-recycling-return-chance-percent-0-5=Povečajte skrite ustvarjene recepte za recikliranje na 0,5 % povračila materiala.
mir-recycling-return-chance-percent-0-1=Povečajte skrite ustvarjene recepte za recikliranje na 0,1 % materialnega donosa.
mir-prototype-efficiency-cap-engine-default=Pustite omejitev učinka porabe energije za vsak stroj. Stroji brez omejitve po meri uporabljajo Factoriovo običajno zgornjo mejo učinka porabe energije -80 %, tako da učinki ne morejo zmanjšati aktivne uporabe pod 20 %.
mir-prototype-efficiency-cap-saving-25=Napišite omejitev -25 % porabe energije. Aktivna poraba energije ostane pri 75 % ali več po učinkih porabe energije.
mir-prototype-efficiency-cap-saving-50=Napišite omejitev -50% porabe energije. Aktivna poraba energije ostane 50 % ali več po učinkih porabe energije na podprtih strojih.
mir-prototype-efficiency-cap-saving-75=Napišite omejitev -75% porabe energije. Aktivna poraba energije ostane 25 % ali več po učinkih porabe energije na podprtih strojih.
mir-prototype-efficiency-cap-saving-90=Napišite omejitev -90% porabe energije. Aktivna poraba energije lahko pade na 10 %, kar je pod običajnimi 20 %.
mir-prototype-efficiency-cap-saving-95=Napišite omejitev -95% porabe energije. Aktivna poraba energije lahko pade na 5 %.
mir-prototype-efficiency-cap-saving-99=Napišite omejitev -99% porabe energije. Aktivna poraba energije lahko pade na 1 %.
mir-prototype-efficiency-cap-saving-999=Napišite omejitev -99,9 % porabe energije. Poraba aktivne energije lahko pade na 0,1 %.
mir-prototype-efficiency-cap-saving-9999=Napišite omejitev -99,99% porabe energije. To je skoraj ničelna poraba aktivne energije in ne preoblikovanje prototipa z ničelno močjo.
mir-prototype-pollution-cap-engine-default=Pustite omejitev učinka onesnaževanja vsakega stroja pri miru. Stroji brez omejitve po meri uporabljajo Factoriovo običajno zgornjo mejo učinka onesnaževanja -80 %.
mir-prototype-pollution-cap-saving-25=Napišite zgornjo mejo onesnaževanja -25%. Onesnaženost ostaja 75 % ali več po učinkih onesnaženja.
mir-prototype-pollution-cap-saving-50=Napišite omejitev onesnaženosti -50%. Onesnaženje ostaja pri 50 % ali več po učinkih onesnaženja na podprte stroje.
mir-prototype-pollution-cap-saving-75=Napišite zgornjo mejo onesnaženja -75%. Onesnaženje ostaja pri 25 % ali več po učinkih onesnaženja na podprte stroje.
mir-prototype-pollution-cap-saving-90=Napišite zgornjo mejo onesnaženosti -90%. Onesnaženje lahko pade na 10 %, kar je pod običajnimi 20 %.
mir-prototype-pollution-cap-saving-95=Napišite zgornjo mejo onesnaženosti -95%. Onesnaženje lahko pade na 5 %.
mir-prototype-pollution-cap-saving-99=Napišite zgornjo mejo onesnaženosti -99%. Onesnaženost lahko pade na 1 %.
mir-prototype-pollution-cap-saving-999=Napišite omejitev onesnaženja -99,9%. Onesnaženje lahko pade na 0,1 %.
