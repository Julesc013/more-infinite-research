[technology-description]
more-infinite-research.recipe_productivity=Poveča produktivnost receptov za izbrane recepte. Največja omejitev produktivnosti podjetja Factorio še vedno velja; dodatne neskončne ravni morda nimajo praktičnega učinka, ko recept doseže svojo zgornjo mejo.
more-infinite-research.direct_effect=Doda neskončen ponovljiv bonus. Znanstveni paketi so izbrani iz aktivnih laboratorijev, tako da je tehnologija še vedno raziskljiva z združljivimi sklopi modov.
more-infinite-research.cargo_bay_unloading_distance=Poveča največjo razdaljo med pristajalno ploščadjo za tovor in povezanimi prostori za razkladanje.
more-infinite-research.cargo_landing_pad_count=Poveča število pristajališč za tovor, ki jih lahko vsaka sila zgradi na površino.
more-infinite-research.flamethrower_shooting_speed=Poveča hitrost streljanja za metalce ognja in kupole metalcev ognja.
more-infinite-research.electric_shooting_speed=Poveča hitrost streljanja za električno orožje. Pri vaniliji to vpliva na zaščito pred izcedkom; s Space Age vpliva tudi na orožje Tesla, ko je na voljo kategorija streliva Tesla.
more-infinite-research.spoilage_preservation=Poveča globalni modifikator časa kvarjenja z omejenim skriptnim učinkom. Obstoječi predmeti, ki jih je mogoče pokvariti, lahko ohranijo svoje trenutne roke za pokvaritev, dokler niso testirani v igri.
more-infinite-research.agricultural_growth_speed=Skrajša preostali čas rasti za na novo posajene kmetijske stolpnice z omejenim skriptnim učinkom.
more-infinite-research.lab_productivity=Poveča raziskovalni napredek, pridobljen z vsakim porabljenim znanstvenim paketom, z uporabo izvornega modifikatorja produktivnosti laboratorijskih raziskav.

