[mod-setting-description]
ips-require-space-gate=When enabled, these technologies stay locked until space science is researched in vanilla, or promethium science is researched in Space Age.
mir-science-pack-ingredient-policy=Controls extra science packs added to every generated technology. Configured uses each technology's normal packs. Add space science adds space science when available. Add space and promethium science adds both high-end packs when available. Use all official science packs adds base and Space Age packs without modded packs. Use all lab science packs also includes compatible modded science packs.
ips-enable-stream=Disable to prevent __1__ from being generated in the game.
ips-cost-base-stream=Research units required for the first level of __1__. Higher levels scale from this value even if the first unlock starts later.
ips-cost-growth-stream=Multiplier applied to the previous level cost for __1__. Use 1 for a flat cost, greater values to increase difficulty each level.
ips-max-level-stream=Set to 0 to keep __1__ infinite, or provide a positive value to cap it at that level.
ips-research-time-stream=Set to 0 to use the configured default research time for __1__. Provide a positive value to override the seconds per level.
mir-enable-base-tech=Allow __1__ to continue past its vanilla cap with infinite levels that follow the same progression.
mir-cost-base=Set to 0 to reuse the vanilla level 1 cost for __1__. Any positive value overrides the base term used by the infinite formula.
mir-cost-growth=Set to 0 to continue the vanilla growth rate for __1__. Provide a positive value to change how much each infinite level increases in cost.
mir-research-time=Set to 0 to reuse the vanilla research time for __1__. Provide a positive value to override the seconds per level.
mir-prefer-this-mod-for-competing-techs=When enabled, this mod removes selected competing infinite extensions and uses its own versions. Disable to keep competing versions from other mods.
mir-adjust-vanilla-weapon-speed-techs=Controls whether this mod removes rocket and cannon-shell speed bonuses from vanilla weapon shooting speed technologies when dedicated replacement research is available.
mir-debug-generation-report=When enabled, writes one structured log row per generated or skipped stream and base extension, including science packs, prerequisites, effect count, lab compatibility status, and icon source.
mir-debug-recipe-matches=When enabled, writes matched recipe names for each generated productivity stream. This can be noisy in large mod packs.
mir-lab-incompatibility-policy=Choose whether incompatible science-pack sets are reduced to the largest lab-compatible subset or skipped entirely.

