mir-prototype-speed-floor-saving-999=Salli negatiiviset nopeusvaikutukset -99,9 %:iin asti, jolloin nopeudeksi jää vähintään 0,1 %.
mir-prototype-speed-floor-saving-9999=Salli negatiiviset nopeusvaikutukset -99,99 %:iin, joka on Factorion prototyyppien alin raja. Tämä on lähellä pysähdystä, ei nollaa tai negatiivista askartelunopeutta.
