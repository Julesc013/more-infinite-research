[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Ei suorita automaattista etsintää, liittämistä tai luomista. MIR:n kiinteä tutkimus pysyy ennallaan.
mir-automatic-productivity-action-preview=Löytää ja luokitella ehdokkaat ja kirjoittaa sitten hyväksytyt ja ohitetut päätökset Factorio-lokiin. Se ei liitä reseptejä tai luo tutkimusta.
mir-automatic-productivity-action-apply=Oletus. Löytää ehdokkaat ja liittää vain turvallisiksi todistettuja reseptejä yhteensopiviin olemassa oleviin MIR-tutkimuksiin. Se ei luo tutkimusta itsestään; alla olevat kaksi valintaruutua ohjaavat luomista.
mir-automatic-compiler-mode-off=Vanha vastaava Disabled.
mir-automatic-compiler-mode-report=Esikatselun muutosten vanha vastine.
mir-automatic-compiler-mode-safe-attach=Vanha vastine Käytä turvallisia muutoksia, kun tutkimuksen luonti on poistettu käytöstä.
mir-automatic-compiler-mode-exact-pack=Käytä turvallisia muutoksia, kun tutkimusten luominen on käytössä, ja vaaditaan tarkistettuja yhteensopivuustietoja.
mir-automatic-compiler-mode-safe-generate=Käytä turvallisia muutoksia, kun tutkimusten luonti on käytössä rekisteröidyille kokeellisille palveluntarjoajille, vanha vastine.
mir-adjust-vanilla-weapon-speed-techs-off=Poista käytöstä MIR:n valinnainen päällekkäinen raketti/tykki bonuspuhdistus.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Poista MIR:n päällekkäiset raketti-/tykkibonukset vain, kun käytössä oleva, tavoitettavissa oleva ääretön tekniikka tarjoaa tarkan korvaavan vaikutuksen.
mir-adjust-vanilla-weapon-speed-techs-always=Poista aina MIR:n päällekkäiset raketti-/tykkibonukset. Käytä vain, jos haluat tiukan erottamisen.
mir-science-pack-ingredient-policy-configured=Käytä kunkin luodun teknologian konfiguroituja tiedepaketteja ilman valinnaista ainesosien laajennusta. MIR oletusarvo.
mir-science-pack-ingredient-policy-space=Lisää avaruustieteitä, jos saatavilla. Yksinkertainen raketin jälkeinen vaikeuslisäys.
mir-science-pack-ingredient-policy-space-and-promethium=Lisää tilaa ja prometiumtiedettä, jos saatavilla. Paras hyvin myöhään avaruuskauden tutkimusastioihin.
mir-science-pack-ingredient-policy-space-age-progression=Lisää vain valittujen pakettien sisältämät avaruuskauden etenemispaketit. Ei lisää aiheeseen liittymättömiä modifioituja paketteja.
mir-science-pack-ingredient-policy-official-progression=Lisää puuttuvat viralliset edellytystyyliset paketit kehittyneimmällä jo valitulla virallisella paketilla.
mir-science-pack-ingredient-policy-mod-progression=Lisää puuttuvat laboratorion kanssa yhteensopivat paketit, jotka on johdettu modifioidun tiedepaketin etenemisestä, ja avaa esivaatimukset.
mir-science-pack-ingredient-policy-all-official=Käytä jokaista virallista perus- ja Space Age -tiedepakettia, joka on olemassa nykyisessä mod-sarjassa.
mir-science-pack-ingredient-policy-all=Käytä kaikkia aktiivisia laboratorion kanssa yhteensopivia tiedepaketteja, mukaan lukien modifioidut tiedepaketit.
mir-lab-incompatibility-policy-reduce=Säilytä tekniikka pienentämällä sen tiedepakkaukset suurimpaan aktiivisen laboratorion hyväksymään sarjaan. Turvallisin oletus mod-paketteille.
mir-lab-incompatibility-policy-skip=Ohita tekniikka, jos mikään aktiivinen laboratorio ei voi tutkia valittua tiedepakettia. Tiukempi ja helpompi tarkastaa.
mir-lab-incompatibility-policy-engine-default=Älä koskaan kirjoita uudelleen valittua tiedepakettia. MIR säilyttää turvallisesti tutkittavan joukon ennallaan ja jättää luodun teknologian pois, kun Factorio ei voi tutkia sitä tarkkaa joukkoa.
mir-prototype-productivity-cap-engine-default=Jätä kunkin reseptin nykyinen tuottavuusraja rauhaan. Reseptit ilman mukautettua korkkia käyttävät Factorion normaalia +300 % tuottavuusbonusrajaa.
mir-prototype-productivity-cap-percent-25=Aseta muut kuin parametrireseptin tuottavuusrajat arvoon +25 %. Tämä on tiukka varhainen yläraja.
mir-prototype-productivity-cap-percent-50=Aseta muut kuin parametrireseptin tuottavuusrajat arvoon +50 %. Tämä on normaalin ylärajan alapuolella ja saa tuottavuustutkimuksen lakkaamaan auttamasta aikaisemmin.
mir-prototype-productivity-cap-percent-75=Aseta muut kuin parametrireseptin tuottavuusrajat arvoon +75 %. Tämä on normaalin ylärajan alapuolella ja saa tuottavuustutkimuksen lakkaamaan auttamasta aikaisemmin.
mir-prototype-productivity-cap-percent-100=Aseta muut kuin parametrireseptin tuottavuusrajat arvoon +100 %. Tämä on normaalin ylärajan alapuolella ja saa tuottavuustutkimuksen lakkaamaan auttamasta aikaisemmin.
mir-prototype-productivity-cap-percent-125=Aseta muut kuin parametrireseptin tuottavuusrajat arvoon +125 %.
mir-prototype-productivity-cap-percent-150=Aseta muut kuin parametrireseptin tuottavuusrajat arvoon +150 %.
mir-prototype-productivity-cap-percent-200=Aseta muut kuin parametrireseptin tuottavuusrajat arvoon +200 %. Tämä on normaalin ylärajan alapuolella ja saa tuottavuustutkimuksen lakkaamaan auttamasta aikaisemmin.
mir-prototype-productivity-cap-percent-250=Aseta muut kuin parametrireseptin tuottavuusrajat arvoon +250 %. Tämä on hieman normaalin ylärajan alapuolella.
mir-prototype-productivity-cap-percent-400=Aseta muut kuin parametrireseptin tuottavuusrajat arvoon +400 %. Tämä laajentaa tuottavuuden skaalausta normaalin ylärajan yli.
mir-prototype-productivity-cap-percent-500=Aseta muut kuin parametrireseptin tuottavuusrajat arvoon +500 %. Tämä laajentaa tuottavuuden skaalausta normaalin ylärajan yli.
mir-prototype-productivity-cap-percent-750=Aseta muut kuin parametrireseptin tuottavuusrajat arvoon +750 %.
mir-prototype-productivity-cap-percent-1000=Aseta muut kuin parametrireseptin tuottavuusrajat arvoon +1000 %. Käytä pitkiä säästöjä, kun tuottavuustutkimuksen pitäisi olla tärkeä.
mir-prototype-productivity-cap-percent-2500=Aseta muut kuin parametrireseptin tuottavuusrajat arvoon +2500 %. Käytä erittäin pitkiin säästöihin.
mir-prototype-productivity-cap-percent-5000=Aseta muut kuin parametrireseptin tuottavuusrajat arvoon +5000 %.
mir-prototype-productivity-cap-percent-10000=Aseta muut kuin parametrireseptin tuottavuusrajat arvoon +10000%. Käytä vain äärimmäiseen pitkäaikaiseen skaalaan.
mir-prototype-productivity-cap-percent-25000=Aseta muut kuin parametrireseptin tuottavuusrajat arvoon +25 000 %. Käytä vain äärimmäiseen pitkäaikaiseen skaalaan.
mir-prototype-productivity-cap-percent-100000=Aseta ei-parametrien reseptin tuottavuusrajat arvoon +100000%. Tämä on tehokkaasti avattu useimmille säästöille.
mir-recycling-return-chance-engine-default=Jätä jokainen kierrätysohje ennalleen.
mir-recycling-return-chance-match-productivity-cap=Hyödynnä turvallinen automaattinen vähennys piilotetuille kierrätysresepteille. Käyttää 1 / (1 + tuottavuusbonus), rajattu normaaliin 25 %:n tuottoon: +400 % tulee 20 %:ksi ja +1000 % noin 9,09 %.
mir-recycling-return-chance-percent-25=Pidä piilotetut luodut kierrätysreseptit normaalilla 25 %:n materiaalin palautuksella.
mir-recycling-return-chance-percent-20=Skaalaa piilotetut luodut kierrätysreseptit 20 %:n materiaalin palautukseen.
mir-recycling-return-chance-percent-15=Skaalaa piilotetut luodut kierrätysreseptit 15 %:n materiaalin tuottoon.
mir-recycling-return-chance-percent-12-5=Skaalaa piilotetut luodut kierrätysreseptit 12,5 %:n materiaalin tuottoon.
mir-recycling-return-chance-percent-10=Skaalaa piilotetut luodut kierrätysreseptit 10 %:n materiaalin palautukseen.
mir-recycling-return-chance-percent-7-5=Skaalaa piilotetut luodut kierrätysreseptit 7,5 %:n materiaalin tuottoon.
mir-recycling-return-chance-percent-5=Skaalaa piilotetut luodut kierrätysreseptit 5 %:n materiaalin palautukseen.
mir-recycling-return-chance-percent-2-5=Skaalaa piilotetut luodut kierrätysreseptit 2,5 %:n materiaalin palautukseen.
mir-recycling-return-chance-percent-1=Skaalaa piilotetut luodut kierrätysreseptit 1 %:n materiaalin palautukseen.
mir-recycling-return-chance-percent-0-5=Skaalaa piilotetut luodut kierrätysreseptit 0,5 %:n materiaalin palautukseen.
mir-recycling-return-chance-percent-0-1=Skaalaa piilotetut luodut kierrätysreseptit 0,1 %:n materiaalin palautukseen.
mir-prototype-efficiency-cap-engine-default=Jätä jokaisen koneen energiankulutusraja rauhaan. Koneet, joissa ei ole mukautettua rajoitusta, käyttävät Factorion normaalia -80 % energiankulutustehostetta, joten tehosteet eivät voi vähentää aktiivista käyttöä alle 20 %.
mir-prototype-efficiency-cap-saving-25=Kirjoita -25 %:n energiankulutusraja. Aktiivinen energiankäyttö pysyy 75 prosentissa tai enemmän energiankulutuksen jälkeen.
mir-prototype-efficiency-cap-saving-50=Kirjoita -50 %:n energiankulutusraja. Aktiivinen energiankäyttö pysyy 50 prosentissa tai enemmän tuettujen koneiden energiankulutuksen jälkeen.
mir-prototype-efficiency-cap-saving-75=Kirjoita -75 %:n energiankulutusraja. Aktiivinen energiankulutus pysyy 25 prosentissa tai enemmän tuettujen koneiden energiankulutuksen jälkeen.
mir-prototype-efficiency-cap-saving-90=Kirjoita -90 %:n energiankulutusraja. Aktiivinen energiankäyttö voi laskea 10 prosenttiin, mikä on alle normaalin 20 prosentin lattian.
mir-prototype-efficiency-cap-saving-95=Kirjoita -95 %:n energiankulutusraja. Aktiivinen energiankäyttö voi laskea 5 prosenttiin.
mir-prototype-efficiency-cap-saving-99=Kirjoita -99 %:n energiankulutusraja. Aktiivinen energiankäyttö voi laskea 1 prosenttiin.
mir-prototype-efficiency-cap-saving-999=Kirjoita -99,9 %:n energiankulutusraja. Aktiivinen energiankäyttö voi laskea 0,1 prosenttiin.
mir-prototype-efficiency-cap-saving-9999=Kirjoita -99,99 %:n energiankulutusraja. Tämä on lähes nollan aktiivinen energiankäyttö, ei nollatehoprototyypin uudelleenkirjoitus.
mir-prototype-pollution-cap-engine-default=Jätä jokaisen koneen saastevaikutusraja rauhaan. Koneet, joissa ei ole mukautettua rajoitusta, käyttävät Factorion normaalia -80 % saastevaikutuskattoa.
mir-prototype-pollution-cap-saving-25=Kirjoita -25 % saasterajoitus. Saastuminen pysyy 75 prosentissa tai enemmän saastevaikutusten jälkeen.
mir-prototype-pollution-cap-saving-50=Kirjoita -50 % saasterajoitus. Saastuminen pysyy 50 prosentissa tai enemmän sen jälkeen, kun saastevaikutukset ovat tuetuissa koneissa.
mir-prototype-pollution-cap-saving-75=Kirjoita -75 % saasterajoitus. Saastuminen pysyy 25 prosentissa tai enemmän sen jälkeen, kun saastevaikutukset ovat tuetuissa koneissa.
mir-prototype-pollution-cap-saving-90=Kirjoita -90 % saasterajoitus. Saastuminen voi laskea 10 prosenttiin, mikä on normaalin 20 prosentin lattian alapuolella.
mir-prototype-pollution-cap-saving-95=Kirjoita -95 % saasterajoitus. Saastuminen voi laskea 5 prosenttiin.
mir-prototype-pollution-cap-saving-99=Kirjoita -99 % saasterajoitus. Saastuminen voi laskea 1 prosenttiin.
mir-prototype-pollution-cap-saving-999=Kirjoita -99,9 %:n saasterajoitus. Saastuminen voi laskea 0,1 prosenttiin.
mir-prototype-pollution-cap-saving-9999=Kirjoita -99,99 % saasterajoitus. Tämä on lähes nollasaaste, ei ajonaikainen saastekäsikirjoitus.
mir-prototype-speed-floor-engine-default=Jätä jokaisen koneen negatiivinen nopeusrajoitus rauhaan. Koneet ilman mukautettua rajoitusta käyttävät Factorion normaalia -80 % lattiaa ja pitävät vähintään 20 % nopeuden.
mir-prototype-speed-floor-saving-25=Kiinnitä negatiiviset nopeusvaikutukset -25 %:iin, jättäen vähintään 75 % nopeudeksi.
