[technology-description]
more-infinite-research.recipe_productivity=Lisää valittujen reseptien reseptien tuottavuutta. Factorion enimmäistuottavuuskatto on edelleen voimassa; ylimääräisillä äärettömillä tasoilla ei välttämättä ole käytännön vaikutusta, kun resepti saavuttaa enimmäismääränsä.
more-infinite-research.direct_effect=Lisää loputtoman toistettavan bonuksen. Tiedepaketit valitaan aktiivisista laboratorioista, joten tekniikka pysyy tutkittavissa yhteensopivien mod-sarjojen kanssa.
more-infinite-research.cargo_bay_unloading_distance=Suurentaa lastin laskeutumisalustan ja siihen liitettyjen purkupaikkojen välistä maksimietäisyyttä.
more-infinite-research.cargo_landing_pad_count=Lisää kuorman laskeutumisalustojen määrää, joita kukin voima voi rakentaa pintaa kohden.
more-infinite-research.flamethrower_shooting_speed=Lisää ampumisnopeutta liekinheittimien ja liekinheittimien torneineen.
more-infinite-research.electric_shooting_speed=Lisää sähköaseiden ampumisnopeutta. Vaniljassa tämä vaikuttaa purkaussuojaukseen; Avaruusajan kanssa se vaikuttaa myös Teslan aseisiin, kun tesla-ammusluokka on saatavilla.
more-infinite-research.spoilage_preservation=Lisää globaalia spoil time -muuttajaa rajoitetun komentosarjatehosteen avulla. Olemassa olevat pilaantuvat esineet voivat säilyttää nykyiset pilaantumisaikansa, kunnes ne testataan pelin sisällä.
more-infinite-research.agricultural_growth_speed=Lyhentää vastaistutettujen maataloustornikasvien jäljellä olevaa kasvuaikaa rajoitetun käsikirjoituksen avulla.
more-infinite-research.lab_productivity=Lisää jokaisesta kulutetusta tiedepaketista saatua tutkimuksen edistymistä käyttämällä alkuperäistä laboratoriotutkimuksen tuottavuuden modifiointia.

