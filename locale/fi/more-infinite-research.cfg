[mod-setting-description]
ips-require-space-gate=Kun nämä tekniikat ovat käytössä, ne pysyvät lukittuina, kunnes avaruustieteitä tutkitaan vaniljalla tai prometiumtiedettä avaruuskaudella.
mir-science-pack-ingredient-policy=Valitsee, kuinka MIR lisää tiedepaketteja luotuihin teknologioihin. Vaihtoehdot on järjestetty konservatiivisista laajoihin: oletuspaketit, myöhäisen pelin paketit, etenemiseen perustuvat paketit ja sitten kaikki saatavilla olevat paketit.
mir-automatic-productivity-action=Valitsee, mitä MIR tekee turvallisilla tuottavuusmahdollisuuksilla, jotka löytyvät asennetuista mod-resepteistä. Poistettu käytöstä ei suorita automaattista etsintä. Esikatsele hyväksytyt ja ohitetut ehdokkaat Factorio-lokissa muuttamatta tutkimusta. Käytä turvallisia muutoksia (oletus) lisää kelvollisia reseptejä vain yhteensopiviin olemassa oleviin MIR-tutkimuksiin. Tämä ohjaa toimintaa, ei voimaa tai kypsyyttä; alla olevat luontivalintaruudut ovat erilliset. Omistus-, kierrätys-, todennäköisyys-, katalysaattori-, tiede-, laboratorio-, edellytys-, kohde-, identiteetti-, etenemis- ja syklin tarkistukset ovat aina voimassa.
mir-automatic-create-research=Oletus: pois päältä. Off limits Käytä turvallisia muutoksia yhteensopivaan olemassa olevaan MIR-tutkimukseen; ehdokkaat, joilla ei ole sopivaa streamia, ohitetaan ja raportoidaan. Päällä antaa kelvollisen rekisteröidyn palveluntarjoajan luoda yhden vakaan yleisen äärettömän tuottavuuden teknologian, kun olemassa oleva tutkimus ei sovi. Alla oleva tarkistettujen tietojen valintaruutu päättää, ovatko kokeelliset palveluntarjoajat kelvollisia. MIR ei koskaan luo yhtä teknologiaa moda tai reseptiä kohti, ja kaikki kovat turvallisuus-, tiede-, omistus-, identiteetti-, etenemis- ja sykliportit ovat edelleen voimassa.
mir-automatic-require-reviewed-data=Oletus: päällä. Tällä on merkitystä vain, kun Salli uuden tutkimuksen luominen on päällä. se ei koskaan estä turvallista sitoutumista olemassa olevaan tutkimukseen. Luvissa vain palveluntarjoajaperheet, jotka on merkitty tarkistetuiksi ja jotka on tuettu soveltuvilla tarkalla versiolla, joten kokeelliset perheet ohitetaan. Off sallii rekisteröityjen kokeellisten palveluntarjoajien luoda luovia yleisiä rakenteellisia todisteita. Ota käyttöön tutkimusten luominen ja poista tämä vaatimus käytöstä, jotta kokeellinen toiminta on laajinta. Mikään arvo ei voi ohittaa kovaa turvaporttia.
mir-automatic-compiler-mode=Piilotettu yhteensopivuussilta profiileille, jotka on luotu ennen jaettuja automaattisia tuottavuussäätimiä. Ei-oletusarvoista vanhaa arvoa kunnioitetaan vain, kun kaikki uudet ohjausobjektit pysyvät oletusarvoissaan. Muuta mitä tahansa uutta ohjausobjektia ottaaksesi nimenomaisen hallinnan.
ips-enable-stream=Luo luodun äärettömän teknologian __1__:lle, kun sen reseptit, tehosteet, edellytykset ja tiedepaketit ovat saatavilla. Poista tämä käytöstä estääksesi MIR:n luomasta tätä tekniikkaa.
ips-cost-base-stream=Tutkimusyksiköt vaaditaan ensimmäiselle luodulle tasolle __1__. On oltava vähintään 1. Myöhemmät tasot lasketaan tästä arvosta ja kustannusten kasvutekijästä.
ips-cost-growth-stream=Kertointa sovelletaan jokaiselle myöhemmälle tasolle __1__. Käytä arvoa 1 tasaisiin kuluihin, 1,5 50 % kasvuun tasoa kohden tai 2 kustannusten kaksinkertaistamiseen.
ips-max-level-stream=Korkein luotu taso kohteelle __1__. Aseta arvoon 0 äärettömälle tasolle.
ips-research-time-stream=Sekuntia tutkimusyksikköä kohden __1__. Aseta arvoksi 0, jos haluat käyttää MIR:n oletusarvoa tälle tekniikalle. Tämä ei ole kokonaistutkimusaikaa; kokonaisaika riippuu myös tutkimuskustannuksista, laboratorioiden määrästä, laboratorion nopeudesta ja moduuleista.
mir-enable-base-tech=Mahdollistaa __1__:n vaniljakorkin ohitse äärettömänä teknologiana. Poista tämä käytöstä, jos haluat MIR:n lisäävän uusia tutkimuslinjoja jatkamatta tätä vaniljaketjua.
mir-cost-base=Tutkimusyksiköt vaaditaan ensimmäiselle MIR-jatkotasolle __1__. Aseta arvoksi 0, jos haluat periä vaniljaketjun kustannusmallin, kun mahdollista.
mir-cost-growth=Kerroin, jota sovelletaan jokaiseen myöhempään MIR-jatkotasoon __1__. Aseta arvoksi 0, jos haluat periä vaniljaketjun kasvukuvion, kun mahdollista.
mir-max-level=Korkein MIR-jatkotaso mallille __1__. Aseta arvoon 0 äärettömälle tasolle.
mir-research-time=Sekuntia tutkimusyksikköä kohti MIR-jatkossa __1__. Aseta arvoksi 0, jos haluat periä vaniljaketjun tutkimusyksikön ajan, jos mahdollista.
mir-prefer-this-mod-for-competing-techs=Kun tämä modi on käytössä, se poistaa valitut kilpailevat äärettömät laajennukset ja käyttää omia versioitaan. Poista käytöstä säilyttääksesi kilpailevat versiot muista modeista.
mir-adjust-vanilla-weapon-speed-techs=Ohjaa, poistaako MIR raketin ja kanuunan kuoren nopeusbonukset generoidusta aseen ammuntanopeuden jatkosta, kun tarkka ääretön korvaava kattavuus on saatavilla. Rajalliset vanilja-aseiden ammuntanopeustekniikat säilyttävät alkuperäiset bonuksensa.
mir-use-installed-space-age-icons=Kun MIR on käytössä, se voi viitata asennettuihin virallisiin DLC-kuvaketiedostoihin, mukaan lukien Space Age ja Elevated Rails, vaikka kyseiset modit olisivat pois käytöstä peruspeliä varten. Jätä tämä pois päältä, jos näitä DLC-tiedostoja ei ole asennettu; Factorio ei voi toipua sulavasti puuttuvista kuvaketiedostoista prototyypin latauksen aikana.
mir-pipeline-extent-multiplier=Vain käynnistyksen pudotusvalikon kerroin tunnistetuille nestelaatikon putkilinjan laajuuskentille prototyyppien välillä, ei vain putkien kokonaisuuksissa. 100 % jättää prototyypit ennalleen eikä lataa putkilinjaa tai skannausnestelaatikoita. Muut kuin 100 %:n arvot ovat kokeellisia ja voivat vaikuttaa koneisiin, tankkeihin, potkuriin ja modifioituihin prototyyppeihin, jotka määrittävät nestelaatikoita.
mir-unrestricted-modules=Kokeellinen ja tasapainoa rikkova. Kun tämä on käytössä, jokainen olemassa oleva resepti hyväksyy kaikki viisi moduulitehostetta ja jokainen olemassa oleva moduulivastaanotin, jossa on paikka, hyväksyy jokaisen löydetyn moduuliluokan. Tämä ei lisää moduulipaikkoja tai muuta moduulien prototyyppejä, ja se voi mahdollistaa tuottavuuden, laadun ja modifioidut moduulisilmukat.
mir-prototype-productivity-cap=Valitsee, jättääkö MIR reseptien tuottavuusrajat yksin vai kirjoittaako käynnistysrajan jokaiseen ei-parametriseen, kierrätykseen liittymättömään reseptiin. +300 % (ennallaan) säilyttää olemassa olevat reseptikorkit; pienemmät arvot lyhentävät tuottavuuden skaalausta, kun taas korkeammat arvot pidentävät sitä.
mir-recycling-return-chance=Ohjaa vain piilotettuja luotuja kierrätysreseptejä. Automaattinen tila vähentää normaalin 25 %:n materiaalin palautuksen enintään 1:een jaettuna kokonaistuotannon kertoimella valitulla tuottavuusrajalla. Kiinteät valinnat skaalaavat samat tuotot suoraan. Näkyviä prosesseja ja reseptien tuottavuuskattoja ei muuteta koskaan.
mir-productivity-cap-self-recycling-only=Yli 1 / kierrättäjäpalautus - 1, vain tuotantoreseptit, joissa on todistettu ei-generatiivinen itsekierrätyspolku, saavat valitun korkeamman rajan. Tämän kynnyksen kohdalla tai sen alapuolella tällä valintaruudulla ei ole vaikutusta. Moottori muuttumattomana käyttää normaalia 25 %:n tuottoa konservatiivisena +300 %:n kynnyksenä kierrätysreseptejä muuttamatta.
mir-prototype-efficiency-cap=Valitsee, kuinka paljon tehokkuusvaikutukset voivat vähentää koneen aktiivista energiankäyttöä. -80 % (ennallaan) jättää nykyiset energiankäyttörajat yksin. Syvemmät vähennykset voivat lähestyä aktiivisen energian käytön nollaa ilman pilaantumisrajojen muuttumista.
mir-prototype-pollution-cap=Valitsee, kuinka paljon saastumista vähentävät vaikutukset voivat vähentää koneen saastumista. -80 % (ennallaan) jättää nykyiset saasterajat yksin. Syvemmät vähennykset voivat lähestyä saasteetonta energiankäyttöä muuttamatta.
mir-prototype-speed-floor=Valitsee, kuinka paljon negatiiviset nopeusvaikutukset voivat hidastaa tuettuja koneita. -80 % (ennallaan) jättää olemassa olevat rajat yksin; syvemmät arvot poistavat normaalin lattian lähelle pysähdystä -99,99 %:iin.
mir-prototype-speed-cap=Valitsee, jättääkö MIR koneen nopeusrajoitukset yksin vai kirjoittaako uuden positiivisen nopeusrajoituksen. +100000% (ennallaan) säilyttää nykyiset rajat; pienemmät arvot kiristävät tarkoituksella erittäin suuria nopeusbonuksia.
mir-prototype-quality-cap=Valitsee, jättääkö MIR koneen laatuvaikutusrajat yksin vai kirjoittaako uuden positiivisen laaturajan. +100000% (muuttumaton) säilyttää olemassa olevat rajat eikä muuta laatutasoja tai nimikkeiden todennäköisyyskaavoja.
mir-prototype-positive-power-floor=Oletus pois päältä. Kun MIR on käytössä, se muuttaa eksplisiittiset 0 W:n aktiivisen energian käytön prototyypit 1 W:ksi prototyyppien latauksen aikana, joten virransyötön varoituskuvakkeita ei näytetä entiteeteille, joiden pitäisi saada pieni määrä nollasta poikkeavaa määrää. Jätä pois, jotta nollatehoiset prototyypit säilyvät tarkasti.
mir-settings-profile-import=Liitä MIR-asetusprofiilimerkkijono tähän, jos haluat käyttää vietyjä käynnistysasetusarvoja ohituskerroksena prototyypin luomisen aikana. Jätä tyhjäksi normaaleille asetuksille. Vie aktiivisesta tallennuksesta komennolla /mir-settings-export ja käynnistä sitten uudelleen tämän arvon muuttamisen jälkeen.
mir-debug-generation-report=Kun tämä on käytössä, kirjoittaa yhden jäsennellyn lokirivin luotua tai ohitettua streamia ja peruslaajennusta kohti, mukaan lukien tiedepaketit, esivaatimukset, tehostemäärä, laboratorion yhteensopivuustila ja kuvakelähde.
mir-debug-recipe-matches=Kun tämä on käytössä, se kirjoittaa vastaavat reseptien nimet kullekin luodulle tuottavuusvirralle. Tämä voi olla meluisa suurissa mod-pakkauksissa.
mir-debug-scripted-effects=Kun tämä on käytössä, se kirjoittaa ajonaikaisia ​​lokimerkintöjä, kun komentosarjatekniikat laskevat uudelleen maailmanlaajuiset tai tapahtumapohjaiset tehosteet.
mir-lab-incompatibility-policy=Valitsee, mitä MIR tekee, kun mikään aktiivinen laboratorio ei voi tutkia valittuja tiedepaketteja.
ips-effect-per-level-stream=Asettaa ensisijaisen perustason tehosteen tasokohtaisesti __1__:lle. Myöhemmät tasot ja tehosteet skaalataan suhteellisesti. Prosenttivaikutukset käyttävät prosenttiyksikköä; laskenta- ja etäisyystehosteet käyttävät alkuperäisiä yksikköjään.
mir-effect-per-level=Asettaa kanonisen tasokohtaisen tehosteen äärettömälle __1__ jatkolle. Aiheeseen liittyvät vaikutukset skaalataan suhteessa lopulliseen vaniljan perusviivaan. Prosenttivaikutukset käyttävät prosenttiyksikköä; laskenta- ja etäisyystehosteet käyttävät alkuperäisiä yksikköjään.
mir-note-experimental-spoilage=Kokeellinen ja oletuksena poistettu käytöstä v2.1.0:ssa. Tämä on globaali/kartan laajuinen komentosarjatehoste. Olemassa olevaa spoilable-pinon toimintaa ei vaadita ennen kuin se on vahvistettu manuaalisesti.
mir-note-agriculture-growth=Koskee vasta istutettuja tornikasveja. Olemassa olevia istutettuja kasveja ei skaalata uudelleen.
mir-note-cargo-pad-count=Erikoisavaruusajan logistiikkatutkimus. Lisää lastin laskeutumisalustoja pintaa kohden ja voi muuttaa merkittävästi logistiikan tasapainoa.
mir-note-inserter-capacity=Ei käytössä oletuksena. Lisäsyöttimen kapasiteetti voi rikkoa piiriohjattuja syöttölaitteita ja vähentää moottorin optimointia.
mir-note-native-owner-managed-stream=Jos asennettu ääretön tekniikka jo omistaa tämän tutkimusperheen, samat käynnistysasetukset määrittävät kyseisen omistajan kopioiden luomisen sijaan. Muuttumattomat MIR-oletukset säilyttävät omistajan lopullisen prototyypin tarkasti. Selkeät kustannus-, aika-, maksimitason ja tehosteen ohitukset ovat voimassa vain turvallisen omistajan osuman jälkeen. virran poistaminen käytöstä jättää ulkoisen tekniikan koskemattomaksi. Käynnistä Factorio uudelleen käynnistysasetusten muuttamisen jälkeen. Maksimitaso 0 tarkoittaa ääretöntä ja tehostearvot ovat prosenttipisteitä tasoa kohden.

