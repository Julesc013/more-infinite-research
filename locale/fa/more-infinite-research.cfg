[mod-setting-description]
ips-require-space-gate=وقتی فعال باشد، این فناوری‌ها قفل می‌مانند تا زمانی که علم فضایی در وانیل یا علم پرومتیم در عصر فضا تحقیق شود.
mir-science-pack-ingredient-policy=نحوه اضافه کردن بسته‌های علمی را به فناوری‌های تولید شده انتخاب می‌کند. گزینه‌ها از محافظه‌کار تا گسترده مرتب می‌شوند: بسته‌های پیش‌فرض، بسته‌های اواخر بازی، بسته‌های مبتنی بر پیشرفت، سپس همه بسته‌های موجود.
mir-automatic-productivity-action=انتخاب می‌کند که MIR با فرصت‌های بهره‌وری ایمن موجود در دستور العمل‌های مود نصب‌شده چه می‌کند. غیرفعال هیچ کشف خودکاری انجام نمی دهد. پیش‌نمایش رکوردهای پذیرفته‌شده و نادیده گرفته‌شده در لاگ Factorio را بدون تغییر تحقیقات تغییر می‌دهد. اعمال تغییرات ایمن (پیش‌فرض) دستور العمل‌های واجد شرایط را فقط به تحقیقات سازگار موجود MIR اضافه می‌کند. این عمل را کنترل می کند، نه قدرت یا بلوغ. چک باکس های ایجاد زیر جدا هستند. بررسی های مالکیت، بازیافت، احتمال، کاتالیزور، علم، آزمایشگاه، پیش نیاز، هدف، هویت، پیشرفت و چرخه همیشه اعمال می شود.
mir-automatic-create-research=پیش‌فرض: خاموش. خارج از محدودیت اعمال تغییرات ایمن در تحقیقات سازگار با MIR موجود. نامزدهای بدون جریان مناسب نادیده گرفته می شوند و گزارش می شوند. روشن به یک ارائه‌دهنده ثبت‌شده واجد شرایط اجازه می‌دهد یک فناوری بهره‌وری بی‌نهایت عمومی پایدار ایجاد کند، در صورتی که هیچ تحقیق موجود مناسب نباشد. چک باکس بررسی داده‌های زیر تعیین می‌کند که آیا ارائه‌دهندگان آزمایشی واجد شرایط هستند یا خیر. MIR هرگز در هر مد یا دستور غذا یک فناوری ایجاد نمی‌کند، و هر گیت ایمنی، علم، مالکیت، هویت، پیشرفت و چرخه هنوز هم اعمال می‌شود.
mir-automatic-require-reviewed-data=پیش‌فرض: روشن. این فقط زمانی اهمیت دارد که اجازه ایجاد تحقیقات جدید روشن باشد. هرگز دلبستگی ایمن به تحقیقات موجود را مسدود نمی کند. در مجوزها فقط خانواده‌های ارائه‌دهنده علامت‌گذاری شده‌اند که بررسی شده و توسط شواهد نسخه دقیق قابل اجرا پشتیبانی می‌شوند، بنابراین خانواده‌های آزمایشی نادیده گرفته می‌شوند. Off به ارائه دهندگان آزمایشی ثبت شده اجازه می دهد از شواهد ساختاری عمومی ایجاد کنند. برای گسترده‌ترین رفتار تجربی، ایجاد پژوهش را فعال کنید و این نیاز را خاموش کنید. هیچ ارزشی نمی تواند دروازه ایمنی سخت را دور بزند.
mir-automatic-compiler-mode=⟧ پل سازگاری پنهان برای پروفایل هایی که قبل از تقسیم کنترل های بهره وری خودکار ایجاد شده اند. یک مقدار قدیمی غیر پیش‌فرض تنها زمانی که همه کنترل‌های جدید در حالت پیش‌فرض باقی می‌مانند، رعایت می‌شود. هر کنترل جدیدی را برای کنترل صریح تغییر دهید.
ips-enable-stream=فناوری بی نهایت تولید شده را برای __1__ هنگامی که دستور العمل ها، جلوه ها، پیش نیازها و بسته های علمی آن در دسترس هستند ایجاد می کند. برای جلوگیری از تولید این فناوری توسط MIR، آن را غیرفعال کنید.
ips-cost-base-stream=واحدهای تحقیقاتی مورد نیاز برای اولین سطح تولید شده __1__. باید حداقل 1 باشد. سطوح بعدی از این مقدار و ضریب رشد هزینه محاسبه می شود.
ips-cost-growth-stream=برای هر سطح بعدی __1__ ضریب اعمال می‌شود. از 1 برای هزینه های ثابت، 1.5 برای 50% رشد در هر سطح، یا 2 برای دوبرابر کردن هزینه ها استفاده کنید.
ips-max-level-stream=بالاترین سطح تولید شده برای __1__. برای سطوح بی نهایت روی 0 تنظیم کنید.
ips-research-time-stream=ثانیه در هر واحد تحقیقاتی برای __1__. برای استفاده از پیش‌فرض MIR برای این فناوری، روی 0 تنظیم کنید. این زمان کل تحقیق نیست. زمان کل نیز به هزینه تحقیق، تعداد آزمایشگاه، سرعت آزمایشگاه و ماژول ها بستگی دارد.
mir-enable-base-tech=به __1__ اجازه می‌دهد به عنوان یک فناوری بی‌نهایت از کلاهک وانیلی خود عبور کند. اگر می خواهید MIR خطوط تحقیقاتی جدیدی را بدون گسترش این زنجیره وانیلی اضافه کند، این را غیرفعال کنید.
mir-cost-base=واحدهای تحقیقاتی برای اولین سطح ادامه MIR __1__ مورد نیاز است. برای به ارث بردن الگوی هزینه زنجیره وانیلی در صورت امکان، روی 0 تنظیم کنید.
mir-cost-growth=برای هر سطح ادامه MIR بعدی __1__ ضریب اعمال می‌شود. برای به ارث بردن الگوی رشد زنجیره وانیل در صورت امکان، روی 0 تنظیم کنید.
mir-max-level=بالاترین سطح ادامه MIR برای __1__. برای سطوح بی نهایت روی 0 تنظیم کنید.
mir-research-time=ثانیه در هر واحد تحقیقاتی برای ادامه MIR __1__. برای به ارث بردن زمان واحد تحقیق زنجیره وانیل در صورت امکان، روی 0 تنظیم کنید.
mir-prefer-this-mod-for-competing-techs=وقتی فعال باشد، این مد پسوندهای نامحدود رقیب را حذف می‌کند و از نسخه‌های خود استفاده می‌کند. برای حفظ نسخه های رقیب از حالت های دیگر غیرفعال کنید.
mir-adjust-vanilla-weapon-speed-techs=⟧ کنترل می‌کند که آیا MIR پاداش‌های سرعت موشک و گلوله توپ را از ادامه سرعت شلیک سلاح تولیدی خود در زمانی که پوشش جایگزینی بی‌نهایتی در دسترس است حذف می‌کند یا خیر. فن‌آوری‌های سرعت تیراندازی با سلاح وانیلی محدود، امتیازات اصلی خود را حفظ می‌کنند.
mir-use-installed-space-age-icons=وقتی فعال باشد، MIR ممکن است به فایل‌های آیکون DLC رسمی نصب‌شده، از جمله Space Age و Elevated Rails اشاره کند، حتی زمانی که این حالت‌ها برای اجرای یک بازی پایه غیرفعال هستند. اگر آن فایل‌های DLC نصب نشده‌اند، آن را خاموش کنید. فاکتوریو نمی‌تواند به‌خوبی از فایل‌های نماد مفقود شده در حین بارگیری نمونه اولیه بازیابی کند.
mir-pipeline-extent-multiplier=ضریب کشویی فقط راه‌اندازی برای میدان‌های وسعت خط لوله جعبه سیال شناخته شده در نمونه‌های اولیه، نه تنها موجودیت‌های لوله. 100% نمونه های اولیه را بدون تغییر می گذارد و گذر خط لوله را بارگیری نمی کند یا جعبه های مایع را اسکن نمی کند. مقادیر غیر 100٪ تجربی هستند و می توانند ماشین ها، مخازن، رانشگرها و نمونه های اولیه اصلاح شده را که جعبه های سیال را تعریف می کنند، تحت تاثیر قرار دهند.
mir-unrestricted-modules=آزمایشی و تعادل شکن. وقتی فعال باشد، هر دستور غذای موجود هر پنج جلوه ماژول را می‌پذیرد و هر گیرنده ماژول موجود با اسلات، هر دسته ماژول کشف‌شده را می‌پذیرد. این اسلات‌های ماژول را اضافه نمی‌کند یا نمونه‌های اولیه ماژول را تغییر نمی‌دهد و ممکن است بهره‌وری، کیفیت و حلقه‌های ماژول اصلاح‌شده را فعال کند.
mir-prototype-productivity-cap=انتخاب می‌کند که آیا MIR سقف‌های بهره‌وری دستور غذا را به حال خود رها می‌کند یا برای هر دستور غذای غیر پارامتری و غیر بازیافتی، یک سرپوش راه‌اندازی می‌نویسد. +300٪ (بدون تغییر) درپوش های دستور العمل موجود را حفظ می کند. مقادیر پایین تر مقیاس بهره وری را کوتاه می کند، در حالی که مقادیر بالاتر آن را گسترش می دهد.
mir-recycling-return-chance=فقط دستور العمل های بازیافت تولید شده پنهان را کنترل می کند. حالت خودکار بازگشت معمولی 25٪ مواد را حداکثر به 1 تقسیم بر ضریب کل خروجی در سقف بهره وری انتخاب شده کاهش می دهد. انتخاب های ثابت همان بازده تولید شده را به طور مستقیم مقیاس می کنند. فرآیندهای قابل مشاهده و سقف بهره وری دستور پخت هرگز تغییر نمی کنند.
mir-productivity-cap-self-recycling-only=بالاتر از 1 / بازگشت بازیافت - 1، فقط دستور العمل های تولیدی با مسیر خودبازیافت غیر مولد ثابت شده، سقف انتخابی بالاتر را دریافت می کنند. در یا کمتر از آن آستانه، این چک باکس تاثیری ندارد. موتور بدون تغییر از بازده معمولی 25% به عنوان آستانه محافظه کارانه +300% بدون تغییر دستور العمل های بازیافت استفاده می کند.
mir-prototype-efficiency-cap=انتخاب می‌کند که اثرات کارآیی تا چه حد ممکن است مصرف انرژی فعال ماشین را کاهش دهد. -80% (بدون تغییر) محدودیت های مصرف انرژی موجود را به حال خود رها می کند. کاهش عمیق‌تر می‌تواند بدون تغییر محدودیت‌های آلودگی، مصرف انرژی فعال را به صفر برساند.
mir-prototype-pollution-cap=⟧ انتخاب می کند که اثرات کاهش آلودگی تا چه حد ممکن است آلودگی ماشین را کاهش دهد. -80% (بدون تغییر) محدودیت های موجود آلودگی را به حال خود رها می کند. کاهش عمیق تر می تواند بدون تغییر در مصرف انرژی به آلودگی صفر نزدیک شود.
mir-prototype-speed-floor=انتخاب می‌کند که اثرات منفی سرعت تا چه حد ممکن است ماشین‌های پشتیبانی‌شده را کاهش دهد. -80٪ (بدون تغییر) محدودیت های موجود را به تنهایی باقی می گذارد. مقادیر عمیق تر، کف معمولی را تا حد توقف در 99.99-% کاهش می دهد.
mir-prototype-speed-cap=انتخاب می‌کند که آیا MIR محدودیت‌های اثر سرعت ماشین را به تنهایی رها کند یا یک سقف سرعت مثبت جدید بنویسد. +100000% (بدون تغییر) محدودیت های موجود را حفظ می کند. مقادیر پایین‌تر عمداً پاداش‌های سرعت بسیار زیادی را به همراه دارند.
mir-prototype-quality-cap=انتخاب می‌کند که آیا MIR محدودیت‌های اثر کیفیت ماشین را به تنهایی رها می‌کند یا یک کلاهک کیفیت مثبت جدید می‌نویسد. +100000٪ (بدون تغییر) محدودیت های موجود را حفظ می کند و سطوح کیفیت یا فرمول های احتمال مورد را تغییر نمی دهد.
mir-prototype-positive-power-floor=پیش‌فرض خاموش است. هنگامی که فعال باشد، MIR نمونه‌های اولیه مصرف انرژی فعال 0 وات را در حین بارگیری نمونه اولیه به 1 وات تغییر می‌دهد تا نمادهای هشدار کم مصرف در موجودیت‌هایی که باید مقدار ناچیز غیرصفری را ترسیم کنند ظاهر نشوند. برای حفظ نمونه های اولیه با توان صفر دقیقاً رها کنید.
mir-settings-profile-import=یک رشته نمایه تنظیمات MIR را در اینجا بچسبانید تا مقادیر تنظیم راه‌اندازی صادر شده را به‌عنوان یک لایه لغو در طول تولید نمونه اولیه اعمال کنید. برای تنظیمات عادی خالی بگذارید. با /mir-settings-export از یک ذخیره فعال صادر کنید، سپس پس از تغییر این مقدار دوباره راه اندازی کنید.
mir-debug-generation-report=وقتی فعال باشد، یک ردیف گزارش ساختاریافته در هر جریان و برنامه افزودنی پایه تولید شده یا نادیده گرفته شده، شامل بسته‌های علمی، پیش نیازها، تعداد اثر، وضعیت سازگاری آزمایشگاه و منبع نماد می‌نویسد.
mir-debug-recipe-matches=وقتی فعال باشد، نام‌های دستور پخت را برای هر جریان بهره‌وری تولید شده می‌نویسد. این می‌تواند در بسته‌های مد بزرگ پر سر و صدا باشد.
mir-debug-scripted-effects=وقتی فعال باشد، زمانی که فناوری‌های اسکریپت‌شده جلوه‌های سراسری یا رویداد محور را دوباره محاسبه می‌کنند، ورودی‌های گزارش زمان اجرا را می‌نویسد.
mir-lab-incompatibility-policy=⟧ انتخاب می‌کند که وقتی بسته‌های علمی انتخاب شده توسط هیچ آزمایشگاه فعالی قابل تحقیق نباشد، MIR چه کاری انجام می‌دهد.
ips-effect-per-level-stream=جلوه لایه پایه اولیه را در هر سطح برای __1__ تنظیم می‌کند. سطوح و جلوه‌های بعدی مرتبط به نسبت مقیاس‌بندی می‌شوند. اثرات درصد استفاده از نقاط درصد. افکت های شمارش و فاصله از واحدهای بومی خود استفاده می کنند.
mir-effect-per-level=جلوه متعارف در هر سطح را برای ادامه بی‌نهایت __1__ تنظیم می‌کند. اثرات مرتبط به نسبت از پایه نهایی وانیل مقیاس بندی می شوند. اثرات درصد استفاده از نقاط درصد. افکت های شمارش و فاصله از واحدهای بومی خود استفاده می کنند.
mir-note-experimental-spoilage=آزمایشی و به طور پیش فرض در نسخه 2.1.0 غیرفعال شده است. این یک افکت اسکریپت جهانی/گسترده نقشه است. رفتار پشته خراب شدنی تا زمانی که به صورت دستی تأیید نشود ادعا نمی شود.
mir-note-agriculture-growth=برای محصولات برج کشاورزی تازه کاشته شده کاربرد دارد. محصولات کاشته شده موجود تغییر مقیاس داده نمی شوند.
mir-note-cargo-pad-count=تحقیقات لجستیک عصر فضایی ویژه. سکوهای فرود محموله را در هر سطح افزایش می دهد و می تواند تعادل لجستیک را به طور اساسی تغییر دهد.
mir-note-inserter-capacity=به طور پیش‌فرض غیرفعال است. ظرفیت اضافی درج می‌تواند درج‌های کنترل‌شده مدار را بشکند و بهینه‌سازی موتور را کاهش دهد.
mir-note-native-owner-managed-stream=اگر یک فناوری بی‌نهایت نصب‌شده قبلاً این خانواده تحقیقاتی را در اختیار داشته باشد، همین تنظیمات راه‌اندازی به جای ایجاد یک نسخه تکراری، مالک را پیکربندی می‌کنند. پیش‌فرض‌های MIR بدون تغییر، نمونه اولیه مالک را دقیقاً حفظ می‌کنند. لغو صریح هزینه، زمان، حداکثر سطح و اثر صرفاً پس از تطبیق مالک ایمن اعمال می‌شود. غیرفعال کردن جریان، فناوری خارجی را دست نخورده باقی می‌گذارد. پس از تغییر تنظیمات راه اندازی، فاکتوریو را مجددا راه اندازی کنید. حداکثر سطح 0 به معنای بی نهایت است و مقادیر اثر درصد در هر سطح هستند.

