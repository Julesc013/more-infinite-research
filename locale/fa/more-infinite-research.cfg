mir-prototype-productivity-cap-percent-200=سقف‌های بهره‌وری دستور غیر پارامتری را روی 200% تنظیم کنید. این کمتر از سقف طبیعی است و باعث می‌شود تحقیقات بهره‌وری زودتر کمک نکنند.
mir-prototype-productivity-cap-percent-250=⟧ سقف های بهره وری دستور غیر پارامتری را روی 250% تنظیم کنید. این مقدار کمی زیر کلاه معمولی است.
mir-prototype-productivity-cap-percent-400=⟧ سقف های بهره وری دستور غیر پارامتری را روی 400% تنظیم کنید. این مقیاس بهره وری را فراتر از سقف معمولی گسترش می دهد.
mir-prototype-productivity-cap-percent-500=سقف‌های بهره‌وری دستور غیر پارامتری را روی 500% تنظیم کنید. این مقیاس بهره وری را فراتر از سقف معمولی گسترش می دهد.
mir-prototype-productivity-cap-percent-750=سقف های بهره وری دستور غیر پارامتری را روی 750% تنظیم کنید.
mir-prototype-productivity-cap-percent-1000=سقف های بهره وری دستور غیر پارامتری را روی 1000% تنظیم کنید. برای صرفه جویی های طولانی در جایی که تحقیقات بهره وری باید اهمیت داشته باشد استفاده کنید.
