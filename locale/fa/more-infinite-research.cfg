mir-prototype-productivity-cap-percent-5000=⟧ سقف های بهره وری دستور غیر پارامتری را روی 5000% تنظیم کنید.
mir-prototype-productivity-cap-percent-10000=⟧ سقف های بهره وری دستور غیر پارامتری را روی 10000% تنظیم کنید. فقط برای پوسته پوسته شدن طولانی مدت استفاده کنید.
mir-prototype-productivity-cap-percent-25000=سقف های بهره وری دستور غیر پارامتری را روی 25000% تنظیم کنید. فقط برای پوسته پوسته شدن طولانی مدت استفاده کنید.
mir-prototype-productivity-cap-percent-100000=سقف‌های بهره‌وری دستور غیر پارامتری را روی 100000% تنظیم کنید. این عملاً برای اکثر سیوها فاقد سقف است.
mir-recycling-return-chance-engine-default=هر دستور غذای بازیافتی را بدون تغییر رها کنید.
mir-recycling-return-chance-match-productivity-cap=کاهش خودکار بی خطر برای دستور العمل های بازیافت تولید شده پنهان. از 1 / (1 + پاداش بهره‌وری) استفاده می‌کند، با بازده عادی 25% محدود می‌شود: +400% به 20% می‌شود و +1000% می‌شود حدود 9.09%.
mir-recycling-return-chance-percent-25=⟧ دستور العمل های بازیافت تولید شده پنهان را با بازگشت مواد معمولی 25٪ نگه دارید.
