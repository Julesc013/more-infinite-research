[string-mod-setting-description]
mir-automatic-productivity-action-disabled=⟧ هیچ کشف، پیوست یا ایجاد خودکاری را انجام نمی دهد. تحقیقات ثابت MIR بدون تغییر باقی می ماند.
mir-automatic-productivity-action-preview=کاندیداها را کشف و طبقه بندی می کند، سپس تصمیمات پذیرفته شده و نادیده گرفته شده را در لاگ Factorio می نویسد. دستور العمل ها را ضمیمه نمی کند یا تحقیقی ایجاد نمی کند.
mir-automatic-productivity-action-apply=⟧ پیش‌فرض. کاندیداها را کشف می کند و فقط دستور العمل های اثبات شده ایمنی را به تحقیقات سازگار موجود MIR پیوست می کند. این به خودی خود تحقیق ایجاد نمی کند. دو چک باکس زیر ایجاد را کنترل می کنند.
mir-automatic-compiler-mode-off=معادل میراث معلول.
mir-automatic-compiler-mode-report=معادل میراث تغییرات پیش‌نمایش.
mir-automatic-compiler-mode-safe-attach=معادل میراث اعمال تغییرات ایمن با غیرفعال بودن ایجاد تحقیقات.
mir-automatic-compiler-mode-exact-pack=معادل میراث اعمال تغییرات ایمن با فعال کردن ایجاد تحقیقات و بررسی داده‌های سازگاری مورد نیاز.
mir-automatic-compiler-mode-safe-generate=معادل میراث اعمال تغییرات ایمن با ایجاد تحقیقات فعال برای ارائه دهندگان آزمایشی ثبت شده.
mir-adjust-vanilla-weapon-speed-techs-off=پاکسازی جایزه موشک/توپ اختیاری MIR را غیرفعال کنید.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=پاداش‌های همپوشانی موشک/توپ MIR را فقط زمانی حذف کنید که یک فناوری فعال و قابل دسترسی بی‌نهایت اثر جایگزینی دقیق را ارائه دهد.
mir-adjust-vanilla-weapon-speed-techs-always=همیشه پاداش‌های موشک/توپ MIR را حذف کنید. فقط در صورت تمایل به جدایی شدید استفاده کنید.
mir-science-pack-ingredient-policy-configured=از بسته‌های علمی پیکربندی‌شده هر فناوری تولید شده بدون بسط مواد اختیاری استفاده کنید. پیش فرض MIR
mir-science-pack-ingredient-policy-space=در صورت وجود، علم فضایی را اضافه کنید. افزایش سختی ساده پس از موشک.
mir-science-pack-ingredient-policy-space-and-promethium=در صورت وجود فضا و علم پرومتیم اضافه کنید. بهترین برای غرق‌های تحقیقاتی بسیار دیرهنگام عصر فضا.
mir-science-pack-ingredient-policy-space-age-progression=فقط بسته‌های پیشرفت Space Age را که توسط بسته‌های انتخابی ذکر شده است اضافه کنید. بسته های مود شده نامربوط اضافه نمی کند.
mir-science-pack-ingredient-policy-official-progression=بسته‌های به سبک پیش‌نیاز رسمی گمشده را اضافه کنید که توسط پیشرفته‌ترین بسته رسمی قبلاً انتخاب شده است.
mir-science-pack-ingredient-policy-mod-progression=بسته‌های سازگار با آزمایشگاه از دست رفته را که از پیشرفت بسته علمی اصلاح‌شده استنباط شده‌اند، اضافه کنید و پیش‌نیازها را باز کنید.
mir-science-pack-ingredient-policy-all-official=از هر پایگاه رسمی و بسته علمی عصر فضا که در مجموعه مد فعلی وجود دارد استفاده کنید.
mir-science-pack-ingredient-policy-all=از هر بسته علمی سازگار با آزمایشگاه فعال، از جمله بسته‌های علمی مود شده استفاده کنید.
mir-lab-incompatibility-policy-reduce=با کاهش بسته های علمی آن به بزرگترین مجموعه پذیرفته شده توسط یک آزمایشگاه فعال، فناوری را حفظ کنید. امن ترین پیش فرض برای بسته های مد.
mir-lab-incompatibility-policy-skip=اگر هیچ آزمایشگاه فعالی نتواند مجموعه بسته علمی انتخابی خود را تحقیق کند، از فناوری صرف نظر کنید. حسابرسی سختگیرانه تر و راحت تر
mir-lab-incompatibility-policy-engine-default=⟧ هرگز مجموعه علمی بسته انتخابی را بازنویسی نکنید. MIR یک مجموعه ایمن قابل تحقیق را بدون تغییر حفظ می کند و زمانی که Factorio نمی تواند آن مجموعه دقیق را تحقیق کند، فناوری تولید شده را حذف می کند.
mir-prototype-productivity-cap-engine-default=سقف بهره وری موجود هر دستور غذا را به حال خود رها کنید. دستور العمل‌های بدون درپوش سفارشی از محدودیت بهره‌وری +300% معمولی Factorio استفاده می‌کنند.
mir-prototype-productivity-cap-percent-25=سقف‌های بهره‌وری دستور غیر پارامتری را روی 25% تنظیم کنید. این یک کلاه اولیه سخت است.
mir-prototype-productivity-cap-percent-50=سقف های بهره وری دستور غیر پارامتری را روی 50% تنظیم کنید. این کمتر از سقف طبیعی است و باعث می‌شود تحقیقات بهره‌وری زودتر کمک نکنند.
mir-prototype-productivity-cap-percent-75=سقف‌های بهره‌وری دستور غیر پارامتری را روی 75% تنظیم کنید. این کمتر از سقف طبیعی است و باعث می‌شود تحقیقات بهره‌وری زودتر کمک نکنند.
mir-prototype-productivity-cap-percent-100=سقف‌های بهره‌وری دستور غیر پارامتری را روی 100% تنظیم کنید. این کمتر از سقف طبیعی است و باعث می‌شود تحقیقات بهره‌وری زودتر کمک نکنند.
mir-prototype-productivity-cap-percent-125=سقف‌های بهره‌وری دستور غیر پارامتری را روی 125% تنظیم کنید.
