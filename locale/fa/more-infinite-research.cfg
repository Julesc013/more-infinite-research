mir-recycling-return-chance-percent-7-5=⟧ دستور العمل‌های بازیافت مخفی تولید شده را با بازگشت مواد 7.5 درصد مقیاس کنید.
mir-recycling-return-chance-percent-5=⟧ دستور العمل های بازیافت تولید شده پنهان را با بازگشت مواد 5 درصد مقیاس کنید.
mir-recycling-return-chance-percent-2-5=⟧ دستور العمل های بازیافت تولید شده پنهان را با بازگشت مواد 2.5 درصد مقیاس کنید.
mir-recycling-return-chance-percent-1=⟧ دستور العمل های بازیافت تولید شده پنهان را تا 1% بازده مواد مقیاس دهید.
mir-recycling-return-chance-percent-0-5=⟧ دستور العمل های بازیافت تولید شده پنهان را تا 0.5 درصد بازده مواد مقیاس دهید.
mir-recycling-return-chance-percent-0-1=⟧ دستور العمل های بازیافت تولید شده پنهان را تا 0.1% بازده مواد مقیاس دهید.
mir-prototype-efficiency-cap-engine-default=محدودیت اثر مصرف انرژی هر دستگاه را به حال خود رها کنید. ماشین‌های بدون محدودیت سفارشی از کلاهک اثر مصرف انرژی -80% معمولی Factorio استفاده می‌کنند، بنابراین افکت‌ها نمی‌توانند استفاده فعال را کمتر از 20% کاهش دهند.
mir-prototype-efficiency-cap-saving-25=یک درپوش مصرف انرژی -25% بنویسید. مصرف انرژی فعال پس از اثرات مصرف انرژی در 75٪ یا بیشتر باقی می ماند.
mir-prototype-efficiency-cap-saving-50=یک سرپوش مصرف انرژی -50% بنویسید. پس از اثرات مصرف انرژی در ماشین‌های پشتیبانی شده، مصرف انرژی فعال 50% یا بیشتر باقی می‌ماند.
mir-prototype-efficiency-cap-saving-75=⟧ یک سرپوش مصرف انرژی -75% بنویسید. مصرف انرژی فعال پس از اثرات مصرف انرژی بر روی ماشین‌های پشتیبانی شده در ۲۵٪ یا بیشتر باقی می‌ماند.
mir-prototype-efficiency-cap-saving-90=یک سرپوش مصرف انرژی -90% بنویسید. مصرف انرژی فعال می تواند تا 10 درصد کاهش یابد که کمتر از کف معمولی 20 درصد است.
mir-prototype-efficiency-cap-saving-95=یک سرپوش مصرف انرژی -95% بنویسید. مصرف انرژی فعال می تواند تا 5 درصد کاهش یابد.
mir-prototype-efficiency-cap-saving-99=یک سرپوش مصرف انرژی -99% بنویسید. مصرف انرژی فعال می تواند تا 1٪ کاهش یابد.
mir-prototype-efficiency-cap-saving-999=⟧ یک سرپوش مصرف انرژی -99.9% بنویسید. مصرف انرژی فعال می تواند تا 0.1٪ کاهش یابد.
mir-prototype-efficiency-cap-saving-9999=⟧ یک سرپوش مصرف انرژی -99.99% بنویسید. این مصرف انرژی فعال نزدیک به صفر است، نه بازنویسی نمونه اولیه با توان صفر.
mir-prototype-pollution-cap-engine-default=محدودیت اثر آلودگی هر دستگاه را به حال خود رها کنید. ماشین‌های بدون محدودیت سفارشی از کلاهک طبیعی -80% اثر آلودگی فاکتوریو استفاده می‌کنند.
mir-prototype-pollution-cap-saving-25=یک درپوش آلودگی -25% بنویسید. آلودگی پس از اثرات آلودگی در 75 درصد یا بیشتر باقی می ماند.
mir-prototype-pollution-cap-saving-50=درپوش آلودگی -50% بنویسید. آلودگی پس از اثرات آلودگی بر روی ماشین های پشتیبانی شده در 50٪ یا بیشتر باقی می ماند.
mir-prototype-pollution-cap-saving-75=یک سرپوش آلودگی -75% بنویسید. پس از اثرات آلودگی بر روی ماشین‌های پشتیبانی شده، آلودگی روی 25% یا بیشتر باقی می‌ماند.
mir-prototype-pollution-cap-saving-90=یک کلاهک آلودگی -90% بنویسید. آلودگی می تواند تا 10 درصد کاهش یابد که زیر کف 20 درصد معمولی است.
mir-prototype-pollution-cap-saving-95=یک سرپوش آلودگی -95% بنویسید. آلودگی می تواند تا 5 درصد کاهش یابد.
mir-prototype-pollution-cap-saving-99=یک سرپوش آلودگی -99% بنویسید. آلودگی می تواند به 1٪ کاهش یابد.
mir-prototype-pollution-cap-saving-999=یک سرپوش آلودگی -99.9% بنویسید. آلودگی می تواند به 0.1٪ کاهش یابد.
mir-prototype-pollution-cap-saving-9999=یک سرپوش آلودگی 99.99% بنویسید. این آلودگی نزدیک به صفر است، نه یک اسکریپت آلودگی در زمان اجرا.
mir-prototype-speed-floor-engine-default=محدودیت سرعت منفی هر دستگاه را به حال خود رها کنید. ماشین‌های بدون محدودیت سفارشی از کف نرمال -80 درصد فاکتوریو استفاده می‌کنند و حداقل 20 درصد سرعت را حفظ می‌کنند.
