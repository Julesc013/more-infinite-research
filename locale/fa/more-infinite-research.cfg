[technology-description]
more-infinite-research.recipe_productivity=بهره وری دستور غذا را برای دستور العمل های انتخابی افزایش می دهد. حداکثر سقف بهره وری فاکتوریو همچنان اعمال می شود. سطوح بی نهایت اضافی ممکن است زمانی که دستور پخت به سقف خود برسد، اثر عملی نداشته باشد.
more-infinite-research.direct_effect=یک جایزه قابل تکرار بی نهایت اضافه می کند. بسته‌های علمی از آزمایشگاه‌های فعال انتخاب می‌شوند، بنابراین فناوری با مجموعه‌های مد سازگار قابل تحقیق باقی می‌ماند.
more-infinite-research.cargo_bay_unloading_distance=⟧ حداکثر فاصله بین سکوی فرود بار و سوله های تخلیه متصل را افزایش می دهد.
more-infinite-research.cargo_landing_pad_count=تعداد سکوهای فرود محموله‌ای را که هر نیرو می‌تواند در هر سطح بسازد را افزایش می‌دهد.
more-infinite-research.flamethrower_shooting_speed=سرعت تیراندازی را برای سلاح های شعله افکن و برجک های شعله افکن افزایش می دهد.
more-infinite-research.electric_shooting_speed=سرعت تیراندازی را برای سلاح های الکتریکی افزایش می دهد. در وانیل این بر دفاع ترشح تأثیر می گذارد. با عصر فضا، هنگامی که دسته مهمات تسلا در دسترس باشد، بر سلاح های تسلا نیز تأثیر می گذارد.
more-infinite-research.spoilage_preservation=⟧ اصلاح کننده زمان خراب شدن جهانی را از طریق یک افکت اسکریپت محدود افزایش می دهد. آیتم‌های فاسد شدنی موجود ممکن است مهلت‌های خراب شدن فعلی خود را تا زمانی که در بازی آزمایش شوند حفظ کنند.
more-infinite-research.agricultural_growth_speed=زمان رشد باقیمانده گیاهان برج کشاورزی تازه کاشته شده را از طریق جلوه اسکریپت محدود کوتاه می کند.
more-infinite-research.lab_productivity=با استفاده از اصلاح کننده بهره وری تحقیقات آزمایشگاهی بومی، پیشرفت تحقیقات به دست آمده از هر بسته علمی مصرفی را افزایش می دهد.

