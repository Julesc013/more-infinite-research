[mod-setting-description]
ips-require-space-gate=Khi được bật, các công nghệ này sẽ bị khóa cho đến khi khoa học vũ trụ được nghiên cứu trong vanilla hoặc khoa học về promethium được nghiên cứu trong Thời đại Không gian.
mir-science-pack-ingredient-policy=Chọn cách MIR thêm gói khoa học vào công nghệ được tạo ra. Các tùy chọn được sắp xếp từ bảo thủ đến rộng: gói mặc định, gói cuối trò chơi, gói dựa trên tiến trình, sau đó là tất cả các gói có sẵn.
mir-automatic-productivity-action=Chọn những gì MIR thực hiện với các cơ hội năng suất an toàn có trong các công thức nấu ăn đã cài đặt mod. Đã tắt không thực hiện khám phá tự động. Xem trước các thay đổi hồ sơ được chấp nhận và bỏ qua trong nhật ký Factorio mà không làm thay đổi nghiên cứu. Áp dụng các thay đổi an toàn (mặc định) chỉ thêm các công thức đủ điều kiện vào nghiên cứu MIR tương thích hiện có. Điều này kiểm soát hành động chứ không phải sức mạnh hay sự trưởng thành; các hộp kiểm tạo bên dưới là riêng biệt. Quyền sở hữu, tái chế, xác suất, chất xúc tác, khoa học, phòng thí nghiệm, điều kiện tiên quyết, mục tiêu, nhận dạng, tiến trình và kiểm tra chu kỳ luôn được áp dụng.
mir-automatic-create-research=Mặc định: tắt. Giới hạn tắt Áp dụng các thay đổi an toàn cho nghiên cứu MIR tương thích hiện có; các ứng cử viên không có luồng phù hợp sẽ bị bỏ qua và báo cáo. Bật cho phép nhà cung cấp đã đăng ký đủ điều kiện tạo ra một công nghệ năng suất vô hạn chung ổn định khi không có nghiên cứu hiện tại nào phù hợp. Hộp kiểm dữ liệu đã xem xét bên dưới sẽ quyết định xem các nhà cung cấp thử nghiệm có đủ điều kiện hay không. MIR không bao giờ tạo ra một công nghệ cho mỗi mod hoặc công thức và mọi an toàn cứng, khoa học, quyền sở hữu, nhận dạng, tiến trình và cổng chu kỳ vẫn được áp dụng.
mir-automatic-require-reviewed-data=Mặc định: bật. Điều này chỉ quan trọng khi Cho phép tạo nghiên cứu mới được bật; nó không bao giờ cản trở sự gắn kết an toàn với nghiên cứu hiện tại. Trên giấy phép, chỉ có các dòng nhà cung cấp được đánh dấu là đã được xem xét và hỗ trợ bởi bằng chứng phiên bản chính xác hiện hành, vì vậy các dòng thử nghiệm sẽ bị bỏ qua. Off cho phép các nhà cung cấp thử nghiệm đã đăng ký tạo ra từ bằng chứng cấu trúc chung. Để có hành vi thử nghiệm rộng nhất, hãy bật tạo nghiên cứu và tắt yêu cầu này. Không có giá trị nào có thể vượt qua được cổng an toàn cứng.
mir-automatic-compiler-mode=Cầu nối tương thích ẩn dành cho các cấu hình được tạo trước khi điều khiển năng suất tự động phân chia. Giá trị kế thừa không mặc định chỉ được tôn trọng trong khi tất cả các điều khiển mới vẫn ở giá trị mặc định. Thay đổi bất kỳ điều khiển mới nào để có quyền kiểm soát rõ ràng.
ips-enable-stream=Tạo ra công nghệ vô hạn được tạo ra cho __1__ khi có sẵn các công thức, hiệu ứng, điều kiện tiên quyết và gói khoa học. Tắt tính năng này để ngăn MIR tạo ra công nghệ này.
ips-cost-base-stream=Đơn vị nghiên cứu cần thiết cho cấp độ được tạo đầu tiên là __1__. Ít nhất phải bằng 1. Các mức sau này được tính từ giá trị này và hệ số tăng trưởng chi phí.
ips-cost-growth-stream=Hệ số nhân được áp dụng cho từng cấp độ sau của __1__. Sử dụng 1 cho chi phí cố định, 1,5 để tăng trưởng 50% cho mỗi cấp hoặc 2 để tăng gấp đôi chi phí.
ips-max-level-stream=Mức được tạo cao nhất cho __1__. Đặt thành 0 cho cấp độ vô hạn.
ips-research-time-stream=Giây trên mỗi đơn vị nghiên cứu cho __1__. Đặt thành 0 để sử dụng mặc định của MIR cho công nghệ này. Đây không phải là tổng thời gian nghiên cứu; tổng thời gian cũng phụ thuộc vào chi phí nghiên cứu, số lượng phòng thí nghiệm, tốc độ phòng thí nghiệm và mô-đun.
mir-enable-base-tech=Cho phép __1__ tiếp tục vượt qua giới hạn vani của nó như một công nghệ vô hạn. Hãy tắt tính năng này nếu bạn muốn MIR thêm các dòng nghiên cứu mới mà không cần mở rộng chuỗi vani này.
mir-cost-base=Đơn vị nghiên cứu cần thiết cho cấp độ tiếp tục MIR đầu tiên là __1__. Đặt thành 0 để kế thừa mô hình chi phí của chuỗi vanilla khi có thể.
mir-cost-growth=Hệ số nhân được áp dụng cho mỗi cấp độ tiếp tục MIR sau này của __1__. Đặt thành 0 để kế thừa mô hình tăng trưởng của chuỗi vanilla khi có thể.
mir-max-level=Mức tiếp tục MIR cao nhất cho __1__. Đặt thành 0 cho cấp độ vô hạn.
mir-research-time=Giây trên mỗi đơn vị nghiên cứu để tiếp tục MIR của __1__. Đặt thành 0 để kế thừa thời gian của đơn vị nghiên cứu của chuỗi vanilla khi có thể.
mir-prefer-this-mod-for-competing-techs=Khi được bật, bản mod này sẽ loại bỏ các tiện ích mở rộng vô hạn cạnh tranh đã chọn và sử dụng các phiên bản của riêng nó. Vô hiệu hóa để giữ các phiên bản cạnh tranh từ các mod khác.
mir-adjust-vanilla-weapon-speed-techs=Kiểm soát xem MIR có loại bỏ phần thưởng tốc độ tên lửa và đạn pháo khỏi việc tiếp tục tốc độ bắn vũ khí được tạo ra của nó hay không khi có phạm vi thay thế chính xác vô hạn. Công nghệ tốc độ bắn vũ khí vani hữu hạn vẫn giữ nguyên phần thưởng ban đầu.
mir-use-installed-space-age-icons=Khi được bật, MIR có thể tham chiếu các tệp biểu tượng DLC ​​chính thức đã cài đặt, bao gồm Space Age và Elevated Rails, ngay cả khi các mod đó bị tắt khi chạy trò chơi cơ bản. Hãy tắt tùy chọn này nếu các tệp DLC đó chưa được cài đặt; Factorio không thể phục hồi dễ dàng từ các tệp biểu tượng bị thiếu trong quá trình tải nguyên mẫu.
mir-pipeline-extent-multiplier=Hệ số nhân thả xuống chỉ dành cho khởi động cho các trường phạm vi đường ống của hộp chất lỏng được công nhận trên các nguyên mẫu, không chỉ các thực thể đường ống. 100% không thay đổi nguyên mẫu và không nạp đường dẫn hoặc hộp chất lỏng quét. Các giá trị không phải 100% chỉ mang tính thử nghiệm và có thể ảnh hưởng đến máy móc, thùng chứa, bộ đẩy và các nguyên mẫu đã được sửa đổi xác định hộp chất lỏng.
mir-unrestricted-modules=Mang tính thử nghiệm và phá vỡ sự cân bằng. Khi được bật, mọi công thức hiện có sẽ chấp nhận tất cả năm hiệu ứng mô-đun và mọi bộ thu mô-đun hiện có có khe cắm đều chấp nhận mọi danh mục mô-đun được phát hiện. Điều này không thêm các khe cắm mô-đun hoặc thay đổi nguyên mẫu mô-đun và có thể cho phép các vòng lặp mô-đun được sửa đổi, chất lượng và năng suất.
mir-prototype-productivity-cap=Chọn xem MIR chỉ để lại giới hạn năng suất của công thức hay ghi giới hạn khởi động cho mọi công thức không có tham số, không tái chế. +300% (không thay đổi) giữ nguyên giới hạn công thức hiện có; giá trị thấp hơn sẽ rút ngắn quy mô năng suất, trong khi giá trị cao hơn sẽ mở rộng quy mô năng suất.
mir-recycling-return-chance=Chỉ kiểm soát các công thức tái chế được tạo ẩn. Chế độ tự động giảm tỷ lệ hoàn trả nguyên liệu thông thường 25% xuống tối đa bằng 1 chia cho tổng hệ số đầu ra ở giới hạn năng suất đã chọn. Các lựa chọn cố định có tỷ lệ lợi nhuận được tạo ra tương tự một cách trực tiếp. Các quy trình hiển thị và giới hạn năng suất công thức không bao giờ thay đổi.
mir-productivity-cap-self-recycling-only=Trên 1 / lợi nhuận của người tái chế - 1, chỉ các công thức sản xuất có đường dẫn tự tái chế không tạo ra đã được chứng minh mới nhận được giới hạn cao hơn đã chọn. Tại hoặc dưới ngưỡng đó, hộp kiểm này không có hiệu lực. Động cơ không thay đổi sử dụng mức hoàn vốn thông thường là 25% làm ngưỡng +300% vừa phải mà không thay đổi công thức tái chế.
mir-prototype-efficiency-cap=Chọn mức độ hiệu quả có thể giảm mức sử dụng năng lượng đang hoạt động của máy. -80% (không thay đổi) giữ nguyên giới hạn sử dụng năng lượng hiện có. Mức giảm sâu hơn có thể đạt tới mức sử dụng năng lượng hoạt động bằng 0 mà không thay đổi giới hạn ô nhiễm.
mir-prototype-pollution-cap=Chọn mức độ tác động giảm ô nhiễm có thể giảm ô nhiễm máy. -80% (không thay đổi) giữ nguyên giới hạn ô nhiễm hiện tại. Mức giảm sâu hơn có thể đạt tới mức không ô nhiễm mà không làm thay đổi việc sử dụng năng lượng.
mir-prototype-speed-floor=Chọn mức độ hiệu ứng tốc độ tiêu cực có thể làm chậm các máy được hỗ trợ. -80% (không thay đổi) chỉ giữ nguyên các giới hạn hiện có; các giá trị sâu hơn sẽ loại bỏ mức sàn bình thường xuống mức gần như dừng ở mức -99,99%.
mir-prototype-speed-cap=Chọn xem MIR chỉ để lại giới hạn hiệu ứng tốc độ của máy hay ghi giới hạn tốc độ dương mới. +100000% (không thay đổi) duy trì các giới hạn hiện có; giá trị thấp hơn có chủ ý kẹp tiền thưởng tốc độ rất lớn.
mir-prototype-quality-cap=Chọn xem MIR chỉ để lại giới hạn hiệu ứng chất lượng của máy hay ghi giới hạn chất lượng tích cực mới. +100000% (không thay đổi) duy trì các giới hạn hiện có và không thay đổi bậc chất lượng hoặc công thức xác suất vật phẩm.
mir-prototype-positive-power-floor=Mặc định tắt. Khi được bật, MIR thay đổi các nguyên mẫu sử dụng năng lượng hoạt động 0W rõ ràng thành 1W trong khi tải nguyên mẫu để các biểu tượng cảnh báo năng lượng thấp không xuất hiện trên các thực thể cần tiêu thụ một lượng rất nhỏ khác 0. Hãy dừng lại để bảo toàn chính xác các nguyên mẫu không có công suất.
mir-settings-profile-import=Dán chuỗi hồ sơ cài đặt MIR vào đây để áp dụng các giá trị cài đặt khởi động đã xuất làm lớp ghi đè trong quá trình tạo nguyên mẫu. Để trống cho cài đặt bình thường. Xuất bằng /mir-settings-export từ một lần lưu đang hoạt động, sau đó khởi động lại sau khi thay đổi giá trị này.
mir-debug-generation-report=Khi được bật, hãy ghi một hàng nhật ký có cấu trúc cho mỗi luồng được tạo hoặc bỏ qua và tiện ích mở rộng cơ sở, bao gồm gói khoa học, điều kiện tiên quyết, số lượng hiệu ứng, trạng thái tương thích trong phòng thí nghiệm và nguồn biểu tượng.
mir-debug-recipe-matches=Khi được bật, hãy ghi tên công thức phù hợp cho từng luồng năng suất được tạo. Điều này có thể gây ồn ào trong các gói mod lớn.
mir-debug-scripted-effects=Khi được bật, ghi các mục nhật ký thời gian chạy khi các công nghệ theo kịch bản tính toán lại các hiệu ứng toàn cầu hoặc theo hướng sự kiện.
mir-lab-incompatibility-policy=Chọn những gì MIR thực hiện khi bất kỳ phòng thí nghiệm đang hoạt động nào không thể nghiên cứu các gói khoa học đã chọn.
ips-effect-per-level-stream=Đặt hiệu ứng cấp cơ sở chính cho mỗi cấp cho __1__. Các cấp độ và hiệu ứng liên quan sau này được chia tỷ lệ theo tỷ lệ. Hiệu ứng phần trăm sử dụng điểm phần trăm; hiệu ứng đếm và khoảng cách sử dụng đơn vị gốc của chúng.
mir-effect-per-level=Đặt hiệu ứng chuẩn theo từng cấp độ cho phần tiếp theo __1__ vô hạn. Các hiệu ứng liên quan được chia tỷ lệ theo tỷ lệ từ đường cơ sở vani cuối cùng. Hiệu ứng phần trăm sử dụng điểm phần trăm; hiệu ứng đếm và khoảng cách sử dụng đơn vị gốc của chúng.
mir-note-experimental-spoilage=Thử nghiệm và bị tắt theo mặc định trong v2.1.0. Đây là hiệu ứng kịch bản toàn cầu/toàn bản đồ. Hành vi ngăn xếp có thể sửa lỗi hiện tại không được xác nhận cho đến khi được xác thực theo cách thủ công.
mir-note-agriculture-growth=Áp dụng cho cây nông nghiệp dạng tháp mới trồng. Cây trồng hiện tại không được thay đổi quy mô.
mir-note-cargo-pad-count=Nghiên cứu hậu cần đặc biệt của Thời đại Không gian. Tăng số lượng bãi đáp hàng hóa trên mỗi bề mặt và có thể thay đổi đáng kể sự cân bằng hậu cần.
mir-note-inserter-capacity=Bị tắt theo mặc định. Công suất bộ chèn bổ sung có thể làm hỏng bộ chèn được điều khiển bằng mạch và giảm khả năng tối ưu hóa động cơ.
mir-note-native-owner-managed-stream=Nếu một công nghệ vô hạn được cài đặt đã sở hữu dòng nghiên cứu này thì các cài đặt khởi động tương tự này sẽ định cấu hình chủ sở hữu đó thay vì tạo một bản sao. Giá trị mặc định MIR không thay đổi sẽ bảo toàn nguyên mẫu cuối cùng của chủ sở hữu một cách chính xác. Ghi đè chi phí, thời gian, mức tối đa và hiệu ứng rõ ràng chỉ áp dụng sau khi đối sánh chủ sở hữu an toàn; việc vô hiệu hóa luồng sẽ khiến công nghệ bên ngoài không bị ảnh hưởng. Khởi động lại Factorio sau khi thay đổi cài đặt khởi động. Mức tối đa bằng 0 có nghĩa là vô hạn và giá trị hiệu ứng là điểm phần trăm trên mỗi cấp.

