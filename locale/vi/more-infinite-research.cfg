[technology-description]
more-infinite-research.recipe_productivity=Tăng năng suất công thức cho các công thức đã chọn. Giới hạn năng suất tối đa của Factorio vẫn được áp dụng; các cấp độ vô hạn bổ sung có thể không có tác dụng thực tế khi công thức đạt đến giới hạn.
more-infinite-research.direct_effect=Thêm phần thưởng có thể lặp lại vô hạn. Các gói khoa học được chọn từ các phòng thí nghiệm đang hoạt động nên công nghệ vẫn có thể nghiên cứu được với các bộ mod tương thích.
more-infinite-research.cargo_bay_unloading_distance=Tăng khoảng cách tối đa giữa bãi đáp hàng hóa và các bãi dỡ hàng được kết nối.
more-infinite-research.cargo_landing_pad_count=Tăng số lượng bãi đáp chở hàng mà mỗi lực lượng có thể xây dựng trên mỗi bề mặt.
more-infinite-research.flamethrower_shooting_speed=Tăng tốc độ bắn cho vũ khí súng phun lửa và tháp súng phun lửa.
more-infinite-research.electric_shooting_speed=Tăng tốc độ bắn cho vũ khí điện. Ở vanilla điều này ảnh hưởng đến khả năng phòng vệ phóng điện; với Thời đại Không gian, nó cũng ảnh hưởng đến vũ khí Tesla khi có sẵn loại đạn tesla.
more-infinite-research.spoilage_preservation=Tăng công cụ sửa đổi thời gian tiết lộ toàn cầu thông qua hiệu ứng có giới hạn theo kịch bản. Các vật phẩm có thể hư hỏng hiện tại có thể giữ nguyên thời hạn hư hỏng hiện tại cho đến khi được thử nghiệm trong trò chơi.
more-infinite-research.agricultural_growth_speed=Rút ngắn thời gian tăng trưởng còn lại của các cây tháp nông nghiệp mới trồng thông qua hiệu ứng có giới hạn theo kịch bản.
more-infinite-research.lab_productivity=Tăng tiến độ nghiên cứu đạt được từ mỗi gói khoa học được sử dụng, bằng cách sử dụng công cụ sửa đổi năng suất nghiên cứu trong phòng thí nghiệm gốc.

