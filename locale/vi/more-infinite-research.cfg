[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Không thực hiện khám phá, đính kèm hoặc tạo tự động. Nghiên cứu cố định của MIR vẫn không thay đổi.
mir-automatic-productivity-action-preview=Phát hiện và phân loại ứng viên, sau đó ghi các quyết định được chấp nhận và bỏ qua vào nhật ký Factorio. Nó không đính kèm công thức nấu ăn hoặc tạo ra nghiên cứu.
mir-automatic-productivity-action-apply=Mặc định. Khám phá các ứng viên và chỉ đính kèm các công thức đã được chứng minh an toàn vào nghiên cứu MIR tương thích hiện có. Nó không tự mình tạo ra nghiên cứu; hai hộp kiểm bên dưới chi phối việc tạo.
mir-automatic-compiler-mode-off=Kế thừa tương đương với Đã tắt.
mir-automatic-compiler-mode-report=Kế thừa tương đương với các thay đổi của Bản xem trước.
mir-automatic-compiler-mode-safe-attach=Kế thừa tương đương với Áp dụng các thay đổi an toàn khi tắt tính năng tạo nghiên cứu.
mir-automatic-compiler-mode-exact-pack=Kế thừa tương đương với Áp dụng các thay đổi an toàn khi kích hoạt tạo nghiên cứu và xem xét dữ liệu tương thích cần thiết.
mir-automatic-compiler-mode-safe-generate=Kế thừa tương đương với Áp dụng các thay đổi an toàn khi kích hoạt tạo nghiên cứu cho các nhà cung cấp thử nghiệm đã đăng ký.
mir-adjust-vanilla-weapon-speed-techs-off=Tắt tính năng dọn dẹp phần thưởng pháo/tên lửa chồng chéo tùy chọn của MIR.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Chỉ loại bỏ phần thưởng tên lửa/pháo chồng chéo của MIR khi công nghệ vô hạn được kích hoạt, có thể tiếp cận mang lại hiệu ứng thay thế chính xác.
mir-adjust-vanilla-weapon-speed-techs-always=Luôn loại bỏ phần thưởng tên lửa/pháo chồng chéo của MIR. Chỉ sử dụng nếu bạn muốn tách biệt nghiêm ngặt.
mir-science-pack-ingredient-policy-configured=Sử dụng các gói khoa học được cấu hình của mỗi công nghệ được tạo ra mà không cần mở rộng thành phần tùy chọn. MIR mặc định
mir-science-pack-ingredient-policy-space=Thêm khoa học vũ trụ khi có sẵn. Tăng độ khó sau tên lửa đơn giản.
mir-science-pack-ingredient-policy-space-and-promethium=Thêm không gian và khoa học promethium khi có sẵn. Tốt nhất cho các nghiên cứu về Thời đại Không gian rất muộn.
mir-science-pack-ingredient-policy-space-age-progression=Chỉ thêm các gói tiến triển Thời đại Không gian được ngụ ý bởi các gói đã chọn. Không thêm các gói mod không liên quan.
mir-science-pack-ingredient-policy-official-progression=Thêm các gói kiểu điều kiện tiên quyết chính thức còn thiếu được ngụ ý bởi gói chính thức cao cấp nhất đã được chọn.
mir-science-pack-ingredient-policy-mod-progression=Thêm các gói tương thích với phòng thí nghiệm bị thiếu được suy ra từ tiến trình gói khoa học đã được sửa đổi và mở khóa các điều kiện tiên quyết.
mir-science-pack-ingredient-policy-all-official=Sử dụng mọi gói khoa học về Thời đại Không gian và Cơ sở chính thức tồn tại trong bộ mod hiện tại.
mir-science-pack-ingredient-policy-all=Sử dụng mọi gói khoa học hiện hoạt tương thích với phòng thí nghiệm, bao gồm cả gói khoa học đã được sửa đổi.
mir-lab-incompatibility-policy-reduce=Duy trì công nghệ bằng cách giảm các gói khoa học xuống còn bộ lớn nhất được phòng thí nghiệm đang hoạt động chấp nhận. Mặc định an toàn nhất cho gói mod.
mir-lab-incompatibility-policy-skip=Bỏ qua công nghệ nếu không có phòng thí nghiệm đang hoạt động nào có thể nghiên cứu bộ gói khoa học đã chọn của mình. Kiểm tra chặt chẽ và dễ dàng hơn.
mir-lab-incompatibility-policy-engine-default=Không bao giờ viết lại bộ gói khoa học đã chọn. MIR giữ nguyên bộ có thể nghiên cứu một cách an toàn và bỏ qua công nghệ được tạo khi Factorio không thể nghiên cứu bộ chính xác đó.
mir-prototype-productivity-cap-engine-default=Để nguyên giới hạn năng suất hiện có của mỗi công thức. Các công thức nấu ăn không có giới hạn tùy chỉnh sẽ sử dụng giới hạn thưởng năng suất +300% thông thường của Factorio.
mir-prototype-productivity-cap-percent-25=Đặt giới hạn năng suất của công thức không có tham số thành +25%. Đây là giới hạn sớm nghiêm ngặt.
mir-prototype-productivity-cap-percent-50=Đặt giới hạn năng suất của công thức không có tham số thành +50%. Mức này thấp hơn giới hạn bình thường và khiến nghiên cứu về năng suất ngừng hỗ trợ sớm hơn.
mir-prototype-productivity-cap-percent-75=Đặt giới hạn năng suất của công thức không có tham số thành +75%. Mức này thấp hơn giới hạn bình thường và khiến nghiên cứu về năng suất ngừng hỗ trợ sớm hơn.
mir-prototype-productivity-cap-percent-100=Đặt giới hạn năng suất của công thức không có tham số thành +100%. Mức này thấp hơn giới hạn bình thường và khiến nghiên cứu về năng suất ngừng hỗ trợ sớm hơn.
mir-prototype-productivity-cap-percent-125=Đặt giới hạn năng suất của công thức không có tham số thành +125%.
mir-prototype-productivity-cap-percent-150=Đặt giới hạn năng suất của công thức không có tham số thành +150%.
mir-prototype-productivity-cap-percent-200=Đặt giới hạn năng suất của công thức không có tham số thành +200%. Mức này thấp hơn giới hạn bình thường và khiến nghiên cứu về năng suất ngừng hỗ trợ sớm hơn.
mir-prototype-productivity-cap-percent-250=Đặt giới hạn năng suất của công thức không có tham số thành +250%. Đây là mức thấp hơn một chút so với giới hạn bình thường.
mir-prototype-productivity-cap-percent-400=Đặt giới hạn năng suất của công thức không có tham số thành +400%. Điều này mở rộng quy mô năng suất vượt quá giới hạn thông thường.
mir-prototype-productivity-cap-percent-500=Đặt giới hạn năng suất của công thức không có tham số thành +500%. Điều này mở rộng quy mô năng suất vượt quá giới hạn thông thường.
mir-prototype-productivity-cap-percent-750=Đặt giới hạn năng suất của công thức không có tham số thành +750%.
mir-prototype-productivity-cap-percent-1000=Đặt giới hạn năng suất của công thức không có tham số thành +1000%. Sử dụng để lưu lâu dài khi nghiên cứu về năng suất vẫn là vấn đề quan trọng.
mir-prototype-productivity-cap-percent-2500=Đặt giới hạn năng suất của công thức không có tham số thành +2500%. Sử dụng để tiết kiệm rất lâu.
mir-prototype-productivity-cap-percent-5000=Đặt giới hạn năng suất của công thức không có tham số thành +5000%.
mir-prototype-productivity-cap-percent-10000=Đặt giới hạn năng suất của công thức không có tham số thành +10000%. Chỉ sử dụng cho việc mở rộng quy mô trong thời gian dài.
mir-prototype-productivity-cap-percent-25000=Đặt giới hạn năng suất của công thức không có tham số thành +25000%. Chỉ sử dụng cho việc mở rộng quy mô trong thời gian dài.
mir-prototype-productivity-cap-percent-100000=Đặt giới hạn năng suất của công thức không có tham số thành +100000%. Điều này thực sự không được khai thác cho hầu hết các lần lưu.
mir-recycling-return-chance-engine-default=Giữ nguyên mọi công thức tái chế.
mir-recycling-return-chance-match-productivity-cap=Giảm thiểu tự động an toàn khi khai thác đối với các công thức tái chế được tạo ẩn. Sử dụng 1 / (1 + tiền thưởng năng suất), giới hạn ở mức hoàn vốn thông thường là 25%: +400% trở thành 20% và +1000% trở thành khoảng 9,09%.
mir-recycling-return-chance-percent-25=Giữ kín các công thức tái chế được tạo ra với mức hoàn trả nguyên liệu thông thường là 25%.
mir-recycling-return-chance-percent-20=Điều chỉnh quy mô các công thức tái chế được tạo ẩn thành 20% lợi nhuận nguyên liệu.
mir-recycling-return-chance-percent-15=Chia tỷ lệ các công thức tái chế được tạo ẩn thành 15% lợi nhuận nguyên liệu.
mir-recycling-return-chance-percent-12-5=Chia tỷ lệ các công thức tái chế được tạo ẩn thành lợi nhuận nguyên liệu 12,5%.
mir-recycling-return-chance-percent-10=Chia tỷ lệ các công thức tái chế được tạo ẩn thành 10% lợi nhuận nguyên liệu.
mir-recycling-return-chance-percent-7-5=Chia tỷ lệ các công thức tái chế được tạo ẩn thành tỷ lệ hoàn trả nguyên liệu là 7,5%.
mir-recycling-return-chance-percent-5=Chia tỷ lệ các công thức tái chế được tạo ẩn thành 5% lợi nhuận nguyên liệu.
mir-recycling-return-chance-percent-2-5=Chia tỷ lệ các công thức tái chế được tạo ẩn thành tỷ lệ hoàn trả nguyên liệu là 2,5%.
mir-recycling-return-chance-percent-1=Chia tỷ lệ các công thức tái chế được tạo ẩn thành tỷ lệ hoàn trả nguyên liệu là 1%.
mir-recycling-return-chance-percent-0-5=Chia tỷ lệ các công thức tái chế được tạo ẩn thành tỷ lệ hoàn trả nguyên liệu là 0,5%.
mir-recycling-return-chance-percent-0-1=Chia tỷ lệ các công thức tái chế được tạo ẩn thành tỷ lệ hoàn trả nguyên liệu là 0,1%.
mir-prototype-efficiency-cap-engine-default=Giữ nguyên giới hạn hiệu ứng sử dụng năng lượng của mỗi máy. Các máy không có giới hạn tùy chỉnh sẽ sử dụng giới hạn hiệu ứng sử dụng năng lượng -80% thông thường của Factorio, do đó các hiệu ứng không thể giảm mức sử dụng hoạt động xuống dưới 20%.
mir-prototype-efficiency-cap-saving-25=Viết giới hạn sử dụng năng lượng -25%. Mức sử dụng năng lượng tích cực duy trì ở mức 75% trở lên sau khi sử dụng năng lượng.
mir-prototype-efficiency-cap-saving-50=Viết giới hạn sử dụng năng lượng -50%. Mức sử dụng năng lượng hoạt động duy trì ở mức 50% trở lên sau khi có hiệu ứng sử dụng năng lượng trên các máy được hỗ trợ.
mir-prototype-efficiency-cap-saving-75=Viết giới hạn sử dụng năng lượng -75%. Mức sử dụng năng lượng hoạt động duy trì ở mức 25% trở lên sau khi có hiệu ứng sử dụng năng lượng trên các máy được hỗ trợ.
mir-prototype-efficiency-cap-saving-90=Viết giới hạn sử dụng năng lượng -90%. Việc sử dụng năng lượng tích cực có thể giảm xuống 10%, thấp hơn mức sàn 20% thông thường.
mir-prototype-efficiency-cap-saving-95=Viết giới hạn sử dụng năng lượng -95%. Việc sử dụng năng lượng tích cực có thể giảm xuống 5%.
mir-prototype-efficiency-cap-saving-99=Viết giới hạn sử dụng năng lượng -99%. Việc sử dụng năng lượng tích cực có thể giảm xuống 1%.
mir-prototype-efficiency-cap-saving-999=Viết giới hạn sử dụng năng lượng -99,9%. Việc sử dụng năng lượng tích cực có thể giảm xuống 0,1%.
mir-prototype-efficiency-cap-saving-9999=Viết giới hạn sử dụng năng lượng -99,99%. Đây là mức sử dụng năng lượng hoạt động gần như bằng 0, không phải là viết lại nguyên mẫu không có năng lượng.
mir-prototype-pollution-cap-engine-default=Để nguyên giới hạn ảnh hưởng ô nhiễm của mỗi máy. Các máy không có giới hạn tùy chỉnh sẽ sử dụng giới hạn hiệu ứng ô nhiễm -80% thông thường của Factorio.
mir-prototype-pollution-cap-saving-25=Viết giới hạn ô nhiễm -25%. Ô nhiễm duy trì ở mức 75% hoặc hơn sau khi bị ảnh hưởng bởi ô nhiễm.
mir-prototype-pollution-cap-saving-50=Viết giới hạn ô nhiễm -50%. Ô nhiễm duy trì ở mức 50% trở lên sau khi ô nhiễm ảnh hưởng đến các máy được hỗ trợ.
mir-prototype-pollution-cap-saving-75=Viết giới hạn ô nhiễm -75%. Ô nhiễm duy trì ở mức 25% trở lên sau khi ô nhiễm ảnh hưởng đến các máy được hỗ trợ.
mir-prototype-pollution-cap-saving-90=Viết giới hạn ô nhiễm -90%. Ô nhiễm có thể giảm xuống 10%, thấp hơn mức sàn 20% thông thường.
mir-prototype-pollution-cap-saving-95=Viết giới hạn ô nhiễm -95%. Ô nhiễm có thể giảm xuống 5%.
mir-prototype-pollution-cap-saving-99=Viết giới hạn ô nhiễm -99%. Ô nhiễm có thể giảm xuống 1%.
mir-prototype-pollution-cap-saving-999=Viết giới hạn ô nhiễm -99,9%. Ô nhiễm có thể giảm xuống 0,1%.
mir-prototype-pollution-cap-saving-9999=Viết giới hạn ô nhiễm -99,99%. Đây là mức ô nhiễm gần như bằng 0, không phải là tập lệnh gây ô nhiễm trong thời gian chạy.
mir-prototype-speed-floor-engine-default=Để nguyên giới hạn tốc độ âm của mỗi máy. Các máy không có giới hạn tùy chỉnh sẽ sử dụng mức sàn -80% thông thường của Factorio và giữ tốc độ ít nhất 20%.
mir-prototype-speed-floor-saving-25=Kiểm soát hiệu ứng tốc độ âm ở mức -25%, để lại tốc độ ít nhất 75%.
mir-prototype-speed-floor-saving-50=Giữ các hiệu ứng tốc độ âm ở mức -50%, để lại tốc độ ít nhất 50%.
mir-prototype-speed-floor-saving-75=Kiểm soát hiệu ứng tốc độ âm ở mức -75%, để lại tốc độ ít nhất 25%.
mir-prototype-speed-floor-saving-90=Cho phép hiệu ứng tốc độ âm giảm xuống -90%, để lại tốc độ ít nhất 10%.
mir-prototype-speed-floor-saving-95=Cho phép hiệu ứng tốc độ âm giảm xuống -95%, để lại tốc độ ít nhất 5%.
mir-prototype-speed-floor-saving-99=Cho phép hiệu ứng tốc độ âm giảm xuống -99%, để lại tốc độ ít nhất 1%.
mir-prototype-speed-floor-saving-999=Cho phép hiệu ứng tốc độ âm giảm xuống -99,9%, để lại tốc độ ít nhất 0,1%.
mir-prototype-speed-floor-saving-9999=Cho phép hiệu ứng tốc độ âm giảm xuống -99,99%, giới hạn nguyên mẫu Factorio thấp nhất. Đây là tốc độ chế tạo gần như dừng lại, không phải bằng 0 hoặc âm.
mir-prototype-speed-cap-engine-default=Để nguyên giới hạn tốc độ của mỗi máy. Các máy không có giới hạn tùy chỉnh sẽ sử dụng trần hiệu ứng tốc độ +100000% rất cao của Factorio.
mir-prototype-speed-cap-bonus-25=Kiểm soát hiệu ứng tốc độ tích cực ở mức +25%.
mir-prototype-speed-cap-bonus-50=Kiểm soát hiệu ứng tốc độ tích cực ở mức +50%. Sử dụng điều này để giữ cho phần thưởng tốc độ được giới hạn chặt chẽ.
