[technology-description]
more-infinite-research.recipe_productivity=Αυξάνει την παραγωγικότητα της συνταγής για τις επιλεγμένες συνταγές. Το ανώτατο όριο παραγωγικότητας της Factorio εξακολουθεί να ισχύει. Πρόσθετα άπειρα επίπεδα μπορεί να μην έχουν πρακτικό αποτέλεσμα όταν μια συνταγή φτάσει στο όριο.
more-infinite-research.direct_effect=Προσθέτει ένα άπειρο επαναλαμβανόμενο μπόνους. Τα επιστημονικά πακέτα επιλέγονται από ενεργά εργαστήρια, ώστε η τεχνολογία να παραμένει ερευνήσιμη με συμβατά σετ mod.
more-infinite-research.cargo_bay_unloading_distance=Αυξάνει τη μέγιστη απόσταση μεταξύ μιας βάσης προσγείωσης φορτίου και των συνδεδεμένων θέσεων εκφόρτωσης.
more-infinite-research.cargo_landing_pad_count=Αυξάνει τον αριθμό των επιφανειών προσγείωσης φορτίου που μπορεί να δημιουργήσει κάθε δύναμη ανά επιφάνεια.
more-infinite-research.flamethrower_shooting_speed=Αυξάνει την ταχύτητα βολής για φλογοβόλα όπλα και πυργίσκους φλογοβόλων.
more-infinite-research.electric_shooting_speed=Αυξάνει την ταχύτητα βολής για ηλεκτρικά όπλα. Στη βανίλια αυτό επηρεάζει την άμυνα των εκκρίσεων. με το Space Age επηρεάζει επίσης τα όπλα Tesla όταν είναι διαθέσιμη η κατηγορία πυρομαχικών tesla.
more-infinite-research.spoilage_preservation=Αυξάνει τον γενικό τροποποιητή χρόνου αλλοίωσης μέσω ενός εφέ περιορισμένου σεναρίου. Τα υπάρχοντα αντικείμενα που μπορούν να αλλοιωθούν ενδέχεται να διατηρούν τις τρέχουσες προθεσμίες τους μέχρι να δοκιμαστούν στο παιχνίδι.
more-infinite-research.agricultural_growth_speed=Μειώνει τον υπολειπόμενο χρόνο ανάπτυξης για νεοφυτεμένες γεωργικές εγκαταστάσεις πύργων μέσω ενός οριοθετημένου εφέ σεναρίου.
more-infinite-research.lab_productivity=Αυξάνει την ερευνητική πρόοδο που επιτυγχάνεται από κάθε επιστημονικό πακέτο που καταναλώνεται, χρησιμοποιώντας τον εγγενή τροποποιητή παραγωγικότητας της έρευνας εργαστηρίου.

