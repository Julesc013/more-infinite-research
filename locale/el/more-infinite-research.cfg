[mod-setting-description]
ips-require-space-gate=Όταν είναι ενεργοποιημένες, αυτές οι τεχνολογίες παραμένουν κλειδωμένες μέχρι να ερευνηθεί η διαστημική επιστήμη σε βανίλια ή η επιστήμη του προμεθίου να ερευνηθεί στην εποχή του Διαστήματος.
mir-science-pack-ingredient-policy=Επιλέγει πώς το MIR προσθέτει επιστημονικά πακέτα σε τεχνολογίες που δημιουργούνται. Οι επιλογές ταξινομούνται από συντηρητικές σε ευρείες: προεπιλεγμένα πακέτα, πακέτα late-game, πακέτα με βάση την εξέλιξη και μετά όλα τα διαθέσιμα πακέτα.
mir-automatic-productivity-action=Επιλέγει τι κάνει το MIR με τις ασφαλείς ευκαιρίες παραγωγικότητας που βρίσκονται σε συνταγές εγκατεστημένων μοντ. Το Disabled δεν εκτελεί αυτόματη ανακάλυψη. Προεπισκόπηση αλλαγών εγγραφών που έγιναν δεκτές και παραλείφθηκαν υποψήφιοι στο αρχείο καταγραφής του Factorio χωρίς να αλλάξετε την έρευνα. Εφαρμογή ασφαλών αλλαγών (προεπιλογή) προσθέτει κατάλληλες συνταγές μόνο σε συμβατές υπάρχουσες έρευνες MIR. Αυτό ελέγχει τη δράση, όχι τη δύναμη ή την ωριμότητα. τα παρακάτω πλαίσια ελέγχου δημιουργίας είναι ξεχωριστά. Οι έλεγχοι ιδιοκτησίας, ανακύκλωσης, πιθανότητας, καταλύτης, επιστήμης, εργαστηρίου, προαπαιτούμενος, στόχος, ταυτότητας, εξέλιξης και κύκλου ισχύουν πάντα.
mir-automatic-create-research=Προεπιλογή: απενεργοποιημένο. Εκτός ορίων Εφαρμογή ασφαλών αλλαγών σε συμβατή υπάρχουσα έρευνα MIR. οι υποψήφιοι χωρίς κατάλληλη ροή παραλείπονται και αναφέρονται. Το On επιτρέπει σε έναν επιλέξιμο εγγεγραμμένο πάροχο να δημιουργήσει μια σταθερή γενική τεχνολογία άπειρης παραγωγικότητας όταν δεν ταιριάζει καμία υπάρχουσα έρευνα. Το παρακάτω πλαίσιο ελέγχου αναθεωρημένων δεδομένων αποφασίζει εάν οι πειραματικοί πάροχοι είναι κατάλληλοι. Το MIR δεν δημιουργεί ποτέ μία τεχνολογία ανά mod ή συνταγή, και κάθε σκληρή ασφάλεια, επιστήμη, ιδιοκτησία, ταυτότητα, εξέλιξη και πύλη κύκλου εξακολουθεί να ισχύει.
mir-automatic-require-reviewed-data=Προεπιλογή: ενεργό. Αυτό έχει σημασία μόνο όταν είναι ενεργοποιημένη η επιλογή Να επιτρέπεται η δημιουργία νέας έρευνας. ποτέ δεν εμποδίζει την ασφαλή προσκόλληση στην υπάρχουσα έρευνα. Στις άδειες μόνο οι οικογένειες παρόχων επισημαίνονται ως αναθεωρημένες και υποστηρίζονται από τα ισχύοντα στοιχεία ακριβούς έκδοσης, επομένως οι πειραματικές οικογένειες παραλείπονται. Το Off επιτρέπει στους εγγεγραμμένους πειραματικούς παρόχους να δημιουργούν από γενικά δομικά στοιχεία. Για την ευρύτερη πειραματική συμπεριφορά, ενεργοποιήστε τη δημιουργία έρευνας και απενεργοποιήστε αυτήν την απαίτηση. Καμία τιμή δεν μπορεί να παρακάμψει μια σκληρή πύλη ασφαλείας.
mir-automatic-compiler-mode=Κρυφή γέφυρα συμβατότητας για προφίλ που δημιουργήθηκαν πριν από τον διαχωρισμό των αυτόματων ελέγχων παραγωγικότητας. Μια μη προεπιλεγμένη τιμή παλαιού τύπου τιμάται μόνο όταν όλα τα νέα στοιχεία ελέγχου παραμένουν στις προεπιλογές τους. Αλλάξτε οποιοδήποτε νέο στοιχείο ελέγχου για να αναλάβετε ρητό έλεγχο.
ips-enable-stream=Δημιουργεί την άπειρη τεχνολογία που δημιουργείται για το __1__ όταν είναι διαθέσιμες οι συνταγές, τα εφέ, οι προϋποθέσεις και τα επιστημονικά πακέτα του. Απενεργοποιήστε το για να αποτρέψετε τη δημιουργία αυτής της τεχνολογίας από το MIR.
ips-cost-base-stream=Απαιτούνται ερευνητικές μονάδες για το πρώτο παραγόμενο επίπεδο __1__. Πρέπει να είναι τουλάχιστον 1. Τα μεταγενέστερα επίπεδα υπολογίζονται από αυτήν την τιμή και τον παράγοντα αύξησης κόστους.
ips-cost-growth-stream=Εφαρμόστηκε πολλαπλασιαστής σε κάθε μεταγενέστερο επίπεδο __1__. Χρησιμοποιήστε 1 για σταθερό κόστος, 1,5 για αύξηση 50% ανά επίπεδο ή 2 για διπλασιασμό του κόστους.
ips-max-level-stream=Το υψηλότερο επίπεδο παραγωγής για το __1__. Ρυθμίστε στο 0 για άπειρα επίπεδα.
ips-research-time-stream=Δευτερόλεπτα ανά ερευνητική μονάδα για __1__. Ορίστε στο 0 για να χρησιμοποιήσετε την προεπιλογή του MIR για αυτήν την τεχνολογία. Αυτός δεν είναι ο συνολικός χρόνος έρευνας. Ο συνολικός χρόνος εξαρτάται επίσης από το κόστος έρευνας, τον αριθμό εργαστηρίου, την ταχύτητα του εργαστηρίου και τις ενότητες.
mir-enable-base-tech=Επιτρέπει στο __1__ να συνεχίσει να ξεπερνά το καπάκι βανίλιας ως άπειρη τεχνολογία. Απενεργοποιήστε το εάν θέλετε το MIR να προσθέσει νέες ερευνητικές γραμμές χωρίς να επεκτείνει αυτήν την αλυσίδα βανίλιας.
mir-cost-base=Απαιτούνται ερευνητικές μονάδες για το πρώτο επίπεδο συνέχειας MIR του __1__. Ορίστε στο 0 για να κληρονομήσετε το μοτίβο κόστους της αλυσίδας βανίλιας όταν είναι δυνατόν.
mir-cost-growth=Εφαρμόστηκε πολλαπλασιαστής σε κάθε μεταγενέστερο επίπεδο συνέχισης MIR __1__. Ορίστε στο 0 για να κληρονομήσετε το μοτίβο ανάπτυξης της αλυσίδας της βανίλιας όταν είναι δυνατόν.
mir-max-level=Υψηλότερο επίπεδο συνέχισης MIR για __1__. Ρυθμίστε στο 0 για άπειρα επίπεδα.
mir-research-time=Δευτερόλεπτα ανά ερευνητική μονάδα για τη συνέχιση του MIR του __1__. Ορίστε στο 0 για να κληρονομήσετε τον χρόνο της μονάδας έρευνας της αλυσίδας βανίλιας, όταν είναι δυνατόν.
mir-prefer-this-mod-for-competing-techs=Όταν είναι ενεργοποιημένο, αυτό το mod καταργεί επιλεγμένες ανταγωνιστικές άπειρες επεκτάσεις και χρησιμοποιεί τις δικές του εκδόσεις. Απενεργοποιήστε για να διατηρήσετε τις ανταγωνιστικές εκδόσεις από άλλα mods.
mir-adjust-vanilla-weapon-speed-techs=Ελέγχει εάν το MIR αφαιρεί τα μπόνους ταχύτητας πυραύλων και κανονιού από τη συνέχιση της ταχύτητας βολής που δημιουργείται όταν είναι διαθέσιμη ακριβής άπειρη κάλυψη αντικατάστασης. Οι πεπερασμένες τεχνολογίες ταχύτητας βολής με όπλα βανίλιας διατηρούν τα αρχικά τους μπόνους.
mir-use-installed-space-age-icons=Όταν είναι ενεργοποιημένο, το MIR μπορεί να παραπέμπει σε εγκατεστημένα επίσημα αρχεία εικονιδίων DLC, συμπεριλαμβανομένων των Space Age και Eleved Rails, ακόμη και όταν αυτά τα mod είναι απενεργοποιημένα για μια εκτέλεση βασικού παιχνιδιού. Αφήστε αυτό να απενεργοποιηθεί εάν αυτά τα αρχεία DLC δεν είναι εγκατεστημένα. Το Factorio δεν μπορεί να ανακτήσει με χάρη από τα αρχεία εικονιδίων που λείπουν κατά τη φόρτωση του πρωτοτύπου.
mir-pipeline-extent-multiplier=Αναπτυσσόμενος πολλαπλασιαστής μόνο για εκκίνηση για αναγνωρισμένα πεδία έκτασης σωλήνων κιβωτίων υγρών σε πρωτότυπα, όχι μόνο σε οντότητες σωλήνων. Το 100% αφήνει τα πρωτότυπα αμετάβλητα και δεν φορτώνει το πέρασμα του αγωγού ούτε σαρώνει κουτιά υγρών. Οι τιμές που δεν είναι 100% είναι πειραματικές και μπορούν να επηρεάσουν μηχανές, δεξαμενές, προωθητές και τροποποιημένα πρωτότυπα που ορίζουν κουτιά υγρών.
mir-unrestricted-modules=Πειραματικό και εξισορροπητικό. Όταν είναι ενεργοποιημένη, κάθε υπάρχουσα συνταγή δέχεται και τα πέντε εφέ μονάδας και κάθε υπάρχων δέκτης μονάδας με υποδοχές δέχεται κάθε κατηγορία λειτουργικών μονάδων που ανακαλύφθηκαν. Αυτό δεν προσθέτει υποδοχές λειτουργιών ή αλλάζει πρωτότυπα μονάδων και ενδέχεται να ενεργοποιήσει βρόχους παραγωγικότητας, ποιότητας και τροποποιημένων μονάδων.
mir-prototype-productivity-cap=Επιλέγει εάν το MIR αφήνει μόνο τα όρια παραγωγικότητας συνταγών ή γράφει ένα όριο εκκίνησης σε κάθε συνταγή που δεν είναι παραμετρική και δεν ανακυκλώνεται. +300% (αμετάβλητο) διατηρεί τα υπάρχοντα καπάκια συνταγής. Οι χαμηλότερες τιμές συντομεύουν την κλιμάκωση της παραγωγικότητας, ενώ οι υψηλότερες τιμές την επεκτείνουν.
mir-recycling-return-chance=Ελέγχει μόνο κρυφές συνταγές ανακύκλωσης που δημιουργούνται. Η αυτόματη λειτουργία μειώνει την κανονική επιστροφή υλικού 25% στο μέγιστο 1 διαιρούμενο με τον πολλαπλασιαστή συνολικής απόδοσης στο επιλεγμένο όριο παραγωγικότητας. Οι σταθερές επιλογές κλιμακώνουν απευθείας τις ίδιες δημιουργούμενες αποδόσεις. Οι ορατές διαδικασίες και τα όρια παραγωγικότητας της συνταγής δεν αλλάζουν ποτέ.
mir-productivity-cap-self-recycling-only=Πάνω από 1 / επιστροφή ανακυκλωτή - 1, μόνο οι συνταγές παραγωγής με αποδεδειγμένη μη παραγωγική διαδρομή αυτο-ανακύκλωσης λαμβάνουν το επιλεγμένο υψηλότερο όριο. Σε ή κάτω από αυτό το όριο αυτό το πλαίσιο ελέγχου δεν έχει καμία επίδραση. Ο κινητήρας αμετάβλητος χρησιμοποιεί την κανονική απόδοση 25% ως συντηρητικό όριο +300% χωρίς να αλλάξει τις συνταγές ανακύκλωσης.
mir-prototype-efficiency-cap=Επιλέγει πόσο μακριά τα αποτελέσματα απόδοσης μπορούν να μειώσουν τη χρήση ενεργού ενέργειας του μηχανήματος. -80% (αμετάβλητο) αφήνει μόνο τα υπάρχοντα όρια χρήσης ενέργειας. Οι βαθύτερες μειώσεις μπορούν να προσεγγίσουν τη μηδενική χρήση ενεργού ενέργειας χωρίς να αλλάξουν τα όρια ρύπανσης.
mir-prototype-pollution-cap=Επιλέγει πόσο μακριά τα αποτελέσματα μείωσης της ρύπανσης μπορούν να μειώσουν τη ρύπανση του μηχανήματος. -80% (αμετάβλητο) αφήνει μόνο τα υπάρχοντα όρια ρύπανσης. Οι βαθύτερες μειώσεις μπορούν να προσεγγίσουν τη μηδενική ρύπανση χωρίς αλλαγή της χρήσης ενέργειας.
mir-prototype-speed-floor=Επιλέγει πόσο μακριά τα αρνητικά αποτελέσματα ταχύτητας μπορούν να επιβραδύνουν τα υποστηριζόμενα μηχανήματα. -80% (αμετάβλητο) αφήνει μόνο τα υπάρχοντα όρια. βαθύτερες τιμές αφαιρούν το κανονικό δάπεδο σε μια σχεδόν στάση στο -99,99%.
mir-prototype-speed-cap=Επιλέγει εάν το MIR αφήνει μόνο τα όρια ταχύτητας του μηχανήματος ή θα γράφει ένα νέο θετικό όριο ταχύτητας. +100000% (αμετάβλητο) διατηρεί τα υπάρχοντα όρια. χαμηλότερες τιμές σκοπίμως σφίγγουν πολύ μεγάλα μπόνους ταχύτητας.
mir-prototype-quality-cap=Επιλέγει εάν το MIR αφήνει μόνο τα όρια ποιότητας-αποτέλεσης του μηχανήματος ή γράφει ένα νέο όριο θετικής ποιότητας. Το +100000% (αμετάβλητο) διατηρεί τα υπάρχοντα όρια και δεν αλλάζει τα επίπεδα ποιότητας ή τους τύπους πιθανοτήτων αντικειμένων.
mir-prototype-positive-power-floor=Απενεργοποίηση προεπιλογής. Όταν είναι ενεργοποιημένο, το MIR αλλάζει τα ρητά πρωτότυπα ενεργής χρήσης ενέργειας 0W σε 1W κατά τη φόρτωση του πρωτοτύπου, έτσι ώστε τα εικονίδια προειδοποίησης χαμηλής κατανάλωσης να μην εμφανίζονται σε οντότητες που θα πρέπει να αντλούν μια μικρή μη μηδενική ποσότητα. Αφήστε το για να διατηρήσετε ακριβώς τα πρωτότυπα μηδενικής ισχύος.
mir-settings-profile-import=Επικολλήστε εδώ μια συμβολοσειρά προφίλ ρυθμίσεων MIR για να εφαρμόσετε εξαγόμενες τιμές ρυθμίσεων εκκίνησης ως στρώμα παράκαμψης κατά τη δημιουργία πρωτοτύπου. Αφήστε κενό για κανονικές ρυθμίσεις. Εξαγωγή με /mir-settings-export από μια ενεργή αποθήκευση και, στη συνέχεια, επανεκκίνηση μετά την αλλαγή αυτής της τιμής.
mir-debug-generation-report=Όταν είναι ενεργοποιημένο, γράφει μία δομημένη σειρά καταγραφής ανά δημιουργημένη ή παράλειψη ροής και επέκτασης βάσης, συμπεριλαμβανομένων των επιστημονικών πακέτων, των προαπαιτούμενων, του πλήθους εφέ, της κατάστασης συμβατότητας εργαστηρίου και της πηγής εικονιδίων.
mir-debug-recipe-matches=Όταν είναι ενεργοποιημένο, γράφει αντιστοιχισμένα ονόματα συνταγών για κάθε ροή παραγωγικότητας που δημιουργείται. Αυτό μπορεί να είναι θορυβώδες σε μεγάλα πακέτα mod.
mir-debug-scripted-effects=Όταν είναι ενεργοποιημένο, εγγράφει καταχωρήσεις αρχείου καταγραφής χρόνου εκτέλεσης όταν οι τεχνολογίες με σενάριο υπολογίζουν εκ νέου καθολικά εφέ ή εφέ που βασίζονται σε συμβάντα.
mir-lab-incompatibility-policy=Επιλέγει τι κάνει το MIR όταν τα επιλεγμένα επιστημονικά πακέτα δεν μπορούν να ερευνηθούν από κανένα ενεργό εργαστήριο.
ips-effect-per-level-stream=Ορίζει το πρωτεύον εφέ βασικής βαθμίδας ανά επίπεδο για το __1__. Τα σχετικά μεταγενέστερα επίπεδα και τα εφέ κλιμακώνονται αναλογικά. Οι ποσοστιαίες επιδράσεις χρησιμοποιούν ποσοστιαίες μονάδες. Τα εφέ μέτρησης και απόστασης χρησιμοποιούν τις εγγενείς μονάδες τους.
mir-effect-per-level=Ορίζει το κανονικό εφέ ανά επίπεδο για την άπειρη συνέχεια __1__. Τα σχετικά αποτελέσματα κλιμακώνονται αναλογικά από την τελική βασική γραμμή βανίλιας. Οι ποσοστιαίες επιδράσεις χρησιμοποιούν ποσοστιαίες μονάδες. Τα εφέ μέτρησης και απόστασης χρησιμοποιούν τις εγγενείς μονάδες τους.
mir-note-experimental-spoilage=Πειραματικό και απενεργοποιημένο από προεπιλογή στην έκδοση 2.1.0. Αυτό είναι ένα εφέ δέσμης ενεργειών σε όλο τον χάρτη. Η υπάρχουσα συμπεριφορά στοίβας που μπορεί να αλλοιωθεί δεν διεκδικείται μέχρι να επικυρωθεί με μη αυτόματο τρόπο.
mir-note-agriculture-growth=Ισχύει για νεοφυτεμένες καλλιέργειες γεωργικών πύργων. Οι υπάρχουσες φυτεμένες καλλιέργειες δεν επανακλιμακώνονται.
mir-note-cargo-pad-count=Έρευνα logistics Special Space Age. Αυξάνει τις επιφάνειες προσγείωσης φορτίου ανά επιφάνεια και μπορεί να αλλάξει ουσιαστικά την ισορροπία της εφοδιαστικής.
mir-note-inserter-capacity=Απενεργοποιημένο από προεπιλογή. Η πρόσθετη χωρητικότητα του εισαγωγέα μπορεί να σπάσει τα ελεγχόμενα κυκλώματα εισαγωγής και να μειώσει τις βελτιστοποιήσεις του κινητήρα.
mir-note-native-owner-managed-stream=Εάν μια εγκατεστημένη άπειρη τεχνολογία κατέχει ήδη αυτήν την ερευνητική οικογένεια, αυτές οι ίδιες ρυθμίσεις εκκίνησης διαμορφώνουν αυτόν τον κάτοχο αντί να δημιουργήσουν ένα αντίγραφο. Οι αμετάβλητες προεπιλογές MIR διατηρούν ακριβώς το τελικό πρωτότυπο του ιδιοκτήτη. Οι ρητές παρακάμψεις κόστους, χρόνου, μέγιστου επιπέδου και εφέ ισχύουν μόνο μετά από ασφαλή αντιστοίχιση κατόχου. Η απενεργοποίηση της ροής αφήνει ανέγγιχτη την εξωτερική τεχνολογία. Επανεκκινήστε το Factorio αφού αλλάξετε τις ρυθμίσεις εκκίνησης. Ένα μέγιστο επίπεδο 0 σημαίνει άπειρο και οι τιμές εφέ είναι ποσοστιαίες μονάδες ανά επίπεδο.

