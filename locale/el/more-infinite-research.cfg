[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Δεν εκτελεί αυτόματη ανακάλυψη, επισύναψη ή δημιουργία. Η σταθερή έρευνα του MIR παραμένει αμετάβλητη.
mir-automatic-productivity-action-preview=Ανακαλύπτει και ταξινομεί υποψηφίους και, στη συνέχεια, γράφει τις αποδεκτές και τις παραλειφθείσες αποφάσεις στο αρχείο καταγραφής του Factorio. Δεν επισυνάπτει συνταγές ούτε δημιουργεί έρευνα.
mir-automatic-productivity-action-apply=Προεπιλογή. Ανακαλύπτει υποψηφίους και επισυνάπτει μόνο αποδεδειγμένες συνταγές ασφάλειας σε συμβατές υπάρχουσες έρευνες MIR. Δεν δημιουργεί έρευνα από μόνη της. τα δύο πλαίσια ελέγχου παρακάτω διέπουν τη δημιουργία.
mir-automatic-compiler-mode-off=Ισοδύναμο παλαιού τύπου για άτομα με ειδικές ανάγκες.
mir-automatic-compiler-mode-report=Ισοδύναμο παλαιού τύπου των αλλαγών προεπισκόπησης.
mir-automatic-compiler-mode-safe-attach=Ισοδύναμο παλαιού τύπου Εφαρμογή ασφαλών αλλαγών με απενεργοποιημένη τη δημιουργία έρευνας.
mir-automatic-compiler-mode-exact-pack=Ισοδύναμο παλαιού τύπου Εφαρμογή ασφαλών αλλαγών με ενεργοποιημένη τη δημιουργία έρευνας και απαιτούνται ελεγμένα δεδομένα συμβατότητας.
mir-automatic-compiler-mode-safe-generate=Ισοδύναμο παλαιού τύπου Εφαρμογή ασφαλών αλλαγών με ενεργοποιημένη τη δημιουργία έρευνας για εγγεγραμμένους πειραματικούς παρόχους.
mir-adjust-vanilla-weapon-speed-techs-off=Απενεργοποιήστε τον προαιρετικό καθαρισμό μπόνους επικάλυψης πυραύλων/κανονιού του MIR.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Αφαιρέστε τα επικαλυπτόμενα μπόνους πυραύλων/κανονιού του MIR μόνο όταν μια ενεργοποιημένη, προσβάσιμη τεχνολογία άπειρων παρέχει το ακριβές εφέ αντικατάστασης.
mir-adjust-vanilla-weapon-speed-techs-always=Καταργείτε πάντα τα επικαλυπτόμενα μπόνους πυραύλων/κανονιού του MIR. Χρησιμοποιήστε μόνο εάν θέλετε αυστηρό διαχωρισμό.
mir-science-pack-ingredient-policy-configured=Χρησιμοποιήστε τα διαμορφωμένα επιστημονικά πακέτα κάθε παραγόμενης τεχνολογίας χωρίς προαιρετική επέκταση συστατικών. Προεπιλογή MIR.
mir-science-pack-ingredient-policy-space=Προσθέστε την επιστήμη του διαστήματος όταν είναι διαθέσιμη. Μια απλή αύξηση δυσκολίας μετά τον πύραυλο.
mir-science-pack-ingredient-policy-space-and-promethium=Προσθέστε space και επιστήμη προμεθίου όταν είναι διαθέσιμα. Το καλύτερο για πολύ όψιμους καταβόθρες έρευνας της Διαστημικής Εποχής.
mir-science-pack-ingredient-policy-space-age-progression=Προσθέστε μόνο πακέτα προόδου Space Age που υπονοούνται από τα επιλεγμένα πακέτα. Δεν προσθέτει άσχετα τροποποιημένα πακέτα.
mir-science-pack-ingredient-policy-official-progression=Προσθέστε επίσημα πακέτα τύπου προαπαιτούμενων που λείπουν που υπονοούνται από το πιο προηγμένο επίσημο πακέτο που έχει ήδη επιλεγεί.
mir-science-pack-ingredient-policy-mod-progression=Προσθέστε πακέτα συμβατά με εργαστήριο που λείπουν, τα οποία συνάγονται από την εξέλιξη του τροποποιημένου επιστημονικού πακέτου και ξεκλειδώστε τις προϋποθέσεις.
mir-science-pack-ingredient-policy-all-official=Χρησιμοποιήστε κάθε επίσημη βάση και επιστημονικό πακέτο Space Age που υπάρχει στο τρέχον σύνολο mod.
mir-science-pack-ingredient-policy-all=Χρησιμοποιήστε κάθε ενεργό επιστημονικό πακέτο συμβατό με εργαστήριο, συμπεριλαμβανομένων των τροποποιημένων επιστημονικών πακέτων.
mir-lab-incompatibility-policy-reduce=Διατηρήστε την τεχνολογία μειώνοντας τα επιστημονικά πακέτα της στο μεγαλύτερο σύνολο που είναι αποδεκτό από ένα ενεργό εργαστήριο. Η ασφαλέστερη προεπιλογή για πακέτα mod.
mir-lab-incompatibility-policy-skip=Παραλείψτε την τεχνολογία εάν κανένα ενεργό εργαστήριο δεν μπορεί να ερευνήσει το επιλεγμένο σετ επιστημονικών πακέτων. Πιο αυστηρός και ευκολότερος στον έλεγχο.
mir-lab-incompatibility-policy-engine-default=Μην ξαναγράφετε ποτέ το επιλεγμένο σετ επιστημονικών πακέτων. Το MIR διατηρεί ένα σύνολο που μπορεί να ερευνηθεί με ασφάλεια αμετάβλητο και παραλείπει την παραγόμενη τεχνολογία όταν το Factorio δεν μπορεί να ερευνήσει αυτό το ακριβές σύνολο.
mir-prototype-productivity-cap-engine-default=Αφήστε μόνο το υπάρχον όριο παραγωγικότητας κάθε συνταγής. Οι συνταγές χωρίς προσαρμοσμένο όριο χρησιμοποιούν το κανονικό όριο μπόνους παραγωγικότητας +300% της Factorio.
mir-prototype-productivity-cap-percent-25=Ορίστε ανώτατα όρια παραγωγικότητας συνταγών χωρίς παραμέτρους στο +25%. Αυτό είναι ένα αυστηρό πρώιμο ανώτατο όριο.
mir-prototype-productivity-cap-percent-50=Ορίστε ανώτατα όρια παραγωγικότητας συνταγών χωρίς παραμέτρους στο +50%. Αυτό είναι κάτω από το κανονικό ανώτατο όριο και κάνει την έρευνα παραγωγικότητας να σταματήσει να βοηθά νωρίτερα.
mir-prototype-productivity-cap-percent-75=Ορίστε ανώτατα όρια παραγωγικότητας συνταγών χωρίς παραμέτρους στο +75%. Αυτό είναι κάτω από το κανονικό ανώτατο όριο και κάνει την έρευνα παραγωγικότητας να σταματήσει να βοηθά νωρίτερα.
mir-prototype-productivity-cap-percent-100=Ορίστε ανώτατα όρια παραγωγικότητας συνταγών χωρίς παραμέτρους στο +100%. Αυτό είναι κάτω από το κανονικό ανώτατο όριο και κάνει την έρευνα παραγωγικότητας να σταματήσει να βοηθά νωρίτερα.
mir-prototype-productivity-cap-percent-125=Ορίστε ανώτατα όρια παραγωγικότητας συνταγών χωρίς παραμέτρους στο +125%.
mir-prototype-productivity-cap-percent-150=Ορίστε ανώτατα όρια παραγωγικότητας συνταγών χωρίς παραμέτρους στο +150%.
mir-prototype-productivity-cap-percent-200=Ορίστε ανώτατα όρια παραγωγικότητας συνταγών χωρίς παραμέτρους στο +200%. Αυτό είναι κάτω από το κανονικό ανώτατο όριο και κάνει την έρευνα παραγωγικότητας να σταματήσει να βοηθά νωρίτερα.
mir-prototype-productivity-cap-percent-250=Ορίστε ανώτατα όρια παραγωγικότητας συνταγών χωρίς παραμέτρους στο +250%. Αυτό είναι ελαφρώς κάτω από το κανονικό καπάκι.
mir-prototype-productivity-cap-percent-400=Ορίστε ανώτατα όρια παραγωγικότητας συνταγών χωρίς παραμέτρους στο +400%. Αυτό επεκτείνει την κλιμάκωση της παραγωγικότητας πέρα ​​από το κανονικό όριο.
mir-prototype-productivity-cap-percent-500=Ορίστε ανώτατα όρια παραγωγικότητας συνταγών χωρίς παραμέτρους στο +500%. Αυτό επεκτείνει την κλιμάκωση της παραγωγικότητας πέρα ​​από το κανονικό όριο.
mir-prototype-productivity-cap-percent-750=Ορίστε ανώτατα όρια παραγωγικότητας συνταγών χωρίς παραμέτρους στο +750%.
mir-prototype-productivity-cap-percent-1000=Ορίστε ανώτατα όρια παραγωγικότητας συνταγών χωρίς παραμέτρους στο +1000%. Χρησιμοποιήστε το για μακροχρόνιες αποταμιεύσεις όπου η έρευνα παραγωγικότητας θα πρέπει να συνεχίσει να έχει σημασία.
mir-prototype-productivity-cap-percent-2500=Ορίστε ανώτατα όρια παραγωγικότητας συνταγών χωρίς παραμέτρους στο +2500%. Χρησιμοποιήστε για πολύ μεγάλες αποταμιεύσεις.
mir-prototype-productivity-cap-percent-5000=Ορίστε ανώτατα όρια παραγωγικότητας συνταγών χωρίς παραμέτρους στο +5000%.
mir-prototype-productivity-cap-percent-10000=Ορίστε ανώτατα όρια παραγωγικότητας συνταγών χωρίς παραμέτρους στο +10000%. Χρησιμοποιήστε μόνο για ακραία μακροχρόνια απολέπιση.
mir-prototype-productivity-cap-percent-25000=Ορίστε ανώτατα όρια παραγωγικότητας συνταγών χωρίς παραμέτρους στο +25000%. Χρησιμοποιήστε μόνο για ακραία μακροχρόνια απολέπιση.
mir-prototype-productivity-cap-percent-100000=Ορίστε ανώτατα όρια παραγωγικότητας συνταγών χωρίς παραμέτρους στο +100000%. Αυτό είναι ουσιαστικά απεριόριστο για τις περισσότερες αποθηκευμένες ρυθμίσεις.
mir-recycling-return-chance-engine-default=Αφήστε κάθε συνταγή ανακύκλωσης αμετάβλητη.
mir-recycling-return-chance-match-productivity-cap=Εκμεταλλευτείτε ασφαλή αυτόματη μείωση για κρυφές παραγόμενες συνταγές ανακύκλωσης. Χρησιμοποιεί 1 / (1 + μπόνους παραγωγικότητας), περιορισμένο στην κανονική απόδοση 25%: +400% γίνεται 20% και +1000% γίνεται περίπου 9,09%.
mir-recycling-return-chance-percent-25=Διατηρήστε τις κρυφές παραγόμενες συνταγές ανακύκλωσης με την κανονική απόδοση υλικού 25%.
mir-recycling-return-chance-percent-20=Κλιμακώστε τις κρυφές συνταγές ανακύκλωσης που δημιουργούνται σε απόδοση υλικού 20%.
mir-recycling-return-chance-percent-15=Κλιμακώστε τις κρυφές παραγόμενες συνταγές ανακύκλωσης σε απόδοση υλικού 15%.
mir-recycling-return-chance-percent-12-5=Κλιμακώστε τις κρυφές συνταγές ανακύκλωσης που δημιουργούνται σε απόδοση υλικού 12,5%.
mir-recycling-return-chance-percent-10=Κλιμακώστε τις κρυφές συνταγές ανακύκλωσης που δημιουργούνται σε απόδοση υλικού 10%.
mir-recycling-return-chance-percent-7-5=Κλιμακώστε τις κρυφές δημιουργημένες συνταγές ανακύκλωσης σε απόδοση υλικού 7,5%.
mir-recycling-return-chance-percent-5=Κλιμακώστε τις κρυφές συνταγές ανακύκλωσης που δημιουργούνται σε απόδοση υλικού 5%.
mir-recycling-return-chance-percent-2-5=Κλιμακώστε τις κρυφές συνταγές ανακύκλωσης που δημιουργούνται σε απόδοση υλικού 2,5%.
mir-recycling-return-chance-percent-1=Κλιμακώστε τις κρυφές παραγόμενες συνταγές ανακύκλωσης σε απόδοση υλικού 1%.
mir-recycling-return-chance-percent-0-5=Κλιμακώστε τις κρυφές συνταγές ανακύκλωσης που δημιουργούνται σε απόδοση υλικού 0,5%.
mir-recycling-return-chance-percent-0-1=Κλιμακώστε τις κρυφές συνταγές ανακύκλωσης που δημιουργούνται σε απόδοση υλικού 0,1%.
mir-prototype-efficiency-cap-engine-default=Αφήστε μόνο το όριο επίδρασης κατανάλωσης ενέργειας κάθε μηχανής. Μηχανήματα χωρίς προσαρμοσμένο όριο χρησιμοποιούν το κανονικό όριο εφέ κατανάλωσης ενέργειας -80% της Factorio, επομένως τα εφέ δεν μπορούν να μειώσουν την ενεργή χρήση κάτω από 20%.
mir-prototype-efficiency-cap-saving-25=Γράψτε ένα όριο κατανάλωσης ενέργειας -25%. Η χρήση ενεργού ενέργειας παραμένει στο 75% ή περισσότερο μετά τα αποτελέσματα χρήσης ενέργειας.
mir-prototype-efficiency-cap-saving-50=Γράψτε ένα ανώτατο όριο κατανάλωσης ενέργειας -50%. Η χρήση ενεργού ενέργειας παραμένει στο 50% ή περισσότερο μετά από επιπτώσεις χρήσης ενέργειας σε υποστηριζόμενα μηχανήματα.
mir-prototype-efficiency-cap-saving-75=Γράψτε ένα όριο κατανάλωσης ενέργειας -75%. Η χρήση ενεργού ενέργειας παραμένει στο 25% ή περισσότερο μετά από επιπτώσεις χρήσης ενέργειας σε υποστηριζόμενα μηχανήματα.
mir-prototype-efficiency-cap-saving-90=Γράψτε ένα όριο κατανάλωσης ενέργειας -90%. Η χρήση ενεργού ενέργειας μπορεί να πέσει στο 10%, που είναι κάτω από το κανονικό επίπεδο του 20%.
mir-prototype-efficiency-cap-saving-95=Γράψτε ένα όριο κατανάλωσης ενέργειας -95%. Η χρήση ενεργού ενέργειας μπορεί να μειωθεί στο 5%.
mir-prototype-efficiency-cap-saving-99=Γράψτε ένα όριο κατανάλωσης ενέργειας -99%. Η χρήση ενεργού ενέργειας μπορεί να μειωθεί στο 1%.
mir-prototype-efficiency-cap-saving-999=Γράψτε ένα όριο κατανάλωσης ενέργειας -99,9%. Η χρήση ενεργού ενέργειας μπορεί να μειωθεί στο 0,1%.
mir-prototype-efficiency-cap-saving-9999=Γράψτε ένα όριο κατανάλωσης ενέργειας -99,99%. Πρόκειται για σχεδόν μηδενική χρήση ενεργού ενέργειας, όχι για επανεγγραφή πρωτοτύπου μηδενικής ισχύος.
mir-prototype-pollution-cap-engine-default=Αφήστε μόνο το όριο επίδρασης ρύπανσης κάθε μηχανής. Μηχανήματα χωρίς προσαρμοσμένο όριο χρησιμοποιούν το κανονικό όριο επίδρασης ρύπανσης -80% της Factorio.
mir-prototype-pollution-cap-saving-25=Γράψτε ένα ανώτατο όριο ρύπανσης -25%. Η ρύπανση παραμένει στο 75% ή περισσότερο μετά τις επιπτώσεις της ρύπανσης.
mir-prototype-pollution-cap-saving-50=Γράψτε ένα όριο ρύπανσης -50%. Η ρύπανση παραμένει στο 50% ή περισσότερο μετά τις επιπτώσεις της ρύπανσης στα υποστηριζόμενα μηχανήματα.
mir-prototype-pollution-cap-saving-75=Γράψτε ένα ανώτατο όριο ρύπανσης -75%. Η ρύπανση παραμένει στο 25% ή περισσότερο μετά τις επιπτώσεις της ρύπανσης στα υποστηριζόμενα μηχανήματα.
mir-prototype-pollution-cap-saving-90=Γράψτε ένα ανώτατο όριο ρύπανσης -90%. Η ρύπανση μπορεί να πέσει στο 10%, που είναι κάτω από το κανονικό όροφο του 20%.
mir-prototype-pollution-cap-saving-95=Γράψτε ένα ανώτατο όριο ρύπανσης -95%. Η ρύπανση μπορεί να πέσει στο 5%.
mir-prototype-pollution-cap-saving-99=Γράψτε ένα ανώτατο όριο ρύπανσης -99%. Η ρύπανση μπορεί να πέσει στο 1%.
mir-prototype-pollution-cap-saving-999=Γράψτε ένα ανώτατο όριο ρύπανσης -99,9%. Η ρύπανση μπορεί να πέσει στο 0,1%.
mir-prototype-pollution-cap-saving-9999=Γράψτε ένα ανώτατο όριο ρύπανσης -99,99%. Πρόκειται για σχεδόν μηδενική ρύπανση, όχι για σενάριο ρύπανσης χρόνου εκτέλεσης.
mir-prototype-speed-floor-engine-default=Αφήστε μόνο το αρνητικό όριο ταχύτητας κάθε μηχανής. Μηχανήματα χωρίς προσαρμοσμένο όριο χρησιμοποιούν το κανονικό πάτωμα -80% της Factorio και διατηρούν τουλάχιστον 20% ταχύτητα.
mir-prototype-speed-floor-saving-25=Σφίξτε τα αρνητικά εφέ ταχύτητας στο -25%, αφήνοντας τουλάχιστον 75% ταχύτητα.
mir-prototype-speed-floor-saving-50=Σφίξτε τα αρνητικά εφέ ταχύτητας στο -50%, αφήνοντας τουλάχιστον 50% ταχύτητα.
mir-prototype-speed-floor-saving-75=Σφίξτε τα αρνητικά αποτελέσματα ταχύτητας στο -75%, αφήνοντας τουλάχιστον 25% ταχύτητα.
mir-prototype-speed-floor-saving-90=Επιτρέψτε τα αρνητικά εφέ ταχύτητας έως και -90%, αφήνοντας τουλάχιστον 10% ταχύτητα.
mir-prototype-speed-floor-saving-95=Επιτρέψτε τα αρνητικά εφέ ταχύτητας έως και -95%, αφήνοντας τουλάχιστον 5% ταχύτητα.
mir-prototype-speed-floor-saving-99=Επιτρέψτε τα αρνητικά εφέ ταχύτητας έως και -99%, αφήνοντας τουλάχιστον 1% ταχύτητα.
mir-prototype-speed-floor-saving-999=Επιτρέψτε τα αρνητικά εφέ ταχύτητας έως και -99,9%, αφήνοντας τουλάχιστον 0,1% ταχύτητα.
mir-prototype-speed-floor-saving-9999=Επιτρέψτε τα αρνητικά εφέ ταχύτητας έως και -99,99%, το χαμηλότερο όριο πρωτότυπου Factorio. Αυτή είναι μια σχεδόν στάση, όχι μηδενική ή αρνητική ταχύτητα χειροτεχνίας.
mir-prototype-speed-cap-engine-default=Αφήστε μόνο το όριο ταχύτητας κάθε μηχανής. Μηχανήματα χωρίς προσαρμοσμένο όριο χρησιμοποιούν το πολύ υψηλό ανώτατο όριο +100000% της Factorio.
mir-prototype-speed-cap-bonus-25=Σφίξτε τα θετικά εφέ ταχύτητας στο +25%.
mir-prototype-speed-cap-bonus-50=Σφίξτε τα θετικά εφέ ταχύτητας στο +50%. Χρησιμοποιήστε το για να διατηρήσετε τα μπόνους ταχύτητας στενά περιορισμένα.
mir-prototype-speed-cap-bonus-75=Σφιγκώστε τα θετικά εφέ ταχύτητας στο +75%.
mir-prototype-speed-cap-bonus-100=Σφίξτε τα θετικά εφέ ταχύτητας στο +100%.
mir-prototype-speed-cap-bonus-125=Σφιγκώστε τα θετικά εφέ ταχύτητας στο +125%.
mir-prototype-speed-cap-bonus-150=Σφίξτε τα θετικά εφέ ταχύτητας στο +150%.
mir-prototype-speed-cap-bonus-200=Σφιγκώστε τα θετικά εφέ ταχύτητας στο +200%.
mir-prototype-speed-cap-bonus-250=Σφιγκώστε τα θετικά εφέ ταχύτητας στο +250%.
mir-prototype-speed-cap-bonus-300=Σφίξτε τα θετικά εφέ ταχύτητας στο +300%.
mir-prototype-speed-cap-bonus-400=Σφίξτε τα θετικά εφέ ταχύτητας στο +400%.
mir-prototype-speed-cap-bonus-500=Σφίξτε τα θετικά εφέ ταχύτητας στο +500%.
mir-prototype-speed-cap-bonus-750=Σφίξτε τα θετικά εφέ ταχύτητας στο +750%.
mir-prototype-speed-cap-bonus-1000=Σφίξτε τα θετικά εφέ ταχύτητας στο +1000%.
mir-prototype-speed-cap-bonus-2500=Σφιγκώστε τα θετικά αποτελέσματα ταχύτητας στο +2500%.
mir-prototype-speed-cap-bonus-5000=Σφιγκώστε τα θετικά εφέ ταχύτητας στο +5000%.
mir-prototype-speed-cap-bonus-10000=Σφιγκώστε τα θετικά εφέ ταχύτητας στο +10000%.
mir-prototype-speed-cap-bonus-25000=Σφιγκώστε τα θετικά εφέ ταχύτητας στο +25000%.
mir-prototype-speed-cap-bonus-100000=Γράψτε ρητά το ανώτατο όριο εφέ μέγιστης ταχύτητας του Factorio. Σε αντίθεση με το αμετάβλητο, αυτό αντικαθιστά προσαρμοσμένα κατώτατα όρια.
mir-prototype-quality-cap-engine-default=Αφήστε το όριο ποιότητας-αποτέλεσης κάθε μηχανής μόνο. Μηχανήματα χωρίς προσαρμοσμένο όριο χρησιμοποιούν το πολύ υψηλό ανώτατο όριο +100000% της Factorio με αποτέλεσμα ποιότητας.
mir-prototype-quality-cap-bonus-50=Σφίξτε τα θετικά αποτελέσματα ποιότητας στο +50%. Αυτό περιορίζει τα εφέ μπόνους ποιότητας του μηχανήματος, όχι τις βαθμίδες ποιότητας ή τους τύπους πιθανοτήτων αντικειμένων.
