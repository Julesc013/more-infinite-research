[mod-setting-description]
ips-require-space-gate=როდესაც ჩართულია, ეს ტექნოლოგიები ჩაკეტილი რჩება მანამ, სანამ კოსმოსური მეცნიერება არ იქნება გამოკვლეული ვანილის, ან პრომეთიუმის მეცნიერების გამოკვლევა კოსმოსურ ეპოქაში.
mir-science-pack-ingredient-policy=ირჩევს, როგორ დაამატებს MIR სამეცნიერო პაკეტებს გენერირებულ ტექნოლოგიებში. ვარიანტები შეკვეთილია კონსერვატიულიდან ფართოზე: ნაგულისხმევი პაკეტები, გვიან თამაშის პაკეტები, პროგრესირებაზე დაფუძნებული პაკეტები, შემდეგ ყველა ხელმისაწვდომი პაკეტი.
mir-automatic-productivity-action=ირჩევს რას აკეთებს MIR უსაფრთხო პროდუქტიულობის შესაძლებლობებთან, რომლებიც ნაპოვნია დაინსტალირებული მოდიფიკაციის რეცეპტებში. გამორთული არ ახორციელებს ავტომატურ აღმოჩენას. წინასწარი გადახედვა ცვლის მიღებულ და გამოტოვებულ კანდიდატებს Factorio ჟურნალში კვლევის შეცვლის გარეშე. უსაფრთხო ცვლილებების გამოყენება (ნაგულისხმევი) ამატებს დასაშვებ რეცეპტებს მხოლოდ თავსებადი არსებული MIR კვლევისთვის. ეს აკონტროლებს მოქმედებას და არა ძალას ან სიმწიფეს; შექმნის ჩამრთველი ქვემოთ არის ცალკე. საკუთრება, გადამუშავება, ალბათობა, კატალიზატორი, მეცნიერება, ლაბორატორია, წინაპირობა, მიზანი, იდენტურობა, პროგრესირება და ციკლის შემოწმებები ყოველთვის გამოიყენება.
mir-automatic-create-research=ნაგულისხმევი: გამორთულია. შეუზღუდავი ლიმიტები უსაფრთხო ცვლილებების გამოყენება თავსებად არსებულ MIR კვლევაში; კანდიდატები, რომლებსაც არ აქვთ შესაბამისი ნაკადი, გამოტოვებულია და მოხსენებულია. ჩართვა უფლებას აძლევს რეგისტრირებულ პროვაიდერს შექმნას ერთი სტაბილური ზოგადი უსასრულო პროდუქტიულობის ტექნოლოგია, როდესაც არ ჯდება არსებული კვლევა. ქვემოთ მოცემული განხილული მონაცემების მოსანიშნი ველი წყვეტს, აკმაყოფილებენ თუ არა ექსპერიმენტული პროვაიდერები. MIR არასოდეს ქმნის ერთ ტექნოლოგიას თითო მოდში ან რეცეპტზე და ყოველგვარი უსაფრთხოება, მეცნიერება, საკუთრება, იდენტურობა, პროგრესი და ციკლის კარი მაინც გამოიყენება.
mir-automatic-require-reviewed-data=ნაგულისხმევი: ჩართული. ამას აქვს მნიშვნელობა მხოლოდ მაშინ, როდესაც ჩართულია ახალი კვლევის შექმნის ნება; ის არასოდეს ბლოკავს არსებულ კვლევას უსაფრთხო მიმაგრებას. ნებართვებზე მხოლოდ პროვაიდერის ოჯახები მონიშნულია განხილულად და დადასტურებულია შესაბამისი ზუსტი ვერსიით, ამიტომ ექსპერიმენტული ოჯახები გამოტოვებულია. Off საშუალებას აძლევს რეგისტრირებულ ექსპერიმენტულ პროვაიდერებს შექმნან ზოგადი სტრუქტურული მტკიცებულებებიდან. ყველაზე ფართო ექსპერიმენტული ქცევისთვის, ჩართეთ კვლევის შექმნა და გამორთეთ ეს მოთხოვნა. ვერცერთი ღირებულება ვერ გადალახავს მყარ უსაფრთხოების კარიბჭეს.
mir-automatic-compiler-mode=დამალული თავსებადობის ხიდი პროფილებისთვის, რომლებიც შექმნილია ავტომატური პროდუქტიულობის კონტროლის გაყოფამდე. არანაგულისხმევი მოძველებული მნიშვნელობა ენიჭება მხოლოდ მაშინ, როცა ყველა ახალი კონტროლი რჩება ნაგულისხმევად. შეცვალეთ ნებისმიერი ახალი კონტროლი, რათა აიღოთ აშკარა კონტროლი.
ips-enable-stream=ქმნის გენერირებულ უსასრულო ტექნოლოგიას __1__-სთვის, როდესაც ხელმისაწვდომია მისი რეცეპტები, ეფექტები, წინაპირობები და სამეცნიერო პაკეტები. გამორთეთ ეს, რათა თავიდან აიცილოთ MIR ამ ტექნოლოგიის გენერირება.
ips-cost-base-stream=კვლევითი ერთეულები საჭიროა __1__ პირველი გენერირებული დონისთვის. უნდა იყოს მინიმუმ 1. შემდგომი დონეები გამოითვლება ამ მნიშვნელობიდან და ხარჯების ზრდის ფაქტორიდან.
ips-cost-growth-stream=მულტიპლიკატორი გამოყენებულია __1__ თითოეულ შემდგომ დონეზე. გამოიყენეთ 1 ბინა ხარჯებისთვის, 1.5 50%-იანი ზრდისთვის, ან 2 ხარჯების გაორმაგებისთვის.
ips-max-level-stream=უმაღლესი გენერირებული დონე __1__-სთვის. დააყენეთ 0-ზე უსასრულო დონეებისთვის.
ips-research-time-stream=წამი კვლევის ერთეულზე __1__. დააყენეთ 0-ზე ამ ტექნოლოგიისთვის MIR-ის ნაგულისხმევი გამოსაყენებლად. ეს არ არის მთლიანი კვლევის დრო; მთლიანი დრო ასევე დამოკიდებულია კვლევის ღირებულებაზე, ლაბორატორიის რაოდენობაზე, ლაბორატორიის სიჩქარეზე და მოდულებზე.
mir-enable-base-tech=საშუალებას აძლევს __1__ გააგრძელოს ვანილის თავსახურის მიღმა, როგორც უსასრულო ტექნოლოგია. გამორთეთ ეს, თუ გსურთ MIR-მა დაამატოს ახალი კვლევის ხაზები ამ ვანილის ჯაჭვის გაგრძელების გარეშე.
mir-cost-base=კვლევითი ერთეულები საჭიროა პირველი MIR გაგრძელების დონისთვის __1__. დააყენეთ 0-ზე ვანილის ჯაჭვის ღირებულების ნიმუშის მემკვიდრეობით, როდესაც ეს შესაძლებელია.
mir-cost-growth=მულტიპლიკატორი გამოიყენება ყოველი შემდგომი MIR გაგრძელების დონეზე __1__. დააყენეთ 0-ზე, რათა მემკვიდრეობით მიიღოთ ვანილის ჯაჭვის ზრდის ნიმუში, როდესაც ეს შესაძლებელია.
mir-max-level=MIR გაგრძელების უმაღლესი დონე __1__-სთვის. დააყენეთ 0-ზე უსასრულო დონეებისთვის.
mir-research-time=წამი კვლევის ერთეულზე __1__ MIR-ის გაგრძელებისთვის. დააყენეთ 0-ზე, რათა მემკვიდრეობით მიიღოთ ვანილის ჯაჭვის კვლევის ერთეულის დრო, როდესაც ეს შესაძლებელია.
mir-prefer-this-mod-for-competing-techs=როდესაც ჩართულია, ეს რეჟიმი შლის შერჩეულ კონკურენტ უსასრულო გაფართოებებს და იყენებს საკუთარ ვერსიებს. გამორთეთ კონკურენტული ვერსიების შესანარჩუნებლად სხვა მოდელებისგან.
mir-adjust-vanilla-weapon-speed-techs=აკონტროლებს, ამოიღებს თუ არა MIR რაკეტების და ქვემეხების სიჩქარის ბონუსებს მისი გენერირებული იარაღის სროლის სიჩქარის გაგრძელებიდან, როდესაც ზუსტი უსასრულო ჩანაცვლების დაფარვა ხელმისაწვდომია. სასრული ვანილის იარაღის სროლის სიჩქარის ტექნოლოგიები ინარჩუნებს თავდაპირველ ბონუსებს.
mir-use-installed-space-age-icons=როდესაც ჩართულია, MIR შეიძლება მიუთითოს დაინსტალირებული ოფიციალური DLC ხატულა ფაილები, მათ შორის Space Age და Elevated Rails, მაშინაც კი, როდესაც ეს მოდიფიკაციები გამორთულია საბაზისო თამაშის გაშვებისთვის. გამორთეთ ეს, თუ ეს DLC ფაილები არ არის დაინსტალირებული; Factorio ვერ ​​აღადგენს მოხდენილ ხატულ ფაილებს პროტოტიპის ჩატვირთვის დროს.
mir-pipeline-extent-multiplier=მხოლოდ გაშვების ჩამოსაშლელი მულტიპლიკატორი აღიარებული სითხის ყუთის მილსადენის გაფართოების ველებისთვის პროტოტიპებში და არა მხოლოდ მილების ერთეულებში. 100% ტოვებს პროტოტიპებს უცვლელად და არ იტვირთება მილსადენის უღელტეხილზე და არ სკანირებს სითხის ყუთებს. არა-100%-იანი მნიშვნელობები ექსპერიმენტულია და შეიძლება გავლენა იქონიოს მანქანებზე, ტანკებზე, ამძრავებს და მოდიფიცირებულ პროტოტიპებზე, რომლებიც განსაზღვრავენ სითხის ყუთებს.
mir-unrestricted-modules=ექსპერიმენტული და ბალანსის დამრღვევი. როდესაც ჩართულია, ყველა არსებული რეცეპტი იღებს ხუთივე მოდულის ეფექტს და ყველა არსებული მოდულის მიმღები სლოტებით იღებს ყველა აღმოჩენილ მოდულის კატეგორიას. ეს არ ამატებს მოდულის სლოტებს ან არ ცვლის მოდულის პროტოტიპებს და შეიძლება ჩართოს პროდუქტიულობა, ხარისხი და მოდიფიცირებული მოდულის მარყუჟები.
mir-prototype-productivity-cap=ირჩევს, დატოვებს თუ არა MIR რეცეპტის პროდუქტიულობის ზღურბლებს მარტო, თუ ჩაწერს გაშვების ქუდს ყველა არაპარამეტრულ, გადამუშავების გარეშე რეცეპტზე. +300% (უცვლელი) ინახავს არსებულ რეცეპტის თავსახურებს; დაბალი მნიშვნელობები ამცირებს პროდუქტიულობის სკალირებას, ხოლო უფრო მაღალი მნიშვნელობები აფართოებს მას.
mir-recycling-return-chance=აკონტროლებს მხოლოდ დამალულ გენერირებულ გადამუშავების რეცეპტებს. ავტომატური რეჟიმი ამცირებს მასალის ნორმალურ 25%-იან დაბრუნებას მაქსიმუმ 1-მდე გაყოფილი მთლიან გამომავალ მულტიპლიკატორზე არჩეული პროდუქტიულობის ზღვრამდე. ფიქსირებული არჩევანი პირდაპირ მასშტაბირებს იგივე გენერირებულ ანაზღაურებას. ხილული პროცესები და რეცეპტის პროდუქტიულობის ზღვრები არასოდეს იცვლება.
mir-productivity-cap-self-recycling-only=1 / გადამამუშავებელი დაბრუნების ზემოთ - 1, მხოლოდ წარმოების რეცეპტები დადასტურებული არაგენერაციული თვითგადამუშავების გზაზე იღებენ არჩეულ უფრო მაღალ თავსახურს. ამ ზღურბლზე ან მის ქვემოთ, ამ მოსანიშნი ველი არ მოქმედებს. ძრავი უცვლელი იყენებს ნორმალურ 25%-იან დაბრუნებას, როგორც კონსერვატიულ +300%-იან ზღურბლს გადამუშავების რეცეპტების შეცვლის გარეშე.
mir-prototype-efficiency-cap=ირჩევს რამდენად შეიძლება შეამციროს ეფექტურობის ეფექტებმა მანქანის აქტიური ენერგიის გამოყენება. -80% (უცვლელი) მარტო ტოვებს ენერგიის მოხმარების არსებულ ლიმიტებს. უფრო ღრმა შემცირებამ შეიძლება მიუახლოვდეს ნულოვანი აქტიური ენერგიის გამოყენებას დაბინძურების ლიმიტების შეცვლის გარეშე.
mir-prototype-pollution-cap=ირჩევს დაბინძურების შემცირების ეფექტებს რამდენად შეუძლია შეამციროს მანქანების დაბინძურება. -80% (უცვლელი) ტოვებს არსებულ დაბინძურების ლიმიტს მარტო. უფრო ღრმა შემცირებამ შეიძლება მიაღწიოს ნულოვან დაბინძურებას ენერგიის მოხმარების შეცვლის გარეშე.
mir-prototype-speed-floor=ირჩევს, თუ რამდენად შეანელებს სიჩქარის უარყოფითმა ეფექტებმა მხარდაჭერილი მანქანები. -80% (უცვლელი) მარტო ტოვებს არსებულ ლიმიტებს; უფრო ღრმა მნიშვნელობები აშორებს ნორმალურ იატაკს გაჩერებამდე -99,99%.
mir-prototype-speed-cap=ირჩევს, დატოვებს თუ არა MIR მანქანის სიჩქარის ეფექტის ლიმიტებს მარტო, თუ დაწერს ახალ პოზიტიურ სიჩქარის ზღვარს. +100000% (უცვლელი) ინარჩუნებს არსებულ ლიმიტებს; დაბალი მნიშვნელობები განზრახ ამაგრებს ძალიან დიდ სიჩქარის ბონუსებს.
mir-prototype-quality-cap=ირჩევს, დატოვებს თუ არა MIR მანქანის ხარისხის ეფექტის ლიმიტებს მარტო, თუ დაწერს ახალ პოზიტიურ ხარისხს. +100000% (უცვლელი) ინარჩუნებს არსებულ საზღვრებს და არ ცვლის ხარისხის დონეებს ან ნივთების ალბათობის ფორმულებს.
mir-prototype-positive-power-floor=ნაგულისხმევი გამორთულია. როდესაც ჩართულია, MIR ცვლის აშკარა 0W აქტიური ენერგიის_მოხმარების პროტოტიპებს პროტოტიპის ჩატვირთვისას 1W-ზე, ამიტომ დაბალი სიმძლავრის გამაფრთხილებელი ხატები არ გამოჩნდება იმ ერთეულებზე, რომლებმაც უნდა გამოიტანონ მცირე არა-ნულოვანი რაოდენობა. დატოვეთ, რათა ზუსტად შეინარჩუნოთ ნულოვანი სიმძლავრის პროტოტიპები.
mir-settings-profile-import=ჩასვით აქ MIR პარამეტრების პროფილის სტრიქონი, რათა გამოიყენოს ექსპორტირებული გაშვების პარამეტრების მნიშვნელობები, როგორც გადაფარვის ფენა პროტოტიპის გენერირებისას. ნორმალური პარამეტრებისთვის ცარიელი დატოვეთ. ექსპორტი /mir-settings-export აქტიური შენახვიდან, შემდეგ გადატვირთეთ ამ მნიშვნელობის შეცვლის შემდეგ.
mir-debug-generation-report=როდესაც ჩართულია, წერს ჟურნალის ერთ სტრუქტურირებულ მწკრივს გენერირებულ ან გამოტოვებულ ნაკადზე და ბაზის გაფართოებაზე, მათ შორის სამეცნიერო პაკეტებს, წინაპირობებს, ეფექტების რაოდენობას, ლაბორატორიის თავსებადობის სტატუსს და ხატულას წყაროს.
mir-debug-recipe-matches=როდესაც ჩართულია, წერს რეცეპტების შესაბამის სახელებს გენერირებული პროდუქტიულობის თითოეული ნაკადისთვის. ეს შეიძლება იყოს ხმაურიანი მოდიფიკაციის დიდ პაკეტებში.
mir-debug-scripted-effects=როდესაც ჩართულია, წერს ჩანაწერებს გაშვების დროს ჟურნალში, როდესაც სკრიპტირებული ტექნოლოგიები ხელახლა გამოთვლის გლობალურ ან მოვლენებზე დაფუძნებულ ეფექტებს.
mir-lab-incompatibility-policy=ირჩევს რას აკეთებს MIR, როდესაც არჩეული სამეცნიერო პაკეტების გამოკვლევა შეუძლებელია რომელიმე აქტიური ლაბორატორიის მიერ.
ips-effect-per-level-stream=ადგენს პირველადი საბაზისო დონის ეფექტს თითო დონეზე __1__-სთვის. მოგვიანებით დაკავშირებული ფენები და ეფექტები მასშტაბირებულია პროპორციულად. პროცენტული ეფექტები იყენებს პროცენტულ პუნქტებს; დათვლის და მანძილის ეფექტები იყენებენ მათ მშობლიურ ერთეულებს.
mir-effect-per-level=აყენებს კანონიკურ ეფექტს თითოეულ დონეზე უსასრულო __1__ გაგრძელებისთვის. დაკავშირებული ეფექტები სკალირებულია პროპორციულად ვანილის საბოლოო საბაზისო ხაზიდან. პროცენტული ეფექტები იყენებს პროცენტულ პუნქტებს; დათვლის და მანძილის ეფექტები იყენებენ მათ მშობლიურ ერთეულებს.
mir-note-experimental-spoilage=ექსპერიმენტული და ნაგულისხმევად გამორთულია v2.1.0-ში. ეს არის გლობალური/რუქის მასშტაბური სკრიპტის ეფექტი. არსებული spoiable-stack ქცევა არ არის გასაჩივრებული მანამ, სანამ ხელით არ დადასტურდება.
mir-note-agriculture-growth=ეხება ახლად დარგულ სასოფლო-სამეურნეო კოშკების კულტურებს. არსებული დარგული კულტურები არ ხდება ხელახალი მასშტაბირება.
mir-note-cargo-pad-count=სპეციალური კოსმოსური ეპოქის ლოგისტიკის კვლევა. ზრდის ტვირთის სადესანტო ბალიშებს თითოეულ ზედაპირზე და შეუძლია არსებითად შეცვალოს ლოგისტიკური ბალანსი.
mir-note-inserter-capacity=გამორთულია ნაგულისხმევად. დამტენის დამატებით სიმძლავრეს შეუძლია დაარღვიოს სქემით კონტროლირებადი ჩასართები და შეამციროს ძრავის ოპტიმიზაცია.
mir-note-native-owner-managed-stream=თუ დაინსტალირებული უსასრულო ტექნოლოგია უკვე ფლობს ამ კვლევის ოჯახს, იგივე გაშვების პარამეტრები ახდენენ ამ მფლობელის კონფიგურაციას დუბლიკატის შექმნის ნაცვლად. უცვლელი MIR ნაგულისხმევი პარამეტრები ზუსტად ინარჩუნებს მფლობელის საბოლოო პროტოტიპს. აშკარა ხარჯების, დროის, მაქსიმალური დონის და ეფექტის უგულებელყოფა გამოიყენება მხოლოდ მფლობელის უსაფრთხო მატჩის შემდეგ; ნაკადის გამორთვა გარე ტექნოლოგიას ხელუხლებლად ტოვებს. გადატვირთეთ Factorio გაშვების პარამეტრების შეცვლის შემდეგ. მაქსიმალური დონე 0 ნიშნავს უსასრულობას, ხოლო ეფექტის მნიშვნელობები არის პროცენტული ქულა თითოეულ დონეზე.

