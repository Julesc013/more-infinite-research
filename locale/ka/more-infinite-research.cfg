[string-mod-setting-description]
mir-automatic-productivity-action-disabled=არ ასრულებს ავტომატურ აღმოჩენას, დანართს ან შექმნას. MIR-ის ფიქსირებული კვლევა უცვლელი რჩება.
mir-automatic-productivity-action-preview=აღმოაჩენს და ახდენს კანდიდატების კლასიფიკაციას, შემდეგ წერს მიღებულ და გამოტოვებულ გადაწყვეტილებებს Factorio ჟურნალში. ის არ ანიჭებს რეცეპტებს და არ ქმნის კვლევას.
mir-automatic-productivity-action-apply=ნაგულისხმევი. აღმოაჩენს კანდიდატებს და ანიჭებს მხოლოდ უსაფრთხოების დადასტურებულ რეცეპტებს თავსებად არსებულ MIR კვლევას. ის თავისთავად არ ქმნის კვლევას; ქვემოთ მოცემული ორი ველი არეგულირებს შექმნას.
mir-automatic-compiler-mode-off=ინვალიდ-ის მემკვიდრეობითი ეკვივალენტი.
mir-automatic-compiler-mode-report=გადახედვის ცვლილებების ძველი ეკვივალენტი.
mir-automatic-compiler-mode-safe-attach=მემკვიდრეობითი ეკვივალენტი უსაფრთხო ცვლილებების გამოყენება კვლევის შექმნის გამორთულია.
mir-automatic-compiler-mode-exact-pack=მოძველებული ეკვივალენტი უსაფრთხო ცვლილებების გამოყენება ჩართულია კვლევის შექმნისას და საჭიროა განხილული თავსებადობის მონაცემები.
mir-automatic-compiler-mode-safe-generate=მემკვიდრეობითი ეკვივალენტი უსაფრთხო ცვლილებების გამოყენებასთან ერთად კვლევის შექმნა ჩართულია რეგისტრირებული ექსპერიმენტული პროვაიდერებისთვის.
mir-adjust-vanilla-weapon-speed-techs-off=გამორთეთ MIR-ის არჩევითი გადახურვის რაკეტის/ქვემეხის ბონუსის გასუფთავება.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=ამოიღეთ MIR-ის რაკეტის/ქვემეხის გადაფარვის ბონუსები მხოლოდ მაშინ, როდესაც ჩართული, ხელმისაწვდომი უსასრულო ტექნოლოგია უზრუნველყოფს ზუსტი ჩანაცვლების ეფექტს.
mir-adjust-vanilla-weapon-speed-techs-always=ყოველთვის ამოიღეთ MIR-ის რაკეტის/ქვემეხის გადაფარვის ბონუსები. გამოიყენეთ მხოლოდ იმ შემთხვევაში, თუ გსურთ მკაცრი განცალკევება.
mir-science-pack-ingredient-policy-configured=გამოიყენეთ თითოეული გენერირებული ტექნოლოგიის კონფიგურირებული სამეცნიერო პაკეტები არჩევითი ინგრედიენტების გაფართოების გარეშე. MIR ნაგულისხმევი.
mir-science-pack-ingredient-policy-space=დაამატეთ კოსმოსური მეცნიერება, როცა ხელმისაწვდომია. მარტივი პოსტ-რაკეტის სირთულის ზრდა.
mir-science-pack-ingredient-policy-space-and-promethium=დაამატეთ სივრცე და პრომეთიუმის მეცნიერება, როცა ხელმისაწვდომია. საუკეთესოა ძალიან გვიანი კოსმოსური ხანის კვლევის ნიჟარებისთვის.
mir-science-pack-ingredient-policy-space-age-progression=დაამატეთ მხოლოდ არჩეული პაკეტებით ნაგულისხმევი Space Age პროგრესირების პაკეტები. არ ამატებს დაუკავშირებელ მოდიფიცირებულ პაკეტებს.
mir-science-pack-ingredient-policy-official-progression=დაამატეთ დაკარგული ოფიციალური წინარეკვიზიტის სტილის პაკეტები, რაც გულისხმობს უკვე შერჩეულ ყველაზე მოწინავე ოფიციალურ პაკეტს.
mir-science-pack-ingredient-policy-mod-progression=დაამატეთ გამოტოვებული ლაბორატორიასთან თავსებადი პაკეტები, რომლებიც გამოითვლება შეცვლილი სამეცნიერო პაკეტის პროგრესიდან და განბლოკეთ წინაპირობები.
mir-science-pack-ingredient-policy-all-official=გამოიყენეთ ყველა ოფიციალური ბაზა და კოსმოსური ხანის სამეცნიერო პაკეტი, რომელიც არსებობს მიმდინარე მოდიფიკაციის კომპლექტში.
mir-science-pack-ingredient-policy-all=გამოიყენეთ ყველა აქტიური ლაბორატორიასთან თავსებადი სამეცნიერო პაკეტი, მათ შორის მოდიფიცირებული სამეცნიერო პაკეტები.
mir-lab-incompatibility-policy-reduce=შეინარჩუნეთ ტექნოლოგია მისი სამეცნიერო პაკეტების შემცირებით ყველაზე დიდ კომპლექტამდე, რომელიც მიღებულია აქტიური ლაბორატორიის მიერ. ყველაზე უსაფრთხო ნაგულისხმევი მოდიფიკაციის პაკეტებისთვის.
mir-lab-incompatibility-policy-skip=გამოტოვეთ ტექნოლოგია, თუ არცერთ აქტიურ ლაბორატორიას არ შეუძლია შეისწავლოს მისი შერჩეული სამეცნიერო პაკეტის ნაკრები. უფრო მკაცრი და ადვილი შესამოწმებელი.
