[technology-description]
more-infinite-research.recipe_productivity=ზრდის რეცეპტის პროდუქტიულობას შერჩეული რეცეპტებისთვის. Factorio-ს მაქსიმალური პროდუქტიულობის ზღვარი კვლავ მოქმედებს; დამატებით უსასრულო დონეებს შეიძლება არ ჰქონდეს პრაქტიკული ეფექტი, როგორც კი რეცეპტი მიაღწევს მაქსიმუმს.
more-infinite-research.direct_effect=ამატებს უსასრულო განმეორებად ბონუსს. სამეცნიერო პაკეტები შერჩეულია აქტიური ლაბორატორიებიდან, ასე რომ, ტექნოლოგია რჩება შესასწავლად თავსებადი მოდების კომპლექტებით.
more-infinite-research.cargo_bay_unloading_distance=ზრდის ტვირთის სადესანტო ბალიშსა და დაკავშირებულ განტვირთვის ადგილს შორის მაქსიმალურ მანძილს.
more-infinite-research.cargo_landing_pad_count=ზრდის ტვირთის სადესანტო ბალიშების რაოდენობას, რომელიც თითოეულ ძალას შეუძლია ააშენოს თითო ზედაპირზე.
more-infinite-research.flamethrower_shooting_speed=ზრდის სროლის სიჩქარეს ცეცხლსასროლი იარაღისა და ცეცხლსასროლი კოშკებისთვის.
more-infinite-research.electric_shooting_speed=ზრდის სროლის სიჩქარეს ელექტრო იარაღისთვის. ვანილში ეს გავლენას ახდენს გამონადენის დაცვაზე; კოსმოსურ ხანაში ის ასევე მოქმედებს ტესლას იარაღზე, როდესაც ხელმისაწვდომია ტესლა საბრძოლო მასალის კატეგორია.
more-infinite-research.spoilage_preservation=ზრდის გლობალური გაფუჭების დროის მოდიფიკატორს შეზღუდული სკრიპტის ეფექტის მეშვეობით. არსებულმა გაფუჭებულმა ნივთებმა შეიძლება შეინარჩუნონ გაფუჭების ამჟამინდელი ვადები თამაშში ტესტირებამდე.
more-infinite-research.agricultural_growth_speed=ამცირებს ახლად დარგული სასოფლო-სამეურნეო კოშკების ზრდის დარჩენილ დროს შემოსაზღვრული სკრიპტის ეფექტის მეშვეობით.
more-infinite-research.lab_productivity=ზრდის კვლევის პროგრესს, რომელიც მიიღება თითოეული მოხმარებული სამეცნიერო პაკეტიდან, ადგილობრივი ლაბორატორიის კვლევის პროდუქტიულობის მოდიფიკატორის გამოყენებით.

