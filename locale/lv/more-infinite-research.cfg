mir-prototype-pollution-cap-saving-9999=Uzrakstiet -99,99% piesārņojuma vāciņu. Šis ir gandrīz nulles piesārņojums, nevis izpildlaika piesārņojuma skripts.
mir-prototype-speed-floor-engine-default=Atstājiet katras mašīnas negatīvo ātruma ierobežojumu. Mašīnas bez pielāgota ierobežojuma izmanto Factorio parasto -80% grīdu un uztur vismaz 20% ātrumu.
mir-prototype-speed-floor-saving-25=Nospiediet negatīvos ātruma efektus pie -25%, atstājot vismaz 75% ātrumu.
mir-prototype-speed-floor-saving-50=Nospiediet negatīvos ātruma efektus pie -50%, atstājot vismaz 50% ātrumu.
mir-prototype-speed-floor-saving-75=Nospiediet negatīvos ātruma efektus pie -75%, atstājot vismaz 25% ātrumu.
mir-prototype-speed-floor-saving-90=Atļaujiet negatīvus ātruma efektus līdz -90%, atstājot vismaz 10% ātrumu.
mir-prototype-speed-floor-saving-95=Atļaujiet negatīvus ātruma efektus līdz -95%, atstājot vismaz 5% ātrumu.
