[mod-setting-description]
ips-require-space-gate=Ja iespējota, šīs tehnoloģijas paliek bloķētas, līdz kosmosa zinātne tiek pētīta vaniļā vai prometija zinātne tiek pētīta kosmosa laikmetā.
mir-science-pack-ingredient-policy=Izvēlas, kā MIR pievieno zinātnes pakotnes ģenerētajām tehnoloģijām. Opcijas ir sakārtotas no konservatīvām līdz plašajām: noklusējuma pakotnes, vēlu spēļu pakotnes, uz progresēšanu balstītas pakotnes, pēc tam visas pieejamās pakotnes.
mir-automatic-productivity-action=Izvēlas, ko MIR dara ar drošām produktivitātes iespējām, kas atrodamas instalēto moduļu receptēs. Disabled neveic automātisku atklāšanu. Priekšskatiet pieņemtos un izlaistos kandidātus Factorio žurnālā, nemainot pētījumus. Lietot drošas izmaiņas (noklusējums) pievieno piemērotas receptes tikai saderīgiem esošajiem MIR pētījumiem. Tas kontrolē darbību, nevis spēku vai briedumu; zemāk esošās izveides izvēles rūtiņas ir atsevišķas. Vienmēr tiek piemērotas īpašumtiesību, otrreizējās pārstrādes, varbūtības, katalizatora, zinātnes, laboratorijas, priekšnoteikumu, mērķa, identitātes, progresēšanas un cikla pārbaudes.
mir-automatic-create-research=Noklusējums: izslēgts. Off limits Lietojiet drošas izmaiņas saderīgai esošajai MIR izpētei; kandidāti bez piemērotas straumes tiek izlaisti un ziņoti. Ieslēgts ļauj piemērotam reģistrētam pakalpojumu sniedzējam izveidot vienu stabilu vispārēju bezgalīgas produktivitātes tehnoloģiju, ja neviens esošais pētījums neder. Tālāk esošā pārskatīto datu izvēles rūtiņa nosaka, vai eksperimentālie pakalpojumu sniedzēji ir piemēroti. MIR nekad nerada vienu tehnoloģiju katrai modifikācijai vai receptei, un joprojām ir spēkā visi sarežģītie drošības, zinātnes, īpašumtiesību, identitātes, progresa un cikla vārti.
mir-automatic-require-reviewed-data=Noklusējums: ieslēgts. Tam ir nozīme tikai tad, ja ir ieslēgta opcija Atļaut jaunu pētījumu izveidi; tas nekad nebloķē drošu piesaisti esošajiem pētījumiem. Atļaujās tikai pakalpojumu sniedzēju ģimenes ir atzīmētas kā pārskatītas un nodrošinātas ar piemērojamiem precīzas versijas pierādījumiem, tāpēc eksperimentālās ģimenes tiek izlaistas. Izslēgts ļauj reģistrētiem eksperimentālajiem pakalpojumu sniedzējiem izveidot, izmantojot vispārīgus strukturālus pierādījumus. Lai iegūtu plašāku eksperimentālo darbību, iespējojiet pētījumu izveidi un izslēdziet šo prasību. Neviena vērtība nevar apiet cietos drošības vārtus.
mir-automatic-compiler-mode=Slēpts saderības tilts profiliem, kas izveidoti pirms dalītās automātiskās produktivitātes vadīklām. Mantotā vērtība, kas nav noklusējuma vērtība, tiek ievērota tikai tad, kad visas jaunās vadīklas paliek noklusējuma vērtībās. Mainiet jebkuru jaunu vadīklu, lai pārņemtu tiešu kontroli.
ips-enable-stream=Izveido ģenerētu bezgalīgu tehnoloģiju priekš __1__, kad ir pieejamas tās receptes, efekti, priekšnoteikumi un zinātnes pakotnes. Atspējojiet šo, lai neļautu MIR ģenerēt šo tehnoloģiju.
ips-cost-base-stream=Pētniecības vienības, kas nepieciešamas pirmajam ģenerētajam __1__ līmenim. Jābūt vismaz 1. Vēlāki līmeņi tiek aprēķināti no šīs vērtības un izmaksu pieauguma faktora.
ips-cost-growth-stream=Reizinātājs tiek lietots katram nākamajam __1__ līmenim. Izmantojiet 1, lai fiksētu izmaksas, 1,5, lai palielinātu 50% katrā līmenī, vai 2, lai dubultotu izmaksas.
ips-max-level-stream=Augstākais ģenerētais līmenis __1__. Iestatīt uz 0 bezgalīgiem līmeņiem.
ips-research-time-stream=Sekundes uz vienu izpētes vienību __1__. Iestatiet uz 0, lai šai tehnoloģijai izmantotu MIR noklusējuma iestatījumu. Tas nav kopējais izpētes laiks; kopējais laiks ir atkarīgs arī no izpētes izmaksām, laboratoriju skaita, laboratorijas ātruma un moduļiem.
mir-enable-base-tech=Ļauj __1__ darboties tālāk par savu vaniļas vāciņu kā bezgalīgu tehnoloģiju. Atspējojiet šo, ja vēlaties, lai MIR pievienotu jaunas izpētes līnijas, nepagarinot šo vaniļas ķēdi.
mir-cost-base=Pētniecības vienības, kas nepieciešamas pirmajam MIR turpinājuma līmenim __1__. Iestatiet uz 0, lai pēc iespējas pārmantotu vaniļas ķēdes izmaksu modeli.
mir-cost-growth=Reizinātājs tiek lietots katram vēlākam MIR turpinājuma līmenim __1__. Iestatiet uz 0, lai pēc iespējas pārmantotu vaniļas ķēdes augšanas modeli.
mir-max-level=Augstākais MIR turpināšanas līmenis __1__. Iestatīt uz 0 bezgalīgiem līmeņiem.
mir-research-time=Sekundes uz vienu pētniecības vienību MIR turpinājumam __1__. Iestatiet uz 0, lai pēc iespējas mantotu vaniļas ķēdes izpētes vienības laiku.
mir-prefer-this-mod-for-competing-techs=Ja ir iespējots, šis modulis noņem atlasītos konkurējošos bezgalīgos paplašinājumus un izmanto savas versijas. Atspējot, lai saglabātu citu modifikāciju konkurējošās versijas.
mir-adjust-vanilla-weapon-speed-techs=Kontrolē, vai MIR no ģenerētā ieroča šaušanas ātruma turpinājuma noņem raķešu un lielgabala šāviņu ātruma bonusus, kad ir pieejams precīzs bezgalīgs nomaiņas pārklājums. Ierobežotās vaniļas ieroču šaušanas ātruma tehnoloģijas saglabā sākotnējos bonusus.
mir-use-installed-space-age-icons=Ja tas ir iespējots, MIR var atsaukties uz instalētiem oficiālajiem DLC ikonu failiem, tostarp Space Age un Elevated Rails, pat ja šie modi ir atspējoti pamata spēles palaišanai. Atstājiet šo opciju, ja šie DLC faili nav instalēti; Factorio nevar graciozi atgūties no trūkstošajiem ikonu failiem prototipa ielādes laikā.
mir-pipeline-extent-multiplier=Tikai palaišanas nolaižamā reizinātājs atpazītiem šķidruma kastes cauruļvadu apjoma laukiem visos prototipos, ne tikai cauruļu entītijās. 100% atstāj prototipus nemainīgus un neielādē cauruļvadu caurlaidi vai skenēšanas šķidruma kastes. Vērtības, kas nav 100%, ir eksperimentālas un var ietekmēt mašīnas, tvertnes, dzinējus un modificētos prototipus, kas nosaka šķidruma kastes.
mir-unrestricted-modules=Eksperimentāls un līdzsvara laušana. Ja iespējota, katra esošā recepte pieņem visus piecus moduļu efektus un katrs esošais moduļa uztvērējs ar slotiem pieņem katru atklāto moduļa kategoriju. Tas nepievieno moduļu slotus vai nemaina moduļu prototipus un var nodrošināt produktivitāti, kvalitāti un modificētu moduļu cilpas.
mir-prototype-productivity-cap=Izvēlas, vai MIR atstāj tikai receptes produktivitātes ierobežojumus vai ieraksta starta ierobežojumu katrai receptei, kas nav parametra un netiek pārstrādāta. +300% (nemainīts) saglabā esošos recepšu vāciņus; zemākas vērtības saīsina produktivitātes mērogošanu, bet augstākas vērtības to paplašina.
mir-recycling-return-chance=Kontrolē tikai slēptās ģenerētās otrreizējās pārstrādes receptes. Automātiskais režīms samazina parasto 25% materiāla atdevi līdz ne vairāk kā 1 dalītam ar kopējo izlaides reizinātāju pie atlasītās produktivitātes robežas. Fiksētās izvēles mērogs tieši tās pašas ģenerētās atdeves. Redzamie procesi un recepšu produktivitātes ierobežojumi nekad netiek mainīti.
mir-productivity-cap-self-recycling-only=Virs 1 / pārstrādātāja atgriešana — 1, tikai ražošanas receptēm ar pierādītu neģeneratīvu pašpārstrādes ceļu tiek izvēlēts augstāks ierobežojums. Ja šis slieksnis ir mazāks, šī izvēles rūtiņa neietekmē. Dzinējs bez izmaiņām izmanto parasto 25% atdevi kā konservatīvu +300% slieksni, nemainot pārstrādes receptes.
mir-prototype-efficiency-cap=Izvēlas, cik lielā mērā efektivitātes ietekme var samazināt iekārtas aktīvo enerģijas patēriņu. -80% (nemainīti) atstāj tikai esošos enerģijas patēriņa ierobežojumus. Padziļināti samazinājumi var tuvoties nullei aktīvās enerģijas patēriņam, nemainot piesārņojuma ierobežojumus.
mir-prototype-pollution-cap=Izvēlas, cik lielā mērā piesārņojuma samazināšanas efekti var samazināt mašīnu piesārņojumu. -80% (nemainīti) atstāj tikai esošās piesārņojuma robežas. Padziļināti samazinājumi var pietuvoties nullei piesārņojuma, nemainot enerģijas patēriņu.
mir-prototype-speed-floor=Izvēlas, cik lielā mērā negatīvie ātruma efekti var palēnināt atbalstīto iekārtu darbību. -80% (nemainīts) atstāj tikai esošos ierobežojumus; dziļākas vērtības noņem parasto grīdu līdz tuvu pieturai pie -99,99%.
mir-prototype-speed-cap=Izvēlas, vai MIR atstāj tikai mašīnas ātruma ietekmes ierobežojumus vai ieraksta jaunu pozitīvu ātruma ierobežojumu. +100000% (nemainīts) saglabā esošos ierobežojumus; zemākas vērtības apzināti saspiež ļoti lielus ātruma bonusus.
mir-prototype-quality-cap=Izvēlas, vai MIR atstāj tikai iekārtas kvalitātes un ietekmes ierobežojumus vai ieraksta jaunu pozitīvas kvalitātes ierobežojumu. +100000% (nemainīts) saglabā esošos ierobežojumus un nemaina kvalitātes līmeņus vai vienību varbūtības formulas.
mir-prototype-positive-power-floor=Noklusējums izslēgts. Kad tas ir iespējots, MIR prototipa ielādes laikā maina precīzos 0 W aktīvās enerģijas lietojuma prototipus uz 1 W, tāpēc mazjaudas brīdinājuma ikonas neparādās entītijām, kurām vajadzētu iegūt nelielu daudzumu, kas nav nulle. Atstājiet, lai precīzi saglabātu nulles jaudas prototipus.
mir-settings-profile-import=Ielīmējiet šeit MIR iestatījumu profila virkni, lai prototipa ģenerēšanas laikā lietotu eksportētās starta iestatījumu vērtības kā ignorēšanas slāni. Atstājiet tukšu parastajiem iestatījumiem. Eksportējiet ar /mir-settings-export no aktīvās saglabāšanas, pēc tam restartējiet pēc šīs vērtības maiņas.
mir-debug-generation-report=Kad iespējots, ieraksta vienu strukturētu žurnāla rindu katrā ģenerētajā vai izlaistajā straumē un bāzes paplašinājumā, tostarp zinātnes pakotnes, priekšnosacījumus, efektu skaitu, laboratorijas saderības statusu un ikonu avotu.
mir-debug-recipe-matches=Ja ir iespējots, katrai ģenerētajai produktivitātes straumei tiek ierakstīti atbilstoši recepšu nosaukumi. Tas var būt trokšņains lielos moduļu komplektos.
mir-debug-scripted-effects=Ja iespējots, tiek ierakstīti izpildlaika žurnāla ieraksti, kad skriptētās tehnoloģijas pārrēķina globālos vai notikumu vadītos efektus.
mir-lab-incompatibility-policy=Izvēlas, ko MIR darīt, ja atlasītās zinātnes pakotnes nevar izpētīt neviena aktīva laboratorija.
ips-effect-per-level-stream=Iestata primāro bāzes līmeņa efektu katram līmenim __1__. Saistītie vēlākie līmeņi un efekti tiek proporcionāli mērogoti. Procentuālie efekti izmanto procentu punktus; skaitīšanas un attāluma efekti izmanto savas vietējās vienības.
mir-effect-per-level=Iestata kanonisko pa līmeņu efektu bezgalīgajam __1__ turpinājumam. Saistītie efekti tiek mērogoti proporcionāli galīgajai vaniļas bāzes līnijai. Procentuālie efekti izmanto procentu punktus; skaitīšanas un attāluma efekti izmanto savas vietējās vienības.
mir-note-experimental-spoilage=Eksperimentāls un pēc noklusējuma atspējots versijā v2.1.0. Šis ir globāls/kartes mēroga skriptu efekts. Esošā sabojājamās steka darbība netiek pieprasīta, kamēr tā nav manuāli apstiprināta.
mir-note-agriculture-growth=Attiecas uz tikko stādītām lauksaimniecības torņu kultūrām. Esošās stādītās kultūras netiek atkārtoti mērogotas.
mir-note-cargo-pad-count=Īpašā kosmosa laikmeta loģistikas pētījumi. Palielina kravas nosēšanās paliktņus uz katru virsmu un var būtiski mainīt loģistikas līdzsvaru.
mir-note-inserter-capacity=Pēc noklusējuma atspējots. Papildu ievietošanas jauda var sabojāt ķēdes kontrolētos ievietošanas ierīces un samazināt dzinēja optimizāciju.
mir-note-native-owner-managed-stream=Ja šī izpētes saime jau pieder instalētai bezgalīgai tehnoloģijai, šie paši startēšanas iestatījumi konfigurē šo īpašnieku, nevis izveido dublikātu. Nemainīti MIR noklusējuma iestatījumi precīzi saglabā īpašnieka galīgo prototipu. Skaidras izmaksu, laika, maksimālā līmeņa un ietekmes ignorēšanas tiek piemērotas tikai pēc droša īpašnieka atbilstības; atspējojot straumi, ārējā tehnoloģija paliek neskarta. Pēc startēšanas iestatījumu maiņas restartējiet Factorio. Maksimālais līmenis 0 nozīmē bezgalīgu, un efekta vērtības ir procentu punkti katrā līmenī.

