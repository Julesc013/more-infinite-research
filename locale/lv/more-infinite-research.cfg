mir-prototype-speed-floor-saving-999=Atļaujiet negatīvus ātruma efektus līdz -99,9%, atstājot vismaz 0,1% ātrumu.
mir-prototype-speed-floor-saving-9999=Atļaujiet negatīvus ātruma efektus līdz -99,99%, kas ir zemākais Factorio prototipa ierobežojums. Tas ir gandrīz pieturas, nevis nulles vai negatīvs izstrādes ātrums.
