mir-prototype-efficiency-cap-engine-default=Atstājiet katras iekārtas enerģijas patēriņa efekta ierobežojumu. Mašīnas bez pielāgota ierobežojuma izmanto Factorio parasto -80% enerģijas patēriņa efekta ierobežojumu, tāpēc efekti nevar samazināt aktīvo izmantošanu zem 20%.
mir-prototype-efficiency-cap-saving-25=Uzrakstiet -25% enerģijas patēriņa ierobežojumu. Pēc enerģijas izmantošanas ietekmes aktīvais enerģijas patēriņš saglabājas 75% vai vairāk.
mir-prototype-efficiency-cap-saving-50=Uzrakstiet -50% enerģijas patēriņa ierobežojumu. Aktīvais enerģijas patēriņš paliek 50% vai vairāk pēc enerģijas patēriņa ietekmes atbalstītajās iekārtās.
mir-prototype-efficiency-cap-saving-75=Uzrakstiet -75% enerģijas patēriņa ierobežojumu. Aktīvais enerģijas patēriņš paliek 25% vai vairāk pēc enerģijas patēriņa ietekmes atbalstītajās iekārtās.
mir-prototype-efficiency-cap-saving-90=Uzrakstiet -90% enerģijas patēriņa ierobežojumu. Aktīvais enerģijas patēriņš var samazināties līdz 10%, kas ir zem parastās 20% grīdas.
mir-prototype-efficiency-cap-saving-95=Uzrakstiet -95% enerģijas patēriņa ierobežojumu. Aktīvās enerģijas patēriņš var samazināties līdz 5%.
mir-prototype-efficiency-cap-saving-99=Uzrakstiet -99% enerģijas patēriņa ierobežojumu. Aktīvās enerģijas patēriņš var samazināties līdz 1%.
mir-prototype-efficiency-cap-saving-999=Uzrakstiet -99,9% enerģijas patēriņa ierobežojumu. Aktīvās enerģijas patēriņš var samazināties līdz 0,1%.
mir-prototype-efficiency-cap-saving-9999=Uzrakstiet -99,99% enerģijas patēriņa ierobežojumu. Tas ir gandrīz nulles aktīvās enerģijas patēriņš, nevis nulles jaudas prototipa pārrakstīšana.
mir-prototype-pollution-cap-engine-default=Atstājiet katras iekārtas piesārņojuma ietekmes ierobežojumu. Mašīnās bez pielāgota ierobežojuma tiek izmantots Factorio parastais -80% piesārņojuma ierobežojums.
mir-prototype-pollution-cap-saving-25=Uzrakstiet -25% piesārņojuma vāciņu. Pēc piesārņojuma ietekmes piesārņojums saglabājas 75% vai vairāk.
mir-prototype-pollution-cap-saving-50=Uzrakstiet -50% piesārņojuma vāciņu. Pēc piesārņojuma ietekmes uz atbalstītajām mašīnām piesārņojums saglabājas 50% vai vairāk.
mir-prototype-pollution-cap-saving-75=Uzrakstiet -75% piesārņojuma vāciņu. Pēc piesārņojuma ietekmes uz atbalstītajām mašīnām piesārņojums saglabājas 25% vai vairāk.
mir-prototype-pollution-cap-saving-90=Uzrakstiet -90% piesārņojuma vāciņu. Piesārņojums var samazināties līdz 10%, kas ir zem parastā 20% līmeņa.
mir-prototype-pollution-cap-saving-95=Uzrakstiet -95% piesārņojuma vāciņu. Piesārņojums var samazināties līdz 5%.
mir-prototype-pollution-cap-saving-99=Uzrakstiet -99% piesārņojuma vāciņu. Piesārņojums var samazināties līdz 1%.
