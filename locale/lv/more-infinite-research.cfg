[technology-description]
more-infinite-research.recipe_productivity=Palielina recepšu produktivitāti atlasītajām receptēm. Joprojām ir spēkā Factorio maksimālās produktivitātes ierobežojums; papildu bezgalīgiem līmeņiem var nebūt praktiskas ietekmes, tiklīdz recepte ir sasniegusi maksimālo robežu.
more-infinite-research.direct_effect=Pievieno bezgalīgu atkārtojamu bonusu. Zinātnes pakotnes ir atlasītas no aktīvām laboratorijām, tāpēc tehnoloģija joprojām ir pētāma ar saderīgiem moduļu komplektiem.
more-infinite-research.cargo_bay_unloading_distance=Palielina maksimālo attālumu starp kravas nosēšanās laukumu un savienotajām izkraušanas vietām.
more-infinite-research.cargo_landing_pad_count=Palielina kravas nosēšanās paliktņu skaitu, ko katrs spēks var izveidot uz virsmas.
more-infinite-research.flamethrower_shooting_speed=Palielina liesmu metēju ieroču un liesmu metēju torņu šaušanas ātrumu.
more-infinite-research.electric_shooting_speed=Palielina šaušanas ātrumu elektriskajiem ieročiem. Vaniļā tas ietekmē izlādes aizsardzību; ar kosmosa laikmetu tas ietekmē arī Tesla ieročus, kad ir pieejama tesla munīcijas kategorija.
more-infinite-research.spoilage_preservation=Palielina globālo sabojāšanas laika modifikatoru, izmantojot ierobežotu skriptu efektu. Esošie sabojājamie priekšmeti var saglabāt pašreizējos sabojāšanas termiņus, līdz tie tiek pārbaudīti spēlē.
more-infinite-research.agricultural_growth_speed=Saīsina atlikušo augšanas laiku tikko iestādītiem lauksaimniecības torņu augiem, izmantojot ierobežotu skriptu efektu.
more-infinite-research.lab_productivity=Palielina pētniecības progresu, kas iegūts no katras patērētās zinātnes pakotnes, izmantojot vietējo laboratorijas pētījumu produktivitātes modifikatoru.

