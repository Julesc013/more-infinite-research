[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Neveic automātisku atklāšanu, pielikumu vai izveidi. MIR fiksētie pētījumi paliek nemainīgi.
mir-automatic-productivity-action-preview=Atklāj un klasificē kandidātus, pēc tam ieraksta pieņemtos un izlaistos lēmumus Factorio žurnālā. Tas nepievieno receptes un nerada pētījumus.
mir-automatic-productivity-action-apply=Noklusējums. Atklāj kandidātus un saderīgajiem esošajiem MIR pētījumiem pievieno tikai drošas receptes. Tas pats par sevi nerada pētniecību; abas zemāk esošās izvēles rūtiņas nosaka izveidi.
mir-automatic-compiler-mode-off=Mantojuma ekvivalents Disabled.
mir-automatic-compiler-mode-report=Priekšskatījuma izmaiņu mantotais ekvivalents.
mir-automatic-compiler-mode-safe-attach=Mantotais ekvivalents lietotnei Drošas izmaiņas ar atspējotu pētījumu izveidi.
mir-automatic-compiler-mode-exact-pack=Mantotais ekvivalents lietotnei Drošas izmaiņas, ja ir iespējota izpētes izveide un nepieciešami pārskatīti saderības dati.
mir-automatic-compiler-mode-safe-generate=Mantotais ekvivalents lietotnei Drošas izmaiņas ar iespējotu pētījumu izveidi reģistrētiem eksperimentālajiem pakalpojumu sniedzējiem.
mir-adjust-vanilla-weapon-speed-techs-off=Atspējot MIR papildu pārklāšanās raķešu/lielgabalu tīrīšanu.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Noņemiet MIR pārklājošos raķešu/lielgabalu bonusus tikai tad, ja iespējota, sasniedzama bezgalīga tehnoloģija nodrošina precīzu aizvietošanas efektu.
mir-adjust-vanilla-weapon-speed-techs-always=Vienmēr noņemiet MIR pārklājošos raķešu/lielgabalu bonusus. Izmantojiet tikai tad, ja vēlaties stingri nošķirt.
mir-science-pack-ingredient-policy-configured=Izmantojiet katras ģenerētās tehnoloģijas konfigurētās zinātnes pakotnes bez papildu sastāvdaļu paplašināšanas. MIR noklusējuma.
mir-science-pack-ingredient-policy-space=Pievienojiet kosmosa zinātni, ja iespējams. Vienkāršs grūtības pieaugums pēc raķetes.
mir-science-pack-ingredient-policy-space-and-promethium=Pievienojiet kosmosa un prometija zinātni, kad tas ir pieejams. Vispiemērotākais ļoti vēlā kosmosa laikmeta izpētes izlietnēm.
mir-science-pack-ingredient-policy-space-age-progression=Pievienojiet tikai Kosmosa laikmeta progresēšanas pakotnes, ko paredz atlasītās pakotnes. Nepievieno nesaistītus modificētus iepakojumus.
mir-science-pack-ingredient-policy-official-progression=Pievienojiet trūkstošos oficiālos priekšnoteikumu stila pakotnes, ko norāda jau atlasītā vismodernākā oficiālā pakotne.
mir-science-pack-ingredient-policy-mod-progression=Pievienojiet trūkstošās ar laboratoriju saderīgās pakotnes, kas izriet no modificētās zinātnes pakotnes progresēšanas, un atbloķējiet priekšnosacījumus.
mir-science-pack-ingredient-policy-all-official=Izmantojiet visas oficiālās bāzes un kosmosa laikmeta zinātnes pakotnes, kas pastāv pašreizējā moduļu komplektā.
mir-science-pack-ingredient-policy-all=Izmantojiet katru aktīvo ar laboratoriju saderīgo zinātnes pakotni, tostarp modificētās zinātnes pakotnes.
mir-lab-incompatibility-policy-reduce=Saglabājiet tehnoloģiju, samazinot tās zinātnes pakotnes līdz lielākajam komplektam, ko pieņem aktīva laboratorija. Drošākais noklusējums mod pakotnēm.
mir-lab-incompatibility-policy-skip=Izlaidiet tehnoloģiju, ja neviena aktīva laboratorija nevar izpētīt atlasīto zinātnisko komplektu komplektu. Stingrāka un vieglāk pārbaudāma.
mir-lab-incompatibility-policy-engine-default=Nekad nepārrakstiet atlasīto zinātnisko komplektu komplektu. MIR saglabā droši pētāmu kopu nemainīgu un izlaiž ģenerēto tehnoloģiju, ja Factorio nevar izpētīt šo precīzu kopu.
mir-prototype-productivity-cap-engine-default=Atstājiet katras receptes esošo produktivitātes ierobežojumu. Receptes bez pielāgota vāciņa izmanto Factorio parasto +300% produktivitātes bonusa ierobežojumu.
mir-prototype-productivity-cap-percent-25=Iestatiet neparametru receptes produktivitātes ierobežojumus uz +25%. Tas ir stingrs agrīnais ierobežojums.
mir-prototype-productivity-cap-percent-50=Recepšu produktivitātes ierobežojumus bez parametriem iestatiet uz +50%. Tas ir zemāks par normālo robežu, un produktivitātes pētījumi pārstāj palīdzēt ātrāk.
mir-prototype-productivity-cap-percent-75=Iestatiet neparametru receptes produktivitātes ierobežojumus uz +75%. Tas ir zemāks par normālo robežu, un produktivitātes pētījumi pārstāj palīdzēt ātrāk.
mir-prototype-productivity-cap-percent-100=Iestatiet neparametru receptes produktivitātes ierobežojumus uz +100%. Tas ir zemāks par normālo robežu, un produktivitātes pētījumi pārstāj palīdzēt ātrāk.
mir-prototype-productivity-cap-percent-125=Iestatiet neparametru receptes produktivitātes ierobežojumus uz +125%.
mir-prototype-productivity-cap-percent-150=Iestatiet neparametru receptes produktivitātes ierobežojumus uz +150%.
mir-prototype-productivity-cap-percent-200=Iestatiet neparametru receptes produktivitātes ierobežojumus uz +200%. Tas ir zemāks par normālo robežu, un produktivitātes pētījumi pārstāj palīdzēt ātrāk.
mir-prototype-productivity-cap-percent-250=Iestatiet neparametru receptes produktivitātes ierobežojumus uz +250%. Tas ir nedaudz zem parastā vāciņa.
mir-prototype-productivity-cap-percent-400=Iestatiet neparametru receptes produktivitātes ierobežojumus uz +400%. Tas paplašina produktivitātes mērogošanu, pārsniedzot parasto ierobežojumu.
mir-prototype-productivity-cap-percent-500=Iestatiet neparametru receptes produktivitātes ierobežojumus uz +500%. Tas paplašina produktivitātes mērogošanu, pārsniedzot parasto ierobežojumu.
mir-prototype-productivity-cap-percent-750=Iestatiet neparametru receptes produktivitātes ierobežojumus uz +750%.
mir-prototype-productivity-cap-percent-1000=Iestatiet neparametru receptes produktivitātes ierobežojumus uz +1000%. Izmantojiet ilgstošai ietaupīšanai, kur produktivitātes pētījumiem vajadzētu būt nozīmīgiem.
mir-prototype-productivity-cap-percent-2500=Iestatiet neparametru receptes produktivitātes ierobežojumus uz +2500%. Izmantojiet ļoti ilgi saglabāšanai.
mir-prototype-productivity-cap-percent-5000=Iestatiet neparametru receptes produktivitātes ierobežojumus uz +5000%.
mir-prototype-productivity-cap-percent-10000=Iestatiet neparametru receptes produktivitātes ierobežojumus uz +10000%. Izmantojiet tikai ļoti ilgstošai mērogošanas samazināšanai.
mir-prototype-productivity-cap-percent-25000=Iestatiet bezparametru receptes produktivitātes ierobežojumus uz +25000%. Izmantojiet tikai ļoti ilgstošai mērogošanas samazināšanai.
mir-prototype-productivity-cap-percent-100000=Iestatiet neparametru receptes produktivitātes ierobežojumus uz +100000%. Lielākajai daļai ietaupījumu tas ir efektīvi neierobežots.
mir-recycling-return-chance-engine-default=Atstājiet visas pārstrādes receptes nemainīgas.
mir-recycling-return-chance-match-productivity-cap=Ekspluatācijai droša automātiska samazināšana slēptām ģenerētām otrreizējās pārstrādes receptēm. Izmanto 1 / (1 + produktivitātes bonuss), nepārsniedzot parasto 25% atdevi: +400% kļūst par 20%, un +1000% kļūst par aptuveni 9,09%.
mir-recycling-return-chance-percent-25=Saglabājiet slēptās ģenerētās otrreizējās pārstrādes receptes ar parasto 25% materiāla atdevi.
mir-recycling-return-chance-percent-20=Mērogojiet slēptās ģenerētās otrreizējās pārstrādes receptes līdz 20% materiāla atdevei.
