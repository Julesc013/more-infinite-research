[mod-setting-description]
ips-require-space-gate=Indien ingeschakeld, blijven deze technologieën vergrendeld totdat ruimtewetenschap wordt onderzocht in vanilla, of promethiumwetenschap wordt onderzocht in Space Age.
mir-science-pack-ingredient-policy=Kiest hoe MIR wetenschapspakketten toevoegt aan gegenereerde technologieën. De opties zijn gerangschikt van conservatief naar breed: standaardpakketten, late-game-pakketten, op voortgang gebaseerde pakketten en vervolgens alle beschikbare pakketten.
mir-automatic-productivity-action=Kiest wat MIR doet met veilige productiviteitsmogelijkheden die te vinden zijn in geïnstalleerde mod-recepten. Uitgeschakeld voert geen automatische detectie uit. Bekijk een voorbeeld van de wijzigingen in de geaccepteerde en overgeslagen kandidaten in het Factorio-logboek zonder het onderzoek te wijzigen. Veilige wijzigingen toepassen (standaard) voegt in aanmerking komende recepten alleen toe aan compatibel bestaand MIR-onderzoek. Dit bepaalt de actie, niet de kracht of volwassenheid; De onderstaande selectievakjes voor het aanmaken zijn afzonderlijk. Controles op eigendom, recycling, waarschijnlijkheid, katalysator, wetenschap, laboratorium, voorwaarde, doel, identiteit, voortgang en cyclus zijn altijd van toepassing.
mir-automatic-create-research=Standaard: uit. Off-limits Pas veilige veranderingen toe op compatibel bestaand MIR-onderzoek; kandidaten zonder geschikte stream worden overgeslagen en gerapporteerd. Met On kan een in aanmerking komende geregistreerde aanbieder één stabiele generieke technologie voor oneindige productiviteit creëren wanneer bestaand onderzoek niet past. Met het onderstaande selectievakje voor gecontroleerde gegevens wordt bepaald of experimentele aanbieders in aanmerking komen. MIR creëert nooit één technologie per mod of recept, en elke harde veiligheid, wetenschap, eigendom, identiteit, progressie en cycluspoort is nog steeds van toepassing.
mir-automatic-require-reviewed-data=Standaard: aan. Dit is alleen van belang als Nieuw onderzoek toestaan ​​is ingeschakeld; het blokkeert nooit een veilige gehechtheid aan bestaand onderzoek. Op vergunningen zijn alleen families van aanbieders gemarkeerd als beoordeeld en ondersteund door toepasselijk bewijs van de exacte versie, dus experimentele families worden overgeslagen. Off staat geregistreerde experimentele aanbieders toe om te creëren op basis van generiek structureel bewijs. Voor het breedste experimentele gedrag schakelt u het maken van onderzoek in en schakelt u deze vereiste uit. Geen enkele waarde kan een harde veiligheidspoort omzeilen.
mir-automatic-compiler-mode=Verborgen compatibiliteitsbrug voor profielen die zijn gemaakt vóór de gesplitste automatische productiviteitsbesturing. Een niet-standaard verouderde waarde wordt alleen gehonoreerd zolang alle nieuwe besturingselementen op hun standaardwaarden blijven staan. Wijzig elk nieuw besturingselement om expliciete besturing over te nemen.
ips-enable-stream=Creëert de gegenereerde oneindige technologie voor __1__ wanneer de recepten, effecten, vereisten en wetenschapspakketten beschikbaar zijn. Schakel dit uit om te voorkomen dat MIR deze technologie genereert.
ips-cost-base-stream=Onderzoekseenheden vereist voor het eerste gegenereerde niveau van __1__. Moet minimaal 1 zijn. Latere niveaus worden berekend op basis van deze waarde en de kostengroeifactor.
ips-cost-growth-stream=Vermenigvuldiger toegepast op elk hoger niveau van __1__. Gebruik 1 voor vaste kosten, 1,5 voor 50% groei per niveau, of 2 voor verdubbeling van de kosten.
ips-max-level-stream=Hoogst gegenereerde niveau voor __1__. Stel in op 0 voor oneindige niveaus.
ips-research-time-stream=Seconden per onderzoekseenheid voor __1__. Stel deze in op 0 om de standaardwaarde van MIR voor deze technologie te gebruiken. Dit is niet de totale onderzoekstijd; De totale tijd is ook afhankelijk van de onderzoekskosten, het laboratoriumaantal, de laboratoriumsnelheid en de modules.
mir-enable-base-tech=Zorgt ervoor dat __1__ voorbij zijn vanillegrens kan blijven als een oneindige technologie. Schakel dit uit als je wilt dat MIR nieuwe onderzoekslijnen toevoegt zonder deze vanilleketen uit te breiden.
mir-cost-base=Onderzoekseenheden vereist voor het eerste MIR-vervolgniveau van __1__. Stel deze in op 0 om indien mogelijk het kostenpatroon van de vanilleketen over te nemen.
mir-cost-growth=Multiplier toegepast op elk later MIR-vervolgniveau van __1__. Stel deze in op 0 om indien mogelijk het groeipatroon van de vanilleketen over te nemen.
mir-max-level=Hoogste MIR-vervolgniveau voor __1__. Stel in op 0 voor oneindige niveaus.
mir-research-time=Seconden per onderzoekseenheid voor de MIR-vervolging van __1__. Stel deze in op 0 om indien mogelijk de onderzoekseenheidtijd van de vanilleketen over te nemen.
mir-prefer-this-mod-for-competing-techs=Indien ingeschakeld, verwijdert deze mod geselecteerde concurrerende oneindige extensies en gebruikt zijn eigen versies. Schakel uit om concurrerende versies van andere mods te behouden.
mir-adjust-vanilla-weapon-speed-techs=Bepaalt of MIR snelheidsbonussen voor raketten en kanonnen verwijdert uit de voortzetting van de gegenereerde wapenschietsnelheid wanneer er een exacte oneindige vervangingsdekking beschikbaar is. Eindige vanillewapen-schietsnelheidstechnologieën behouden hun oorspronkelijke bonussen.
mir-use-installed-space-age-icons=Indien ingeschakeld, kan MIR verwijzen naar geïnstalleerde officiële DLC-pictogrambestanden, waaronder Space Age en Elevated Rails, zelfs als deze mods zijn uitgeschakeld voor een basisgame. Laat dit uitgeschakeld als die DLC-bestanden niet zijn geïnstalleerd; Factorio kan tijdens het laden van het prototype niet correct herstellen van ontbrekende pictogrambestanden.
mir-pipeline-extent-multiplier=Alleen opstartvermenigvuldiger voor vervolgkeuzelijsten voor erkende Fluid Box-pijplijnuitbreidingsvelden voor prototypes, niet alleen voor pijpentiteiten. 100% laat prototypes ongewijzigd en laadt de pijpleidingpassage niet en scant geen vloeistofboxen. Niet-100% waarden zijn experimenteel en kunnen van invloed zijn op machines, tanks, stuwraketten en aangepaste prototypes die vloeistofkasten definiëren.
mir-unrestricted-modules=Experimenteel en balansbrekend. Indien ingeschakeld accepteert elk bestaand recept alle vijf module-effecten en accepteert elke bestaande module-ontvanger met slots elke ontdekte modulecategorie. Hierdoor worden geen moduleslots toegevoegd of moduleprototypes gewijzigd, en kunnen productiviteit, kwaliteit en aangepaste modulelussen mogelijk worden gemaakt.
mir-prototype-productivity-cap=Kiest of MIR de productiviteitslimieten voor recepten met rust laat of een opstartlimiet schrijft voor elk recept zonder parameters en zonder recycling. +300% (onveranderd) behoudt bestaande receptlimieten; Lagere waarden verkorten de schaalvergroting van de productiviteit, terwijl hogere waarden deze verlengen.
mir-recycling-return-chance=Beheert alleen verborgen gegenereerde recyclingrecepten. De automatische modus reduceert de normale materiaalopbrengst van 25% tot maximaal 1 gedeeld door de totale uitvoervermenigvuldiger bij de geselecteerde productiviteitslimiet. Vaste keuzes schalen hetzelfde gegenereerde rendement direct. Zichtbare processen en receptproductiviteitslimieten worden nooit gewijzigd.
mir-productivity-cap-self-recycling-only=Boven 1 / recyclerretour - 1 ontvangen alleen productierecepten met een bewezen niet-generatief zelfrecyclingpad de geselecteerde hogere limiet. Op of onder die drempel heeft dit selectievakje geen effect. Engine ongewijzigd gebruikt het normale rendement van 25% als een conservatieve drempel van +300% zonder de recyclingrecepten te wijzigen.
mir-prototype-efficiency-cap=Kiest in hoeverre efficiëntie-effecten het actieve energieverbruik van de machine kunnen verminderen. -80% (onveranderd) laat de bestaande limieten voor energieverbruik ongewijzigd. Diepere reducties kunnen het actieve energieverbruik van nul benaderen zonder de vervuilingslimieten te veranderen.
mir-prototype-pollution-cap=Kiest in hoeverre de effecten van vervuilingsvermindering de machinevervuiling kunnen verminderen. -80% (onveranderd) laat de bestaande vervuilingslimieten met rust. Diepere reducties kunnen nul vervuiling benaderen zonder het energieverbruik te veranderen.
mir-prototype-speed-floor=Kiest in hoeverre negatieve snelheidseffecten ondersteunde machines kunnen vertragen. -80% (onveranderd) laat bestaande limieten met rust; diepere waarden verwijderen de normale vloer tot een bijna-stop van -99,99%.
mir-prototype-speed-cap=Kiest of MIR de snelheidseffectlimieten van de machine met rust laat of een nieuwe positieve snelheidslimiet schrijft. +100.000% (onveranderd) behoudt bestaande limieten; lagere waarden beperken opzettelijk zeer grote snelheidsbonussen.
mir-prototype-quality-cap=Kiest of MIR de limieten voor het effect van de machinekwaliteit met rust laat of een nieuwe positieve kwaliteitslimiet schrijft. +100.000% (onveranderd) behoudt bestaande limieten en verandert niets aan kwaliteitsniveaus of itemwaarschijnlijkheidsformules.
mir-prototype-positive-power-floor=Standaard uitgeschakeld. Indien ingeschakeld, verandert MIR expliciete 0W actieve energiegebruiksprototypes naar 1W tijdens het laden van het prototype, zodat waarschuwingspictogrammen voor laag energieverbruik niet verschijnen op entiteiten die een klein bedrag niet-nul zouden moeten trekken. Laat dit achterwege om de nul-vermogen-prototypes precies te behouden.
mir-settings-profile-import=Plak hier een MIR-instellingenprofielreeks om geëxporteerde waarden voor opstartinstellingen toe te passen als overschrijvingslaag tijdens het genereren van prototypes. Laat dit leeg voor normale instellingen. Exporteer met /mir-settings-export vanuit een actieve opslag en start vervolgens opnieuw nadat u deze waarde hebt gewijzigd.
mir-debug-generation-report=Indien ingeschakeld, schrijft dit één gestructureerde logboekrij per gegenereerde of overgeslagen stream en basisextensie, inclusief wetenschapspakketten, vereisten, aantal effecten, laboratoriumcompatibiliteitsstatus en pictogrambron.
mir-debug-recipe-matches=Indien ingeschakeld, worden overeenkomende receptnamen geschreven voor elke gegenereerde productiviteitsstroom. Dit kan luidruchtig zijn in grote mod-pakketten.
mir-debug-scripted-effects=Indien ingeschakeld, worden runtime-logboekvermeldingen geschreven wanneer scripttechnologieën globale of gebeurtenisgestuurde effecten opnieuw berekenen.
mir-lab-incompatibility-policy=Kiest wat MIR doet als de geselecteerde wetenschapspakketten niet door een actief laboratorium kunnen worden onderzocht.
ips-effect-per-level-stream=Stelt het primaire basisniveau-effect per niveau in voor __1__. Gerelateerde latere niveaus en effecten worden proportioneel geschaald. Percentage-effecten maken gebruik van procentpunten; tel- en afstandseffecten gebruiken hun oorspronkelijke eenheden.
mir-effect-per-level=Stelt het canonieke effect per niveau in voor de oneindige __1__ voortzetting. Gerelateerde effecten worden proportioneel geschaald vanaf de uiteindelijke vanille-basislijn. Percentage-effecten maken gebruik van procentpunten; tel- en afstandseffecten gebruiken hun oorspronkelijke eenheden.
mir-note-experimental-spoilage=Experimenteel en standaard uitgeschakeld in v2.1.0. Dit is een globaal/kaartbreed scripteffect. Bestaand bederfbaar stapelgedrag wordt pas geclaimd nadat het handmatig is gevalideerd.
mir-note-agriculture-growth=Geldt voor nieuw geplante landbouwtorengewassen. Bestaande geplante gewassen worden niet herschaald.
mir-note-cargo-pad-count=Speciaal logistiek onderzoek in de Space Age. Verhoogt de landingsplaatsen voor vracht per oppervlak en kan de logistieke balans aanzienlijk veranderen.
mir-note-inserter-capacity=Standaard uitgeschakeld. Extra capaciteit van de inserter kan circuitgestuurde inserters kapot maken en motoroptimalisaties verminderen.
mir-note-native-owner-managed-stream=Als een geïnstalleerde oneindige technologie al eigenaar is van deze onderzoeksfamilie, configureren dezelfde opstartinstellingen die eigenaar in plaats van een duplicaat te maken. Ongewijzigde MIR-standaardwaarden behouden het uiteindelijke prototype van de eigenaar exact. Expliciete overschrijvingen van kosten, tijd, maximumniveau en effect zijn alleen van toepassing na een veilige eigenaarmatch; het uitschakelen van de stream laat de externe technologie onaangeroerd. Start Factorio opnieuw nadat u de opstartinstellingen hebt gewijzigd. Een maximaal niveau van 0 betekent oneindig, en effectwaarden zijn procentpunten per niveau.

