[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Voert geen automatische detectie, bijlage of creatie uit. Het vaste onderzoek van MIR blijft ongewijzigd.
mir-automatic-productivity-action-preview=Ontdekt en classificeert kandidaten en schrijft vervolgens geaccepteerde en overgeslagen beslissingen naar het Factorio-logboek. Het voegt geen recepten toe en creëert geen onderzoek.
mir-automatic-productivity-action-apply=Standaard. Ontdekt kandidaten en koppelt alleen op veiligheid bewezen recepten aan compatibel bestaand MIR-onderzoek. Het creëert op zichzelf geen onderzoek; de twee onderstaande selectievakjes bepalen de creatie.
mir-automatic-compiler-mode-off=Verouderd equivalent van uitgeschakeld.
mir-automatic-compiler-mode-report=Verouderd equivalent van voorbeeldwijzigingen.
mir-automatic-compiler-mode-safe-attach=Verouderd equivalent van Veilige wijzigingen toepassen terwijl het maken van onderzoek is uitgeschakeld.
mir-automatic-compiler-mode-exact-pack=Verouderd equivalent van Veilige wijzigingen toepassen met ingeschakelde onderzoekscreatie en beoordeelde compatibiliteitsgegevens vereist.
mir-automatic-compiler-mode-safe-generate=Verouderd equivalent van Veilige wijzigingen toepassen met het maken van onderzoek ingeschakeld voor geregistreerde experimentele aanbieders.
mir-adjust-vanilla-weapon-speed-techs-off=Schakel de optionele overlappende raket-/kanonbonusopruiming van MIR uit.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Verwijder de overlappende raket-/kanonbonussen van MIR alleen als een ingeschakelde, bereikbare oneindige technologie het exacte vervangingseffect biedt.
mir-adjust-vanilla-weapon-speed-techs-always=Verwijder altijd de overlappende raket-/kanonbonussen van MIR. Gebruik dit alleen als u een strikte scheiding wenst.
mir-science-pack-ingredient-policy-configured=Gebruik de geconfigureerde wetenschapspakketten van elke gegenereerde technologie zonder optionele ingrediëntenuitbreiding. MIR-standaard.
mir-science-pack-ingredient-policy-space=Voeg ruimtewetenschap toe indien beschikbaar. Een eenvoudige toename van de moeilijkheidsgraad na de raket.
mir-science-pack-ingredient-policy-space-and-promethium=Voeg ruimte en promethiumwetenschap toe indien beschikbaar. Het beste voor zeer late onderzoeksputten uit het ruimtetijdperk.
mir-science-pack-ingredient-policy-space-age-progression=Voeg alleen Space Age-voortgangspakketten toe die worden geïmpliceerd door de geselecteerde pakketten. Voegt geen niet-gerelateerde aangepaste pakketten toe.
mir-science-pack-ingredient-policy-official-progression=Voeg ontbrekende officiële pakketten in vereiste stijl toe die worden geïmpliceerd door het meest geavanceerde officiële pakket dat al is geselecteerd.
mir-science-pack-ingredient-policy-mod-progression=Voeg ontbrekende laboratorium-compatibele pakketten toe die zijn afgeleid van de voortgang van aangepaste wetenschapspakketten en ontgrendel de vereisten.
mir-science-pack-ingredient-policy-all-official=Gebruik elk officieel basis- en Space Age-wetenschapspakket dat in de huidige mod-set bestaat.
mir-science-pack-ingredient-policy-all=Gebruik elk actief laboratorium-compatibel wetenschapspakket, inclusief aangepaste wetenschapspakketten.
mir-lab-incompatibility-policy-reduce=Behoud de technologie door de wetenschapspakketten terug te brengen tot de grootste set die door een actief laboratorium wordt geaccepteerd. Veiligste standaard voor mod-pakketten.
mir-lab-incompatibility-policy-skip=Sla de technologie over als geen enkel actief laboratorium de geselecteerde wetenschapspakketset kan onderzoeken. Strenger en gemakkelijker te controleren.
mir-lab-incompatibility-policy-engine-default=Herschrijf nooit de geselecteerde science-pack-set. MIR bewaart een veilig onderzoekbare set onveranderd en laat de gegenereerde technologie weg wanneer Factorio die exacte set niet kan onderzoeken.
mir-prototype-productivity-cap-engine-default=Laat de bestaande productiviteitslimiet van elk recept met rust. Recepten zonder aangepaste limiet maken gebruik van Factorio's normale productiviteitsbonuslimiet van +300%.
mir-prototype-productivity-cap-percent-25=Stel productiviteitslimieten voor recepten zonder parameters in op +25%. Dit is een strikte early cap.
mir-prototype-productivity-cap-percent-50=Stel productiviteitslimieten voor recepten zonder parameters in op +50%. Dit ligt onder de normale limiet en zorgt ervoor dat productiviteitsonderzoek eerder stopt met helpen.
mir-prototype-productivity-cap-percent-75=Stel productiviteitslimieten voor recepten zonder parameters in op +75%. Dit ligt onder de normale limiet en zorgt ervoor dat productiviteitsonderzoek eerder stopt met helpen.
mir-prototype-productivity-cap-percent-100=Stel productiviteitslimieten voor recepten zonder parameters in op +100%. Dit ligt onder de normale limiet en zorgt ervoor dat productiviteitsonderzoek eerder stopt met helpen.
mir-prototype-productivity-cap-percent-125=Stel productiviteitslimieten voor recepten zonder parameters in op +125%.
mir-prototype-productivity-cap-percent-150=Stel productiviteitslimieten voor recepten zonder parameters in op +150%.
mir-prototype-productivity-cap-percent-200=Stel productiviteitslimieten voor recepten zonder parameters in op +200%. Dit ligt onder de normale limiet en zorgt ervoor dat productiviteitsonderzoek eerder stopt met helpen.
mir-prototype-productivity-cap-percent-250=Stel productiviteitslimieten voor recepten zonder parameters in op +250%. Dit ligt iets onder de normale limiet.
mir-prototype-productivity-cap-percent-400=Stel productiviteitslimieten voor recepten zonder parameters in op +400%. Dit breidt de productiviteitsschaal uit tot buiten de normale limiet.
mir-prototype-productivity-cap-percent-500=Stel productiviteitslimieten voor recepten zonder parameters in op +500%. Dit breidt de productiviteitsschaal uit tot buiten de normale limiet.
mir-prototype-productivity-cap-percent-750=Stel productiviteitslimieten voor recepten zonder parameters in op +750%.
mir-prototype-productivity-cap-percent-1000=Stel productiviteitslimieten voor recepten zonder parameters in op +1000%. Gebruik deze voor langere opslagperiodes waarbij productiviteitsonderzoek er toe moet blijven doen.
mir-prototype-productivity-cap-percent-2500=Stel productiviteitslimieten voor recepten zonder parameters in op +2500%. Gebruik voor zeer lange opslag.
mir-prototype-productivity-cap-percent-5000=Stel productiviteitslimieten voor recepten zonder parameters in op +5000%.
mir-prototype-productivity-cap-percent-10000=Stel productiviteitslimieten voor recepten zonder parameters in op +10.000%. Alleen gebruiken voor extreme schaalvergroting op lange termijn.
mir-prototype-productivity-cap-percent-25000=Stel productiviteitslimieten voor recepten zonder parameters in op +25000%. Alleen gebruiken voor extreme schaalvergroting op lange termijn.
mir-prototype-productivity-cap-percent-100000=Stel productiviteitslimieten voor recepten zonder parameters in op +100.000%. Voor de meeste saves is dit in feite onbeperkt.
mir-recycling-return-chance-engine-default=Laat elk recyclingrecept ongewijzigd.
mir-recycling-return-chance-match-productivity-cap=Exploitveilige automatische reductie voor verborgen gegenereerde recyclingrecepten. Gebruikt 1 / (1 + productiviteitsbonus), begrensd op het normale rendement van 25%: +400% wordt 20% en +1000% wordt ongeveer 9,09%.
mir-recycling-return-chance-percent-25=Bewaar verborgen gegenereerde recyclingrecepten met de normale materiaalretour van 25%.
mir-recycling-return-chance-percent-20=Schaal verborgen gegenereerde recyclingrecepten op tot een materiaalrendement van 20%.
mir-recycling-return-chance-percent-15=Schaal verborgen gegenereerde recyclingrecepten op tot een materiaalrendement van 15%.
mir-recycling-return-chance-percent-12-5=Schaal verborgen gegenereerde recyclingrecepten op tot een materiaalrendement van 12,5%.
mir-recycling-return-chance-percent-10=Schaal verborgen gegenereerde recyclingrecepten op tot een materiaalrendement van 10%.
mir-recycling-return-chance-percent-7-5=Schaal verborgen gegenereerde recyclingrecepten op tot een materiaalrendement van 7,5%.
mir-recycling-return-chance-percent-5=Schaal verborgen gegenereerde recyclingrecepten op tot een materiaalrendement van 5%.
mir-recycling-return-chance-percent-2-5=Schaal verborgen gegenereerde recyclingrecepten op tot een materiaalrendement van 2,5%.
mir-recycling-return-chance-percent-1=Schaal verborgen gegenereerde recyclingrecepten op tot een materiaalrendement van 1%.
mir-recycling-return-chance-percent-0-5=Schaal verborgen gegenereerde recyclingrecepten op tot een materiaalrendement van 0,5%.
mir-recycling-return-chance-percent-0-1=Schaal verborgen gegenereerde recyclingrecepten op tot een materiaalrendement van 0,1%.
mir-prototype-efficiency-cap-engine-default=Laat de limiet voor het energieverbruik van elke machine ongemoeid. Machines zonder aangepaste limiet gebruiken Factorio's normale effectlimiet van -80% voor energieverbruik, dus effecten kunnen het actieve gebruik niet onder de 20% verminderen.
mir-prototype-efficiency-cap-saving-25=Schrijf een limiet voor energieverbruik van -25%. Het actieve energieverbruik blijft na energieverbruikseffecten 75% of meer.
mir-prototype-efficiency-cap-saving-50=Schrijf een limiet voor energieverbruik van -50%. Het actieve energieverbruik blijft op 50% of meer na de effecten van het energieverbruik op ondersteunde machines.
mir-prototype-efficiency-cap-saving-75=Schrijf een energieverbruikslimiet van -75%. Het actieve energieverbruik blijft op 25% of meer na de effecten van het energieverbruik op ondersteunde machines.
mir-prototype-efficiency-cap-saving-90=Schrijf een energieverbruikslimiet van -90%. Het actieve energieverbruik kan dalen tot 10%, wat onder de normale grens van 20% ligt.
mir-prototype-efficiency-cap-saving-95=Schrijf een energieverbruikslimiet van -95%. Het actieve energieverbruik kan dalen tot 5%.
mir-prototype-efficiency-cap-saving-99=Schrijf een limiet voor energieverbruik van -99%. Het actieve energieverbruik kan dalen tot 1%.
mir-prototype-efficiency-cap-saving-999=Schrijf een energieverbruikslimiet van -99,9%. Het actieve energieverbruik kan dalen tot 0,1%.
mir-prototype-efficiency-cap-saving-9999=Schrijf een energieverbruikslimiet van -99,99%. Dit is een bijna nul-actief energieverbruik, geen herschrijving van een prototype met nulvermogen.
mir-prototype-pollution-cap-engine-default=Laat de limiet voor het vervuilingseffect van elke machine ongemoeid. Machines zonder aangepaste limiet gebruiken Factorio's normale limiet voor vervuilingseffecten van -80%.
mir-prototype-pollution-cap-saving-25=Schrijf een vervuilingslimiet van -25%. De vervuiling blijft 75% of meer na de vervuilingseffecten.
mir-prototype-pollution-cap-saving-50=Schrijf een vervuilingslimiet van -50%. De vervuiling blijft 50% of meer na vervuilingseffecten op ondersteunde machines.
mir-prototype-pollution-cap-saving-75=Schrijf een vervuilingslimiet van -75%. De vervuiling blijft 25% of meer na vervuilingseffecten op ondersteunde machines.
mir-prototype-pollution-cap-saving-90=Schrijf een vervuilingslimiet van -90%. De vervuiling kan dalen tot 10%, wat onder de normale grens van 20% ligt.
mir-prototype-pollution-cap-saving-95=Schrijf een vervuilingslimiet van -95%. De vervuiling kan dalen tot 5%.
mir-prototype-pollution-cap-saving-99=Schrijf een vervuilingslimiet van -99%. De vervuiling kan dalen tot 1%.
mir-prototype-pollution-cap-saving-999=Schrijf een vervuilingslimiet van -99,9%. De vervuiling kan dalen tot 0,1%.
mir-prototype-pollution-cap-saving-9999=Schrijf een vervuilingslimiet van -99,99%. Dit is bijna geen vervuiling, geen runtime-vervuilingsscript.
mir-prototype-speed-floor-engine-default=Laat de negatieve snelheidslimiet van elke machine met rust. Machines zonder aangepaste limiet gebruiken Factorio's normale -80% vloer en behouden een snelheid van minimaal 20%.
mir-prototype-speed-floor-saving-25=Negatieve snelheidseffecten beperken tot -25%, waarbij een snelheid van ten minste 75% overblijft.
mir-prototype-speed-floor-saving-50=Negatieve snelheidseffecten beperken tot -50%, waarbij een snelheid van ten minste 50% overblijft.
mir-prototype-speed-floor-saving-75=Negatieve snelheidseffecten beperken tot -75%, waarbij een snelheid van ten minste 25% overblijft.
mir-prototype-speed-floor-saving-90=Sta negatieve snelheidseffecten toe tot -90%, waarbij een snelheid van minimaal 10% overblijft.
mir-prototype-speed-floor-saving-95=Sta negatieve snelheidseffecten toe tot -95%, waarbij een snelheid van minimaal 5% overblijft.
mir-prototype-speed-floor-saving-99=Sta negatieve snelheidseffecten toe tot -99%, waarbij een snelheid van minimaal 1% overblijft.
mir-prototype-speed-floor-saving-999=Sta negatieve snelheidseffecten toe tot -99,9%, waarbij een snelheid van minimaal 0,1% overblijft.
mir-prototype-speed-floor-saving-9999=Sta negatieve snelheidseffecten toe tot -99,99%, de laagste Factorio-prototypelimiet. Dit is een bijna-stop, geen nul of negatieve crafting-snelheid.
mir-prototype-speed-cap-engine-default=Laat de snelheidslimiet van elke machine ongemoeid. Machines zonder aangepaste limiet gebruiken Factorio's zeer hoge snelheidseffectplafond van +100.000%.
mir-prototype-speed-cap-bonus-25=Klem positieve snelheidseffecten op +25%.
mir-prototype-speed-cap-bonus-50=Klem positieve snelheidseffecten op +50%. Gebruik dit om snelheidsbonussen strak begrensd te houden.
mir-prototype-speed-cap-bonus-75=Klem positieve snelheidseffecten op +75%.
mir-prototype-speed-cap-bonus-100=Klem positieve snelheidseffecten op +100%.
mir-prototype-speed-cap-bonus-125=Klem positieve snelheidseffecten op +125%.
mir-prototype-speed-cap-bonus-150=Klem positieve snelheidseffecten op +150%.
mir-prototype-speed-cap-bonus-200=Klem positieve snelheidseffecten op +200%.
mir-prototype-speed-cap-bonus-250=Klem positieve snelheidseffecten op +250%.
mir-prototype-speed-cap-bonus-300=Klem positieve snelheidseffecten op +300%.
mir-prototype-speed-cap-bonus-400=Klem positieve snelheidseffecten op +400%.
mir-prototype-speed-cap-bonus-500=Klem positieve snelheidseffecten op +500%.
mir-prototype-speed-cap-bonus-750=Klem positieve snelheidseffecten op +750%.
mir-prototype-speed-cap-bonus-1000=Klem positieve snelheidseffecten op +1000%.
mir-prototype-speed-cap-bonus-2500=Klem positieve snelheidseffecten op +2500%.
mir-prototype-speed-cap-bonus-5000=Klem positieve snelheidseffecten op +5000%.
mir-prototype-speed-cap-bonus-10000=Klem positieve snelheidseffecten op +10.000%.
mir-prototype-speed-cap-bonus-25000=Klem positieve snelheidseffecten op +25.000%.
mir-prototype-speed-cap-bonus-100000=Schrijf Factorio's maximale snelheidseffectplafond expliciet. In tegenstelling tot ongewijzigd overschrijft dit aangepaste ondergrenzen.
mir-prototype-quality-cap-engine-default=Laat de kwaliteitseffectlimiet van elke machine ongemoeid. Machines zonder aangepaste limiet gebruiken Factorio's zeer hoge kwaliteitseffectplafond van +100.000%.
