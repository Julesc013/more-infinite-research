[technology-description]
more-infinite-research.recipe_productivity=Verhoogt de receptproductiviteit voor de geselecteerde recepten. De maximale productiviteitslimiet van Factorio is nog steeds van toepassing; Extra oneindige niveaus hebben mogelijk geen praktisch effect zodra een recept zijn limiet bereikt.
more-infinite-research.direct_effect=Voegt een oneindig herhaalbare bonus toe. Wetenschapspakketten worden geselecteerd uit actieve laboratoria, zodat de technologie onderzoekbaar blijft met compatibele mod-sets.
more-infinite-research.cargo_bay_unloading_distance=Vergroot de maximale afstand tussen een vrachtlandingsplatform en aangesloten losplaatsen.
more-infinite-research.cargo_landing_pad_count=Verhoogt het aantal vrachtlandingsplatforms dat elke kracht per oppervlak kan opbouwen.
more-infinite-research.flamethrower_shooting_speed=Verhoogt de schietsnelheid voor vlammenwerperwapens en vlammenwerperkoepels.
more-infinite-research.electric_shooting_speed=Verhoogt de schietsnelheid voor elektrische wapens. Bij vanille beïnvloedt dit de afvoerverdediging; met Space Age heeft het ook invloed op Tesla-wapens wanneer de categorie Tesla-munitie beschikbaar is.
more-infinite-research.spoilage_preservation=Verhoogt de globale bederftijdmodificator via een begrensd scripteffect. Bestaande bederfbare items kunnen hun huidige bederfdeadline behouden totdat ze in de game worden getest.
more-infinite-research.agricultural_growth_speed=Verkort de resterende groeitijd voor nieuw geplante landbouwtorenplanten via een begrensd scripteffect.
more-infinite-research.lab_productivity=Verhoogt de onderzoeksvoortgang die wordt behaald met elk geconsumeerd wetenschapspakket, met behulp van de native laboratoriumonderzoeksproductiviteitsmodificator.

