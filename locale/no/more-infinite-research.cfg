[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Utfører ingen automatisk oppdagelse, vedlegg eller opprettelse. MIRs faste forskning forblir uendret.
mir-automatic-productivity-action-preview=Oppdager og klassifiserer kandidater, og skriver deretter aksepterte og hoppede avgjørelser til Factorio-loggen. Den legger ikke ved oppskrifter eller skaper forskning.
mir-automatic-productivity-action-apply=Standard. Oppdager kandidater og legger kun sikkerhetstestede oppskrifter til kompatible eksisterende MIR-forskning. Det skaper ikke forskning i seg selv; de to avmerkingsboksene nedenfor styrer opprettelsen.
mir-automatic-compiler-mode-off=Eldre ekvivalent til funksjonshemmede.
mir-automatic-compiler-mode-report=Eldre ekvivalent til forhåndsvisningsendringer.
mir-automatic-compiler-mode-safe-attach=Eldre ekvivalent av Bruk trygge endringer med forskningsoppretting deaktivert.
mir-automatic-compiler-mode-exact-pack=Eldre ekvivalent av Bruk sikre endringer med forskningsoppretting aktivert og gjennomgått kompatibilitetsdata kreves.
mir-automatic-compiler-mode-safe-generate=Eldre ekvivalent av Bruk sikre endringer med forskningsoppretting aktivert for registrerte eksperimentelle leverandører.
mir-adjust-vanilla-weapon-speed-techs-off=Deaktiver MIRs valgfrie overlappende rakett-/kanonbonusopprydding.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Fjern MIRs overlappende rakett-/kanonbonuser bare når en aktivert, tilgjengelig uendelig teknologi gir den nøyaktige erstatningseffekten.
mir-adjust-vanilla-weapon-speed-techs-always=Fjern alltid MIRs overlappende rakett-/kanonbonuser. Bruk kun hvis du ønsker streng adskillelse.
mir-science-pack-ingredient-policy-configured=Bruk hver genererte teknologis konfigurerte vitenskapspakker uten valgfri ingrediensutvidelse. MIR standard.
mir-science-pack-ingredient-policy-space=Legg til romvitenskap når tilgjengelig. En enkel post-rakett-vanskelighetsøkning.
mir-science-pack-ingredient-policy-space-and-promethium=Legg til plass og promethiumvitenskap når det er tilgjengelig. Best for synker i svært sen romalder.
mir-science-pack-ingredient-policy-space-age-progression=Legg kun til romalderens progresjonspakker antydet av de valgte pakkene. Legger ikke til urelaterte moddede pakker.
mir-science-pack-ingredient-policy-official-progression=Legg til manglende offisielle pakker i prerequisite-stil antydet av den mest avanserte offisielle pakken som allerede er valgt.
mir-science-pack-ingredient-policy-mod-progression=Legg til manglende laboratoriekompatible pakker utledet fra modifisert science-pack-progresjon og lås opp forutsetninger.
mir-science-pack-ingredient-policy-all-official=Bruk alle offisielle base- og romaldervitenskapspakker som finnes i det gjeldende modsettet.
mir-science-pack-ingredient-policy-all=Bruk hver eneste aktive lab-kompatible vitenskapspakke, inkludert modifiserte vitenskapspakker.
mir-lab-incompatibility-policy-reduce=Behold teknologien ved å redusere vitenskapspakkene til det største settet som er akseptert av et aktivt laboratorium. Sikreste standard for mod-pakker.
mir-lab-incompatibility-policy-skip=Hopp over teknologien hvis ingen aktive laboratorier kan forske på den valgte vitenskapspakken. Strengere og lettere å revidere.
mir-lab-incompatibility-policy-engine-default=Skriv aldri om det valgte vitenskapspakken. MIR bevarer et trygt undersøkelsesbart sett uendret og utelater den genererte teknologien når Factorio ikke kan forske på det eksakte settet.
mir-prototype-productivity-cap-engine-default=La hver oppskrifts eksisterende produktivitetstak være i fred. Oppskrifter uten egendefinert tak bruker Factorios normale +300 % produktivitetsbonusgrense.
mir-prototype-productivity-cap-percent-25=Sett ikke-parameter oppskrifts produktivitetstak til +25 %. Dette er et strengt tidlig tak.
mir-prototype-productivity-cap-percent-50=Sett ikke-parameter oppskrifts produktivitetstak til +50 %. Dette er under normalgrensen og gjør at produktivitetsforskning slutter å hjelpe tidligere.
mir-prototype-productivity-cap-percent-75=Sett ikke-parameter oppskrifts produktivitetstak til +75 %. Dette er under normalgrensen og gjør at produktivitetsforskning slutter å hjelpe tidligere.
mir-prototype-productivity-cap-percent-100=Sett ikke-parameter oppskrifts produktivitetstak til +100 %. Dette er under normalgrensen og gjør at produktivitetsforskning slutter å hjelpe tidligere.
mir-prototype-productivity-cap-percent-125=Sett ikke-parameter oppskrifts produktivitetstak til +125 %.
mir-prototype-productivity-cap-percent-150=Sett ikke-parameter oppskrifts produktivitetstak til +150 %.
mir-prototype-productivity-cap-percent-200=Sett ikke-parameter oppskrifts produktivitetstak til +200 %. Dette er under normalgrensen og gjør at produktivitetsforskning slutter å hjelpe tidligere.
mir-prototype-productivity-cap-percent-250=Sett ikke-parameter oppskrifts produktivitetstak til +250 %. Dette er litt under normalgrensen.
mir-prototype-productivity-cap-percent-400=Sett ikke-parameter oppskrifts produktivitetstak til +400 %. Dette utvider produktivitetsskaleringen utover den normale grensen.
mir-prototype-productivity-cap-percent-500=Sett ikke-parameter oppskrifts produktivitetstak til +500 %. Dette utvider produktivitetsskaleringen utover den normale grensen.
mir-prototype-productivity-cap-percent-750=Sett ikke-parameter oppskrifts produktivitetstak til +750 %.
mir-prototype-productivity-cap-percent-1000=Sett ikke-parameter oppskrifts produktivitetstak til +1000 %. Bruk for lange lagringer der produktivitetsforskning bør fortsette å ha betydning.
mir-prototype-productivity-cap-percent-2500=Sett ikke-parameter oppskrifts produktivitetstak til +2500 %. Bruk for svært lange lagringer.
mir-prototype-productivity-cap-percent-5000=Sett ikke-parameter oppskrifts produktivitetstak til +5000 %.
mir-prototype-productivity-cap-percent-10000=Sett ikke-parameter oppskrifts produktivitetstak til +10 000 %. Bruk kun for ekstrem langtidsskalering.
mir-prototype-productivity-cap-percent-25000=Sett ikke-parameter oppskrifts produktivitetstak til +25000 %. Bruk kun for ekstrem langtidsskalering.
mir-prototype-productivity-cap-percent-100000=Sett ikke-parameter oppskrifts produktivitetstak til +100 000 %. Dette er effektivt ubegrenset for de fleste redninger.
mir-recycling-return-chance-engine-default=La hver resirkuleringsoppskrift være uendret.
mir-recycling-return-chance-match-productivity-cap=Utnyttingssikker automatisk reduksjon for skjulte genererte resirkuleringsoppskrifter. Bruker 1 / (1 + produktivitetsbonus), begrenset til normal avkastning på 25 %: +400 % blir 20 %, og +1000 % blir omtrent 9,09 %.
mir-recycling-return-chance-percent-25=Hold skjulte genererte resirkuleringsoppskrifter til normal 25 % materialretur.
mir-recycling-return-chance-percent-20=Skaler skjult genererte resirkuleringsoppskrifter til 20 % materialavkastning.
mir-recycling-return-chance-percent-15=Skaler skjult genererte resirkuleringsoppskrifter til 15 % materialavkastning.
mir-recycling-return-chance-percent-12-5=Skaler skjult genererte resirkuleringsoppskrifter til 12,5 % materialavkastning.
mir-recycling-return-chance-percent-10=Skaler skjult genererte resirkuleringsoppskrifter til 10 % materialavkastning.
mir-recycling-return-chance-percent-7-5=Skaler skjulte genererte resirkuleringsoppskrifter til 7,5 % materialavkastning.
mir-recycling-return-chance-percent-5=Skaler skjult genererte resirkuleringsoppskrifter til 5 % materialavkastning.
mir-recycling-return-chance-percent-2-5=Skaler skjult genererte resirkuleringsoppskrifter til en materialavkastning på 2,5 %.
mir-recycling-return-chance-percent-1=Skaler skjult genererte resirkuleringsoppskrifter til 1 % materialavkastning.
mir-recycling-return-chance-percent-0-5=Skaler skjult genererte resirkuleringsoppskrifter til 0,5 % materialavkastning.
mir-recycling-return-chance-percent-0-1=Skaler skjult genererte resirkuleringsoppskrifter til 0,1 % materialavkastning.
mir-prototype-efficiency-cap-engine-default=La hver maskins effektgrense for energibruk være i fred. Maskiner uten tilpasset grense bruker Factorios normale effekttak på -80 % energibruk, så effekter kan ikke redusere aktiv bruk under 20 %.
mir-prototype-efficiency-cap-saving-25=Skriv en -25 % energiforbrukslokk. Aktiv energibruk holder seg på 75 % eller mer etter energibrukseffekter.
mir-prototype-efficiency-cap-saving-50=Skriv en -50 % energiforbrukslokk. Aktiv energibruk forblir på 50 % eller mer etter energibrukseffekter på støttede maskiner.
mir-prototype-efficiency-cap-saving-75=Skriv en -75 % energiforbrukslokk. Aktiv energibruk forblir på 25 % eller mer etter energibrukseffekter på støttede maskiner.
mir-prototype-efficiency-cap-saving-90=Skriv en -90 % energiforbrukslokk. Aktiv energibruk kan falle til 10 %, som er under det normale 20 %-gulvet.
mir-prototype-efficiency-cap-saving-95=Skriv en -95 % energiforbrukslokk. Aktiv energibruk kan falle til 5 %.
mir-prototype-efficiency-cap-saving-99=Skriv en -99 % energiforbrukslokk. Aktiv energibruk kan falle til 1 %.
mir-prototype-efficiency-cap-saving-999=Skriv en -99,9 % energiforbrukslokk. Aktiv energibruk kan falle til 0,1 %.
mir-prototype-efficiency-cap-saving-9999=Skriv en -99,99 % energiforbrukslokk. Dette er nesten null aktiv energibruk, ikke en null-effekt prototype omskriving.
mir-prototype-pollution-cap-engine-default=La hver maskins grense for forurensningseffekt være i fred. Maskiner uten en tilpasset grense bruker Factorios normale -80 % forurensningseffekt.
mir-prototype-pollution-cap-saving-25=Skriv en -25 % forurensningsgrense. Forurensning holder seg på 75 % eller mer etter forurensningseffekter.
mir-prototype-pollution-cap-saving-50=Skriv en -50 % forurensningsgrense. Forurensning holder seg på 50 % eller mer etter forurensningseffekter på støttede maskiner.
mir-prototype-pollution-cap-saving-75=Skriv en -75 % forurensningsgrense. Forurensning holder seg på 25 % eller mer etter forurensningseffekter på støttede maskiner.
mir-prototype-pollution-cap-saving-90=Skriv en -90 % forurensningsgrense. Forurensning kan falle til 10 %, som er under det normale 20 %-gulvet.
mir-prototype-pollution-cap-saving-95=Skriv en -95 % forurensningsgrense. Forurensning kan falle til 5 %.
mir-prototype-pollution-cap-saving-99=Skriv en -99 % forurensningsgrense. Forurensning kan falle til 1 %.
mir-prototype-pollution-cap-saving-999=Skriv en -99,9 % forurensningsgrense. Forurensning kan falle til 0,1 %.
mir-prototype-pollution-cap-saving-9999=Skriv en -99,99 % forurensningsgrense. Dette er nesten null forurensning, ikke et kjøretidsforurensningsskript.
mir-prototype-speed-floor-engine-default=La hver maskins negative hastighetsgrense være i fred. Maskiner uten tilpasset grense bruker Factorios normale -80 % gulv og holder minst 20 % hastighet.
mir-prototype-speed-floor-saving-25=Klem negative hastighetseffekter ved -25 %, og etterlater minst 75 % hastighet.
mir-prototype-speed-floor-saving-50=Klem negative hastighetseffekter ved -50 %, og etterlater minst 50 % hastighet.
mir-prototype-speed-floor-saving-75=Klem negative hastighetseffekter ved -75 %, og etterlater minst 25 % hastighet.
mir-prototype-speed-floor-saving-90=Tillat negative hastighetseffekter ned til -90 %, og etterlater minst 10 % hastighet.
mir-prototype-speed-floor-saving-95=Tillat negative hastighetseffekter ned til -95 %, og etterlater minst 5 % hastighet.
mir-prototype-speed-floor-saving-99=Tillat negative hastighetseffekter ned til -99 %, og etterlater minst 1 % hastighet.
mir-prototype-speed-floor-saving-999=Tillat negative hastighetseffekter ned til -99,9 %, og etterlater minst 0,1 % hastighet.
mir-prototype-speed-floor-saving-9999=Tillat negative hastighetseffekter ned til -99,99 %, den laveste Factorio-prototypegrensen. Dette er en nesten-stopp, ikke null eller negativ produksjonshastighet.
mir-prototype-speed-cap-engine-default=La hver maskins fartsgrense være i fred. Maskiner uten tilpasset grense bruker Factorios meget høye +100 000 % hastighetseffekttak.
mir-prototype-speed-cap-bonus-25=Klem positive hastighetseffekter ved +25 %.
mir-prototype-speed-cap-bonus-50=Klem positive hastighetseffekter ved +50 %. Bruk dette for å holde fartsbonusene tett begrenset.
mir-prototype-speed-cap-bonus-75=Fest positive hastighetseffekter ved +75 %.
mir-prototype-speed-cap-bonus-100=Klem positive hastighetseffekter ved +100 %.
