[mod-setting-description]
ips-require-space-gate=Når aktivert, forblir disse teknologiene låst inntil romvitenskap forskes i vanilje, eller promethiumvitenskap forskes i romalderen.
mir-science-pack-ingredient-policy=Velger hvordan MIR legger til vitenskapspakker til genererte teknologier. Alternativene er sortert fra konservative til brede: standardpakker, sent-spillpakker, progresjonsbaserte pakker, deretter alle tilgjengelige pakker.
mir-automatic-productivity-action=Velger hva MIR gjør med sikre produktivitetsmuligheter som finnes i oppskrifter med installerte modifikasjoner. Deaktivert utfører ingen automatisk oppdagelse. Forhåndsvis endringer poster akseptert og hoppet over kandidater i Factorio loggen uten å endre forskning. Bruk sikre endringer (standard) legger kun til kvalifiserte oppskrifter til kompatibel eksisterende MIR-forskning. Dette kontrollerer handling, ikke styrke eller modenhet; avmerkingsboksene for opprettelse nedenfor er separate. Eierskap, resirkulering, sannsynlighet, katalysator, vitenskap, laboratorium, forutsetning, mål, identitet, progresjon og sykluskontroller gjelder alltid.
mir-automatic-create-research=Standard: av. Utenfor grenser Bruk sikre endringer på kompatibel eksisterende MIR-forskning; kandidater uten en passende strøm hoppes over og rapporteres. På lar en kvalifisert registrert leverandør lage én stabil generisk uendelig produktivitetsteknologi når ingen eksisterende forskning passer. Avmerkingsboksen for gjennomgåtte data nedenfor avgjør om eksperimentelle leverandører er kvalifisert. MIR lager aldri én teknologi per mod eller oppskrift, og alle harde sikkerhets-, vitenskaps-, eierskaps-, identitets-, progresjons- og sykkelporter gjelder fortsatt.
mir-automatic-require-reviewed-data=Standard: på. Dette har bare betydning når Tillat opprettelse av ny forskning er på; det blokkerer aldri sikker tilknytning til eksisterende forskning. På tillatelser er det bare leverandørfamilier som er merket som gjennomgått og støttet av gjeldende eksakt versjonsbevis, så eksperimentelle familier hoppes over. Off tillater registrerte eksperimentelle leverandører å lage fra generiske strukturelle bevis. For den bredeste eksperimentelle atferden, aktiver forskningsoppretting og slå av dette kravet. Ingen verdi kan omgå en hard sikkerhetsport.
mir-automatic-compiler-mode=Skjult kompatibilitetsbro for profiler opprettet før de delte automatiske produktivitetskontrollene. En ikke-standard eldre verdi overholdes bare mens alle nye kontroller forblir på standardverdiene. Endre enhver ny kontroll for å ta eksplisitt kontroll.
ips-enable-stream=Skaper den genererte uendelige teknologien for __1__ når oppskriftene, effektene, forutsetningene og vitenskapspakkene er tilgjengelige. Deaktiver dette for å forhindre at MIR genererer denne teknologien.
ips-cost-base-stream=Forskningsenheter som kreves for det første genererte nivået av __1__. Må være minst 1. Senere nivåer beregnes fra denne verdien og kostnadsvekstfaktoren.
ips-cost-growth-stream=Multiplikator brukt på hvert senere nivå av __1__. Bruk 1 for flate kostnader, 1,5 for 50 % vekst per nivå, eller 2 for å doble kostnadene.
ips-max-level-stream=Høyeste genererte nivå for __1__. Sett til 0 for uendelige nivåer.
ips-research-time-stream=Sekunder per forskningsenhet for __1__. Sett til 0 for å bruke MIRs standard for denne teknologien. Dette er ikke total forskningstid; total tid avhenger også av forskningskostnader, laboratorietall, laboratoriehastighet og moduler.
mir-enable-base-tech=Lar __1__ fortsette forbi vaniljehetten som en uendelig teknologi. Deaktiver dette hvis du vil at MIR skal legge til nye forskningslinjer uten å forlenge denne vaniljekjeden.
mir-cost-base=Forskningsenheter som kreves for det første MIR-fortsettelsesnivået til __1__. Sett til 0 for å arve vaniljekjedens kostnadsmønster når det er mulig.
mir-cost-growth=Multiplikator brukt på hvert senere MIR-fortsettelsesnivå av __1__. Sett til 0 for å arve vaniljekjedens vekstmønster når det er mulig.
mir-max-level=Høyeste MIR-fortsettelsesnivå for __1__. Sett til 0 for uendelige nivåer.
mir-research-time=Sekunder per forskningsenhet for MIR-fortsettelse av __1__. Sett til 0 for å arve vaniljekjedens forskningsenhetstid når det er mulig.
mir-prefer-this-mod-for-competing-techs=Når aktivert, fjerner denne moden utvalgte konkurrerende uendelige utvidelser og bruker sine egne versjoner. Deaktiver for å beholde konkurrerende versjoner fra andre mods.
mir-adjust-vanilla-weapon-speed-techs=Kontrollerer om MIR fjerner hastighetsbonuser for raketter og kanoner fra den genererte våpenskytingshastigheten når eksakt uendelig erstatningsdekning er tilgjengelig. Finite vaniljevåpenskytehastighetsteknologier beholder sine originale bonuser.
mir-use-installed-space-age-icons=Når den er aktivert, kan MIR referere til installerte offisielle DLC-ikonfiler, inkludert Space Age og Elevated Rails, selv når disse modsene er deaktivert for et basisspill. La dette være av hvis disse DLC-filene ikke er installert; Factorio kan ikke gjenopprette elegant fra manglende ikonfiler under prototypelasting.
mir-pipeline-extent-multiplier=rullegardinmultiplikator kun for oppstart for gjenkjente felt for væskeboksrørledningsutstrekning på tvers av prototyper, ikke bare rørenheter. 100 % forlater prototyper uendret og laster ikke rørledningspassasjen eller skannervæskeboksene. Ikke-100 % verdier er eksperimentelle og kan påvirke maskiner, tanker, thrustere og modifiserte prototyper som definerer væskebokser.
mir-unrestricted-modules=Eksperimentell og balansebrytende. Når aktivert, aksepterer hver eksisterende oppskrift alle fem moduleffekter, og hver eksisterende modulmottaker med spor aksepterer hver oppdaget modulkategori. Dette legger ikke til modulspor eller endrer modulprototyper, og kan muliggjøre produktivitet, kvalitet og modd-modulløkker.
mir-prototype-productivity-cap=Velger om MIR lar oppskriftsproduktivitetstak være alene eller skriver en oppstartsgrense til hver ikke-parameter, ikke-resirkulerende oppskrift. +300 % (uendret) bevarer eksisterende oppskriftslokk; lavere verdier forkorter produktivitetsskalering, mens høyere verdier utvider den.
mir-recycling-return-chance=Kontrollerer kun skjulte genererte resirkuleringsoppskrifter. Automatisk modus reduserer normal 25 % materialretur til maksimalt 1 delt på total utgangsmultiplikator ved valgt produktivitetstak. Faste valg skalerer de samme genererte avkastningene direkte. Synlige prosesser og oppskriftsproduktivitetstak endres aldri.
mir-productivity-cap-self-recycling-only=Over 1 / resirkuleringsretur - 1, er det kun produksjonsoppskrifter med en bevist ikke-generativ selvresirkuleringsvei som mottar den valgte høyere cap. Ved eller under denne terskelen har denne avmerkingsboksen ingen effekt. Motor uendret bruker normal avkastning på 25 % som en konservativ +300 % terskel uten å endre resirkuleringsoppskrifter.
mir-prototype-efficiency-cap=Velger hvor langt effektivitetseffekter kan redusere aktiv maskinenergibruk. -80 % (uendret) lar eksisterende energibruksgrenser være i fred. Dypere reduksjoner kan nærme seg null aktiv energibruk uten å endre forurensningsgrensene.
mir-prototype-pollution-cap=Velger hvor langt forurensningsreduserende effekter kan redusere maskinforurensning. -80 % (uendret) lar eksisterende forurensningsgrenser være i fred. Dypere reduksjoner kan nærme seg null forurensning uten å endre energibruken.
mir-prototype-speed-floor=Velger hvor mye negative hastighetseffekter kan redusere støttede maskiner. -80 % (uendret) lar eksisterende grenser være i fred; dypere verdier fjerner det normale gulvet ned til et nesten stopp på -99,99 %.
mir-prototype-speed-cap=Velger om MIR lar maskinens hastighetseffektgrenser være alene eller skriver en ny positiv hastighetstak. +100 000 % (uendret) bevarer eksisterende grenser; lavere verdier med vilje klemme veldig store hastighetsbonuser.
mir-prototype-quality-cap=Velger om MIR lar maskinens kvalitets-effektgrenser være alene eller skriver en ny positiv kvalitetsgrense. +100 000 % (uendret) bevarer eksisterende grenser og endrer ikke kvalitetsnivåer eller varesannsynlighetsformler.
mir-prototype-positive-power-floor=Standard av. Når den er aktivert, endrer MIR eksplisitte 0W aktive energibruk-prototyper til 1W under prototypelasting, slik at advarselsikoner for lavt strømforbruk ikke vises på enheter som skal trekke en liten mengde som ikke er null. Stopp for å bevare null-kraft prototyper nøyaktig.
mir-settings-profile-import=Lim inn en MIR-innstillingsprofilstreng her for å bruke eksporterte oppstartsinnstillingsverdier som et overstyringslag under prototypegenerering. La stå tomt for normale innstillinger. Eksporter med /mir-settings-export fra en aktiv lagring, og start deretter på nytt etter å ha endret denne verdien.
mir-debug-generation-report=Når aktivert, skriver en strukturert loggrad per generert eller hoppet over strøm og baseutvidelse, inkludert vitenskapspakker, forutsetninger, effekttelling, laboratoriekompatibilitetsstatus og ikonkilde.
mir-debug-recipe-matches=Når aktivert, skriver samsvarende oppskriftsnavn for hver genererte produktivitetsstrøm. Dette kan være støyende i store mod-pakker.
mir-debug-scripted-effects=Når aktivert, skriver kjøretidsloggoppføringer når skriptteknologier beregner globale eller hendelsesdrevne effekter på nytt.
mir-lab-incompatibility-policy=Velger hva MIR gjør når de valgte vitenskapspakkene ikke kan undersøkes av noe aktivt laboratorium.
ips-effect-per-level-stream=Angir den primære basisnivåeffekten per nivå for __1__. Relaterte senere nivåer og effekter skaleres proporsjonalt. Prosentvise effekter bruker prosentpoeng; telle- og avstandseffekter bruker sine opprinnelige enheter.
mir-effect-per-level=Angir den kanoniske per-nivå-effekten for den uendelige __1__ fortsettelsen. Relaterte effekter skaleres proporsjonalt fra den endelige vaniljegrunnlinjen. Prosentvise effekter bruker prosentpoeng; telle- og avstandseffekter bruker sine opprinnelige enheter.
mir-note-experimental-spoilage=Eksperimentell og deaktivert som standard i v2.1.0. Dette er en global/kartomfattende skripteffekt. Eksisterende spoilable-stack-atferd gjøres ikke krav på før den er manuelt validert.
mir-note-agriculture-growth=Gjelder nyplantede landbrukstårnavlinger. Eksisterende plantede avlinger skaleres ikke på nytt.
mir-note-cargo-pad-count=Spesiell logistikkforskning i romalderen. Øker lastelandingsputer per overflate og kan endre logistikkbalansen vesentlig.
mir-note-inserter-capacity=Deaktivert som standard. Ekstra innsatskapasitet kan bryte kretskontrollerte innstikkere og redusere motoroptimaliseringer.
mir-note-native-owner-managed-stream=Hvis en installert uendelig teknologi allerede eier denne forskningsfamilien, konfigurerer de samme oppstartsinnstillingene den eieren i stedet for å lage et duplikat. Uendrede MIR-standarder bevarer eierens endelige prototype nøyaktig. Eksplisitt overstyring av kostnader, tid, maksimumsnivå og effekt gjelder bare etter en sikker eiermatch; deaktivering av strømmen etterlater den eksterne teknologien urørt. Start Factorio på nytt etter å ha endret oppstartsinnstillingene. Et maksimalt nivå på 0 betyr uendelig, og effektverdier er prosentpoeng per nivå.

[string-mod-setting]
mir-automatic-productivity-action-disabled=Deaktivert
