mir-prototype-speed-cap-bonus-25000=Klem positive hastighetseffekter ved +25000 %.
mir-prototype-speed-cap-bonus-100000=Skriv Factorios maksimale hastighetseffekt eksplisitt. I motsetning til uendret, overskriver dette tilpassede nedre grenser.
mir-prototype-quality-cap-engine-default=La hver maskins kvalitetseffektgrense være i fred. Maskiner uten tilpasset grense bruker Factorios meget høye +100 000 % kvalitetseffekttak.
mir-prototype-quality-cap-bonus-50=Fest positive kvalitetseffekter ved +50 %. Dette begrenser maskinkvalitetsbonuseffekter, ikke kvalitetsnivåer eller varesannsynlighetsformler.
mir-prototype-quality-cap-bonus-25=Fest positive kvalitetseffekter ved +25 %. Dette endrer ikke kvalitetsnivåer eller varesannsynlighetsformler.
