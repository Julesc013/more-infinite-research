[technology-description]
more-infinite-research.recipe_productivity=Øker oppskriftsproduktiviteten for de valgte oppskriftene. Factorios maksimale produktivitetstak gjelder fortsatt; ekstra uendelige nivåer har kanskje ingen praktisk effekt når en oppskrift når toppen.
more-infinite-research.direct_effect=Legger til en uendelig repeterbar bonus. Vitenskapspakker er valgt fra aktive laboratorier, slik at teknologien forblir forskningbar med kompatible mod-sett.
more-infinite-research.cargo_bay_unloading_distance=Øker den maksimale avstanden mellom en lastelandingsplass og tilkoblede losseplasser.
more-infinite-research.cargo_landing_pad_count=Øker antallet lastlandingsputer hver kraft kan bygge per overflate.
more-infinite-research.flamethrower_shooting_speed=Øker skytehastigheten for flammekastervåpen og flammekastertårn.
more-infinite-research.electric_shooting_speed=Øker skytehastigheten for elektriske våpen. I vanilje påvirker dette utslippsforsvaret; med Space Age påvirker det også Tesla-våpen når tesla-ammunisjonskategorien er tilgjengelig.
more-infinite-research.spoilage_preservation=Øker den globale spoil time-modifikatoren gjennom en avgrenset skripteffekt. Eksisterende spoilable gjenstander kan beholde sine nåværende spoil-frister til de er testet i spillet.
more-infinite-research.agricultural_growth_speed=Forkorter gjenværende veksttid for nyplantede landbrukstårnplanter gjennom en avgrenset skripteffekt.
more-infinite-research.lab_productivity=Øker forskningsfremgangen oppnådd fra hver konsumert vitenskapspakke, ved å bruke den opprinnelige laboratorieforskningsproduktivitetsmodifikatoren.

