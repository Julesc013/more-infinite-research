[mod-setting-description]
ips-require-space-gate=При включении эти технологии остаются заблокированными до тех пор, пока не будут исследованы космические науки в ванили или наука о прометии в Космической эпохе.
mir-science-pack-ingredient-policy=Выбирает, как MIR добавляет научные пакеты к созданным технологиям. Варианты упорядочены от консервативного к широкому: пакеты по умолчанию, пакеты для поздней игры, пакеты, основанные на прогрессе, затем все доступные пакеты.
mir-automatic-productivity-action=Выбирает то, что делает MIR, с безопасными возможностями повышения производительности, которые можно найти в рецептах установленных модов. Отключено: автоматическое обнаружение не выполняется. Предварительный просмотр изменений записей принятых и пропущенных кандидатов в журнале Factorio без изменения исследования. Применить безопасные изменения (по умолчанию) — добавляет подходящие рецепты только к существующим совместимым исследованиям MIR. Это контролирует действие, а не силу или зрелость; флажки создания ниже являются отдельными. Всегда применяются проверки владения, переработки, вероятности, катализатора, науки, лаборатории, предварительных условий, цели, идентичности, прогресса и цикла.
mir-automatic-create-research=По умолчанию: выключено. Запретить Внесение безопасных изменений в совместимые существующие исследования MIR; кандидаты без подходящего потока пропускаются и сообщаются. On позволяет соответствующему зарегистрированному поставщику создать одну стабильную универсальную технологию бесконечной производительности, когда существующие исследования не подходят. Флажок проверенных данных ниже определяет, имеют ли экспериментальные поставщики право на участие. MIR никогда не создает одну технологию для каждого мода или рецепта, и все жесткие меры безопасности, науки, владения, идентичности, прогресса и циклических ворот по-прежнему применяются.
mir-automatic-require-reviewed-data=По умолчанию: включено. Это имеет значение только в том случае, если включен параметр «Разрешить создание новых исследований»; он никогда не блокирует безопасную связь с существующими исследованиями. В разрешениях только семейства поставщиков отмечены как проверенные и подтверждены применимыми доказательствами точной версии, поэтому экспериментальные семейства пропускаются. Выключение позволяет зарегистрированным поставщикам экспериментальных услуг создавать на основе общих структурных данных. Для более широкого экспериментального поведения включите создание исследований и отключите это требование. Никакая ценность не может обойти жесткие ворота безопасности.
mir-automatic-compiler-mode=Скрытый мост совместимости для профилей, созданных до разделения элементов управления автоматической производительностью. Устаревшее значение, отличное от значения по умолчанию, учитывается только в том случае, если для всех новых элементов управления остаются значения по умолчанию. Измените любой новый элемент управления, чтобы получить явный контроль.
ips-enable-stream=Создаёт сгенерированную бесконечную технологию для __1__, когда доступны её рецепты, эффекты, необходимые условия и научные пакеты. Отключите это, чтобы MIR не мог генерировать эту технологию.
ips-cost-base-stream=Исследовательские единицы, необходимые для первого сгенерированного уровня __1__. Должно быть не менее 1. Последующие уровни рассчитываются на основе этого значения и коэффициента роста стоимости.
ips-cost-growth-stream=Множитель применяется к каждому последующему уровню __1__. Используйте 1 для фиксированных затрат, 1,5 для роста на 50% за уровень или 2 для удвоения затрат.
ips-max-level-stream=Самый высокий сгенерированный уровень для __1__. Установите значение 0 для бесконечных уровней.
ips-research-time-stream=Секунд на единицу исследования для __1__. Установите значение 0, чтобы использовать настройки MIR по умолчанию для этой технологии. Это не общее время исследования; общее время также зависит от стоимости исследования, количества лабораторий, скорости работы лаборатории и модулей.
mir-enable-base-tech=Позволяет __1__ продолжать использовать свою ванильную версию как бесконечную технологию. Отключите это, если вы хотите, чтобы МИР добавлял новые направления исследований, не расширяя эту ванильную цепочку.
mir-cost-base=Исследовательские подразделения, необходимые для первого уровня продолжения MIR __1__. Установите значение 0, чтобы по возможности наследовать шаблон стоимости стандартной цепочки.
mir-cost-growth=Множитель применяется к каждому последующему уровню продолжения MIR __1__. Установите значение 0, чтобы по возможности наследовать шаблон роста базовой цепочки.
mir-max-level=Самый высокий уровень продолжения MIR для __1__. Установите значение 0 для бесконечных уровней.
mir-research-time=Секунд на единицу исследования для продолжения МИР __1__. Установите значение 0, чтобы по возможности наследовать время исследовательской единицы ванильной цепочки.
mir-prefer-this-mod-for-competing-techs=При включении этот мод удаляет выбранные конкурирующие бесконечные расширения и использует свои собственные версии. Отключите, чтобы сохранить конкурирующие версии из других модов.
mir-adjust-vanilla-weapon-speed-techs=Определяет, удаляет ли MIR бонусы к скорости ракет и артиллерийских снарядов из сгенерированного продолжения скорости стрельбы оружия, когда доступно точное бесконечное покрытие замены. Технологии конечной скорости стрельбы из ванильного оружия сохраняют свои первоначальные бонусы.
mir-use-installed-space-age-icons=При включении MIR может ссылаться на установленные официальные файлы значков DLC, включая Space Age и Elevated Rails, даже если эти моды отключены для запуска базовой игры. Оставьте этот параметр выключенным, если эти файлы DLC не установлены; Factorio не может корректно восстановить недостающие файлы значков во время загрузки прототипа.
mir-pipeline-extent-multiplier=Раскрывающийся множитель, доступный только при запуске, для распознанных полей протяженности трубопровода коробки жидкости в прототипах, а не только в объектах труб. 100 % оставляет прототипы без изменений и не нагружает коробки прохода трубопровода или коробки сканирования жидкости. Значения, отличные от 100%, являются экспериментальными и могут влиять на машины, баки, двигатели и модифицированные прототипы, которые определяют коробки с жидкостью.
mir-unrestricted-modules=Экспериментальный и разрушающий баланс. Если эта опция включена, каждый существующий рецепт принимает все пять эффектов модулей, а каждый существующий приемник модулей со слотами принимает каждую обнаруженную категорию модулей. При этом не добавляются слоты для модулей и не изменяются прототипы модулей, а может обеспечить производительность, качество и циклы модифицированных модулей.
mir-prototype-productivity-cap=Определяет, оставляет ли MIR ограничения производительности рецептов без изменений или записывает ограничение запуска для каждого рецепта без параметров и без повторного использования. +300% (без изменений) сохраняет существующие ограничения рецептов; более низкие значения сокращают масштабирование производительности, а более высокие значения расширяют его.
mir-recycling-return-chance=Управляет только скрытыми рецептами переработки. В автоматическом режиме обычный возврат материала в размере 25 % снижается максимум до 1, деленного на общий множитель производительности при выбранном пределе производительности. Фиксированный выбор напрямую масштабирует ту же генерируемую прибыль. Видимые процессы и ограничения производительности рецептов никогда не меняются.
mir-productivity-cap-self-recycling-only=Выше 1 / возврат переработчика - 1, только производственные рецепты с проверенным негенеративным путем самопереработки получают выбранный более высокий предел. При достижении этого порога или ниже этот флажок не действует. Двигатель без изменений использует обычный возврат в 25% в качестве консервативного порога +300% без изменения рецептов переработки.
mir-prototype-efficiency-cap=Определяет, насколько эффект эффективности может снизить активное потребление энергии машиной. -80% (без изменений) оставляет без изменений существующие ограничения на энергопотребление. Более глубокие сокращения могут приблизиться к нулевому потреблению активной энергии без изменения пределов загрязнения.
mir-prototype-pollution-cap=Выбирает, насколько эффекты снижения загрязнения могут снизить загрязнение машины. -80% (без изменений) оставляет существующие пределы загрязнения без изменений. Более глубокие сокращения могут приблизиться к нулевому загрязнению без изменения энергопотребления.
mir-prototype-speed-floor=Определяет, насколько негативные эффекты скорости могут замедлять поддерживаемые машины. -80% (без изменений) оставляет существующие ограничения без изменений; более глубокие значения удаляют нормальный нижний предел почти до -99,99%.
mir-prototype-speed-cap=Определяет, оставляет ли MIR ограничения, влияющие на скорость машины, или записывает новое положительное ограничение скорости. +100000% (без изменений) сохраняет существующие ограничения; более низкие значения намеренно ограничивают очень большие бонусы к скорости.
mir-prototype-quality-cap=Определяет, оставляет ли MIR пределы влияния на качество машины или записывает новый положительный предел качества. +100000% (без изменений) сохраняет существующие ограничения и не меняет уровни качества или формулы вероятности предметов.
mir-prototype-positive-power-floor=По умолчанию выключено. При включении MIR изменяет явные прототипы активной энергии_использования 0 Вт на 1 Вт во время загрузки прототипа, поэтому значки предупреждения о низком энергопотреблении не появляются на объектах, которые должны потреблять небольшую ненулевую величину. Оставьте, чтобы сохранить прототипы с нулевой мощностью.
mir-settings-profile-import=Вставьте сюда строку профиля настроек MIR, чтобы применить экспортированные значения параметров запуска в качестве слоя переопределения во время создания прототипа. Оставьте пустым для обычных настроек. Экспортируйте с помощью /mir-settings-export из активного сохранения, а затем перезапустите после изменения этого значения.
mir-debug-generation-report=Если этот параметр включен, записывается одна строка структурированного журнала для каждого сгенерированного или пропущенного потока и базового расширения, включая научные пакеты, необходимые условия, количество эффектов, статус совместимости с лабораториями и источник значков.
mir-debug-recipe-matches=При включении записывает совпадающие имена рецептов для каждого сгенерированного потока производительности. В больших пакетах модов это может быть шумно.
mir-debug-scripted-effects=При включении записывает записи в журнал времени выполнения, когда скриптовые технологии пересчитывают глобальные или управляемые событиями эффекты.
mir-lab-incompatibility-policy=Выбирает, что будет делать MIR, когда выбранные научные пакеты не могут быть исследованы ни одной активной лабораторией.
ips-effect-per-level-stream=Устанавливает основной эффект базового уровня для каждого уровня для __1__. Соответствующие более поздние уровни и эффекты масштабируются пропорционально. Процентные эффекты используют процентные точки; Эффекты счета и расстояния используют свои собственные единицы измерения.
mir-effect-per-level=Устанавливает канонический эффект для каждого уровня для бесконечного продолжения __1__. Сопутствующие эффекты масштабируются пропорционально окончательной базовой линии. Процентные эффекты используют процентные точки; Эффекты счета и расстояния используют свои собственные единицы измерения.
mir-note-experimental-spoilage=Экспериментальная версия и отключена по умолчанию в версии 2.1.0. Это глобальный скриптовый эффект, распространяющийся на всю карту. Существующее поведение испорченного стека не утверждается до тех пор, пока не будет проверено вручную.
mir-note-agriculture-growth=Применяется к вновь посаженным башенным сельскохозяйственным культурам. Существующие посаженные культуры не масштабируются.
mir-note-cargo-pad-count=Исследование логистики специального космического века. Увеличивает грузовые посадочные площадки на поверхность и может существенно изменить логистический баланс.
mir-note-inserter-capacity=По умолчанию отключено. Дополнительная емкость устройства вставки может привести к поломке устройств вставки с схемным управлением и снижению оптимизации двигателя.
mir-note-native-owner-managed-stream=Если установленная бесконечная технология уже владеет этим семейством исследований, эти же параметры запуска настраивают этого владельца вместо создания дубликата. Неизмененные настройки MIR по умолчанию точно сохраняют окончательный прототип владельца. Явные переопределения стоимости, времени, максимального уровня и эффектов применяются только после безопасного совпадения владельца; отключение потока оставляет внешнюю технологию нетронутой. Перезапустите Factorio после изменения настроек запуска. Максимальный уровень 0 означает бесконечность, а значения эффекта представляют собой процентные пункты на уровень.

