[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Makes no automatic changes and performs no automatic discovery. MIR's fixed research remains available.
mir-automatic-productivity-action-preview=Discovers and classifies candidates and writes decisions to the Factorio log. It does not attach recipes or create research.
mir-automatic-productivity-action-apply=Recommended. Attaches only safety-proven recipes to compatible existing MIR research. Creating missing research also requires the separate creation controls.
mir-automatic-compiler-mode-off=Legacy equivalent of Disabled.
mir-automatic-compiler-mode-report=Legacy equivalent of Preview Changes.
mir-automatic-compiler-mode-safe-attach=Legacy equivalent of Apply Safe Changes with research creation disabled.
mir-automatic-compiler-mode-exact-pack=Legacy equivalent of Apply Safe Changes with research creation enabled and reviewed compatibility data required.
mir-automatic-compiler-mode-safe-generate=Legacy equivalent of Apply Safe Changes with research creation enabled from registered family modules.
mir-adjust-vanilla-weapon-speed-techs-off=Disable MIR's optional overlapping rocket/cannon bonus cleanup.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Remove MIR's overlapping rocket/cannon bonuses only when an enabled, reachable infinite technology provides the exact replacement effect.
mir-adjust-vanilla-weapon-speed-techs-always=Always remove MIR's overlapping rocket/cannon bonuses. Use only if you want strict separation.
mir-science-pack-ingredient-policy-configured=Use each generated technology's configured science packs without optional ingredient expansion. MIR default.
mir-science-pack-ingredient-policy-space=Add space science when available. A simple post-rocket difficulty increase.
mir-science-pack-ingredient-policy-space-and-promethium=Add space and promethium science when available. Best for very late Space Age research sinks.
mir-science-pack-ingredient-policy-space-age-progression=Add only Space Age progression packs implied by the selected packs. Does not add unrelated modded packs.
mir-science-pack-ingredient-policy-official-progression=Add missing official prerequisite-style packs implied by the most advanced official pack already selected.
mir-science-pack-ingredient-policy-mod-progression=Add missing lab-compatible packs inferred from modded science-pack progression and unlock prerequisites.
mir-science-pack-ingredient-policy-all-official=Use every official base and Space Age science pack that exists in the current mod set.
mir-science-pack-ingredient-policy-all=Use every active lab-compatible science pack, including modded science packs.
mir-lab-incompatibility-policy-reduce=Keep the technology by reducing its science packs to the largest set accepted by an active lab. Safest default for mod packs.
mir-lab-incompatibility-policy-skip=Skip the technology if no active lab can research its selected science-pack set. Stricter and easier to audit.
mir-lab-incompatibility-policy-engine-default=Never rewrite the selected science-pack set. MIR preserves a safely researchable set unchanged and omits the generated technology when Factorio cannot research that exact set.
mir-prototype-productivity-cap-engine-default=Leave each recipe's existing productivity cap alone. Recipes without a custom cap use Factorio's normal +300% productivity bonus limit.
mir-prototype-productivity-cap-percent-25=Set non-parameter recipe productivity caps to +25%. This is a strict early cap.
mir-prototype-productivity-cap-percent-50=Set non-parameter recipe productivity caps to +50%. This is below the normal cap and makes productivity research stop helping sooner.
mir-prototype-productivity-cap-percent-75=Set non-parameter recipe productivity caps to +75%. This is below the normal cap and makes productivity research stop helping sooner.
mir-prototype-productivity-cap-percent-100=Set non-parameter recipe productivity caps to +100%. This is below the normal cap and makes productivity research stop helping sooner.
mir-prototype-productivity-cap-percent-125=Set non-parameter recipe productivity caps to +125%.
mir-prototype-productivity-cap-percent-150=Set non-parameter recipe productivity caps to +150%.
mir-prototype-productivity-cap-percent-200=Set non-parameter recipe productivity caps to +200%. This is below the normal cap and makes productivity research stop helping sooner.
mir-prototype-productivity-cap-percent-250=Set non-parameter recipe productivity caps to +250%. This is slightly below the normal cap.
mir-prototype-productivity-cap-percent-400=Set non-parameter recipe productivity caps to +400%. This extends productivity scaling beyond the normal cap.
mir-prototype-productivity-cap-percent-500=Set non-parameter recipe productivity caps to +500%. This extends productivity scaling beyond the normal cap.
mir-prototype-productivity-cap-percent-750=Set non-parameter recipe productivity caps to +750%.
mir-prototype-productivity-cap-percent-1000=Set non-parameter recipe productivity caps to +1000%. Use for long saves where productivity research should keep mattering.
mir-prototype-productivity-cap-percent-2500=Set non-parameter recipe productivity caps to +2500%. Use for very long saves.
mir-prototype-productivity-cap-percent-5000=Set non-parameter recipe productivity caps to +5000%.
mir-prototype-productivity-cap-percent-10000=Set non-parameter recipe productivity caps to +10000%. Use only for extreme long-run scaling.
mir-prototype-productivity-cap-percent-25000=Set non-parameter recipe productivity caps to +25000%. Use only for extreme long-run scaling.
mir-prototype-productivity-cap-percent-100000=Set non-parameter recipe productivity caps to +100000%. This is effectively uncapped for most saves.
mir-recycling-return-chance-engine-default=Leave every recycling recipe unchanged.
mir-recycling-return-chance-match-productivity-cap=Exploit-safe automatic reduction for hidden generated recycling recipes. Uses 1 / (1 + productivity bonus), capped at the normal 25% return: +400% becomes 20%, and +1000% becomes about 9.09%.
mir-recycling-return-chance-percent-25=Keep hidden generated recycling recipes at the normal 25% material return.
mir-recycling-return-chance-percent-20=Scale hidden generated recycling recipes to a 20% material return.
mir-recycling-return-chance-percent-15=Scale hidden generated recycling recipes to a 15% material return.
mir-recycling-return-chance-percent-12-5=Scale hidden generated recycling recipes to a 12.5% material return.
mir-recycling-return-chance-percent-10=Scale hidden generated recycling recipes to a 10% material return.
mir-recycling-return-chance-percent-7-5=Scale hidden generated recycling recipes to a 7.5% material return.
mir-recycling-return-chance-percent-5=Scale hidden generated recycling recipes to a 5% material return.
mir-recycling-return-chance-percent-2-5=Scale hidden generated recycling recipes to a 2.5% material return.
mir-recycling-return-chance-percent-1=Scale hidden generated recycling recipes to a 1% material return.
mir-recycling-return-chance-percent-0-5=Scale hidden generated recycling recipes to a 0.5% material return.
mir-recycling-return-chance-percent-0-1=Scale hidden generated recycling recipes to a 0.1% material return.
mir-prototype-efficiency-cap-engine-default=Leave each machine's energy-use effect limit alone. Machines without a custom limit use Factorio's normal -80% energy-use effect cap, so effects cannot reduce active use below 20%.
mir-prototype-efficiency-cap-saving-25=Write a -25% energy-use cap. Active energy use stays at 75% or more after energy-use effects.
mir-prototype-efficiency-cap-saving-50=Write a -50% energy-use cap. Active energy use stays at 50% or more after energy-use effects on supported machines.
mir-prototype-efficiency-cap-saving-75=Write a -75% energy-use cap. Active energy use stays at 25% or more after energy-use effects on supported machines.
mir-prototype-efficiency-cap-saving-90=Write a -90% energy-use cap. Active energy use can fall to 10%, which is below the normal 20% floor.
mir-prototype-efficiency-cap-saving-95=Write a -95% energy-use cap. Active energy use can fall to 5%.
mir-prototype-efficiency-cap-saving-99=Write a -99% energy-use cap. Active energy use can fall to 1%.
mir-prototype-efficiency-cap-saving-999=Write a -99.9% energy-use cap. Active energy use can fall to 0.1%.
mir-prototype-efficiency-cap-saving-9999=Write a -99.99% energy-use cap. This is near-zero active energy use, not a zero-power prototype rewrite.
mir-prototype-pollution-cap-engine-default=Leave each machine's pollution-effect limit alone. Machines without a custom limit use Factorio's normal -80% pollution-effect cap.
mir-prototype-pollution-cap-saving-25=Write a -25% pollution cap. Pollution stays at 75% or more after pollution effects.
mir-prototype-pollution-cap-saving-50=Write a -50% pollution cap. Pollution stays at 50% or more after pollution effects on supported machines.
mir-prototype-pollution-cap-saving-75=Write a -75% pollution cap. Pollution stays at 25% or more after pollution effects on supported machines.
mir-prototype-pollution-cap-saving-90=Write a -90% pollution cap. Pollution can fall to 10%, which is below the normal 20% floor.
mir-prototype-pollution-cap-saving-95=Write a -95% pollution cap. Pollution can fall to 5%.
mir-prototype-pollution-cap-saving-99=Write a -99% pollution cap. Pollution can fall to 1%.
mir-prototype-pollution-cap-saving-999=Write a -99.9% pollution cap. Pollution can fall to 0.1%.
mir-prototype-pollution-cap-saving-9999=Write a -99.99% pollution cap. This is near-zero pollution, not a runtime pollution script.
mir-prototype-speed-floor-engine-default=Leave each machine's negative speed limit alone. Machines without a custom limit use Factorio's normal -80% floor and keep at least 20% speed.
mir-prototype-speed-floor-saving-25=Clamp negative speed effects at -25%, leaving at least 75% speed.
mir-prototype-speed-floor-saving-50=Clamp negative speed effects at -50%, leaving at least 50% speed.
mir-prototype-speed-floor-saving-75=Clamp negative speed effects at -75%, leaving at least 25% speed.
mir-prototype-speed-floor-saving-90=Allow negative speed effects down to -90%, leaving at least 10% speed.
mir-prototype-speed-floor-saving-95=Allow negative speed effects down to -95%, leaving at least 5% speed.
mir-prototype-speed-floor-saving-99=Allow negative speed effects down to -99%, leaving at least 1% speed.
mir-prototype-speed-floor-saving-999=Allow negative speed effects down to -99.9%, leaving at least 0.1% speed.
mir-prototype-speed-floor-saving-9999=Allow negative speed effects down to -99.99%, the lowest Factorio prototype limit. This is a near-stop, not zero or negative crafting speed.
mir-prototype-speed-cap-engine-default=Leave each machine's speed limit alone. Machines without a custom limit use Factorio's very high +100000% speed-effect ceiling.
mir-prototype-speed-cap-bonus-25=Clamp positive speed effects at +25%.
mir-prototype-speed-cap-bonus-50=Clamp positive speed effects at +50%. Use this to keep speed bonuses tightly bounded.
