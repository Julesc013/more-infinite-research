[technology-description]
more-infinite-research.recipe_productivity=Увеличивает производительность выбранных рецептов. Ограничение максимальной производительности Factorio по-прежнему действует; дополнительные бесконечные уровни могут не иметь практического эффекта, когда рецепт достигнет своего предела.
more-infinite-research.direct_effect=Добавляет бесконечно повторяемый бонус. Исследовательские пакеты выбираются из активных лабораторий, чтобы технология оставалась исследуемой с совместимыми наборами модов.
more-infinite-research.cargo_bay_unloading_distance=Увеличивает максимальное расстояние между грузовой посадочной площадкой и подключёнными разгрузочными отсеками.
more-infinite-research.cargo_landing_pad_count=Увеличивает количество грузовых посадочных площадок, которые каждая фракция может построить на поверхности.
more-infinite-research.flamethrower_shooting_speed=Увеличивает скорость стрельбы из огнеметного оружия и огнеметных турелей.
more-infinite-research.electric_shooting_speed=Увеличивает скорость стрельбы из электрического оружия. В ванили это влияет на защиту от разряда; в Space Age это также влияет на оружие Tesla, если доступна категория боеприпасов Tesla.
more-infinite-research.spoilage_preservation=Увеличивает глобальный модификатор времени порчи посредством ограниченного скриптового эффекта. Существующие портимые предметы могут сохранять текущие сроки порчи до тех пор, пока не будут проверены в игре.
more-infinite-research.agricultural_growth_speed=Сокращает оставшееся время роста недавно посаженных сельскохозяйственных башенных растений за счет ограниченного скриптового эффекта.
more-infinite-research.lab_productivity=Увеличивает прогресс исследований, получаемый от каждого использованного научного пакета, используя собственный модификатор производительности лабораторных исследований.

