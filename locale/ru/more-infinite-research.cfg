[mod-setting-name]
ips-require-space-gate=Требовать завершения игры для разблокировки технологий
ips-enable-stream=Разрешить технологию __1__ 
ips-cost-base-stream=Базовая стоимость для __1__
ips-cost-growth-stream=Фактор множителя роста для __1__
ips-max-level-stream=Максимальный уровень для __1__
mir-enable-base-tech=Позволить бесконечное исследование для __1__
mir-cost-base=Константа базовой стоимости __1__
mir-cost-growth=Фактор множителя роста для __1__
mir-research-time=Время исследования (в секундах) для __1__

[mod-setting-description]
ips-require-space-gate=Если включено, новые бесконечные технологии не будут доступны до тех пор, пока не будут исследованы космические исследовательские пакеты (для базовой игры) или прометиевые исследовательские пакеты (для Space Age).
ips-enable-stream=Отключите, чтобы __1__ не появлялась в игре.
ips-cost-base-stream=Кол-во очков исследования, требуемое для первого уровня __1__. Более высокие уровни изменяются от этого значения, даже если первая разблокировка начнется позже.
ips-cost-growth-stream=Множитель, применимый к стоимости предыдущего уровня для  __1__. Введите 1 для константного значения, или введите большее значение для увеличения стоимости с каждым уровнем.
ips-max-level-stream=Введите 0 чтобы __1__ была бесконечной, или введите любое положительное число, чтобы определить максимальный уровень этой технологии.
mir-enable-base-tech=Позволить __1__ иметь возможность исследования после достижения ванильного лимита, которая будет следовать той-же прогрессии.
mir-cost-base=Введите 0 чтобы использовать ванильную стоимость уровня 1 для __1__. Любое другое положительное значение перепишет базовое значение, используемое формулой для вычисления стоимости бесконечных исследований.
mir-cost-growth=Введите 0 чтобы использовать ванильный множитель роста для __1__. Введите положительное число, чтобы определить, насколько дороже становятся бесконечные технологии с каждым уровнем.
mir-research-time=Введите 0 (или не меняйте значение) для того, чтобы использовать ванильное время исследования для __1__. Введите положительное число, чтобы переписать количество секунд за уровень.
