[mod-name]
more-infinite-research=Больше Бесконечных Исследований

[mod-description]
more-infinite-research=Добавляет настраиваемую бесконечную производительность и бонусные исследования для промежуточных звеньев, логистики, боя, бонусов игроков и пробелов в космической эпохе.

