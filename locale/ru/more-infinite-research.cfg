[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Не выполняет автоматическое обнаружение, присоединение или создание. Фиксированные исследования МИР остаются неизменными.
mir-automatic-productivity-action-preview=Обнаруживает и классифицирует кандидатов, затем записывает принятые и пропущенные решения в журнал Factorio. Он не прикрепляет рецепты и не проводит исследования.
mir-automatic-productivity-action-apply=По умолчанию. Находит кандидатов и присоединяет только проверенные рецепты к совместимым существующим исследованиям MIR. Он не создает исследования сам по себе; два флажка ниже управляют созданием.
mir-automatic-compiler-mode-off=Устаревший эквивалент отключенного.
mir-automatic-compiler-mode-report=Устаревший эквивалент изменений предварительной версии.
mir-automatic-compiler-mode-safe-attach=Устаревший эквивалент применения безопасных изменений с отключенным созданием исследований.
mir-automatic-compiler-mode-exact-pack=Устаревший эквивалент применения безопасных изменений с включенным созданием исследований и необходимыми проверенными данными о совместимости.
mir-automatic-compiler-mode-safe-generate=Устаревший эквивалент применения безопасных изменений с возможностью создания исследований для зарегистрированных поставщиков экспериментальных услуг.
mir-adjust-vanilla-weapon-speed-techs-off=Отключите дополнительную очистку перекрывающихся бонусов ракет и пушек MIR.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Удаляйте перекрывающиеся бонусы ракет/пушек МИР только тогда, когда включенная, достижимая бесконечная технология обеспечивает точный эффект замены.
mir-adjust-vanilla-weapon-speed-techs-always=Всегда удаляйте перекрывающиеся бонусы ракет и пушек МИР. Используйте только в том случае, если вы хотите строгого разделения.
mir-science-pack-ingredient-policy-configured=Используйте настроенные научные пакеты каждой созданной технологии без дополнительного расширения ингредиентов. МИР по умолчанию.
mir-science-pack-ingredient-policy-space=Добавьте космическую науку, если она доступна. Простое увеличение сложности после ракеты.
mir-science-pack-ingredient-policy-space-and-promethium=Добавьте науку о космосе и прометии, если таковые имеются. Лучше всего подходит для исследовательских раковин поздней космической эры.
mir-science-pack-ingredient-policy-space-age-progression=Добавляйте только пакеты прогресса Space Age, подразумеваемые выбранными пакетами. Не добавляет несвязанные пакеты модов.
mir-science-pack-ingredient-policy-official-progression=Добавьте недостающие официальные пакеты обязательных условий, подразумеваемые самым продвинутым официальным пакетом, который уже выбран.
mir-science-pack-ingredient-policy-mod-progression=Добавьте недостающие совместимые с лабораторией пакеты, полученные на основе прогресса модифицированных научных пакетов, и разблокируйте необходимые условия.
mir-science-pack-ingredient-policy-all-official=Используйте все официальные базы и научные пакеты космической эры, существующие в текущем наборе модов.
mir-science-pack-ingredient-policy-all=Используйте все активные научные пакеты, совместимые с лабораториями, включая модифицированные научные пакеты.
mir-lab-incompatibility-policy-reduce=Сохраните технологию, сократив ее научные пакеты до самого большого набора, принятого действующей лабораторией. Самый безопасный вариант по умолчанию для пакетов модов.
mir-lab-incompatibility-policy-skip=Пропустите технологию, если ни одна действующая лаборатория не может исследовать выбранный ею набор научных пакетов. Более строгий и простой аудит.
mir-lab-incompatibility-policy-engine-default=Никогда не переписывайте выбранный набор научных пакетов. MIR сохраняет безопасный для исследования набор неизменным и опускает сгенерированную технологию, если Factorio не может исследовать именно этот набор.
mir-prototype-productivity-cap-engine-default=Оставьте существующее ограничение производительности каждого рецепта без изменений. Рецепты без специального ограничения используют обычный лимит бонуса производительности Factorio +300%.
mir-prototype-productivity-cap-percent-25=Установите ограничение производительности рецептов без параметров на +25%. Это строгий ранний предел.
mir-prototype-productivity-cap-percent-50=Установите ограничения производительности рецептов без параметров на +50%. Это ниже нормального предела и приводит к тому, что исследования производительности перестают приносить пользу раньше.
mir-prototype-productivity-cap-percent-75=Установите ограничение производительности рецепта без параметров на +75%. Это ниже нормального предела и приводит к тому, что исследования производительности перестают приносить пользу раньше.
mir-prototype-productivity-cap-percent-100=Установите ограничения производительности рецептов без параметров на +100%. Это ниже нормального предела и приводит к тому, что исследования производительности перестают приносить пользу раньше.
mir-prototype-productivity-cap-percent-125=Установите ограничение производительности рецепта без параметров на +125%.
mir-prototype-productivity-cap-percent-150=Установите ограничение производительности рецепта без параметров на +150%.
mir-prototype-productivity-cap-percent-200=Установите ограничения производительности рецептов без параметров на +200%. Это ниже нормального предела и приводит к тому, что исследования производительности перестают приносить пользу раньше.
mir-prototype-productivity-cap-percent-250=Установите ограничение производительности рецепта без параметров на +250%. Это немного ниже обычного лимита.
mir-prototype-productivity-cap-percent-400=Установите ограничение производительности рецепта без параметров на +400%. Это расширяет возможности масштабирования производительности за пределы обычного ограничения.
mir-prototype-productivity-cap-percent-500=Установите ограничения производительности рецептов без параметров на +500%. Это расширяет возможности масштабирования производительности за пределы обычного ограничения.
mir-prototype-productivity-cap-percent-750=Установите ограничение производительности рецепта без параметров на +750%.
mir-prototype-productivity-cap-percent-1000=Установите ограничение производительности рецепта без параметров на +1000%. Используйте для длительного сохранения, когда исследования производительности должны продолжать иметь значение.
mir-prototype-productivity-cap-percent-2500=Установите ограничение производительности рецепта без параметров на +2500%. Используйте для очень длинных сохранений.
mir-prototype-productivity-cap-percent-5000=Установите ограничение производительности рецепта без параметров на +5000%.
mir-prototype-productivity-cap-percent-10000=Установите ограничение производительности рецепта без параметров на +10000%. Используйте только для экстремально долгосрочного масштабирования.
mir-prototype-productivity-cap-percent-25000=Установите ограничение производительности рецепта без параметров на +25000%. Используйте только для экстремально долгосрочного масштабирования.
mir-prototype-productivity-cap-percent-100000=Установите ограничение производительности рецепта без параметров на +100000%. Для большинства сохранений это фактически не ограничено.
mir-recycling-return-chance-engine-default=Оставьте все рецепты переработки без изменений.
mir-recycling-return-chance-match-productivity-cap=Безопасное автоматическое сокращение скрытых рецептов переработки. Используется 1 / (1 + бонус за производительность), ограниченный обычной доходностью 25 %: +400 % становится 20 %, а +1000 % становится примерно 9,09 %.
mir-recycling-return-chance-percent-25=Сохраняйте скрытые рецепты переработки с нормальным возвратом материала 25%.
mir-recycling-return-chance-percent-20=Масштабируйте скрытые рецепты переработки до 20% возврата материала.
mir-recycling-return-chance-percent-15=Масштабируйте скрытые рецепты переработки до 15% возврата материала.
mir-recycling-return-chance-percent-12-5=Масштабируйте скрытые рецепты переработки до 12,5% возврата материала.
mir-recycling-return-chance-percent-10=Масштабируйте скрытые рецепты переработки до 10% возврата материала.
mir-recycling-return-chance-percent-7-5=Масштабируйте скрытые рецепты переработки до 7,5% возврата материала.
mir-recycling-return-chance-percent-5=Масштабируйте скрытые рецепты переработки до 5% возврата материала.
mir-recycling-return-chance-percent-2-5=Масштабируйте скрытые рецепты переработки до 2,5% возврата материала.
mir-recycling-return-chance-percent-1=Масштабируйте скрытые рецепты переработки до 1% возврата материала.
mir-recycling-return-chance-percent-0-5=Масштабируйте скрытые рецепты переработки до возврата материала 0,5%.
mir-recycling-return-chance-percent-0-1=Масштабируйте скрытые рецепты переработки до возврата материала 0,1%.
mir-prototype-efficiency-cap-engine-default=Оставьте ограничение эффекта энергопотребления каждой машины. Машины без настраиваемого лимита используют обычный предел эффекта энергопотребления Factorio -80%, поэтому эффекты не могут снизить активное использование ниже 20%.
mir-prototype-efficiency-cap-saving-25=Напишите ограничение энергопотребления -25%. Использование активной энергии остается на уровне 75% или более после эффектов использования энергии.
mir-prototype-efficiency-cap-saving-50=Напишите ограничение энергопотребления -50%. Активное потребление энергии остается на уровне 50 % или более после воздействия энергопотребления на поддерживаемых машинах.
mir-prototype-efficiency-cap-saving-75=Напишите ограничение энергопотребления -75%. Активное потребление энергии остается на уровне 25 % или более после воздействия энергопотребления на поддерживаемых машинах.
mir-prototype-efficiency-cap-saving-90=Напишите ограничение энергопотребления -90%. Использование активной энергии может упасть до 10%, что ниже обычного минимального уровня в 20%.
mir-prototype-efficiency-cap-saving-95=Напишите ограничение энергопотребления -95%. Использование активной энергии может снизиться до 5%.
mir-prototype-efficiency-cap-saving-99=Напишите ограничение энергопотребления -99%. Использование активной энергии может снизиться до 1%.
mir-prototype-efficiency-cap-saving-999=Напишите ограничение энергопотребления -99,9%. Использование активной энергии может упасть до 0,1%.
mir-prototype-efficiency-cap-saving-9999=Напишите ограничение энергопотребления -99,99%. Это почти нулевое потребление активной энергии, а не переписывание прототипа с нулевой мощностью.
mir-prototype-pollution-cap-engine-default=Оставьте предел воздействия загрязнения для каждой машины. Машины без специального ограничения используют обычный предел загрязнения Factorio -80%.
mir-prototype-pollution-cap-saving-25=Напишите ограничение загрязнения -25%. Уровень загрязнения остается на уровне 75% и более после воздействия загрязнения.
mir-prototype-pollution-cap-saving-50=Напишите ограничение загрязнения -50%. Уровень загрязнения остается на уровне 50 % и более после воздействия загрязнения на поддерживаемые машины.
mir-prototype-pollution-cap-saving-75=Напишите ограничение загрязнения -75%. Уровень загрязнения остается на уровне 25 % и более после воздействия загрязнения на поддерживаемые машины.
mir-prototype-pollution-cap-saving-90=Напишите ограничение загрязнения -90%. Загрязнение может упасть до 10%, что ниже нормального минимального уровня в 20%.
mir-prototype-pollution-cap-saving-95=Напишите ограничение загрязнения -95%. Загрязнение может упасть до 5%.
mir-prototype-pollution-cap-saving-99=Напишите ограничение загрязнения -99%. Загрязнение может упасть до 1%.
mir-prototype-pollution-cap-saving-999=Напишите ограничение загрязнения -99,9%. Загрязнение может упасть до 0,1%.
mir-prototype-pollution-cap-saving-9999=Напишите ограничение загрязнения -99,99%. Это почти нулевое загрязнение, а не сценарий загрязнения во время выполнения.
mir-prototype-speed-floor-engine-default=Оставьте отрицательное ограничение скорости каждой машины. Машины без настраиваемого ограничения используют обычный уровень Factorio -80% и сохраняют скорость не менее 20%.
mir-prototype-speed-floor-saving-25=Зафиксируйте отрицательные эффекты скорости на уровне -25%, оставив скорость не менее 75%.
mir-prototype-speed-floor-saving-50=Зафиксируйте отрицательные эффекты скорости на уровне -50%, оставив скорость не менее 50%.
mir-prototype-speed-floor-saving-75=Зафиксируйте отрицательные эффекты скорости на уровне -75%, оставив скорость не менее 25%.
mir-prototype-speed-floor-saving-90=Разрешить отрицательные эффекты скорости до -90%, оставив скорость не менее 10%.
mir-prototype-speed-floor-saving-95=Уменьшите отрицательные эффекты скорости до -95%, оставив скорость не менее 5%.
mir-prototype-speed-floor-saving-99=Разрешить отрицательные эффекты скорости до -99%, оставив скорость не менее 1%.
mir-prototype-speed-floor-saving-999=Разрешить отрицательные эффекты скорости до -99,9%, оставив скорость не менее 0,1%.
mir-prototype-speed-floor-saving-9999=Разрешить отрицательные эффекты скорости до -99,99%, самого низкого предела прототипа Factorio. Это близкая к остановке, а не нулевая или отрицательная скорость крафта.
mir-prototype-speed-cap-engine-default=Оставьте ограничение скорости каждой машины без изменений. Машины без настраиваемого ограничения используют очень высокий потолок эффекта скорости + 100 000% от Factorio.
mir-prototype-speed-cap-bonus-25=Зафиксируйте положительные эффекты скорости на +25%.
mir-prototype-speed-cap-bonus-50=Зафиксируйте положительные эффекты скорости на +50%. Используйте это, чтобы жестко ограничить бонусы скорости.
mir-prototype-speed-cap-bonus-75=Зафиксируйте положительные эффекты скорости на +75%.
mir-prototype-speed-cap-bonus-100=Зафиксируйте положительные эффекты скорости на +100%.
mir-prototype-speed-cap-bonus-125=Зафиксируйте положительные эффекты скорости на +125%.
mir-prototype-speed-cap-bonus-150=Зафиксируйте положительные эффекты скорости на +150%.
mir-prototype-speed-cap-bonus-200=Зафиксируйте положительные эффекты скорости на +200%.
mir-prototype-speed-cap-bonus-250=Зафиксируйте положительные эффекты скорости на +250%.
mir-prototype-speed-cap-bonus-300=Зафиксируйте положительные эффекты скорости на +300%.
mir-prototype-speed-cap-bonus-400=Зафиксируйте положительные эффекты скорости на +400%.
mir-prototype-speed-cap-bonus-500=Зафиксируйте положительные эффекты скорости на +500%.
mir-prototype-speed-cap-bonus-750=Зафиксируйте положительные эффекты скорости на +750%.
mir-prototype-speed-cap-bonus-1000=Зафиксируйте положительные эффекты скорости на +1000%.
mir-prototype-speed-cap-bonus-2500=Зафиксируйте положительные эффекты скорости на уровне +2500%.
mir-prototype-speed-cap-bonus-5000=Зафиксируйте положительные эффекты скорости на +5000%.
mir-prototype-speed-cap-bonus-10000=Зафиксируйте положительные эффекты скорости на уровне +10000%.
mir-prototype-speed-cap-bonus-25000=Зафиксируйте положительные эффекты скорости на +25000%.
mir-prototype-speed-cap-bonus-100000=Явно запишите максимальный потолок эффекта скорости Factorio. В отличие от неизмененного значения, это перезаписывает пользовательские нижние пределы.
mir-prototype-quality-cap-engine-default=Оставьте предел качества каждой машины в покое. Машины без настраиваемого ограничения используют очень высокий потолок качества +100 000% от Factorio.
mir-prototype-quality-cap-bonus-50=Уменьшите положительные эффекты качества на +50%. Это ограничивает бонусные эффекты качества машины, а не уровни качества или формулы вероятности предметов.
mir-prototype-quality-cap-bonus-25=Уменьшите положительные эффекты качества на +25%. Это не меняет уровни качества или формулы вероятности предметов.
mir-prototype-quality-cap-bonus-75=Зафиксируйте положительные эффекты качества на уровне +75%. Это не меняет уровни качества или формулы вероятности предметов.
mir-prototype-quality-cap-bonus-100=Зафиксируйте положительные эффекты качества на уровне +100%. Это не меняет уровни качества или формулы вероятности предметов.
mir-prototype-quality-cap-bonus-125=Зафиксируйте положительные эффекты качества на уровне +125%. Это не меняет уровни качества или формулы вероятности предметов.
mir-prototype-quality-cap-bonus-150=Зафиксируйте положительные эффекты качества на уровне +150%. Это не меняет уровни качества или формулы вероятности предметов.
mir-prototype-quality-cap-bonus-200=Зафиксируйте положительные эффекты качества на уровне +200%. Это не меняет уровни качества или формулы вероятности предметов.
mir-prototype-quality-cap-bonus-250=Уменьшите положительные эффекты качества на +250%. Это не меняет уровни качества или формулы вероятности предметов.
mir-prototype-quality-cap-bonus-300=Зафиксируйте положительные эффекты качества на уровне +300%. Это не меняет уровни качества или формулы вероятности предметов.
mir-prototype-quality-cap-bonus-400=Зафиксируйте положительные эффекты качества на +400%. Это не меняет уровни качества или формулы вероятности предметов.
mir-prototype-quality-cap-bonus-500=Зафиксируйте положительные эффекты качества на уровне +500%. Это не меняет уровни качества или формулы вероятности предметов.
mir-prototype-quality-cap-bonus-750=Зафиксируйте положительные эффекты качества на уровне +750%. Это не меняет уровни качества или формулы вероятности предметов.
mir-prototype-quality-cap-bonus-1000=Зафиксируйте положительные эффекты качества на уровне +1000%. Это не меняет уровни качества или формулы вероятности предметов.
mir-prototype-quality-cap-bonus-2500=Зафиксируйте положительные эффекты качества на уровне +2500%. Это не меняет уровни качества или формулы вероятности предметов.
mir-prototype-quality-cap-bonus-5000=Зафиксируйте положительные эффекты качества на уровне +5000%. Это не меняет уровни качества или формулы вероятности предметов.
mir-prototype-quality-cap-bonus-10000=Зафиксируйте положительные эффекты качества на уровне +10000%. Это не меняет уровни качества или формулы вероятности предметов.
mir-prototype-quality-cap-bonus-25000=Зафиксируйте положительные эффекты качества на уровне +25000%. Это не меняет уровни качества или формулы вероятности предметов.
mir-prototype-quality-cap-bonus-100000=Явно напишите максимальный потолок качественного эффекта Factorio. В отличие от неизмененного значения, это перезаписывает пользовательские нижние пределы.
