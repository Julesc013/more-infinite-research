ips-research-time-stream=Время исследования (секунды) для __1__
mir-enable-base-tech=Включить бесконечное расширение для __1__
mir-cost-base=Константа базовой стоимости для __1__
mir-cost-growth=Коэффициент роста стоимости для __1__
mir-research-time=Время исследования (секунды) для __1__
mir-prefer-this-mod-for-competing-techs=Предпочитать More Infinite Research, когда другие моды добавляют конкурирующие бесконечные технологии
mir-adjust-vanilla-weapon-speed-techs=Изменять стандартные технологии скорострельности оружия
mir-debug-generation-report=Записывать отчёт генерации в журнал

[mod-setting-description]
ips-require-space-gate=Если включено, эти технологии остаются заблокированными, пока в базовой игре не будет исследована космическая наука или в Space Age прометиевая наука.
ips-enable-stream=Отключите, чтобы __1__ не создавалась в игре.
ips-cost-base-stream=Единицы исследования, требуемые для первого уровня __1__. Более высокие уровни масштабируются от этого значения, даже если первая разблокировка начинается позже.
ips-cost-growth-stream=Множитель, применяемый к стоимости предыдущего уровня __1__. Используйте 1 для постоянной стоимости или большие значения для повышения сложности с каждым уровнем.
ips-max-level-stream=Установите 0, чтобы __1__ оставалась бесконечной, или задайте положительное значение, чтобы ограничить её этим уровнем.
ips-research-time-stream=Установите 0, чтобы использовать настроенное время исследования по умолчанию для __1__. Задайте положительное значение, чтобы заменить секунды на уровень.
mir-enable-base-tech=Позволяет __1__ продолжаться после стандартного предела бесконечными уровнями, следующими той же прогрессии.
mir-cost-base=Установите 0, чтобы повторно использовать стандартную стоимость уровня 1 для __1__. Любое положительное значение заменяет базовый член бесконечной формулы.
mir-cost-growth=Установите 0, чтобы продолжить стандартный темп роста для __1__. Задайте положительное значение, чтобы изменить рост стоимости каждого бесконечного уровня.
mir-research-time=Установите 0, чтобы повторно использовать стандартное время исследования для __1__. Задайте положительное значение, чтобы заменить секунды на уровень.
mir-prefer-this-mod-for-competing-techs=Если включено, этот мод удаляет выбранные конкурирующие бесконечные расширения и использует собственные версии. Отключите, чтобы сохранить конкурирующие версии из других модов.
mir-adjust-vanilla-weapon-speed-techs=Определяет, будет ли мод удалять бонусы скорострельности ракет и снарядов из стандартных технологий скорострельности оружия, когда доступно отдельное заменяющее исследование.
mir-debug-generation-report=Если включено, записывает одну структурированную строку журнала для каждого созданного или пропущенного потока и базового расширения, включая исследовательские пакеты, зависимости, число эффектов, статус совместимости лабораторий и источник иконки.

[string-mod-setting]
mir-adjust-vanilla-weapon-speed-techs-off=Отключено
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Только когда есть отдельная технология
mir-adjust-vanilla-weapon-speed-techs-always=Всегда
