[technology-description]
more-infinite-research.recipe_productivity=Augmenta la productivitat de les receptes per a les receptes seleccionades. El límit màxim de productivitat de Factorio encara s'aplica; Els nivells infinits addicionals poden no tenir cap efecte pràctic una vegada que una recepta arriba al seu límit.
more-infinite-research.direct_effect=Afegeix una bonificació repetible infinita. Els paquets de ciència es seleccionen dels laboratoris actius, de manera que la tecnologia segueix sent investigable amb conjunts de modificacions compatibles.
more-infinite-research.cargo_bay_unloading_distance=Augmenta la distància màxima entre una plataforma d'aterratge de càrrega i les zones de descàrrega connectades.
more-infinite-research.cargo_landing_pad_count=Augmenta el nombre de pistes d'aterratge de càrrega que cada força pot construir per superfície.
more-infinite-research.flamethrower_shooting_speed=Augmenta la velocitat de tir per a armes llançaflames i torretes llançaflames.
more-infinite-research.electric_shooting_speed=Augmenta la velocitat de tir per a armes elèctriques. A la vainilla això afecta la defensa de la descàrrega; amb l'era espacial també afecta les armes de Tesla quan la categoria de munició de Tesla està disponible.
more-infinite-research.spoilage_preservation=Augmenta el modificador global del temps de malbé mitjançant un efecte de guió limitat. Els articles que es poden deteriorar existents poden mantenir els seus terminis actuals fins que no es provi dins del joc.
more-infinite-research.agricultural_growth_speed=Escurça el temps de creixement restant per a les plantes de torre agrícoles recentment plantades mitjançant un efecte de guió limitat.
more-infinite-research.lab_productivity=Augmenta el progrés de la investigació obtingut de cada paquet de ciència consumit, utilitzant el modificador de productivitat de la investigació nativa del laboratori.

