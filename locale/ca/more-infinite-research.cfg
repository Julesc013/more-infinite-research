[mod-setting-description]
ips-require-space-gate=Quan estan habilitades, aquestes tecnologies romanen bloquejades fins que s'investiga la ciència espacial a la vainilla o la ciència del prometi a l'era espacial.
mir-science-pack-ingredient-policy=Tria com el MIR afegeix paquets científics a les tecnologies generades. Les opcions s'ordenen de conservador a ampli: paquets predeterminats, paquets de final de joc, paquets basats en la progressió i després tots els paquets disponibles.
mir-automatic-productivity-action=Tria què fa MIR amb les oportunitats de productivitat segures que es troben a les receptes de modificacions instal·lades. Desactivat no fa cap descobriment automàtic. Previsualitza els registres de canvis acceptats i omès candidats al registre de Factorio sense canviar la recerca. Aplicar canvis segurs (per defecte) afegeix receptes elegibles només a la recerca MIR existent compatible. Això controla l'acció, no la força o la maduresa; les caselles de creació de sota estan separades. Les comprovacions de propietat, reciclatge, probabilitat, catalitzador, ciència, laboratori, prerequisits, objectiu, identitat, progressió i cicle sempre s'apliquen.
mir-automatic-create-research=Per defecte: desactivat. Off limits Aplicar canvis segurs a la investigació MIR existent compatible; els candidats sense un flux adequat es salten i s'informa. On permet a un proveïdor registrat que compleixi els requisits per crear una tecnologia de productivitat infinita genèrica estable quan no hi ha cap recerca existent. La casella de selecció de dades revisades a continuació decideix si els proveïdors experimentals són elegibles. MIR mai crea una tecnologia per mod o recepta, i totes les portes de seguretat, ciència, propietat, identitat, progressió i cicle dur encara s'apliquen.
mir-automatic-require-reviewed-data=Per defecte: activat. Això només importa quan l'opció Permet la creació de noves investigacions està activada; mai bloqueja la connexió segura a la investigació existent. En els permisos, només les famílies de proveïdors marcades com a revisades i avalades per proves de la versió exacta aplicables, de manera que les famílies experimentals s'ometen. Off permet als proveïdors experimentals registrats crear a partir d'evidències estructurals genèriques. Per obtenir el comportament experimental més ampli, activeu la creació de recerca i desactiveu aquest requisit. Cap valor pot evitar una porta de seguretat dura.
mir-automatic-compiler-mode=Pont de compatibilitat ocult per als perfils creats abans dels controls de productivitat automàtics dividits. Un valor heretat no predeterminat només es respecta mentre tots els controls nous mantenen els valors predeterminats. Canvieu qualsevol control nou per prendre el control explícit.
ips-enable-stream=Crea la tecnologia infinita generada per a __1__ quan les seves receptes, efectes, requisits previs i paquets científics estan disponibles. Desactiveu-ho per evitar que MIR generi aquesta tecnologia.
ips-cost-base-stream=Unitats de recerca necessàries per al primer nivell generat de __1__. Ha de ser com a mínim 1. Els nivells posteriors es calculen a partir d'aquest valor i del factor de creixement del cost.
ips-cost-growth-stream=Multiplicador aplicat a cada nivell posterior de __1__. Utilitzeu 1 per a costos plans, 1,5 per a un creixement del 50% per nivell o 2 per duplicar costos.
ips-max-level-stream=Nivell generat més alt per a __1__. Establiu a 0 per a nivells infinits.
ips-research-time-stream=Segons per unitat de recerca per a __1__. Establiu a 0 per utilitzar el valor predeterminat de MIR per a aquesta tecnologia. Aquest no és temps total de recerca; El temps total també depèn del cost de la investigació, el recompte de laboratoris, la velocitat del laboratori i els mòduls.
mir-enable-base-tech=Permet que __1__ continuï més enllà del seu tap de vainilla com una tecnologia infinita. Desactiveu-ho si voleu que MIR afegeixi noves línies de recerca sense ampliar aquesta cadena de vainilla.
mir-cost-base=Unitats de recerca necessàries per al primer nivell de continuació del MIR de __1__. Establiu a 0 per heretar el patró de cost de la cadena de vainilla quan sigui possible.
mir-cost-growth=Multiplicador aplicat a cada nivell de continuació MIR posterior de __1__. Establiu a 0 per heretar el patró de creixement de la cadena de vainilla quan sigui possible.
mir-max-level=Nivell de continuació MIR més alt per a __1__. Establiu a 0 per a nivells infinits.
mir-research-time=Segons per unitat de recerca per a la continuació del MIR de __1__. Establiu a 0 per heretar el temps de la unitat de recerca de la cadena de vainilla quan sigui possible.
mir-prefer-this-mod-for-competing-techs=Quan està activat, aquest mod elimina les extensions infinites de la competència seleccionades i utilitza les seves pròpies versions. Desactiva per mantenir les versions competidores d'altres modificacions.
mir-adjust-vanilla-weapon-speed-techs=Controla si el MIR elimina les bonificacions de velocitat de coets i canonades de la seva continuació de velocitat de tir d'arma generada quan hi ha disponible una cobertura de substitució infinita exacta. Les tecnologies de velocitat de tir d'armes de vainilla finites mantenen les seves bonificacions originals.
mir-use-installed-space-age-icons=Quan està activat, el MIR pot fer referència a fitxers d'icones de DLC oficials instal·lats, inclosos l'era espacial i els carrils elevats, fins i tot quan aquests mods estiguin desactivats per a l'execució del joc base. Deixeu-ho desactivat si aquests fitxers DLC no estan instal·lats; Factorio no es pot recuperar amb gràcia dels fitxers d'icones que falten durant la càrrega del prototip.
mir-pipeline-extent-multiplier=Multiplicador desplegable només d'inici per a camps d'extensió de canonades de caixa de fluids reconeguts a través de prototips, no només d'entitats de canonades. El 100% deixa els prototips sense canvis i no carrega el pas de la canonada ni escaneja les caixes de fluids. Els valors que no són del 100% són experimentals i poden afectar màquines, tancs, propulsors i prototips modificats que defineixen caixes de fluids.
mir-unrestricted-modules=Experimental i trencador d'equilibri. Quan està activat, cada recepta existent accepta els cinc efectes del mòdul i cada receptor de mòdul existent amb ranures accepta totes les categories de mòdul descobertes. Això no afegeix ranures de mòduls ni canvia prototips de mòduls, i pot permetre la productivitat, la qualitat i els bucles de mòduls modificats.
mir-prototype-productivity-cap=Tria si MIR deixa sols els límits de productivitat de la recepta o escriu un límit d'inici a cada recepta sense paràmetres i sense reciclatge. +300% (sense canvis) conserva els límits de receptes existents; els valors més baixos escurcen l'escala de productivitat, mentre que els valors més alts l'amplien.
mir-recycling-return-chance=Controla només les receptes de reciclatge generades amagades. El mode automàtic redueix el retorn de material normal del 25% com a màxim a 1 dividit pel multiplicador de sortida total al límit de productivitat seleccionat. Les opcions fixes escalen directament els mateixos rendiments generats. Els processos visibles i els límits de productivitat de les receptes no es modifiquen mai.
mir-productivity-cap-self-recycling-only=Per sobre d'1 / devolució del reciclador - 1, només les receptes de producció amb un camí d'autoreciclatge no generatiu provat reben el límit superior seleccionat. A aquest llindar o per sota, aquesta casella de selecció no té cap efecte. El motor sense canvis utilitza el rendiment normal del 25% com a llindar conservador del +300% sense canviar les receptes de reciclatge.
mir-prototype-efficiency-cap=Tria fins a quin punt els efectes d'eficiència poden reduir l'ús d'energia activa de la màquina. -80% (sense canvis) deixa només els límits d'ús d'energia existents. Les reduccions més profundes poden apropar-se al zero ús d'energia activa sense canviar els límits de contaminació.
mir-prototype-pollution-cap=Tria fins a quin punt els efectes de reducció de la contaminació poden reduir la contaminació de la màquina. -80% (sense canvis) deixa sols els límits de contaminació existents. Reduccions més profundes poden apropar-se a la contaminació zero sense canviar l'ús d'energia.
mir-prototype-speed-floor=Tria fins a quin punt els efectes de velocitat negatius poden retardar les màquines compatibles. -80% (sense canvis) deixa sols els límits existents; valors més profunds eliminen el sòl normal fins a una parada propera al -99,99%.
mir-prototype-speed-cap=Tria si el MIR deixa sols els límits d'efecte de velocitat de la màquina o escriu un nou límit de velocitat positiu. +100000% (sense canvis) preserva els límits existents; valors més baixos limiten intencionadament bonificacions de velocitat molt grans.
mir-prototype-quality-cap=Tria si el MIR deixa sols els límits d'efecte de qualitat de la màquina o escriu un nou límit de qualitat positiva. +100000% (sense canvis) conserva els límits existents i no canvia els nivells de qualitat ni les fórmules de probabilitat d'elements.
mir-prototype-positive-power-floor=Desactivat per defecte. Quan està activat, el MIR canvia els prototips explícits d'ús d'energia activa de 0 W a 1 W durant la càrrega del prototip, de manera que les icones d'advertència de baixa potència no apareixen a les entitats que haurien de treure una petita quantitat diferent de zero. Deixeu-ho per preservar exactament els prototips de potència zero.
mir-settings-profile-import=Enganxeu aquí una cadena de perfil de configuració MIR per aplicar els valors de configuració d'inici exportats com a capa de substitució durant la generació del prototip. Deixa en blanc per a la configuració normal. Exporteu amb /mir-settings-export des d'un desat actiu i, a continuació, reinicieu-lo després de canviar aquest valor.
mir-debug-generation-report=Quan està activat, escriu una fila de registre estructurada per cada flux generat o omès i extensió base, inclosos els paquets científics, els requisits previs, el recompte d'efectes, l'estat de compatibilitat del laboratori i la font d'icones.
mir-debug-recipe-matches=Quan està activat, escriu noms de receptes coincidents per a cada flux de productivitat generat. Això pot ser sorollós en paquets de modificacions grans.
mir-debug-scripted-effects=Quan està activat, escriu entrades de registre en temps d'execució quan les tecnologies amb script tornen a calcular efectes globals o basats en esdeveniments.
mir-lab-incompatibility-policy=Tria què fa el MIR quan cap laboratori actiu no pot investigar els paquets científics seleccionats.
ips-effect-per-level-stream=Estableix l'efecte de nivell base primari per nivell per a __1__. Els nivells i efectes posteriors relacionats s'escalen proporcionalment. Els efectes percentuals utilitzen punts percentuals; els efectes de recompte i distància utilitzen les seves unitats natives.
mir-effect-per-level=Estableix l'efecte canònic per nivell per a la continuació infinita __1__. Els efectes relacionats s'escalen proporcionalment a partir de la línia de base final de vainilla. Els efectes percentuals utilitzen punts percentuals; els efectes de recompte i distància utilitzen les seves unitats natives.
mir-note-experimental-spoilage=Experimental i desactivat per defecte a la v2.1.0. Aquest és un efecte de guió global/de tot el mapa. El comportament de la pila spoilable existent no es reclama fins que no es valida manualment.
mir-note-agriculture-growth=S'aplica als cultius de torre agrícoles recentment plantats. Els cultius plantats existents no es reescalen.
mir-note-cargo-pad-count=Recerca logística especial de l'era espacial. Augmenta les pistes d'aterratge de càrrega per superfície i pot canviar substancialment l'equilibri logístic.
mir-note-inserter-capacity=Desactivat per defecte. La capacitat d'inserció addicional pot trencar els inseridors controlats per circuits i reduir les optimitzacions del motor.
mir-note-native-owner-managed-stream=Si una tecnologia infinita instal·lada ja és propietari d'aquesta família de recerca, aquesta mateixa configuració d'inici configuren aquest propietari en lloc de crear-ne un duplicat. Els valors predeterminats de MIR sense canvis conserven exactament el prototip final del propietari. Les anul·lacions explícites de cost, temps, nivell màxim i efecte només s'apliquen després d'una coincidència segura del propietari; la desactivació del flux deixa sense tocar la tecnologia externa. Reinicieu Factorio després de canviar la configuració d'inici. Un nivell màxim de 0 significa infinit, i els valors d'efecte són punts percentuals per nivell.

