[string-mod-setting-description]
mir-automatic-productivity-action-disabled=No realitza cap descobriment, adjunt o creació automàtica. La investigació fixa de MIR es manté sense canvis.
mir-automatic-productivity-action-preview=Descobreix i classifica els candidats, després escriu les decisions acceptades i omeses al registre de Factorio. No adjunta receptes ni crea investigacions.
mir-automatic-productivity-action-apply=Per defecte. Descobreix candidats i adjunta només receptes provades amb seguretat a la investigació MIR existent compatible. No crea recerca per si mateix; les dues caselles de selecció següents regeixen la creació.
mir-automatic-compiler-mode-off=L'equivalent heretat de Disabled.
mir-automatic-compiler-mode-report=Equivalent heretat dels canvis a la vista prèvia.
mir-automatic-compiler-mode-safe-attach=L'equivalent heretat d'Aplica canvis segurs amb la creació de recerca desactivada.
mir-automatic-compiler-mode-exact-pack=L'equivalent heretat d'Aplica canvis segurs amb la creació de recerca activada i les dades de compatibilitat revisades necessàries.
mir-automatic-compiler-mode-safe-generate=L'equivalent heretat d'Aplica canvis segurs amb la creació de recerca activada per als proveïdors experimentals registrats.
mir-adjust-vanilla-weapon-speed-techs-off=Desactiveu la neteja de bonificació de coet/canó superposada opcional del MIR.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Elimineu les bonificacions de coet/canó superposades de MIR només quan una tecnologia infinita activada i accessible proporcioni l'efecte de substitució exacte.
mir-adjust-vanilla-weapon-speed-techs-always=Traieu sempre les bonificacions de coets/canons superposades de MIR. Utilitzeu només si voleu una separació estricta.
mir-science-pack-ingredient-policy-configured=Utilitzeu els paquets científics configurats de cada tecnologia generada sense una expansió d'ingredients opcional. MIR predeterminat.
mir-science-pack-ingredient-policy-space=Afegeix ciència espacial quan estigui disponible. Un simple augment de la dificultat després del coet.
mir-science-pack-ingredient-policy-space-and-promethium=Afegeix ciència espacial i prometi quan estigui disponible. El millor per a embornals de recerca de l'Era Espacial molt tardana.
mir-science-pack-ingredient-policy-space-age-progression=Afegiu només els paquets de progressió de l'era espacial implicats pels paquets seleccionats. No afegeix paquets modificats no relacionats.
mir-science-pack-ingredient-policy-official-progression=Afegeix els paquets oficials d'estil de prerequisits que falten implicats pel paquet oficial més avançat ja seleccionat.
mir-science-pack-ingredient-policy-mod-progression=Afegeix els paquets compatibles amb el laboratori que falten derivats de la progressió del paquet científic modificat i desbloqueja els requisits previs.
mir-science-pack-ingredient-policy-all-official=Utilitzeu totes les bases oficials i els paquets científics de l'Era Espacial que existeixin al conjunt de modificacions actual.
mir-science-pack-ingredient-policy-all=Utilitzeu tots els paquets científics actius compatibles amb el laboratori, inclosos els paquets científics modificats.
mir-lab-incompatibility-policy-reduce=Mantingueu la tecnologia reduint els seus paquets científics al conjunt més gran acceptat per un laboratori actiu. Predeterminat més segur per als paquets de modificacions.
mir-lab-incompatibility-policy-skip=Omet la tecnologia si cap laboratori actiu pot investigar el seu conjunt de ciències seleccionat. Més estricte i fàcil d'auditar.
mir-lab-incompatibility-policy-engine-default=No torneu mai a escriure el conjunt de paquets científics seleccionat. MIR conserva sense canvis un conjunt investigable de manera segura i omet la tecnologia generada quan Factorio no pot investigar aquest conjunt exacte.
mir-prototype-productivity-cap-engine-default=Deixeu el límit de productivitat existent de cada recepta. Les receptes sense un límit personalitzat utilitzen el límit normal de bonificació de productivitat del +300% de Factorio.
mir-prototype-productivity-cap-percent-25=Establiu límits de productivitat de receptes no paràmetres a +25%. Aquest és un límit precoç estricte.
mir-prototype-productivity-cap-percent-50=Establiu límits de productivitat de receptes no paràmetres a +50%. Això està per sota del límit normal i fa que la investigació de productivitat deixi d'ajudar abans.
mir-prototype-productivity-cap-percent-75=Establiu límits de productivitat de receptes no paràmetres a +75%. Això està per sota del límit normal i fa que la investigació de productivitat deixi d'ajudar abans.
mir-prototype-productivity-cap-percent-100=Establiu límits de productivitat de receptes no paràmetres a +100%. Això està per sota del límit normal i fa que la investigació de productivitat deixi d'ajudar abans.
mir-prototype-productivity-cap-percent-125=Establiu límits de productivitat de receptes no paràmetres a +125%.
mir-prototype-productivity-cap-percent-150=Estableix límits de productivitat de receptes sense paràmetres a +150%.
mir-prototype-productivity-cap-percent-200=Establiu límits de productivitat de receptes no paràmetres a +200%. Això està per sota del límit normal i fa que la investigació de productivitat deixi d'ajudar abans.
mir-prototype-productivity-cap-percent-250=Estableix límits de productivitat de receptes no paràmetres a +250%. Això està lleugerament per sota del límit normal.
mir-prototype-productivity-cap-percent-400=Estableix límits de productivitat de receptes no paràmetres a +400%. Això amplia l'escala de productivitat més enllà del límit normal.
mir-prototype-productivity-cap-percent-500=Establiu límits de productivitat de receptes no paràmetres a +500%. Això amplia l'escala de productivitat més enllà del límit normal.
mir-prototype-productivity-cap-percent-750=Establiu límits de productivitat de receptes no paràmetres a +750%.
mir-prototype-productivity-cap-percent-1000=Establiu límits de productivitat de receptes no paràmetres a +1000%. Utilitzeu-lo per a estalvis llargs on la investigació de productivitat hauria de continuar important.
mir-prototype-productivity-cap-percent-2500=Establiu límits de productivitat de receptes no paràmetres a +2500%. Utilitzeu-lo per a estalvis molt llargs.
mir-prototype-productivity-cap-percent-5000=Establiu límits de productivitat de receptes no paràmetres a +5000%.
mir-prototype-productivity-cap-percent-10000=Establiu límits de productivitat de receptes no paràmetres a +10000%. Utilitzeu només per a l'escalat extrem a llarg termini.
mir-prototype-productivity-cap-percent-25000=Establiu límits de productivitat de receptes no paràmetres a +25000%. Utilitzeu només per a l'escalat extrem a llarg termini.
mir-prototype-productivity-cap-percent-100000=Establiu límits de productivitat de receptes no paràmetres a +100000%. Això és efectivament sense límit per a la majoria dels desats.
mir-recycling-return-chance-engine-default=Deixeu totes les receptes de reciclatge sense canvis.
mir-recycling-return-chance-match-productivity-cap=Reducció automàtica segura d'explotacions per a receptes de reciclatge generades amagades. Utilitza 1 / (1 + bonificació de productivitat), limitada al rendiment normal del 25%: +400% es converteix en 20% i +1000% es converteix en un 9,09%.
mir-recycling-return-chance-percent-25=Mantingueu les receptes de reciclatge generades amagades amb el retorn de material normal del 25%.
mir-recycling-return-chance-percent-20=Escala les receptes de reciclatge generades ocultes a un 20% de retorn del material.
mir-recycling-return-chance-percent-15=Escala les receptes de reciclatge generades amagades fins a un retorn de material del 15%.
mir-recycling-return-chance-percent-12-5=Escala les receptes de reciclatge generades amagades a un retorn de material del 12,5%.
mir-recycling-return-chance-percent-10=Escala les receptes de reciclatge generades amagades a un retorn de material del 10%.
mir-recycling-return-chance-percent-7-5=Escala les receptes de reciclatge generades amagades a un retorn de material del 7,5%.
mir-recycling-return-chance-percent-5=Escala les receptes de reciclatge generades amagades a un retorn de material del 5%.
mir-recycling-return-chance-percent-2-5=Escala les receptes de reciclatge generades amagades a un retorn de material del 2,5%.
mir-recycling-return-chance-percent-1=Escala les receptes de reciclatge generades amagades a un retorn de material de l'1%.
mir-recycling-return-chance-percent-0-5=Escala les receptes de reciclatge generades amagades a un retorn de material del 0,5%.
mir-recycling-return-chance-percent-0-1=Escala les receptes de reciclatge generades amagades a un retorn de material del 0,1%.
mir-prototype-efficiency-cap-engine-default=Deixeu el límit d'efecte d'ús d'energia de cada màquina. Les màquines sense límit personalitzat utilitzen el límit d'efecte d'ús d'energia del -80% de Factorio, de manera que els efectes no poden reduir l'ús actiu per sota del 20%.
mir-prototype-efficiency-cap-saving-25=Escriu un límit d'ús d'energia del -25%. L'ús actiu d'energia es manté al 75% o més després dels efectes de l'ús d'energia.
mir-prototype-efficiency-cap-saving-50=Escriu un límit d'ús d'energia del -50%. L'ús actiu d'energia es manté al 50% o més després dels efectes de l'ús d'energia a les màquines compatibles.
mir-prototype-efficiency-cap-saving-75=Escriu un límit d'ús d'energia del -75%. L'ús actiu d'energia es manté en un 25% o més després dels efectes de l'ús d'energia a les màquines compatibles.
mir-prototype-efficiency-cap-saving-90=Escriu un límit d'ús d'energia del -90%. L'ús d'energia activa pot baixar fins al 10%, que està per sota del sòl normal del 20%.
mir-prototype-efficiency-cap-saving-95=Escriu un límit d'ús d'energia del -95%. El consum d'energia activa pot baixar fins al 5%.
mir-prototype-efficiency-cap-saving-99=Escriu un límit d'ús d'energia del -99%. El consum d'energia activa pot baixar fins a l'1%.
mir-prototype-efficiency-cap-saving-999=Escriu un límit d'ús d'energia del -99,9%. El consum d'energia activa pot baixar fins al 0,1%.
mir-prototype-efficiency-cap-saving-9999=Escriviu un límit d'ús d'energia del -99,99%. Es tracta d'un ús d'energia activa gairebé nul, no una reescriptura de prototips de potència zero.
mir-prototype-pollution-cap-engine-default=Deixeu el límit d'efectes de contaminació de cada màquina. Les màquines sense límit personalitzat utilitzen el límit normal d'efecte contaminació del -80% de Factorio.
mir-prototype-pollution-cap-saving-25=Escriu un límit de contaminació del -25%. La contaminació es manté al 75% o més després dels efectes de la contaminació.
mir-prototype-pollution-cap-saving-50=Escriu un límit de contaminació del -50%. La contaminació es manté al 50% o més després dels efectes de la contaminació a les màquines compatibles.
mir-prototype-pollution-cap-saving-75=Escriu un límit de contaminació del -75%. La contaminació es manté en un 25% o més després dels efectes de la contaminació a les màquines compatibles.
mir-prototype-pollution-cap-saving-90=Escriu un límit de contaminació del -90%. La contaminació pot baixar fins al 10%, que està per sota del sòl normal del 20%.
mir-prototype-pollution-cap-saving-95=Escriu un límit de contaminació del -95%. La contaminació pot baixar fins al 5%.
mir-prototype-pollution-cap-saving-99=Escriu un límit de contaminació del -99%. La contaminació pot baixar fins a l'1%.
mir-prototype-pollution-cap-saving-999=Escriu un límit de contaminació del -99,9%. La contaminació pot baixar fins al 0,1%.
mir-prototype-pollution-cap-saving-9999=Escriu un límit de contaminació del -99,99%. Això és una contaminació gairebé zero, no un script de contaminació en temps d'execució.
mir-prototype-speed-floor-engine-default=Deixeu el límit de velocitat negatiu de cada màquina sol. Les màquines sense límit personalitzat utilitzen el sòl normal del -80% de Factorio i mantenen almenys un 20% de velocitat.
mir-prototype-speed-floor-saving-25=Fixeu els efectes de velocitat negatius a -25%, deixant almenys un 75% de velocitat.
mir-prototype-speed-floor-saving-50=Fixeu els efectes de velocitat negatius al -50%, deixant almenys un 50% de velocitat.
mir-prototype-speed-floor-saving-75=Fixeu els efectes de velocitat negatius al -75%, deixant almenys un 25% de velocitat.
mir-prototype-speed-floor-saving-90=Permet efectes de velocitat negatius fins al -90%, deixant almenys un 10% de velocitat.
mir-prototype-speed-floor-saving-95=Permet efectes de velocitat negatius fins al -95%, deixant almenys un 5% de velocitat.
mir-prototype-speed-floor-saving-99=Permet efectes de velocitat negatius fins al -99%, deixant almenys un 1% de velocitat.
mir-prototype-speed-floor-saving-999=Permet efectes de velocitat negatius fins a -99,9%, deixant almenys un 0,1% de velocitat.
mir-prototype-speed-floor-saving-9999=Permet efectes de velocitat negatius fins al -99,99%, el límit més baix del prototip de Factorio. Aquesta és una velocitat d'elaboració propera a la parada, no zero o negativa.
mir-prototype-speed-cap-engine-default=Deixeu el límit de velocitat de cada màquina. Les màquines sense límit personalitzat utilitzen el sostre molt alt d'efecte de velocitat del +100000% de Factorio.
mir-prototype-speed-cap-bonus-25=Fixeu els efectes de velocitat positiu al +25%.
mir-prototype-speed-cap-bonus-50=Fixeu els efectes de velocitat positiu al +50%. Utilitzeu-ho per mantenir les bonificacions de velocitat molt limitades.
mir-prototype-speed-cap-bonus-75=Fixeu els efectes de velocitat positiu al +75%.
mir-prototype-speed-cap-bonus-100=Fixeu els efectes de velocitat positiu al +100%.
mir-prototype-speed-cap-bonus-125=Fixeu els efectes de velocitat positiu al +125%.
mir-prototype-speed-cap-bonus-150=Fixeu els efectes de velocitat positiu al +150%.
mir-prototype-speed-cap-bonus-200=Fixeu els efectes de velocitat positiu al +200%.
mir-prototype-speed-cap-bonus-250=Abraça els efectes de velocitat positiva al +250%.
mir-prototype-speed-cap-bonus-300=Fixeu els efectes de velocitat positiu al +300%.
mir-prototype-speed-cap-bonus-400=Fixeu els efectes de velocitat positiu al +400%.
mir-prototype-speed-cap-bonus-500=Fixeu els efectes de velocitat positiu al +500%.
mir-prototype-speed-cap-bonus-750=Fixeu els efectes de velocitat positiu al +750%.
mir-prototype-speed-cap-bonus-1000=Fixeu els efectes de velocitat positiu al +1000%.
