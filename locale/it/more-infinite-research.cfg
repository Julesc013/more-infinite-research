[mod-name]
more-infinite-research=Più Ricerche Infinite

[mod-description]
more-infinite-research=Aggiunge ricerche infinite configurabili di produttività e bonus per intermedi, logistica, combattimento, bonus del giocatore e lacune di Space Age.

