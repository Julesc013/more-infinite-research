[mod-setting-description]
ips-require-space-gate=Quando abilitato, queste tecnologie restano bloccate finché non viene ricercata la scienza spaziale nel gioco base, o la scienza al prometio in Space Age.
mir-science-pack-ingredient-policy=Controls extra science packs added to every generated technology. Configured uses each technology's normal packs. Add space science adds space science when available. Add space and promethium science adds both high-end packs when available. Use all official science packs adds base and Space Age packs without modded packs. Use all lab science packs also includes compatible modded science packs.
ips-enable-stream=Disabilita per impedire che __1__ venga generata nella partita.
ips-cost-base-stream=Unità di ricerca richieste per il primo livello di __1__. I livelli superiori scalano da questo valore anche se il primo sblocco inizia più tardi.
ips-cost-growth-stream=Moltiplicatore applicato al costo del livello precedente di __1__. Usa 1 per un costo fisso, o valori maggiori per aumentare la difficoltà a ogni livello.
ips-max-level-stream=Imposta 0 per mantenere __1__ infinita, oppure inserisci un valore positivo per limitarla a quel livello.
ips-research-time-stream=Imposta 0 per usare il tempo di ricerca predefinito configurato per __1__. Inserisci un valore positivo per sostituire i secondi per livello.
mir-enable-base-tech=Consente a __1__ di proseguire oltre il suo limite vanilla con livelli infiniti che seguono la stessa progressione.
mir-cost-base=Imposta 0 per riutilizzare il costo vanilla del livello 1 di __1__. Qualsiasi valore positivo sostituisce il termine base usato dalla formula infinita.
mir-cost-growth=Imposta 0 per continuare il tasso di crescita vanilla di __1__. Inserisci un valore positivo per cambiare quanto aumenta il costo di ogni livello infinito.
mir-research-time=Imposta 0 per riutilizzare il tempo di ricerca vanilla di __1__. Inserisci un valore positivo per sostituire i secondi per livello.
mir-prefer-this-mod-for-competing-techs=Quando abilitato, questo mod rimuove le estensioni infinite concorrenti selezionate e usa le proprie versioni. Disabilita per mantenere le versioni concorrenti di altri mod.
mir-adjust-vanilla-weapon-speed-techs=Controlla se questo mod rimuove i bonus alla velocità di fuoco di razzi e proiettili di cannone dalle tecnologie vanilla quando è disponibile una ricerca sostitutiva dedicata.
mir-debug-generation-report=Quando abilitato, scrive nel log una riga strutturata per ogni flusso ed estensione base generati o saltati, includendo pacchetti scientifici, prerequisiti, numero di effetti, stato di compatibilità dei laboratori e origine dell'icona.
mir-debug-recipe-matches=When enabled, writes matched recipe names for each generated productivity stream. This can be noisy in large mod packs.
mir-debug-scripted-effects=When enabled, writes runtime log entries when scripted technologies recompute global or event-driven effects.
mir-lab-incompatibility-policy=Choose whether incompatible science-pack sets are reduced to the largest lab-compatible subset or skipped entirely.

