[mod-setting-description]
ips-require-space-gate=When enabled, these technologies stay locked until space science is researched in vanilla, or promethium science is researched in Space Age.
mir-settings-mode=Chooses how MIR decides which technologies are enabled. Custom/manual uses the individual enable settings. Preset modes use MIR's preset decision unless a technology's enable policy is set to Force enabled or Force disabled. Cost, growth, maximum level, and research unit time settings remain manual tunables in every mode.
mir-science-pack-ingredient-policy=Controls extra science packs added to every generated technology. Configured uses each technology's normal packs. Add space science adds space science when available. Add space and promethium science adds both high-end packs when available. Use all official science packs adds base and Space Age packs without modded packs. Use all lab science packs also includes compatible modded science packs.
mir-enable-policy-stream=Controls whether __1__ follows the selected settings mode or is forced on/off. Use settings mode uses the enable checkbox in Custom/manual mode and the preset decision in preset modes.
ips-enable-stream=Creates the generated infinite technology for __1__ when its recipes, effects, prerequisites, and science packs are available. Disable this to prevent MIR from generating this technology.
ips-cost-base-stream=Research units required for the first generated level of __1__. Must be at least 1. Later levels are calculated from this value and the cost growth factor.
ips-cost-growth-stream=Multiplier applied to each later level of __1__. Use 1 for flat costs, 1.5 for 50% growth per level, or 2 for doubling costs.
ips-max-level-stream=Highest generated level for __1__. Set to 0 for infinite levels.
ips-research-time-stream=Seconds per research unit for __1__. Set to 0 to use MIR's default for this technology. This is not total research time; total time also depends on research cost, lab count, lab speed, and modules.
mir-enable-base-tech=Allows __1__ to continue past its vanilla cap as an infinite technology. Disable this if you want MIR to add new research lines without extending this vanilla chain.
mir-cost-base=Research units required for the first MIR continuation level of __1__. Set to 0 to inherit the vanilla chain's cost pattern when possible.
mir-cost-growth=Multiplier applied to each later MIR continuation level of __1__. Set to 0 to inherit the vanilla chain's growth pattern when possible.
mir-max-level=Highest MIR continuation level for __1__. Set to 0 for infinite levels.
mir-research-time=Seconds per research unit for the MIR continuation of __1__. Set to 0 to inherit the vanilla chain's research unit time when possible.
mir-enable-policy-base-tech=Controls whether the infinite __1__ continuation follows the selected settings mode or is forced on/off. Use settings mode uses the enable checkbox in Custom/manual mode and the preset decision in preset modes.
mir-prefer-this-mod-for-competing-techs=When enabled, this mod removes selected competing infinite extensions and uses its own versions. Disable to keep competing versions from other mods.
mir-adjust-vanilla-weapon-speed-techs=Controls whether MIR removes rocket and cannon-shell speed bonuses from its generated weapon shooting speed continuation when dedicated replacement research is available. Finite vanilla weapon shooting speed technologies keep their original bonuses.
mir-use-installed-space-age-icons=When enabled, MIR may reference Space Age icon files even when Space Age is installed but disabled for a base-game run. Leave this off if Space Age is not installed; Factorio cannot recover gracefully from missing icon files during prototype loading.
mir-debug-generation-report=When enabled, writes one structured log row per generated or skipped stream and base extension, including science packs, prerequisites, effect count, lab compatibility status, and icon source.
mir-debug-recipe-matches=When enabled, writes matched recipe names for each generated productivity stream. This can be noisy in large mod packs.
mir-debug-scripted-effects=When enabled, writes runtime log entries when scripted technologies recompute global or event-driven effects.
mir-lab-incompatibility-policy=Choose whether incompatible science-pack sets are reduced to the largest lab-compatible subset or skipped entirely.
mir-note-experimental-spoilage=Experimental and disabled by default in v2.0.5. This is a global/map-wide scripted effect. Existing spoilable-stack behavior is not claimed until manually validated.
mir-note-experimental-agriculture=Experimental and disabled by default in v2.0.5. Affects newly planted agricultural tower crops. Existing planted crops are intentionally not rescaled in v2.0.5.
mir-note-sandbox-cargo-pad-count=Sandbox-style and disabled by default. Increases the number of cargo landing pads per surface and can substantially change Space Age logistics balance.
mir-note-inserter-capacity=Disabled by default. Extra inserter capacity can change belt, bus, and inserter-stack assumptions and may require factory redesigns.

