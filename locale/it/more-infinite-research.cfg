[technology-description]
more-infinite-research.recipe_productivity=Aumenta la produttività delle ricette selezionate. Il limite massimo di produttività di Factorio continua ad applicarsi; i livelli infiniti aggiuntivi potrebbero non avere alcun effetto pratico dopo che una ricetta ha raggiunto il suo limite.
more-infinite-research.direct_effect=Aggiunge un bonus ripetibile all'infinito. I pacchetti scientifici vengono scelti dai laboratori attivi, così la tecnologia rimane ricercabile con set di mod compatibili.
more-infinite-research.cargo_bay_unloading_distance=Aumenta la distanza massima tra una piattaforma di atterraggio merci e le baie di scarico collegate.
more-infinite-research.cargo_landing_pad_count=Aumenta il numero di piattaforme di atterraggio merci che ogni forza può costruire per superficie.
more-infinite-research.spoilage_preservation=Increases the global spoil time modifier through a bounded scripted effect. Existing spoilable items may keep their current spoil deadlines until tested in-game.
more-infinite-research.agricultural_growth_speed=Shortens remaining growth time for newly planted agricultural tower plants through a bounded scripted effect.

[modifier-description]
cargo-landing-pad-count=Piattaforme di atterraggio merci per superficie: +__1__
more-infinite-research.spoilage_preservation=Spoilage time: +1% per level
more-infinite-research.agricultural_growth_speed=Agricultural growth speed: +1% per level

