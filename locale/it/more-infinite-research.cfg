[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Non esegue il rilevamento, l'allegato o la creazione automatica. La ricerca fissa di MIR resta invariata.
mir-automatic-productivity-action-preview=Scopre e classifica i candidati, quindi scrive le decisioni accettate e saltate nel registro di Factorio. Non allega ricette né crea ricerche.
mir-automatic-productivity-action-apply=Predefinito. Scopre i candidati e allega solo ricette comprovate in termini di sicurezza alla ricerca MIR esistente compatibile. Non crea ricerca da sola; le due caselle di controllo sottostanti governano la creazione.
mir-automatic-compiler-mode-off=Equivalente legacy di Disabilitato.
mir-automatic-compiler-mode-report=Equivalente legacy delle modifiche di anteprima.
mir-automatic-compiler-mode-safe-attach=Equivalente legacy di Applica modifiche sicure con la creazione della ricerca disabilitata.
mir-automatic-compiler-mode-exact-pack=Equivalente legacy di Applica modifiche sicure con la creazione di ricerca abilitata e dati di compatibilità esaminati richiesti.
mir-automatic-compiler-mode-safe-generate=Equivalente legacy di Applica modifiche sicure con la creazione di ricerca abilitata per i fornitori sperimentali registrati.
mir-adjust-vanilla-weapon-speed-techs-off=Disabilita la pulizia bonus razzo/cannone sovrapposto opzionale di MIR.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Rimuovi i bonus sovrapposti di razzi/cannoni di MIR solo quando una tecnologia infinita abilitata e raggiungibile fornisce l'esatto effetto di sostituzione.
mir-adjust-vanilla-weapon-speed-techs-always=Rimuovi sempre i bonus sovrapposti di razzi/cannoni di MIR. Utilizzare solo se si desidera una separazione rigorosa.
mir-science-pack-ingredient-policy-configured=Utilizza i pacchetti scientifici configurati di ciascuna tecnologia generata senza espansione degli ingredienti opzionale. Impostazione predefinita MIR.
mir-science-pack-ingredient-policy-space=Aggiungi scienza spaziale quando disponibile. Un semplice aumento della difficoltà post-razzo.
mir-science-pack-ingredient-policy-space-and-promethium=Aggiungi la scienza dello spazio e del promezio quando disponibile. Ideale per i lavandini di ricerca dell'era spaziale molto avanzati.
mir-science-pack-ingredient-policy-space-age-progression=Aggiungi solo i pacchetti di progressione Space Age impliciti nei pacchetti selezionati. Non aggiunge pacchetti modificati non correlati.
mir-science-pack-ingredient-policy-official-progression=Aggiungi i pacchetti stile prerequisiti ufficiali mancanti impliciti nel pacchetto ufficiale più avanzato già selezionato.
mir-science-pack-ingredient-policy-mod-progression=Aggiungi i pacchetti compatibili con il laboratorio mancanti dedotti dalla progressione modificata del pacchetto scientifico e sblocca i prerequisiti.
mir-science-pack-ingredient-policy-all-official=Usa tutte le basi ufficiali e i pacchetti scientifici dell'era spaziale esistenti nell'attuale set di mod.
mir-science-pack-ingredient-policy-all=Usa tutti i pacchetti scientifici compatibili con il laboratorio, inclusi i pacchetti scientifici modificati.
mir-lab-incompatibility-policy-reduce=Mantieni la tecnologia riducendo i suoi pacchetti scientifici al set più grande accettato da un laboratorio attivo. Impostazione predefinita più sicura per i pacchetti mod.
mir-lab-incompatibility-policy-skip=Salta la tecnologia se nessun laboratorio attivo può effettuare ricerche sul set del pacchetto scientifico selezionato. Più rigoroso e più facile da controllare.
mir-lab-incompatibility-policy-engine-default=Non riscrivere mai il set del pacchetto scientifico selezionato. MIR preserva inalterato un set ricercabile in modo sicuro e omette la tecnologia generata quando Factorio non può ricercare quel set esatto.
mir-prototype-productivity-cap-engine-default=Lascia invariato il limite di produttività esistente di ciascuna ricetta. Le ricette senza un limite personalizzato utilizzano il normale limite del bonus di produttività del +300% di Factorio.
mir-prototype-productivity-cap-percent-25=Imposta i limiti di produttività delle ricette non parametriche su +25%. Si tratta di un limite iniziale rigoroso.
mir-prototype-productivity-cap-percent-50=Imposta i limiti di produttività delle ricette non parametriche su +50%. Questo è al di sotto del limite normale e fa sì che la ricerca sulla produttività smetta di aiutare prima.
mir-prototype-productivity-cap-percent-75=Imposta i limiti di produttività delle ricette non parametriche su +75%. Questo è al di sotto del limite normale e fa sì che la ricerca sulla produttività smetta di aiutare prima.
mir-prototype-productivity-cap-percent-100=Imposta i limiti di produttività delle ricette non parametriche su +100%. Questo è al di sotto del limite normale e fa sì che la ricerca sulla produttività smetta di aiutare prima.
mir-prototype-productivity-cap-percent-125=Imposta i limiti di produttività delle ricette non parametriche su +125%.
mir-prototype-productivity-cap-percent-150=Imposta i limiti di produttività delle ricette non parametriche su +150%.
mir-prototype-productivity-cap-percent-200=Imposta i limiti di produttività delle ricette non parametriche su +200%. Questo è al di sotto del limite normale e fa sì che la ricerca sulla produttività smetta di aiutare prima.
mir-prototype-productivity-cap-percent-250=Imposta i limiti di produttività delle ricette non parametriche su +250%. Questo è leggermente al di sotto del limite normale.
mir-prototype-productivity-cap-percent-400=Imposta i limiti di produttività delle ricette non parametriche su +400%. Ciò estende il ridimensionamento della produttività oltre il limite normale.
mir-prototype-productivity-cap-percent-500=Imposta i limiti di produttività delle ricette non parametriche su +500%. Ciò estende il ridimensionamento della produttività oltre il limite normale.
mir-prototype-productivity-cap-percent-750=Imposta i limiti di produttività delle ricette non parametriche su +750%.
mir-prototype-productivity-cap-percent-1000=Imposta i limiti di produttività delle ricette non parametriche su +1000%. Utilizzare per salvataggi prolungati in cui la ricerca sulla produttività dovrebbe continuare a essere importante.
mir-prototype-productivity-cap-percent-2500=Imposta i limiti di produttività delle ricette non parametriche su +2500%. Utilizzare per salvataggi molto lunghi.
mir-prototype-productivity-cap-percent-5000=Imposta i limiti di produttività delle ricette non parametriche su +5000%.
mir-prototype-productivity-cap-percent-10000=Imposta i limiti di produttività delle ricette non parametriche su +10000%. Utilizzare solo per il ridimensionamento estremo a lungo termine.
mir-prototype-productivity-cap-percent-25000=Imposta i limiti di produttività delle ricette non parametriche su +25000%. Utilizzare solo per il ridimensionamento estremo a lungo termine.
mir-prototype-productivity-cap-percent-100000=Imposta i limiti di produttività delle ricette non parametriche su +100000%. Questo è effettivamente illimitato per la maggior parte dei salvataggi.
mir-recycling-return-chance-engine-default=Lascia invariata ogni ricetta di riciclo.
mir-recycling-return-chance-match-productivity-cap=Riduzione automatica a prova di exploit per ricette di riciclo generate nascoste. Utilizza 1 / (1 + bonus produttività), limitato al normale rendimento del 25%: +400% diventa 20% e +1000% diventa circa 9,09%.
mir-recycling-return-chance-percent-25=Mantieni le ricette di riciclaggio generate nascoste al normale rendimento del materiale del 25%.
mir-recycling-return-chance-percent-20=Adatta le ricette di riciclaggio generate nascoste a un rendimento del materiale del 20%.
mir-recycling-return-chance-percent-15=Adatta le ricette di riciclaggio generate nascoste a un rendimento del materiale del 15%.
mir-recycling-return-chance-percent-12-5=Adatta le ricette di riciclaggio generate nascoste a un rendimento del materiale del 12,5%.
mir-recycling-return-chance-percent-10=Adatta le ricette di riciclaggio generate nascoste a un rendimento del materiale del 10%.
mir-recycling-return-chance-percent-7-5=Adatta le ricette di riciclaggio generate nascoste a un rendimento del materiale del 7,5%.
mir-recycling-return-chance-percent-5=Adatta le ricette di riciclaggio generate nascoste a un rendimento del materiale del 5%.
mir-recycling-return-chance-percent-2-5=Adatta le ricette di riciclaggio generate nascoste a un rendimento del materiale del 2,5%.
mir-recycling-return-chance-percent-1=Adatta le ricette di riciclaggio generate nascoste a un rendimento del materiale dell'1%.
mir-recycling-return-chance-percent-0-5=Adatta le ricette di riciclaggio generate nascoste a un rendimento del materiale dello 0,5%.
mir-recycling-return-chance-percent-0-1=Adatta le ricette di riciclaggio generate nascoste a un rendimento del materiale dello 0,1%.
mir-prototype-efficiency-cap-engine-default=Lascia invariato il limite dell'effetto di consumo energetico di ciascuna macchina. Le macchine senza un limite personalizzato utilizzano il normale limite massimo dell'effetto di consumo energetico di Factorio pari all'80%, quindi gli effetti non possono ridurre l'uso attivo al di sotto del 20%.
mir-prototype-efficiency-cap-saving-25=Scrivi un tetto massimo del -25% sul consumo energetico. Il consumo di energia attiva rimane al 75% o più dopo gli effetti del consumo di energia.
mir-prototype-efficiency-cap-saving-50=Scrivi un tetto massimo del -50% sul consumo energetico. L'utilizzo dell'energia attiva rimane al 50% o più dopo gli effetti dell'utilizzo dell'energia sulle macchine supportate.
mir-prototype-efficiency-cap-saving-75=Scrivi un limite di consumo energetico del -75%. Il consumo di energia attiva rimane al 25% o più dopo gli effetti del consumo di energia sulle macchine supportate.
mir-prototype-efficiency-cap-saving-90=Scrivi un limite di consumo energetico del -90%. Il consumo di energia attiva può scendere al 10%, ovvero al di sotto della normale soglia del 20%.
mir-prototype-efficiency-cap-saving-95=Scrivi un limite di consumo energetico del -95%. Il consumo di energia attiva può scendere al 5%.
mir-prototype-efficiency-cap-saving-99=Scrivi un limite di consumo energetico del -99%. Il consumo di energia attiva può scendere all’1%.
mir-prototype-efficiency-cap-saving-999=Scrivi un limite di consumo energetico del -99,9%. Il consumo di energia attiva può scendere allo 0,1%.
mir-prototype-efficiency-cap-saving-9999=Scrivi un limite di consumo energetico del -99,99%. Si tratta di un consumo di energia attiva vicino allo zero, non di una riscrittura del prototipo a potenza zero.
mir-prototype-pollution-cap-engine-default=Lasciare da parte il limite di effetto inquinamento di ciascuna macchina. Le macchine senza limite personalizzato utilizzano il normale limite di effetto inquinamento dell'80% di Factorio.
mir-prototype-pollution-cap-saving-25=Scrivi un limite di inquinamento del -25%. L'inquinamento rimane al 75% o più dopo gli effetti dell'inquinamento.
mir-prototype-pollution-cap-saving-50=Scrivi un limite di inquinamento del -50%. L'inquinamento rimane al 50% o più dopo gli effetti dell'inquinamento sulle macchine supportate.
mir-prototype-pollution-cap-saving-75=Scrivi un limite di inquinamento del -75%. L'inquinamento rimane al 25% o più dopo gli effetti dell'inquinamento sulle macchine supportate.
mir-prototype-pollution-cap-saving-90=Scrivi un limite di inquinamento del -90%. L’inquinamento può scendere al 10%, ovvero al di sotto della normale soglia del 20%.
mir-prototype-pollution-cap-saving-95=Scrivi un limite di inquinamento del -95%. L'inquinamento può scendere al 5%.
mir-prototype-pollution-cap-saving-99=Scrivi un limite di inquinamento del -99%. L'inquinamento può scendere fino all'1%.
mir-prototype-pollution-cap-saving-999=Scrivi un limite di inquinamento del -99,9%. L’inquinamento può scendere allo 0,1%.
mir-prototype-pollution-cap-saving-9999=Scrivi un limite di inquinamento del -99,99%. Si tratta di un inquinamento vicino allo zero, non di uno script di inquinamento del runtime.
mir-prototype-speed-floor-engine-default=Lascia stare il limite di velocità negativo di ciascuna macchina. Le macchine senza un limite personalizzato utilizzano il normale piano -80% di Factorio e mantengono almeno il 20% di velocità.
mir-prototype-speed-floor-saving-25=Blocca gli effetti di velocità negativi a -25%, lasciando almeno il 75% di velocità.
mir-prototype-speed-floor-saving-50=Blocca gli effetti di velocità negativi a -50%, lasciando almeno il 50% di velocità.
mir-prototype-speed-floor-saving-75=Blocca gli effetti di velocità negativi a -75%, lasciando almeno il 25% di velocità.
mir-prototype-speed-floor-saving-90=Consenti effetti di velocità negativi fino al -90%, lasciando almeno il 10% di velocità.
mir-prototype-speed-floor-saving-95=Consenti effetti di velocità negativi fino a -95%, lasciando almeno il 5% di velocità.
mir-prototype-speed-floor-saving-99=Consenti effetti di velocità negativi fino a -99%, lasciando almeno l'1% di velocità.
mir-prototype-speed-floor-saving-999=Consenti effetti di velocità negativi fino a -99,9%, lasciando almeno lo 0,1% di velocità.
mir-prototype-speed-floor-saving-9999=Consenti effetti di velocità negativi fino a -99,99%, il limite più basso del prototipo Factorio. Questa è una velocità di creazione quasi pari a zero, non zero o negativa.
mir-prototype-speed-cap-engine-default=Lascia stare il limite di velocità di ciascuna macchina. Le macchine senza un limite personalizzato utilizzano il limite molto elevato dell'effetto velocità di Factorio, pari a +100000%.
mir-prototype-speed-cap-bonus-25=Blocca gli effetti di velocità positivi al +25%.
mir-prototype-speed-cap-bonus-50=Blocca gli effetti di velocità positivi al +50%. Usalo per mantenere strettamente limitati i bonus di velocità.
mir-prototype-speed-cap-bonus-75=Blocca gli effetti di velocità positivi al +75%.
mir-prototype-speed-cap-bonus-100=Blocca gli effetti di velocità positivi al +100%.
mir-prototype-speed-cap-bonus-125=Blocca gli effetti di velocità positivi al +125%.
mir-prototype-speed-cap-bonus-150=Blocca gli effetti di velocità positivi al +150%.
mir-prototype-speed-cap-bonus-200=Blocca gli effetti di velocità positivi al +200%.
mir-prototype-speed-cap-bonus-250=Blocca gli effetti di velocità positivi al +250%.
mir-prototype-speed-cap-bonus-300=Blocca gli effetti di velocità positivi al +300%.
mir-prototype-speed-cap-bonus-400=Blocca gli effetti di velocità positivi al +400%.
mir-prototype-speed-cap-bonus-500=Blocca gli effetti di velocità positivi al +500%.
mir-prototype-speed-cap-bonus-750=Blocca gli effetti di velocità positivi al +750%.
mir-prototype-speed-cap-bonus-1000=Blocca gli effetti di velocità positivi al +1000%.
mir-prototype-speed-cap-bonus-2500=Blocca gli effetti di velocità positivi al +2500%.
mir-prototype-speed-cap-bonus-5000=Blocca gli effetti di velocità positivi al +5000%.
mir-prototype-speed-cap-bonus-10000=Blocca gli effetti della velocità positiva al +10000%.
mir-prototype-speed-cap-bonus-25000=Blocca gli effetti della velocità positiva al +25000%.
mir-prototype-speed-cap-bonus-100000=Scrivi esplicitamente il limite massimo dell'effetto velocità di Factorio. A differenza di quanto non modificato, questo sovrascrive i limiti inferiori personalizzati.
mir-prototype-quality-cap-engine-default=Lascia inalterato il limite di effetto qualità di ciascuna macchina. Le macchine senza un limite personalizzato utilizzano il massimale di effetto qualità molto elevato del +100000% di Factorio.
mir-prototype-quality-cap-bonus-50=Blocca gli effetti di qualità positivi al +50%. Ciò limita gli effetti bonus sulla qualità della macchina, non i livelli di qualità o le formule di probabilità degli oggetti.
mir-prototype-quality-cap-bonus-25=Blocca gli effetti di qualità positivi al +25%. Ciò non modifica i livelli di qualità o le formule di probabilità degli articoli.
