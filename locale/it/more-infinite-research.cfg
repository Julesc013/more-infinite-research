[mod-setting-description]
ips-require-space-gate=Se abilitate, queste tecnologie rimangono bloccate finché la scienza spaziale non viene ricercata nella vaniglia o la scienza del promezio non viene ricercata nell'era spaziale.
mir-science-pack-ingredient-policy=Sceglie come MIR aggiunge i pacchetti scientifici alle tecnologie generate. Le opzioni sono ordinate da conservatore a ampio: pacchetti predefiniti, pacchetti di fine gioco, pacchetti basati sulla progressione, quindi tutti i pacchetti disponibili.
mir-automatic-productivity-action=Sceglie cosa fa MIR con le opportunità di produttività sicure trovate nelle ricette delle mod installate. Disabilitato non esegue il rilevamento automatico. Anteprima delle modifiche, record dei candidati accettati e saltati nel registro di Factorio senza modificare la ricerca. Applica modifiche sicure (impostazione predefinita) aggiunge ricette idonee solo alla ricerca MIR esistente compatibile. Questo controlla l'azione, non la forza o la maturità; le caselle di creazione riportate di seguito sono separate. Si applicano sempre i controlli di proprietà, riciclaggio, probabilità, catalizzatore, scienza, laboratorio, prerequisiti, bersaglio, identità, progressione e ciclo.
mir-automatic-create-research=Predefinito: disattivato. Off-limits Applicare modifiche sicure alla ricerca MIR esistente compatibile; i candidati senza un flusso adatto vengono saltati e segnalati. On consente a un fornitore registrato idoneo di creare una tecnologia di produttività infinita generica stabile quando nessuna ricerca esistente è adatta. La casella di controllo dei dati esaminati di seguito decide se i fornitori sperimentali sono idonei. MIR non crea mai una tecnologia per mod o ricetta e si applica ancora ogni rigida sicurezza, scienza, proprietà, identità, progressione e cancello ciclabile.
mir-automatic-require-reviewed-data=Predefinito: attivo. Ciò è importante solo quando Consenti la creazione di nuove ricerche è attivo; non blocca mai l’attaccamento sicuro alla ricerca esistente. Nei permessi solo le famiglie di fornitori contrassegnate come revisionate e supportate da prove applicabili della versione esatta, quindi le famiglie sperimentali vengono saltate. Off consente ai fornitori sperimentali registrati di creare da prove strutturali generiche. Per un comportamento sperimentale più ampio, abilita la creazione di ricerche e disattiva questo requisito. Nessun valore può bypassare un cancello di sicurezza rigido.
mir-automatic-compiler-mode=Bridge di compatibilità nascosto per i profili creati prima dei controlli di produttività automatica suddivisi. Un valore legacy non predefinito viene rispettato solo mentre tutti i nuovi controlli rimangono ai valori predefiniti. Modificare qualsiasi nuovo controllo per assumere il controllo esplicito.
ips-enable-stream=Crea la tecnologia infinita generata per __1__ quando le sue ricette, effetti, prerequisiti e pacchetti scientifici sono disponibili. Disabilitalo per impedire a MIR di generare questa tecnologia.
ips-cost-base-stream=Unità di ricerca richieste per il primo livello generato di __1__. Deve essere almeno 1. I livelli successivi vengono calcolati da questo valore e dal fattore di crescita dei costi.
ips-cost-growth-stream=Moltiplicatore applicato a ciascun livello successivo di __1__. Usa 1 per costi fissi, 1,5 per una crescita del 50% per livello o 2 per raddoppiare i costi.
ips-max-level-stream=Livello generato più alto per __1__. Impostato su 0 per livelli infiniti.
ips-research-time-stream=Secondi per unità di ricerca per __1__. Impostare su 0 per utilizzare l'impostazione predefinita di MIR per questa tecnologia. Questo non è il tempo totale della ricerca; il tempo totale dipende anche dal costo della ricerca, dal conteggio dei laboratori, dalla velocità del laboratorio e dai moduli.
mir-enable-base-tech=Consente a __1__ di continuare oltre il suo limite vanigliato come tecnologia infinita. Disabilitalo se vuoi che MIR aggiunga nuove linee di ricerca senza estendere questa catena vanilla.
mir-cost-base=Unità di ricerca richieste per il primo livello di continuazione MIR di __1__. Imposta su 0 per ereditare il modello di costo della catena vanilla, quando possibile.
mir-cost-growth=Moltiplicatore applicato a ciascun livello di continuazione MIR successivo di __1__. Imposta su 0 per ereditare il modello di crescita della catena vanilla quando possibile.
mir-max-level=Livello di continuazione MIR più alto per __1__. Impostato su 0 per livelli infiniti.
mir-research-time=Secondi per unità di ricerca per la continuazione MIR di __1__. Impostato su 0 per ereditare il tempo dell'unità di ricerca della catena vanilla, quando possibile.
mir-prefer-this-mod-for-competing-techs=Se abilitata, questa mod rimuove le estensioni infinite concorrenti selezionate e utilizza le proprie versioni. Disabilita per mantenere le versioni concorrenti di altri mod.
mir-adjust-vanilla-weapon-speed-techs=Controlla se MIR rimuove i bonus di velocità di razzi e proiettili di cannone dalla continuazione della velocità di tiro dell'arma generata quando è disponibile una copertura di sostituzione infinita esatta. Le tecnologie di velocità di tiro delle armi Vanilla finite mantengono i loro bonus originali.
mir-use-installed-space-age-icons=Se abilitato, MIR può fare riferimento ai file icona DLC ufficiali installati, inclusi Space Age ed Elevated Rails, anche quando tali mod sono disabilitate per l'esecuzione del gioco base. Lascialo disattivato se i file DLC non sono installati; Factorio non è in grado di ripristinare correttamente i file icona mancanti durante il caricamento del prototipo.
mir-pipeline-extent-multiplier=Moltiplicatore a discesa di solo avvio per i campi di estensione della tubazione della scatola del fluido riconosciuti nei prototipi, non solo nelle entità del tubo. Il 100% lascia invariati i prototipi e non carica il passaggio della tubazione né scansiona le scatole dei fluidi. I valori diversi dal 100% sono sperimentali e possono influenzare macchine, serbatoi, propulsori e prototipi modificati che definiscono le scatole dei fluidi.
mir-unrestricted-modules=Sperimentale e rivoluzionario. Quando abilitata, ogni ricetta esistente accetta tutti e cinque gli effetti del modulo e ogni ricevitore del modulo esistente con slot accetta ogni categoria di modulo rilevata. Ciò non aggiunge slot per moduli né modifica prototipi di moduli e può consentire produttività, qualità e cicli di moduli modificati.
mir-prototype-productivity-cap=Scegli se MIR lascia invariati i limiti di produttività delle ricette o scrive un limite di avvio per ogni ricetta senza parametri e senza riciclaggio. +300% (invariato) preserva i limiti delle ricette esistenti; valori più bassi riducono il ridimensionamento della produttività, mentre valori più alti lo estendono.
mir-recycling-return-chance=Controlla solo le ricette di riciclaggio generate nascoste. La modalità automatica riduce il normale rendimento del materiale del 25% a un massimo di 1 diviso per il moltiplicatore di produzione totale al limite di produttività selezionato. Le scelte fisse scalano direttamente gli stessi rendimenti generati. I processi visibili e i limiti di produttività delle ricette non vengono mai modificati.
mir-productivity-cap-self-recycling-only=Sopra 1 / rendimento del riciclatore - 1, solo le ricette di produzione con un comprovato percorso di autoriciclaggio non generativo ricevono il limite superiore selezionato. Al di sotto o al di sotto di tale soglia questa casella di controllo non ha alcun effetto. Il motore invariato utilizza il normale rendimento del 25% come soglia conservativa del +300% senza modificare le ricette di riciclaggio.
mir-prototype-efficiency-cap=Sceglie fino a che punto gli effetti di efficienza possono ridurre il consumo energetico attivo della macchina. -80% (invariato) lascia invariati i limiti di utilizzo energetico esistenti. Riduzioni più profonde possono avvicinarsi allo zero del consumo di energia attiva senza modificare i limiti di inquinamento.
mir-prototype-pollution-cap=Sceglie in che misura gli effetti di riduzione dell'inquinamento possono ridurre l'inquinamento della macchina. -80% (invariato) lascia invariati i limiti di inquinamento esistenti. Riduzioni più profonde possono avvicinarsi all’inquinamento zero senza modificare il consumo di energia.
mir-prototype-speed-floor=Scegli quanto gli effetti negativi della velocità possono rallentare le macchine supportate. -80% (invariato) lascia invariati i limiti esistenti; valori più profondi rimuovono il livello normale fino a un quasi stop al -99,99%.
mir-prototype-speed-cap=Scegli se MIR lascia inalterati i limiti di velocità della macchina o scrive un nuovo limite di velocità positivo. +100000% (invariato) mantiene i limiti esistenti; valori più bassi bloccano intenzionalmente bonus di velocità molto elevati.
mir-prototype-quality-cap=Scegli se MIR lascia inalterati i limiti di effetto qualità della macchina o scrive un nuovo limite di qualità positivo. +100000% (invariato) preserva i limiti esistenti e non modifica i livelli di qualità o le formule di probabilità degli articoli.
mir-prototype-positive-power-floor=Disattivato per impostazione predefinita. Se abilitato, MIR modifica i prototipi espliciti di consumo energetico attivo da 0 W a 1 W durante il caricamento del prototipo in modo che le icone di avviso di basso consumo non vengano visualizzate sulle entità che dovrebbero assorbire una piccola quantità diversa da zero. Smettere di preservare esattamente i prototipi a potenza zero.
mir-settings-profile-import=Incolla qui una stringa del profilo delle impostazioni MIR per applicare i valori di impostazione di avvio esportati come livello di sostituzione durante la generazione del prototipo. Lascia vuoto per le impostazioni normali. Esporta con /mir-settings-export da un salvataggio attivo, quindi riavvia dopo aver modificato questo valore.
mir-debug-generation-report=Se abilitato, scrive una riga di registro strutturato per flusso generato o saltato ed estensione di base, inclusi pacchetti scientifici, prerequisiti, conteggio degli effetti, stato di compatibilità del laboratorio e origine delle icone.
mir-debug-recipe-matches=Quando abilitato, scrive i nomi delle ricette corrispondenti per ciascun flusso di produttività generato. Questo può essere rumoroso nei mod pack di grandi dimensioni.
mir-debug-scripted-effects=Se abilitato, scrive le voci del registro di runtime quando le tecnologie basate su script ricalcolano gli effetti globali o guidati dagli eventi.
mir-lab-incompatibility-policy=Scegli cosa fa MIR quando i pacchetti scientifici selezionati non possono essere ricercati da nessun laboratorio attivo.
ips-effect-per-level-stream=Imposta l'effetto del livello base primario per livello per __1__. I livelli e gli effetti successivi correlati vengono ridimensionati proporzionalmente. Gli effetti percentuali utilizzano punti percentuali; gli effetti di conteggio e distanza utilizzano le loro unità native.
mir-effect-per-level=Imposta l'effetto canonico per livello per la continuazione infinita di __1__. Gli effetti correlati vengono ridimensionati proporzionalmente rispetto alla linea di base vanilla finale. Gli effetti percentuali utilizzano punti percentuali; gli effetti di conteggio e distanza utilizzano le loro unità native.
mir-note-experimental-spoilage=Sperimentale e disabilitato per impostazione predefinita nella v2.1.0. Questo è un effetto basato su script globale/su tutta la mappa. Il comportamento dello stack deteriorabile esistente non viene rivendicato finché non viene convalidato manualmente.
mir-note-agriculture-growth=Si applica alle colture agricole a torre appena piantate. Le colture piantate esistenti non vengono ridimensionate.
mir-note-cargo-pad-count=Ricerca logistica speciale sull'era spaziale. Aumenta le piattaforme di atterraggio del carico per superficie e può modificare sostanzialmente l'equilibrio logistico.
mir-note-inserter-capacity=Disabilitato per impostazione predefinita. La capacità aggiuntiva dell'inseritore può rompere gli inseritori controllati da circuito e ridurre le ottimizzazioni del motore.
mir-note-native-owner-managed-stream=Se una tecnologia infinita installata possiede già questa famiglia di ricerca, queste stesse impostazioni di avvio configurano quel proprietario invece di creare un duplicato. Le impostazioni predefinite MIR invariate preservano esattamente il prototipo finale del proprietario. Le modifiche esplicite di costo, tempo, livello massimo ed effetti si applicano solo dopo una corrispondenza sicura del proprietario; la disabilitazione dello streaming lascia intatta la tecnologia esterna. Riavvia Factorio dopo aver modificato le impostazioni di avvio. Un livello massimo pari a 0 significa infinito e i valori degli effetti sono punti percentuali per livello.

