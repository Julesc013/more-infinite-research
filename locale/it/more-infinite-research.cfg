[technology-description]
more-infinite-research.recipe_productivity=Aumenta la produttività delle ricette selezionate. Il limite massimo di produttività di Factorio continua ad applicarsi; i livelli infiniti aggiuntivi potrebbero non avere alcun effetto pratico dopo che una ricetta ha raggiunto il suo limite.
more-infinite-research.direct_effect=Aggiunge un bonus ripetibile all'infinito. I pacchetti scientifici vengono scelti dai laboratori attivi, così la tecnologia rimane ricercabile con set di mod compatibili.
more-infinite-research.cargo_bay_unloading_distance=Aumenta la distanza massima tra una piattaforma di atterraggio merci e le baie di scarico collegate.
more-infinite-research.cargo_landing_pad_count=Aumenta il numero di piattaforme di atterraggio merci che ogni forza può costruire per superficie.
more-infinite-research.flamethrower_shooting_speed=Aumenta la velocità di tiro delle armi lanciafiamme e delle torrette lanciafiamme.
more-infinite-research.electric_shooting_speed=Aumenta la velocità di tiro delle armi elettriche. Nella vaniglia ciò influisce sulla difesa dalla scarica; con Space Age influisce anche sulle armi Tesla quando è disponibile la categoria munizioni Tesla.
more-infinite-research.spoilage_preservation=Aumenta il modificatore globale del tempo di spoiler attraverso un effetto di script limitato. Gli oggetti deteriorabili esistenti potrebbero mantenere le scadenze attuali fino al momento del test nel gioco.
more-infinite-research.agricultural_growth_speed=Riduce il tempo di crescita rimanente per le piante a torre agricole appena piantate attraverso un effetto di script limitato.
more-infinite-research.lab_productivity=Aumenta i progressi della ricerca ottenuti da ogni pacchetto scientifico consumato, utilizzando il modificatore di produttività della ricerca di laboratorio nativo.

