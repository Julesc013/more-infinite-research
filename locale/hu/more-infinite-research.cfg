[mod-setting-description]
ips-require-space-gate=Ha engedélyezve van, ezek a technológiák zárolva maradnak mindaddig, amíg az űrtudományt vaníliában, vagy a prométiumtudományt az űrkorszakban nem kutatják.
mir-science-pack-ingredient-policy=Kiválasztja, hogy a MIR hogyan adja hozzá a tudományos csomagokat az előállított technológiákhoz. A lehetőségek a konzervatívtól az általánosig vannak rendezve: alapértelmezett csomagok, késői játékcsomagok, progresszió alapú csomagok, majd az összes elérhető csomag.
mir-automatic-productivity-action=Kiválasztja, hogy a MIR mit tegyen a telepített mod receptekben található biztonságos termelékenységi lehetőségekkel. A Letiltva nem hajt végre automatikus felderítést. Tekintse meg az elfogadott és kihagyott jelölteket a Factorio naplójában, a kutatás megváltoztatása nélkül. A Biztonságos módosítások alkalmazása (alapértelmezett) csak a kompatibilis meglévő MIR-kutatásokhoz ad hozzá megfelelő recepteket. Ez irányítja a cselekvést, nem az erőt vagy az érettséget; az alábbi létrehozási jelölőnégyzetek különállóak. A tulajdonjog, az újrahasznosítás, a valószínűség, a katalizátor, a tudomány, a laboratórium, az előfeltétel, a cél, az azonosság, az előrehaladás és a ciklus ellenőrzése mindig érvényes.
mir-automatic-create-research=Alapértelmezés: ki. Off limits Biztonságos változtatások alkalmazása a kompatibilis meglévő MIR-kutatásokon; a megfelelő adatfolyammal nem rendelkező jelölteket kihagyják és jelentik. Az On lehetővé teszi a jogosult regisztrált szolgáltatók számára, hogy egyetlen stabil, általános, végtelen termelékenységi technológiát hozzanak létre, ha a meglévő kutatások nem férnek hozzá. Az alábbi áttekintett adatok jelölőnégyzet dönti el, hogy a kísérleti szolgáltatók jogosultak-e. A MIR soha nem hoz létre egy technológiát modonként vagy receptenként, és minden szigorú biztonsági, tudományos, tulajdonjogi, identitási, fejlődési és cikluskapu továbbra is érvényes.
mir-automatic-require-reviewed-data=Alapértelmezés: be. Ez csak akkor számít, ha az Új kutatás létrehozásának engedélyezése be van kapcsolva; soha nem akadályozza meg a biztonságos kötődést a meglévő kutatásokhoz. Az engedélyeken csak a felülvizsgált szolgáltatói családok vannak megjelölve, és amelyeket megfelelő pontos verziójú bizonyítékok támogatnak, ezért a kísérleti családokat kihagyjuk. Az Off lehetővé teszi a regisztrált kísérleti szolgáltatók számára, hogy általános szerkezeti bizonyítékokból hozzanak létre. A legszélesebb körű kísérleti viselkedés érdekében engedélyezze a kutatás létrehozását, és kapcsolja ki ezt a követelményt. Egyetlen érték sem kerülheti meg a kemény biztonsági kaput.
mir-automatic-compiler-mode=Rejtett kompatibilitási híd az osztott automatikus termelékenységvezérlők előtt létrehozott profilokhoz. A nem alapértelmezett örökölt értékeket csak addig tartják tiszteletben, amíg az összes új vezérlő az alapértelmezett értéken marad. Módosítsa az új vezérlőket, hogy átvegye az explicit irányítást.
ips-enable-stream=Létrehozza a __1__ számára generált végtelen technológiát, amikor elérhetőek a receptjei, effektjei, előfeltételei és tudományos csomagjai. Tiltsa le ezt, hogy megakadályozza, hogy a MIR előállítsa ezt a technológiát.
ips-cost-base-stream=Kutatási egységek szükségesek a __1__ első generált szintjéhez. Legalább 1-nek kell lennie. A későbbi szintek kiszámítása ebből az értékből és a költségnövekedési tényezőből történik.
ips-cost-growth-stream=A __1__ minden későbbi szintjére alkalmazott szorzó. Használjon 1-et az átalányköltségekhez, 1,5-öt a szintenkénti 50%-os növekedéshez, vagy 2-t a költségek megduplázásához.
ips-max-level-stream=A __1__ legmagasabb generált szintje. Állítsa 0-ra a végtelen szinthez.
ips-research-time-stream=másodperc kutatási egységenként a __1__ esetében. Állítsa 0-ra a MIR alapértelmezett értékének használatához ehhez a technológiához. Ez nem a teljes kutatási idő; A teljes idő a kutatási költségtől, a laborszámtól, a labor sebességétől és a moduloktól is függ.
mir-enable-base-tech=Lehetővé teszi, hogy a __1__ továbbhaladjon a vaníliás kupakján, mint végtelen technológia. Tiltsa le ezt, ha azt szeretné, hogy a MIR új kutatási vonalakat adjon hozzá a vanílialánc meghosszabbítása nélkül.
mir-cost-base=Kutatási egységek szükségesek a __1__ első MIR-folytatási szintjéhez. Állítsa 0-ra, hogy lehetőség szerint örökölje a vanílialánc költségmintáját.
mir-cost-growth=A __1__ minden későbbi MIR folytatási szintjére alkalmazott szorzó. Állítsa 0-ra, hogy lehetőség szerint örökölje a vanílialánc növekedési mintáját.
mir-max-level=A legmagasabb MIR folytatási szint a __1__ esetében. Állítsa 0-ra a végtelen szinthez.
mir-research-time=másodperc kutatási egységenként a __1__ MIR folytatása esetén. Állítsa 0-ra, hogy örökölje a vanílialánc kutatási egység idejét, ha lehetséges.
mir-prefer-this-mod-for-competing-techs=Ha engedélyezve van, ez a mod eltávolítja a kiválasztott versengő végtelen bővítményeket, és a saját verzióit használja. Tiltsa le, hogy a többi mod versengő verziói megmaradjanak.
mir-adjust-vanilla-weapon-speed-techs=Szabályozza, hogy a MIR eltávolítsa-e a rakéta- és ágyúhéj-sebesség-bónuszokat a generált fegyverlövési sebességből, ha pontos végtelen cserelefedettség áll rendelkezésre. A véges vanília fegyveres lövési sebességű technológiák megtartják eredeti bónuszaikat.
mir-use-installed-space-age-icons=Ha engedélyezve van, a MIR hivatkozhat a telepített hivatalos DLC ikonfájlokra, beleértve a Space Age-t és az Elevated Rails-t, még akkor is, ha ezek a modok le vannak tiltva az alapjáték futtatásához. Hagyja ezt kikapcsolva, ha ezek a DLC-fájlok nincsenek telepítve; A Factorio nem tud kecsesen helyreállítani a hiányzó ikonfájlokat a prototípus betöltése során.
mir-pipeline-extent-multiplier=Csak indítási legördülő szorzó a felismert folyadékdoboz-csővezeték kiterjedési mezőihez prototípusokon keresztül, nem csak cső entitásokon. 100% változatlanul hagyja a prototípusokat, és nem tölti be a csővezeték áthaladását vagy a szkennelő folyadékdobozokat. A nem 100%-os értékek kísérleti jellegűek, és hatással lehetnek a folyadékdobozokat meghatározó gépekre, tartályokra, tolómotorokra és módosított prototípusokra.
mir-unrestricted-modules=Kísérleti és egyensúlybontó. Ha engedélyezve van, minden létező recept elfogadja mind az öt modul effektust, és minden meglévő modul vevő nyílásokkal minden felfedezett modulkategóriát. Ez nem ad hozzá modulhelyeket és nem módosítja a modul prototípusait, és lehetővé teheti a termelékenységet, a minőséget és a módosított modul-hurkokat.
mir-prototype-productivity-cap=Kiválasztja, hogy a MIR hagyja-e magára a receptek termelékenységi korlátait, vagy írjon egy indítási korlátot minden nem paraméteres, nem újrahasznosított recepthez. +300% (változatlanul) megőrzi a meglévő recept sapkákat; az alacsonyabb értékek lerövidítik a termelékenység skáláját, míg a magasabb értékek kiterjesztik azt.
mir-recycling-return-chance=Csak a rejtett generált újrahasznosítási recepteket vezérli. Az automatikus mód a normál 25%-os anyaghozamot legfeljebb 1-re csökkenti, osztva a teljes kibocsátási szorzóval a kiválasztott termelékenységi korlátnál. A rögzített választási lehetőségek közvetlenül az azonos generált hozamokat skálázzák. A látható folyamatok és a receptek termelékenységi korlátai soha nem változnak.
mir-productivity-cap-self-recycling-only=1 felett / újrahasznosító visszaküldése - 1, csak a bizonyítottan nem generatív ön-újrahasznosítási útvonallal rendelkező gyártási receptek kapják a kiválasztott magasabb felső határt. E küszöbérték felett vagy alatta ennek a jelölőnégyzetnek nincs hatása. A változatlan motor a normál 25%-os megtérülést használja konzervatív +300%-os küszöbként, az újrahasznosítási receptek megváltoztatása nélkül.
mir-prototype-efficiency-cap=Kiválasztja, hogy a hatékonysági hatások milyen mértékben csökkenthetik a gép aktív energiafelhasználását. -80% (változatlan) a meglévő energiafelhasználási korlátokat magára hagyja. Mélyebb csökkentésekkel megközelíthető a nulla aktív energiafelhasználás a szennyezési határértékek megváltoztatása nélkül.
mir-prototype-pollution-cap=Kiválasztja, hogy a szennyezés-csökkentő hatások milyen mértékben csökkenthetik a gépek szennyezését. -80% (változatlan) a meglévő szennyezési határértékeket magára hagyja. A mélyebb csökkentésekkel az energiafelhasználás megváltoztatása nélkül megközelíthető a nulla szennyezés.
mir-prototype-speed-floor=Kiválasztja, hogy a negatív sebességhatások milyen mértékben lassíthatják a támogatott gépeket. -80% (változatlan) a meglévő határértékeket magára hagyja; a mélyebb értékek eltávolítják a normál padlót a -99,99%-os megállás közelébe.
mir-prototype-speed-cap=Kiválasztja, hogy a MIR magára hagyja-e a gép sebesség-hatáskorlátait, vagy új pozitív sebességkorlátot ír-e. +100000% (változatlan) megtartja a meglévő határértékeket; az alacsonyabb értékek szándékosan nagyon nagy sebességi bónuszokat rögzítenek.
mir-prototype-quality-cap=Kiválasztja, hogy a MIR magára hagyja-e a gépminőség-hatás határait, vagy új pozitív minőségkorlátot írjon. A +100000% (változatlan) megőrzi a meglévő korlátokat, és nem változtatja meg a minőségi szinteket vagy a tételvalószínűségi képleteket.
mir-prototype-positive-power-floor=Alapértelmezett kikapcsolva. Ha engedélyezve van, a MIR az explicit 0 W-os aktív energiahasználat prototípusokat 1 W-ra változtatja a prototípus betöltése során, így az alacsony energiafogyasztásra figyelmeztető ikonok nem jelennek meg azokon az entitásokon, amelyeknek nullától eltérő mennyiséget kellene húzniuk. Hagyja el, hogy pontosan megőrizze a nulla energiafelhasználású prototípusokat.
mir-settings-profile-import=Illesszen be ide egy MIR-beállítási profil karakterláncot, hogy az exportált indítási beállítási értékeket felülbírálási rétegként alkalmazza a prototípus generálása során. Hagyja üresen a normál beállításokhoz. Exportálás a /mir-settings-export paranccsal egy aktív mentésből, majd az érték módosítása után indítsa újra.
mir-debug-generation-report=Ha engedélyezve van, egy strukturált naplósort ír generált vagy kihagyott adatfolyamonként és alapkiterjesztésenként, beleértve a tudományos csomagokat, az előfeltételeket, az effektusok számát, a laboratóriumi kompatibilitási állapotot és az ikonforrást.
mir-debug-recipe-matches=Ha engedélyezve van, minden egyes generált termelékenységi adatfolyamhoz egyező receptneveket ír. Ez zajos lehet nagy mod-csomagokban.
mir-debug-scripted-effects=Ha engedélyezve van, futásidejű naplóbejegyzéseket ír, amikor a parancsfájl-technológiák újraszámítják a globális vagy eseményvezérelt hatásokat.
mir-lab-incompatibility-policy=Kiválasztja, hogy a MIR mit tegyen, ha a kiválasztott tudományos csomagokat egyetlen aktív labor sem tudja kutatni.
ips-effect-per-level-stream=Beállítja a __1__ elsődleges alapszintű hatását szintenként. A kapcsolódó későbbi szintek és hatások arányosan skálázódnak. A százalékos hatások százalékpontokat használnak; a szám- és távolsághatások natív egységeiket használják.
mir-effect-per-level=Beállítja a kanonikus szintenkénti hatást a végtelen __1__ folytatáshoz. A kapcsolódó hatásokat a végső vanília alapvonalhoz képest arányosan skálázzuk. A százalékos hatások százalékpontokat használnak; a szám- és távolsághatások natív egységeiket használják.
mir-note-experimental-spoilage=Kísérleti és alapértelmezés szerint le van tiltva a 2.1.0-s verzióban. Ez egy globális/térkép-szintű script-effektus. A meglévő elrontható verem viselkedés nem érvényesíthető a kézi ellenőrzésig.
mir-note-agriculture-growth=Újonnan ültetett mezőgazdasági toronynövényekre vonatkozik. A meglévő elültetett növényeket nem méretezik át.
mir-note-cargo-pad-count=Speciális űrkorszaki logisztikai kutatás. Növeli a rakomány leszállópadok számát felületenként, és jelentősen megváltoztathatja a logisztikai egyensúlyt.
mir-note-inserter-capacity=Alapértelmezés szerint le van tiltva. A megnövelt betétkapacitás megszakíthatja az áramkör által vezérelt betéteket, és csökkentheti a motor optimalizálását.
mir-note-native-owner-managed-stream=Ha egy telepített végtelen technológia már birtokolja ezt a kutatási családot, ugyanazok az indítási beállítások konfigurálják a tulajdonost a másolat létrehozása helyett. A változatlan MIR alapértelmezések pontosan megőrzik a tulajdonos végső prototípusát. Az explicit költség, idő, maximális szint és hatás felülbírálása csak a biztonságos tulajdonos egyezése után érvényes; a stream letiltása érintetlenül hagyja a külső technológiát. Indítsa újra a Factorio-t az indítási beállítások módosítása után. A 0 maximális szint végtelent jelent, a hatásértékek pedig százalékpontok szintenként.

