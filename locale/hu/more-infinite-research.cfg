[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Nem hajt végre automatikus felderítést, csatolást vagy létrehozást. A MIR rögzített kutatása változatlan marad.
mir-automatic-productivity-action-preview=Felfedezi és besorolja a jelölteket, majd az elfogadott és kihagyott döntéseket beírja a Factorio naplóba. Nem csatol recepteket és nem hoz létre kutatást.
mir-automatic-productivity-action-apply=Alapértelmezett. Felfedezi a jelölteket, és csak a biztonságosan bevált recepteket csatolja a kompatibilis meglévő MIR-kutatásokhoz. Önmagában nem hoz létre kutatást; az alábbi két jelölőnégyzet szabályozza a létrehozást.
mir-automatic-compiler-mode-off=A Letiltva régi megfelelője.
mir-automatic-compiler-mode-report=Az előnézeti változások örökölt megfelelője.
mir-automatic-compiler-mode-safe-attach=A Biztonságos változtatások alkalmazása letiltott kutatási létrehozással örökölt megfelelője.
mir-automatic-compiler-mode-exact-pack=A Biztonságos változtatások alkalmazása régebbi megfelelője, a kutatás-létrehozás engedélyezve és felülvizsgált kompatibilitási adatok szükségesek.
mir-automatic-compiler-mode-safe-generate=A Biztonságos változtatások alkalmazása a regisztrált kísérleti szolgáltatók számára engedélyezett kutatási létrehozással örökölt megfelelője.
mir-adjust-vanilla-weapon-speed-techs-off=A MIR opcionális átfedő rakéta/ágyú bónusztisztításának letiltása.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Csak akkor távolítsa el a MIR átfedő rakéta/ágyú bónuszait, ha egy engedélyezett, elérhető végtelen technológia biztosítja a pontos helyettesítési hatást.
mir-adjust-vanilla-weapon-speed-techs-always=Mindig távolítsa el a MIR átfedő rakéta/ágyú bónuszait. Csak akkor használja, ha szigorú elválasztást szeretne.
mir-science-pack-ingredient-policy-configured=Használja az egyes generált technológiák konfigurált tudományos csomagjait az összetevők opcionális bővítése nélkül. MIR alapértelmezett.
mir-science-pack-ingredient-policy-space=Adjon hozzá űrtudományt, ha elérhető. Egyszerű rakéta utáni nehézségi növekedés.
mir-science-pack-ingredient-policy-space-and-promethium=Adjon hozzá helyet és prométiumtudományt, ha elérhető. A legkésőbbi űrkorszaki kutatási mosogatókhoz a legjobb.
mir-science-pack-ingredient-policy-space-age-progression=Csak a kiválasztott csomagok által feltételezett Space Age progression csomagok hozzáadása. Nem ad hozzá nem kapcsolódó módosított csomagokat.
mir-science-pack-ingredient-policy-official-progression=Adja hozzá a hiányzó hivatalos előfeltétel-stílusú csomagokat, amelyek a már kiválasztott legfejlettebb hivatalos csomagból származnak.
mir-science-pack-ingredient-policy-mod-progression=Adja hozzá a hiányzó laborkompatibilis csomagokat, amelyek a módosított tudományos csomagok fejlődéséből következtetnek, és oldja fel az előfeltételeket.
mir-science-pack-ingredient-policy-all-official=Használjon minden hivatalos alap- és Space Age tudományos csomagot, amely az aktuális modkészletben található.
mir-science-pack-ingredient-policy-all=Használjon minden aktív laboratóriummal kompatibilis tudományos csomagot, beleértve a módosított tudományos csomagokat is.
mir-lab-incompatibility-policy-reduce=Tartsa meg a technológiát azáltal, hogy tudományos csomagjait az aktív labor által elfogadott legnagyobb készletre csökkenti. A mod csomagok legbiztonságosabb alapértelmezése.
mir-lab-incompatibility-policy-skip=Hagyja ki a technológiát, ha egyetlen aktív labor sem tudja kutatni a kiválasztott tudományos csomagkészletet. Szigorúbb és könnyebben ellenőrizhető.
mir-lab-incompatibility-policy-engine-default=Soha ne írja át a kiválasztott tudományos csomagkészletet. A MIR változatlanul megőrzi a biztonságosan kutatható halmazt, és kihagyja a generált technológiát, ha a Factorio nem tudja ezt a pontos halmazt kutatni.
mir-prototype-productivity-cap-engine-default=Hagyja békén az egyes receptek meglévő termelékenységi korlátját. Az egyéni sapka nélküli receptek a Factorio normál +300%-os termelékenységi bónuszhatárát használják.
mir-prototype-productivity-cap-percent-25=Állítsa be a nem paraméteres receptúra ​​termelékenységi korlátait +25%-ra. Ez egy szigorú korai sapka.
mir-prototype-productivity-cap-percent-50=Állítsa a nem paraméteres receptúra ​​termelékenységi korlátait +50%-ra. Ez a normál felső határ alatt van, és a termelékenységi kutatás hamarabb abbahagyja a segítségnyújtást.
mir-prototype-productivity-cap-percent-75=Állítsa be a nem paraméteres receptúra ​​termelékenységi korlátait +75%-ra. Ez a normál felső határ alatt van, és a termelékenységi kutatás hamarabb abbahagyja a segítségnyújtást.
mir-prototype-productivity-cap-percent-100=Állítsa be a nem-paraméteres receptek termelékenységi korlátait +100%-ra. Ez a normál felső határ alatt van, és a termelékenységi kutatás hamarabb abbahagyja a segítségnyújtást.
mir-prototype-productivity-cap-percent-125=Állítsa be a nem paraméteres receptúra ​​termelékenységi korlátait +125%-ra.
mir-prototype-productivity-cap-percent-150=Állítsa be a nem paraméteres receptek termelékenységi korlátait +150%-ra.
mir-prototype-productivity-cap-percent-200=Állítsa be a nem-paraméteres receptek termelékenységi korlátait +200%-ra. Ez a normál felső határ alatt van, és a termelékenységi kutatás hamarabb abbahagyja a segítségnyújtást.
mir-prototype-productivity-cap-percent-250=Állítsa be a nem-paraméteres receptek termelékenységi korlátait +250%-ra. Ez valamivel a normál sapka alatt van.
mir-prototype-productivity-cap-percent-400=Állítsa be a nem-paraméteres receptek termelékenységi korlátait +400%-ra. Ez kiterjeszti a termelékenység skáláját a normál felső határon túlra.
mir-prototype-productivity-cap-percent-500=Állítsa be a nem-paraméteres receptek termelékenységi korlátait +500%-ra. Ez kiterjeszti a termelékenység skáláját a normál felső határon túlra.
mir-prototype-productivity-cap-percent-750=Állítsa a nem paraméteres receptúra ​​termelékenységi korlátait +750%-ra.
mir-prototype-productivity-cap-percent-1000=Állítsa be a nem paraméteres receptek termelékenységi korlátait +1000%-ra. Használja hosszú megtakarításokhoz, ahol a termelékenységi kutatásnak továbbra is fontosnak kell lennie.
mir-prototype-productivity-cap-percent-2500=Állítsa be a nem paraméteres receptúra ​​termelékenységi korlátait +2500%-ra. Használja nagyon hosszú megtakarításokhoz.
