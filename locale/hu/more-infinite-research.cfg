[technology-description]
more-infinite-research.recipe_productivity=Növeli a receptek termelékenységét a kiválasztott recepteknél. A Factorio maximális termelékenységi korlátja továbbra is érvényes; a további végtelen szinteknek nincs gyakorlati hatása, ha egy recept eléri a felső határt.
more-infinite-research.direct_effect=Végtelen megismételhető bónuszt ad hozzá. A tudományos csomagokat az aktív laborokból választják ki, így a technológia kutatható marad a kompatibilis modkészletekkel.
more-infinite-research.cargo_bay_unloading_distance=Növeli a maximális távolságot a rakomány leszállóhelye és a csatlakoztatott kirakodóhelyek között.
more-infinite-research.cargo_landing_pad_count=Növeli az egyes erők által felületenként felépített rakomány leszálló padok számát.
more-infinite-research.flamethrower_shooting_speed=Növeli a lángszóró fegyverek és lángszóró tornyok lövési sebességét.
more-infinite-research.electric_shooting_speed=Növeli az elektromos fegyverek lövési sebességét. A vaníliában ez befolyásolja a kisülés elleni védelmet; az Űrkorszakkal a Tesla fegyverekre is hatással van, ha elérhető a tesla lőszerkategória.
more-infinite-research.spoilage_preservation=Növeli a globális spoil time módosítót egy korlátozott parancsfájl-effektus révén. A meglévő elrontható tárgyak megtarthatják jelenlegi elrontási határidejüket, amíg a játékban nem tesztelik őket.
more-infinite-research.agricultural_growth_speed=Lerövidíti az újonnan ültetett mezőgazdasági toronynövények hátralévő növekedési idejét egy korlátozott script-effektus révén.
more-infinite-research.lab_productivity=Növeli az egyes elfogyasztott tudományos csomagok által elért kutatási eredményeket a natív laboratóriumi kutatási termelékenység módosító segítségével.

