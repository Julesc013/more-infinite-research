mir-recycling-return-chance-engine-default=Hagyjon változatlanul minden újrahasznosítási receptet.
mir-recycling-return-chance-match-productivity-cap=Kihasználásbiztos automatikus redukció a rejtett generált újrahasznosítási receptekhez. 1 /-t használ (1 + termelékenységi bónusz), a normál 25%-os hozamra korlátozva: a +400%-ból 20%, a +1000%-ból pedig körülbelül 9,09%-os lesz.
mir-recycling-return-chance-percent-25=Tartsa a rejtett generált újrahasznosítási recepteket a normál 25%-os anyagvisszatéréssel.
mir-recycling-return-chance-percent-20=A rejtett generált újrahasznosítási recepteket 20%-os anyagmegtérülésre skálázhatja.
