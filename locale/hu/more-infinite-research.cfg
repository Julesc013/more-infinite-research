mir-prototype-efficiency-cap-engine-default=Hagyja békén az egyes gépek energiafelhasználási hatáshatárát. Az egyéni korlát nélküli gépek a Factorio normál -80%-os energiafelhasználási hatáskorlátját használják, így az effektusok nem tudják 20% alá csökkenteni az aktív használatot.
mir-prototype-efficiency-cap-saving-25=Írjon -25%-os energiafelhasználási korlátot. Az aktív energiafelhasználás az energiafelhasználási hatások után 75% vagy még több marad.
mir-prototype-efficiency-cap-saving-50=Írjon egy -50%-os energiafogyasztási sapkát. Az aktív energiafelhasználás 50% vagy több marad a támogatott gépekre gyakorolt ​​energiafogyasztási hatások után.
mir-prototype-efficiency-cap-saving-75=Írjon -75%-os energiafelhasználási korlátot. Az aktív energiafelhasználás 25% vagy több marad a támogatott gépekre gyakorolt ​​energiafogyasztási hatások után.
mir-prototype-efficiency-cap-saving-90=Írjon -90%-os energiafelhasználási sapkát. Az aktív energiafelhasználás 10%-ra csökkenhet, ami a normál 20%-os szint alá esik.
mir-prototype-efficiency-cap-saving-95=Írjon -95%-os energiafelhasználási sapkát. Az aktív energiafelhasználás 5%-ra csökkenhet.
mir-prototype-efficiency-cap-saving-99=Írjon -99%-os energiafelhasználási sapkát. Az aktív energiafelhasználás 1%-ra csökkenhet.
mir-prototype-efficiency-cap-saving-999=Írjon -99,9%-os energiafelhasználási korlátot. Az aktív energiafelhasználás 0,1%-ra csökkenhet.
mir-prototype-efficiency-cap-saving-9999=Írjon -99,99%-os energiafelhasználási korlátot. Ez közel nulla aktív energiafelhasználás, nem nulla energiaigényű prototípus újraírás.
mir-prototype-pollution-cap-engine-default=Hagyja békén az egyes gépek szennyezési határértékét. Az egyéni korlátozás nélküli gépek a Factorio normál -80%-os szennyező hatású sapkáját használják.
