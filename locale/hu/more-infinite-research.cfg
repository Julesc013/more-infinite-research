mir-prototype-pollution-cap-saving-50=Írjon -50%-os szennyeződési sapkát. A szennyezés 50% vagy annál nagyobb marad a támogatott gépekre gyakorolt ​​​​szennyezés után.
mir-prototype-pollution-cap-saving-75=Írjon egy -75%-os szennyezési sapkát. A szennyezés 25% vagy több marad a támogatott gépekre gyakorolt ​​​​szennyezés után.
