[technology-description]
more-infinite-research.recipe_productivity=Aumenta a produtividade das receitas selecionadas. O limite máximo de produtividade do Factorio ainda se aplica; níveis infinitos adicionais podem não ter efeito prático quando uma receita atinge seu limite.
more-infinite-research.direct_effect=Adiciona um bônus infinito repetível. Os pacotes científicos são selecionados a partir dos laboratórios ativos para que a tecnologia continue pesquisável com conjuntos de mods compatíveis.
more-infinite-research.cargo_bay_unloading_distance=Aumenta a distância máxima entre uma plataforma de pouso de carga e as baias de descarga conectadas.
more-infinite-research.cargo_landing_pad_count=Aumenta a quantidade de plataformas de pouso de carga que cada força pode construir por superfície.
more-infinite-research.flamethrower_shooting_speed=Aumenta a velocidade de disparo de armas lança-chamas e torres lança-chamas.
more-infinite-research.electric_shooting_speed=Aumenta a velocidade de disparo de armas elétricas. Na baunilha, isso afeta a defesa contra descarga; com a Era Espacial, também afeta as armas Tesla quando a categoria de munição Tesla está disponível.
more-infinite-research.spoilage_preservation=Aumenta o modificador global do tempo de deterioração por meio de um efeito de script limitado. Itens estragáveis ​​existentes podem manter seus prazos de estrago atuais até serem testados no jogo.
more-infinite-research.agricultural_growth_speed=Reduz o tempo de crescimento restante para plantas de torre agrícolas recém-plantadas através de um efeito de script limitado.
more-infinite-research.lab_productivity=Aumenta o progresso da pesquisa obtido em cada pacote científico consumido, usando o modificador de produtividade de pesquisa de laboratório nativo.

