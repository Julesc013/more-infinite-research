[mod-setting-description]
ips-require-space-gate=Quando ativado, estas tecnologias permanecem bloqueadas até que ciência espacial seja pesquisada no jogo base, ou ciência de promécio seja pesquisada em Space Age.
mir-science-pack-ingredient-policy=Controls extra science packs added to every generated technology. Configured uses each technology's normal packs. Add space science adds space science when available. Add space and promethium science adds both high-end packs when available. Use all official science packs adds base and Space Age packs without modded packs. Use all lab science packs also includes compatible modded science packs.
ips-enable-stream=Desative para impedir que __1__ seja gerada na partida.
ips-cost-base-stream=Unidades de pesquisa necessárias para o primeiro nível de __1__. Níveis mais altos escalam a partir deste valor mesmo que o primeiro desbloqueio comece depois.
ips-cost-growth-stream=Multiplicador aplicado ao custo do nível anterior de __1__. Use 1 para custo fixo, ou valores maiores para aumentar a dificuldade a cada nível.
ips-max-level-stream=Defina como 0 para manter __1__ infinita, ou forneça um valor positivo para limitá-la nesse nível.
ips-research-time-stream=Defina como 0 para usar o tempo de pesquisa padrão configurado para __1__. Forneça um valor positivo para substituir os segundos por nível.
mir-enable-base-tech=Permite que __1__ continue além do limite padrão com níveis infinitos que seguem a mesma progressão.
mir-cost-base=Defina como 0 para reutilizar o custo padrão do nível 1 de __1__. Qualquer valor positivo substitui o termo base usado pela fórmula infinita.
mir-cost-growth=Defina como 0 para continuar a taxa de crescimento padrão de __1__. Forneça um valor positivo para alterar quanto cada nível infinito aumenta em custo.
mir-research-time=Defina como 0 para reutilizar o tempo de pesquisa padrão de __1__. Forneça um valor positivo para substituir os segundos por nível.
mir-prefer-this-mod-for-competing-techs=Quando ativado, este mod remove extensões infinitas concorrentes selecionadas e usa suas próprias versões. Desative para manter versões concorrentes de outros mods.
mir-adjust-vanilla-weapon-speed-techs=Controls whether MIR removes rocket and cannon-shell speed bonuses from its generated weapon shooting speed continuation when dedicated replacement research is available. Finite vanilla weapon shooting speed technologies keep their original bonuses.
mir-debug-generation-report=Quando ativado, grava uma linha estruturada no log para cada fluxo e extensão base gerado ou ignorado, incluindo pacotes científicos, pré-requisitos, contagem de efeitos, estado de compatibilidade dos laboratórios e origem do ícone.
mir-debug-recipe-matches=When enabled, writes matched recipe names for each generated productivity stream. This can be noisy in large mod packs.
mir-debug-scripted-effects=When enabled, writes runtime log entries when scripted technologies recompute global or event-driven effects.
mir-lab-incompatibility-policy=Choose whether incompatible science-pack sets are reduced to the largest lab-compatible subset or skipped entirely.

