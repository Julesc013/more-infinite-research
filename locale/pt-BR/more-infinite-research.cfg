[mod-setting-description]
ips-require-space-gate=Quando habilitadas, essas tecnologias permanecem bloqueadas até que a ciência espacial seja pesquisada na Vanilla ou a ciência do promécio seja pesquisada na Era Espacial.
mir-science-pack-ingredient-policy=Escolhe como o MIR adiciona pacotes científicos às tecnologias geradas. As opções são ordenadas de conservadoras a amplas: pacotes padrão, pacotes de final de jogo, pacotes baseados em progressão e todos os pacotes disponíveis.
mir-automatic-productivity-action=Escolhe o que o MIR faz com oportunidades de produtividade seguras encontradas em receitas de mod instalado. Desativado não executa nenhuma descoberta automática. Visualize os registros de alterações aceitas e ignoradas no log do Factorio sem alterar a pesquisa. Aplicar alterações seguras (padrão) adiciona receitas elegíveis apenas a pesquisas MIR existentes compatíveis. Isto controla a ação, não a força ou a maturidade; as caixas de seleção de criação abaixo são separadas. As verificações de propriedade, reciclagem, probabilidade, catalisador, ciência, laboratório, pré-requisito, alvo, identidade, progressão e ciclo sempre se aplicam.
mir-automatic-create-research=Padrão: desativado. Fora dos limites Aplicar alterações seguras em pesquisas MIR existentes e compatíveis; candidatos sem um fluxo adequado são ignorados e relatados. On permite que um fornecedor registrado elegível crie uma tecnologia genérica estável de produtividade infinita quando nenhuma pesquisa existente for adequada. A caixa de seleção de dados revisados ​​abaixo decide se os provedores experimentais são elegíveis. A MIR nunca cria uma tecnologia por mod ou receita, e todas as barreiras de segurança, ciência, propriedade, identidade, progressão e ciclo ainda se aplicam.
mir-automatic-require-reviewed-data=Padrão: ativado. Isso importa apenas quando Permitir criação de novas pesquisas está ativado; nunca bloqueia o apego seguro à investigação existente. Nas licenças, apenas as famílias fornecedoras marcadas como revisadas e respaldadas por evidências de versão exata aplicáveis, portanto, as famílias experimentais são ignoradas. Off permite que fornecedores experimentais registrados criem a partir de evidências estruturais genéricas. Para o comportamento experimental mais amplo, ative a criação de pesquisas e desative esse requisito. Nenhum valor pode contornar uma porta de segurança rígida.
mir-automatic-compiler-mode=Ponte de compatibilidade oculta para perfis criados antes da divisão dos controles de produtividade automática. Um valor legado não padrão será respeitado apenas enquanto todos os novos controles permanecerem com seus padrões. Altere qualquer novo controle para assumir o controle explícito.
ips-enable-stream=Cria a tecnologia infinita gerada para __1__ quando suas receitas, efeitos, pré-requisitos e pacotes científicos estão disponíveis. Desative isto para evitar que o MIR gere esta tecnologia.
ips-cost-base-stream=Unidades de pesquisa necessárias para o primeiro nível gerado de __1__. Deve ser pelo menos 1. Os níveis posteriores são calculados a partir deste valor e do fator de crescimento de custo.
ips-cost-growth-stream=Multiplicador aplicado a cada nível posterior de __1__. Use 1 para custos fixos, 1,5 para crescimento de 50% por nível ou 2 para duplicar custos.
ips-max-level-stream=Nível gerado mais alto para __1__. Defina como 0 para níveis infinitos.
ips-research-time-stream=Segundos por unidade de pesquisa para __1__. Defina como 0 para usar o padrão MIR para esta tecnologia. Este não é o tempo total de pesquisa; o tempo total também depende do custo da pesquisa, contagem do laboratório, velocidade do laboratório e módulos.
mir-enable-base-tech=Permite que __1__ continue além de sua tampa baunilha como uma tecnologia infinita. Desative esta opção se quiser que o MIR adicione novas linhas de pesquisa sem estender essa cadeia básica.
mir-cost-base=Unidades de pesquisa necessárias para o primeiro nível de continuação MIR de __1__. Defina como 0 para herdar o padrão de custo da cadeia vanilla quando possível.
mir-cost-growth=Multiplicador aplicado a cada nível de continuação MIR posterior de __1__. Defina como 0 para herdar o padrão de crescimento da cadeia vanilla quando possível.
mir-max-level=Nível de continuação MIR mais alto para __1__. Defina como 0 para níveis infinitos.
mir-research-time=Segundos por unidade de pesquisa para a continuação do MIR de __1__. Defina como 0 para herdar o tempo da unidade de pesquisa da cadeia vanilla quando possível.
mir-prefer-this-mod-for-competing-techs=Quando ativado, este mod remove extensões infinitas concorrentes selecionadas e usa suas próprias versões. Desative para manter versões concorrentes de outros mods.
mir-adjust-vanilla-weapon-speed-techs=Controla se o MIR remove os bônus de velocidade de foguetes e projéteis de canhão de sua continuação de velocidade de disparo de arma gerada quando a cobertura de substituição infinita exata está disponível. As tecnologias de velocidade de disparo de armas finitas mantêm seus bônus originais.
mir-use-installed-space-age-icons=Quando ativado, o MIR pode fazer referência a arquivos de ícones DLC oficiais instalados, incluindo Space Age e Elevated Rails, mesmo quando esses mods estão desativados para a execução do jogo base. Deixe esta opção desativada se esses arquivos DLC não estiverem instalados; O Factorio não consegue se recuperar normalmente de arquivos de ícones ausentes durante o carregamento do protótipo.
mir-pipeline-extent-multiplier=Multiplicador suspenso somente de inicialização para campos de extensão de tubulação de caixa de fluido reconhecidos em protótipos, não apenas em entidades de tubulação. 100% deixa os protótipos inalterados e não carrega a passagem do pipeline nem verifica as caixas de fluido. Valores diferentes de 100% são experimentais e podem afetar máquinas, tanques, propulsores e protótipos modificados que definem caixas de fluidos.
mir-unrestricted-modules=Experimental e quebra de equilíbrio. Quando ativado, cada receita existente aceita todos os cinco efeitos de módulo e cada receptor de módulo existente com slots aceita todas as categorias de módulo descobertas. Isso não adiciona slots de módulo nem altera protótipos de módulos e pode permitir produtividade, qualidade e loops de módulos modificados.
mir-prototype-productivity-cap=Escolhe se o MIR deixa os limites de produtividade da receita sozinhos ou grava um limite de inicialização para cada receita sem parâmetro e sem reciclagem. +300% (inalterado) preserva os limites de receita existentes; valores mais baixos encurtam o aumento da produtividade, enquanto valores mais altos o ampliam.
mir-recycling-return-chance=Controla apenas receitas de reciclagem geradas ocultas. O modo automático reduz o retorno normal de material de 25% para no máximo 1 dividido pelo multiplicador de produção total no limite de produtividade selecionado. As escolhas fixas dimensionam diretamente os mesmos retornos gerados. Os processos visíveis e os limites de produtividade das receitas nunca são alterados.
mir-productivity-cap-self-recycling-only=Acima de 1 / retorno do reciclador - 1, somente receitas de produção com um caminho de auto-reciclagem não generativo comprovado recebem o limite mais alto selecionado. Dentro ou abaixo desse limite, esta caixa de seleção não tem efeito. O mecanismo inalterado usa o retorno normal de 25% como um limite conservador de +300% sem alterar as receitas de reciclagem.
mir-prototype-efficiency-cap=Escolhe até que ponto os efeitos de eficiência podem reduzir o uso de energia ativa da máquina. -80% (inalterado) deixa de lado os limites de uso de energia existentes. Reduções mais profundas podem aproximar-se do uso zero de energia ativa sem alterar os limites de poluição.
mir-prototype-pollution-cap=Escolhe até que ponto os efeitos de redução da poluição podem reduzir a poluição das máquinas. -80% (inalterado) deixa de lado os limites de poluição existentes. Reduções mais profundas podem aproximar-se da poluição zero sem alterar o uso de energia.
mir-prototype-speed-floor=Escolhe até que ponto os efeitos negativos de velocidade podem retardar as máquinas suportadas. -80% (inalterado) deixa de lado os limites existentes; valores mais profundos removem o piso normal até quase parar em -99,99%.
mir-prototype-speed-cap=Escolhe se o MIR deixa os limites de efeito de velocidade da máquina inalterados ou grava um novo limite de velocidade positivo. +100000% (inalterado) preserva os limites existentes; valores mais baixos fixam intencionalmente bônus de velocidade muito grandes.
mir-prototype-quality-cap=Escolhe se o MIR deixa de lado os limites de efeito de qualidade da máquina ou escreve um novo limite de qualidade positivo. +100000% (inalterado) preserva os limites existentes e não altera os níveis de qualidade ou as fórmulas de probabilidade de item.
mir-prototype-positive-power-floor=Padrão desativado. Quando ativado, o MIR altera protótipos explícitos de uso de energia ativa de 0W para 1W durante o carregamento do protótipo, para que ícones de aviso de baixo consumo de energia não apareçam em entidades que deveriam consumir uma pequena quantidade diferente de zero. Deixe de lado para preservar exatamente os protótipos de potência zero.
mir-settings-profile-import=Cole uma string de perfil de configurações MIR aqui para aplicar valores de configuração de inicialização exportados como uma camada de substituição durante a geração do protótipo. Deixe em branco para configurações normais. Exporte com /mir-settings-export de um salvamento ativo e reinicie após alterar esse valor.
mir-debug-generation-report=Quando ativado, grava uma linha de log estruturada por fluxo gerado ou ignorado e extensão base, incluindo pacotes científicos, pré-requisitos, contagem de efeitos, status de compatibilidade do laboratório e origem do ícone.
mir-debug-recipe-matches=Quando ativado, grava nomes de receitas correspondentes para cada fluxo de produtividade gerado. Isso pode ser barulhento em grandes pacotes de mod.
mir-debug-scripted-effects=Quando ativado, grava entradas de log de tempo de execução quando tecnologias de script recalculam efeitos globais ou acionados por eventos.
mir-lab-incompatibility-policy=Escolhe o que o MIR faz quando os pacotes científicos selecionados não podem ser pesquisados ​​por nenhum laboratório ativo.
ips-effect-per-level-stream=Define o efeito da camada base primária por nível para __1__. Os níveis e efeitos posteriores relacionados são dimensionados proporcionalmente. Os efeitos percentuais usam pontos percentuais; efeitos de contagem e distância usam suas unidades nativas.
mir-effect-per-level=Define o efeito canônico por nível para a continuação infinita __1__. Os efeitos relacionados são dimensionados proporcionalmente a partir da linha de base final. Os efeitos percentuais usam pontos percentuais; efeitos de contagem e distância usam suas unidades nativas.
mir-note-experimental-spoilage=Experimental e desabilitado por padrão na v2.1.0. Este é um efeito de script global/em todo o mapa. O comportamento existente da pilha estragada não é reivindicado até ser validado manualmente.
mir-note-agriculture-growth=Aplica-se a culturas agrícolas em torre recém-plantadas. As culturas plantadas existentes não são redimensionadas.
mir-note-cargo-pad-count=Pesquisa logística especial da Era Espacial. Aumenta as áreas de pouso de carga por superfície e pode alterar substancialmente o equilíbrio logístico.
mir-note-inserter-capacity=Desativado por padrão. A capacidade extra do insersor pode interromper os insersores controlados por circuito e reduzir as otimizações do motor.
mir-note-native-owner-managed-stream=Se uma tecnologia infinita instalada já possui esta família de pesquisa, essas mesmas configurações de inicialização configuram esse proprietário em vez de criar uma duplicata. Os padrões MIR inalterados preservam exatamente o protótipo final do proprietário. As substituições explícitas de custo, tempo, nível máximo e efeito se aplicam somente após uma correspondência segura do proprietário; desabilitar o stream deixa a tecnologia externa intocada. Reinicie o Factorio após alterar as configurações de inicialização. Um nível máximo de 0 significa infinito e os valores dos efeitos são pontos percentuais por nível.

