[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Não realiza descoberta, anexo ou criação automática. A pesquisa fixa do MIR permanece inalterada.
mir-automatic-productivity-action-preview=Descobre e classifica candidatos e, em seguida, grava as decisões aceitas e ignoradas no registro do Factorio. Não anexa receitas nem cria pesquisas.
mir-automatic-productivity-action-apply=Padrão. Descobre candidatos e anexa apenas receitas comprovadas em segurança a pesquisas MIR existentes e compatíveis. Não cria investigação por si só; as duas caixas de seleção abaixo controlam a criação.
mir-automatic-compiler-mode-off=Equivalente herdado de Desativado.
mir-automatic-compiler-mode-report=Equivalente herdado das alterações de visualização.
mir-automatic-compiler-mode-safe-attach=Equivalente herdado de Aplicar alterações seguras com criação de pesquisa desabilitada.
mir-automatic-compiler-mode-exact-pack=Equivalente legado de Aplicar alterações seguras com criação de pesquisa habilitada e dados de compatibilidade revisados ​​necessários.
mir-automatic-compiler-mode-safe-generate=Equivalente legado de Aplicar alterações seguras com criação de pesquisa habilitada para provedores experimentais registrados.
mir-adjust-vanilla-weapon-speed-techs-off=Desative a limpeza opcional de bônus de foguete/canhão sobreposto do MIR.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Remova os bônus de foguete/canhão sobrepostos do MIR somente quando uma tecnologia infinita habilitada e acessível fornecer o efeito de substituição exato.
mir-adjust-vanilla-weapon-speed-techs-always=Sempre remova os bônus sobrepostos de foguete/canhão do MIR. Use apenas se desejar uma separação estrita.
mir-science-pack-ingredient-policy-configured=Use os pacotes científicos configurados de cada tecnologia gerada sem expansão opcional de ingredientes. Padrão MIR.
mir-science-pack-ingredient-policy-space=Adicione ciência espacial quando disponível. Um simples aumento de dificuldade pós-foguete.
mir-science-pack-ingredient-policy-space-and-promethium=Adicione espaço e ciência de promécio quando disponível. Melhor para sumidouros de pesquisa muito avançados da Era Espacial.
mir-science-pack-ingredient-policy-space-age-progression=Adicione apenas pacotes de progressão da Era Espacial implícitos nos pacotes selecionados. Não adiciona pacotes modificados não relacionados.
mir-science-pack-ingredient-policy-official-progression=Adicionar pacotes oficiais de estilo de pré-requisito ausentes, implícitos no pacote oficial mais avançado já selecionado.
mir-science-pack-ingredient-policy-mod-progression=Adicione pacotes ausentes compatíveis com laboratório inferidos da progressão do pacote científico modificado e desbloqueie pré-requisitos.
mir-science-pack-ingredient-policy-all-official=Use todas as bases oficiais e pacotes científicos da Era Espacial que existem no conjunto de mods atual.
mir-science-pack-ingredient-policy-all=Use todos os pacotes científicos ativos compatíveis com laboratório, incluindo pacotes científicos modificados.
mir-lab-incompatibility-policy-reduce=Mantenha a tecnologia reduzindo seus pacotes científicos ao maior conjunto aceito por um laboratório ativo. Padrão mais seguro para pacotes de mod.
mir-lab-incompatibility-policy-skip=Ignore a tecnologia se nenhum laboratório ativo puder pesquisar seu conjunto de pacotes científicos selecionado. Mais rigoroso e fácil de auditar.
mir-lab-incompatibility-policy-engine-default=Nunca reescreva o conjunto de pacotes científicos selecionado. O MIR preserva inalterado um conjunto pesquisável com segurança e omite a tecnologia gerada quando a Factorio não consegue pesquisar esse conjunto exato.
mir-prototype-productivity-cap-engine-default=Deixe de lado o limite de produtividade existente de cada receita. Receitas sem limite personalizado usam o limite normal de bônus de produtividade de +300% do Factorio.
mir-prototype-productivity-cap-percent-25=Defina limites de produtividade de receitas sem parâmetros para +25%. Este é um limite inicial estrito.
mir-prototype-productivity-cap-percent-50=Defina limites de produtividade de receitas sem parâmetros para +50%. Isso está abaixo do limite normal e faz com que a pesquisa de produtividade pare de ajudar mais cedo.
mir-prototype-productivity-cap-percent-75=Defina limites de produtividade de receitas sem parâmetros para +75%. Isso está abaixo do limite normal e faz com que a pesquisa de produtividade pare de ajudar mais cedo.
mir-prototype-productivity-cap-percent-100=Defina limites de produtividade de receitas sem parâmetros para +100%. Isso está abaixo do limite normal e faz com que a pesquisa de produtividade pare de ajudar mais cedo.
mir-prototype-productivity-cap-percent-125=Defina limites de produtividade de receitas sem parâmetros para +125%.
mir-prototype-productivity-cap-percent-150=Defina limites de produtividade de receitas sem parâmetros para +150%.
mir-prototype-productivity-cap-percent-200=Defina limites de produtividade de receitas sem parâmetros para +200%. Isso está abaixo do limite normal e faz com que a pesquisa de produtividade pare de ajudar mais cedo.
mir-prototype-productivity-cap-percent-250=Defina limites de produtividade de receitas sem parâmetros para +250%. Isso está um pouco abaixo do limite normal.
mir-prototype-productivity-cap-percent-400=Defina limites de produtividade de receitas sem parâmetros para +400%. Isso estende o escalonamento da produtividade além do limite normal.
mir-prototype-productivity-cap-percent-500=Defina limites de produtividade de receitas sem parâmetros para +500%. Isso estende o escalonamento da produtividade além do limite normal.
mir-prototype-productivity-cap-percent-750=Defina limites de produtividade de receitas sem parâmetros para +750%.
mir-prototype-productivity-cap-percent-1000=Defina limites de produtividade de receitas sem parâmetros para +1000%. Use para salvamentos longos onde a pesquisa de produtividade deve continuar sendo importante.
mir-prototype-productivity-cap-percent-2500=Defina limites de produtividade de receitas sem parâmetros para +2500%. Use para salvamentos muito longos.
mir-prototype-productivity-cap-percent-5000=Defina limites de produtividade de receitas sem parâmetros para +5000%.
mir-prototype-productivity-cap-percent-10000=Defina limites de produtividade de receitas sem parâmetros para +10.000%. Use apenas para dimensionamento extremo de longo prazo.
mir-prototype-productivity-cap-percent-25000=Defina limites de produtividade de receitas sem parâmetros para +25.000%. Use apenas para dimensionamento extremo de longo prazo.
mir-prototype-productivity-cap-percent-100000=Defina limites de produtividade de receitas sem parâmetros para +100.000%. Isso é efetivamente ilimitado para a maioria dos salvamentos.
mir-recycling-return-chance-engine-default=Deixe todas as receitas de reciclagem inalteradas.
mir-recycling-return-chance-match-productivity-cap=Redução automática segura contra exploração para receitas de reciclagem geradas ocultas. Usa 1 / (1 + bônus de produtividade), limitado ao retorno normal de 25%: +400% torna-se 20% e +1000% torna-se cerca de 9,09%.
mir-recycling-return-chance-percent-25=Mantenha receitas de reciclagem geradas ocultas com retorno normal de material de 25%.
mir-recycling-return-chance-percent-20=Dimensione receitas de reciclagem geradas ocultas para um retorno de material de 20%.
mir-recycling-return-chance-percent-15=Dimensione receitas de reciclagem geradas ocultas para um retorno de material de 15%.
mir-recycling-return-chance-percent-12-5=Dimensione receitas de reciclagem geradas ocultas para um retorno de material de 12,5%.
mir-recycling-return-chance-percent-10=Dimensione receitas de reciclagem geradas ocultas para um retorno de material de 10%.
mir-recycling-return-chance-percent-7-5=Dimensione receitas de reciclagem geradas ocultas para um retorno de material de 7,5%.
mir-recycling-return-chance-percent-5=Dimensione receitas de reciclagem geradas ocultas para um retorno de material de 5%.
mir-recycling-return-chance-percent-2-5=Dimensione receitas de reciclagem geradas ocultas para um retorno de material de 2,5%.
mir-recycling-return-chance-percent-1=Dimensione receitas de reciclagem geradas ocultas para um retorno de material de 1%.
mir-recycling-return-chance-percent-0-5=Dimensione receitas de reciclagem geradas ocultas para um retorno de material de 0,5%.
mir-recycling-return-chance-percent-0-1=Dimensione receitas de reciclagem geradas ocultas para um retorno de material de 0,1%.
mir-prototype-efficiency-cap-engine-default=Deixe de lado o limite de efeito de uso de energia de cada máquina. Máquinas sem limite personalizado usam o limite normal de efeito de uso de energia de -80% da Factorio, portanto, os efeitos não podem reduzir o uso ativo abaixo de 20%.
mir-prototype-efficiency-cap-saving-25=Escreva um limite de uso de energia de -25%. O uso ativo de energia permanece em 75% ou mais após os efeitos do uso de energia.
mir-prototype-efficiency-cap-saving-50=Escreva um limite de uso de energia de -50%. O uso de energia ativa permanece em 50% ou mais após os efeitos do uso de energia nas máquinas suportadas.
mir-prototype-efficiency-cap-saving-75=Escreva um limite de uso de energia de -75%. O uso de energia ativa permanece em 25% ou mais após os efeitos do uso de energia nas máquinas suportadas.
mir-prototype-efficiency-cap-saving-90=Escreva um limite de uso de energia de -90%. O uso ativo de energia pode cair para 10%, valor inferior ao piso normal de 20%.
mir-prototype-efficiency-cap-saving-95=Escreva um limite de uso de energia de -95%. O uso ativo de energia pode cair para 5%.
mir-prototype-efficiency-cap-saving-99=Escreva um limite de uso de energia de -99%. O uso ativo de energia pode cair para 1%.
mir-prototype-efficiency-cap-saving-999=Escreva um limite de uso de energia de -99,9%. O uso ativo de energia pode cair para 0,1%.
mir-prototype-efficiency-cap-saving-9999=Escreva um limite de uso de energia de -99,99%. Este é um uso de energia ativa quase nulo, não uma reescrita de protótipo de potência zero.
mir-prototype-pollution-cap-engine-default=Deixe de lado o limite de efeito de poluição de cada máquina. Máquinas sem limite personalizado usam o limite normal de efeito de poluição de -80% da Factorio.
mir-prototype-pollution-cap-saving-25=Escreva um limite de poluição de -25%. A poluição permanece em 75% ou mais após os efeitos da poluição.
mir-prototype-pollution-cap-saving-50=Escreva um limite de poluição de -50%. A poluição permanece em 50% ou mais após os efeitos da poluição nas máquinas suportadas.
mir-prototype-pollution-cap-saving-75=Escreva um limite de poluição de -75%. A poluição permanece em 25% ou mais após os efeitos da poluição nas máquinas suportadas.
mir-prototype-pollution-cap-saving-90=Escreva um limite de poluição de -90%. A poluição pode cair para 10%, o que está abaixo do piso normal de 20%.
mir-prototype-pollution-cap-saving-95=Escreva um limite de poluição de -95%. A poluição pode cair para 5%.
mir-prototype-pollution-cap-saving-99=Escreva um limite de poluição de -99%. A poluição pode cair para 1%.
mir-prototype-pollution-cap-saving-999=Escreva um limite de poluição de -99,9%. A poluição pode cair para 0,1%.
mir-prototype-pollution-cap-saving-9999=Escreva um limite de poluição de -99,99%. Esta é uma poluição quase zero, não um script de poluição em tempo de execução.
mir-prototype-speed-floor-engine-default=Deixe de lado o limite de velocidade negativo de cada máquina. Máquinas sem limite personalizado usam o piso normal de -80% do Factorio e mantêm pelo menos 20% de velocidade.
mir-prototype-speed-floor-saving-25=Fixe os efeitos de velocidade negativa em -25%, deixando pelo menos 75% de velocidade.
mir-prototype-speed-floor-saving-50=Fixe os efeitos de velocidade negativa em -50%, deixando pelo menos 50% da velocidade.
mir-prototype-speed-floor-saving-75=Fixe os efeitos de velocidade negativa em -75%, deixando pelo menos 25% de velocidade.
mir-prototype-speed-floor-saving-90=Permite efeitos negativos de velocidade até -90%, deixando pelo menos 10% de velocidade.
mir-prototype-speed-floor-saving-95=Permite efeitos negativos de velocidade até -95%, deixando pelo menos 5% de velocidade.
mir-prototype-speed-floor-saving-99=Permite efeitos negativos de velocidade até -99%, deixando pelo menos 1% de velocidade.
mir-prototype-speed-floor-saving-999=Permite efeitos negativos de velocidade até -99,9%, deixando pelo menos 0,1% de velocidade.
mir-prototype-speed-floor-saving-9999=Permite efeitos negativos de velocidade até -99,99%, o limite mais baixo do protótipo Factorio. Esta é uma velocidade de fabricação quase parada, não zero ou negativa.
mir-prototype-speed-cap-engine-default=Deixe de lado o limite de velocidade de cada máquina. Máquinas sem limite personalizado usam o teto de efeito de velocidade muito alto de +100.000% da Factorio.
mir-prototype-speed-cap-bonus-25=Fixe os efeitos de velocidade positiva em +25%.
mir-prototype-speed-cap-bonus-50=Fixe os efeitos de velocidade positiva em +50%. Use isso para manter os bônus de velocidade bem limitados.
mir-prototype-speed-cap-bonus-75=Fixe os efeitos de velocidade positiva em +75%.
mir-prototype-speed-cap-bonus-100=Fixe os efeitos de velocidade positiva em +100%.
mir-prototype-speed-cap-bonus-125=Fixe os efeitos de velocidade positiva em +125%.
mir-prototype-speed-cap-bonus-150=Fixe os efeitos de velocidade positiva em +150%.
mir-prototype-speed-cap-bonus-200=Fixe os efeitos de velocidade positiva em +200%.
mir-prototype-speed-cap-bonus-250=Fixe os efeitos de velocidade positiva em +250%.
mir-prototype-speed-cap-bonus-300=Fixe os efeitos de velocidade positiva em +300%.
mir-prototype-speed-cap-bonus-400=Fixe os efeitos de velocidade positiva em +400%.
mir-prototype-speed-cap-bonus-500=Fixe os efeitos de velocidade positiva em +500%.
mir-prototype-speed-cap-bonus-750=Fixe os efeitos de velocidade positiva em +750%.
mir-prototype-speed-cap-bonus-1000=Fixe os efeitos de velocidade positiva em +1000%.
mir-prototype-speed-cap-bonus-2500=Fixe os efeitos de velocidade positiva em +2500%.
mir-prototype-speed-cap-bonus-5000=Fixe os efeitos de velocidade positiva em +5000%.
mir-prototype-speed-cap-bonus-10000=Fixe os efeitos de velocidade positiva em +10000%.
mir-prototype-speed-cap-bonus-25000=Fixe os efeitos de velocidade positiva em +25000%.
mir-prototype-speed-cap-bonus-100000=Escreva explicitamente o limite máximo do efeito de velocidade do Factorio. Ao contrário de inalterado, isso substitui os limites inferiores personalizados.
mir-prototype-quality-cap-engine-default=Deixe de lado o limite de efeito de qualidade de cada máquina. Máquinas sem limite personalizado usam o teto de efeito de qualidade muito alto de +100.000% da Factorio.
mir-prototype-quality-cap-bonus-50=Fixe os efeitos de qualidade positiva em +50%. Isso limita os efeitos de bônus de qualidade da máquina, não os níveis de qualidade ou as fórmulas de probabilidade de item.
mir-prototype-quality-cap-bonus-25=Fixe efeitos de qualidade positivos em +25%. Isso não altera os níveis de qualidade ou as fórmulas de probabilidade de item.
mir-prototype-quality-cap-bonus-75=Fixe os efeitos de qualidade positiva em +75%. Isso não altera os níveis de qualidade ou as fórmulas de probabilidade de item.
mir-prototype-quality-cap-bonus-100=Fixe efeitos de qualidade positivos em +100%. Isso não altera os níveis de qualidade ou as fórmulas de probabilidade de item.
mir-prototype-quality-cap-bonus-125=Fixe os efeitos de qualidade positiva em +125%. Isso não altera os níveis de qualidade ou as fórmulas de probabilidade de item.
