[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Ei teosta automaatset avastamist, manustamist ega loomist. MIR-i fikseeritud uuringud jäävad muutumatuks.
mir-automatic-productivity-action-preview=Avastab ja liigitab kandidaadid, seejärel kirjutab vastuvõetud ja vahele jäetud otsused Factorio logisse. See ei lisa retsepte ega loo uuringuid.
mir-automatic-productivity-action-apply=Vaikimisi. Avastab kandidaadid ja lisab ühilduvatele olemasolevatele MIR-uuringutele ainult ohutusega tõestatud retsepte. See ei loo teadusuuringuid iseenesest; kaks allolevat märkeruutu reguleerivad loomist.
mir-automatic-compiler-mode-off=Disabled pärand vaste.
mir-automatic-compiler-mode-report=Eelvaate muudatuste pärandekvivalent.
mir-automatic-compiler-mode-safe-attach=Pärand vaste funktsioonile Rakenda ohutuid muudatusi, kui uurimistöö on keelatud.
mir-automatic-compiler-mode-exact-pack=Turvaliste muudatuste rakendamise pärand vaste, kui uuringu loomine on lubatud ja nõutavad ühilduvusandmed.
mir-automatic-compiler-mode-safe-generate=Pärand ekvivalent Rakenda ohutuid muudatusi koos uuringute loomisega, mis on registreeritud eksperimentaalsete pakkujate jaoks lubatud.
mir-adjust-vanilla-weapon-speed-techs-off=Keela MIR-i valikuline kattuva raketi/kahuri lisapuhastus.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Eemaldage MIR-i kattuvad raketi/kahuri boonused ainult siis, kui lubatud, ligipääsetav lõpmatu tehnoloogia tagab täpse asendusefekti.
mir-adjust-vanilla-weapon-speed-techs-always=Eemaldage alati MIR-i kattuvad raketi/kahuri boonused. Kasutage ainult siis, kui soovite ranget eraldamist.
mir-science-pack-ingredient-policy-configured=Kasutage iga loodud tehnoloogia konfigureeritud teaduspakette ilma valikulise koostisosade laiendamiseta. MIR vaikimisi.
mir-science-pack-ingredient-policy-space=Võimalusel lisage kosmoseteadus. Lihtne raketijärgne raskuste suurenemine.
mir-science-pack-ingredient-policy-space-and-promethium=Lisage ruumi ja prometiumiteadust, kui see on saadaval. Parim väga hilise kosmoseajastu uurimiseks mõeldud valamute jaoks.
mir-science-pack-ingredient-policy-space-age-progression=Lisage ainult valitud pakettidest tulenevad kosmoseajastu edenemispaketid. Ei lisa sõltumatuid modifitseeritud pakette.
mir-science-pack-ingredient-policy-official-progression=Lisage puuduvad ametlikud eeltingimuse stiilis paketid, mis viitavad juba valitud kõige arenenumale ametlikule pakendile.
mir-science-pack-ingredient-policy-mod-progression=Lisage puuduvad laboriga ühilduvad paketid, mis on tuletatud modifitseeritud teaduspaketi edenemisest, ja avage eeltingimused.
mir-science-pack-ingredient-policy-all-official=Kasutage kõiki praeguses modifikatsioonikomplektis olemasolevaid ametlikke baas- ja kosmoseajastu teaduspakette.
mir-science-pack-ingredient-policy-all=Kasutage kõiki aktiivseid laboriga ühilduvaid teaduspakette, sealhulgas modifitseeritud teaduspakette.
mir-lab-incompatibility-policy-reduce=Hoidke tehnoloogiat alles, vähendades selle teaduspakette suurimale aktiivse labori poolt aktsepteeritavale komplektile. Modifikatsioonipakettide ohutuim vaikeseade.
mir-lab-incompatibility-policy-skip=Jätke tehnoloogia vahele, kui ükski aktiivne labor ei saa oma valitud teadusliku komplekti uurida. Rangem ja lihtsam auditeerida.
mir-lab-incompatibility-policy-engine-default=Ärge kunagi kirjutage valitud teaduspaketi komplekti ümber. MIR säilitab ohutult uuritava komplekti muutmata ja jätab genereeritud tehnoloogia välja, kui Factorio ei saa seda täpset komplekti uurida.
mir-prototype-productivity-cap-engine-default=Jätke iga retsepti olemasolev tootlikkuse piirmäär rahule. Ilma kohandatud korgita retseptid kasutavad Factorio tavalist +300% tootlikkuse boonuse limiiti.
mir-prototype-productivity-cap-percent-25=Määra parameetriteta retseptide tootlikkuse piirid väärtusele +25%. See on range varane ülempiir.
mir-prototype-productivity-cap-percent-50=Määrake parameetriteta retseptide tootlikkuse piirid väärtusele +50%. See on alla normaalse ülempiiri ja paneb tootlikkuse uuringud varem aitama.
mir-prototype-productivity-cap-percent-75=Määra parameetriteta retseptide tootlikkuse piirid väärtusele +75%. See on alla normaalse ülempiiri ja paneb tootlikkuse uuringud varem aitama.
mir-prototype-productivity-cap-percent-100=Määrake parameetriteta retseptide tootlikkuse piirid väärtusele +100%. See on alla normaalse ülempiiri ja paneb tootlikkuse uuringud varem aitama.
mir-prototype-productivity-cap-percent-125=Määrake parameetriteta retseptide tootlikkuse piirid väärtusele +125%.
mir-prototype-productivity-cap-percent-150=Määrake parameetriteta retseptide tootlikkuse piirid väärtusele +150%.
mir-prototype-productivity-cap-percent-200=Määrake parameetriteta retseptide tootlikkuse piirid väärtusele +200%. See on alla normaalse ülempiiri ja paneb tootlikkuse uuringud varem aitama.
mir-prototype-productivity-cap-percent-250=Määra parameetriteta retseptide tootlikkuse piirid väärtusele +250%. See on veidi alla tavalise korgi.
mir-prototype-productivity-cap-percent-400=Määrake parameetriteta retseptide tootlikkuse piirid väärtusele +400%. See laiendab tootlikkuse skaleerimist tavapärasest ülempiirist kaugemale.
mir-prototype-productivity-cap-percent-500=Määrake parameetriteta retseptide tootlikkuse piirid väärtusele +500%. See laiendab tootlikkuse skaleerimist tavapärasest ülempiirist kaugemale.
mir-prototype-productivity-cap-percent-750=Määra parameetriteta retseptide tootlikkuse piirid väärtusele +750%.
mir-prototype-productivity-cap-percent-1000=Määrake parameetriteta retseptide tootlikkuse piirid väärtusele +1000%. Kasutage pikaks säästmiseks, kus tootlikkuse uuringud peaksid olema olulised.
mir-prototype-productivity-cap-percent-2500=Määrake parameetriteta retseptide tootlikkuse piirid väärtusele +2500%. Kasutage väga pikkadeks säästmiseks.
mir-prototype-productivity-cap-percent-5000=Määra parameetriteta retseptide tootlikkuse piirid väärtusele +5000%.
mir-prototype-productivity-cap-percent-10000=Määrake parameetriteta retseptide tootlikkuse piirid väärtusele +10000%. Kasutage ainult äärmuslikuks pikaajaliseks skaleerimiseks.
mir-prototype-productivity-cap-percent-25000=Määrake parameetriteta retseptide tootlikkuse piirid väärtusele +25000%. Kasutage ainult äärmuslikuks pikaajaliseks skaleerimiseks.
mir-prototype-productivity-cap-percent-100000=Määrake parameetriteta retseptide tootlikkuse piirid väärtusele +100000%. See on enamiku säästude jaoks tõhusalt ilma piiranguta.
mir-recycling-return-chance-engine-default=Jätke kõik taaskasutusretseptid muutmata.
mir-recycling-return-chance-match-productivity-cap=Kasutusohutu automaatne vähendamine peidetud genereeritud taaskasutusretseptide jaoks. Kasutab 1 / (1 + tootlikkuse boonus), mis on piiratud tavalise 25% tootlusega: +400% muutub 20% ja +1000% muutub umbes 9,09%.
mir-recycling-return-chance-percent-25=Hoidke peidetud loodud taaskasutusretsepte tavapärase 25% materjalitagastuse juures.
mir-recycling-return-chance-percent-20=Skaalake peidetud loodud taaskasutusretseptid 20% materjalitasuni.
mir-recycling-return-chance-percent-15=Skaalake peidetud loodud taaskasutusretseptid 15% materjali tootluseni.
mir-recycling-return-chance-percent-12-5=Skaalake peidetud loodud taaskasutusretseptid 12,5% materjali tootluseni.
mir-recycling-return-chance-percent-10=Skaalake peidetud loodud taaskasutusretseptid 10% materjalitasuni.
mir-recycling-return-chance-percent-7-5=Skaalake peidetud loodud taaskasutusretseptid 7,5% materjali tootluseni.
mir-recycling-return-chance-percent-5=Skaalake peidetud loodud taaskasutusretseptid 5% materjalitasuni.
mir-recycling-return-chance-percent-2-5=Skaalake peidetud loodud taaskasutusretseptid 2,5% materjali tootluseni.
mir-recycling-return-chance-percent-1=Skaalake peidetud loodud taaskasutusretseptid 1% materjali tootluseni.
mir-recycling-return-chance-percent-0-5=Skaalake peidetud loodud taaskasutusretseptid 0,5% materjali tootluseni.
mir-recycling-return-chance-percent-0-1=Skaalake peidetud loodud taaskasutusretseptid 0,1% materjali tootluseni.
mir-prototype-efficiency-cap-engine-default=Jätke iga masina energiatarbimise piirmäär rahule. Kohandatud piiranguta masinad kasutavad Factorio tavalist -80% energiatarbimise efekti piiri, seega ei saa efektid aktiivset kasutamist vähendada alla 20%.
mir-prototype-efficiency-cap-saving-25=Kirjutage -25% energiatarbimise piirang. Pärast energiakasutuse mõju püsib aktiivne energiakasutus 75% või rohkem.
mir-prototype-efficiency-cap-saving-50=Kirjutage -50% energiatarbimise piirang. Pärast toetatud masinate energiakasutuse mõju jääb aktiivne energiakasutus 50% või rohkem.
mir-prototype-efficiency-cap-saving-75=Kirjutage -75% energiatarbimise piirang. Pärast toetatud masinate energiakasutuse mõju jääb aktiivne energiakasutus 25% või rohkem.
mir-prototype-efficiency-cap-saving-90=Kirjutage -90% energiatarbimise piirang. Aktiivne energiakasutus võib langeda 10%-ni, mis jääb alla tavapärase 20% põranda.
mir-prototype-efficiency-cap-saving-95=Kirjutage -95% energiatarbimise piirang. Aktiivne energiakasutus võib langeda 5%-ni.
mir-prototype-efficiency-cap-saving-99=Kirjutage -99% energiatarbimise piirang. Aktiivne energiakasutus võib langeda 1%-ni.
mir-prototype-efficiency-cap-saving-999=Kirjutage -99,9% energiatarbimise piirmäär. Aktiivne energiatarbimine võib langeda 0,1%-ni.
mir-prototype-efficiency-cap-saving-9999=Kirjutage -99,99% energiatarbimise piirang. See on peaaegu nullilähedane aktiivenergia kasutamine, mitte nullvõimsusega prototüübi ümberkirjutamine.
mir-prototype-pollution-cap-engine-default=Jätke iga masina saastemõju piirmäär rahule. Kohandatud piiranguta masinad kasutavad Factorio tavalist -80% saasteefekti korki.
mir-prototype-pollution-cap-saving-25=Kirjutage -25% saastepiirang. Pärast saastemõju püsib reostus 75% või rohkem.
mir-prototype-pollution-cap-saving-50=Kirjutage -50% saastepiirang. Saaste püsib 50% või rohkem pärast saaste mõju toetatud masinatele.
mir-prototype-pollution-cap-saving-75=Kirjutage -75% saastepiirang. Saaste püsib 25% või rohkem pärast saaste mõju toetatud masinatele.
mir-prototype-pollution-cap-saving-90=Kirjutage -90% saastepiirang. Reostus võib langeda 10%-ni, mis jääb alla normaalse 20%-lise taseme.
mir-prototype-pollution-cap-saving-95=Kirjutage -95% saastepiirang. Reostus võib langeda 5%-ni.
mir-prototype-pollution-cap-saving-99=Kirjutage -99% saastepiirang. Reostus võib langeda 1 protsendini.
mir-prototype-pollution-cap-saving-999=Kirjutage -99,9% saastepiirang. Reostus võib langeda 0,1 protsendini.
mir-prototype-pollution-cap-saving-9999=Kirjutage -99,99% saastepiirang. See on nullilähedane saaste, mitte käitusaegne saaste skript.
