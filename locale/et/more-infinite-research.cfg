[technology-description]
more-infinite-research.recipe_productivity=Suurendab valitud retseptide retseptide produktiivsust. Factorio maksimaalse tootlikkuse ülempiir kehtib endiselt; täiendavad lõpmatud tasemed ei pruugi omada praktilist mõju, kui retsept on saavutanud oma piiri.
more-infinite-research.direct_effect=Lisab lõputu korratava boonuse. Teaduspaketid valitakse aktiivsetest laboritest, nii et tehnoloogia on ühilduvate modikomplektidega uuritav.
more-infinite-research.cargo_bay_unloading_distance=Suurendab maksimaalset kaugust lasti maandumisaluse ja ühendatud mahalaadimisplatvormide vahel.
more-infinite-research.cargo_landing_pad_count=Suurendab lasti maandumisaluste arvu, mida iga jõud saab ühele pinnale ehitada.
more-infinite-research.flamethrower_shooting_speed=Suurendab leegiheitja relvade ja leegiheitja tornide laskekiirust.
more-infinite-research.electric_shooting_speed=Suurendab elektrirelvade laskekiirust. Vanilje puhul mõjutab see heitekaitset; Kosmoseajastul mõjutab see ka Tesla relvi, kui tesla laskemoona kategooria on saadaval.
more-infinite-research.spoilage_preservation=Suurendab globaalset riknemisaja modifikaatorit piiratud skriptitud efekti kaudu. Olemasolevad riknevad esemed võivad säilitada oma praegused riknemise tähtajad kuni mängusisese testimiseni.
more-infinite-research.agricultural_growth_speed=Lühendab äsja istutatud põllumajandustorntaimede järelejäänud kasvuaega piiratud skriptiefekti kaudu.
more-infinite-research.lab_productivity=Suurendab iga tarbitud teaduspaketiga saavutatud uuringute edenemist, kasutades laboriuuringute produktiivsuse muutjat.

