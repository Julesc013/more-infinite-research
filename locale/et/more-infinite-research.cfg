[mod-setting-description]
ips-require-space-gate=Kui see on lubatud, jäävad need tehnoloogiad lukustatuks, kuni kosmoseteadust uuritakse vaniljes või promeetiumiteadust kosmoseajastul.
mir-science-pack-ingredient-policy=Valib, kuidas MIR lisab loodud tehnoloogiatele teaduspakette. Valikud on järjestatud konservatiivsest laiale: vaikepaketid, mängu hilinenud paketid, progressipõhised paketid, seejärel kõik saadaolevad paketid.
mir-automatic-productivity-action=Valib, mida MIR teeb installitud modifikatsiooni retseptides leiduvate ohutute tootlikkuse võimalustega. Keelatud ei teosta automaatset avastamist. Factorio logis vastuvõetud ja vahele jäetud kandidaatide muudatuste eelvaade ilma uuringut muutmata. Turvaliste muudatuste rakendamine (vaikeseade) lisab sobilikud retseptid ainult ühilduvatele olemasolevatele MIR-uuringutele. See kontrollib tegevust, mitte jõudu ega küpsust; allolevad loomise märkeruudud on eraldi. Omandi, ringlussevõtu, tõenäosuse, katalüsaatori, teaduse, labori, eeltingimuse, sihtmärgi, identiteedi, edenemise ja tsükli kontrollid kehtivad alati.
mir-automatic-create-research=Vaikimisi: väljas. Off limits Rakendage ohutuid muudatusi ühilduvatele olemasolevatele MIR-uuringutele; sobiva voota kandidaadid jäetakse vahele ja neist teatatakse. Sees võimaldab sobilikul registreeritud pakkujal luua ühe stabiilse üldise lõpmatu tootlikkuse tehnoloogia, kui ükski olemasolev uurimistöö ei sobi. Allolev ülevaadatud andmete märkeruut otsustab, kas katselised pakkujad on sobilikud. MIR ei loo kunagi ühte tehnoloogiat modifikatsiooni või retsepti kohta ning kõik rasked ohutus-, teadus-, omandi-, identiteedi-, edenemis- ja tsükliväravad kehtivad endiselt.
mir-automatic-require-reviewed-data=Vaikimisi: sees. See on oluline ainult siis, kui valik Luba uue uurimistöö loomine on sisse lülitatud; see ei blokeeri kunagi ohutut seotust olemasoleva uurimistööga. Lubadel on ainult pakkujapered, mis on märgitud ülevaatatuks ja mida toetavad asjakohased täpsed versioonid, seega jäetakse katsepered vahele. Väljas lubab registreeritud eksperimentaalsetel pakkujatel luua üldiste struktuursete tõendite põhjal. Kõige laiema eksperimentaalse käitumise jaoks lubage uurimistöö loomine ja lülitage see nõue välja. Ükski väärtus ei saa kõvast turvaväravast mööda minna.
mir-automatic-compiler-mode=Varjatud ühilduvussild profiilidele, mis on loodud enne jagatud automaatse tootlikkuse juhtelemente. Mittevaikeväärtust pärandväärtust arvestatakse ainult siis, kui kõik uued juhtelemendid jäävad vaikeväärtustele. Muutke mis tahes uut juhtelementi, et võtta selge kontroll.
ips-enable-stream=Loob __1__ jaoks loodud lõpmatu tehnoloogia, kui selle retseptid, efektid, eeldused ja teaduspaketid on saadaval. Keelake see, et takistada MIR-i seda tehnoloogiat genereerimast.
ips-cost-base-stream=Esimesel genereeritud tasemel __1__ vajalikud uurimisüksused. Peab olema vähemalt 1. Hilisemad tasemed arvutatakse selle väärtuse ja kulu kasvuteguri põhjal.
ips-cost-growth-stream=Kordajat rakendatakse __1__ igale hilisemale tasemele. Kasutage ühtsete kulude jaoks 1, taseme kohta 50% kasvu jaoks 1,5 või kulude kahekordistamiseks 2.
ips-max-level-stream=__1__ kõrgeim loodud tase. Lõpmatu taseme jaoks määrake väärtuseks 0.
ips-research-time-stream=Sekundid uurimisühiku kohta __1__ jaoks. Määrake väärtusele 0, et kasutada selle tehnoloogia jaoks MIR-i vaikeseadet. See ei ole kogu uurimistöö aeg; koguaeg sõltub ka uuringu maksumusest, laborite arvust, labori kiirusest ja moodulitest.
mir-enable-base-tech=Võimaldab __1__ jätkata oma vaniljekorgist kui lõpmatu tehnoloogiaga. Keela see, kui soovite, et MIR lisaks uusi uurimisridu ilma vaniljeahelat pikendamata.
mir-cost-base=Uuringuüksused, mis on vajalikud __1__ esimese MIR-i jätkutaseme jaoks. Võimalusel vaniljeahela kulumustri pärimiseks seadke väärtusele 0.
mir-cost-growth=Kordajat rakendatakse igale hilisemale MIR-i jätkutasemele __1__. Võimalusel vaniljeahela kasvumustri pärimiseks seadke väärtusele 0.
mir-max-level=Kõrgeim MIR-i jätkutase __1__ jaoks. Lõpmatu taseme jaoks määrake väärtuseks 0.
mir-research-time=Sekundid uurimisühiku kohta __1__ MIR-i jätkamiseks. Seadistage väärtusele 0, et võimalusel pärida vaniljeahela uurimisühiku aeg.
mir-prefer-this-mod-for-competing-techs=Kui see on lubatud, eemaldab see modifikatsioon valitud konkureerivad lõpmatud laiendused ja kasutab oma versioone. Keela, et säilitada teiste modifikatsioonide konkureerivad versioonid.
mir-adjust-vanilla-weapon-speed-techs=Kontrollib, kas MIR eemaldab raketi ja kahurimürsku kiiruse lisatasud oma loodud relvade laskmise kiiruse jätkamisest, kui saadaval on täpne lõpmatu asenduskate. Piiratud vaniljerelvade laskekiiruse tehnoloogiad säilitavad oma algsed boonused.
mir-use-installed-space-age-icons=Kui MIR on lubatud, võib MIR viidata installitud ametlikele DLC ikoonifailidele, sealhulgas Space Age ja Elevated Rails, isegi kui need modifikatsioonid on põhimängu jaoks keelatud. Jätke see välja, kui neid DLC-faile pole installitud; Factorio ei saa prototüübi laadimise ajal puuduvatest ikoonifailidest graatsiliselt taastuda.
mir-pipeline-extent-multiplier=Ainult käivitamise rippmenüü kordaja tuvastatud vedelikukasti torujuhtme ulatuse väljade jaoks prototüüpide, mitte ainult toruüksuste jaoks. 100% jätab prototüübid muutmata ega laadi torujuhtme läbipääsu ega skaneeri vedelikukaste. Mitte100% väärtused on eksperimentaalsed ja võivad mõjutada masinaid, paake, tõukejõude ja modifitseeritud prototüüpe, mis määratlevad vedelikukastid.
mir-unrestricted-modules=Eksperimentaalne ja tasakaalu murdev. Kui see on lubatud, aktsepteerib iga olemasolev retsept kõiki viit mooduliefekti ja iga olemasolev pesadega mooduli vastuvõtja iga avastatud moodulikategooriat. See ei lisa moodulipesasid ega muuda mooduli prototüüpe ning võib võimaldada tootlikkust, kvaliteeti ja modifitseeritud moodulite silmuseid.
mir-prototype-productivity-cap=Valib, kas MIR jätab retseptide tootlikkuse piirid üksi või kirjutab käivituspiiri igale mitteparameetrilisele ja ringlussevõetavale retseptile. +300% (muutmata) säilitab olemasolevad retseptikorgid; madalamad väärtused lühendavad tootlikkuse skaleerimist, kõrgemad aga pikendavad seda.
mir-recycling-return-chance=Kontrollib ainult peidetud loodud taaskasutusretsepte. Automaatrežiim vähendab tavalist 25% materjali tagastamist maksimaalselt 1-ni jagatuna kogutoodangu kordajaga valitud tootlikkuse piiril. Fikseeritud valikud skaleerivad otse sama genereeritud tulu. Nähtavaid protsesse ja retseptide tootlikkuse piirmäärasid ei muudeta kunagi.
mir-productivity-cap-self-recycling-only=Üle 1 / ringlussevõtu tagastamine – 1 saavad valitud kõrgema piiri ainult need tootmisretseptid, millel on tõestatud mittegeneratiivne iseringlussevõtu tee. Selle läve juures või alla selle see märkeruut ei mõjuta. Mootor muutmata kujul kasutab tavalist 25% tootlust konservatiivse +300% künnisena ilma taaskasutusretsepte muutmata.
mir-prototype-efficiency-cap=Valib, kui palju tõhususe mõju võib vähendada masina aktiivset energiakasutust. -80% (muutmata) jätab olemasolevad energiakasutuse piirangud rahule. Suurem vähendamine võib läheneda aktiivse energiakasutuse nullile ilma saastepiiranguid muutmata.
mir-prototype-pollution-cap=Valib, kui kaugele võivad saastet vähendavad mõjud masinate saastet vähendada. -80% (muutmata) jätab olemasolevad saastepiirangud rahule. Suurem vähendamine võib läheneda nullreostusele ilma energiakasutust muutmata.
mir-prototype-speed-floor=Valib, kui palju negatiivsed kiirusmõjud võivad toetatud masinaid aeglustada. -80% (muutmata) jätab olemasolevad limiidid rahule; sügavamad väärtused eemaldavad normaalse põranda kuni peatuse lähedase tasemeni -99,99%.
mir-prototype-speed-cap=Valib, kas MIR jätab masina kiiruse mõju piirangud rahule või kirjutab uue positiivse kiiruse piiri. +100000% (muutmata) säilitab olemasolevad limiidid; madalamad väärtused piiravad tahtlikult väga suuri kiirusboonuseid.
mir-prototype-quality-cap=Valib, kas MIR jätab masina kvaliteedimõju piirid rahule või kirjutab uue positiivse kvaliteedipiiri. +100000% (muutmata) säilitab olemasolevad piirangud ega muuda kvaliteeditasemeid ega kauba tõenäosuse valemeid.
mir-prototype-positive-power-floor=Vaikimisi väljas. Kui see on lubatud, muudab MIR selgesõnalised 0 W aktiivse energiatarbimise prototüübid prototüübi laadimise ajal 1 W-ks, nii et vähese energiatarbega hoiatusikoone ei kuvata üksustel, mis peaksid kasutama väikese, nullist erineva summa. Nullvõimsusega prototüüpide täpseks säilitamiseks jätke see välja.
mir-settings-profile-import=Kleepige siia MIR-i seadete profiilistring, et rakendada prototüübi loomise ajal alistamiskihina eksporditud käivitusseadete väärtusi. Tavaseadete jaoks jätke tühjaks. Eksportige aktiivsest salvestusest käsuga /mir-settings-export, seejärel taaskäivitage pärast selle väärtuse muutmist.
mir-debug-generation-report=Kui see on lubatud, kirjutab iga loodud või vahele jäetud voo ja baaslaienduse kohta ühe struktureeritud logirea, sealhulgas teaduspaketid, eeltingimused, efektide loenduse, labori ühilduvuse oleku ja ikooniallika.
mir-debug-recipe-matches=Kui see on lubatud, kirjutab iga loodud tootlikkuse voo jaoks sobivad retseptinimed. See võib suurtes modipakettides olla mürarikas.
mir-debug-scripted-effects=Kui see on lubatud, kirjutab käitusaja logikirjeid, kui skriptitud tehnoloogiad arvutavad ümber globaalsed või sündmusepõhised efektid.
mir-lab-incompatibility-policy=Valib, mida MIR teeb, kui valitud teaduspakette ei saa ükski aktiivne labor uurida.
ips-effect-per-level-stream=Määrab __1__ esmase baastaseme efekti taseme kohta. Seotud hilisemaid tasemeid ja efekte skaleeritakse proportsionaalselt. Protsendiefektid kasutavad protsendipunkte; loenduse ja kauguse efektid kasutavad oma algühikuid.
mir-effect-per-level=Määrab kanoonilise tasemepõhise efekti lõpmatule jätkule __1__. Seotud mõjud skaleeritakse proportsionaalselt lõpliku vanilli baasjoonega. Protsendiefektid kasutavad protsendipunkte; loenduse ja kauguse efektid kasutavad oma algühikuid.
mir-note-experimental-spoilage=Eksperimentaalne ja versioonis 2.1.0 vaikimisi keelatud. See on globaalne/kaarti hõlmav skriptitud efekt. Olemasoleva rikutava virna käitumise kohta ei nõuta enne käsitsi kinnitamist.
mir-note-agriculture-growth=Kehtib äsja istutatud põllukultuuride kohta. Olemasolevaid istutatud põllukultuure ei muudeta.
mir-note-cargo-pad-count=Spetsiaalse kosmoseajastu logistikauuringud. Suurendab lasti maandumisplatse pinna kohta ja võib oluliselt muuta logistilist tasakaalu.
mir-note-inserter-capacity=Vaikimisi keelatud. Täiendav sisestusvõimsus võib katkestada vooluringiga juhitavad sisestusseadmed ja vähendada mootori optimeerimist.
mir-note-native-owner-managed-stream=Kui installitud lõpmatu tehnoloogia juba omab seda uurimisperekonda, konfigureerivad samad käivitusseaded selle omaniku, mitte ei loo duplikaadi. Muutumatud MIR-i vaikesätted säilitavad täpselt omaniku lõpliku prototüübi. Selgesõnalised kulude, aja, maksimaalse taseme ja efekti alistamised kehtivad ainult pärast turvalise omaniku sobitamist; voo keelamine jätab välise tehnoloogia puutumata. Pärast käivitusseadete muutmist taaskäivitage Factorio. Maksimaalne tase 0 tähendab lõpmatut ja efekti väärtused on protsendipunktid taseme kohta.

