[technology-description]
more-infinite-research.recipe_productivity=Aumenta la productividad de las recetas seleccionadas. El límite máximo de productividad de Factorio sigue aplicándose; los niveles infinitos adicionales pueden no tener ningún efecto práctico una vez que una receta alcanza su límite.
more-infinite-research.direct_effect=Añade una bonificación infinita repetible. Los paquetes de ciencia se seleccionan a partir de los laboratorios activos para que la tecnología siga siendo investigable con conjuntos de mods compatibles.
more-infinite-research.cargo_bay_unloading_distance=Aumenta la distancia máxima entre una plataforma de aterrizaje de carga y las bahías de descarga conectadas.
more-infinite-research.cargo_landing_pad_count=Aumenta la cantidad de plataformas de aterrizaje de carga que cada fuerza puede construir por superficie.
more-infinite-research.flamethrower_shooting_speed=Aumenta la velocidad de disparo de armas lanzallamas y torretas lanzallamas.
more-infinite-research.electric_shooting_speed=Aumenta la velocidad de disparo de armas eléctricas. En vainilla esto afecta la defensa contra la descarga; con Space Age también afecta a las armas Tesla cuando la categoría de munición Tesla está disponible.
more-infinite-research.spoilage_preservation=Aumenta el modificador de tiempo de deterioro global a través de un efecto de secuencia de comandos limitado. Los artículos existentes que se pueden estropear pueden mantener sus fechas límite de deterioro actuales hasta que se prueben en el juego.
more-infinite-research.agricultural_growth_speed=Acorta el tiempo de crecimiento restante de las plantas de torre agrícolas recién plantadas mediante un efecto de guión limitado.
more-infinite-research.lab_productivity=Aumenta el progreso de la investigación obtenido con cada paquete científico consumido, utilizando el modificador de productividad de investigación de laboratorio nativo.

