[mod-name]
more-infinite-research=Más Investigación Infinita

[mod-description]
more-infinite-research=Añade investigaciones infinitas configurables de productividad y bonificaciones para intermediarios, logística, combate, bonificaciones del jugador y carencias de Space Age.

