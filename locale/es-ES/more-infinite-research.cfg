[mod-setting-description]
ips-require-space-gate=Cuando están habilitadas, estas tecnologías permanecen bloqueadas hasta que la ciencia espacial se investigue en vainilla o la ciencia del prometio se investigue en la era espacial.
mir-science-pack-ingredient-policy=Elige cómo MIR agrega paquetes científicos a las tecnologías generadas. Las opciones están ordenadas de conservadoras a amplias: paquetes predeterminados, paquetes tardíos, paquetes basados ​​en progresión y luego todos los paquetes disponibles.
mir-automatic-productivity-action=Elige lo que hace MIR con oportunidades de productividad seguras que se encuentran en recetas de mods instalados. Deshabilitado no realiza ningún descubrimiento automático. Vista previa de los cambios de los registros de candidatos aceptados y omitidos en el registro de Factorio sin cambiar la investigación. Aplicar cambios seguros (predeterminado) agrega recetas elegibles solo a investigaciones MIR existentes compatibles. Esto controla la acción, no la fuerza o la madurez; las casillas de verificación de creación a continuación están separadas. Siempre se aplican las comprobaciones de propiedad, reciclaje, probabilidad, catalizador, ciencia, laboratorio, requisitos previos, objetivo, identidad, progresión y ciclo.
mir-automatic-create-research=Valor predeterminado: desactivado. Fuera de límites Aplicar cambios seguros a investigaciones MIR existentes compatibles; Los candidatos sin una secuencia adecuada se omiten y se informan. On permite a un proveedor registrado elegible crear una tecnología genérica estable de productividad infinita cuando ninguna investigación existente encaja. La casilla de verificación de datos revisados ​​a continuación decide si los proveedores experimentales son elegibles. MIR nunca crea una tecnología por mod o receta, y todos los aspectos estrictos de seguridad, ciencia, propiedad, identidad, progresión y ciclo aún se aplican.
mir-automatic-require-reviewed-data=Valor predeterminado: activado. Esto sólo importa cuando Permitir la creación de nuevas investigaciones está activado; nunca bloquea el vínculo seguro con la investigación existente. En los permisos, solo las familias de proveedores están marcadas como revisadas y respaldadas por evidencia de versión exacta aplicable, por lo que se omiten las familias experimentales. Off permite a los proveedores experimentales registrados crear a partir de evidencia estructural genérica. Para obtener el comportamiento experimental más amplio, habilite la creación de investigaciones y desactive este requisito. Ningún valor puede pasar por alto una puerta de seguridad rígida.
mir-automatic-compiler-mode=Puente de compatibilidad oculto para perfiles creados antes de los controles de productividad automática divididos. Un valor heredado no predeterminado se respeta solo mientras todos los controles nuevos permanezcan en sus valores predeterminados. Cambie cualquier control nuevo para tomar el control explícito.
ips-enable-stream=Crea la tecnología infinita generada para __1__ cuando sus recetas, efectos, requisitos previos y paquetes científicos están disponibles. Desactívelo para evitar que MIR genere esta tecnología.
ips-cost-base-stream=Unidades de investigación necesarias para el primer nivel generado de __1__. Debe ser al menos 1. Los niveles posteriores se calculan a partir de este valor y el factor de crecimiento de costos.
ips-cost-growth-stream=Multiplicador aplicado a cada nivel posterior de __1__. Utilice 1 para costos fijos, 1,5 para un crecimiento del 50% por nivel o 2 para duplicar costos.
ips-max-level-stream=Nivel más alto generado para __1__. Establezca en 0 para niveles infinitos.
ips-research-time-stream=Segundos por unidad de investigación para __1__. Establezca en 0 para utilizar el valor predeterminado de MIR para esta tecnología. Este no es el tiempo total de investigación; El tiempo total también depende del costo de la investigación, el número de laboratorios, la velocidad del laboratorio y los módulos.
mir-enable-base-tech=Permite que __1__ continúe más allá de su límite de vainilla como una tecnología infinita. Desactívelo si desea que MIR agregue nuevas líneas de investigación sin extender esta cadena básica.
mir-cost-base=Unidades de investigación necesarias para el primer nivel de continuación MIR de __1__. Establezca en 0 para heredar el patrón de costos de la cadena básica cuando sea posible.
mir-cost-growth=Multiplicador aplicado a cada nivel de continuación MIR posterior de __1__. Establezca en 0 para heredar el patrón de crecimiento de la cadena vainilla cuando sea posible.
mir-max-level=Nivel de continuación MIR más alto para __1__. Establezca en 0 para niveles infinitos.
mir-research-time=Segundos por unidad de investigación para la continuación MIR de __1__. Establezca en 0 para heredar el tiempo de la unidad de investigación de la cadena básica cuando sea posible.
mir-prefer-this-mod-for-competing-techs=Cuando está habilitado, este mod elimina extensiones infinitas competidoras seleccionadas y usa sus propias versiones. Desactívelo para mantener versiones competitivas de otras modificaciones.
mir-adjust-vanilla-weapon-speed-techs=Controla si MIR elimina las bonificaciones de velocidad de cohetes y proyectiles de cañón de la continuación de la velocidad de disparo de su arma generada cuando hay disponible una cobertura de reemplazo infinita exacta. Las tecnologías finitas de velocidad de disparo de armas de vainilla mantienen sus bonificaciones originales.
mir-use-installed-space-age-icons=Cuando está habilitado, MIR puede hacer referencia a los archivos de íconos DLC oficiales instalados, incluidos Space Age y Elevated Rails, incluso cuando esas modificaciones están deshabilitadas para ejecutar el juego base. Déjelo desactivado si esos archivos DLC no están instalados; Factorio no puede recuperarse correctamente de los archivos de íconos faltantes durante la carga del prototipo.
mir-pipeline-extent-multiplier=Multiplicador desplegable solo de inicio para campos de extensión de tubería de caja de fluido reconocidos en todos los prototipos, no solo entidades de tubería. 100% deja los prototipos sin cambios y no carga el paso de la tubería ni escanea las cajas de fluidos. Los valores distintos del 100% son experimentales y pueden afectar máquinas, tanques, propulsores y prototipos modificados que definen cajas de fluido.
mir-unrestricted-modules=Experimental y rompe-equilibrios. Cuando está habilitado, cada receta existente acepta los cinco efectos de módulo y cada receptor de módulo existente con ranuras acepta cada categoría de módulo descubierta. Esto no agrega ranuras para módulos ni cambia prototipos de módulos, y puede permitir productividad, calidad y bucles de módulos modificados.
mir-prototype-productivity-cap=Elige si MIR deja solos los límites de productividad de las recetas o escribe un límite de inicio para cada receta sin parámetros y sin reciclaje. +300 % (sin cambios) conserva los límites de recetas existentes; los valores más bajos acortan el escalamiento de la productividad, mientras que los valores más altos lo extienden.
mir-recycling-return-chance=Controla únicamente las recetas de reciclaje generadas ocultas. El modo automático reduce el retorno normal de material del 25% a como máximo 1 dividido por el multiplicador de producción total en el límite de productividad seleccionado. Las opciones fijas escalan directamente los mismos rendimientos generados. Los procesos visibles y los límites de productividad de recetas nunca cambian.
mir-productivity-cap-self-recycling-only=Por encima de 1/retorno del reciclador - 1, solo las recetas de producción con una ruta de autorreciclaje no generativa comprobada reciben el límite más alto seleccionado. En ese umbral o por debajo de él, esta casilla de verificación no tiene ningún efecto. El motor sin cambios utiliza el retorno normal del 25 % como un umbral conservador de +300 % sin cambiar las recetas de reciclaje.
mir-prototype-efficiency-cap=Elige hasta qué punto los efectos de eficiencia pueden reducir el uso de energía activa de la máquina. -80% (sin cambios) deja intactos los límites de uso de energía existentes. Reducciones más profundas pueden acercarse al uso cero de energía activa sin cambiar los límites de contaminación.
mir-prototype-pollution-cap=Elige hasta qué punto los efectos de reducción de la contaminación pueden reducir la contaminación de las máquinas. -80% (sin cambios) deja intactos los límites de contaminación existentes. Reducciones más profundas pueden acercarse a la contaminación cero sin cambiar el uso de energía.
mir-prototype-speed-floor=Elige hasta qué punto los efectos de velocidad negativos pueden ralentizar las máquinas compatibles. -80% (sin cambios) deja intactos los límites existentes; los valores más profundos eliminan el piso normal hasta casi detenerse en -99,99%.
mir-prototype-speed-cap=Elige si MIR deja solos los límites de efecto de velocidad de la máquina o escribe un nuevo límite de velocidad positivo. +100000% (sin cambios) preserva los límites existentes; los valores más bajos limitan intencionalmente bonificaciones de velocidad muy grandes.
mir-prototype-quality-cap=Elige si MIR deja intactos los límites de calidad-efecto de la máquina o escribe un nuevo límite de calidad positivo. +100000% (sin cambios) conserva los límites existentes y no cambia los niveles de calidad ni las fórmulas de probabilidad de artículos.
mir-prototype-positive-power-floor=Desactivado predeterminado. Cuando está habilitado, MIR cambia los prototipos explícitos de uso de energía activa de 0W a 1W durante la carga del prototipo, de modo que los íconos de advertencia de bajo consumo no aparezcan en entidades que deberían consumir una pequeña cantidad distinta de cero. Deje esto para preservar exactamente los prototipos de energía cero.
mir-settings-profile-import=Pegue una cadena de perfil de configuración MIR aquí para aplicar los valores de configuración de inicio exportados como una capa de anulación durante la generación del prototipo. Déjelo en blanco para la configuración normal. Exporte con /mir-settings-export desde un guardado activo, luego reinicie después de cambiar este valor.
mir-debug-generation-report=Cuando está habilitado, escribe una fila de registro estructurado por secuencia generada u omitida y extensión base, incluidos paquetes científicos, requisitos previos, recuento de efectos, estado de compatibilidad de laboratorio y fuente de íconos.
mir-debug-recipe-matches=Cuando está habilitado, escribe nombres de recetas coincidentes para cada flujo de productividad generado. Esto puede resultar ruidoso en paquetes de modificaciones grandes.
mir-debug-scripted-effects=Cuando está habilitado, escribe entradas de registro de tiempo de ejecución cuando las tecnologías con secuencias de comandos recalculan efectos globales o basados ​​en eventos.
mir-lab-incompatibility-policy=Elige lo que hace MIR cuando los paquetes científicos seleccionados no pueden ser investigados por ningún laboratorio activo.
ips-effect-per-level-stream=Establece el efecto de nivel base principal por nivel para __1__. Los niveles y efectos posteriores relacionados se escalan proporcionalmente. Los efectos porcentuales utilizan puntos porcentuales; Los efectos de conteo y distancia utilizan sus unidades nativas.
mir-effect-per-level=Establece el efecto canónico por nivel para la continuación infinita __1__. Los efectos relacionados se escalan proporcionalmente desde la línea base final de vainilla. Los efectos porcentuales utilizan puntos porcentuales; Los efectos de conteo y distancia utilizan sus unidades nativas.
mir-note-experimental-spoilage=Experimental y deshabilitado de forma predeterminada en v2.1.0. Este es un efecto de secuencia de comandos global/que abarca todo el mapa. El comportamiento existente de pila que se puede estropear no se reclama hasta que se valida manualmente.
mir-note-agriculture-growth=Aplica para cultivos agrícolas en torre recién plantados. Los cultivos plantados existentes no se reescalan.
mir-note-cargo-pad-count=Investigación logística de la era espacial especial. Aumenta las pistas de aterrizaje de carga por superficie y puede cambiar sustancialmente el equilibrio logístico.
mir-note-inserter-capacity=Deshabilitado de forma predeterminada. La capacidad adicional del insertador puede dañar los insertadores controlados por circuitos y reducir las optimizaciones del motor.
mir-note-native-owner-managed-stream=Si una tecnología infinita instalada ya posee esta familia de investigación, estas mismas configuraciones de inicio configuran ese propietario en lugar de crear un duplicado. Los valores predeterminados de MIR sin cambios conservan exactamente el prototipo final del propietario. Las anulaciones explícitas de costo, tiempo, nivel máximo y efecto se aplican solo después de una coincidencia segura del propietario; Deshabilitar la transmisión deja intacta la tecnología externa. Reinicie Factorio después de cambiar la configuración de inicio. Un nivel máximo de 0 significa infinito y los valores de los efectos son puntos porcentuales por nivel.

