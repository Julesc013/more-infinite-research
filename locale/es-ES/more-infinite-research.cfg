[mod-setting-description]
ips-require-space-gate=Cuando está activado, estas tecnologías permanecen bloqueadas hasta investigar la ciencia espacial en el juego base o la ciencia de prometio en Space Age.
mir-science-pack-ingredient-policy=Controls extra science packs added to every generated technology. Configured uses each technology's normal packs. Add space science adds space science when available. Add space and promethium science adds both high-end packs when available. Use all official science packs adds base and Space Age packs without modded packs. Use all lab science packs also includes compatible modded science packs.
ips-enable-stream=Desactívalo para impedir que __1__ se genere en la partida.
ips-cost-base-stream=Unidades de investigación necesarias para el primer nivel de __1__. Los niveles superiores escalan a partir de este valor aunque el primer desbloqueo empiece más tarde.
ips-cost-growth-stream=Multiplicador aplicado al coste del nivel anterior de __1__. Usa 1 para un coste fijo, o valores mayores para aumentar la dificultad en cada nivel.
ips-max-level-stream=Establécelo en 0 para mantener __1__ infinita, o indica un valor positivo para limitarla a ese nivel.
ips-research-time-stream=Establécelo en 0 para usar el tiempo de investigación predeterminado configurado para __1__. Indica un valor positivo para reemplazar los segundos por nivel.
mir-enable-base-tech=Permite que __1__ continúe más allá de su límite vanilla con niveles infinitos que siguen la misma progresión.
mir-cost-base=Establécelo en 0 para reutilizar el coste vanilla de nivel 1 de __1__. Cualquier valor positivo reemplaza el término base usado por la fórmula infinita.
mir-cost-growth=Establécelo en 0 para continuar la tasa de crecimiento vanilla de __1__. Indica un valor positivo para cambiar cuánto aumenta el coste de cada nivel infinito.
mir-research-time=Establécelo en 0 para reutilizar el tiempo de investigación vanilla de __1__. Indica un valor positivo para reemplazar los segundos por nivel.
mir-prefer-this-mod-for-competing-techs=Cuando está activado, este mod elimina las extensiones infinitas competidoras seleccionadas y usa sus propias versiones. Desactívalo para conservar versiones competidoras de otros mods.
mir-adjust-vanilla-weapon-speed-techs=Controls whether MIR removes rocket and cannon-shell speed bonuses from its generated weapon shooting speed continuation when dedicated replacement research is available. Finite vanilla weapon shooting speed technologies keep their original bonuses.
mir-debug-generation-report=Cuando está activado, escribe en el registro una línea estructurada por cada flujo y extensión base generado u omitido, incluyendo paquetes de ciencia, requisitos previos, número de efectos, estado de compatibilidad de laboratorios y origen del icono.
mir-debug-recipe-matches=When enabled, writes matched recipe names for each generated productivity stream. This can be noisy in large mod packs.
mir-debug-scripted-effects=When enabled, writes runtime log entries when scripted technologies recompute global or event-driven effects.
mir-lab-incompatibility-policy=Choose whether incompatible science-pack sets are reduced to the largest lab-compatible subset or skipped entirely.

