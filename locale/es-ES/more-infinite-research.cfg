[string-mod-setting-description]
mir-automatic-productivity-action-disabled=No realiza ningún descubrimiento, adjunto o creación automáticos. La investigación fija de MIR se mantiene sin cambios.
mir-automatic-productivity-action-preview=Descubre y clasifica candidatos, luego escribe las decisiones aceptadas y omitidas en el registro de Factorio. No adjunta recetas ni crea investigaciones.
mir-automatic-productivity-action-apply=Predeterminado. Descubre candidatos y adjunta solo recetas de seguridad comprobada a investigaciones MIR existentes compatibles. No crea investigación por sí solo; las dos casillas de verificación siguientes rigen la creación.
mir-automatic-compiler-mode-off=Equivalente heredado de Desactivado.
mir-automatic-compiler-mode-report=Equivalente heredado de los cambios de Vista previa.
mir-automatic-compiler-mode-safe-attach=Equivalente heredado de Aplicar cambios seguros con la creación de investigaciones deshabilitada.
mir-automatic-compiler-mode-exact-pack=Equivalente heredado de Aplicar cambios seguros con la creación de investigaciones habilitada y los datos de compatibilidad revisados ​​requeridos.
mir-automatic-compiler-mode-safe-generate=Equivalente heredado de Aplicar cambios seguros con la creación de investigaciones habilitada para proveedores experimentales registrados.
mir-adjust-vanilla-weapon-speed-techs-off=Desactiva la limpieza adicional opcional de cohetes/cañón superpuestos de MIR.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Elimina las bonificaciones superpuestas de cohetes/cañón de MIR solo cuando una tecnología infinita habilitada y accesible proporcione el efecto de reemplazo exacto.
mir-adjust-vanilla-weapon-speed-techs-always=Elimina siempre las bonificaciones superpuestas de cohetes/cañón de MIR. Úselo solo si desea una separación estricta.
mir-science-pack-ingredient-policy-configured=Utilice los paquetes científicos configurados de cada tecnología generada sin expansión de ingredientes opcional. MIR predeterminado.
mir-science-pack-ingredient-policy-space=Agregue ciencia espacial cuando esté disponible. Un simple aumento de dificultad post-cohete.
mir-science-pack-ingredient-policy-space-and-promethium=Agregue espacio y ciencia de prometio cuando esté disponible. Lo mejor para sumideros de investigación de la última era espacial.
mir-science-pack-ingredient-policy-space-age-progression=Agregue solo los paquetes de progresión de la Era Espacial implícitos en los paquetes seleccionados. No agrega paquetes modificados no relacionados.
mir-science-pack-ingredient-policy-official-progression=Agregue los paquetes de estilo de requisitos previos oficiales faltantes implícitos en el paquete oficial más avanzado ya seleccionado.
mir-science-pack-ingredient-policy-mod-progression=Agregue los paquetes faltantes compatibles con el laboratorio inferidos de la progresión del paquete científico modificado y desbloquee los requisitos previos.
mir-science-pack-ingredient-policy-all-official=Utilice todas las bases oficiales y los paquetes científicos de la era espacial que existen en el conjunto de modificaciones actual.
mir-science-pack-ingredient-policy-all=Utilice todos los paquetes científicos activos compatibles con el laboratorio, incluidos los paquetes científicos modificados.
mir-lab-incompatibility-policy-reduce=Mantenga la tecnología reduciendo sus paquetes científicos al conjunto más grande aceptado por un laboratorio activo. El valor predeterminado más seguro para los paquetes de modificaciones.
mir-lab-incompatibility-policy-skip=Omita la tecnología si ningún laboratorio activo puede investigar el conjunto de paquetes científicos seleccionado. Más estricto y más fácil de auditar.
mir-lab-incompatibility-policy-engine-default=Nunca reescribas el conjunto de paquetes científicos seleccionados. MIR conserva sin cambios un conjunto investigable de forma segura y omite la tecnología generada cuando Factorio no puede investigar ese conjunto exacto.
mir-prototype-productivity-cap-engine-default=No toque el límite de productividad existente de cada receta. Las recetas sin límite personalizado utilizan el límite de bonificación de productividad normal de +300 % de Factorio.
mir-prototype-productivity-cap-percent-25=Establezca límites de productividad de recetas sin parámetros en +25%. Este es un límite temprano estricto.
mir-prototype-productivity-cap-percent-50=Establezca límites de productividad de recetas sin parámetros en +50%. Esto está por debajo del límite normal y hace que la investigación sobre productividad deje de ayudar antes.
mir-prototype-productivity-cap-percent-75=Establezca límites de productividad de recetas sin parámetros en +75 %. Esto está por debajo del límite normal y hace que la investigación sobre productividad deje de ayudar antes.
mir-prototype-productivity-cap-percent-100=Establezca límites de productividad de recetas sin parámetros en +100%. Esto está por debajo del límite normal y hace que la investigación sobre productividad deje de ayudar antes.
mir-prototype-productivity-cap-percent-125=Establezca límites de productividad de recetas sin parámetros en +125%.
mir-prototype-productivity-cap-percent-150=Establezca límites de productividad de recetas sin parámetros en +150%.
mir-prototype-productivity-cap-percent-200=Establezca límites de productividad de recetas sin parámetros en +200%. Esto está por debajo del límite normal y hace que la investigación sobre productividad deje de ayudar antes.
mir-prototype-productivity-cap-percent-250=Establezca límites de productividad de recetas sin parámetros en +250%. Esto está ligeramente por debajo del límite normal.
mir-prototype-productivity-cap-percent-400=Establezca límites de productividad de recetas sin parámetros en +400%. Esto extiende el escalamiento de la productividad más allá del límite normal.
mir-prototype-productivity-cap-percent-500=Establezca límites de productividad de recetas sin parámetros en +500%. Esto extiende el escalamiento de la productividad más allá del límite normal.
mir-prototype-productivity-cap-percent-750=Establezca límites de productividad de recetas sin parámetros en +750%.
mir-prototype-productivity-cap-percent-1000=Establezca límites de productividad de recetas sin parámetros en +1000%. Úselo para guardados prolongados donde la investigación de productividad debería seguir siendo importante.
mir-prototype-productivity-cap-percent-2500=Establezca límites de productividad de recetas sin parámetros en +2500%. Úselo para guardados muy prolongados.
mir-prototype-productivity-cap-percent-5000=Establezca límites de productividad de recetas sin parámetros en +5000%.
mir-prototype-productivity-cap-percent-10000=Establezca límites de productividad de recetas sin parámetros en +10000%. Úselo solo para escalamiento extremo a largo plazo.
mir-prototype-productivity-cap-percent-25000=Establezca límites de productividad de recetas sin parámetros en +25000%. Úselo solo para escalamiento extremo a largo plazo.
mir-prototype-productivity-cap-percent-100000=Establezca límites de productividad de recetas sin parámetros en +100000%. Esto efectivamente no tiene límite para la mayoría de las salvadas.
mir-recycling-return-chance-engine-default=Deje todas las recetas de reciclaje sin cambios.
mir-recycling-return-chance-match-productivity-cap=Reducción automática a prueba de exploits para recetas de reciclaje generadas ocultas. Utiliza 1 / (1 + bonificación de productividad), limitado al rendimiento normal del 25 %: +400 % se convierte en 20 % y +1000 % se convierte en aproximadamente 9,09 %.
mir-recycling-return-chance-percent-25=Mantenga ocultas las recetas de reciclaje generadas con la devolución normal de material del 25%.
mir-recycling-return-chance-percent-20=Escale recetas de reciclaje generadas ocultas a un retorno de material del 20 %.
mir-recycling-return-chance-percent-15=Escale recetas de reciclaje generadas ocultas a un retorno de material del 15 %.
mir-recycling-return-chance-percent-12-5=Escale recetas de reciclaje generadas ocultas a un retorno de material del 12,5 %.
mir-recycling-return-chance-percent-10=Escale recetas de reciclaje generadas ocultas a un retorno de material del 10%.
mir-recycling-return-chance-percent-7-5=Escale recetas de reciclaje generadas ocultas a un retorno de material del 7,5 %.
mir-recycling-return-chance-percent-5=Escale recetas de reciclaje generadas ocultas a un retorno de material del 5%.
mir-recycling-return-chance-percent-2-5=Escale recetas de reciclaje generadas ocultas a un retorno de material del 2,5 %.
mir-recycling-return-chance-percent-1=Escale recetas de reciclaje generadas ocultas a un retorno de material del 1%.
mir-recycling-return-chance-percent-0-5=Escale recetas de reciclaje generadas ocultas a un retorno de material del 0,5 %.
mir-recycling-return-chance-percent-0-1=Escale recetas de reciclaje generadas ocultas a un retorno de material del 0,1%.
mir-prototype-efficiency-cap-engine-default=No toque el límite del efecto de uso de energía de cada máquina. Las máquinas sin un límite personalizado utilizan el límite de efecto de uso de energía normal de -80% de Factorio, por lo que los efectos no pueden reducir el uso activo por debajo del 20%.
mir-prototype-efficiency-cap-saving-25=Escriba un límite de uso de energía del -25 %. El uso activo de energía se mantiene en un 75% o más después de los efectos del uso de energía.
mir-prototype-efficiency-cap-saving-50=Escriba un límite de uso de energía del -50%. El uso de energía activa se mantiene en 50% o más después de los efectos del uso de energía en las máquinas compatibles.
mir-prototype-efficiency-cap-saving-75=Escriba un límite de uso de energía del -75%. El uso de energía activa se mantiene en un 25% o más después de los efectos del uso de energía en las máquinas compatibles.
mir-prototype-efficiency-cap-saving-90=Escriba un límite de uso de energía del -90%. El uso de energía activa puede caer al 10%, lo que está por debajo del mínimo normal del 20%.
mir-prototype-efficiency-cap-saving-95=Escriba un límite de uso de energía del -95%. El uso de energía activa puede caer hasta el 5%.
mir-prototype-efficiency-cap-saving-99=Escriba un límite de uso de energía del -99%. El uso de energía activa puede caer al 1%.
mir-prototype-efficiency-cap-saving-999=Escriba un límite de uso de energía del -99,9%. El uso de energía activa puede caer hasta el 0,1%.
mir-prototype-efficiency-cap-saving-9999=Escriba un límite de uso de energía del -99,99%. Se trata de un uso de energía activa casi nulo, no de una reescritura de un prototipo de energía cero.
mir-prototype-pollution-cap-engine-default=No toque el límite de efecto de contaminación de cada máquina. Las máquinas sin límite personalizado utilizan el límite normal de efecto de contaminación del -80% de Factorio.
mir-prototype-pollution-cap-saving-25=Escriba un límite de contaminación del -25%. La contaminación se mantiene en un 75% o más después de los efectos de la contaminación.
mir-prototype-pollution-cap-saving-50=Escriba un límite de contaminación del -50%. La contaminación se mantiene en un 50% o más después de los efectos de la contaminación en las máquinas compatibles.
mir-prototype-pollution-cap-saving-75=Escriba un límite de contaminación del -75%. La contaminación se mantiene en un 25% o más después de los efectos de la contaminación en las máquinas compatibles.
mir-prototype-pollution-cap-saving-90=Escriba un límite de contaminación del -90%. La contaminación puede caer al 10%, cifra inferior al umbral normal del 20%.
mir-prototype-pollution-cap-saving-95=Escriba un límite de contaminación del -95%. La contaminación puede caer al 5%.
mir-prototype-pollution-cap-saving-99=Escriba un límite de contaminación del -99%. La contaminación puede caer al 1%.
mir-prototype-pollution-cap-saving-999=Escriba un límite de contaminación del -99,9%. La contaminación puede caer al 0,1%.
mir-prototype-pollution-cap-saving-9999=Escriba un límite de contaminación del -99,99%. Se trata de una contaminación casi nula, no un script de contaminación en tiempo de ejecución.
mir-prototype-speed-floor-engine-default=Deje el límite de velocidad negativo de cada máquina sin tocar. Las máquinas sin límite personalizado utilizan el piso normal de -80% de Factorio y mantienen al menos un 20% de velocidad.
mir-prototype-speed-floor-saving-25=Limita los efectos de velocidad negativos en -25%, dejando al menos un 75% de velocidad.
mir-prototype-speed-floor-saving-50=Limite los efectos de velocidad negativos al -50%, dejando al menos un 50% de velocidad.
mir-prototype-speed-floor-saving-75=Limita los efectos de velocidad negativos en -75%, dejando al menos un 25% de velocidad.
mir-prototype-speed-floor-saving-90=Permite efectos de velocidad negativos hasta -90%, dejando al menos un 10% de velocidad.
mir-prototype-speed-floor-saving-95=Permite efectos de velocidad negativos hasta -95%, dejando al menos un 5% de velocidad.
mir-prototype-speed-floor-saving-99=Permite efectos de velocidad negativos hasta -99%, dejando al menos un 1% de velocidad.
mir-prototype-speed-floor-saving-999=Permite efectos de velocidad negativos hasta -99,9%, dejando al menos un 0,1% de velocidad.
mir-prototype-speed-floor-saving-9999=Permite efectos de velocidad negativos hasta -99,99%, el límite más bajo del prototipo de Factorio. Esta es una velocidad de elaboración cercana a la parada, no nula o negativa.
mir-prototype-speed-cap-engine-default=No toque el límite de velocidad de cada máquina. Las máquinas sin límite personalizado utilizan el límite muy alto de efecto de velocidad de +100000 % de Factorio.
mir-prototype-speed-cap-bonus-25=Limita los efectos de velocidad positivos en +25%.
mir-prototype-speed-cap-bonus-50=Limita los efectos de velocidad positivos en +50%. Utilízalo para mantener las bonificaciones de velocidad estrictamente limitadas.
mir-prototype-speed-cap-bonus-75=Limita los efectos de velocidad positivos en +75%.
mir-prototype-speed-cap-bonus-100=Limita los efectos de velocidad positivos a +100%.
mir-prototype-speed-cap-bonus-125=Limita los efectos de velocidad positivos en +125%.
mir-prototype-speed-cap-bonus-150=Limita los efectos de velocidad positivos en +150%.
mir-prototype-speed-cap-bonus-200=Limita los efectos de velocidad positivos en +200%.
mir-prototype-speed-cap-bonus-250=Limita los efectos de velocidad positivos en +250%.
mir-prototype-speed-cap-bonus-300=Limita los efectos de velocidad positivos en +300%.
mir-prototype-speed-cap-bonus-400=Limita los efectos de velocidad positivos en +400%.
mir-prototype-speed-cap-bonus-500=Limita los efectos de velocidad positivos a +500%.
mir-prototype-speed-cap-bonus-750=Limita los efectos de velocidad positivos en +750%.
mir-prototype-speed-cap-bonus-1000=Limita los efectos de velocidad positivos a +1000%.
mir-prototype-speed-cap-bonus-2500=Limita los efectos de velocidad positivos en +2500%.
mir-prototype-speed-cap-bonus-5000=Limita los efectos de velocidad positivos a +5000%.
mir-prototype-speed-cap-bonus-10000=Limita los efectos de velocidad positivos a +10000%.
mir-prototype-speed-cap-bonus-25000=Limita los efectos de velocidad positivos en +25000%.
mir-prototype-speed-cap-bonus-100000=Escriba explícitamente el límite máximo de efecto de velocidad de Factorio. A diferencia de lo que no se modifica, esto sobrescribe los límites inferiores personalizados.
mir-prototype-quality-cap-engine-default=No toque el límite de calidad-efecto de cada máquina. Las máquinas sin límite personalizado utilizan el techo muy alto de efecto de calidad de +100000% de Factorio.
mir-prototype-quality-cap-bonus-50=Limite los efectos de calidad positivos en +50%. Esto limita los efectos de bonificación por calidad de la máquina, no los niveles de calidad ni las fórmulas de probabilidad de los elementos.
mir-prototype-quality-cap-bonus-25=Limite los efectos de calidad positivos en +25 %. Esto no cambia los niveles de calidad ni las fórmulas de probabilidad de los artículos.
