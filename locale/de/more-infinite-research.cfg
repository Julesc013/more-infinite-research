mir-enable-base-tech=Unendliche Erweiterung für __1__ aktivieren
mir-cost-base=Basiskostenkonstante für __1__
mir-cost-growth=Kostenwachstumsfaktor für __1__
mir-research-time=Forschungszeit (Sekunden) für __1__
mir-prefer-this-mod-for-competing-techs=More Infinite Research bevorzugen, wenn andere Mods konkurrierende unendliche Technologien hinzufügen
mir-adjust-vanilla-weapon-speed-techs=Vanilla-Technologien für Waffen-Feuerrate anpassen
mir-debug-generation-report=Generierungsbericht ins Log schreiben

[mod-setting-description]
ips-require-space-gate=Wenn aktiviert, bleiben diese Technologien gesperrt, bis in Vanilla die Weltraumforschung oder in Space Age die Promethium-Wissenschaft erforscht wurde.
ips-enable-stream=Deaktivieren, um zu verhindern, dass __1__ im Spiel generiert wird.
ips-cost-base-stream=Forschungseinheiten, die für die erste Stufe von __1__ benötigt werden. Höhere Stufen skalieren von diesem Wert aus, auch wenn die erste Freischaltung später beginnt.
ips-cost-growth-stream=Multiplikator, der auf die Kosten der vorherigen Stufe von __1__ angewendet wird. Verwende 1 für konstante Kosten oder größere Werte, um die Schwierigkeit pro Stufe zu erhöhen.
ips-max-level-stream=Setze den Wert auf 0, damit __1__ unendlich bleibt, oder gib einen positiven Wert ein, um die Technologie auf diese Stufe zu begrenzen.
mir-enable-base-tech=Erlaubt __1__, nach der Vanilla-Grenze mit unendlichen Stufen fortzufahren, die derselben Progression folgen.
mir-cost-base=Setze den Wert auf 0, um die Vanilla-Kosten von Stufe 1 für __1__ wiederzuverwenden. Jeder positive Wert überschreibt den Basisterm der unendlichen Formel.
mir-cost-growth=Setze den Wert auf 0, um die Vanilla-Wachstumsrate für __1__ fortzuführen. Gib einen positiven Wert ein, um zu ändern, wie stark die Kosten jeder unendlichen Stufe steigen.
mir-research-time=Setze den Wert auf 0 oder belasse den Standardwert, um die Vanilla-Forschungszeit für __1__ wiederzuverwenden. Gib einen positiven Wert ein, um die Sekunden pro Stufe zu überschreiben.
mir-prefer-this-mod-for-competing-techs=Wenn aktiviert, entfernt diese Mod ausgewählte konkurrierende unendliche Erweiterungen und verwendet ihre eigenen Versionen. Deaktivieren, um konkurrierende Versionen anderer Mods beizubehalten.
mir-adjust-vanilla-weapon-speed-techs=Steuert, ob diese Mod Raketen- und Kanonengranaten-Feuerratenboni aus Vanilla-Technologien entfernt, wenn eine eigene Ersatzforschung verfügbar ist.
mir-debug-generation-report=Wenn aktiviert, schreibt die Mod für jeden generierten oder übersprungenen Stream und jede Basiserweiterung eine strukturierte Logzeile mit Wissenschaftspaketen, Voraussetzungen, Effektanzahl, Laborkompatibilitätsstatus und Iconquelle.

[string-mod-setting]
mir-adjust-vanilla-weapon-speed-techs-off=Aus
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Nur wenn eigene Technologie vorhanden ist
mir-adjust-vanilla-weapon-speed-techs-always=Immer
