[string-mod-setting-description]
mir-adjust-vanilla-weapon-speed-techs-off=Do not remove overlapping rocket or cannon-shell bonuses from MIR's generated weapon-speed continuation.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Remove MIR's overlapping rocket/cannon bonuses only when the dedicated replacement research is enabled.
mir-adjust-vanilla-weapon-speed-techs-always=Always remove MIR's overlapping rocket/cannon bonuses. Use only if you want strict separation.
mir-science-pack-ingredient-policy-configured=Use the science packs configured for each generated technology. Safest default.
mir-science-pack-ingredient-policy-space=Add space science when available.
mir-science-pack-ingredient-policy-space-and-promethium=Add both space science and promethium science when available. Best for post-victory research sinks.
mir-science-pack-ingredient-policy-all-official=Use all official base and Space Age science packs that exist in the current mod set. Does not include modded science packs.
mir-science-pack-ingredient-policy-all=Use all compatible active lab science packs, including modded science packs when labs can consume them.
mir-lab-incompatibility-policy-reduce=Keep the technology by reducing its science packs to the largest compatible set accepted by an active lab. Safest default for mod packs.
mir-lab-incompatibility-policy-skip=Skip the technology if no active lab can research its configured science-pack set. Stricter and easier to audit.
