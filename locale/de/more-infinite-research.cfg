[technology-description]
more-infinite-research.recipe_productivity=Erhöht die Rezeptproduktivität für die ausgewählten Rezepte. Die maximale Produktivitätsgrenze von Factorio gilt weiterhin; zusätzliche unendliche Stufen haben möglicherweise keine praktische Wirkung, sobald ein Rezept seine Grenze erreicht hat.
more-infinite-research.direct_effect=Fügt einen unendlich wiederholbaren Bonus hinzu. Wissenschaftspakete werden aus aktiven Laboren ausgewählt, damit die Technologie mit kompatiblen Mod-Sätzen erforschbar bleibt.
more-infinite-research.cargo_bay_unloading_distance=Erhöht die maximale Entfernung zwischen einem Frachtlandepad und verbundenen Entladebuchten.
more-infinite-research.cargo_landing_pad_count=Erhöht die Anzahl der Frachtlandepads, die jede Partei pro Oberfläche bauen kann.
more-infinite-research.flamethrower_shooting_speed=Increases shooting speed for flamethrower weapons and flamethrower turrets.
more-infinite-research.electric_shooting_speed=Increases shooting speed for electric weapons. In vanilla this affects discharge defense; with Space Age it also affects Tesla weapons when the tesla ammo category is available.
more-infinite-research.spoilage_preservation=Increases the global spoil time modifier through a bounded scripted effect. Existing spoilable items may keep their current spoil deadlines until tested in-game.
more-infinite-research.agricultural_growth_speed=Shortens remaining growth time for newly planted agricultural tower plants through a bounded scripted effect.
more-infinite-research.lab_productivity=Increases research progress gained from each consumed science pack, using the native lab research productivity modifier.

