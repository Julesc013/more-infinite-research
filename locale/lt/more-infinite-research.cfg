[technology-description]
more-infinite-research.recipe_productivity=Padidina pasirinktų receptų receptų produktyvumą. Factorio maksimalaus produktyvumo riba vis dar taikoma; papildomi begaliniai lygiai gali neturėti jokio praktinio poveikio, kai receptas pasiekia savo ribą.
more-infinite-research.direct_effect=Prideda begalinę pakartojamą premiją. Mokslo paketai parenkami iš aktyvių laboratorijų, todėl technologiją galima ištirti naudojant suderinamus modifikacijų rinkinius.
more-infinite-research.cargo_bay_unloading_distance=Padidina maksimalų atstumą tarp krovinio nusileidimo aikštelės ir prijungtų iškrovimo aikštelių.
more-infinite-research.cargo_landing_pad_count=Padidina krovinių tūpimo aikštelių, kurias kiekviena jėga gali pastatyti ant paviršiaus, skaičių.
more-infinite-research.flamethrower_shooting_speed=Padidina liepsnosvaidžių ginklų ir liepsnosvaidžių bokštelių šaudymo greitį.
more-infinite-research.electric_shooting_speed=Padidina šaudymo greitį naudojant elektrinius ginklus. Vanilėje tai turi įtakos apsaugai nuo iškrovos; Kosmoso amžiuje tai taip pat turi įtakos Tesla ginklams, kai yra tesla amunicijos kategorija.
more-infinite-research.spoilage_preservation=Padidina visuotinį sugadinimo laiko modifikatorių per ribotą scenarijų efektą. Esami gendantys daiktai gali išlaikyti savo dabartinius sugadinimo terminus, kol jie nebus išbandyti žaidime.
more-infinite-research.agricultural_growth_speed=Sutrumpina likusį naujai pasodintų žemės ūkio bokštų augalų augimo laiką dėl riboto scenarijaus efekto.
more-infinite-research.lab_productivity=Padidina mokslinių tyrimų pažangą, gautą naudojant kiekvieną sunaudotą mokslinį paketą, naudojant vietinį laboratorijos tyrimų produktyvumo modifikatorių.

