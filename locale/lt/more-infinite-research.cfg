mir-prototype-speed-floor-saving-999=Leiskite neigiamą greičio poveikį iki -99,9%, palikdami bent 0,1% greitį.
mir-prototype-speed-floor-saving-9999=Leisti neigiamus greičio efektus iki -99,99%, tai yra žemiausia Factorio prototipo riba. Tai beveik sustojimo greitis, o ne nulis ar neigiamas kūrimo greitis.
mir-prototype-speed-cap-engine-default=Palikite kiekvieno įrenginio greičio apribojimą. Mašinos be pasirinktinio apribojimo naudoja Factorio labai aukštas +100 000 % greičio efekto lubas.
