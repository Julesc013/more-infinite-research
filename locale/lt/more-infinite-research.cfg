[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Neatlieka automatinio aptikimo, priedų ar kūrimo. MIR fiksuotas tyrimas išlieka nepakitęs.
mir-automatic-productivity-action-preview=Atranda ir klasifikuoja kandidatus, tada į Factorio žurnalą įrašo priimtus ir praleistus sprendimus. Ji neprideda receptų ir nekuria tyrimų.
mir-automatic-productivity-action-apply=Numatytoji. Atranda kandidatus ir prie suderinamų esamų MIR tyrimų prideda tik patikrintus receptus. Ji pati nekuria tyrimų; du toliau esantys žymimieji langeliai reguliuoja kūrimą.
mir-automatic-compiler-mode-off=Senas išjungtos atitikmuo.
mir-automatic-compiler-mode-report=Senas peržiūros pakeitimų atitikmuo.
mir-automatic-compiler-mode-safe-attach=Senas atitikmuo Taikyti saugius pakeitimus išjungus tyrimų kūrimą.
mir-automatic-compiler-mode-exact-pack=Senas atitikmuo Taikyti saugius pakeitimus, kai įjungtas tyrimų kūrimas ir reikalingi peržiūrėti suderinamumo duomenys.
mir-automatic-compiler-mode-safe-generate=Senas atitikmuo Taikyti saugius pakeitimus su įgalintu tyrimų kūrimu registruotiems eksperimentiniams teikėjams.
mir-adjust-vanilla-weapon-speed-techs-off=Išjungti pasirenkamą MIR persidengiančių raketų / pabūklų valymą.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Pašalinkite MIR persidengiančius raketų/patrankų priedus tik tada, kai įjungta, pasiekiama begalinė technologija užtikrina tikslų pakeitimo efektą.
mir-adjust-vanilla-weapon-speed-techs-always=Visada pašalinkite MIR persidengiančius raketų/patrankų priedus. Naudokite tik tuo atveju, jei norite griežtai atskirti.
mir-science-pack-ingredient-policy-configured=Naudokite kiekvienos sugeneruotos technologijos sukonfigūruotus mokslo paketus be pasirenkamų ingredientų išplėtimo. MIR numatytasis.
mir-science-pack-ingredient-policy-space=Kai įmanoma, pridėkite kosmoso mokslą. Paprastas sunkumo padidėjimas po raketos.
mir-science-pack-ingredient-policy-space-and-promethium=Jei įmanoma, pridėkite erdvės ir prometio mokslo. Geriausiai tinka labai vėlyvojo kosminio amžiaus tyrimų kriauklėms.
mir-science-pack-ingredient-policy-space-age-progression=Pridėkite tik kosmoso amžiaus progresavimo paketus, numatytus pasirinktuose paketuose. Neprideda nesusijusių modifikuotų paketų.
mir-science-pack-ingredient-policy-official-progression=Pridėkite trūkstamų oficialių būtinų sąlygų paketų, kuriuos numano jau pasirinktas pažangiausias oficialus paketas.
mir-science-pack-ingredient-policy-mod-progression=Pridėkite trūkstamus su laboratorija suderinamus paketus, gautus iš modifikuoto mokslinio paketo progreso, ir atrakinkite būtinas sąlygas.
mir-science-pack-ingredient-policy-all-official=Naudokite kiekvieną oficialią bazę ir kosmoso amžiaus mokslo paketą, kuris yra dabartiniame modifikacijų rinkinyje.
mir-science-pack-ingredient-policy-all=Naudokite kiekvieną aktyvų su laboratorija suderinamą mokslo paketą, įskaitant modifikuotus mokslo paketus.
mir-lab-incompatibility-policy-reduce=Išsaugokite technologiją sumažindami jos mokslo paketus iki didžiausio rinkinio, kurį priima aktyvi laboratorija. Saugiausias numatytasis modifikavimo paketų nustatymas.
mir-lab-incompatibility-policy-skip=Praleiskite technologiją, jei jokia aktyvi laboratorija negali ištirti pasirinkto mokslo rinkinio. Griežtesnis ir lengviau audituojamas.
mir-lab-incompatibility-policy-engine-default=Niekada neperrašykite pasirinkto mokslo rinkinio. MIR saugo saugiai tiriamą rinkinį nepakitusią ir praleidžia sukurtą technologiją, kai Factorio negali ištirti to tikslaus rinkinio.
mir-prototype-productivity-cap-engine-default=Palikite kiekvieno recepto esamą produktyvumo ribą. Receptuose be tinkintos ribos naudojamas įprastas Factorio +300 % produktyvumo premijos limitas.
mir-prototype-productivity-cap-percent-25=Nustatykite ne parametrų receptų produktyvumo ribas į +25%. Tai griežta ankstyvoji riba.
mir-prototype-productivity-cap-percent-50=Nustatykite ne parametrų receptų produktyvumo ribas į +50%. Tai yra žemiau įprastos ribos, todėl produktyvumo tyrimai nustoja padėti anksčiau.
mir-prototype-productivity-cap-percent-75=Nustatykite ne parametrų receptų produktyvumo ribas į +75%. Tai yra žemiau įprastos ribos, todėl produktyvumo tyrimai nustoja padėti anksčiau.
mir-prototype-productivity-cap-percent-100=Nustatykite ne parametrų receptų produktyvumo ribas į +100%. Tai yra žemiau įprastos ribos, todėl produktyvumo tyrimai nustoja padėti anksčiau.
mir-prototype-productivity-cap-percent-125=Nustatykite ne parametrų receptų produktyvumo ribas į +125%.
mir-prototype-productivity-cap-percent-150=Nustatykite ne parametrų receptų produktyvumo ribas į +150%.
mir-prototype-productivity-cap-percent-200=Nustatykite ne parametrų receptų produktyvumo ribas į +200%. Tai yra žemiau įprastos ribos, todėl produktyvumo tyrimai nustoja padėti anksčiau.
mir-prototype-productivity-cap-percent-250=Nustatykite ne parametrų receptų produktyvumo ribas į +250%. Tai yra šiek tiek žemiau įprastos ribos.
mir-prototype-productivity-cap-percent-400=Nustatykite ne parametrų receptų produktyvumo ribas į +400%. Tai padidina produktyvumo mastelį už įprastos ribos.
mir-prototype-productivity-cap-percent-500=Nustatykite ne parametrų receptų produktyvumo ribas į +500%. Tai padidina produktyvumo mastelį už įprastos ribos.
mir-prototype-productivity-cap-percent-750=Nustatykite ne parametrų receptų produktyvumo ribas į +750%.
mir-prototype-productivity-cap-percent-1000=Nustatykite ne parametrų receptų produktyvumo ribas į +1000%. Naudokite ilgai taupydami ten, kur produktyvumo tyrimai turėtų būti svarbūs.
mir-prototype-productivity-cap-percent-2500=Nustatykite ne parametrų receptų produktyvumo ribas į +2500%. Naudokite labai ilgai taupydami.
mir-prototype-productivity-cap-percent-5000=Nustatykite ne parametrų receptų produktyvumo ribas į +5000%.
mir-prototype-productivity-cap-percent-10000=Nustatykite ne parametrų receptų produktyvumo ribas į +10000%. Naudokite tik itin ilgalaikiam mastelio mažinimui.
mir-prototype-productivity-cap-percent-25000=Nustatykite ne parametrų receptų produktyvumo ribas į +25 000%. Naudokite tik itin ilgalaikiam mastelio mažinimui.
mir-prototype-productivity-cap-percent-100000=Nustatykite ne parametrų receptų produktyvumo ribas į +100000%. Daugeliui taupymo būdų tai veiksmingai neapribota.
mir-recycling-return-chance-engine-default=Nepakeiskite kiekvieno perdirbimo recepto.
mir-recycling-return-chance-match-productivity-cap=Išnaudoti saugus automatinis paslėptų generuotų perdirbimo receptų mažinimas. Naudojama 1 / (1 + našumo priedas), apribota normalia 25% grąža: +400% tampa 20%, o +1000% - apie 9,09%.
mir-recycling-return-chance-percent-25=Laikykite paslėptus sugeneruotus perdirbimo receptus esant normaliam 25 % medžiagų grąžinimui.
mir-recycling-return-chance-percent-20=Paslėptus generuotus perdirbimo receptus padidinkite iki 20 % medžiagų grąžos.
mir-recycling-return-chance-percent-15=Paslėptus generuotus perdirbimo receptus padidinkite iki 15 % medžiagų grąžos.
mir-recycling-return-chance-percent-12-5=Paslėptus generuotus perdirbimo receptus padidinkite iki 12,5 % medžiagų grąžos.
mir-recycling-return-chance-percent-10=Paslėptus generuotus perdirbimo receptus padidinkite iki 10 % medžiagų grąžos.
mir-recycling-return-chance-percent-7-5=Paslėptus generuotus perdirbimo receptus padidinkite iki 7,5 % medžiagų grąžos.
mir-recycling-return-chance-percent-5=Paslėptus generuotus perdirbimo receptus padidinkite iki 5 % medžiagų grąžos.
mir-recycling-return-chance-percent-2-5=Paslėptus sugeneruotus perdirbimo receptus padidinkite iki 2,5 % medžiagų grąžos.
mir-recycling-return-chance-percent-1=Paslėptus sugeneruotus perdirbimo receptus padidinkite iki 1 % medžiagų grąžos.
mir-recycling-return-chance-percent-0-5=Paslėptus generuotus perdirbimo receptus padidinkite iki 0,5 % medžiagų grąžos.
mir-recycling-return-chance-percent-0-1=Paslėptus generuotus perdirbimo receptus padidinkite iki 0,1 % medžiagų grąžos.
mir-prototype-efficiency-cap-engine-default=Palikite kiekvieno įrenginio energijos naudojimo efekto ribą. Mašinos be pasirinktinio apribojimo naudoja įprastą Factorio -80% energijos suvartojimo efekto ribą, todėl efektai negali sumažinti aktyvaus naudojimo mažiau nei 20%.
mir-prototype-efficiency-cap-saving-25=Parašykite -25% energijos suvartojimo ribą. Aktyvus energijos suvartojimas išlieka 75% ar daugiau po energijos vartojimo poveikio.
mir-prototype-efficiency-cap-saving-50=Parašykite -50 % energijos suvartojimo ribą. Aktyvus energijos suvartojimas išlieka 50 % ar daugiau po energijos vartojimo poveikio palaikomose mašinose.
mir-prototype-efficiency-cap-saving-75=Parašykite -75% energijos suvartojimo ribą. Aktyvus energijos suvartojimas išlieka 25 % ar daugiau po energijos vartojimo poveikio palaikomose mašinose.
mir-prototype-efficiency-cap-saving-90=Parašykite -90 % energijos suvartojimo ribą. Aktyvus energijos suvartojimas gali sumažėti iki 10%, o tai yra žemiau įprastos 20% ribos.
mir-prototype-efficiency-cap-saving-95=Parašykite -95% energijos suvartojimo ribą. Aktyvus energijos suvartojimas gali sumažėti iki 5%.
mir-prototype-efficiency-cap-saving-99=Parašykite -99% energijos suvartojimo ribą. Aktyvus energijos suvartojimas gali sumažėti iki 1%.
mir-prototype-efficiency-cap-saving-999=Parašykite -99,9 % energijos suvartojimo ribą. Aktyvus energijos suvartojimas gali sumažėti iki 0,1%.
mir-prototype-efficiency-cap-saving-9999=Parašykite -99,99 % energijos suvartojimo ribą. Tai yra beveik nulinis aktyvios energijos naudojimas, o ne nulinės galios prototipo perrašymas.
mir-prototype-pollution-cap-engine-default=Palikite kiekvienos mašinos taršos poveikio ribą. Mašinose be pasirinktinio apribojimo naudojamas įprastas „Factorio“ -80% taršos poveikio dangtelis.
mir-prototype-pollution-cap-saving-25=Parašykite -25% taršos ribą. Po taršos poveikio tarša išlieka 75% ar daugiau.
mir-prototype-pollution-cap-saving-50=Parašykite -50% taršos ribą. Po taršos poveikio palaikomoms mašinoms tarša išlieka 50 % ar daugiau.
mir-prototype-pollution-cap-saving-75=Parašykite -75% taršos ribą. Po taršos poveikio palaikomoms mašinoms tarša išlieka 25 % ar daugiau.
mir-prototype-pollution-cap-saving-90=Parašykite -90% taršos ribą. Užterštumas gali sumažėti iki 10%, o tai yra žemiau įprastos 20% grindų.
mir-prototype-pollution-cap-saving-95=Parašykite -95% taršos ribą. Tarša gali sumažėti iki 5 proc.
mir-prototype-pollution-cap-saving-99=Parašykite -99% taršos ribą. Tarša gali sumažėti iki 1 proc.
mir-prototype-pollution-cap-saving-999=Parašykite -99,9% taršos ribą. Tarša gali sumažėti iki 0,1 proc.
mir-prototype-pollution-cap-saving-9999=Parašykite -99,99% taršos ribą. Tai yra beveik nulinė tarša, o ne vykdymo laiko taršos scenarijus.
mir-prototype-speed-floor-engine-default=Palikite kiekvieno įrenginio neigiamą greičio ribą. Mašinos be pasirinktinio apribojimo naudoja įprastą „Factorio“ -80% grindis ir palaiko bent 20% greitį.
mir-prototype-speed-floor-saving-25=Užfiksuokite neigiamus greičio efektus esant -25%, palikite bent 75% greitį.
mir-prototype-speed-floor-saving-50=Užfiksuokite neigiamus greičio efektus ties -50%, palikdami bent 50% greičio.
mir-prototype-speed-floor-saving-75=Užfiksuokite neigiamus greičio efektus ties -75%, palikdami bent 25% greitį.
mir-prototype-speed-floor-saving-90=Leiskite neigiamą greičio poveikį iki -90%, palikdami bent 10% greičio.
