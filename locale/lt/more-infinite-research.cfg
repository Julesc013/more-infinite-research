[mod-setting-description]
ips-require-space-gate=Kai įjungta, šios technologijos lieka užrakintos, kol kosmoso mokslas bus tiriamas vanilėje arba promečio mokslas kosmoso amžiuje.
mir-science-pack-ingredient-policy=Parenkama, kaip MIR prideda mokslo paketus prie sukurtų technologijų. Parinktys rūšiuojamos nuo konservatyvių iki plačių: numatytieji paketai, vėlyvų žaidimų paketai, progresija pagrįsti paketai, tada visi galimi paketai.
mir-automatic-productivity-action=Parenka, ką MIR daro su saugiomis produktyvumo galimybėmis, esančiomis įdiegtų modifikacijų receptuose. Išjungta, automatinio aptikimo neatlieka. Peržiūrėkite priimtų ir praleistų kandidatų pakeitimus Factorio žurnale nekeisdami tyrimo. Taikyti saugius pakeitimus (numatytasis) tinkami receptai pridedami tik prie suderinamų esamų MIR tyrimų. Tai valdo veiksmą, o ne jėgą ar brandą; toliau esantys kūrimo žymimieji langeliai yra atskiri. Nuosavybės, perdirbimo, tikimybės, katalizatoriaus, mokslo, laboratorijos, būtinų sąlygų, tikslo, tapatybės, progreso ir ciklo patikros visada taikomos.
mir-automatic-create-research=Numatytasis: išjungtas. Išjungtos ribos Taikyti saugius pakeitimus suderinamiems esamiems MIR tyrimams; kandidatai, neturintys tinkamo srauto, praleidžiami ir pranešami. Įjungta leidžia tinkamam registruotam paslaugų teikėjui sukurti vieną stabilią bendrąją begalinio našumo technologiją, kai netinka jokie esami tyrimai. Žemiau esantis peržiūrėtų duomenų žymimasis laukelis nusprendžia, ar eksperimentiniai teikėjai yra tinkami. MIR niekada nekuria vienos technologijos vienam modifikavimui ar receptui, o visi griežti saugos, mokslo, nuosavybės, tapatybės, progreso ir ciklo vartai vis tiek taikomi.
mir-automatic-require-reviewed-data=Numatytoji reikšmė: įjungta. Tai svarbu tik tada, kai įjungta Leisti kurti naujus tyrimus; ji niekada neužkerta kelio saugaus prisirišimo prie esamų tyrimų. Leidimuose tik teikėjų šeimos pažymėtos peržiūrėtos ir paremtos taikytinais tikslios versijos įrodymais, todėl eksperimentinės šeimos praleidžiamos. Išjungta leidžia registruotiems eksperimentiniams teikėjams kurti iš bendrų struktūrinių įrodymų. Kad eksperimentinė veikla būtų kuo platesnė, įgalinkite tyrimų kūrimą ir išjunkite šį reikalavimą. Jokia vertybė negali apeiti kietų saugos vartų.
mir-automatic-compiler-mode=Paslėptas suderinamumo tiltas profiliams, sukurtiems prieš padalijus automatinius našumo valdiklius. Nenumatytoji pasenusi vertė gerbiama tik tada, kai visi nauji valdikliai išlieka numatytieji. Pakeiskite bet kokį naują valdiklį, kad galėtumėte aiškiai valdyti.
ips-enable-stream=Sukuria sugeneruotą begalinę technologiją, skirtą __1__, kai pasiekiami jos receptai, efektai, būtinos sąlygos ir mokslo paketai. Išjunkite tai, kad MIR negeneruotų šios technologijos.
ips-cost-base-stream=Tyrimo vienetai, reikalingi pirmam sugeneruotam __1__ lygiui. Turi būti bent 1. Vėlesni lygiai apskaičiuojami pagal šią vertę ir išlaidų augimo faktorių.
ips-cost-growth-stream=Daugiklis taikomas kiekvienam vėlesniam __1__ lygiui. Naudokite 1 fiksuotoms išlaidoms, 1,5, jei norite padidinti 50 %, arba 2, jei norite padvigubinti išlaidas.
ips-max-level-stream=Aukščiausias sugeneruotas __1__ lygis. Nustatykite 0 begaliniams lygiams.
ips-research-time-stream=Sekundės vienam tyrimo vienetui už __1__. Nustatykite 0, kad šiai technologijai būtų naudojamas numatytasis MIR. Tai nėra bendras tyrimo laikas; bendras laikas taip pat priklauso nuo tyrimų kainos, laboratorijų skaičiaus, laboratorijos greičio ir modulių.
mir-enable-base-tech=Leidžia __1__ tęsti už vanilės dangtelio kaip begalinės technologijos. Išjunkite šią funkciją, jei norite, kad MIR pridėtų naujų tyrimų eilutes nepratęsiant šios vanilės grandinės.
mir-cost-base=Tyrimo vienetai, reikalingi pirmajam MIR tęstiniam lygiui __1__. Jei įmanoma, nustatykite 0, kad paveldėtumėte vanilės grandinės sąnaudų modelį.
mir-cost-growth=Daugiklis taikomas kiekvienam vėlesniam MIR tęstinumo lygiui __1__. Nustatykite 0, kad paveldėtumėte vanilės grandinės augimo modelį, kai įmanoma.
mir-max-level=Aukščiausias MIR tęstinumo lygis __1__. Nustatykite 0 begaliniams lygiams.
mir-research-time=Sekundės vienam tyrimo vienetui, kai MIR tęsiasi __1__. Jei įmanoma, nustatykite 0, kad paveldėtumėte vanilės grandinės tyrimo vieneto laiką.
mir-prefer-this-mod-for-competing-techs=Kai įjungta, šis modulis pašalina pasirinktus konkuruojančius begalinius plėtinius ir naudoja savo versijas. Išjunkite, kad išlaikytumėte konkuruojančias kitų modifikacijų versijas.
mir-adjust-vanilla-weapon-speed-techs=Valdo, ar MIR pašalina raketų ir pabūklų sviedinių greičio premijas iš sugeneruoto ginklo šaudymo greičio tęsinio, kai pasiekiama tiksli begalinė pakaitinė aprėptis. Baigtos vanilinio ginklo šaudymo greičio technologijos išlaiko savo originalias premijas.
mir-use-installed-space-age-icons=Kai įjungta, MIR gali nurodyti įdiegtus oficialius DLC piktogramų failus, įskaitant „Space Age“ ir „Elevated Rails“, net jei tie modifikacijos yra išjungtos pagrindiniam žaidimui. Palikite tai išjungtą, jei tie DLC failai neįdiegti; Factorio negali gražiai atsigauti po trūkstamų piktogramų failų prototipo įkėlimo metu.
mir-pipeline-extent-multiplier=Tik paleidimo išskleidžiamasis daugiklis, skirtas atpažinti skysčių dėžės dujotiekio apimties laukams visuose prototipuose, o ne tik vamzdžių objektuose. 100% palieka prototipus nepakeistus ir neapkrauna dujotiekio pralaidos ar skenavimo skysčių dėžių. Ne 100 % vertės yra eksperimentinės ir gali turėti įtakos mašinoms, bakams, privairavimui ir modifikuotiems prototipams, kurie apibrėžia skysčių dėžes.
mir-unrestricted-modules=Eksperimentinis ir pusiausvyrą laužantis. Kai įjungta, kiekvienas esamas receptas priima visus penkis modulio efektus, o kiekvienas esamas modulio imtuvas su lizdais priima kiekvieną aptiktą modulių kategoriją. Tai neprideda modulių lizdų arba nekeičia modulių prototipų ir gali užtikrinti produktyvumą, kokybę ir modifikuotų modulių kilpas.
mir-prototype-productivity-cap=Pasirenkama, ar MIR palieka tik receptų produktyvumo ribas, ar įrašo paleidimo ribą kiekvienam neparametrui, neperdirbamam receptui. +300% (nepakeista) išsaugo esamus receptų dangtelius; mažesnės vertės sutrumpina produktyvumo mastelį, o didesnės – praplečia.
mir-recycling-return-chance=Valdo tik paslėptus sugeneruotus perdirbimo receptus. Automatinis režimas sumažina įprastą 25 % medžiagų grąžą daugiausia iki 1, padalijus iš bendros produkcijos daugiklio esant pasirinktai našumo ribai. Fiksuoti pasirinkimai tiesiogiai padidina tą pačią generuojamą grąžą. Matomi procesai ir receptų produktyvumo ribos niekada nekeičiamos.
mir-productivity-cap-self-recycling-only=Virš 1 / perdirbėjo grąžinimas – 1, tik gamybos receptai, kurių savaiminio perdirbimo būdas yra negeneracinis, gauna pasirinktą aukštesnę ribą. Pasiekus šią slenkstį arba žemiau, šis žymimasis laukelis neturi jokios įtakos. Nepakeistas variklis naudoja įprastą 25% grąžą kaip konservatyvų +300% slenkstį, nekeičiant perdirbimo receptų.
mir-prototype-efficiency-cap=Parenkama, kiek efektyvumo poveikis gali sumažinti aktyvų mašinos energijos suvartojimą. -80 % (nepakeista) palieka tik esamas energijos naudojimo ribas. Didesnis sumažinimas gali priartėti prie nulinio aktyvios energijos suvartojimo nekeičiant taršos ribų.
mir-prototype-pollution-cap=Parenkama, kiek taršos mažinimo poveikis gali sumažinti mašinos taršą. -80% (nepakeista) palieka tik esamas taršos ribas. Didesnis sumažinimas gali priartėti prie nulinės taršos nekeičiant energijos vartojimo.
mir-prototype-speed-floor=Parenkama, kiek neigiami greičio efektai gali sulėtinti palaikomus įrenginius. -80% (nepakeista) palieka vien esamus limitus; gilesnės vertės pašalina normalias grindis iki beveik sustojimo –99,99%.
mir-prototype-speed-cap=Parenkama, ar MIR palieka mašinos greičio poveikio ribas, ar įrašo naują teigiamą greičio ribą. +100000% (nekeičiama) išlaiko esamus limitus; mažesnės vertės tyčia apriboja labai dideles greičio premijas.
mir-prototype-quality-cap=Parenkama, ar MIR palieka vien mašinos kokybės ir poveikio ribas, ar įrašo naują teigiamos kokybės ribą. +100000% (nepakeista) išsaugo esamas ribas ir nekeičia kokybės pakopų ar elementų tikimybių formulių.
mir-prototype-positive-power-floor=Numatytasis išjungtas. Kai įjungta, MIR pakeičia aiškius 0 W aktyviosios energijos naudojimo prototipus į 1 W prototipo įkėlimo metu, todėl mažos galios įspėjimo piktogramos nepasirodo objektuose, kurie turėtų gauti nedidelį kiekį, o ne nulį. Išjunkite, kad tiksliai išsaugotumėte nulinės galios prototipus.
mir-settings-profile-import=Įklijuokite MIR nustatymų profilio eilutę čia, kad būtų pritaikytos eksportuotos paleisties nustatymų reikšmės kaip nepaisymo sluoksnis generuojant prototipą. Įprastiems nustatymams palikite tuščią. Eksportuokite naudodami /mir-settings-export iš aktyvaus išsaugojimo, tada pakeitę šią reikšmę paleiskite iš naujo.
mir-debug-generation-report=Kai įjungta, įrašoma viena struktūrinio žurnalo eilutė kiekvienam sugeneruotam arba praleistam srautui ir baziniam plėtiniui, įskaitant mokslo paketus, būtinas sąlygas, efektų skaičių, laboratorijos suderinamumo būseną ir piktogramų šaltinį.
mir-debug-recipe-matches=Kai įjungta, kiekvienam sugeneruotam produktyvumo srautui įrašomi atitinkami receptų pavadinimai. Tai gali būti triukšminga didelėse modifikacijų pakuotėse.
mir-debug-scripted-effects=Kai įjungta, rašomi vykdymo laiko žurnalo įrašai, kai scenarijaus technologijos perskaičiuoja visuotinius arba įvykiais pagrįstus efektus.
mir-lab-incompatibility-policy=Parenka, ką MIR daro, kai pasirinktų mokslo paketų negali ištirti jokia aktyvi laboratorija.
ips-effect-per-level-stream=Nustato pirminį bazinės pakopos efektą kiekvienam lygiui __1__. Susijusios vėlesnės pakopos ir efektai keičiami proporcingai. Procentiniai efektai naudojami procentiniais punktais; skaičiavimo ir atstumo efektuose naudojami vietiniai vienetai.
mir-effect-per-level=Nustato kanoninį vieno lygio efektą begaliniam __1__ tęsiniui. Susiję efektai yra proporcingi galutinei vanilės bazinei linijai. Procentiniai efektai naudojami procentiniais punktais; skaičiavimo ir atstumo efektuose naudojami vietiniai vienetai.
mir-note-experimental-spoilage=Eksperimentinis ir pagal numatytuosius nustatymus išjungtas 2.1.0 versijoje. Tai pasaulinio / žemėlapio scenarijaus efektas. Esama sugadintos dėklo elgsena nepareiškiama, kol nepatvirtinama rankiniu būdu.
mir-note-agriculture-growth=Taikoma naujai pasodintiems žemės ūkio bokštams. Esamos pasodintos kultūros neperskaičiuojamos.
mir-note-cargo-pad-count=Specialiojo kosminio amžiaus logistikos tyrimai. Padidina krovinių tūpimo aikšteles kiekvienam paviršiui ir gali iš esmės pakeisti logistikos balansą.
mir-note-inserter-capacity=Išjungta pagal numatytuosius nustatymus. Didesnė įdėklo talpa gali nutraukti grandinės valdomus įdėklus ir sumažinti variklio optimizavimą.
mir-note-native-owner-managed-stream=Jei įdiegtai begalinei technologijai jau priklauso ši tyrimų šeima, tie patys paleisties nustatymai konfigūruoja tą savininką, o ne sukuria dublikatą. Nepakeisti MIR numatytieji nustatymai tiksliai išsaugo savininko galutinį prototipą. Aiškios kainos, laiko, maksimalaus lygio ir poveikio nepaisymas taikomas tik po saugaus savininko atitikimo; išjungus srautą išorinė technologija lieka nepaliesta. Pakeitę paleisties nustatymus, iš naujo paleiskite Factorio. Maksimalus lygis 0 reiškia begalybę, o efekto reikšmės yra procentiniai taškai kiekvienam lygiui.

