[mod-setting-description]
ips-require-space-gate=Lorsque ce réglage est activé, ces technologies restent verrouillées jusqu'à ce que la science spatiale soit recherchée dans le jeu de base ou que la science au prométhium soit recherchée dans Space Age.
mir-science-pack-ingredient-policy=Controls extra science packs added to every generated technology. Configured uses each technology's normal packs. Add space science adds space science when available. Add space and promethium science adds both high-end packs when available. Use all official science packs adds base and Space Age packs without modded packs. Use all lab science packs also includes compatible modded science packs.
ips-enable-stream=Désactivez ce réglage pour empêcher __1__ d'être générée dans la partie.
ips-cost-base-stream=Unités de recherche requises pour le premier niveau de __1__. Les niveaux supérieurs évoluent à partir de cette valeur même si le premier déverrouillage commence plus tard.
ips-cost-growth-stream=Multiplicateur appliqué au coût du niveau précédent de __1__. Utilisez 1 pour un coût fixe, ou une valeur supérieure pour augmenter la difficulté à chaque niveau.
ips-max-level-stream=Définissez 0 pour garder __1__ infinie, ou indiquez une valeur positive pour la limiter à ce niveau.
ips-research-time-stream=Définissez 0 pour utiliser le temps de recherche par défaut configuré pour __1__. Indiquez une valeur positive pour remplacer les secondes par niveau.
mir-enable-base-tech=Permet à __1__ de continuer au-delà de sa limite vanilla avec des niveaux infinis qui suivent la même progression.
mir-cost-base=Définissez 0 pour réutiliser le coût vanilla du niveau 1 de __1__. Toute valeur positive remplace le terme de base utilisé par la formule infinie.
mir-cost-growth=Définissez 0 pour conserver le taux de croissance vanilla de __1__. Indiquez une valeur positive pour modifier l'augmentation du coût à chaque niveau infini.
mir-research-time=Définissez 0 pour réutiliser le temps de recherche vanilla de __1__. Indiquez une valeur positive pour remplacer les secondes par niveau.
mir-prefer-this-mod-for-competing-techs=Lorsque ce réglage est activé, ce mod supprime les extensions infinies concurrentes sélectionnées et utilise ses propres versions. Désactivez-le pour conserver les versions concurrentes d'autres mods.
mir-adjust-vanilla-weapon-speed-techs=Détermine si ce mod supprime les bonus de cadence de tir des missiles et obus des technologies vanilla de cadence de tir lorsqu'une recherche de remplacement dédiée est disponible.
mir-debug-generation-report=Lorsque ce réglage est activé, écrit une ligne structurée dans le journal pour chaque flux ou extension de base généré ou ignoré, avec les packs de science, les prérequis, le nombre d'effets, l'état de compatibilité des laboratoires et la source de l'icône.
mir-debug-recipe-matches=When enabled, writes matched recipe names for each generated productivity stream. This can be noisy in large mod packs.
mir-lab-incompatibility-policy=Choose whether incompatible science-pack sets are reduced to the largest lab-compatible subset or skipped entirely.

[string-mod-setting]
mir-adjust-vanilla-weapon-speed-techs-off=Désactivé
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Seulement si une technologie dédiée existe
mir-adjust-vanilla-weapon-speed-techs-always=Toujours
mir-science-pack-ingredient-policy-configured=Configured per technology
mir-science-pack-ingredient-policy-space=Add space science
mir-science-pack-ingredient-policy-space-and-promethium=Add space and promethium science
mir-science-pack-ingredient-policy-all-official=Use all official science packs
mir-science-pack-ingredient-policy-all=Use all lab science packs
mir-lab-incompatibility-policy-reduce=Reduce to compatible science packs
mir-lab-incompatibility-policy-skip=Skip incompatible technologies
