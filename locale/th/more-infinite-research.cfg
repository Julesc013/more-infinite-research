[string-mod-setting-description]
mir-automatic-productivity-action-disabled=ไม่ดำเนินการค้นหา การแนบ หรือการสร้างโดยอัตโนมัติ การวิจัยแบบคงที่ของ MIR ยังคงไม่เปลี่ยนแปลง
mir-automatic-productivity-action-preview=ค้นหาและจัดประเภทผู้สมัคร จากนั้นเขียนคำตัดสินที่ได้รับการยอมรับและข้ามไปลงในบันทึกของ Factorio ไม่แนบสูตรหรือสร้างงานวิจัย
mir-automatic-productivity-action-apply=ค่าเริ่มต้น ค้นหาผู้สมัครและแนบเฉพาะสูตรอาหารที่ได้รับการพิสูจน์ด้านความปลอดภัยเข้ากับการวิจัย MIR ที่มีอยู่แล้ว ไม่ได้สร้างงานวิจัยขึ้นมาเอง ช่องทำเครื่องหมายทั้งสองด้านล่างควบคุมการสร้าง
mir-automatic-compiler-mode-off=เทียบเท่ากับ Disabled
mir-automatic-compiler-mode-report=เทียบเท่ากับการเปลี่ยนแปลงการแสดงตัวอย่าง
mir-automatic-compiler-mode-safe-attach=เทียบเท่ากับการใช้การเปลี่ยนแปลงที่ปลอดภัยโดยปิดใช้งานการสร้างการวิจัย
mir-automatic-compiler-mode-exact-pack=เทียบเท่ากับการใช้การเปลี่ยนแปลงที่ปลอดภัยโดยเปิดใช้งานการสร้างการวิจัยและตรวจสอบข้อมูลความเข้ากันได้ที่จำเป็น
mir-automatic-compiler-mode-safe-generate=เทียบเท่ากับการใช้การเปลี่ยนแปลงที่ปลอดภัยโดยเปิดใช้งานการสร้างการวิจัยสำหรับผู้ให้บริการทดลองที่ลงทะเบียน
mir-adjust-vanilla-weapon-speed-techs-off=ปิดการใช้งานการล้างโบนัสจรวด/ปืนใหญ่ที่ทับซ้อนกันของ MIR
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=ลบโบนัสจรวด/ปืนใหญ่ที่ทับซ้อนกันของ MIR เฉพาะเมื่อเทคโนโลยีที่ไม่มีที่สิ้นสุดและเข้าถึงได้นั้นให้ผลการแทนที่ที่แน่นอนเท่านั้น
mir-adjust-vanilla-weapon-speed-techs-always=ลบโบนัสจรวด/ปืนใหญ่ที่ทับซ้อนกันของ MIR เสมอ ใช้เฉพาะในกรณีที่คุณต้องการการแยกอย่างเคร่งครัด
mir-science-pack-ingredient-policy-configured=ใช้ชุดวิทยาศาสตร์ที่กำหนดค่าไว้ของแต่ละเทคโนโลยีที่สร้างขึ้นโดยไม่มีการขยายส่วนผสมเพิ่มเติม ค่าเริ่มต้นของ MIR
mir-science-pack-ingredient-policy-space=เพิ่มวิทยาศาสตร์อวกาศเมื่อมี ความยากหลังจรวดแบบธรรมดาเพิ่มขึ้น
mir-science-pack-ingredient-policy-space-and-promethium=เพิ่มพื้นที่และวิทยาศาสตร์โพรมีเทียม หากมี ดีที่สุดสำหรับอ่างวิจัยยุคอวกาศตอนปลายมาก
mir-science-pack-ingredient-policy-space-age-progression=เพิ่มเฉพาะแพ็คความก้าวหน้าของยุคอวกาศโดยนัยของแพ็คที่เลือก ไม่เพิ่มแพ็คดัดแปลงที่ไม่เกี่ยวข้อง
mir-science-pack-ingredient-policy-official-progression=เพิ่มแพ็กสไตล์ข้อกำหนดเบื้องต้นอย่างเป็นทางการที่ขาดหายไป โดยนัยโดยแพ็กอย่างเป็นทางการขั้นสูงสุดที่เลือกไว้แล้ว
