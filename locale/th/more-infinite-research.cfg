[technology-description]
more-infinite-research.recipe_productivity=เพิ่มผลผลิตตามสูตรสำหรับสูตรที่เลือก กำลังการผลิตสูงสุดของ Factorio ยังคงมีผลอยู่ ระดับอนันต์เพิ่มเติมอาจไม่มีผลในทางปฏิบัติเมื่อสูตรถึงขีดจำกัด
more-infinite-research.direct_effect=เพิ่มโบนัสที่ทำซ้ำได้ไม่สิ้นสุด ชุดวิทยาศาสตร์ได้รับการคัดเลือกจากห้องปฏิบัติการที่ใช้งานอยู่ ดังนั้นเทคโนโลยีจึงสามารถวิจัยได้ด้วยชุดม็อดที่เข้ากันได้
more-infinite-research.cargo_bay_unloading_distance=เพิ่มระยะห่างสูงสุดระหว่างลานจอดสินค้าและช่องขนถ่ายที่เชื่อมต่อ
more-infinite-research.cargo_landing_pad_count=เพิ่มจำนวนแผ่นเชื่อมโยงไปถึงสินค้าที่แต่ละแรงสามารถสร้างได้ต่อพื้นผิว
more-infinite-research.flamethrower_shooting_speed=เพิ่มความเร็วในการยิงของอาวุธเครื่องพ่นไฟและป้อมเครื่องพ่นไฟ
more-infinite-research.electric_shooting_speed=เพิ่มความเร็วในการยิงของอาวุธไฟฟ้า ในวานิลลาสิ่งนี้ส่งผลต่อการป้องกันการปล่อย สำหรับยุคอวกาศ มันจะส่งผลต่ออาวุธของ Tesla ด้วยเมื่อมีหมวดกระสุน tesla
more-infinite-research.spoilage_preservation=เพิ่มตัวแก้ไขเวลาเสียทั่วโลกผ่านเอฟเฟกต์สคริปต์ที่มีขอบเขต ไอเทมที่สปอยได้ที่มีอยู่อาจคงกำหนดเวลาการสปอยล์ในปัจจุบันไว้จนกว่าจะมีการทดสอบในเกม
more-infinite-research.agricultural_growth_speed=ลดเวลาการเจริญเติบโตที่เหลืออยู่สำหรับพืชหอคอยทางการเกษตรที่เพิ่งปลูกใหม่ผ่านเอฟเฟกต์แบบมีขอบเขต
more-infinite-research.lab_productivity=เพิ่มความก้าวหน้าในการวิจัยที่ได้รับจากชุดวิทยาศาสตร์แต่ละชุดที่ใช้ไป โดยใช้ตัวปรับประสิทธิภาพการวิจัยในห้องปฏิบัติการดั้งเดิม

