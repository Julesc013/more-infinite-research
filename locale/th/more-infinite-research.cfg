[mod-setting-description]
ips-require-space-gate=เมื่อเปิดใช้งาน เทคโนโลยีเหล่านี้จะล็อกอยู่จนกว่าวิทยาศาสตร์อวกาศจะได้รับการวิจัยในวานิลลา หรือวิทยาศาสตร์โพรมีเทียมได้รับการวิจัยในยุคอวกาศ
mir-science-pack-ingredient-policy=เลือกวิธีที่ MIR เพิ่มชุดวิทยาศาสตร์ให้กับเทคโนโลยีที่สร้างขึ้น ตัวเลือกต่างๆ เรียงลำดับจากแบบอนุรักษ์นิยมไปจนถึงแบบกว้าง: แพ็คเริ่มต้น แพ็คช่วงท้ายเกม แพ็คตามความก้าวหน้า ตามด้วยแพ็คที่มีทั้งหมด
mir-automatic-productivity-action=เลือกสิ่งที่ MIR ทำกับโอกาสในการผลิตที่ปลอดภัยที่พบในสูตร mod ที่ติดตั้ง ปิดใช้งานแล้วไม่มีการค้นหาโดยอัตโนมัติ ดูตัวอย่างบันทึกการเปลี่ยนแปลงที่ยอมรับและข้ามผู้สมัครในบันทึก Factorio โดยไม่เปลี่ยนแปลงการวิจัย ใช้การเปลี่ยนแปลงที่ปลอดภัย (ค่าเริ่มต้น) เพิ่มสูตรอาหารที่เข้าเกณฑ์เฉพาะกับการวิจัย MIR ที่มีอยู่ที่เข้ากันได้เท่านั้น สิ่งนี้ควบคุมการกระทำ ไม่ใช่ความเข้มแข็งหรือวุฒิภาวะ ช่องทำเครื่องหมายการสร้างด้านล่างนี้แยกจากกัน การตรวจสอบความเป็นเจ้าของ การรีไซเคิล ความน่าจะเป็น ตัวเร่งปฏิกิริยา วิทยาศาสตร์ ห้องปฏิบัติการ ข้อกำหนดเบื้องต้น เป้าหมาย เอกลักษณ์ ความก้าวหน้า และรอบการทำงานจะใช้เสมอ
mir-automatic-create-research=ค่าเริ่มต้น: ปิด นอกขีดจำกัด ใช้การเปลี่ยนแปลงที่ปลอดภัยกับการวิจัย MIR ที่มีอยู่ที่เข้ากันได้ ผู้สมัครที่ไม่มีสตรีมที่เหมาะสมจะถูกข้ามและรายงาน On ช่วยให้ผู้ให้บริการที่ลงทะเบียนที่มีสิทธิ์สามารถสร้างเทคโนโลยีการผลิตแบบทั่วไปที่มีเสถียรภาพหนึ่งเทคโนโลยีเมื่อไม่มีงานวิจัยที่มีอยู่พอดี ช่องทำเครื่องหมายข้อมูลที่ตรวจสอบแล้วด้านล่างจะตัดสินว่าผู้ให้บริการทดลองมีสิทธิ์หรือไม่ MIR ไม่เคยสร้างเทคโนโลยีเดียวต่อม็อดหรือสูตร และความปลอดภัย วิทยาศาสตร์ ความเป็นเจ้าของ ตัวตน ความก้าวหน้า และประตูวงจรทุกอย่างยังคงนำไปใช้
mir-automatic-require-reviewed-data=ค่าเริ่มต้น: เปิด สิ่งนี้สำคัญเฉพาะเมื่อเปิดอนุญาตการสร้างงานวิจัยใหม่เท่านั้น มันไม่เคยปิดกั้นความผูกพันที่ปลอดภัยกับการวิจัยที่มีอยู่ ในใบอนุญาต เฉพาะกลุ่มผู้ให้บริการเท่านั้นที่ทำเครื่องหมายว่าได้รับการตรวจสอบและสนับสนุนโดยหลักฐานเวอร์ชันที่ตรงกันทุกประการที่เกี่ยวข้อง ดังนั้นกลุ่มกลุ่มทดลองจึงถูกข้ามไป Off อนุญาตให้ผู้ให้บริการทดลองที่ลงทะเบียนสร้างจากหลักฐานโครงสร้างทั่วไป สำหรับพฤติกรรมการทดลองที่กว้างที่สุด ให้เปิดใช้งานการสร้างงานวิจัยและปิดข้อกำหนดนี้ ไม่มีค่าใดสามารถข้ามประตูนิรภัยที่แข็งแกร่งได้
mir-automatic-compiler-mode=บริดจ์ความเข้ากันได้ที่ซ่อนอยู่สำหรับโปรไฟล์ที่สร้างขึ้นก่อนการแยกการควบคุมประสิทธิภาพการทำงานอัตโนมัติ ค่าดั้งเดิมที่ไม่ใช่ค่าเริ่มต้นจะถูกยอมรับเฉพาะในขณะที่การควบคุมใหม่ทั้งหมดยังคงเป็นค่าเริ่มต้น เปลี่ยนการควบคุมใหม่เพื่อใช้การควบคุมที่ชัดเจน
ips-enable-stream=สร้างเทคโนโลยีที่ไม่มีที่สิ้นสุดที่สร้างขึ้นสำหรับ __1__ เมื่อมีสูตร เอฟเฟกต์ ข้อกำหนดเบื้องต้น และแพ็กวิทยาศาสตร์ ปิดการใช้งานนี้เพื่อป้องกันไม่ให้ MIR สร้างเทคโนโลยีนี้
ips-cost-base-stream=หน่วยการวิจัยที่จำเป็นสำหรับระดับที่สร้างขึ้นครั้งแรกของ __1__ ต้องมีอย่างน้อย 1 ระดับต่อมาจะคำนวณจากค่านี้และปัจจัยการเติบโตของต้นทุน
ips-cost-growth-stream=ใช้ตัวคูณกับแต่ละระดับภายหลังของ __1__ ใช้ 1 สำหรับต้นทุนคงที่ 1.5 สำหรับการเติบโต 50% ต่อระดับ หรือ 2 สำหรับต้นทุนสองเท่า
ips-max-level-stream=ระดับที่สร้างสูงสุดสำหรับ __1__ ตั้งค่าเป็น 0 สำหรับระดับอนันต์
ips-research-time-stream=วินาทีต่อหน่วยการวิจัยสำหรับ __1__ ตั้งค่าเป็น 0 เพื่อใช้ค่าเริ่มต้นของ MIR สำหรับเทคโนโลยีนี้ นี่ไม่ใช่เวลาวิจัยทั้งหมด เวลาทั้งหมดยังขึ้นอยู่กับต้นทุนการวิจัย จำนวนห้องปฏิบัติการ ความเร็วของห้องปฏิบัติการ และโมดูล
mir-enable-base-tech=อนุญาตให้ __1__ ก้าวข้ามฝาวานิลลาต่อไปในฐานะเทคโนโลยีที่ไม่มีที่สิ้นสุด ปิดการใช้งานนี้หากคุณต้องการให้ MIR เพิ่มสายการวิจัยใหม่โดยไม่ต้องขยายห่วงโซ่วานิลลานี้
mir-cost-base=หน่วยวิจัยที่จำเป็นสำหรับระดับความต่อเนื่องของ MIR แรกที่ __1__ ตั้งค่าเป็น 0 เพื่อสืบทอดรูปแบบต้นทุนของ vanilla chain เมื่อเป็นไปได้
mir-cost-growth=ตัวคูณใช้กับแต่ละระดับความต่อเนื่องของ MIR ในภายหลังที่ __1__ ตั้งค่าเป็น 0 เพื่อสืบทอดรูปแบบการเติบโตของ vanilla chain เมื่อเป็นไปได้
mir-max-level=ระดับความต่อเนื่องของ MIR สูงสุดสำหรับ __1__ ตั้งค่าเป็น 0 สำหรับระดับอนันต์
mir-research-time=วินาทีต่อหน่วยการวิจัยสำหรับความต่อเนื่องของ MIR ของ __1__ ตั้งค่าเป็น 0 เพื่อสืบทอดเวลาหน่วยการวิจัยของ vanilla chain เมื่อเป็นไปได้
mir-prefer-this-mod-for-competing-techs=เมื่อเปิดใช้งาน ม็อดนี้จะลบส่วนขยายที่แข่งขันกันอย่างไม่มีที่สิ้นสุดที่เลือก และใช้เวอร์ชันของตัวเอง ปิดใช้งานเพื่อเก็บเวอร์ชันที่แข่งขันกันจาก mod อื่น ๆ
mir-adjust-vanilla-weapon-speed-techs=ควบคุมว่า MIR จะลบโบนัสความเร็วจรวดและกระสุนปืนใหญ่ออกจากความเร็วการยิงอาวุธที่สร้างขึ้นอย่างต่อเนื่องหรือไม่ เมื่อครอบคลุมการแทนที่อย่างไม่มีที่สิ้นสุดที่แน่นอน เทคโนโลยีความเร็วในการยิงอาวุธวานิลลาที่จำกัดจะคงโบนัสดั้งเดิมเอาไว้
mir-use-installed-space-age-icons=เมื่อเปิดใช้งาน MIR อาจอ้างอิงไฟล์ไอคอน DLC อย่างเป็นทางการที่ติดตั้ง รวมถึง Space Age และ Elevated Rails แม้ว่าม็อดเหล่านั้นจะถูกปิดใช้งานสำหรับการรันเกมหลักก็ตาม ปล่อยไว้หากไม่ได้ติดตั้งไฟล์ DLC เหล่านั้น Factorio ไม่สามารถกู้คืนไฟล์ไอคอนที่หายไปได้อย่างสวยงามระหว่างการโหลดต้นแบบ
mir-pipeline-extent-multiplier=ตัวคูณแบบเลื่อนลงสำหรับการเริ่มต้นเท่านั้นสำหรับฟิลด์ขอบเขตไปป์ไลน์ Fluid Box ที่ได้รับการยอมรับในต้นแบบ ไม่ใช่แค่เอนทิตีไปป์เท่านั้น 100% ปล่อยให้ต้นแบบไม่เปลี่ยนแปลง และไม่โหลดผ่านไปป์ไลน์หรือสแกนกล่องของเหลว ค่าที่ไม่ใช่ 100% เป็นค่าทดลองและอาจส่งผลต่อเครื่องจักร รถถัง เครื่องขับดัน และต้นแบบม็อดที่กำหนดกล่องของเหลว
mir-unrestricted-modules=การทดลองและการทำลายสมดุล เมื่อเปิดใช้งาน ทุกสูตรที่มีอยู่จะยอมรับเอฟเฟกต์ทั้งห้าโมดูล และตัวรับโมดูลทุกตัวที่มีช่องจะยอมรับทุกประเภทโมดูลที่ค้นพบ สิ่งนี้ไม่เพิ่มสล็อตโมดูลหรือเปลี่ยนต้นแบบโมดูล และอาจเปิดใช้งานประสิทธิภาพ คุณภาพ และลูปโมดูลดัดแปลง
mir-prototype-productivity-cap=เลือกว่าจะปล่อย MIR ออกจากขีดจำกัดประสิทธิผลของสูตรเพียงอย่างเดียว หรือเขียนขีดจำกัดเริ่มต้นให้กับทุกสูตรที่ไม่ใช่พารามิเตอร์และไม่มีการรีไซเคิล +300% (ไม่เปลี่ยนแปลง) รักษาขีดจำกัดสูตรที่มีอยู่ ค่าที่ต่ำกว่าจะทำให้มาตราส่วนการผลิตสั้นลง ในขณะที่ค่าที่สูงกว่าจะขยายออกไป
mir-recycling-return-chance=ควบคุมสูตรการรีไซเคิลที่สร้างขึ้นที่ซ่อนอยู่เท่านั้น โหมดอัตโนมัติจะลดผลตอบแทนของวัสดุปกติ 25% เหลือไม่เกิน 1 หารด้วยตัวคูณผลผลิตทั้งหมดที่ขีดจำกัดการผลิตที่เลือก ตัวเลือกคงที่จะปรับขนาดผลตอบแทนที่สร้างขึ้นโดยตรง กระบวนการที่มองเห็นได้และขีดจำกัดการผลิตตามสูตรจะไม่เปลี่ยนแปลง
mir-productivity-cap-self-recycling-only=มากกว่า 1 / การส่งคืนผู้รีไซเคิล - 1 เฉพาะสูตรการผลิตที่มีเส้นทางรีไซเคิลด้วยตนเองแบบไม่ก่อให้เกิดการพิสูจน์แล้วเท่านั้นที่จะได้รับขีดจำกัดสูงสุดที่เลือก ที่หรือต่ำกว่าเกณฑ์นั้น ช่องทำเครื่องหมายนี้จะไม่มีผลใดๆ เครื่องยนต์ที่ไม่มีการเปลี่ยนแปลงจะใช้ผลตอบแทนปกติ 25% เป็นเกณฑ์อนุรักษ์ +300% โดยไม่ต้องเปลี่ยนสูตรการรีไซเคิล
mir-prototype-efficiency-cap=เลือกว่าเอฟเฟกต์ด้านประสิทธิภาพอาจลดการใช้พลังงานของเครื่องจักรที่ใช้งานอยู่ได้มากเพียงใด -80% (ไม่เปลี่ยนแปลง) ปล่อยให้จำกัดการใช้พลังงานที่มีอยู่เพียงอย่างเดียว การลดระดับลงลึกสามารถเข้าใกล้การใช้พลังงานที่แอคทีฟเป็นศูนย์ได้โดยไม่ต้องเปลี่ยนขีดจำกัดมลพิษ
mir-prototype-pollution-cap=เลือกว่าผลกระทบจากการลดมลภาวะอาจลดมลพิษในเครื่องจักรได้มากเพียงใด -80% (ไม่เปลี่ยนแปลง) ละทิ้งขีดจำกัดมลพิษที่มีอยู่เพียงอย่างเดียว การลดระดับลงลึกสามารถทำให้เกิดมลพิษเป็นศูนย์ได้โดยไม่ต้องเปลี่ยนการใช้พลังงาน
mir-prototype-speed-floor=เลือกว่าเอฟเฟกต์ความเร็วเชิงลบอาจทำให้เครื่องที่รองรับช้าลงมากเพียงใด -80% (ไม่เปลี่ยนแปลง) ออกจากขีดจำกัดที่มีอยู่เพียงอย่างเดียว ค่าที่ลึกกว่าจะลบพื้นปกติลงไปจนใกล้หยุดที่ -99.99%
mir-prototype-speed-cap=เลือกว่าจะปล่อย MIR ออกจากขีดจำกัดเอฟเฟกต์ความเร็วเครื่องเพียงอย่างเดียวหรือเขียนขีดจำกัดความเร็วบวกใหม่ +100000% (ไม่เปลี่ยนแปลง) รักษาขีดจำกัดที่มีอยู่ ค่าที่ต่ำกว่าตั้งใจจะยึดโบนัสความเร็วที่สูงมาก
mir-prototype-quality-cap=เลือกว่าจะปล่อยให้ MIR ปล่อยขีดจำกัดผลกระทบด้านคุณภาพของเครื่องจักรเพียงอย่างเดียว หรือเขียนขีดจำกัดคุณภาพเชิงบวกใหม่ +100000% (ไม่เปลี่ยนแปลง) รักษาขีดจำกัดที่มีอยู่ และไม่เปลี่ยนระดับคุณภาพหรือสูตรความน่าจะเป็นของสินค้า
mir-prototype-positive-power-floor=ปิดค่าเริ่มต้น เมื่อเปิดใช้งาน MIR จะเปลี่ยนต้นแบบการใช้พลังงานที่ใช้งาน 0W ที่ชัดเจนเป็น 1W ในระหว่างการโหลดต้นแบบ ดังนั้นไอคอนคำเตือนพลังงานต่ำจึงไม่ปรากฏบนเอนทิตีที่ควรดึงปริมาณที่ไม่เป็นศูนย์เล็กน้อย ละทิ้งเพื่อรักษาต้นแบบที่ใช้พลังงานเป็นศูนย์ไว้อย่างแน่นอน
mir-settings-profile-import=วางสตริงโปรไฟล์การตั้งค่า MIR ที่นี่เพื่อใช้ค่าการตั้งค่าเริ่มต้นที่ส่งออกเป็นเลเยอร์แทนที่ระหว่างการสร้างต้นแบบ เว้นว่างไว้สำหรับการตั้งค่าปกติ ส่งออกด้วย /mir-settings-export จากบันทึกที่ใช้งานอยู่ จากนั้นรีสตาร์ทหลังจากเปลี่ยนค่านี้
mir-debug-generation-report=เมื่อเปิดใช้งาน จะเขียนแถวบันทึกที่มีโครงสร้างหนึ่งแถวต่อสตรีมที่สร้างหรือข้ามและส่วนขยายฐาน รวมถึงชุดวิทยาศาสตร์ ข้อกำหนดเบื้องต้น จำนวนเอฟเฟกต์ สถานะความเข้ากันได้ของห้องปฏิบัติการ และแหล่งที่มาของไอคอน
mir-debug-recipe-matches=เมื่อเปิดใช้งาน ให้เขียนชื่อสูตรอาหารที่ตรงกันสำหรับสตรีมการผลิตแต่ละรายการที่สร้างขึ้น สิ่งนี้อาจมีเสียงรบกวนใน mod pack ขนาดใหญ่
mir-debug-scripted-effects=เมื่อเปิดใช้งาน จะเขียนรายการบันทึกรันไทม์เมื่อเทคโนโลยีที่ใช้สคริปต์คำนวณใหม่เอฟเฟกต์ระดับโลกหรือที่ขับเคลื่อนด้วยเหตุการณ์
mir-lab-incompatibility-policy=เลือกสิ่งที่ MIR จะทำเมื่อห้องปฏิบัติการที่ใช้งานอยู่ไม่สามารถวิจัยชุดวิทยาศาสตร์ที่เลือกได้
ips-effect-per-level-stream=ตั้งค่าเอฟเฟกต์ระดับฐานหลักต่อระดับสำหรับ __1__ ระดับและเอฟเฟกต์ที่เกี่ยวข้องในภายหลังจะถูกปรับขนาดตามสัดส่วน เอฟเฟกต์เปอร์เซ็นต์ใช้คะแนนเปอร์เซ็นต์ เอฟเฟกต์การนับและระยะทางใช้หน่วยดั้งเดิม
mir-effect-per-level=ตั้งค่าเอฟเฟกต์ตามรูปแบบบัญญัติต่อระดับสำหรับการต่อเนื่องที่ไม่มีที่สิ้นสุด __1__ เอฟเฟกต์ที่เกี่ยวข้องจะถูกปรับขนาดตามสัดส่วนจากพื้นฐานวานิลลาขั้นสุดท้าย เอฟเฟกต์เปอร์เซ็นต์ใช้คะแนนเปอร์เซ็นต์ เอฟเฟกต์การนับและระยะทางใช้หน่วยดั้งเดิม
mir-note-experimental-spoilage=ทดลองและปิดใช้งานโดยค่าเริ่มต้นในเวอร์ชัน 2.1.0 นี่คือเอฟเฟกต์สคริปต์ทั่วโลก/ทั่วทั้งแผนที่ พฤติกรรมสแต็กที่เสียหายได้ที่มีอยู่จะไม่ถูกอ้างสิทธิ์จนกว่าจะมีการตรวจสอบด้วยตนเอง
mir-note-agriculture-growth=ใช้กับพืชหอคอยทางการเกษตรที่เพิ่งปลูกใหม่ พืชผลที่ปลูกที่มีอยู่จะไม่ถูกลดขนาด
mir-note-cargo-pad-count=การวิจัยด้านลอจิสติกส์ยุคอวกาศพิเศษ เพิ่มแผ่นรองจอดสินค้าต่อพื้นผิว และสามารถเปลี่ยนสมดุลด้านลอจิสติกส์ได้อย่างมาก
mir-note-inserter-capacity=ปิดใช้งานโดยค่าเริ่มต้น ความจุของตัวแทรกที่เพิ่มขึ้นสามารถทำลายตัวแทรกที่ควบคุมด้วยวงจร และลดการปรับแต่งเครื่องยนต์ให้เหมาะสม
mir-note-native-owner-managed-stream=หากเทคโนโลยีที่ไม่มีที่สิ้นสุดที่ติดตั้งไว้เป็นเจ้าของกลุ่มการวิจัยนี้แล้ว การตั้งค่าเริ่มต้นเดียวกันนี้จะกำหนดค่าเจ้าของนั้นแทนที่จะสร้างกลุ่มที่ซ้ำกัน ค่าเริ่มต้นของ MIR ที่ไม่เปลี่ยนแปลงจะรักษาต้นแบบสุดท้ายของเจ้าของไว้อย่างแน่นอน การแทนที่ต้นทุน เวลา ระดับสูงสุด และเอฟเฟกต์ที่ชัดเจนจะมีผลหลังจากการจับคู่เจ้าของที่ปลอดภัยเท่านั้น การปิดใช้งานสตรีมจะทำให้เทคโนโลยีภายนอกไม่ถูกแตะต้อง รีสตาร์ท Factorio หลังจากเปลี่ยนการตั้งค่าการเริ่มต้นระบบ ระดับสูงสุด 0 หมายถึงไม่มีที่สิ้นสุด และค่าเอฟเฟกต์คือจุดเปอร์เซ็นต์ต่อระดับ

