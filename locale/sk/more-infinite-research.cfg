[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Nevykonáva žiadne automatické zisťovanie, pripájanie ani vytváranie. Fixný výskum MIR zostáva nezmenený.
mir-automatic-productivity-action-preview=Objaví a klasifikuje kandidátov, potom zapíše prijaté a preskočené rozhodnutia do denníka Factorio. Nepripája recepty ani nevytvára výskum.
mir-automatic-productivity-action-apply=Predvolené. Objavuje kandidátov a ku kompatibilnému existujúcemu výskumu MIR pripája iba recepty overené bezpečnosťou. Nevytvára výskum sám o sebe; dve začiarkavacie políčka nižšie riadia tvorbu.
mir-automatic-compiler-mode-off=Starý ekvivalent funkcie Disabled.
mir-automatic-compiler-mode-report=Starý ekvivalent ukážok zmien.
mir-automatic-compiler-mode-safe-attach=Starý ekvivalent aplikácie Použiť bezpečné zmeny so zakázaným vytváraním výskumu.
mir-automatic-compiler-mode-exact-pack=Starý ekvivalent Použiť bezpečné zmeny s povoleným vytváraním výskumu a vyžadovanými skontrolovanými údajmi o kompatibilite.
mir-automatic-compiler-mode-safe-generate=Starý ekvivalent aplikácie Použiť bezpečné zmeny s povoleným vytváraním výskumu pre registrovaných poskytovateľov experimentov.
mir-adjust-vanilla-weapon-speed-techs-off=Vypnite voliteľné čistenie bonusov pre prekrývajúce sa rakety/delá MIR.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Odstráňte prekrývajúce sa bonusy rakiet/kanónov MIR iba vtedy, keď povolená, dosiahnuteľná nekonečná technológia poskytuje presný efekt výmeny.
mir-adjust-vanilla-weapon-speed-techs-always=Vždy odstráňte bonusy pre prekrývajúce sa rakety/delá MIR. Používajte iba vtedy, ak chcete prísne oddelenie.
mir-science-pack-ingredient-policy-configured=Použite konfigurované vedecké balíčky každej vygenerovanej technológie bez voliteľného rozšírenia prísad. Predvolená hodnota MIR.
mir-science-pack-ingredient-policy-space=Pridajte vesmírnu vedu, ak je k dispozícii. Jednoduché zvýšenie obtiažnosti po rakete.
mir-science-pack-ingredient-policy-space-and-promethium=Pridajte priestor a vedu prométia, ak je k dispozícii. Najlepšie pre veľmi neskoré výskumné výlevky vesmírneho veku.
mir-science-pack-ingredient-policy-space-age-progression=Pridajte iba balíčky na postup z vesmírneho veku, ktoré implikujú vybrané balíčky. Nepridáva nesúvisiace modifikované balíčky.
mir-science-pack-ingredient-policy-official-progression=Pridajte chýbajúce oficiálne balíky v štýle nevyhnutných predpokladov, ktoré vyplývajú z najpokročilejšieho oficiálneho balíka, ktorý už bol vybratý.
mir-science-pack-ingredient-policy-mod-progression=Pridajte chýbajúce balíčky kompatibilné s laboratóriom odvodené z modifikovaného postupu vedeckého balíčka a odomknite predpoklady.
mir-science-pack-ingredient-policy-all-official=Použite každú oficiálnu základňu a vedecký balík z Vesmírneho veku, ktorý existuje v aktuálnej sade modov.
mir-science-pack-ingredient-policy-all=Používajte každý aktívny vedecký balíček kompatibilný s laboratóriom, vrátane modifikovaných vedeckých balíčkov.
mir-lab-incompatibility-policy-reduce=Udržujte technológiu znížením jej vedeckých balíkov na najväčší súbor akceptovaný aktívnym laboratóriom. Najbezpečnejšie predvolené nastavenie pre balíčky modov.
mir-lab-incompatibility-policy-skip=Preskočte technológiu, ak žiadne aktívne laboratórium nemôže preskúmať svoju vybranú súpravu vedeckých balíkov. Prísnejšie a jednoduchšie na audit.
mir-lab-incompatibility-policy-engine-default=Nikdy neprepisujte vybranú sadu vedeckých balíčkov. MIR zachováva bezpečne skúmateľnú množinu nezmenenú a vynecháva vygenerovanú technológiu, keď Factorio nemôže túto presnú množinu preskúmať.
mir-prototype-productivity-cap-engine-default=Ponechajte existujúci limit produktivity každého receptu tak. Recepty bez vlastného uzáveru využívajú bežný bonusový limit +300 % produktivity Factorio.
mir-prototype-productivity-cap-percent-25=Nastavte limity produktivity neparametrového receptu na +25%. Toto je prísny skorý strop.
mir-prototype-productivity-cap-percent-50=Nastavte limity produktivity neparametrového receptu na +50 %. To je pod normálnou hranicou a výskum produktivity prestane pomáhať skôr.
mir-prototype-productivity-cap-percent-75=Nastavte limity produktivity neparametrového receptu na +75%. To je pod normálnou hranicou a výskum produktivity prestane pomáhať skôr.
mir-prototype-productivity-cap-percent-100=Nastavte limity produktivity neparametrového receptu na +100 %. To je pod normálnou hranicou a výskum produktivity prestane pomáhať skôr.
mir-prototype-productivity-cap-percent-125=Nastavte limity produktivity neparametrového receptu na +125%.
mir-prototype-productivity-cap-percent-150=Nastavte limity produktivity neparametrového receptu na +150 %.
mir-prototype-productivity-cap-percent-200=Nastavte limity produktivity neparametrového receptu na +200 %. To je pod normálnou hranicou a výskum produktivity prestane pomáhať skôr.
mir-prototype-productivity-cap-percent-250=Nastavte limity produktivity neparametrového receptu na +250 %. To je mierne pod normálnou čiapočkou.
mir-prototype-productivity-cap-percent-400=Nastavte limity produktivity neparametrového receptu na +400 %. To rozširuje škálovanie produktivity nad rámec bežného limitu.
mir-prototype-productivity-cap-percent-500=Nastavte limity produktivity neparametrového receptu na +500 %. To rozširuje škálovanie produktivity nad rámec bežného limitu.
mir-prototype-productivity-cap-percent-750=Nastavte limity produktivity neparametrového receptu na +750 %.
mir-prototype-productivity-cap-percent-1000=Nastavte limity produktivity neparametrového receptu na +1000%. Použite na dlhé uloženie, kde by malo záležať na výskume produktivity.
mir-prototype-productivity-cap-percent-2500=Nastavte limity produktivity neparametrového receptu na +2500%. Použite na veľmi dlhé uloženie.
mir-prototype-productivity-cap-percent-5000=Nastavte limity produktivity neparametrového receptu na +5000%.
mir-prototype-productivity-cap-percent-10000=Nastavte limity produktivity neparametrového receptu na +10 000 %. Používajte len na extrémne dlhodobé škálovanie.
mir-prototype-productivity-cap-percent-25000=Nastavte limity produktivity neparametrového receptu na +25 000 %. Používajte len na extrémne dlhodobé škálovanie.
mir-prototype-productivity-cap-percent-100000=Nastavte limity produktivity neparametrového receptu na +100000%. Toto je pre väčšinu uložených položiek efektívne bez obmedzenia.
mir-recycling-return-chance-engine-default=Nechajte každý recyklačný recept nezmenený.
mir-recycling-return-chance-match-productivity-cap=Bezpečná automatická redukcia pre skryté generované recepty na recykláciu. Používa 1 / (1 + bonus za produktivitu), obmedzený na normálnu návratnosť 25%: z +400% sa stane 20% a z +1000% bude približne 9,09%.
mir-recycling-return-chance-percent-25=Uchovajte skryté vygenerované recepty na recykláciu pri bežnej 25% návratnosti materiálu.
mir-recycling-return-chance-percent-20=Škálujte skryté generované recepty na recykláciu na 20% návratnosť materiálu.
mir-recycling-return-chance-percent-15=Škálujte skryté generované recepty na recykláciu na 15% návratnosť materiálu.
mir-recycling-return-chance-percent-12-5=Rozšírte skryté generované recepty na recykláciu na 12,5% návratnosť materiálu.
mir-recycling-return-chance-percent-10=Škálujte skryté generované recepty na recykláciu na 10% návratnosť materiálu.
mir-recycling-return-chance-percent-7-5=Rozšírte skryté generované recepty na recykláciu na 7,5% návratnosť materiálu.
mir-recycling-return-chance-percent-5=Škálujte skryté generované recepty na recykláciu na 5% návratnosť materiálu.
mir-recycling-return-chance-percent-2-5=Škálujte skryté generované recepty na recykláciu na 2,5% návratnosť materiálu.
mir-recycling-return-chance-percent-1=Škálujte skryté generované recepty na recykláciu na 1% návratnosť materiálu.
mir-recycling-return-chance-percent-0-5=Škálujte skryté generované recepty na recykláciu na 0,5% návratnosť materiálu.
mir-recycling-return-chance-percent-0-1=Škálujte skryté generované recepty na recykláciu na 0,1% návratnosť materiálu.
mir-prototype-efficiency-cap-engine-default=Ponechajte limit spotreby energie každého stroja na pokoji. Stroje bez vlastného limitu používajú normálnu hranicu efektu spotreby energie Factorio -80 %, takže efekty nemôžu znížiť aktívne využitie pod 20 %.
mir-prototype-efficiency-cap-saving-25=Napíšte limit spotreby energie -25 %. Aktívna spotreba energie zostáva po účinkoch spotreby energie na úrovni 75 % alebo viac.
mir-prototype-efficiency-cap-saving-50=Napíšte limit spotreby energie -50 %. Aktívna spotreba energie zostáva na úrovni 50 % alebo viac po účinkoch spotreby energie na podporovaných strojoch.
mir-prototype-efficiency-cap-saving-75=Napíšte limit spotreby energie -75 %. Aktívna spotreba energie zostáva na úrovni 25 % alebo viac po účinkoch spotreby energie na podporovaných strojoch.
mir-prototype-efficiency-cap-saving-90=Napíšte limit spotreby energie -90 %. Spotreba aktívnej energie môže klesnúť na 10 %, čo je pod bežnou hranicou 20 %.
mir-prototype-efficiency-cap-saving-95=Napíšte limit spotreby energie -95 %. Aktívna spotreba energie môže klesnúť až na 5 %.
mir-prototype-efficiency-cap-saving-99=Napíšte limit spotreby energie -99 %. Aktívna spotreba energie môže klesnúť na 1 %.
mir-prototype-efficiency-cap-saving-999=Napíšte limit spotreby energie -99,9 %. Aktívna spotreba energie môže klesnúť na 0,1 %.
mir-prototype-efficiency-cap-saving-9999=Napíšte limit spotreby energie -99,99 %. Toto je takmer nulová spotreba aktívnej energie, nie prepis prototypu s nulovou spotrebou.
