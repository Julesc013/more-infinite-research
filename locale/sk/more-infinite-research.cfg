[mod-setting-description]
ips-require-space-gate=Keď je aktivovaná, tieto technológie zostanú uzamknuté, kým sa vesmírna veda nebude skúmať vo vanilke alebo veda o prométiu vo vesmírnom veku.
mir-science-pack-ingredient-policy=Vyberá, ako MIR pridáva vedecké balíčky do generovaných technológií. Možnosti sú zoradené od konzervatívnych až po široké: predvolené balíčky, balíčky na neskoršiu hru, balíčky založené na postupe a potom všetky dostupné balíčky.
mir-automatic-productivity-action=Vyberá, čo robí MIR s možnosťami bezpečnej produktivity, ktoré sa nachádzajú v receptoch s nainštalovaným režimom. Zakázané nevykonáva žiadne automatické zisťovanie. Ukážka záznamov zmien prijatých a preskočených kandidátov v denníku Factorio bez zmeny výskumu. Použiť bezpečné zmeny (predvolené) pridá vhodné recepty iba do kompatibilného existujúceho výskumu MIR. Toto riadi činnosť, nie silu alebo zrelosť; začiarkavacie políčka vytvorenia nižšie sú samostatné. Vždy platia kontroly vlastníctva, recyklácie, pravdepodobnosti, katalyzátora, vedy, laboratória, predpokladu, cieľa, identity, postupu a cyklu.
mir-automatic-create-research=Predvolené: vypnuté. Off limits Aplikujte bezpečné zmeny na kompatibilný existujúci výskum MIR; kandidáti bez vhodného streamu sú preskočení a nahlásení. On umožňuje oprávnenému registrovanému poskytovateľovi vytvoriť jednu stabilnú generickú technológiu nekonečnej produktivity, keď nevyhovuje žiadny existujúci výskum. Začiarkavacie políčko skontrolované údaje nižšie rozhoduje o tom, či sú experimentálni poskytovatelia oprávnení. MIR nikdy nevytvára jednu technológiu na mod alebo recept a stále platí každá tvrdá bezpečnosť, veda, vlastníctvo, identita, progresia a brána cyklu.
mir-automatic-require-reviewed-data=Predvolené: zapnuté. Toto je dôležité iba vtedy, keď je zapnutá možnosť Povoliť vytváranie nového výskumu; nikdy neblokuje bezpečné pripojenie k existujúcemu výskumu. Na povoleniach sú iba rodiny poskytovateľov označené ako skontrolované a podložené príslušnými dôkazmi o presnej verzii, takže experimentálne rodiny sa vynechajú. Off umožňuje registrovaným experimentálnym poskytovateľom vytvárať zo všeobecných štrukturálnych dôkazov. Pre čo najširšie experimentálne správanie povoľte vytváranie výskumu a túto požiadavku vypnite. Žiadna hodnota nemôže obísť tvrdú bezpečnostnú bránu.
mir-automatic-compiler-mode=Skrytý most kompatibility pre profily vytvorené pred rozdelením automatických ovládacích prvkov produktivity. Nepredvolená stará hodnota sa dodrží iba vtedy, keď všetky nové ovládacie prvky zostanú vo svojich predvolených nastaveniach. Zmeňte akýkoľvek nový ovládací prvok tak, aby prevzal explicitné ovládanie.
ips-enable-stream=Vytvorí vygenerovanú nekonečnú technológiu pre __1__, keď sú k dispozícii jej recepty, efekty, predpoklady a vedecké balíčky. Vypnite toto, aby ste zabránili MIR generovať túto technológiu.
ips-cost-base-stream=Výskumné jednotky potrebné pre prvú vygenerovanú úroveň __1__. Musí byť aspoň 1. Neskoršie úrovne sa vypočítajú z tejto hodnoty a faktora rastu nákladov.
ips-cost-growth-stream=Násobiteľ použitý na každú neskoršiu úroveň __1__. Použite 1 pre paušálne náklady, 1,5 pre 50 % rast na úroveň alebo 2 pre zdvojnásobenie nákladov.
ips-max-level-stream=Najvyššia vygenerovaná úroveň pre __1__. Nastavte na 0 pre nekonečné úrovne.
ips-research-time-stream=Sekundy na výskumnú jednotku za __1__. Ak chcete pre túto technológiu použiť predvolené nastavenie MIR, nastavte na 0. Toto nie je celkový čas výskumu; celkový čas závisí aj od nákladov na výskum, počtu laboratórií, rýchlosti laboratória a modulov.
mir-enable-base-tech=Umožňuje __1__ pokračovať cez svoj vanilkový uzáver ako nekonečnú technológiu. Vypnite túto možnosť, ak chcete, aby MIR pridal nové výskumné línie bez predĺženia tohto vanilkového reťazca.
mir-cost-base=Výskumné jednotky požadované pre prvú úroveň pokračovania MIR __1__. Ak je to možné, nastavte na 0, aby ste zdedili cenový vzor vanilkového reťazca.
mir-cost-growth=Násobiteľ použitý na každú ďalšiu úroveň pokračovania MIR __1__. Ak je to možné, nastavte na 0, aby ste zdedili vzor rastu vanilkového reťazca.
mir-max-level=Najvyššia úroveň pokračovania MIR pre __1__. Nastavte na 0 pre nekonečné úrovne.
mir-research-time=Sekundy na výskumnú jednotku pre pokračovanie MIR __1__. Ak je to možné, nastavte na 0, aby ste zdedili čas výskumnej jednotky vanilkového reťazca.
mir-prefer-this-mod-for-competing-techs=Keď je povolený, tento mod odstraňuje vybrané konkurenčné nekonečné rozšírenia a používa svoje vlastné verzie. Deaktivujte, ak chcete zachovať konkurenčné verzie z iných modov.
mir-adjust-vanilla-weapon-speed-techs=Kontroluje, či MIR odstráni bonusy za rýchlosť rakiet a kanónov z pokračovania rýchlosti streľby zo zbrane, keď je k dispozícii presné nekonečné pokrytie výmeny. Technológie rýchlosti streľby zbraní Finite vanilla si zachovávajú svoje pôvodné bonusy.
mir-use-installed-space-age-icons=Keď je povolený, MIR môže odkazovať na nainštalované oficiálne súbory ikon DLC, vrátane Space Age a Elevated Rails, aj keď sú tieto mody zakázané pre spustenie základnej hry. Nechajte toto vypnuté, ak tieto súbory DLC nie sú nainštalované; Factorio sa nemôže elegantne zotaviť z chýbajúcich súborov ikon počas načítania prototypu.
mir-pipeline-extent-multiplier=Rozbaľovací multiplikátor iba pri spustení pre rozpoznané polia rozsahu potrubia boxu tekutiny naprieč prototypmi, nielen entitami potrubia. 100% ponecháva prototypy nezmenené a nezaťažuje priechod potrubia ani skenovacie boxy s tekutinami. Hodnoty iné ako 100 % sú experimentálne a môžu ovplyvniť stroje, nádrže, trysky a modifikované prototypy, ktoré definujú kvapalinové boxy.
mir-unrestricted-modules=Experimentálne a narúšajúce rovnováhu. Keď je aktivovaný, každý existujúci recept akceptuje všetkých päť modulových efektov a každý existujúci modulový prijímač so slotmi akceptuje každú objavenú kategóriu modulu. Toto nepridáva modulové sloty ani nemení prototypy modulov a môže umožniť produktivitu, kvalitu a slučky modifikovaných modulov.
mir-prototype-productivity-cap=Vyberie, či MIR ponechá limity produktivity receptúry na pokoji, alebo zapíše limit pri spustení ku každému neparametrickému, nerecyklačnému receptu. +300 % (nezmenené) zachováva existujúce uzávery receptov; nižšie hodnoty skracujú škálovanie produktivity, zatiaľ čo vyššie hodnoty ju predlžujú.
mir-recycling-return-chance=Ovláda iba skryté generované recyklačné recepty. Automatický režim znižuje normálnu návratnosť materiálu o 25 % na maximálne 1 vydelenú násobiteľom celkového výstupu pri zvolenom limite produktivity. Pevné voľby priamo škálujú rovnaké generované výnosy. Viditeľné procesy a limity produktivity receptúr sa nikdy nemenia.
mir-productivity-cap-self-recycling-only=Nad 1 / návratnosť recyklátora - 1, iba výrobné receptúry s preukázanou negeneratívnou cestou sebarecyklácie dostanú vybraný vyšší strop. Pri alebo pod touto hranicou nemá toto začiarkavacie políčko žiadny účinok. Nezmenený motor využíva normálnu návratnosť 25 % ako konzervatívny prah +300 % bez zmeny recyklačných receptúr.
mir-prototype-efficiency-cap=Vyberá, do akej miery môžu efekty účinnosti znížiť spotrebu aktívnej energie stroja. -80 % (nezmenených) ponecháva existujúce limity spotreby energie samotné. Hlbšie zníženie sa môže priblížiť k nulovej spotrebe aktívnej energie bez zmeny limitov znečistenia.
mir-prototype-pollution-cap=Vyberá, do akej miery môžu účinky zníženia znečistenia znížiť znečistenie stroja. -80 % (nezmenených) ponecháva existujúce limity znečistenia samotné. Hlbšie zníženie sa môže priblížiť k nulovému znečisteniu bez zmeny spotreby energie.
mir-prototype-speed-floor=Vyberá, do akej miery môžu negatívne účinky rýchlosti spomaliť podporované počítače. -80 % (nezmenených) ponecháva existujúce limity na pokoji; hlbšie hodnoty odstránia normálnu podlahu až takmer na doraz na -99,99 %.
mir-prototype-speed-cap=Vyberie, či MIR ponechá limity rýchlosti stroja na pokoji alebo zapíše nový pozitívny limit rýchlosti. +100000 % (nezmenené) zachováva existujúce limity; nižšie hodnoty zámerne upínajú veľmi veľké rýchlostné bonusy.
mir-prototype-quality-cap=Vyberie, či MIR ponechá limity kvality stroja na pokoji, alebo vytvorí nový pozitívny limit kvality. +100000 % (nezmenené) zachováva existujúce limity a nemení úrovne kvality ani vzorce pravdepodobnosti položiek.
mir-prototype-positive-power-floor=Predvolene vypnuté. Keď je povolená, MIR zmení explicitné prototypy aktívnej spotreby energie 0 W počas načítavania prototypu na 1 W, takže varovné ikony nízkej spotreby sa nezobrazujú na entitách, ktoré by mali čerpať malé nenulové množstvo. Ak chcete presne zachovať prototypy s nulovou spotrebou energie, vynechajte.
mir-settings-profile-import=Sem vložte reťazec profilu nastavení MIR, aby ste počas generovania prototypu použili exportované hodnoty počiatočného nastavenia ako vrstvu prepísania. Pre normálne nastavenia nechajte prázdne. Exportujte pomocou /mir-settings-export z aktívneho uloženia a po zmene tejto hodnoty reštartujte.
mir-debug-generation-report=Keď je povolená, zapíše jeden riadok štruktúrovaného protokolu na vygenerovaný alebo preskočený stream a základné rozšírenie vrátane vedeckých balíčkov, predpokladov, počtu efektov, stavu kompatibility laboratória a zdroja ikon.
mir-debug-recipe-matches=Keď je povolená, zapisuje zhodné názvy receptov pre každý generovaný tok produktivity. Vo veľkých balíkoch modulov to môže byť hlučné.
mir-debug-scripted-effects=Keď je povolený, zapisuje záznamy runtime protokolu, keď skriptované technológie prepočítavajú globálne efekty alebo efekty riadené udalosťami.
mir-lab-incompatibility-policy=Vyberie, čo urobí MIR, keď vybrané vedecké balíčky nemôže preskúmať žiadne aktívne laboratórium.
ips-effect-per-level-stream=Nastavuje primárny efekt základnej úrovne na úroveň pre __1__. Súvisiace neskoršie úrovne a efekty sú škálované proporcionálne. Percentuálne účinky používajú percentuálne body; efekty počtu a vzdialenosti využívajú svoje pôvodné jednotky.
mir-effect-per-level=Nastavuje kanonický efekt na úrovni pre nekonečné pokračovanie __1__. Súvisiace účinky sú odstupňované proporcionálne od konečnej vanilkovej základnej línie. Percentuálne účinky používajú percentuálne body; efekty počtu a vzdialenosti využívajú svoje pôvodné jednotky.
mir-note-experimental-spoilage=Experimentálne a predvolene vypnuté vo verzii 2.1.0. Toto je globálny/celomapový skriptovaný efekt. Existujúce správanie skaziteľného zásobníka nie je nárokované, kým nie je manuálne overené.
mir-note-agriculture-growth=Platí pre novovysadené poľnohospodárske vežové plodiny. Existujúce vysadené plodiny nie sú upravované.
mir-note-cargo-pad-count=Logistický výskum špeciálneho vesmírneho veku. Zvyšuje pristávacie plochy pre náklad na každý povrch a môže podstatne zmeniť logistickú rovnováhu.
mir-note-inserter-capacity=Predvolene vypnuté. Extra kapacita vkladača môže prerušiť vkladače riadené okruhom a znížiť optimalizáciu motora.
mir-note-native-owner-managed-stream=Ak nainštalovaná nekonečná technológia už vlastní túto skupinu výskumu, rovnaké nastavenia pri spustení nakonfigurujú tohto vlastníka namiesto vytvorenia duplikátu. Nezmenené predvolené hodnoty MIR presne zachovávajú konečný prototyp vlastníka. Explicitné prepísanie ceny, času, maximálnej úrovne a efektu sa použije len po bezpečnom zhode vlastníka; zakázaním streamu zostane externá technológia nedotknutá. Po zmene nastavení spustenia reštartujte Factorio. Maximálna úroveň 0 znamená nekonečno a hodnoty účinku sú percentuálne body na úroveň.

