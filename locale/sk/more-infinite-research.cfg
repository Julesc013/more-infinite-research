[technology-description]
more-infinite-research.recipe_productivity=Zvyšuje produktivitu receptov pre vybrané recepty. Stále platí maximálny limit produktivity Factorio; ďalšie nekonečné úrovne nemusia mať žiadny praktický účinok, keď recept dosiahne svoj strop.
more-infinite-research.direct_effect=Pridáva nekonečný opakovateľný bonus. Vedecké balíčky sa vyberajú z aktívnych laboratórií, takže technológia zostáva skúmateľná pomocou kompatibilných súprav modov.
more-infinite-research.cargo_bay_unloading_distance=Zväčšuje maximálnu vzdialenosť medzi pristávacou plochou pre náklad a pripojenými vykladacími priestormi.
more-infinite-research.cargo_landing_pad_count=Zvyšuje počet pristávacích plôch, ktoré môže každá sila postaviť na povrchu.
more-infinite-research.flamethrower_shooting_speed=Zvyšuje rýchlosť streľby pre plameňometné zbrane a plameňometné veže.
more-infinite-research.electric_shooting_speed=Zvyšuje rýchlosť streľby pre elektrické zbrane. Vo vanilke to ovplyvňuje obranu proti vybíjaniu; s Space Age to ovplyvňuje aj zbrane Tesla, keď je k dispozícii kategória tesla munície.
more-infinite-research.spoilage_preservation=Zvyšuje globálny modifikátor času pokazenia prostredníctvom ohraničeného skriptovaného efektu. Existujúce pokaziteľné položky si môžu ponechať svoje aktuálne termíny pokazenia, kým sa neotestujú v hre.
more-infinite-research.agricultural_growth_speed=Skracuje zostávajúci čas rastu pre novovysadené poľnohospodárske vežové rastliny prostredníctvom ohraničeného skriptovaného efektu.
more-infinite-research.lab_productivity=Zvyšuje pokrok vo výskume získaný z každého spotrebovaného vedeckého balíka pomocou modifikátora produktivity natívneho laboratórneho výskumu.

