[string-mod-setting-description]
mir-automatic-productivity-action-disabled=⟦МИР0306⟧ Не врши аутоматско откривање, прилагање или креирање. МИР-ово фиксно истраживање остаје непромењено.
mir-automatic-productivity-action-preview=⟦МИР0307⟧ Открива и класификује кандидате, затим уписује прихваћене и прескочене одлуке у Фацторио дневник. Не прилаже рецепте нити ствара истраживања.
mir-automatic-productivity-action-apply=⟦МИР0308⟧ Подразумевано. Открива кандидате и прилаже само сигурносно доказане рецепте уз компатибилна постојећа МИР истраживања. Оно не ствара истраживање само по себи; два поља за потврду испод управљају креирањем.
mir-automatic-compiler-mode-off=⟦МИР0309⟧ Застарели еквивалент Дисаблед.
mir-automatic-compiler-mode-report=⟦МИР0310⟧ Застарели еквивалент променама прегледа.
mir-automatic-compiler-mode-safe-attach=⟦МИР0311⟧ Застарели еквивалент Примени безбедне промене са онемогућеним креирањем истраживања.
mir-automatic-compiler-mode-exact-pack=⟦МИР0312⟧ Застарели еквивалент Примени безбедне промене са омогућеним креирањем истраживања и потребним ревидираним подацима о компатибилности.
mir-automatic-compiler-mode-safe-generate=⟦МИР0313⟧ Застарели еквивалент Примени безбедне промене уз креирање истраживања омогућено за регистроване експерименталне добављаче.
mir-adjust-vanilla-weapon-speed-techs-off=⟦МИР0314⟧ Онемогућите МИР-ово опционо преклапање ракета/топова бонус чишћења.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=⟦МИР0315⟧ Уклоните МИР-ове преклапајуће ракетне/топове бонусе само када омогућена, доступна бесконачна технологија пружа тачан ефекат замене.
mir-adjust-vanilla-weapon-speed-techs-always=⟦МИР0316⟧ Увек уклоните МИР-ове преклапајуће ракете/топове бонусе. Користите само ако желите строго раздвајање.
mir-science-pack-ingredient-policy-configured=⟦МИР0317⟧ Користите конфигурисане научне пакете сваке генерисане технологије без опционог проширења састојака. МИР подразумевано.
mir-science-pack-ingredient-policy-space=⟦МИР0318⟧ Додајте свемирску науку када је доступна. Једноставно повећање тежине након ракетирања.
mir-science-pack-ingredient-policy-space-and-promethium=⟦МИР0319⟧ Додајте простор и науку о прометијуму када су доступни. Најбоље за истраживачке судопере из веома касног свемирског доба.
mir-science-pack-ingredient-policy-space-age-progression=⟦МИР0320⟧ Додајте само пакете напредовања Спаце Аге које подразумевају изабрани пакети. Не додаје неповезане модификоване пакете.
mir-science-pack-ingredient-policy-official-progression=⟦МИР0321⟧ Додајте недостајуће званичне пакете у стилу предуслова које подразумева најнапреднији званични пакет који је већ изабран.
mir-science-pack-ingredient-policy-mod-progression=⟦МИР0322⟧ Додајте недостајуће пакете компатибилне са лабораторијама на основу модификованог напредовања научног пакета и откључајте предуслове.
mir-science-pack-ingredient-policy-all-official=⟦МИР0323⟧ Користите сваку званичну базу и научни пакет Спаце Аге који постоји у тренутном сету модова.
mir-science-pack-ingredient-policy-all=⟦МИР0324⟧ Користите сваки активни научни пакет компатибилан са лабораторијама, укључујући модификоване научне пакете.
mir-lab-incompatibility-policy-reduce=⟦МИР0325⟧ Задржите технологију смањивањем њених научних пакета на највећи скуп који прихвата активна лабораторија. Најсигурније подразумевано за мод пакете.
mir-lab-incompatibility-policy-skip=⟦МИР0326⟧ Прескочите технологију ако ниједна активна лабораторија не може да истражи свој одабрани скуп научних пакета. Строжији и лакши за ревизију.
mir-lab-incompatibility-policy-engine-default=⟦МИР0327⟧ Никада немојте преписивати изабрани скуп научних пакета. МИР чува непромењен скуп који се може безбедно истражити и изоставља генерисану технологију када Фацторио не може да истражи тај тачан скуп.
mir-prototype-productivity-cap-engine-default=⟦МИР0328⟧ Оставите постојеће ограничење продуктивности сваког рецепта на миру. Рецепти без прилагођеног ограничења користе Фацториоову нормалну +300% ограничење бонуса продуктивности.
mir-prototype-productivity-cap-percent-25=⟦МИР0329⟧ Поставите ограничења продуктивности непараметарског рецепта на +25%. Ово је строга рана капа.
mir-prototype-productivity-cap-percent-50=⟦МИР0330⟧ Поставите ограничења продуктивности непараметарског рецепта на +50%. Ово је испод нормалне границе и чини да истраживање продуктивности престане да помаже.
mir-prototype-productivity-cap-percent-75=⟦МИР0331⟧ Поставите ограничења продуктивности непараметарског рецепта на +75%. Ово је испод нормалне границе и чини да истраживање продуктивности престане да помаже.
mir-prototype-productivity-cap-percent-100=⟦МИР0332⟧ Поставите ограничења продуктивности непараметарског рецепта на +100%. Ово је испод нормалне границе и чини да истраживање продуктивности престане да помаже.
mir-prototype-productivity-cap-percent-125=⟦МИР0333⟧ Поставите ограничења продуктивности непараметарског рецепта на +125%.
mir-prototype-productivity-cap-percent-150=⟦МИР0334⟧ Поставите ограничења продуктивности непараметарског рецепта на +150%.
mir-prototype-productivity-cap-percent-200=⟦МИР0335⟧ Поставите ограничења продуктивности непараметарског рецепта на +200%. Ово је испод нормалне границе и чини да истраживање продуктивности престане да помаже.
mir-prototype-productivity-cap-percent-250=⟦МИР0336⟧ Поставите ограничења продуктивности непараметарског рецепта на +250%. Ово је мало испод уобичајене границе.
mir-prototype-productivity-cap-percent-400=⟦МИР0337⟧ Поставите ограничења продуктивности непараметарског рецепта на +400%. Ово проширује скалирање продуктивности изван нормалног ограничења.
mir-prototype-productivity-cap-percent-500=⟦МИР0338⟧ Поставите ограничења продуктивности непараметарског рецепта на +500%. Ово проширује скалирање продуктивности изван нормалног ограничења.
mir-prototype-productivity-cap-percent-750=⟦МИР0339⟧ Поставите ограничења продуктивности непараметарског рецепта на +750%.
mir-prototype-productivity-cap-percent-1000=⟦МИР0340⟧ Поставите ограничења продуктивности непараметарског рецепта на +1000%. Користите за дуготрајно чување где би истраживање продуктивности требало да остане важно.
mir-prototype-productivity-cap-percent-2500=⟦МИР0341⟧ Поставите ограничења продуктивности непараметарског рецепта на +2500%. Користите за веома дуге уштеде.
mir-prototype-productivity-cap-percent-5000=⟦МИР0342⟧ Поставите ограничења продуктивности непараметарског рецепта на +5000%.
mir-prototype-productivity-cap-percent-10000=⟦МИР0343⟧ Поставите ограничења продуктивности непараметарског рецепта на +10000%. Користите само за екстремно дугорочно скалирање.
mir-prototype-productivity-cap-percent-25000=⟦МИР0344⟧ Поставите ограничења продуктивности непараметарског рецепта на +25000%. Користите само за екстремно дугорочно скалирање.
mir-prototype-productivity-cap-percent-100000=⟦МИР0345⟧ Поставите ограничења продуктивности непараметарског рецепта на +100000%. Ово је практично неограничено за већину чувања.
mir-recycling-return-chance-engine-default=⟦МИР0346⟧ Оставите сваки рецепт за рециклажу непромењеним.
mir-recycling-return-chance-match-productivity-cap=⟦МИР0347⟧ Аутоматско смањење безбедно за експлоатацију за скривене генерисане рецепте за рециклажу. Користи 1 / (1 + бонус продуктивности), ограничен на нормални принос од 25%: +400% постаје 20%, а +1000% постаје око 9,09%.
mir-recycling-return-chance-percent-25=⟦МИР0348⟧ Задржите скривене генерисане рецепте за рециклажу са нормалним повратом материјала од 25%.
mir-recycling-return-chance-percent-20=⟦МИР0349⟧ Скалирајте скривене генерисане рецепте за рециклажу до 20% поврата материјала.
mir-recycling-return-chance-percent-15=⟦МИР0350⟧ Скалирајте скривене генерисане рецепте за рециклажу до 15% поврата материјала.
mir-recycling-return-chance-percent-12-5=⟦МИР0351⟧ Скалирајте скривене генерисане рецепте за рециклажу до 12,5% поврата материјала.
mir-recycling-return-chance-percent-10=⟦МИР0352⟧ Скалирајте скривене генерисане рецепте за рециклажу до 10% поврата материјала.
mir-recycling-return-chance-percent-7-5=⟦МИР0353⟧ Скалирајте скривене генерисане рецепте за рециклажу на повраћај материјала од 7,5%.
mir-recycling-return-chance-percent-5=⟦МИР0354⟧ Скалирајте скривене генерисане рецепте за рециклажу до 5% поврата материјала.
mir-recycling-return-chance-percent-2-5=⟦МИР0355⟧ Скалирајте скривене генерисане рецепте за рециклажу до 2,5% поврата материјала.
mir-recycling-return-chance-percent-1=⟦МИР0356⟧ Скалирајте скривене генерисане рецепте за рециклажу до 1% поврата материјала.
mir-recycling-return-chance-percent-0-5=⟦МИР0357⟧ Скалирајте скривене генерисане рецепте за рециклажу до 0,5% поврата материјала.
mir-recycling-return-chance-percent-0-1=⟦МИР0358⟧ Скалирајте скривене генерисане рецепте за рециклажу на повраћај материјала од 0,1%.
mir-prototype-efficiency-cap-engine-default=⟦МИР0359⟧ Оставите ограничење ефекта употребе енергије сваке машине на миру. Машине без прилагођеног ограничења користе Фацторио-ово нормално ограничење за коришћење енергије од -80%, тако да ефекти не могу да смање активну употребу испод 20%.
mir-prototype-efficiency-cap-saving-25=⟦МИР0360⟧ Напишите ограничење потрошње енергије од -25%. Активна употреба енергије остаје 75% или више након ефеката потрошње енергије.
mir-prototype-efficiency-cap-saving-50=⟦МИР0361⟧ Напишите ограничење потрошње енергије од -50%. Активна употреба енергије остаје 50% или више након ефеката потрошње енергије на подржаним машинама.
mir-prototype-efficiency-cap-saving-75=⟦МИР0362⟧ Напишите ограничење потрошње енергије од -75%. Активна употреба енергије остаје 25% или више након ефеката потрошње енергије на подржаним машинама.
mir-prototype-efficiency-cap-saving-90=⟦МИР0363⟧ Напишите ограничење потрошње енергије од -90%. Активна потрошња енергије може пасти на 10%, што је испод нормалног пода од 20%.
mir-prototype-efficiency-cap-saving-95=⟦МИР0364⟧ Напишите ограничење потрошње енергије од -95%. Активна потрошња енергије може пасти на 5%.
mir-prototype-efficiency-cap-saving-99=⟦МИР0365⟧ Напишите ограничење потрошње енергије од -99%. Активна потрошња енергије може пасти на 1%.
mir-prototype-efficiency-cap-saving-999=⟦МИР0366⟧ Напишите ограничење потрошње енергије од -99,9%. Употреба активне енергије може пасти на 0,1%.
mir-prototype-efficiency-cap-saving-9999=⟦МИР0367⟧ Напишите ограничење потрошње енергије од -99,99%. Ово је скоро нула потрошња активне енергије, а не преписивање прототипа са нултом снагом.
mir-prototype-pollution-cap-engine-default=⟦МИР0368⟧ Оставите границу утицаја загађења сваке машине на миру. Машине без прилагођеног ограничења користе Фацторио-ову нормалну капу са ефектом загађења од -80%.
mir-prototype-pollution-cap-saving-25=⟦МИР0369⟧ Напишите ограничење за загађење од -25%. Загађење остаје 75% или више након ефеката загађења.
mir-prototype-pollution-cap-saving-50=⟦МИР0370⟧ Напишите ограничење за загађење од -50%. Загађење остаје 50% или више након утицаја загађења на подржане машине.
mir-prototype-pollution-cap-saving-75=⟦МИР0371⟧ Напишите ограничење за загађење од -75%. Загађење остаје на 25% или више након утицаја загађења на подржане машине.
mir-prototype-pollution-cap-saving-90=⟦МИР0372⟧ Напишите ограничење за загађење од -90%. Загађење може пасти на 10%, што је испод нормалног пода од 20%.
mir-prototype-pollution-cap-saving-95=⟦МИР0373⟧ Напишите ограничење за загађење од -95%. Загађење може пасти на 5%.
mir-prototype-pollution-cap-saving-99=⟦МИР0374⟧ Напишите ограничење за загађење од -99%. Загађење може пасти на 1%.
mir-prototype-pollution-cap-saving-999=⟦МИР0375⟧ Напишите ограничење за загађење од -99,9%. Загађење може пасти на 0,1%.
mir-prototype-pollution-cap-saving-9999=⟦МИР0376⟧ Напишите ограничење за загађење од -99,99%. Ово је скоро нулто загађење, а не скрипта за загађење током извршавања.
mir-prototype-speed-floor-engine-default=⟦МИР0377⟧ Оставите негативно ограничење брзине сваке машине на миру. Машине без прилагођеног ограничења користе Фацторио-ов нормални под -80% и задржавају најмање 20% брзине.
mir-prototype-speed-floor-saving-25=⟦МИР0378⟧ Причврстите негативне ефекте брзине на -25%, остављајући најмање 75% брзине.
mir-prototype-speed-floor-saving-50=⟦МИР0379⟧ Причврстите негативне ефекте брзине на -50%, остављајући најмање 50% брзине.
mir-prototype-speed-floor-saving-75=⟦МИР0380⟧ Причврстите негативне ефекте брзине на -75%, остављајући најмање 25% брзине.
mir-prototype-speed-floor-saving-90=⟦МИР0381⟧ Дозволите негативне ефекте брзине до -90%, остављајући најмање 10% брзине.
mir-prototype-speed-floor-saving-95=⟦МИР0382⟧ Дозволите негативне ефекте брзине до -95%, остављајући најмање 5% брзине.
mir-prototype-speed-floor-saving-99=⟦МИР0383⟧ Дозволите негативне ефекте брзине до -99%, остављајући најмање 1% брзине.
mir-prototype-speed-floor-saving-999=⟦МИР0384⟧ Дозволите негативне ефекте брзине на -99,9%, остављајући најмање 0,1% брзине.
mir-prototype-speed-floor-saving-9999=⟦МИР0385⟧ Дозволи негативне ефекте брзине до -99,99%, најниже Фацторио ограничење прототипа. Ово је скоро заустављање, а не нула или негативна брзина израде.
mir-prototype-speed-cap-engine-default=⟦МИР0386⟧ Оставите ограничење брзине сваке машине на миру. Машине без прилагођеног ограничења користе Фацторио-ов веома висок +100000% ефекат брзине.
mir-prototype-speed-cap-bonus-25=⟦МИР0387⟧ Позитивни ефекти на брзину стезања на +25%.
mir-prototype-speed-cap-bonus-50=⟦МИР0388⟧ Позитивни ефекти на брзину стезања на +50%. Користите ово да држите бонусе брзине чврсто ограниченим.
mir-prototype-speed-cap-bonus-75=⟦МИР0389⟧ Позитивни ефекти на брзину стезања на +75%.
