[mod-setting-description]
ips-require-space-gate=⟦МИР0133⟧ Када су омогућене, ове технологије остају закључане све док се свемирска наука не истражује у ванилији, или док се наука о прометијуму не истражује у свемирском добу.
mir-science-pack-ingredient-policy=⟦МИР0134⟧ Бира начин на који МИР додаје научне пакете генерисаним технологијама. Опције су поређане од конзервативних до широких: подразумевани пакети, пакети за касну игру, пакети засновани на напредовању, затим сви доступни пакети.
mir-automatic-productivity-action=⟦МИР0135⟧ Бира шта МИР ради са безбедним могућностима продуктивности које се налазе у рецептима са инсталираним модовима. Онемогућено не врши аутоматско откривање. Прегледајте записе о променама прихваћених и прескочених кандидата у Фацторио дневнику без промене истраживања. Примени безбедне промене (подразумевано) додаје одговарајуће рецепте само у компатибилна постојећа МИР истраживања. Ово контролише акцију, а не снагу или зрелост; поља за потврду креирања испод су одвојена. Провере власништва, рециклаже, вероватноће, катализатора, науке, лабораторије, предуслова, циља, идентитета, напредовања и циклуса се увек примењују.
mir-automatic-create-research=⟦МИР0136⟧ Подразумевано: искључено. Офф лимитс Примените безбедне промене на компатибилна постојећа МИР истраживања; кандидати без одговарајућег тока се прескачу и пријављују. Укључено омогућава регистрованом добављачу који испуњава услове да креира једну стабилну генеричку технологију бесконачне продуктивности када ниједно постојеће истраживање не одговара. Поље за потврду прегледаних података у наставку одлучује да ли експериментални добављачи испуњавају услове. МИР никада не ствара једну технологију по моду или рецепту, а свака чврста сигурност, наука, власништво, идентитет, напредак и циклус циклуса и даље важе.
mir-automatic-require-reviewed-data=⟦МИР0137⟧ Подразумевано: укључено. Ово је важно само када је укључено Дозволи креирање нових истраживања; никада не блокира безбедно везивање за постојеће истраживање. На дозволама само породице добављача означене као прегледане и подржане важећим доказима тачне верзије, тако да су експерименталне породице прескочене. Офф дозвољава регистрованим експерименталним провајдерима да креирају на основу генеричких структуралних доказа. За најшире експериментално понашање, омогућите креирање истраживања и искључите овај захтев. Ниједна вредност не може заобићи чврсту сигурносну капију.
mir-automatic-compiler-mode=⟦МИР0138⟧ Скривени мост компатибилности за профиле креиране пре подељених аутоматских контрола продуктивности. Застарела вредност која није подразумевана се поштује само док све нове контроле остају на подразумеваним вредностима. Промените било коју нову контролу да бисте преузели експлицитну контролу.
ips-enable-stream=Ствара генерисану бесконачну технологију за __1__ када су његови рецепти, ефекти, предуслови и научни пакети доступни. Онемогућите ово да спречите МИР да генерише ову технологију.
ips-cost-base-stream=Истраживачке јединице потребне за први генерисани ниво __1__. Мора бити најмање 1. Каснији нивои се израчунавају из ове вредности и фактора раста трошкова.
ips-cost-growth-stream=Множилац се примењује на сваки каснији ниво __1__. Користите 1 за паушалне трошкове, 1,5 за раст од 50% по нивоу или 2 за удвостручење трошкова.
ips-max-level-stream=Највиши генерисани ниво за __1__. Поставите на 0 за бесконачне нивое.
ips-research-time-stream=Секунди по истраживачкој јединици за __1__. Подесите на 0 да бисте користили МИР подразумеване вредности за ову технологију. Ово није укупно време истраживања; укупно време такође зависи од трошкова истраживања, броја лабораторија, брзине лабораторије и модула.
mir-enable-base-tech=Дозвољава __1__ да настави поред своје ваниле капице као бесконачне технологије. Онемогућите ово ако желите да МИР додаје нове истраживачке линије без проширења овог ланца ваниле.
mir-cost-base=Истраживачке јединице потребне за први ниво наставка МИР-а __1__. Поставите на 0 да бисте наследили образац трошкова ланца ваниле када је то могуће.
mir-cost-growth=Множилац се примењује на сваки каснији ниво наставка МИР-а __1__. Поставите на 0 да бисте наследили образац раста ланца ваниле када је то могуће.
mir-max-level=Највиши ниво наставка МИР за __1__. Поставите на 0 за бесконачне нивое.
mir-research-time=Секунди по истраживачкој јединици за наставак МИР-а __1__. Поставите на 0 да бисте наследили време истраживачке јединице ланца ваниле када је то могуће.
mir-prefer-this-mod-for-competing-techs=⟦МИР0149⟧ Када је омогућен, овај мод уклања одабрана конкурентна бесконачна проширења и користи сопствене верзије. Онемогућите да бисте задржали конкурентске верзије из других модова.
mir-adjust-vanilla-weapon-speed-techs=⟦МИР0150⟧ Контролише да ли МИР уклања бонусе у брзини ракете и топовске гранате из свог генерисаног наставка брзине пуцања из оружја када је доступно тачно бесконачно покривање замене. Технологије ограничене брзине пуцања оружјем од ваниле задржавају своје оригиналне бонусе.
mir-use-installed-space-age-icons=⟦МИР0151⟧ Када је омогућен, МИР може референцирати инсталиране званичне датотеке са иконама ДЛЦ-а, укључујући Спаце Аге и Елеватед Раилс, чак и када су ти модови онемогућени за покретање основне игре. Оставите ово искључено ако те ДЛЦ датотеке нису инсталиране; Фацторио се не може лепо опоравити од датотека икона које недостају током учитавања прототипа.
mir-pipeline-extent-multiplier=⟦МИР0152⟧ Падајући множитељ само за покретање за препозната поља опсега цевовода кутије за флуиде у свим прототиповима, а не само у ентитетима цеви. 100% оставља прототипове непромењеним и не учитава кутије за пролаз цевовода или течности за скенирање. Вредности које нису 100% су експерименталне и могу утицати на машине, резервоаре, потиснике и модификоване прототипове који дефинишу кутије са флуидима.
mir-unrestricted-modules=⟦МИР0153⟧ Експериментално и разбијање равнотеже. Када је омогућен, сваки постојећи рецепт прихвата свих пет ефеката модула и сваки постојећи пријемник модула са слотовима прихвата сваку откривену категорију модула. Ово не додаје уторе за модуле нити мења прототипове модула и може омогућити продуктивност, квалитет и петље модификованих модула.
mir-prototype-productivity-cap=⟦МИР0154⟧ Бира да ли МИР оставља сама ограничења продуктивности рецепта или уписује почетну капу за сваки непараметарски рецепт који се не рециклира. +300% (непромењено) чува постојеће капице рецепта; ниже вредности скраћују скалирање продуктивности, док га веће вредности продужавају.
mir-recycling-return-chance=⟦МИР0155⟧ Контролише само скривене генерисане рецепте за рециклажу. Аутоматски режим смањује нормалан поврат материјала од 25% на највише 1 подељен са укупним множитељем излаза при изабраном лимиту продуктивности. Фиксни избори директно скалирају исте генерисане приносе. Видљиви процеси и ограничења продуктивности рецептура се никада не мењају.
mir-productivity-cap-self-recycling-only=⟦МИР0156⟧ Изнад 1 / враћање рециклера - 1, само производни рецепти са доказаним негенеративним путем саморециклирања добијају изабрани већи лимит. На или испод тог прага ово поље за потврду нема ефекта. Мотор непромењен користи нормалан поврат од 25% као конзервативни праг од +300% без промене рецептура за рециклажу.
mir-prototype-efficiency-cap=⟦МИР0157⟧ Бира колико ефекти ефикасности могу смањити активну употребу енергије машине. -80% (непромењено) оставља постојеће границе употребе енергије саме. Дубље смањење може се приближити нултој употреби активне енергије без промене граница загађења.
mir-prototype-pollution-cap=⟦МИР0158⟧ Бира колико ефекти смањења загађења могу смањити загађење машина. -80% (непромењено) оставља постојеће границе загађења на миру. Дубље смањење може се приближити нултом загађењу без промене употребе енергије.
mir-prototype-speed-floor=⟦МИР0159⟧ Бира колико негативни ефекти брзине могу успорити подржане машине. -80% (непромењено) оставља постојеће границе саме; дубље вредности уклањају нормални под на скоро стоп на -99,99%.
mir-prototype-speed-cap=⟦МИР0160⟧ Бира да ли МИР оставља сама ограничења за ефекат брзине машине или уписује ново позитивно ограничење брзине. +100000% (непромењено) чува постојеће границе; ниже вредности намерно стежу веома велике бонусе за брзину.
mir-prototype-quality-cap=⟦МИР0161⟧ Бира да ли МИР оставља сама ограничења квалитета машине или пише нову позитивну граничну вредност квалитета. +100000% (непромењено) чува постојеће границе и не мења нивое квалитета или формуле вероватноће ставке.
mir-prototype-positive-power-floor=⟦МИР0162⟧ Подразумевано искључено. Када је омогућен, МИР мења експлицитне 0В прототипове активне енергије_усаге у 1В током учитавања прототипа, тако да се иконе упозорења мале снаге не појављују на ентитетима који би требало да повуку малу количину која није нула. Оставите да бисте тачно сачували прототипове са нултом потрошњом.
mir-settings-profile-import=⟦МИР0163⟧ Овде налепите стринг профила подешавања МИР-а да бисте применили извезене вредности подешавања за покретање као слој за замена током генерисања прототипа. Оставите празно за нормална подешавања. Извезите помоћу /мир-сеттингс-екпорт из активног чувања, а затим поново покрените након промене ове вредности.
mir-debug-generation-report=⟦МИР0164⟧ Када је омогућено, уписује један структурирани ред дневника по генерисаном или прескоченом стриму и основном проширењу, укључујући научне пакете, предуслове, број ефеката, статус компатибилности лабораторије и извор икона.
mir-debug-recipe-matches=⟦МИР0165⟧ Када је омогућено, уписује подударна имена рецепата за сваки генерисани ток продуктивности. Ово може бити бучно у великим пакетима модификација.
mir-debug-scripted-effects=⟦МИР0166⟧ Када је омогућено, уписује уносе у дневник извршавања када скриптоване технологије поново израчунавају глобалне ефекте или ефекте вођене догађајима.
mir-lab-incompatibility-policy=⟦МИР0167⟧ Бира шта МИР ради када одабране научне пакете не може да истражи ниједна активна лабораторија.
ips-effect-per-level-stream=Поставља примарни ефекат основног нивоа по нивоу за __1__. Повезани каснији нивои и ефекти се пропорционално скалирају. Процентуални ефекти користе процентне поене; ефекти бројања и удаљености користе своје изворне јединице.
mir-effect-per-level=Поставља канонски ефекат по нивоу за бесконачно __1__ наставак. Повезани ефекти су пропорционално скалирани од коначне основне линије ваниле. Процентуални ефекти користе процентне поене; ефекти бројања и удаљености користе своје изворне јединице.
mir-note-experimental-spoilage=⟦МИР0170⟧ Експериментално и подразумевано онемогућено у в2.1.0. Ово је глобални/скриптни ефекат на целој мапи. Постојеће понашање стека које се може покварити се не захтева док се ручно не потврди.
mir-note-agriculture-growth=⟦МИР0171⟧ Односи се на новозасађене пољопривредне културе. Постојећи засађени усеви се не мењају.
mir-note-cargo-pad-count=⟦МИР0172⟧ Логистичко истраживање специјалног свемирског доба. Повећава подлоге за слетање терета по површини и може значајно да промени логистички баланс.
mir-note-inserter-capacity=⟦МИР0173⟧ Подразумевано онемогућено. Додатни капацитет уметача може покварити убациваче контролисане струјом и смањити оптимизацију мотора.
mir-note-native-owner-managed-stream=⟦МИР0174⟧ Ако инсталирана бесконачна технологија већ поседује ову истраживачку породицу, ове исте поставке покретања конфигуришу тог власника уместо да креирају дупликат. Непромењене МИР подразумеване вредности тачно чувају власников коначни прототип. Експлицитна замена трошкова, времена, максималног нивоа и ефекта се примењују само након безбедног подударања власника; онемогућавање стрима оставља спољну технологију нетакнутом. Поново покрените Фацторио након промене поставки покретања. Максимални ниво од 0 значи бесконачан, а вредности ефекта су процентуални поени по нивоу.

