[technology-description]
more-infinite-research.recipe_productivity=⟦МИР0070⟧ Повећава продуктивност рецептура за изабране рецепте. Фацторио-ова максимална продуктивност и даље важи; додатни бесконачни нивои можда неће имати практичан ефекат када рецепт достигне свој максимум.
more-infinite-research.direct_effect=⟦МИР0071⟧ Додаје бесконачан поновљив бонус. Научни пакети се бирају из активних лабораторија, тако да се технологија може истражити са компатибилним сетовима модова.
more-infinite-research.cargo_bay_unloading_distance=⟦МИР0072⟧ Повећава максимално растојање између платформе за слетање терета и повезаних места за истовар.
more-infinite-research.cargo_landing_pad_count=⟦МИР0073⟧ Повећава број платформи за слетање терета које свака сила може да изгради по површини.
more-infinite-research.flamethrower_shooting_speed=⟦МИР0074⟧ Повећава брзину пуцања за бацаче пламена и куполе за бацање пламена.
more-infinite-research.electric_shooting_speed=⟦МИР0075⟧ Повећава брзину пуцања за електрично оружје. У ванилији ово утиче на одбрану од пражњења; са Спаце Аге-ом такође утиче на Теслино оружје када је доступна Тесла категорија муниције.
more-infinite-research.spoilage_preservation=⟦МИР0076⟧ Повећава глобални модификатор времена квара кроз ограничени ефекат скрипте. Постојећи предмети који се могу покварити могу задржати своје тренутне рокове за плијен док се не тестирају у игри.
more-infinite-research.agricultural_growth_speed=⟦МИР0077⟧ Скраћује преостало време раста за новозасађене пољопривредне торањске биљке кроз ограничени ефекат скрипте.
more-infinite-research.lab_productivity=⟦МИР0078⟧ Повећава напредак истраживања добијен из сваког конзумираног научног пакета, користећи изворни модификатор продуктивности лабораторијског истраживања.

