mir-prototype-speed-cap-bonus-300=将正速度效应限制在+300%。
mir-prototype-speed-cap-bonus-400=将正速度效应限制在 +400%。
mir-prototype-speed-cap-bonus-500=将正速度效应限制在 +500%。
