[mod-setting-description]
ips-require-space-gate=启用后，这些技术将保持锁定状态，直到在普通版中研究空间科学，或在太空时代中研究钷科学。
mir-science-pack-ingredient-policy=选择 MIR 如何将科学包添加到生成的技术中。选项按从保守到广泛的顺序排列：默认包、游戏后期包、基于进度的包，然后是所有可用包。
mir-automatic-productivity-action=选择 MIR 通过在已安装的模组配方中找到的安全生产力机会来执行的操作。禁用不执行自动发现。预览更改异星工厂日志中接受和跳过的候选人记录，而不更改研究。应用安全更改（默认）仅将符合条件的配方添加到兼容的现有 MIR 研究中。这控制着行动，而不是力量或成熟度；下面的创建复选框是单独的。所有权、回收、概率、催化剂、科学、实验室、先决条件、目标、身份、进展和周期检查始终适用。
mir-automatic-create-research=默认：关闭。禁止 对兼容的现有 MIR 研究应用安全更改；没有合适流的候选人将被跳过并报告。 On 允许合格的注册提供商在现有研究不适合时创建一种稳定的通用无限生产力技术。下面的审核数据复选框决定实验提供者是否符合资格。 MIR 从未为每个模组或配方创造一种技术，并且每一项硬安全、科学、所有权、身份、进度和循环门仍然适用。
mir-automatic-require-reviewed-data=默认：打开。仅当启用“允许新的研究创建”时，这才重要；它永远不会阻碍对现有研究的安全依恋。在许可证上，只有提供者家庭被标记为经过适用的精确版本证据的审查和支持，因此实验家庭会被跳过。 Off 允许注册实验提供商根据通用结构证据进行创建。对于最广泛的实验行为，启用研究创建并关闭此要求。任何价值都无法绕过硬安全门。
mir-automatic-compiler-mode=在分割自动生产力控制之前创建的配置文件的隐藏兼容性桥。仅当所有新控件均保持默认值时，才会采用非默认旧值。更改任何新控件以进行显式控制。
ips-enable-stream=当其配方、效果、先决条件和科学包可用时，为__1__创建生成的无限技术。禁用此选项可防止 MIR 生成该技术。
ips-cost-base-stream=第一个生成级别__1__所需的研究单位。必须至少为 1。后续级别根据该值和成本增长因子计算。
ips-cost-growth-stream=乘数应用于__1__ 的每个后续级别。使用 1 表示固定成本，使用 1.5 表示每级增长 50%，或使用 2 表示成本加倍。
ips-max-level-stream=__1__ 的最高生成级别。设置为 0 表示无限级别。
ips-research-time-stream=__1__ 每个研究单位的秒数。设置为 0 以使用 MIR 对此技术的默认设置。这不是总的研究时间；总时间还取决于研究成本、实验室数量、实验室速度和模块。
mir-enable-base-tech=允许__1__ 继续超越其香草上限作为无限技术。如果您希望 MIR 添加新的研究线而不扩展此香草链，请禁用此选项。
mir-cost-base=第一个 MIR 延续级别__1__ 所需的研究单位。如果可能，设置为 0 以继承普通链的成本模式。
mir-cost-growth=乘数应用于__1__ 的每个后续 MIR 延续级别。如果可能，设置为 0 以继承原版链的增长模式。
mir-max-level=__1__ 的最高 MIR 延续级别。设置为 0 表示无限级别。
mir-research-time=MIR 延续__1__ 的每个研究单位的秒数。如果可能，设置为 0 以继承原版链的研究单位时间。
mir-prefer-this-mod-for-competing-techs=启用后，此 mod 会删除选定的竞争无限扩展并使用自己的版本。禁用以保留其他模组的竞争版本。
mir-adjust-vanilla-weapon-speed-techs=控制当精确的无限替换覆盖范围可用时，MIR 是否从其生成的武器射击速度延续中删除火箭和炮弹速度加成。有限的香草武器射击速度技术保留了原有的奖励。
mir-use-installed-space-age-icons=启用后，MIR 可能会引用已安装的官方 DLC 图标文件，包括 Space Age 和 Elevated Rails，即使这些 mod 在基础游戏运行中被禁用。如果未安装这些 DLC 文件，请将其关闭； Factorio 无法在原型加载期间从丢失的图标文件中正常恢复。
mir-pipeline-extent-multiplier=仅启动下拉乘数，用于跨原型（而不仅仅是管道实体）识别流体盒管道范围字段。 100% 使原型保持不变，并且不加载管道通道或扫描流体盒。非 100% 值是实验性的，可能会影响定义流体箱的机器、坦克、推进器和改装原型。
mir-unrestricted-modules=实验性且打破平衡。启用后，每个现有配方都会接受所有五个模块效果，并且每个带插槽的现有模块接收器都会接受每个发现的模块类别。这不会添加模块插槽或更改模块原型，并且可以实现生产力、质量和模块化模块循环。
mir-prototype-productivity-cap=选择 MIR 是单独保留配方生产力上限，还是为每个非参数、非循环配方写入启动上限。 +300%（不变）保留现有配方上限；较低的值会缩短生产力扩展，而较高的值则会延长生产力扩展。
mir-recycling-return-chance=仅控制隐藏生成的回收配方。自动模式将正常 25% 的材料回收率减少到最多 1 除以所选生产率上限的总产量乘数。固定选择直接缩放相同的生成回报。可见的流程和配方生产力上限永远不会改变。
mir-productivity-cap-self-recycling-only=高于 1 / 回收商返回 - 1，只有具有经过验证的非生成自回收路径的生产配方才会收到所选的更高上限。等于或低于该阈值时，此复选框不起作用。引擎不变，使用正常的 25% 回报作为保守的+300% 阈值，而不改变回收配方。
mir-prototype-efficiency-cap=选择效率效果可减少机器主动能源使用的程度。 -80%（不变），不考虑现有的能源使用限制。更深入的减少可以在不改变污染限制的情况下接近零主动能源使用。
mir-prototype-pollution-cap=选择污染减少效果可以减少机器污染的程度。 -80%（不变），不考虑现有的污染限制。更深入的减排可以在不改变能源使用的情况下实现零污染。
mir-prototype-speed-floor=选择负速度影响可能会减慢受支持机器的速度。 -80%（不变）不考虑现有限制；更深的值将正常下限移除到接近停止的 -99.99%。
mir-prototype-speed-cap=选择 MIR 是单独保留机器速度影响限制还是写入新的正速度上限。 +100000%（不变）保留现有限制；较低的值会故意限制非常大的速度奖励。
mir-prototype-quality-cap=选择 MIR 是单独保留机器质量影响限制还是写入新的正质量上限。 +100000%（不变）保留现有限制，并且不会更改质量等级或物品概率公式。
mir-prototype-positive-power-floor=默认关闭。启用后，MIR 在原型加载期间将显式 0W 活动 energy_usage 原型更改为 1W，因此低功耗警告图标不会出现在应绘制微小非零量的实体上。保留零功耗原型。
mir-settings-profile-import=在此处粘贴 MIR 设置配置文件字符串，以在原型生成期间应用导出的启动设置值作为覆盖层。对于正常设置留空。使用 /mir-settings-export 从活动保存中导出，然后在更改此值后重新启动。
mir-debug-generation-report=启用后，为每个生成或跳过的流和基本扩展写入一个结构化日志行，包括科学包、先决条件、效果计数、实验室兼容性状态和图标源。
mir-debug-recipe-matches=启用后，为每个生成的生产力流写入匹配的配方名称。这在大型模组包中可能会很吵。
mir-debug-scripted-effects=启用后，当脚本技术重新计算全局或事件驱动效果时写入运行时日志条目。
mir-lab-incompatibility-policy=选择当所选科学包无法被任何活跃实验室研究时 MIR 执行的操作。
ips-effect-per-level-stream=设置__1__每个级别的主要基础层效果。相关的后续层和效果按比例缩放。百分比效应使用百分点；计数和距离效果使用其原生单位。
mir-effect-per-level=设置无限延续的规范每级效果__1__。相关效应从最终的原始基线按比例缩放。百分比效应使用百分点；计数和距离效果使用其原生单位。
mir-note-experimental-spoilage=实验性的，在 v2.1.0 中默认禁用。这是全局/地图范围内的脚本效果。在手动验证之前，不会声明现有的破坏堆栈行为。
mir-note-agriculture-growth=适用于新种植的塔式作物。现有种植作物不会重新调整规模。
mir-note-cargo-pad-count=特殊太空时代物流研究。增加每个表面的货物着陆场，可以显着改变物流平衡。
mir-note-inserter-capacity=默认禁用。额外的插入器容量可能会破坏电路控制的插入器并减少引擎优化。
mir-note-native-owner-managed-stream=如果已安装的无限技术已拥有此研究系列，则这些相同的启动设置将配置该所有者，而不是创建副本。未更改的 MIR 默认值准确地保留了所有者的最终原型。明确的成本、时间、最大级别和效果覆盖仅在安全所有者匹配后适用；禁用流不会影响外部技术。更改启动设置后重新启动异星工厂。最大级别 0 表示无限，效果值为每个级别的百分点。

