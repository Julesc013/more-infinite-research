[mod-setting-description]
ips-require-space-gate=启用后，这些科技会保持锁定，直到原版中研究太空科技，或在 Space Age 中研究钷素科技。
mir-science-pack-ingredient-policy=Controls extra science packs added to every generated technology. Configured uses each technology's normal packs. Add space science adds space science when available. Add space and promethium science adds both high-end packs when available. Use all official science packs adds base and Space Age packs without modded packs. Use all lab science packs also includes compatible modded science packs.
ips-enable-stream=禁用后可阻止在游戏中生成 __1__。
ips-cost-base-stream=__1__ 第一级所需的研究单位。即使首次解锁从更高等级开始，后续等级也会从此值开始缩放。
ips-cost-growth-stream=应用到 __1__ 上一级成本的乘数。使用 1 表示固定成本，使用更大的值表示每级难度递增。
ips-max-level-stream=设为 0 可让 __1__ 保持无限，或提供正数将其限制在该等级。
ips-research-time-stream=设为 0 可使用 __1__ 配置的默认研究时间。提供正数可覆盖每级所需秒数。
mir-enable-base-tech=允许 __1__ 在原版上限之后继续以相同进度生成无限等级。
mir-cost-base=设为 0 可复用 __1__ 的原版 1 级成本。任何正数都会覆盖无限公式使用的基础项。
mir-cost-growth=设为 0 可沿用 __1__ 的原版增长率。提供正数可改变每个无限等级的成本增长幅度。
mir-research-time=设为 0 可复用 __1__ 的原版研究时间。提供正数可覆盖每级所需秒数。
mir-prefer-this-mod-for-competing-techs=启用后，本 Mod 会移除选定的竞争性无限扩展，并使用自己的版本。禁用后会保留其他 Mod 的竞争版本。
mir-adjust-vanilla-weapon-speed-techs=控制当专用替代研究可用时，本 Mod 是否从原版武器射速科技中移除火箭弹和炮弹射速加成。
mir-debug-generation-report=启用后，会为每个已生成或已跳过的研究流和基础扩展写入一行结构化日志，包括科技包、前置科技、效果数量、研究中心兼容状态和图标来源。
mir-debug-recipe-matches=When enabled, writes matched recipe names for each generated productivity stream. This can be noisy in large mod packs.
mir-lab-incompatibility-policy=Choose whether incompatible science-pack sets are reduced to the largest lab-compatible subset or skipped entirely.

