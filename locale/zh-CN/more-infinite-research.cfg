[string-mod-setting-description]
mir-automatic-productivity-action-disabled=不执行自动发现、附加或创建。 MIR的固定研究保持不变。
mir-automatic-productivity-action-preview=发现候选者并对其进行分类，然后将接受和跳过的决策写入异星工厂日志。它不附加食谱或创建研究。
mir-automatic-productivity-action-apply=默认。发现候选者并仅将经过安全验证的配方附加到兼容的现有 MIR 研究中。它本身并不创造研究；下面的两个复选框控制创建。
mir-automatic-compiler-mode-off=旧版本的“禁用”等效项。
mir-automatic-compiler-mode-report=预览版更改的旧版等效项。
mir-automatic-compiler-mode-safe-attach=旧版本相当于应用安全更改并禁用研究创建。
mir-automatic-compiler-mode-exact-pack=旧版本相当于应用安全更改，启用研究创建并审查所需的兼容性数据。
mir-automatic-compiler-mode-safe-generate=旧版本相当于为注册实验提供者应用安全更改并启用研究创建。
mir-adjust-vanilla-weapon-speed-techs-off=禁用 MIR 可选的重叠火箭/加农炮奖励清理。
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=仅当启用的、可达到的无限技术提供精确的替代效果时，才删除 MIR 的重叠火箭/加农炮奖励。
mir-adjust-vanilla-weapon-speed-techs-always=始终移除 MIR 重叠的火箭/加农炮奖励。仅当您想要严格分离时才使用。
mir-science-pack-ingredient-policy-configured=使用每种生成技术的配置科学包，无需可选的成分扩展。米尔默认值。
mir-science-pack-ingredient-policy-space=添加空间科学（如果有）。简单的火箭后难度增加。
mir-science-pack-ingredient-policy-space-and-promethium=添加空间和钷科学（如果有）。最适合太空时代晚期的研究水槽。
mir-science-pack-ingredient-policy-space-age-progression=仅添加所选包暗示的太空时代进度包。不添加不相关的模组包。
mir-science-pack-ingredient-policy-official-progression=添加已选择的最高级官方包所暗示的缺少的官方先决条件样式包。
mir-science-pack-ingredient-policy-mod-progression=添加从修改后的科学包进程中推断出的缺失的实验室兼容包并解锁先决条件。
mir-science-pack-ingredient-policy-all-official=使用当前模组集中存在的每个官方基地和太空时代科学包。
mir-science-pack-ingredient-policy-all=使用每个活跃的实验室兼容科学包，包括改装的科学包。
mir-lab-incompatibility-policy-reduce=通过将其科学包减少到活跃实验室接受的最大组来保留技术。模组包的最安全默认值。
mir-lab-incompatibility-policy-skip=如果没有活跃实验室可以研究其选定的科学包集，则跳过该技术。更严格、更容易审核。
mir-lab-incompatibility-policy-engine-default=切勿重写选定的科学包集。 MIR 会保留可安全研究的集合不变，并在异星工厂无法研究该确切集合时忽略生成的技术。
mir-prototype-productivity-cap-engine-default=保留每个配方现有的生产力上限。没有自定义上限的配方使用异星工厂的正常 +300% 生产力奖励限制。
mir-prototype-productivity-cap-percent-25=将非参数配方生产率上限设置为 +25%。这是严格的早期上限。
mir-prototype-productivity-cap-percent-50=将非参数配方生产率上限设置为 +50%。这低于正常上限，使生产力研究更快停止提供帮助。
mir-prototype-productivity-cap-percent-75=将非参数配方生产率上限设置为 +75%。这低于正常上限，使生产力研究更快停止提供帮助。
mir-prototype-productivity-cap-percent-100=将非参数配方生产率上限设置为 +100%。这低于正常上限，使生产力研究更快停止提供帮助。
mir-prototype-productivity-cap-percent-125=将非参数配方生产率上限设置为 +125%。
mir-prototype-productivity-cap-percent-150=将非参数配方生产率上限设置为 +150%。
mir-prototype-productivity-cap-percent-200=将非参数配方生产率上限设置为 +200%。这低于正常上限，使生产力研究更快停止提供帮助。
mir-prototype-productivity-cap-percent-250=将非参数配方生产率上限设置为 +250%。这略低于正常上限。
mir-prototype-productivity-cap-percent-400=将非参数配方生产率上限设置为 +400%。这使得生产力扩展超出了正常上限。
mir-prototype-productivity-cap-percent-500=将非参数配方生产率上限设置为 +500%。这使得生产力扩展超出了正常上限。
mir-prototype-productivity-cap-percent-750=将非参数配方生产率上限设置为 +750%。
mir-prototype-productivity-cap-percent-1000=将非参数配方生产率上限设置为 +1000%。用于长时间保存，生产力研究应该保持重要。
mir-prototype-productivity-cap-percent-2500=将非参数配方生产率上限设置为 +2500%。用于很长时间的保存。
mir-prototype-productivity-cap-percent-5000=将非参数配方生产率上限设置为 +5000%。
mir-prototype-productivity-cap-percent-10000=将非参数配方生产率上限设置为 +10000%。仅用于极端长期扩展。
mir-prototype-productivity-cap-percent-25000=将非参数配方生产率上限设置为 +25000%。仅用于极端长期扩展。
mir-prototype-productivity-cap-percent-100000=将非参数配方生产率上限设置为 +100000%。对于大多数保存来说，这实际上是不受限制的。
mir-recycling-return-chance-engine-default=保持每个回收配方不变。
mir-recycling-return-chance-match-productivity-cap=隐藏生成的回收配方的安全漏洞自动还原。使用 1 / (1 + 生产力奖金)，上限为正常的 25% 回报：+400% 变为 20%，+1000% 变为约 9.09%。
mir-recycling-return-chance-percent-25=以正常 25% 的材料回报率保留隐藏生成的回收配方。
mir-recycling-return-chance-percent-20=将隐藏生成的回收配方扩大到 20% 的材料回报。
mir-recycling-return-chance-percent-15=将隐藏生成的回收配方扩大到 15% 的材料回报。
mir-recycling-return-chance-percent-12-5=将隐藏生成的回收配方扩大到 12.5% 的材料回报率。
mir-recycling-return-chance-percent-10=将隐藏生成的回收配方扩大到 10% 的材料回报。
mir-recycling-return-chance-percent-7-5=将隐藏生成的回收配方扩大到 7.5% 的材料回报率。
mir-recycling-return-chance-percent-5=将隐藏生成的回收配方扩大到 5% 的材料回报。
mir-recycling-return-chance-percent-2-5=将隐藏生成的回收配方扩大到 2.5% 的材料回报。
mir-recycling-return-chance-percent-1=将隐藏生成的回收配方扩大到 1% 的材料回报。
mir-recycling-return-chance-percent-0-5=将隐藏生成的回收配方扩大到 0.5% 的材料回报。
mir-recycling-return-chance-percent-0-1=将隐藏生成的回收配方扩大到 0.1% 的材料回报。
mir-prototype-efficiency-cap-engine-default=不考虑每台机器的能源使用效果限制。没有自定义限制的机器使用异星工厂的正常 -80% 能量使用效果上限，因此效果无法将活跃使用减少到 20% 以下。
mir-prototype-efficiency-cap-saving-25=写入-25% 的能源使用上限。能量使用效果后，主动能量使用保持在75%以上。
mir-prototype-efficiency-cap-saving-50=写入 -50% 的能源使用上限。在对受支持的机器产生能源使用影响后，主动能源使用率保持在 50% 或更高。
mir-prototype-efficiency-cap-saving-75=写入-75% 的能源使用上限。在对受支持的机器产生能源使用影响后，主动能源使用率保持在 25% 或更高。
mir-prototype-efficiency-cap-saving-90=写入-90% 的能源使用上限。主动能源使用量可降至 10%，低于正常的 20% 下限。
mir-prototype-efficiency-cap-saving-95=写入-95% 的能源使用上限。主动能源使用量可降至 5%。
mir-prototype-efficiency-cap-saving-99=写入-99% 的能源使用上限。主动能源使用量可降至 1%。
mir-prototype-efficiency-cap-saving-999=写入-99.9% 的能源使用上限。主动能源使用量可降至 0.1%。
mir-prototype-efficiency-cap-saving-9999=写入-99.99% 的能源使用上限。这是接近于零的有功能耗，而不是零功耗原型重写。
mir-prototype-pollution-cap-engine-default=不考虑每台机器的污染影响限制。没有自定义限制的机器使用异星工厂的正常 -80% 污染影响上限。
mir-prototype-pollution-cap-saving-25=写入-25% 的污染上限。污染影响后污染度保持在75%以上。
mir-prototype-pollution-cap-saving-50=写入-50% 污染上限。在污染影响到支持的机器后，污染保持在 50% 或更高。
mir-prototype-pollution-cap-saving-75=写入-75% 的污染上限。在污染影响到支持的机器后，污染保持在 25% 或更高。
mir-prototype-pollution-cap-saving-90=写入-90% 污染上限。污染可以降至 10%，低于正常的 20% 下限。
mir-prototype-pollution-cap-saving-95=写入-95% 的污染上限。污染可降至5%。
mir-prototype-pollution-cap-saving-99=写入-99% 的污染上限。污染可降至1%。
mir-prototype-pollution-cap-saving-999=写入-99.9% 的污染上限。污染可降至0.1%。
mir-prototype-pollution-cap-saving-9999=写入-99.99% 的污染上限。这是近乎零污染的，而不是运行时污染脚本。
mir-prototype-speed-floor-engine-default=保留每台机器的负速度限制。没有自定义限制的机器使用异星工厂的正常 -80% 底线并保持至少 20% 的速度。
mir-prototype-speed-floor-saving-25=将负速度影响限制在 -25%，保留至少 75% 的速度。
mir-prototype-speed-floor-saving-50=将负速度影响限制在 -50%，至少保留 50% 的速度。
mir-prototype-speed-floor-saving-75=将负速度影响限制在 -75%，保留至少 25% 的速度。
mir-prototype-speed-floor-saving-90=允许负速度影响降至-90%，至少保留 10% 的速度。
mir-prototype-speed-floor-saving-95=允许负速度影响降至-95%，至少保留 5% 的速度。
mir-prototype-speed-floor-saving-99=允许负速度影响降至-99%，至少保留 1% 的速度。
mir-prototype-speed-floor-saving-999=允许负速度影响降至 -99.9%，至少留下 0.1% 的速度。
mir-prototype-speed-floor-saving-9999=允许负速度影响降至-99.99%，这是异星工厂原型的最低限制。这是接近停止的速度，而不是零或负的制作速度。
mir-prototype-speed-cap-engine-default=不考虑每台机器的速度限制。没有自定义限制的机器使用异星工厂非常高的+100000% 速度效果上限。
mir-prototype-speed-cap-bonus-25=将正速度效应限制在 +25%。
mir-prototype-speed-cap-bonus-50=将正速度效应限制在 +50%。使用它可以严格限制速度奖励。
mir-prototype-speed-cap-bonus-75=将正速度效应限制在 +75%。
mir-prototype-speed-cap-bonus-100=将正速度效应限制在 +100%。
mir-prototype-speed-cap-bonus-125=将正速度效应限制在 +125%。
