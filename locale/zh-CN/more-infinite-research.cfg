[technology-description]
more-infinite-research.recipe_productivity=提高所选配方的配方生产率。异星工厂的最高生产力上限仍然适用；一旦配方达到上限，额外的无限级别可能没有实际效果。
more-infinite-research.direct_effect=添加无限可重复的奖励。科学包是从活跃的实验室中选择的，因此该技术仍然可以通过兼容的模组集进行研究。
more-infinite-research.cargo_bay_unloading_distance=提高货运着陆平台与相连卸载舱之间的最大距离。
more-infinite-research.cargo_landing_pad_count=提高每个势力在每个表面可建造的货运着陆平台数量。
more-infinite-research.flamethrower_shooting_speed=提高火焰喷射器武器和火焰喷射器炮塔的射击速度。
more-infinite-research.electric_shooting_speed=提高电动武器的射击速度。在原版中，这会影响放电防御；在太空时代，当特斯拉弹药类别可用时，它也会影响特斯拉武器。
more-infinite-research.spoilage_preservation=通过有界脚本效果增加全局破坏时间修改器。现有的可破坏物品可能会保留当前的破坏期限，直到在游戏中进行测试。
more-infinite-research.agricultural_growth_speed=通过有限的脚本效果缩短新种植的农业塔式植物的剩余生长时间。
more-infinite-research.lab_productivity=使用本机实验室研究生产力修改器，增加从每个消耗的科学包中获得的研究进度。

