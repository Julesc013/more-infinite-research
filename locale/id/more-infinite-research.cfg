[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Tidak melakukan penemuan, lampiran, atau pembuatan otomatis. Penelitian tetap MIR tetap tidak berubah.
mir-automatic-productivity-action-preview=Menemukan dan mengklasifikasikan kandidat, lalu menulis keputusan yang diterima dan dilewati ke log Factorio. Itu tidak melampirkan resep atau membuat penelitian.
mir-automatic-productivity-action-apply=Bawaan. Temukan kandidat dan hanya lampirkan resep yang terbukti keamanannya pada penelitian MIR yang sudah ada dan kompatibel. Ia tidak menciptakan penelitian dengan sendirinya; dua kotak centang di bawah mengatur pembuatan.
mir-automatic-compiler-mode-off=Warisan yang setara dengan Penyandang Cacat.
mir-automatic-compiler-mode-report=Warisan yang setara dengan perubahan Pratinjau.
mir-automatic-compiler-mode-safe-attach=Warisan yang setara dengan Terapkan perubahan aman dengan kreasi penelitian dinonaktifkan.
mir-automatic-compiler-mode-exact-pack=Warisan yang setara dengan Terapkan perubahan yang aman dengan mengaktifkan pembuatan penelitian dan meninjau data kompatibilitas yang diperlukan.
mir-automatic-compiler-mode-safe-generate=Warisan yang setara dengan Terapkan perubahan yang aman dengan pembuatan penelitian diaktifkan untuk penyedia eksperimental terdaftar.
mir-adjust-vanilla-weapon-speed-techs-off=Nonaktifkan pembersihan bonus roket/meriam opsional yang tumpang tindih dari MIR.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Hapus bonus roket/meriam MIR yang tumpang tindih hanya jika teknologi tak terbatas yang diaktifkan dan dapat dijangkau memberikan efek penggantian yang tepat.
mir-adjust-vanilla-weapon-speed-techs-always=Selalu hilangkan bonus roket/meriam MIR yang tumpang tindih. Gunakan hanya jika Anda ingin pemisahan yang ketat.
mir-science-pack-ingredient-policy-configured=Gunakan paket sains terkonfigurasi dari setiap teknologi yang dihasilkan tanpa perluasan bahan opsional. bawaan MIR.
mir-science-pack-ingredient-policy-space=Tambahkan ilmu luar angkasa bila tersedia. Peningkatan kesulitan pasca-roket yang sederhana.
mir-science-pack-ingredient-policy-space-and-promethium=Tambahkan ilmu ruang dan promethium bila tersedia. Terbaik untuk penelitian Zaman Luar Angkasa yang sangat terlambat.
mir-science-pack-ingredient-policy-space-age-progression=Tambahkan hanya paket perkembangan Space Age yang tersirat dalam paket yang dipilih. Tidak menambahkan paket modded yang tidak terkait.
mir-science-pack-ingredient-policy-official-progression=Tambahkan paket gaya prasyarat resmi yang hilang yang tersirat dalam paket resmi tercanggih yang sudah dipilih.
mir-science-pack-ingredient-policy-mod-progression=Tambahkan paket kompatibel lab yang hilang yang disimpulkan dari perkembangan paket sains yang dimodifikasi dan buka prasyarat.
mir-science-pack-ingredient-policy-all-official=Gunakan setiap pangkalan resmi dan paket sains Space Age yang ada di set mod saat ini.
mir-science-pack-ingredient-policy-all=Gunakan setiap paket sains aktif yang kompatibel dengan laboratorium, termasuk paket sains yang telah dimodifikasi.
mir-lab-incompatibility-policy-reduce=Pertahankan teknologi dengan mengurangi paket sainsnya ke jumlah terbesar yang dapat diterima oleh laboratorium aktif. Default teraman untuk paket mod.
mir-lab-incompatibility-policy-skip=Lewati teknologi jika tidak ada laboratorium aktif yang dapat meneliti rangkaian paket sains pilihannya. Lebih ketat dan lebih mudah untuk diaudit.
mir-lab-incompatibility-policy-engine-default=Jangan pernah menulis ulang kumpulan paket sains yang dipilih. MIR mempertahankan kumpulan yang dapat diteliti dengan aman tidak berubah dan menghilangkan teknologi yang dihasilkan ketika Factorio tidak dapat meneliti kumpulan persis tersebut.
mir-prototype-productivity-cap-engine-default=Biarkan batas produktivitas masing-masing resep tetap ada. Resep tanpa batasan khusus menggunakan batas bonus produktivitas normal +300% Factorio.
mir-prototype-productivity-cap-percent-25=Tetapkan batas produktivitas resep non-parameter menjadi +25%. Ini adalah batasan awal yang ketat.
mir-prototype-productivity-cap-percent-50=Tetapkan batas produktivitas resep non-parameter menjadi +50%. Ini berada di bawah batas normal dan membuat penelitian produktivitas berhenti membantu lebih cepat.
mir-prototype-productivity-cap-percent-75=Tetapkan batas produktivitas resep non-parameter menjadi +75%. Ini berada di bawah batas normal dan membuat penelitian produktivitas berhenti membantu lebih cepat.
mir-prototype-productivity-cap-percent-100=Tetapkan batas produktivitas resep non-parameter menjadi +100%. Ini berada di bawah batas normal dan membuat penelitian produktivitas berhenti membantu lebih cepat.
mir-prototype-productivity-cap-percent-125=Tetapkan batas produktivitas resep non-parameter menjadi +125%.
mir-prototype-productivity-cap-percent-150=Tetapkan batas produktivitas resep non-parameter menjadi +150%.
mir-prototype-productivity-cap-percent-200=Tetapkan batas produktivitas resep non-parameter menjadi +200%. Ini berada di bawah batas normal dan membuat penelitian produktivitas berhenti membantu lebih cepat.
mir-prototype-productivity-cap-percent-250=Tetapkan batas produktivitas resep non-parameter menjadi +250%. Angka ini sedikit di bawah batas normal.
mir-prototype-productivity-cap-percent-400=Tetapkan batas produktivitas resep non-parameter menjadi +400%. Hal ini memperluas skala produktivitas melampaui batas normal.
mir-prototype-productivity-cap-percent-500=Tetapkan batas produktivitas resep non-parameter menjadi +500%. Hal ini memperluas skala produktivitas melampaui batas normal.
mir-prototype-productivity-cap-percent-750=Tetapkan batas produktivitas resep non-parameter menjadi +750%.
mir-prototype-productivity-cap-percent-1000=Tetapkan batas produktivitas resep non-parameter menjadi +1000%. Gunakan untuk penyimpanan jangka panjang di mana penelitian produktivitas harus tetap penting.
mir-prototype-productivity-cap-percent-2500=Tetapkan batas produktivitas resep non-parameter menjadi +2500%. Gunakan untuk penyimpanan yang sangat lama.
mir-prototype-productivity-cap-percent-5000=Tetapkan batas produktivitas resep non-parameter menjadi +5000%.
mir-prototype-productivity-cap-percent-10000=Tetapkan batas produktivitas resep non-parameter menjadi +10.000%. Gunakan hanya untuk penskalaan jangka panjang yang ekstrem.
mir-prototype-productivity-cap-percent-25000=Tetapkan batas produktivitas resep non-parameter menjadi +25000%. Gunakan hanya untuk penskalaan jangka panjang yang ekstrem.
mir-prototype-productivity-cap-percent-100000=Tetapkan batas produktivitas resep non-parameter menjadi +100000%. Ini secara efektif terbuka untuk sebagian besar penyelamatan.
mir-recycling-return-chance-engine-default=Biarkan setiap resep daur ulang tidak berubah.
mir-recycling-return-chance-match-productivity-cap=Pengurangan otomatis yang aman untuk eksploitasi untuk resep daur ulang tersembunyi yang dihasilkan. Menggunakan 1 / (1 + bonus produktivitas), dibatasi pada pengembalian normal 25%: +400% menjadi 20%, dan +1000% menjadi sekitar 9,09%.
mir-recycling-return-chance-percent-25=Simpan resep daur ulang yang dihasilkan secara tersembunyi dengan pengembalian bahan normal 25%.
mir-recycling-return-chance-percent-20=Skalakan resep daur ulang yang dihasilkan secara tersembunyi hingga pengembalian material sebesar 20%.
mir-recycling-return-chance-percent-15=Skalakan resep daur ulang yang dihasilkan secara tersembunyi hingga pengembalian material sebesar 15%.
mir-recycling-return-chance-percent-12-5=Skalakan resep daur ulang yang dihasilkan secara tersembunyi hingga pengembalian material sebesar 12,5%.
mir-recycling-return-chance-percent-10=Skalakan resep daur ulang yang dihasilkan secara tersembunyi hingga pengembalian material sebesar 10%.
mir-recycling-return-chance-percent-7-5=Skalakan resep daur ulang yang dihasilkan secara tersembunyi hingga pengembalian material sebesar 7,5%.
mir-recycling-return-chance-percent-5=Skalakan resep daur ulang yang dihasilkan secara tersembunyi hingga pengembalian material sebesar 5%.
mir-recycling-return-chance-percent-2-5=Skalakan resep daur ulang yang dihasilkan secara tersembunyi hingga pengembalian material sebesar 2,5%.
mir-recycling-return-chance-percent-1=Skalakan resep daur ulang yang dihasilkan secara tersembunyi hingga pengembalian material sebesar 1%.
mir-recycling-return-chance-percent-0-5=Skalakan resep daur ulang yang dihasilkan secara tersembunyi hingga pengembalian material sebesar 0,5%.
mir-recycling-return-chance-percent-0-1=Skalakan resep daur ulang yang dihasilkan secara tersembunyi hingga pengembalian material sebesar 0,1%.
mir-prototype-efficiency-cap-engine-default=Biarkan batas efek penggunaan energi setiap mesin saja. Mesin tanpa batas khusus menggunakan batas efek penggunaan energi normal Factorio -80%, sehingga efek tidak dapat mengurangi penggunaan aktif di bawah 20%.
mir-prototype-efficiency-cap-saving-25=Tulis batas penggunaan energi -25%. Penggunaan energi aktif tetap pada 75% atau lebih setelah efek penggunaan energi.
mir-prototype-efficiency-cap-saving-50=Tulis batas penggunaan energi -50%. Penggunaan energi aktif tetap pada 50% atau lebih setelah efek penggunaan energi pada mesin yang didukung.
mir-prototype-efficiency-cap-saving-75=Tulis batas penggunaan energi -75%. Penggunaan energi aktif tetap pada 25% atau lebih setelah efek penggunaan energi pada mesin yang didukung.
mir-prototype-efficiency-cap-saving-90=Tulis batas penggunaan energi -90%. Penggunaan energi aktif dapat turun hingga 10%, berada di bawah batas normal 20%.
mir-prototype-efficiency-cap-saving-95=Tulis batas penggunaan energi -95%. Penggunaan energi aktif bisa turun hingga 5%.
mir-prototype-efficiency-cap-saving-99=Tulis batas penggunaan energi -99%. Penggunaan energi aktif bisa turun hingga 1%.
mir-prototype-efficiency-cap-saving-999=Tulis batas penggunaan energi -99,9%. Penggunaan energi aktif bisa turun hingga 0,1%.
mir-prototype-efficiency-cap-saving-9999=Tulis batas penggunaan energi -99,99%. Ini adalah penggunaan energi aktif yang mendekati nol, bukan penulisan ulang prototipe tanpa daya.
mir-prototype-pollution-cap-engine-default=Biarkan saja batas efek polusi setiap mesin. Mesin tanpa batas khusus menggunakan batas efek polusi normal -80% dari Factorio.
mir-prototype-pollution-cap-saving-25=Tulis batas polusi -25%. Polusi tetap pada 75% atau lebih setelah dampak polusi.
mir-prototype-pollution-cap-saving-50=Tulis batas polusi -50%. Polusi tetap pada 50% atau lebih setelah dampak polusi pada mesin yang didukung.
mir-prototype-pollution-cap-saving-75=Tulis batas polusi -75%. Polusi tetap pada 25% atau lebih setelah dampak polusi pada mesin yang didukung.
mir-prototype-pollution-cap-saving-90=Tulis batas polusi -90%. Polusi bisa turun hingga 10%, berada di bawah batas normal 20%.
mir-prototype-pollution-cap-saving-95=Tulis batas polusi -95%. Polusi bisa turun hingga 5%.
mir-prototype-pollution-cap-saving-99=Tulis batas polusi -99%. Polusi bisa turun hingga 1%.
mir-prototype-pollution-cap-saving-999=Tulis batas polusi -99,9%. Polusi bisa turun hingga 0,1%.
mir-prototype-pollution-cap-saving-9999=Tulis batas polusi -99,99%. Ini adalah polusi yang mendekati nol, bukan skrip polusi runtime.
mir-prototype-speed-floor-engine-default=Biarkan saja batas kecepatan negatif setiap mesin. Mesin tanpa batas khusus menggunakan lantai normal -80% Factorio dan menjaga kecepatan setidaknya 20%.
mir-prototype-speed-floor-saving-25=Jepit efek kecepatan negatif pada -25%, sisakan setidaknya kecepatan 75%.
mir-prototype-speed-floor-saving-50=Jepit efek kecepatan negatif pada -50%, sisakan setidaknya kecepatan 50%.
mir-prototype-speed-floor-saving-75=Jepit efek kecepatan negatif pada -75%, sisakan setidaknya kecepatan 25%.
mir-prototype-speed-floor-saving-90=Biarkan efek kecepatan negatif turun hingga -90%, sisakan setidaknya 10% kecepatan.
mir-prototype-speed-floor-saving-95=Biarkan efek kecepatan negatif turun hingga -95%, sisakan setidaknya kecepatan 5%.
mir-prototype-speed-floor-saving-99=Biarkan efek kecepatan negatif turun hingga -99%, sisakan setidaknya 1% kecepatan.
mir-prototype-speed-floor-saving-999=Biarkan efek kecepatan negatif turun hingga -99,9%, sisakan setidaknya kecepatan 0,1%.
mir-prototype-speed-floor-saving-9999=Memungkinkan efek kecepatan negatif hingga -99,99%, batas prototipe Factorio terendah. Ini adalah kecepatan kerajinan yang hampir berhenti, bukan kecepatan nol atau negatif.
mir-prototype-speed-cap-engine-default=Biarkan batas kecepatan masing-masing mesin saja. Mesin tanpa batas khusus menggunakan batas efek kecepatan +100.000% yang sangat tinggi dari Factorio.
mir-prototype-speed-cap-bonus-25=Jepit efek kecepatan positif pada +25%.
mir-prototype-speed-cap-bonus-50=Jepit efek kecepatan positif pada +50%. Gunakan ini untuk membatasi bonus kecepatan.
mir-prototype-speed-cap-bonus-75=Jepit efek kecepatan positif pada +75%.
mir-prototype-speed-cap-bonus-100=Jepit efek kecepatan positif pada +100%.
mir-prototype-speed-cap-bonus-125=Jepit efek kecepatan positif pada +125%.
mir-prototype-speed-cap-bonus-150=Jepit efek kecepatan positif pada +150%.
mir-prototype-speed-cap-bonus-200=Jepit efek kecepatan positif pada +200%.
mir-prototype-speed-cap-bonus-250=Jepit efek kecepatan positif pada +250%.
