[mod-setting-description]
ips-require-space-gate=Jika diaktifkan, teknologi ini akan tetap terkunci hingga ilmu luar angkasa diteliti di vanilla, atau ilmu promethium diteliti di Space Age.
mir-science-pack-ingredient-policy=Memilih cara MIR menambahkan paket sains ke teknologi yang dihasilkan. Opsi diurutkan dari konservatif hingga luas: paket default, paket permainan akhir, paket berbasis perkembangan, lalu semua paket yang tersedia.
mir-automatic-productivity-action=Memilih apa yang dilakukan MIR dengan peluang produktivitas aman yang ditemukan dalam resep mod terinstal. Disabled tidak melakukan penemuan otomatis. Pratinjau perubahan catatan yang diterima dan dilewati kandidat di log Factorio tanpa mengubah penelitian. Terapkan perubahan aman (default) menambahkan resep yang memenuhi syarat hanya ke penelitian MIR yang kompatibel. Hal ini mengendalikan tindakan, bukan kekuatan atau kedewasaan; kotak centang pembuatan di bawah ini terpisah. Kepemilikan, daur ulang, probabilitas, katalis, sains, laboratorium, prasyarat, target, identitas, perkembangan, dan pemeriksaan siklus selalu berlaku.
mir-automatic-create-research=Bawaan: mati. Dilarang Menerapkan perubahan aman pada penelitian MIR yang sudah ada dan kompatibel; kandidat tanpa aliran yang sesuai dilewati dan dilaporkan. On memungkinkan penyedia terdaftar yang memenuhi syarat untuk menciptakan satu teknologi produktivitas generik tak terbatas yang stabil ketika tidak ada penelitian yang cocok. Kotak centang data yang ditinjau di bawah menentukan apakah penyedia eksperimental memenuhi syarat. MIR tidak pernah menciptakan satu teknologi per mod atau resep, dan setiap keamanan, sains, kepemilikan, identitas, perkembangan, dan gerbang siklus tetap berlaku.
mir-automatic-require-reviewed-data=Bawaan: aktif. Hal ini hanya penting jika Izinkan pembuatan penelitian baru aktif; itu tidak pernah menghalangi keterikatan yang aman pada penelitian yang ada. Pada izin hanya keluarga penyedia yang ditandai telah ditinjau dan didukung oleh bukti versi persis yang berlaku, sehingga keluarga eksperimental dilewati. Off mengizinkan penyedia eksperimen terdaftar untuk membuat dari bukti struktural umum. Untuk perilaku eksperimental yang lebih luas, aktifkan pembuatan penelitian dan nonaktifkan persyaratan ini. Tidak ada nilai yang dapat melewati gerbang pengaman yang keras.
mir-automatic-compiler-mode=Jembatan kompatibilitas tersembunyi untuk profil yang dibuat sebelum kontrol produktivitas otomatis terpisah. Nilai warisan non-default hanya berlaku ketika semua kontrol baru tetap pada nilai defaultnya. Ubah kontrol baru untuk mengambil kontrol eksplisit.
ips-enable-stream=Menciptakan teknologi tak terbatas yang dihasilkan untuk __1__ ketika resep, efek, prasyarat, dan paket sainsnya tersedia. Nonaktifkan ini untuk mencegah MIR menghasilkan teknologi ini.
ips-cost-base-stream=Unit penelitian diperlukan untuk level pertama __1__ yang dihasilkan. Minimal harus 1. Level selanjutnya dihitung dari nilai ini dan faktor pertumbuhan biaya.
ips-cost-growth-stream=Pengganda diterapkan pada setiap level selanjutnya dari __1__. Gunakan 1 untuk biaya tetap, 1,5 untuk pertumbuhan 50% per tingkat, atau 2 untuk biaya dua kali lipat.
ips-max-level-stream=Level tertinggi yang dihasilkan untuk __1__. Setel ke 0 untuk level tak terbatas.
ips-research-time-stream=Detik per unit penelitian untuk __1__. Setel ke 0 untuk menggunakan default MIR untuk teknologi ini. Ini bukan total waktu penelitian; total waktu juga tergantung pada biaya penelitian, jumlah lab, kecepatan lab, dan modul.
mir-enable-base-tech=Memungkinkan __1__ untuk terus melewati batas vanilla sebagai teknologi tanpa batas. Nonaktifkan ini jika Anda ingin MIR menambahkan jalur penelitian baru tanpa memperluas rantai vanilla ini.
mir-cost-base=Unit penelitian diperlukan untuk tingkat kelanjutan MIR pertama __1__. Setel ke 0 untuk mewarisi pola biaya rantai vanilla jika memungkinkan.
mir-cost-growth=Pengganda diterapkan pada setiap level kelanjutan MIR selanjutnya dari __1__. Setel ke 0 untuk mewarisi pola pertumbuhan rantai vanilla jika memungkinkan.
mir-max-level=Level kelanjutan MIR tertinggi untuk __1__. Setel ke 0 untuk level tak terbatas.
mir-research-time=Detik per unit penelitian untuk kelanjutan MIR __1__. Setel ke 0 untuk mewarisi waktu unit penelitian rantai vanilla bila memungkinkan.
mir-prefer-this-mod-for-competing-techs=Saat diaktifkan, mod ini menghapus ekstensi tak terbatas pesaing yang dipilih dan menggunakan versinya sendiri. Nonaktifkan untuk mempertahankan versi pesaing dari mod lain.
mir-adjust-vanilla-weapon-speed-techs=Mengontrol apakah MIR menghilangkan bonus kecepatan roket dan peluru meriam dari kelanjutan kecepatan penembakan senjata yang dihasilkannya ketika cakupan penggantian tak terbatas yang tepat tersedia. Teknologi kecepatan penembakan senjata vanilla yang terbatas mempertahankan bonus aslinya.
mir-use-installed-space-age-icons=Saat diaktifkan, MIR dapat mereferensikan file ikon DLC resmi yang diinstal, termasuk Space Age dan Elevated Rails, bahkan ketika mod tersebut dinonaktifkan untuk menjalankan game dasar. Biarkan ini tidak aktif jika file DLC tersebut tidak diinstal; Factorio tidak dapat memulihkan dengan baik dari file ikon yang hilang selama pemuatan prototipe.
mir-pipeline-extent-multiplier=Pengganda dropdown khusus startup untuk bidang jangkauan pipa kotak fluida yang dikenali di seluruh prototipe, tidak hanya entitas pipa. 100% membiarkan prototipe tidak berubah dan tidak memuat jalur pipa atau kotak cairan pemindaian. Nilai di luar 100% bersifat eksperimental dan dapat memengaruhi mesin, tangki, pendorong, dan prototipe yang dimodifikasi yang menentukan kotak cairan.
mir-unrestricted-modules=Eksperimental dan pemecah keseimbangan. Jika diaktifkan, setiap resep yang ada menerima kelima efek modul dan setiap penerima modul yang ada dengan slot menerima setiap kategori modul yang ditemukan. Hal ini tidak menambah slot modul atau mengubah prototipe modul, dan dapat mengaktifkan produktivitas, kualitas, dan loop modul yang dimodifikasi.
mir-prototype-productivity-cap=Memilih apakah MIR membiarkan batasan produktivitas resep atau menulis batasan startup untuk setiap resep non-parameter dan non-daur ulang. +300% (tidak berubah) mempertahankan batas resep yang ada; nilai yang lebih rendah memperpendek skala produktivitas, sedangkan nilai yang lebih tinggi memperluasnya.
mir-recycling-return-chance=Hanya mengontrol resep daur ulang yang dihasilkan secara tersembunyi. Mode otomatis mengurangi pengembalian material normal sebesar 25% menjadi paling banyak 1 dibagi dengan total pengganda keluaran pada batas produktivitas yang dipilih. Pilihan tetap menskalakan pengembalian yang dihasilkan sama secara langsung. Proses yang terlihat dan batasan produktivitas resep tidak pernah berubah.
mir-productivity-cap-self-recycling-only=Di atas 1 / pengembalian pendaur ulang - 1, hanya resep produksi dengan jalur daur ulang mandiri non-generatif yang terbukti menerima batas lebih tinggi yang dipilih. Pada atau di bawah ambang batas tersebut, kotak centang ini tidak berpengaruh. Mesin tidak berubah menggunakan pengembalian normal 25% sebagai ambang batas konservatif +300% tanpa mengubah resep daur ulang.
mir-prototype-efficiency-cap=Memilih seberapa jauh efek efisiensi dapat mengurangi penggunaan energi aktif mesin. -80% (tidak berubah) mengabaikan batasan penggunaan energi yang ada. Pengurangan yang lebih besar dapat mendekati nol penggunaan energi aktif tanpa mengubah batas polusi.
mir-prototype-pollution-cap=Memilih seberapa jauh efek pengurangan polusi dapat mengurangi polusi mesin. -80% (tidak berubah) mengabaikan batas polusi yang ada. Pengurangan yang lebih mendalam dapat mendekati nol polusi tanpa mengubah penggunaan energi.
mir-prototype-speed-floor=Memilih seberapa jauh efek kecepatan negatif dapat memperlambat mesin yang didukung. -80% (tidak berubah) membiarkan batasan yang ada; nilai yang lebih dalam menurunkan batas bawah normal hingga hampir berhenti di -99,99%.
mir-prototype-speed-cap=Memilih apakah MIR membiarkan batas efek kecepatan mesin atau menulis batas kecepatan positif baru. +100000% (tidak berubah) mempertahankan batas yang ada; nilai yang lebih rendah sengaja menjepit bonus kecepatan yang sangat besar.
mir-prototype-quality-cap=Memilih apakah MIR membiarkan batas efek kualitas mesin atau menetapkan batasan kualitas positif yang baru. +100000% (tidak berubah) mempertahankan batas yang ada dan tidak mengubah tingkatan kualitas atau rumus probabilitas item.
mir-prototype-positive-power-floor=Defaultnya nonaktif. Saat diaktifkan, MIR mengubah prototipe penggunaan_energi aktif 0W secara eksplisit menjadi 1W selama pemuatan prototipe sehingga ikon peringatan berdaya rendah tidak muncul pada entitas yang seharusnya menarik jumlah kecil yang bukan nol. Berhentilah untuk mempertahankan prototipe tanpa daya.
mir-settings-profile-import=Tempel string profil pengaturan MIR di sini untuk menerapkan nilai pengaturan startup yang diekspor sebagai lapisan override selama pembuatan prototipe. Biarkan kosong untuk pengaturan normal. Ekspor dengan /mir-settings-export dari penyimpanan aktif, lalu mulai ulang setelah mengubah nilai ini.
mir-debug-generation-report=Jika diaktifkan, tulis satu baris log terstruktur per aliran dan ekstensi dasar yang dihasilkan atau dilewati, termasuk paket sains, prasyarat, jumlah efek, status kompatibilitas lab, dan sumber ikon.
mir-debug-recipe-matches=Saat diaktifkan, tulis nama resep yang cocok untuk setiap aliran produktivitas yang dihasilkan. Ini bisa menimbulkan kebisingan dalam paket mod besar.
mir-debug-scripted-effects=Jika diaktifkan, menulis entri log waktu proses ketika teknologi yang diberi skrip menghitung ulang efek global atau yang dipicu oleh peristiwa.
mir-lab-incompatibility-policy=Memilih apa yang dilakukan MIR ketika paket sains yang dipilih tidak dapat diteliti oleh laboratorium aktif mana pun.
ips-effect-per-level-stream=Menetapkan efek tingkat dasar utama per level untuk __1__. Tingkatan dan efek terkait selanjutnya akan diskalakan secara proporsional. Efek persentase menggunakan poin persentase; efek hitungan dan jarak menggunakan satuan aslinya.
mir-effect-per-level=Mengatur efek kanonik per level untuk kelanjutan __1__ yang tak terbatas. Efek terkait diskalakan secara proporsional dari baseline akhir vanilla. Efek persentase menggunakan poin persentase; efek hitungan dan jarak menggunakan satuan aslinya.
mir-note-experimental-spoilage=Eksperimental dan dinonaktifkan secara default di v2.1.0. Ini adalah efek skrip global/seluruh peta. Perilaku tumpukan rusak yang ada tidak diklaim hingga divalidasi secara manual.
mir-note-agriculture-growth=Berlaku untuk tanaman menara pertanian yang baru ditanam. Tanaman yang sudah ditanam tidak diubah skalanya.
mir-note-cargo-pad-count=Penelitian logistik Zaman Luar Angkasa Khusus. Meningkatkan landasan pendaratan kargo per permukaan dan dapat mengubah keseimbangan logistik secara signifikan.
mir-note-inserter-capacity=Dinonaktifkan secara bawaan. Kapasitas inserter ekstra dapat merusak inserter yang dikontrol sirkuit dan mengurangi optimalisasi mesin.
mir-note-native-owner-managed-stream=Jika teknologi tak terbatas yang terinstal sudah memiliki keluarga penelitian ini, pengaturan startup yang sama ini akan mengonfigurasi pemilik tersebut alih-alih membuat duplikat. Default MIR yang tidak diubah mempertahankan prototipe akhir pemiliknya dengan tepat. Penggantian biaya, waktu, level maksimum, dan efek eksplisit hanya berlaku setelah pemilik aman cocok; menonaktifkan aliran membuat teknologi eksternal tidak tersentuh. Mulai ulang Factorio setelah mengubah pengaturan startup. Level maksimum 0 berarti tak terbatas, dan nilai efek adalah poin persentase per level.

