[technology-description]
more-infinite-research.recipe_productivity=Meningkatkan produktivitas resep untuk resep yang dipilih. Batas produktivitas maksimum Factorio masih berlaku; level tambahan yang tak terbatas mungkin tidak memiliki efek praktis setelah resep mencapai batasnya.
more-infinite-research.direct_effect=Menambahkan bonus berulang yang tak terbatas. Paket sains dipilih dari laboratorium aktif sehingga teknologinya tetap dapat diteliti dengan set mod yang kompatibel.
more-infinite-research.cargo_bay_unloading_distance=Meningkatkan jarak maksimum antara landasan pendaratan kargo dan ruang bongkar muat yang terhubung.
more-infinite-research.cargo_landing_pad_count=Meningkatkan jumlah landasan pendaratan kargo yang dapat dibangun oleh setiap pasukan per permukaan.
more-infinite-research.flamethrower_shooting_speed=Meningkatkan kecepatan menembak untuk senjata penyembur api dan menara penyembur api.
more-infinite-research.electric_shooting_speed=Meningkatkan kecepatan menembak senjata listrik. Dalam vanilla, hal ini mempengaruhi pertahanan pelepasan; dengan Space Age juga mempengaruhi senjata Tesla ketika kategori amunisi tesla tersedia.
more-infinite-research.spoilage_preservation=Meningkatkan pengubah waktu rusak global melalui efek skrip terbatas. Item rusak yang ada mungkin tetap memenuhi tenggat waktu kerusakannya hingga diuji dalam game.
more-infinite-research.agricultural_growth_speed=Mempersingkat sisa waktu pertumbuhan tanaman menara pertanian yang baru ditanam melalui efek skrip terbatas.
more-infinite-research.lab_productivity=Meningkatkan kemajuan penelitian yang diperoleh dari setiap paket sains yang dikonsumsi, menggunakan pengubah produktivitas penelitian laboratorium asli.

