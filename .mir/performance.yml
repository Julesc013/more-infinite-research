schema: 1

release: 3.2.0
factorio_line: "2.1"
budget_manifest: .mir/performance-budgets.json
accepted_evidence: .mir/evidence/3.2.0-performance-regression.json

measurement_policy:
  - Budgets are set before performance optimization and include host-load headroom.
  - Release regression evidence uses the sealed 3.1.9 archive and the exact final 3.2.0 candidate on one Factorio 2.1.11 installation.
  - At least five measured runs per package follow one warm-up and a paired balanced baseline-candidate order.
  - Each lane passes when median regression is at most 20 percent or its absolute increase is within the declared noise allowance.
  - Runtime scenario timings include Factorio process startup and save creation.
  - Local-pack timings include dependency resolution, load, diagnostics parsing, and report conversion.
  - A skipped load never counts as performance evidence.
  - Load-only overhaul observations do not create compatibility support claims.
  - Source-instrumented coverage measurements do not create archive compatibility claims.
  - The split 100000-scale campaigns cover recipes technologies effects graph edges a 25000-node SCC and randomized insertion order without conflating independent stress domains.
  - Factorio runtime materializes 60000 technologies below the engine hard limit of 65535 while the same compiler graph implementation validates 100000 in-memory planned technologies.
  - The recipe engine fixture materializes 1000 structural candidates while MIR's production canonicalizer indexes and fingerprints 100000 in-memory recipe prototypes without crossing Factorio's prototype limit.
  - Adversarial SCCs stay in MIR's iterative graph validator because Factorio's recursive post-load cycle checker cannot safely materialize the 25000-node cycle.
  - Paired evidence preserves maximum-observed artifact-volume counters and per-run telemetry fingerprints for diagnostics-off and diagnostics-on candidate runs.
  - A non-shipped symmetric probe times equivalent recipe snapshot planning final graph assertion and postcondition boundaries in both exact archives without changing either package.
  - Compiler phase lanes use measured diagnostics-off probe rows while artifact volume uses the candidate public CompilerEvidence telemetry from diagnostics-off and diagnostics-on rows.
  - Sub-100-millisecond phase lanes retain the 20 percent relative ceiling but use characterized absolute allowances of 0.10 seconds for snapshot and 0.05 seconds for postconditions; graph and planning retain 0.01 seconds.

required_surfaces:
  - base
  - space-age
  - scoped-caps-off
  - scoped-caps-on
  - diagnostics-off
  - diagnostics-on
  - medium-pack
  - large-pack
  - large-synthetic-graph
  - large-synthetic-recipes
  - full-matrix

compiler_telemetry:
  schema: 1
  required_counters:
    - recipes
    - technologies
    - effects
    - graph_edges
    - graph_components
    - cyclic_components
    - recipe_index_scans
    - recipe_fact_copies
    - candidate_operations
    - accepted_operations
    - rejected_operations
    - diagnostic_rows
    - generation_plan_rows
    - generation_plan_public_bytes
    - generation_plan_internal_bytes
    - technology_design_count
    - technology_design_canonical_bytes
    - coverage_rows
    - coverage_public_bytes
    - coverage_internal_bytes
    - context_state_keys
    - context_snapshot_bytes
    - technology_closure_cache_entries
    - technology_closure_cached_nodes
    - sanitation_scanned_technologies
    - sanitation_scanned_effects
  required_phases:
    - snapshot
    - graph
    - planning
    - postconditions
  witness_node_limit: 64

regression_policy:
  qualified_baseline: "3.1.9"
  absolute_budgets: .mir/performance-budgets.json
  maximum_regression_percent: 20
