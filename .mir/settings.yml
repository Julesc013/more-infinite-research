schema: 1

rules:
  hidden_means_unavailable_not_deleted: true
  do_not_force_hidden_values_by_default: true
  setting_ids_are_stable: true
  every_dropdown_has_a_neutral_bypass_option: true
  existing_dropdown_enum_values_remain_valid: true
  duplicate_neutral_equivalent_dropdown_rows_are_hidden_but_importable: true
  numeric_dropdowns_use_consistent_expanded_ladders: true
  numeric_dropdown_profile_imports_accept_valid_custom_percentages: true
  custom_numeric_imports_use_displayed_percentage_units: true
  data_stage_must_validate_targets: true
  visibility_must_not_use_data_raw: true
  profile_import_is_effective_override_not_runtime_mutation: true
  settings_profiles_exclude_import_setting: true
  runtime_export_writes_script_output_only: true
  import_requires_restart: true
  technology_settings_sort_by_visibility_then_player_name: true
  official_and_mir_owned_technology_settings_stay_visible: true
  technology_settings_use_three_attention_buckets: true
  canonical_settings_catalog_required: true
  profile_import_validates_catalog_constraints: true
  settings_profiles_support_compact_export: true
  settings_profile_encoding_is_deterministic: true
  prototype_limit_settings_default_to_engine_default: true
  prototype_limit_settings_are_startup_only_explicit_overrides: true
  productivity_cap_scope_threshold_is_inverse_of_effective_recycler_return: true
  recycling_return_policy_is_explicit_and_generated_recipes_only: true
  automatic_recycling_return_is_total-output-inverse_and_never_buffs_vanilla: true
  unrestricted_modules_is_opt_in_and_does_not_add_slots: true
  unrestricted_modules_requires_module_permissions_target_capability: true
  effect_per_level_settings_are_per_technology: true
  effect_per_level_defaults_use_primary_base_tier: true
  scripted_multiplier_effects_scale_delta_not_full_multiplier: true
  energy_and_pollution_caps_are_separate: true
  positive_speed_cap_and_negative_speed_floor_are_separate: true
  positive_power_floor_is_default_off_opt_in: true
  positive_power_floor_is_compatibility_section_setting: true
  global_settings_use_visible_section_prefixes: true
  rich_text_section_prefixes_are_optional_enhancement: true
  fake_divider_settings_are_disallowed: true
  every_setting_declares_positive_target_requirements: true
  catalog_specs_are_returned_as_deep_copies: true
  technology_sort_names_come_from_canonical_descriptors: true
  validation_overrides_are_declarative_not_source_rewrites: true
  automatic_compiler_mode_is_predeclared_and_defaults_to_safe_attach: true
  automatic_compiler_mode_has_player_facing_name_and_per_option_descriptions: true
  automatic_compiler_mode_preserves_released_setting_id_and_values: true
  automatic_compiler_mode_options_are_ordered_from_no_changes_to_broadest_coverage: true
  automatic_compiler_mode_is_one_mutually_exclusive_preset_not_a_strength_scale: true

profiles:
  schema: 1
  kind: mir-settings-profile
  string_prefix: MIRSET1
  import_setting: mir-settings-profile-import
  exported_by_command: /mir-settings-export
  validate_command: /mir-settings-import-check
  compact_export_command: /mir-settings-export --compact
  file_output: script-output/more-infinite-research/settings/
  applied_stage: data-stage effective setting reads
  codec: canonical-json-deflate-base64
  deterministic_encoding: true
  exported_setting_prefixes:
    - ips-
    - mir-
  excluded_setting_ids:
    - mir-settings-profile-import
  unknown_settings: preserved in profile string but ignored on unsupported branches
  invalid_values: ignored rather than coerced
  validation_source: prototypes/mir/settings/catalog.lua
  custom_numeric_dropdown_imports:
    mir-pipeline-extent-multiplier: { minimum: 0.1, maximum: 100000 }
    mir-prototype-productivity-cap: { minimum: 0, maximum: 100000 }
    mir-recycling-return-chance: { minimum: 0, maximum: 25 }
    mir-prototype-efficiency-cap: { minimum: -99.99, maximum: 0 }
    mir-prototype-pollution-cap: { minimum: -99.99, maximum: 0 }
    mir-prototype-speed-floor: { minimum: -99.99, maximum: 0 }
    mir-prototype-speed-cap: { minimum: 0, maximum: 100000 }
    mir-prototype-quality-cap: { minimum: 0, maximum: 100000 }

ordering:
  global_prefix: a
  technology_prefix: b
  global_sections:
    - range: a-0
      label: Main
      meaning: main behavior settings
    - range: a-1
      label: Compatibility
      meaning: compatibility behavior and prototype compatibility passes
    - range: a-2
      label: Limits
      meaning: explicit global prototype cap overrides
    - range: a-7
      label: Advanced
      meaning: profile import and future advanced controls
    - range: a-8
      label: Diagnostics
      meaning: log and audit controls
  technology_buckets:
    - rank: "000"
      meaning: disabled-by-default or experimental technology groups, sorted alphabetically
    - rank: "050"
      meaning: enabled unusual, special, or vanilla-continuation groups, sorted alphabetically
    - rank: "100"
      meaning: ordinary enabled technology groups, sorted alphabetically

groups:
  stream:
    generated_settings:
      - enable
      - base_cost
      - growth
      - max_level
      - research_time
      - effect_per_level
    name_patterns:
      enable: ips-enable-%s
      base_cost: ips-cost-base-%s
      growth: ips-cost-growth-%s
      max_level: ips-max-level-%s
      research_time: ips-research-time-%s
      effect_per_level: ips-effect-per-level-%s

streams:
  research_air_scrubbing_clean_filter:
    manifest: mir-prod-air-scrubbing-clean-filter
    ui_visibility:
      mode: visible-if-mods-any
      mods_any:
        - atan-air-scrubbing
    hidden_when_unavailable: true
    forced_when_hidden: null
    backport:
      keep_setting_ids: true

  research_ash_separation:
    manifest: mir-prod-atan-ash-separation
    ui_visibility:
      mode: visible-if-mods-any
      mods_any:
