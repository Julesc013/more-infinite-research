msg-intro=นี้เป็น Factorio แบบอิสระ โดยงานของคุณจะเป็นการใช้จรวดเพื่อสำรวจอวกาศ โดยสร้างไซโลจรวด และสั่งยิงตัวจรวดกับดาวเทียม ที่คุณจะต้องทำคือการวิจัยเทคโนโลยีขั้นสูงเพื่อปลดล็อคจรวดไซโล ขนาดเล็กเริ่มต้น โดยจะเริ่มทำโดยอัตโนมัติ และไม่ลืมที่จะป้องกันฐานจากผู้ที่อยู่อาศัยภายในพื้นที่มากก่อนแล้ว
