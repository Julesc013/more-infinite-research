schema: 1

fixture_roots:
  synthetic: fixtures
  compatibility_matrix: fixtures/compat-matrix
  run_profiles: fixtures/run-profiles

real_mod_gates:
  factorio-2.1-crucible-rigor:
    scenario: local-2-1-crucible-rigor-exact-dist
    roots:
      - planet-crucible
      - rigor-module
    requires_exact_dist: true
    requires_fresh_save: true
    status: required

fixtures:
  rigor-late-recipe-removal:
    path: fixtures/rigor-late-recipe-removal
    validates:
      - incineration-sink-excluded-from-breeding
      - breeding-classifier-positive-negative-matrix
      - generated-recipe-target-integrity
      - dependent-mod-late-recipe-removal

  generated-prerequisite-safety:
    assertion_path: fixtures/assert-generated-prerequisite-safety
    validates:
      - generated-stream-prerequisites-exist-and-are-enabled
      - generated-stream-prerequisites-are-acyclic-and-reachable
      - already-enabled-science-pack-recipe-needs-no-unlock
      - disabled-technology-unlocker-exclusion
      - deterministic-multiple-unlocker-selection
      - direct-science-self-lock-exclusion
      - two-pack-science-cycle-exclusion
      - missing-research-mechanism-exclusion
      - shared-recipe-unlocker-index
      - researchable-required-technology-policy
      - unlock-all-generated-stream-reachability

  settings-visibility:
    assertion_path: fixtures/assert-hidden-setting-readability
    validates:
      - hidden-setting-readability
      - stable-setting-ids

  prototype-limits:
    assertion_path: fixtures/assert-prototype-limits
    validates:
      - prototype-limit-startup-overrides
      - recipe-maximum-productivity-cap
      - above-300-cap-self-recycling-scope
      - unrestricted-module-permissions
      - effect-receiver-limits
      - separate-energy-and-pollution-limits
      - positive-power-floor-opt-in

  effect-scaling:
    assertion_path: fixtures/assert-generation-integrity
    validates:
      - primary-base-tier-default-anchor
      - vanilla-continuation-default-anchors
      - proportional-mixed-tier-scaling
      - scripted-runtime-multiplier-delta

  settings-profile-roundtrip:
    assertion_path: fixtures/assert-settings-profile-roundtrip
    validates:
      - settings-profile-deterministic-encoding
      - settings-profile-compact-export
      - settings-profile-strict-import-validation
      - hidden-provider-setting-profile-roundtrip

  reduced-settings-surface:
    assertion_path: fixtures/assert-reduced-settings-surface
    validates:
      - reduced-supported-settings-remain-visible
      - modern-only-settings-are-omitted
      - reduced-continuation-locales-are-explicit

  weapon-speed-safety:
    path: fixtures/weapon-speed-external-owner
    assertion_path: fixtures/assert-weapon-speed-safety
    validates:
      - finite-vanilla-weapon-effects-preserved
      - weapon-overlap-six-case-policy-matrix
      - exact-infinite-replacement-coverage
      - external-owner-science-reachability
      - external-continuation-non-mutation
      - external-owner-suppresses-dedicated-streams-when-preferred
      - dedicated-weapon-prerequisites

  air-scrubbing:
    path: fixtures/air-scrubbing
    assertion_path: fixtures/assert-air-scrubbing-clean-filter
    claim: atan-air-scrubbing
    validates:
      - generated-streams
      - loop-risk-rejections
      - lab-compatibility
      - package-hygiene

  atan-ash:
    path: fixtures/atan-ash
    assertion_path: fixtures/assert-atan-ash-separation
    claim: atan-ash
    validates:
      - generated-streams
      - excluded-ash-sinks
      - loop-risk-rejections

  atan-nuclear-science:
    path: fixtures/atan-nuclear-science
    assertion_path: fixtures/assert-atan-nuclear-science-productivity
    claim: atan-nuclear-science
    validates:
      - science-pack-integration
      - lab-compatibility

  aai-loaders:
    path: fixtures/aai-loaders
    assertion_path: fixtures/assert-aai-loader-belt-productivity
    claim: aai-loaders
    validates:
      - loader-entity-indexing
      - loader-recipe-candidates
      - belt-stream-coverage

  big-mining-drill:
    path: fixtures/big-mining-drill
    assertion_path: fixtures/assert-big-mining-drill-productivity
    claim: big-mining-drill
    validates:
      - mining-drill-entity-indexing
      - mining-drill-recipe-candidates
      - native-mining-owner-observation

  omega-drill:
    path: fixtures/omega-drill
    assertion_path: fixtures/assert-omega-drill-productivity
    validates:
      - mining-drill-recipe-candidates
      - effect-count
