schema: 1

branches:
  main:
    purpose: frozen stable Factorio 2.1 line at released MIR 3.1.9
    factorio_version: "2.1"
    accepts:
      - release-hotfix
      - docs-correction
      - fixture-correction
      - unpublished-version-package-build
      - validated-release-candidate-promotion
    rejects:
      - broad-new-generation
      - schema-breaking-report-changes
      - large-architecture-rewrite

  dev:
    purpose: MIR 3.2.0 persistent-verification development and canonical future Factorio 2.1 integration
    factorio_version: "2.1"
    accepts:
      - architecture
      - new-capabilities
      - docs
      - fixtures
      - refactors
      - validation

  legacy:
    purpose: frozen Factorio 2.0 line at released MIR 2.4.5
    factorio_version: "2.0"
    accepts:
      - safety-fix
      - compatibility-diagnostic-fix
      - docs-correction
      - exact-policy-fix
    rejects:
      - 3.0-directory-reorg
      - schema-breaking-change
      - generated-id-rename
      - broad-new-generation

  tmp/2.0:
    purpose: maintained Factorio 2.0 MIR 2.5.0 semantic companion and verification-overhaul backport branch
    factorio_version: "2.0"
    accepts:
      - platform-compatible-backport
      - target-profile-adapter
      - 2.0-fixture
      - release-evidence
      - docs-correction
    rejects:
      - 2.1-only-metadata
      - generated-id-rename
      - unproven-feature-parity

  factorio-2.0-lane:
    purpose: planned Space Exploration and other 2.0-only campaign lane
    factorio_version: "2.0"
    accepts:
      - platform-compatible-backport
      - 2.0-fixture
      - no-2.1-only-prototype-assumption

  port/1.1-to-0.18:
    purpose: short-lived Factorio 0.18 bridge/archive package branch seeded from the validated 1.9.3 source point
    factorio_version: "0.18"
    accepts:
      - bridge-proof
      - target-metadata
      - binary-validation
      - release-docs
    rejects:
      - long-lived-0.18-maintenance
      - feature-expansion
      - target-line-waterfall-inheritance

backport_rules:
  pure_classifier_fix:
    from: dev
    to:
      - main
      - legacy
    requires:
      - fixture
      - no-stream-id-change

  generated_stream_change:
    requires:
      - stream-manifest-update
      - migration-review
      - fixture-update
      - release-note

  docs_only:
    requires:
      - docs-lint
      - no-package-diff

