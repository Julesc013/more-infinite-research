schema: 1

branches:
  main:
    purpose: stable Factorio 2.1 line receiving the validated MIR 3.1.5 release candidate
    factorio_version: "2.1"
    accepts:
      - release-hotfix
      - docs-correction
      - fixture-correction
      - unpublished-version-package-build
      - validated-release-candidate-promotion
    rejects:
      - broad-new-generation
      - schema-breaking-report-changes
      - large-architecture-rewrite

  dev:
    purpose: canonical MIR 3.1.9 automated-qualified candidate awaiting maintainer review
    factorio_version: "2.1"
    accepts:
      - architecture
      - new-capabilities
      - docs
      - fixtures
      - refactors
      - validation

  tmp/3.1.9-synthesis:
    purpose: isolated final MIR 3.1 patch synthesis based directly on released 3.1.5
    factorio_version: "2.1"
    accepts:
      - portable-correctness-fix
      - release-assurance
      - museum-development-tooling
      - validation
      - release-evidence
    rejects:
      - target-era-runtime-source
      - museum-defaults
      - broad-3.2-feature-work

  tmp/museum-wave-and-3.1.9-handoff:
    purpose: aggregate evidence and shared build-time tooling for the 0.12-through-0.6 museum wave and 3.1.9 handoff
    factorio_version: development-only
    accepts:
      - museum-target-manifest
      - build-time-compiler
      - validation-tooling
      - aggregate-release-evidence
    rejects:
      - public-release-action
      - target-runtime-waterfall-inheritance

  tmp/0.12-through-0.6:
    purpose: independent museum release branches generated from target capability manifests and matching base data
    factorio_version: "0.12-0.6"
    accepts:
      - finite-numbered-technology
      - target-era-metadata
      - target-era-locale
      - loaded-config-lua
      - matching-binary-evidence
      - deterministic-package
    rejects:
      - native-infinite-fields
      - modern-settings
      - recipe-productivity-without-proof
      - lower-target-source-inheritance

  legacy:
    purpose: frozen published Factorio 2.0 MIR 2.4.0 stable baseline
    factorio_version: "2.0"
    accepts:
      - safety-fix
      - compatibility-diagnostic-fix
      - docs-correction
      - exact-policy-fix
    rejects:
      - 3.0-directory-reorg
      - schema-breaking-change
      - generated-id-rename
      - broad-new-generation

  tmp/2.0:
    purpose: retained Factorio 2.0 staging history; published MIR 2.4.0 authority is legacy
    factorio_version: "2.0"
    accepts:
      - platform-compatible-backport
      - target-profile-adapter
      - 2.0-fixture
      - release-evidence
      - docs-correction
    rejects:
      - 2.1-only-metadata
      - generated-id-rename
      - unproven-feature-parity

  factorio-2.0-lane:
    purpose: planned Space Exploration and other 2.0-only campaign lane
    factorio_version: "2.0"
    accepts:
      - platform-compatible-backport
      - 2.0-fixture
      - no-2.1-only-prototype-assumption

  port/1.1-to-0.18:
    purpose: short-lived Factorio 0.18 bridge/archive package branch seeded from the validated 1.9.3 source point
    factorio_version: "0.18"
    accepts:
      - bridge-proof
      - target-metadata
      - binary-validation
      - release-docs
    rejects:
      - long-lived-0.18-maintenance
      - feature-expansion
      - target-line-waterfall-inheritance

backport_rules:
  pure_classifier_fix:
    from: dev
    to:
      - main
      - legacy
    requires:
      - fixture
      - no-stream-id-change

  generated_stream_change:
    requires:
      - stream-manifest-update
      - migration-review
      - fixture-update
      - release-note

  docs_only:
    requires:
      - docs-lint
      - no-package-diff

