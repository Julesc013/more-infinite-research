name: MIR Verify

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Diagnose assurance environment
        shell: pwsh
        run: ./scripts/mir.ps1 assurance doctor --target 2.1 --json
      - name: Materialize change-aware verification plan
        shell: pwsh
        run: ./scripts/mir.ps1 verify plan --target 2.1 --profile fast --output artifacts/assurance/plan.json
      - name: Validate planner and evidence invalidation
        shell: pwsh
        run: ./scripts/Test-MIRAssurance.ps1
      - name: Run static gate
        shell: pwsh
        run: ./scripts/Invoke-MIRValidation.ps1 -StaticOnly
      - name: Upload verification plan
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mir-verification-plan
          path: artifacts/assurance/plan.json
