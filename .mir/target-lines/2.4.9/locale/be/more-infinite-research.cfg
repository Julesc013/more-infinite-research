[technology-description]
more-infinite-research.recipe_productivity=Павялічвае прадукцыйнасць рэцэптаў для выбраных рэцэптаў. Абмежаванне максімальнай прадукцыйнасці Factorio па-ранейшаму дзейнічае; дадатковыя бясконцыя ўзроўні могуць не мець практычнага эфекту, як толькі рэцэпт дасягае свайго абмежавання.
more-infinite-research.direct_effect=Дадае бясконцы паўторны бонус. Навуковыя пакеты выбіраюцца з дзеючых лабараторый, таму тэхналогія застаецца даступнай для даследавання з дапамогай сумяшчальных набораў модаў.
more-infinite-research.cargo_bay_unloading_distance=Павялічвае максімальную адлегласць паміж грузавой пасадачнай пляцоўкай і падлучанымі разгрузнымі адсекамі.
more-infinite-research.cargo_landing_pad_count=Павялічвае колькасць грузавых пасадачных пляцовак, якія кожная сіла можа пабудаваць на паверхні.
more-infinite-research.flamethrower_shooting_speed=Павялічвае хуткасць стральбы для агнямётнай зброі і агнямётных вежаў.
more-infinite-research.electric_shooting_speed=Павялічвае хуткасць стральбы з электрычнай зброі. У ванілі гэта ўплывае на абарону ад разраду; з Space Age гэта таксама ўплывае на зброю Tesla, калі даступная катэгорыя патронаў Tesla.
more-infinite-research.spoilage_preservation=Павялічвае глабальны мадыфікатар часу псавання праз абмежаваны сцэнарны эфект. Існуючыя прадметы, якія можна псаваць, могуць захоўваць свае бягучыя тэрміны псавання, пакуль не будуць правераны ў гульні.
more-infinite-research.agricultural_growth_speed=Скарачае пакінуты час росту для нядаўна высаджаных сельскагаспадарчых вежавых раслін праз абмежаваны сцэнарны эфект.
more-infinite-research.lab_productivity=Павялічвае прагрэс даследаванняў, атрыманы ад кожнага спажытага навуковага пакета, выкарыстоўваючы ўласны мадыфікатар прадукцыйнасці лабараторных даследаванняў.

