[mod-setting-description]
ips-require-space-gate=Калі ўключана, гэтыя тэхналогіі застаюцца заблакіраванымі да таго часу, пакуль не будзе даследавана касмічная навука ў Vanilla, або навука праметыя ў Space Age.
mir-science-pack-ingredient-policy=Выбірае, як MIR дадае навуковыя пакеты да створаных тэхналогій. Варыянты ўпарадкаваны ад кансерватыўнага да шырокага: пакеты па змаўчанні, пакеты для позняй гульні, пакеты на аснове прагрэсавання, затым усе даступныя пакеты.
mir-automatic-productivity-action=Выбірае, што MIR робіць з магчымасцямі бяспечнай прадукцыйнасці, знойдзенымі ў рэцэптах усталяваных модаў. Адключана не выконвае аўтаматычнага выяўлення. Папярэдні прагляд змяненняў запісаў прынятых і прапушчаных кандыдатаў у журнале Factorio без змены даследаванняў. Прымяніць бяспечныя змены (па змаўчанні) дадае прыдатныя рэцэпты толькі да сумяшчальных існуючых даследаванняў MIR. Гэта кантралюе дзеянне, а не сілу або сталасць; сцяжкі для стварэння ніжэй асобныя. Заўсёды прымяняюцца праверкі права ўласнасці, перапрацоўкі, верагоднасці, каталізатара, навукі, лабараторыі, перадумовы, мэты, ідэнтычнасці, прагрэсу і цыклу.
mir-automatic-create-research=Па змаўчанні: выключана. Забаронена Ужыванне бяспечных змяненняў у сумяшчальных існуючых даследаваннях MIR; кандыдаты без адпаведнага патоку прапускаюцца і паведамляюцца. On дазваляе адпаведнаму зарэгістраванаму пастаўшчыку ствараць адну стабільную агульную тэхналогію бясконцай прадукцыйнасці, калі ніякія існуючыя даследаванні не падыходзяць. Сцяжок "Правераныя даныя" ніжэй вызначае, ці падыходзяць эксперыментальныя пастаўшчыкі. MIR ніколі не стварае адну тэхналогію для кожнага мода або рэцэпту, і ўсё жорсткія меры бяспекі, навукі, права ўласнасці, ідэнтычнасці, прагрэсу і цыкла па-ранейшаму прымяняюцца.
mir-automatic-require-reviewed-data=Па змаўчанні: уключана. Гэта мае значэнне, толькі калі Дазволіць стварэнне новых даследаванняў уключана; ён ніколі не блакуе бяспечнае далучэнне да існуючых даследаванняў. У дазволах толькі сем'і пастаўшчыкоў, пазначаныя як правераныя і падмацаваныя адпаведнымі доказамі дакладнай версіі, таму эксперыментальныя сямействы прапускаюцца. Off дазваляе зарэгістраваным эксперыментальным пастаўшчыкам ствараць з агульных структурных доказаў. Для самых шырокіх эксперыментальных паводзін уключыце стварэнне даследаванняў і адключыце гэтае патрабаванне. Ні адна каштоўнасць не можа абмінуць цвёрдыя вароты бяспекі.
mir-automatic-compiler-mode=Схаваны мост сумяшчальнасці для профіляў, створаных да падзелу аўтаматычнага кіравання прадукцыйнасцю. Устарэлае значэнне не па змаўчанні выконваецца толькі тады, калі ўсе новыя элементы кіравання застаюцца па змаўчанні. Змяніце любы новы элемент кіравання, каб атрымаць відавочны кантроль.
ips-enable-stream=Стварае згенераваную бясконцую тэхналогію для __1__, калі даступныя яе рэцэпты, эфекты, перадумовы і навуковыя пакеты. Адключыце гэта, каб прадухіліць стварэнне гэтай тэхналогіі MIR.
ips-cost-base-stream=Даследчыя адзінкі, неабходныя для першага згенераванага ўзроўню __1__. Павінен быць не менш за 1. Пазнейшыя ўзроўні разлічваюцца з гэтага значэння і каэфіцыента росту кошту.
ips-cost-growth-stream=Множнік прымяняецца да кожнага наступнага ўзроўню __1__. Выкарыстоўвайце 1 для фіксаваных выдаткаў, 1,5 для 50% росту за ўзровень або 2 для падваення выдаткаў.
ips-max-level-stream=Самы высокі згенераваны ўзровень для __1__. Усталюйце 0 для бясконцых узроўняў.
ips-research-time-stream=Секунд на адзінку даследавання для __1__. Усталюйце 0, каб выкарыстоўваць MIR па змаўчанні для гэтай тэхналогіі. Гэта не агульны час даследавання; агульны час таксама залежыць ад кошту даследавання, колькасці лабараторый, хуткасці лабараторыі і модуляў.
mir-enable-base-tech=Дазваляе __1__ працягваць міма сваёй ванільнай шапкі як бясконцая тэхналогія. Адключыце гэта, калі хочаце, каб MIR дадаў новыя даследчыя лініі без пашырэння гэтага ланцужка.
mir-cost-base=Даследчыя адзінкі, неабходныя для першага ўзроўню працягу MIR __1__. Усталюйце 0, каб атрымаць у спадчыну схему выдаткаў ланцуга Vanilla, калі гэта магчыма.
mir-cost-growth=Множнік прымяняецца да кожнага наступнага ўзроўню працягу MIR __1__. Усталюйце 0, каб успадкаваць мадэль росту ванільнага ланцуга, калі гэта магчыма.
mir-max-level=Самы высокі ўзровень працягу MIR для __1__. Усталюйце 0 для бясконцых узроўняў.
mir-research-time=Секунд на адзінку даследавання для працягу MIR __1__. Усталюйце 0, каб атрымаць у спадчыну адзінку даследчага часу ланцуга Vanilla, калі гэта магчыма.
mir-prefer-this-mod-for-competing-techs=Калі ўключаны, гэты мод выдаляе выбраныя канкуруючыя бясконцыя пашырэнні і выкарыстоўвае ўласныя версіі. Адключыце, каб захаваць канкуруючыя версіі з іншых модаў.
mir-adjust-vanilla-weapon-speed-techs=Кантралюе, ці выдаляе MIR бонусы хуткасці ракеты і гарматнага снарада са сваёй згенераванай хуткасці стральбы са зброі, калі даступна дакладнае бясконцае пакрыццё замены. Тэхналогіі канчатковай хуткасці стральбы са зброяй Vanilla захоўваюць свае першапачатковыя бонусы.
mir-use-installed-space-age-icons=Калі ўключана, MIR можа спасылацца на ўсталяваныя афіцыйныя файлы значкоў DLC, у тым ліку Space Age і Elevated Rails, нават калі гэтыя моды адключаны для запуску базавай гульні. Пакіньце гэта, калі гэтыя файлы DLC не ўстаноўлены; Factorio не можа вытанчана аднавіць адсутныя файлы значкоў падчас загрузкі прататыпа.
mir-pipeline-extent-multiplier=Выпадальны множнік толькі пры запуску для распазнаных палёў аб'ёму канвеера вадкасці ў прататыпах, а не толькі ў канвеерах. 100% пакідае прататыпы без зменаў і не загружае праход канвеера і не скануе скрынкі вадкасці. Значэнні, якія не ўваходзяць у 100%, з'яўляюцца эксперыментальнымі і могуць уплываць на машыны, танкі, рухавікі і мадыфікаваныя прататыпы, якія вызначаюць скрынкі вадкасці.
mir-unrestricted-modules=Эксперыментальны і парушальны баланс. Калі ўключана, кожны існуючы рэцэпт прымае ўсе пяць эфектаў модуляў, а кожны існуючы прыёмнік модуляў са слотамі прымае кожную катэгорыю знойдзенага модуля. Гэта не дадае слоты для модуляў і не змяняе прататыпы модуляў і можа забяспечыць прадукцыйнасць, якасць і цыклы мадыфікаваных модуляў.
mir-prototype-productivity-cap=Выбірае, пакідае Ці MIR абмежаванне прадукцыйнасці рэцэпту ў адзіночку, ці запісвае абмежаванне пры запуску для кожнага рэцэпта без параметраў і неперапрацоўкі. +300% (без зменаў) захоўвае існуючыя каўпачкі рэцэптаў; больш нізкія значэнні скарачаюць маштабаванне прадукцыйнасці, а больш высокія значэнні пашыраюць яго.
mir-recycling-return-chance=Кантралюе толькі схаваныя рэцэпты перапрацоўкі. Аўтаматычны рэжым зніжае звычайную 25% рэнтабельнасці матэрыялу не больш чым да 1, падзеленага на агульны множнік выхаду пры абраным абмежаванні прадукцыйнасці. Фіксаваныя выбары непасрэдна маштабуюць аднолькавыя атрыманыя даходы. Бачныя працэсы і абмежаванні прадукцыйнасці рэцэптаў ніколі не мяняюцца.
mir-productivity-cap-self-recycling-only=Вышэй 1 / вяртанне перапрацоўшчыка - 1, толькі вытворчыя рэцэпты з правераным негенератыўным шляхам самаперапрацоўкі атрымліваюць абранае больш высокае абмежаванне. Пры або ніжэй за гэты парог гэты сцяжок не дзейнічае. Рухавік без зменаў выкарыстоўвае звычайную рэнтабельнасць у 25% у якасці кансерватыўнага парога +300% без змены рэцэптаў перапрацоўкі.
mir-prototype-efficiency-cap=Выбірае, наколькі эфект эфектыўнасці можа знізіць актыўнае спажыванне энергіі машынай. -80% (без зменаў) пакідае існуючыя ліміты на выкарыстанне энергіі. Больш глыбокае скарачэнне можа наблізіцца да нулявога выкарыстання актыўнай энергіі без змены лімітаў забруджвання.
mir-prototype-pollution-cap=Выбірае, наколькі эфекты памяншэння забруджвання могуць паменшыць забруджванне ад машын. -80% (без зменаў) пакідае існуючыя ліміты забруджвання. Больш глыбокае скарачэнне можа наблізіцца да нулявога ўзроўню забруджвання без змены выкарыстання энергіі.
mir-prototype-speed-floor=Выбірае, наколькі негатыўныя эфекты хуткасці могуць запавольваць падтрымоўваныя машыны. -80% (без змен) пакідае існуючыя ліміты; больш глыбокія значэнні зніжаюць нармальную падлогу да амаль прыпынку -99,99%.
mir-prototype-speed-cap=Выбірае, пакідае Ці MIR абмежаванні хуткасці машыны ў спакоі, ці піша новае дадатнае абмежаванне хуткасці. +100000% (без змен) захоўвае існуючыя ліміты; меншыя значэнні наўмысна заціскаюць вельмі вялікія бонусы хуткасці.
mir-prototype-quality-cap=Выбірае, пакідае Ці MIR абмежаванні на якасць машыны ў спакоі, ці піша новае станоўчае абмежаванне якасці. +100000% (без змен) захоўвае існуючыя ліміты і не змяняе ўзроўні якасці або формулы верагоднасці прадмета.
mir-prototype-positive-power-floor=Па змаўчанні выключана. Калі ўключана, MIR змяняе відавочныя прататыпы актыўнага выкарыстання энергіі з 0 Вт на 1 Вт падчас загрузкі прататыпа, таму значкі папярэджанняў аб нізкім энергаспажыванні не з'яўляюцца на аб'ектах, якія павінны спажываць невялікую ненулявую колькасць. Пакіньце, каб дакладна захаваць прататыпы з нулявой магутнасцю.
mir-settings-profile-import=Устаўце сюды радок профілю налад MIR, каб прымяніць экспартаваныя значэнні налад запуску ў якасці ўзроўню перавызначэння падчас стварэння прататыпа. Пакіньце пустым для звычайных налад. Экспарт з /mir-settings-export з актыўнага захавання, затым перазапусціце пасля змены гэтага значэння.
mir-debug-generation-report=Калі ўключана, запісвае адзін структураваны радок журнала для кожнага створанага або прапушчанага патоку і базавага пашырэння, уключаючы навуковыя пакеты, перадумовы, колькасць эфектаў, стан сумяшчальнасці лабараторыі і крыніцу значкоў.
mir-debug-recipe-matches=Калі ўключана, запісвае адпаведныя назвы рэцэптаў для кожнага згенераванага патоку прадукцыйнасці. Гэта можа быць шумна ў вялікіх пакетах модаў.
mir-debug-scripted-effects=Калі ўключана, запісвае запісы ў журнал выканання, калі сцэнарныя тэхналогіі пералічваюць глабальныя або кіраваныя падзеямі эфекты.
mir-lab-incompatibility-policy=Выбірае, што рабіць MIR, калі выбраныя навуковыя пакеты не могуць быць даследаваны ніводнай актыўнай лабараторыяй.
ips-effect-per-level-stream=Усталёўвае асноўны эфект базавага ўзроўню для кожнага ўзроўню для __1__. Звязаныя пазнейшыя ўзроўні і эфекты прапарцыйна маштабуюцца. Працэнтныя эфекты выкарыстоўваюць працэнтныя пункты; эфекты падліку і адлегласці выкарыстоўваюць свае родныя адзінкі.
mir-effect-per-level=Усталёўвае кананічны эфект для кожнага ўзроўню для бясконцага працягу __1__. Адпаведныя эфекты маштабуюцца прапарцыянальна канчатковай базавай лініі ванілі. Працэнтныя эфекты выкарыстоўваюць працэнтныя пункты; эфекты падліку і адлегласці выкарыстоўваюць свае родныя адзінкі.
mir-note-experimental-spoilage=Эксперыментальны і адключаны па змаўчанні ў v2.1.0. Гэта глабальны сцэнарны эфект/эфект для ўсёй карты. Існуючыя паводзіны сапсаванага стэка не заяўляюцца, пакуль не будуць правераны ўручную.
mir-note-agriculture-growth=Прымяняецца да нядаўна пасаджаных сельскагаспадарчых культур. Існуючыя пасаджаныя культуры не змяняюцца.
mir-note-cargo-pad-count=Спецыяльнае лагістычнае даследаванне касмічнай эры. Павялічвае грузавыя пасадачныя пляцоўкі на паверхню і можа істотна змяніць лагістычны баланс.
mir-note-inserter-capacity=Па змаўчанні адключана. Дадатковая магутнасць устаўляльніка можа парушыць працу ўстаўляльнікаў, якія кіруюцца схемай, і паменшыць аптымізацыю рухавіка.
mir-note-native-owner-managed-stream=Калі ўсталяваная бясконцая тэхналогія ўжо валодае гэтым даследчым сямействам, гэтыя ж параметры запуску канфігуруюць гэтага ўладальніка замест стварэння дубліката. Нязменныя налады MIR па змаўчанні дакладна захоўваюць канчатковы прататып уладальніка. Відавочныя змены кошту, часу, максімальнага ўзроўню і эфектаў прымяняюцца толькі пасля бяспечнага супадзення ўладальніка; адключэнне патоку пакідае знешнія тэхналогіі некранутымі. Перазапусціце Factorio пасля змены параметраў запуску. Максімальны ўзровень 0 азначае бясконцасць, а значэнні эфекту - працэнтныя пункты за ўзровень.

