[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Не выконвае аўтаматычнае выяўленне, далучэнне або стварэнне. Фіксаваныя даследаванні МІР застаюцца без змен.
mir-automatic-productivity-action-preview=Выяўляе і класіфікуе кандыдатаў, затым запісвае прынятыя і прапушчаныя рашэнні ў журнал Factorio. Ён не прыкладае рэцэпты і не стварае даследаванні.
mir-automatic-productivity-action-apply=Па змаўчанні. Выяўляе кандыдатаў і далучае толькі правераныя бяспекай рэцэпты да сумяшчальных існуючых даследаванняў MIR. Гэта не стварае даследаванне само па сабе; два сцяжкі ніжэй рэгулююць стварэнне.
mir-automatic-compiler-mode-off=Устарэлы эквівалент Disabled.
mir-automatic-compiler-mode-report=Састарэлы эквівалент змяненняў папярэдняга прагляду.
mir-automatic-compiler-mode-safe-attach=Састарэлы эквівалент Ужыць бяспечныя змены з адключаным стварэннем даследаванняў.
mir-automatic-compiler-mode-exact-pack=Устарэлы эквівалент Ужыць бяспечныя змены з уключаным даследаваннем і неабходнымі праверанымі данымі аб сумяшчальнасці.
mir-automatic-compiler-mode-safe-generate=Устарэлы эквівалент Ужыванне бяспечных змяненняў з уключаным стварэннем даследаванняў для зарэгістраваных эксперыментальных пастаўшчыкоў.
mir-adjust-vanilla-weapon-speed-techs-off=Адключыць дадатковую бонусную ачыстку ракеты/гарматы MIR.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Выдаляйце перакрываючыяся ракетныя/гарматныя бонусы MIR толькі тады, калі ўключаная бясконцая тэхналогія дасяжнасці забяспечвае дакладны эфект замены.
mir-adjust-vanilla-weapon-speed-techs-always=Заўсёды выдаляйце ракетныя/гарматныя бонусы MIR. Выкарыстоўвайце толькі ў тым выпадку, калі хочаце строгае аддзяленне.
mir-science-pack-ingredient-policy-configured=Выкарыстоўвайце сканфігураваныя навуковыя пакеты кожнай згенераванай тэхналогіі без дадатковага пашырэння інгрэдыентаў. MIR па змаўчанні.
mir-science-pack-ingredient-policy-space=Дадайце касмічную навуку, калі ёсць. Простае павелічэнне складанасці пасля ракеты.
mir-science-pack-ingredient-policy-space-and-promethium=Дадайце прастору і праметый, калі яны даступныя. Лепш за ўсё падыходзіць для даследчых ракавін вельмі позняй касмічнай эры.
mir-science-pack-ingredient-policy-space-age-progression=Дадайце толькі пакеты прагрэсу ў касмічную эпоху, якія ўваходзяць у выбраныя пакеты. Не дадае незвязаныя мадыфікаваныя пакеты.
mir-science-pack-ingredient-policy-official-progression=Дадайце адсутныя афіцыйныя пакеты ў стылі перадумоў, якія прадугледжвае самы дасканалы афіцыйны пакет, які ўжо абраны.
mir-science-pack-ingredient-policy-mod-progression=Дадайце адсутныя сумяшчальныя з лабараторыяй пакеты, атрыманыя з мадыфікаванага прагрэсу навуковага пакета, і разблакіруйце неабходныя ўмовы.
mir-science-pack-ingredient-policy-all-official=Выкарыстоўвайце ўсе афіцыйныя базы і навуковыя пакеты касмічнай эпохі, якія існуюць у бягучым наборы модаў.
mir-science-pack-ingredient-policy-all=Выкарыстоўвайце ўсе актыўныя навуковыя пакеты, сумяшчальныя з лабараторыяй, у тым ліку мадыфікаваныя навуковыя пакеты.
mir-lab-incompatibility-policy-reduce=Захоўвайце тэхналогію, скараціўшы яе навуковыя пакеты да самага вялікага набору, які прымаецца дзеючай лабараторыяй. Самае бяспечнае па змаўчанні для пакетаў модаў.
mir-lab-incompatibility-policy-skip=Прапусціце тэхналогію, калі ніводная актыўная лабараторыя не можа даследаваць абраны набор навуковых пакетаў. Больш строгі і прасцей для аўдыту.
mir-lab-incompatibility-policy-engine-default=Ніколі не перапісвайце абраны набор навуковых пакетаў. MIR захоўвае набор, які можна бяспечна даследаваць, нязменным і апускае згенераваную тэхналогію, калі Factorio не можа даследаваць гэты набор.
mir-prototype-productivity-cap-engine-default=Пакіньце існуючае абмежаванне прадукцыйнасці кожнага рэцэпту. Рэцэпты без карыстацкага абмежавання выкарыстоўваюць звычайны ліміт бонуса да прадукцыйнасці +300% Factorio.
mir-prototype-productivity-cap-percent-25=Усталюйце абмежаванне прадукцыйнасці рэцэпту без параметраў на +25%. Гэта строгая ранняя шапка.
mir-prototype-productivity-cap-percent-50=Усталюйце абмежаванне прадукцыйнасці рэцэпту без параметраў на +50%. Гэта ніжэй звычайнага абмежавання, таму даследаванні прадукцыйнасці перастаюць дапамагаць раней.
mir-prototype-productivity-cap-percent-75=Усталюйце абмежаванне прадукцыйнасці рэцэпту без параметраў на +75%. Гэта ніжэй звычайнага абмежавання, таму даследаванні прадукцыйнасці перастаюць дапамагаць раней.
mir-prototype-productivity-cap-percent-100=Усталюйце абмежаванне прадукцыйнасці рэцэпту без параметраў на +100%. Гэта ніжэй звычайнага абмежавання, таму даследаванні прадукцыйнасці перастаюць дапамагаць раней.
mir-prototype-productivity-cap-percent-125=Усталюйце абмежаванне прадукцыйнасці рэцэпту без параметраў на +125%.
mir-prototype-productivity-cap-percent-150=Усталюйце абмежаванне прадукцыйнасці рэцэпту без параметраў на +150%.
mir-prototype-productivity-cap-percent-200=Усталюйце абмежаванне прадукцыйнасці рэцэпту без параметраў на +200%. Гэта ніжэй звычайнага абмежавання, таму даследаванні прадукцыйнасці перастаюць дапамагаць раней.
mir-prototype-productivity-cap-percent-250=Усталюйце абмежаванне прадукцыйнасці рэцэпту без параметраў на +250%. Гэта крыху ніжэй за звычайны ліміт.
mir-prototype-productivity-cap-percent-400=Усталюйце абмежаванне прадукцыйнасці рэцэпту без параметраў на +400%. Гэта пашырае маштабаванне прадукцыйнасці за межы звычайнага абмежавання.
mir-prototype-productivity-cap-percent-500=Усталюйце абмежаванне прадукцыйнасці рэцэпту без параметраў на +500%. Гэта пашырае маштабаванне прадукцыйнасці за межы звычайнага абмежавання.
mir-prototype-productivity-cap-percent-750=Усталюйце абмежаванне прадукцыйнасці рэцэпту без параметраў на +750%.
mir-prototype-productivity-cap-percent-1000=Усталюйце абмежаванне прадукцыйнасці рэцэпту без параметраў на +1000%. Выкарыстоўвайце для працяглых захаванняў, калі даследаванні прадукцыйнасці павінны працягваць мець значэнне.
mir-prototype-productivity-cap-percent-2500=Усталюйце абмежаванне прадукцыйнасці рэцэпту без параметраў на +2500%. Выкарыстоўвайце для вельмі працяглых захаванняў.
mir-prototype-productivity-cap-percent-5000=Усталюйце абмежаванне прадукцыйнасці рэцэпту без параметраў на +5000%.
mir-prototype-productivity-cap-percent-10000=Усталюйце абмежаванне прадукцыйнасці рэцэпту без параметраў на +10000%. Выкарыстоўвайце толькі для экстрэмальнага доўгатэрміновага маштабавання.
mir-prototype-productivity-cap-percent-25000=Усталюйце абмежаванне прадукцыйнасці рэцэпту без параметраў на +25000%. Выкарыстоўвайце толькі для экстрэмальнага доўгатэрміновага маштабавання.
mir-prototype-productivity-cap-percent-100000=Усталюйце абмежаванне прадукцыйнасці рэцэпту без параметраў на +100000%. Гэта фактычна не абмежавана для большасці захаванняў.
mir-recycling-return-chance-engine-default=Пакіньце кожны рэцэпт перапрацоўкі без змен.
mir-recycling-return-chance-match-productivity-cap=Бяспечнае ад эксплойтаў аўтаматычнае скарачэнне для схаваных згенераваных рэцэптаў перапрацоўкі. Выкарыстоўваецца 1 / (1 + бонус да прадукцыйнасці), абмежаваны звычайнай рэнтабельнасцю ў 25 %: +400 % становіцца 20 %, а +1000 % становіцца прыблізна 9,09 %.
mir-recycling-return-chance-percent-25=Захоўвайце схаваныя створаныя рэцэпты перапрацоўкі пры звычайным 25% вяртанні матэрыялу.
mir-recycling-return-chance-percent-20=Маштабуйце схаваныя створаныя рэцэпты перапрацоўкі да 20% вяртання матэрыялаў.
mir-recycling-return-chance-percent-15=Маштабуйце схаваныя створаныя рэцэпты перапрацоўкі да 15% вяртання матэрыялаў.
mir-recycling-return-chance-percent-12-5=Маштабуйце схаваныя створаныя рэцэпты перапрацоўкі да 12,5% вяртання матэрыялу.
mir-recycling-return-chance-percent-10=Маштабуйце схаваныя створаныя рэцэпты перапрацоўкі да 10% вяртання матэрыялаў.
mir-recycling-return-chance-percent-7-5=Маштабуйце рэцэпты схаванай генерацыі перапрацоўкі да 7,5% вяртання матэрыялу.
mir-recycling-return-chance-percent-5=Маштабуйце схаваныя створаныя рэцэпты перапрацоўкі да 5% вяртання матэрыялаў.
mir-recycling-return-chance-percent-2-5=Маштабуйце схаваныя створаныя рэцэпты перапрацоўкі да 2,5% вяртання матэрыялу.
mir-recycling-return-chance-percent-1=Маштабуйце схаваныя створаныя рэцэпты перапрацоўкі да 1% вяртання матэрыялаў.
mir-recycling-return-chance-percent-0-5=Маштабуйце схаваныя створаныя рэцэпты перапрацоўкі да 0,5% вяртання матэрыялаў.
mir-recycling-return-chance-percent-0-1=Маштабуйце рэцэпты схаванай генерацыі перапрацоўкі да 0,1% вяртання матэрыялу.
mir-prototype-efficiency-cap-engine-default=Пакіньце ліміт энергаспажывання кожнай машыны. Машыны без карыстацкага абмежавання выкарыстоўваюць звычайнае абмежаванне эфекту выкарыстання энергіі Factorio -80%, таму эфекты не могуць знізіць актыўнае выкарыстанне ніжэй за 20%.
mir-prototype-efficiency-cap-saving-25=Напішыце абмежаванне спажывання энергіі -25%. Актыўнае выкарыстанне энергіі застаецца на ўзроўні 75% або больш пасля эфектаў выкарыстання энергіі.
mir-prototype-efficiency-cap-saving-50=Напішыце абмежаванне спажывання энергіі -50%. Актыўнае спажыванне энергіі застаецца на ўзроўні 50% або больш пасля эфектаў спажывання энергіі на падтрымоўваных машынах.
mir-prototype-efficiency-cap-saving-75=Напішыце абмежаванне спажывання энергіі -75%. Актыўнае спажыванне энергіі застаецца на ўзроўні 25% або больш пасля эфектаў спажывання энергіі на падтрымоўваных машынах.
mir-prototype-efficiency-cap-saving-90=Напішыце абмежаванне спажывання энергіі -90%. Актыўнае спажыванне энергіі можа зваліцца да 10%, што ніжэй звычайнага мінімуму ў 20%.
mir-prototype-efficiency-cap-saving-95=Напішыце абмежаванне спажывання энергіі -95%. Актыўнае спажыванне энергіі можа знізіцца да 5%.
mir-prototype-efficiency-cap-saving-99=Напішыце абмежаванне спажывання энергіі -99%. Актыўнае выкарыстанне энергіі можа знізіцца да 1%.
mir-prototype-efficiency-cap-saving-999=Напішыце абмежаванне спажывання энергіі -99,9%. Актыўнае спажыванне энергіі можа знізіцца да 0,1%.
mir-prototype-efficiency-cap-saving-9999=Напішыце абмежаванне спажывання энергіі -99,99%. Гэта амаль нулявое выкарыстанне актыўнай энергіі, а не перапісванне прататыпа з нулявой магутнасцю.
mir-prototype-pollution-cap-engine-default=Пакіньце ліміт забруджвання для кожнай машыны. Машыны без карыстальніцкага ліміту выкарыстоўваюць стандартны ліміт забруджвання Factorio -80%.
mir-prototype-pollution-cap-saving-25=Напішыце абмежаванне забруджвання -25%. Забруджванне застаецца на ўзроўні 75% або больш пасля ўздзеяння забруджвання.
mir-prototype-pollution-cap-saving-50=Напішыце абмежаванне забруджвання -50%. Забруджванне застаецца на ўзроўні 50% або больш пасля ўздзеяння забруджвання на падтрымоўваныя машыны.
mir-prototype-pollution-cap-saving-75=Напішыце абмежаванне забруджвання -75%. Забруджванне застаецца на ўзроўні 25% або больш пасля ўздзеяння забруджвання на падтрымоўваныя машыны.
mir-prototype-pollution-cap-saving-90=Напішыце абмежаванне забруджвання -90%. Забруджванне можа зваліцца да 10%, што ніжэй звычайнага мінімуму ў 20%.
mir-prototype-pollution-cap-saving-95=Напішыце абмежаванне забруджвання -95%. Забруджванне можа знізіцца да 5%.
mir-prototype-pollution-cap-saving-99=Напішыце абмежаванне забруджвання -99%. Забруджванне можа знізіцца да 1%.
mir-prototype-pollution-cap-saving-999=Напішыце абмежаванне забруджвання -99,9%. Забруджванне можа знізіцца да 0,1%.
mir-prototype-pollution-cap-saving-9999=Напішыце абмежаванне забруджвання -99,99%. Гэта амаль нулявое забруджванне, а не сцэнар забруджвання падчас выканання.
mir-prototype-speed-floor-engine-default=Пакіньце адмоўнае абмежаванне хуткасці кожнай машыны. Машыны без карыстальніцкага ліміту выкарыстоўваюць звычайны мінімум -80% Factorio і падтрымліваюць не менш за 20% хуткасці.
mir-prototype-speed-floor-saving-25=Заціск адмоўных эфектаў хуткасці на -25%, пакідаючы мінімум 75% хуткасці.
mir-prototype-speed-floor-saving-50=Заціск адмоўных эфектаў хуткасці на -50%, пакідаючы прынамсі 50% хуткасці.
mir-prototype-speed-floor-saving-75=Заціск адмоўных эфектаў хуткасці на -75%, пакідаючы не менш за 25% хуткасці.
mir-prototype-speed-floor-saving-90=Дазволіць негатыўныя эфекты хуткасці да -90%, пакідаючы мінімум 10% хуткасці.
mir-prototype-speed-floor-saving-95=Дазволіць негатыўныя эфекты хуткасці да -95%, пакідаючы мінімум 5% хуткасці.
mir-prototype-speed-floor-saving-99=Дазволіць негатыўныя эфекты хуткасці да -99%, пакідаючы мінімум 1% хуткасці.
mir-prototype-speed-floor-saving-999=Дазволіць негатыўныя эфекты хуткасці да -99,9%, пакідаючы прынамсі 0,1% хуткасці.
mir-prototype-speed-floor-saving-9999=Дазваляе негатыўныя эфекты хуткасці да -99,99%, самы нізкі ліміт прататыпа Factorio. Гэта амаль прыпынак, а не нулявая або адмоўная хуткасць крафта.
mir-prototype-speed-cap-engine-default=Пакіньце абмежаванне хуткасці кожнай машыны. Машыны без карыстацкага ліміту выкарыстоўваюць вельмі высокую столь хуткасці Factorio +100 000%.
mir-prototype-speed-cap-bonus-25=Станоўчыя эфекты хуткасці заціску на +25%.
mir-prototype-speed-cap-bonus-50=Станоўчыя эфекты хуткасці заціску на +50%. Выкарыстоўвайце гэта, каб трымаць бонусы хуткасці жорстка абмежаванымі.
mir-prototype-speed-cap-bonus-75=Станоўчыя эфекты хуткасці заціску пры +75%.
mir-prototype-speed-cap-bonus-100=Станоўчыя эфекты хуткасці заціску на +100%.
mir-prototype-speed-cap-bonus-125=Станоўчыя эфекты хуткасці заціску на +125%.
mir-prototype-speed-cap-bonus-150=Станоўчыя эфекты хуткасці заціску на +150%.
mir-prototype-speed-cap-bonus-200=Станоўчыя эфекты хуткасці заціску на +200%.
mir-prototype-speed-cap-bonus-250=Станоўчыя эфекты хуткасці заціску на +250%.
mir-prototype-speed-cap-bonus-300=Станоўчыя эфекты хуткасці заціску на +300%.
mir-prototype-speed-cap-bonus-400=Станоўчыя эфекты хуткасці заціску на +400%.
mir-prototype-speed-cap-bonus-500=Станоўчыя эфекты хуткасці заціску на +500%.
mir-prototype-speed-cap-bonus-750=Станоўчыя эфекты хуткасці заціску пры +750%.
