mir-prototype-efficiency-cap-engine-default=Her makinenin enerji kullanımı etkisi sınırını bir kenara bırakın. Özel limiti olmayan makineler, Factorio'nun normal -%80 enerji kullanımı etkisi sınırını kullanır, dolayısıyla efektler aktif kullanımı %20'nin altına düşüremez.
mir-prototype-efficiency-cap-saving-25=-%25 enerji kullanımı sınırı yazın. Aktif enerji kullanımı, enerji kullanımı etkilerinden sonra %75 veya daha fazla kalır.
mir-prototype-efficiency-cap-saving-50=-%50 enerji kullanımı sınırı yazın. Desteklenen makinelerde enerji kullanımı etkilerinden sonra aktif enerji kullanımı %50 veya daha fazla kalır.
mir-prototype-efficiency-cap-saving-75=-%75 enerji kullanımı üst sınırı yazın. Desteklenen makinelerde enerji kullanımı etkilerinden sonra aktif enerji kullanımı %25 veya daha fazla kalır.
mir-prototype-efficiency-cap-saving-90=-%90 enerji kullanımı sınırı yazın. Aktif enerji kullanımı normal %20 tabanının altında olan %10'a düşebilir.
mir-prototype-efficiency-cap-saving-95=-%95 enerji kullanımı sınırı yazın. Aktif enerji kullanımı %5'e kadar düşebilir.
mir-prototype-efficiency-cap-saving-99=-%99 enerji kullanımı sınırı yazın. Aktif enerji kullanımı %1'e düşebilir.
mir-prototype-efficiency-cap-saving-999=-%99,9 enerji kullanımı üst sınırı yazın. Aktif enerji kullanımı %0,1'e düşebilir.
mir-prototype-efficiency-cap-saving-9999=-%99,99 enerji kullanımı üst sınırı yazın. Bu, sıfır güçlü bir prototipin yeniden yazılması değil, sıfıra yakın aktif enerji kullanımıdır.
mir-prototype-pollution-cap-engine-default=Her makinenin kirlilik etkisi sınırını bir kenara bırakın. Özel limiti olmayan makineler, Factorio'nun normal -%80 kirlilik etkisi sınırını kullanır.
mir-prototype-pollution-cap-saving-25=-%25'lik bir kirlilik sınırı yazın. Kirlilik etkilerinden sonra kirlilik %75 veya daha fazla kalır.
mir-prototype-pollution-cap-saving-50=-%50 kirlilik sınırı yazın. Desteklenen makinelerde kirlilik etkilerinden sonra kirlilik %50 veya daha fazla kalır.
mir-prototype-pollution-cap-saving-75=-%75'lik bir kirlilik sınırı yazın. Desteklenen makinelerde kirlilik etkilerinden sonra kirlilik %25 veya daha fazla kalır.
mir-prototype-pollution-cap-saving-90=-%90'lık bir kirlilik sınırı yazın. Kirlilik normal %20 tabanının altına, %10'a düşebilir.
mir-prototype-pollution-cap-saving-95=-%95'lik bir kirlilik sınırı yazın. Kirlilik yüzde 5'e düşebilir.
mir-prototype-pollution-cap-saving-99=-%99'luk bir kirlilik sınırı yazın. Kirlilik yüzde 1'e düşebilir.
mir-prototype-pollution-cap-saving-999=-%99,9'luk bir kirlilik sınırı yazın. Kirlilik yüzde 0,1'e düşebilir.
mir-prototype-pollution-cap-saving-9999=-%99,99'luk bir kirlilik sınırı yazın. Bu sıfıra yakın kirliliktir, çalışma zamanı kirlilik senaryosu değildir.
mir-prototype-speed-floor-engine-default=Her makinenin negatif hız sınırını bir kenara bırakın. Özel limiti olmayan makineler, Factorio'nun normal -%80 tabanını kullanır ve en az %20 hızı korur.
mir-prototype-speed-floor-saving-25=Negatif hız efektlerini -%25'e sıkıştırın, en az %75 hız bırakın.
mir-prototype-speed-floor-saving-50=Negatif hız efektlerini -%50'ye sıkıştırın, en az %50 hız bırakın.
mir-prototype-speed-floor-saving-75=Negatif hız efektlerini -%75'e sıkıştırın, en az %25 hız bırakın.
mir-prototype-speed-floor-saving-90=En az %10 hız bırakarak, -%90'a kadar negatif hız etkilerine izin verin.
mir-prototype-speed-floor-saving-95=Negatif hız etkilerinin -%95'e kadar düşmesine izin verin ve en az %5 hız bırakın.
mir-prototype-speed-floor-saving-99=En az %1 hız bırakarak, -%99'a kadar negatif hız etkilerine izin verin.
mir-prototype-speed-floor-saving-999=En az %0,1 hız bırakarak, -%99,9'a kadar negatif hız etkilerine izin verin.
mir-prototype-speed-floor-saving-9999=En düşük Factorio prototip sınırı olan -%99,99'a kadar negatif hız etkilerine izin verin. Bu, sıfır veya negatif üretim hızı değil, neredeyse durma noktasıdır.
mir-prototype-speed-cap-engine-default=Her makinenin hız sınırını bir kenara bırakın. Özel limiti olmayan makineler, Factorio'nun çok yüksek +%100000 hız etkisi tavanını kullanır.
