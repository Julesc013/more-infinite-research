[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Otomatik keşif, ekleme veya oluşturma işlemi gerçekleştirmez. MIR'in sabit araştırması değişmeden kalır.
mir-automatic-productivity-action-preview=Adayları keşfeder ve sınıflandırır, ardından kabul edilen ve atlanan kararları Factorio günlüğüne yazar. Tarif eklemez veya araştırma oluşturmaz.
mir-automatic-productivity-action-apply=Varsayılan. Adayları keşfeder ve yalnızca güvenliği kanıtlanmış tarifleri uyumlu mevcut MIR araştırmasına ekler. Kendi başına araştırma yaratmaz; aşağıdaki iki onay kutusu oluşturma işlemini yönetir.
mir-automatic-compiler-mode-off=Devre Dışı'nın eski eşdeğeri.
mir-automatic-compiler-mode-report=Önizleme değişikliklerinin eski eşdeğeri.
mir-automatic-compiler-mode-safe-attach=Araştırma oluşturma devre dışı bırakıldığında güvenli değişiklikleri uygula seçeneğinin eski eşdeğeri.
mir-automatic-compiler-mode-exact-pack=Araştırma oluşturma etkinleştirilmiş ve gerekli uyumluluk verileri gözden geçirilmişken Güvenli değişiklikleri uygula'nın eski eşdeğeri.
mir-automatic-compiler-mode-safe-generate=Kayıtlı deneysel sağlayıcılar için araştırma oluşturma etkinken Güvenli değişiklikleri uygula'nın eski eşdeğeri.
mir-adjust-vanilla-weapon-speed-techs-off=MIR'in isteğe bağlı çakışan roket/top bonus temizlemesini devre dışı bırakın.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=MIR'in çakışan roket/top bonuslarını yalnızca etkin, erişilebilir bir sonsuz teknoloji tam değiştirme etkisini sağladığında kaldırın.
mir-adjust-vanilla-weapon-speed-techs-always=MIR'in çakışan roket/top bonuslarını daima kaldırın. Yalnızca kesin bir ayrım istiyorsanız kullanın.
mir-science-pack-ingredient-policy-configured=Oluşturulan her teknolojinin yapılandırılmış bilim paketlerini isteğe bağlı içerik genişletmesi olmadan kullanın. MIR varsayılanı.
mir-science-pack-ingredient-policy-space=Mümkün olduğunda uzay bilimini ekleyin. Roket sonrası basit bir zorluk artışı.
mir-science-pack-ingredient-policy-space-and-promethium=Mümkün olduğunda boşluk ve prometyum bilimi ekleyin. Çok geç dönem Uzay Çağı araştırma batakları için en iyisi.
mir-science-pack-ingredient-policy-space-age-progression=Yalnızca seçilen paketlerin ima ettiği Uzay Çağı ilerleme paketlerini ekleyin. İlgisiz modlanmış paketler eklemez.
mir-science-pack-ingredient-policy-official-progression=Halihazırda seçilmiş olan en gelişmiş resmi paketin ima ettiği eksik resmi önkoşul tarzı paketleri ekleyin.
mir-science-pack-ingredient-policy-mod-progression=Modifiye edilmiş bilim paketi ilerlemesinden elde edilen laboratuvar uyumlu eksik paketleri ekleyin ve önkoşulların kilidini açın.
mir-science-pack-ingredient-policy-all-official=Mevcut mod setinde bulunan tüm resmi temelleri ve Uzay Çağı bilim paketlerini kullanın.
mir-science-pack-ingredient-policy-all=Modifiye edilmiş bilim paketleri dahil, laboratuvarla uyumlu tüm aktif bilim paketlerini kullanın.
mir-lab-incompatibility-policy-reduce=Bilim paketlerini aktif bir laboratuvar tarafından kabul edilen en büyük sete indirgeyerek teknolojiyi koruyun. Mod paketleri için en güvenli varsayılan.
mir-lab-incompatibility-policy-skip=Hiçbir aktif laboratuvar seçilen bilim paketi setini araştıramıyorsa teknolojiyi atlayın. Daha sıkı ve denetlenmesi daha kolay.
mir-lab-incompatibility-policy-engine-default=Seçilen bilim paketi setini asla yeniden yazmayın. MIR, güvenli bir şekilde araştırılabilir bir seti değişmeden korur ve Factorio tam olarak bu seti araştıramadığında oluşturulan teknolojiyi atlar.
mir-prototype-productivity-cap-engine-default=Her tarifin mevcut verimlilik sınırını bir kenara bırakın. Özel üst sınırı olmayan tarifler, Factorio'nun normal +%300 üretkenlik bonus limitini kullanır.
mir-prototype-productivity-cap-percent-25=Parametre dışı tarif verimlilik sınırlarını +%25'e ayarlayın. Bu katı bir erken sınırdır.
mir-prototype-productivity-cap-percent-50=Parametre dışı tarif verimlilik sınırlarını +%50'ye ayarlayın. Bu, normal sınırın altındadır ve verimlilik araştırmalarının daha çabuk yardımcı olmayı bırakmasına neden olur.
mir-prototype-productivity-cap-percent-75=Parametre dışı tarif verimlilik sınırlarını +%75'e ayarlayın. Bu, normal sınırın altındadır ve verimlilik araştırmalarının daha çabuk yardımcı olmayı bırakmasına neden olur.
mir-prototype-productivity-cap-percent-100=Parametre dışı tarif verimlilik sınırlarını +%100'e ayarlayın. Bu, normal sınırın altındadır ve verimlilik araştırmalarının daha çabuk yardımcı olmayı bırakmasına neden olur.
mir-prototype-productivity-cap-percent-125=Parametre dışı tarif verimlilik sınırlarını +%125'e ayarlayın.
mir-prototype-productivity-cap-percent-150=Parametre dışı tarif verimlilik sınırlarını +%150'ye ayarlayın.
mir-prototype-productivity-cap-percent-200=Parametre dışı tarif verimlilik sınırlarını +%200'e ayarlayın. Bu, normal sınırın altındadır ve verimlilik araştırmalarının daha çabuk yardımcı olmayı bırakmasına neden olur.
mir-prototype-productivity-cap-percent-250=Parametre dışı tarif verimlilik sınırlarını +%250'ye ayarlayın. Bu normal sınırın biraz altında.
mir-prototype-productivity-cap-percent-400=Parametre dışı tarif verimlilik sınırlarını +%400'e ayarlayın. Bu, üretkenlik ölçeklendirmesini normal sınırın ötesine taşır.
mir-prototype-productivity-cap-percent-500=Parametre dışı tarif verimlilik sınırlarını +%500'e ayarlayın. Bu, üretkenlik ölçeklendirmesini normal sınırın ötesine taşır.
mir-prototype-productivity-cap-percent-750=Parametre dışı tarif verimlilik sınırlarını +%750'ye ayarlayın.
mir-prototype-productivity-cap-percent-1000=Parametre dışı tarif verimlilik sınırlarını +%1000'e ayarlayın. Verimlilik araştırmasının önemli kalması gereken uzun süreli kayıtlar için kullanın.
mir-prototype-productivity-cap-percent-2500=Parametre dışı tarif verimlilik sınırlarını +%2500'e ayarlayın. Çok uzun süreli kayıtlar için kullanın.
mir-prototype-productivity-cap-percent-5000=Parametre dışı tarif verimlilik sınırlarını +%5000'e ayarlayın.
mir-prototype-productivity-cap-percent-10000=Parametre dışı tarif verimlilik sınırlarını +%10000'e ayarlayın. Yalnızca aşırı uzun vadeli ölçeklendirme için kullanın.
mir-prototype-productivity-cap-percent-25000=Parametre dışı tarif verimlilik sınırlarını +%25000'e ayarlayın. Yalnızca aşırı uzun vadeli ölçeklendirme için kullanın.
mir-prototype-productivity-cap-percent-100000=Parametre dışı tarif verimlilik sınırlarını +%100000'e ayarlayın. Bu, çoğu kaydetme için etkili bir şekilde sınırlanmamıştır.
mir-recycling-return-chance-engine-default=Her geri dönüşüm tarifini değiştirmeden bırakın.
mir-recycling-return-chance-match-productivity-cap=Gizli oluşturulan geri dönüşüm tarifleri için istismara karşı güvenli otomatik azaltma. Normal %25'lik getiriyle sınırlanan 1 / (1 + üretkenlik bonusu) kullanır: +%400, %20 olur ve +%1000, yaklaşık %9,09 olur.
mir-recycling-return-chance-percent-25=Oluşturulan geri dönüşüm tariflerini normal %25 malzeme getirisinde gizli tutun.
mir-recycling-return-chance-percent-20=Gizli oluşturulan geri dönüşüm tariflerini %20 malzeme getirisine ölçeklendirin.
mir-recycling-return-chance-percent-15=Gizli oluşturulan geri dönüşüm tariflerini %15 malzeme getirisine ölçeklendirin.
mir-recycling-return-chance-percent-12-5=Gizli oluşturulan geri dönüşüm tariflerini %12,5 malzeme getirisine ölçeklendirin.
mir-recycling-return-chance-percent-10=Gizli oluşturulan geri dönüşüm tariflerini %10 malzeme getirisine ölçeklendirin.
