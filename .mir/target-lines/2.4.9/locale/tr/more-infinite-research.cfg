[mod-setting-description]
ips-require-space-gate=Etkinleştirildiğinde, bu teknolojiler vanilyada uzay bilimi araştırılıncaya veya Uzay Çağı'nda prometyum bilimi araştırılıncaya kadar kilitli kalır.
mir-science-pack-ingredient-policy=MIR'ın bilim paketlerini oluşturulan teknolojilere nasıl ekleyeceğini seçer. Seçenekler muhafazakardan geniş kapsamlıya doğru sıralanmıştır: varsayılan paketler, oyun sonu paketleri, ilerlemeye dayalı paketler ve ardından mevcut tüm paketler.
mir-automatic-productivity-action=MIR'in yüklü mod tariflerinde bulunan güvenli üretkenlik fırsatlarıyla ne yapacağını seçer. Devre Dışı, otomatik keşif gerçekleştirmez. Araştırmayı değiştirmeden, Factorio günlüğünde kabul edilen ve atlanan adayların kayıtlarını önizleyin. Güvenli değişiklikleri uygula (varsayılan) uygun tarifleri yalnızca uyumlu mevcut MIR araştırmasına ekler. Bu, gücü veya olgunluğu değil, eylemi kontrol eder; aşağıdaki oluşturma onay kutuları ayrıdır. Sahiplik, geri dönüşüm, olasılık, katalizör, bilim, laboratuvar, ön koşul, hedef, kimlik, ilerleme ve döngü kontrolleri her zaman geçerlidir.
mir-automatic-create-research=Varsayılan: kapalı. Sınır dışı Uyumlu mevcut MIR araştırmasına güvenli değişiklikler uygulayın; Uygun akışı olmayan adaylar atlanarak raporlanır. On, uygun bir kayıtlı sağlayıcının, mevcut hiçbir araştırma uygun olmadığında tek bir istikrarlı genel sonsuz üretkenlik teknolojisi oluşturmasına olanak tanır. Aşağıdaki incelenen veriler onay kutusu, deneysel sağlayıcıların uygun olup olmadığına karar verir. MIR hiçbir zaman mod veya tarif başına tek bir teknoloji yaratmaz ve her sıkı güvenlik, bilim, sahiplik, kimlik, ilerleme ve döngü kapısı hala geçerlidir.
mir-automatic-require-reviewed-data=Varsayılan: açık. Bu yalnızca Yeni araştırma oluşturmaya izin ver açıkken önemlidir; mevcut araştırmaya güvenli bir şekilde bağlanmayı asla engellemez. İzinlerde yalnızca sağlayıcı aileleri incelenmiş olarak işaretlenmiş ve geçerli tam sürüm kanıtlarla desteklenmiştir, bu nedenle deneysel aileler atlanmıştır. Kapalı, kayıtlı deneysel sağlayıcıların genel yapısal kanıtlardan oluşturmasına izin verir. En geniş deneysel davranış için araştırma oluşturmayı etkinleştirin ve bu gereksinimi kapatın. Hiçbir değer sert bir güvenlik kapısını atlayamaz.
mir-automatic-compiler-mode=Bölünmüş otomatik üretkenlik kontrollerinden önce oluşturulan profiller için gizli uyumluluk köprüsü. Varsayılan olmayan eski bir değer, yalnızca tüm yeni kontroller varsayılan değerlerinde kaldığı sürece dikkate alınır. Açık kontrolü ele almak için herhangi bir yeni kontrolü değiştirin.
ips-enable-stream=Tarifleri, efektleri, önkoşulları ve bilim paketleri mevcut olduğunda __1__ için oluşturulan sonsuz teknolojiyi oluşturur. MIR'ın bu teknolojiyi üretmesini önlemek için bunu devre dışı bırakın.
ips-cost-base-stream=__1__'in ilk oluşturulan seviyesi için gerekli araştırma birimleri. En az 1 olmalıdır. Daha sonraki seviyeler bu değerden ve maliyet artış faktöründen hesaplanır.
ips-cost-growth-stream=Çarpan, __1__'in sonraki her seviyesine uygulanır. Sabit maliyetler için 1'i, seviye başına %50 büyüme için 1,5'i veya maliyetleri ikiye katlamak için 2'yi kullanın.
ips-max-level-stream=__1__ için oluşturulan en yüksek seviye. Sonsuz seviyeler için 0'a ayarlayın.
ips-research-time-stream=__1__ için araştırma birimi başına saniye. Bu teknoloji için MIR'in varsayılan değerini kullanmak üzere 0'a ayarlayın. Bu toplam araştırma süresi değil; toplam süre aynı zamanda araştırma maliyetine, laboratuvar sayısına, laboratuvar hızına ve modüllere de bağlıdır.
mir-enable-base-tech=__1__'in sonsuz bir teknoloji olarak vanilya kapağını aşmasına izin verir. MIR'in bu vanilya zincirini genişletmeden yeni araştırma satırları eklemesini istiyorsanız bunu devre dışı bırakın.
mir-cost-base=__1__'in ilk MIR devam seviyesi için gerekli araştırma birimleri. Mümkün olduğunda vanilya zincirinin maliyet modelini devralmak için 0'a ayarlayın.
mir-cost-growth=Çarpan, __1__'in sonraki her MIR devam düzeyine uygulanır. Mümkün olduğunda vanilya zincirinin büyüme modelini devralmak için 0'a ayarlayın.
mir-max-level=__1__ için en yüksek MIR devamlılık seviyesi. Sonsuz seviyeler için 0'a ayarlayın.
mir-research-time=__1__'in MIR devamı için araştırma birimi başına saniye. Mümkün olduğunda vanilya zincirinin araştırma birimi süresini devralmak için 0'a ayarlayın.
mir-prefer-this-mod-for-competing-techs=Etkinleştirildiğinde, bu mod seçilen rakip sonsuz uzantıları kaldırır ve kendi sürümlerini kullanır. Diğer modların rakip sürümlerini korumak için devre dışı bırakın.
mir-adjust-vanilla-weapon-speed-techs=Kesin sonsuz değiştirme kapsamı mevcut olduğunda, MIR'in, oluşturulan silah atış hızı sürekliliğinden roket ve top mermisi hızı bonuslarını kaldırıp kaldırmadığını kontrol eder. Sonlu vanilya silahı atış hızı teknolojileri orijinal bonuslarını koruyor.
mir-use-installed-space-age-icons=Etkinleştirildiğinde MIR, bu modlar temel oyun çalışması için devre dışı bırakılsa bile, Space Age ve Elevated Rails dahil olmak üzere yüklü resmi DLC simge dosyalarına referans verebilir. Bu DLC dosyaları yüklü değilse bunu kapalı bırakın; Factorio, prototip yükleme sırasında eksik simge dosyalarını sorunsuz bir şekilde kurtaramaz.
mir-pipeline-extent-multiplier=Yalnızca boru varlıkları için değil, prototipler genelinde tanınan akışkan kutusu boru hattı kapsam alanları için yalnızca başlangıçta açılan açılır çarpan. %100, prototipleri değiştirmeden bırakır ve boru hattı geçişini veya tarama sıvısı kutularını yüklemez. %100 olmayan değerler deneyseldir ve akışkan kutularını tanımlayan makineleri, tankları, iticileri ve modlanmış prototipleri etkileyebilir.
mir-unrestricted-modules=Deneysel ve dengeleri bozan. Etkinleştirildiğinde, mevcut her tarif beş modül efektinin tümünü kabul eder ve yuvaları olan mevcut her modül alıcısı, keşfedilen her modül kategorisini kabul eder. Bu, modül yuvaları eklemez veya modül prototiplerini değiştirmez ve üretkenliği, kaliteyi ve modlanmış modül döngülerini etkinleştirebilir.
mir-prototype-productivity-cap=MIR'in reçete üretkenlik sınırlarını tek başına mı bırakacağını yoksa parametre olmayan, geri dönüştürülmeyen her tarife bir başlangıç ​​sınırı mı yazacağını seçer. +%300 (değişmedi) mevcut tarif sınırlarını korur; daha düşük değerler üretkenlik ölçeklendirmesini kısaltırken, daha yüksek değerler onu uzatır.
mir-recycling-return-chance=Yalnızca gizli oluşturulan geri dönüşüm tariflerini kontrol eder. Otomatik mod, normal %25'lik malzeme geri dönüşünü, seçilen üretkenlik sınırında toplam çıktı çarpanına bölünerek en fazla 1'e düşürür. Sabit seçimler, üretilen aynı getirileri doğrudan ölçeklendirir. Görünür süreçler ve tarif üretkenliği sınırları hiçbir zaman değişmez.
mir-productivity-cap-self-recycling-only=1 / geri dönüşümcü dönüşü - 1'in üzerinde, yalnızca üretken olmayan, kendini geri dönüştürme yolu kanıtlanmış üretim reçeteleri seçilen daha yüksek sınırı alır. Bu eşiğin altında veya bu eşiğin altında bu onay kutusunun hiçbir etkisi yoktur. Değişmeyen motor, geri dönüşüm tariflerini değiştirmeden +%300'lük koruyucu bir eşik olarak normal %25'lik getiriyi kullanır.
mir-prototype-efficiency-cap=Verimlilik etkilerinin makinenin aktif enerji kullanımını ne kadar azaltabileceğini seçer. -%80 (değişmeden), mevcut enerji kullanımı sınırlarını bir kenara bırakır. Daha derin azaltımlar, kirlilik limitlerini değiştirmeden sıfır aktif enerji kullanımına yaklaşabilir.
mir-prototype-pollution-cap=Kirliliği azaltma etkilerinin makine kirliliğini ne kadar azaltabileceğini seçer. -%80 (değişmedi) mevcut kirlilik sınırlarını tek başına bırakıyor. Daha derin azaltımlar, enerji kullanımını değiştirmeden sıfır kirliliğe yaklaşabilir.
mir-prototype-speed-floor=Negatif hız etkilerinin desteklenen makineleri ne kadar yavaşlatabileceğini seçer. -%80 (değişmedi) mevcut limitleri bir kenara bırakıyor; daha derin değerler normal tabanı -%99,99'daki durma noktasına yakın bir seviyeye indirir.
mir-prototype-speed-cap=MIR'in makine hızı etkisi sınırlarını tek başına bırakmasını veya yeni bir pozitif hız sınırı yazmasını seçer. +%100000 (değişmeden) mevcut limitleri korur; daha düşük değerler kasıtlı olarak çok büyük hız bonuslarını kısıtlar.
mir-prototype-quality-cap=MIR'in makine kalite-etki sınırlarını tek başına mı bıraktığını yoksa yeni bir pozitif kalite sınırı mı yazdığını seçer. +%100000 (değişmedi) mevcut sınırları korur ve kalite katmanlarını veya öğe olasılık formüllerini değiştirmez.
mir-prototype-positive-power-floor=Varsayılan kapalı. Etkinleştirildiğinde, MIR, prototip yükleme sırasında açık 0W aktif enerji kullanımı prototiplerini 1W'a değiştirir, böylece sıfırdan farklı çok küçük bir miktar çekmesi gereken varlıklarda düşük güç uyarı simgeleri görünmez. Sıfır güç prototiplerini tam olarak korumak için bırakın.
mir-settings-profile-import=Prototip oluşturma sırasında dışa aktarılan başlangıç ​​ayarı değerlerini geçersiz kılma katmanı olarak uygulamak için bir MIR ayarları profil dizesini buraya yapıştırın. Normal ayarlar için boş bırakın. Etkin kayıttan /mir-settings-export ile dışa aktarın, ardından bu değeri değiştirdikten sonra yeniden başlatın.
mir-debug-generation-report=Etkinleştirildiğinde, bilim paketleri, önkoşullar, etki sayısı, laboratuvar uyumluluk durumu ve simge kaynağı dahil olmak üzere oluşturulan veya atlanan akış ve temel uzantı başına bir yapılandırılmış günlük satırı yazar.
mir-debug-recipe-matches=Etkinleştirildiğinde, oluşturulan her üretkenlik akışı için eşleşen tarif adlarını yazar. Bu, büyük mod paketlerinde gürültülü olabilir.
mir-debug-scripted-effects=Etkinleştirildiğinde, komut dosyası içeren teknolojiler genel veya olaya dayalı efektleri yeniden hesapladığında çalışma zamanı günlük girişlerini yazar.
mir-lab-incompatibility-policy=Seçilen bilim paketleri herhangi bir aktif laboratuvar tarafından araştırılamadığında MIR'ın ne yapacağını seçer.
ips-effect-per-level-stream=__1__ için seviye başına birincil temel katman efektini ayarlar. İlgili sonraki katmanlar ve etkiler orantılı olarak ölçeklendirilir. Yüzde efektleri yüzde puanlarını kullanır; sayım ve mesafe efektleri kendi yerel birimlerini kullanır.
mir-effect-per-level=Sonsuz __1__ devamı için seviye başına kanonik efekti ayarlar. İlgili etkiler nihai vanilya temel çizgisinden orantılı olarak ölçeklendirilir. Yüzde efektleri yüzde puanlarını kullanır; sayım ve mesafe efektleri kendi yerel birimlerini kullanır.
mir-note-experimental-spoilage=Deneyseldir ve v2.1.0'da varsayılan olarak devre dışıdır. Bu küresel/harita çapında komut dosyasıyla yazılmış bir efekttir. Mevcut bozulabilir yığın davranışı, manuel olarak doğrulanıncaya kadar talep edilmez.
mir-note-agriculture-growth=Yeni ekilen tarımsal kule bitkileri için geçerlidir. Mevcut ekilen ürünler yeniden ölçeklendirilmez.
mir-note-cargo-pad-count=Özel Uzay Çağı lojistik araştırması. Yüzey başına kargo iniş alanlarını artırır ve lojistik dengeyi önemli ölçüde değiştirebilir.
mir-note-inserter-capacity=Varsayılan olarak devre dışıdır. Ekstra yerleştirici kapasitesi, devre kontrollü yerleştiricileri bozabilir ve motor optimizasyonlarını azaltabilir.
mir-note-native-owner-managed-stream=Kurulu bir sonsuz teknoloji zaten bu araştırma ailesine sahipse, aynı başlangıç ​​ayarları, bir kopya oluşturmak yerine o sahibi yapılandırır. Değiştirilmemiş MIR varsayılanları, sahibinin son prototipini tam olarak korur. Açık maliyet, süre, maksimum düzey ve etki geçersiz kılmaları yalnızca güvenli sahip eşleşmesinden sonra uygulanır; akışın devre dışı bırakılması harici teknolojiye dokunulmaz. Başlangıç ​​ayarlarını değiştirdikten sonra Factorio'yu yeniden başlatın. Maksimum seviye 0, sonsuz anlamına gelir ve etki değerleri, seviye başına yüzde puanlardır.

