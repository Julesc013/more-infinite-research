[technology-description]
more-infinite-research.recipe_productivity=Seçilen tarifler için tarif verimliliğini artırır. Factorio'nun maksimum üretkenlik sınırı hâlâ geçerlidir; Bir tarif limitine ulaştığında ek sonsuz seviyelerin pratik bir etkisi olmayabilir.
more-infinite-research.direct_effect=Sonsuz tekrarlanabilir bonus ekler. Bilim paketleri aktif laboratuvarlardan seçilir, böylece teknoloji uyumlu mod setleriyle araştırılabilir kalır.
more-infinite-research.cargo_bay_unloading_distance=Kargo iniş alanı ile bağlı boşaltma alanları arasındaki maksimum mesafeyi artırır.
more-infinite-research.cargo_landing_pad_count=Her kuvvetin yüzey başına oluşturabileceği kargo iniş alanı sayısını artırır.
more-infinite-research.flamethrower_shooting_speed=Alev silahı ve alev makinesi taretlerinin atış hızını artırır.
more-infinite-research.electric_shooting_speed=Elektrikli silahlar için atış hızını artırır. Vanilyada bu durum deşarj savunmasını etkiler; Uzay Çağı ile birlikte Tesla cephane kategorisi mevcut olduğunda Tesla silahlarını da etkiler.
more-infinite-research.spoilage_preservation=Sınırlı komut dosyası efekti aracılığıyla genel bozulma süresi değiştiricisini artırır. Mevcut bozulabilir öğeler, oyun içinde test edilene kadar mevcut bozulma sürelerini koruyabilir.
more-infinite-research.agricultural_growth_speed=Sınırlı komut dosyası etkisi ile yeni dikilen tarım kulesi bitkilerinin kalan büyüme süresini kısaltır.
more-infinite-research.lab_productivity=Yerel laboratuvar araştırma verimliliği değiştiricisini kullanarak, tüketilen her bilim paketinden elde edilen araştırma ilerlemesini artırır.

