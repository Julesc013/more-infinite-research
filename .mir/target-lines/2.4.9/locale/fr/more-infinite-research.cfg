[string-mod-setting-description]
mir-automatic-productivity-action-disabled=N'effectue aucune découverte, pièce jointe ou création automatique. La recherche fixe de MIR reste inchangée.
mir-automatic-productivity-action-preview=Découvre et classe les candidats, puis écrit les décisions acceptées et ignorées dans le journal Factorio. Il ne joint pas de recettes et ne crée pas de recherche.
mir-automatic-productivity-action-apply=Par défaut. Découvre les candidats et attache uniquement les recettes dont la sécurité a été prouvée aux recherches MIR existantes compatibles. Il ne crée pas de recherche en soi ; les deux cases ci-dessous régissent la création.
mir-automatic-compiler-mode-off=Equivalent hérité de Désactivé.
mir-automatic-compiler-mode-report=Equivalent hérité des modifications de l'aperçu.
mir-automatic-compiler-mode-safe-attach=Equivalent hérité de Appliquer les modifications sécurisées avec la création de recherche désactivée.
mir-automatic-compiler-mode-exact-pack=Equivalent hérité de Appliquer les modifications sécurisées avec la création de recherche activée et les données de compatibilité révisées requises.
mir-automatic-compiler-mode-safe-generate=Equivalent hérité d'Appliquer les modifications sécurisées avec la création de recherches activée pour les fournisseurs expérimentaux enregistrés.
mir-adjust-vanilla-weapon-speed-techs-off=Désactivez le nettoyage optionnel des bonus de fusée/canon superposés de MIR.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Supprimez les bonus de fusée/canon qui se chevauchent de MIR uniquement lorsqu'une technologie infinie activée et accessible fournit l'effet de remplacement exact.
mir-adjust-vanilla-weapon-speed-techs-always=Supprimez toujours les bonus de fusée/canon qui se chevauchent de MIR. À utiliser uniquement si vous souhaitez une séparation stricte.
mir-science-pack-ingredient-policy-configured=Utilisez les packs scientifiques configurés pour chaque technologie générée sans extension facultative des ingrédients. MIR par défaut.
mir-science-pack-ingredient-policy-space=Ajoutez la science spatiale lorsqu'elle est disponible. Une simple augmentation de difficulté post-fusée.
mir-science-pack-ingredient-policy-space-and-promethium=Ajoutez la science de l'espace et du prométhium lorsqu'elle est disponible. Idéal pour les éviers de recherche très récents de l’ère spatiale.
mir-science-pack-ingredient-policy-space-age-progression=Ajoutez uniquement les packs de progression Space Age impliqués par les packs sélectionnés. N'ajoute pas de packs moddés sans rapport.
mir-science-pack-ingredient-policy-official-progression=Ajout des packs de style prérequis officiels manquants impliqués par le pack officiel le plus avancé déjà sélectionné.
mir-science-pack-ingredient-policy-mod-progression=Ajoutez les packs manquants compatibles avec le laboratoire déduits de la progression du pack scientifique modifié et débloquez les prérequis.
mir-science-pack-ingredient-policy-all-official=Utilisez tous les packs scientifiques officiels de base et de l'ère spatiale qui existent dans l'ensemble de mods actuel.
mir-science-pack-ingredient-policy-all=Utilisez tous les packs scientifiques actifs compatibles avec les laboratoires, y compris les packs scientifiques modifiés.
mir-lab-incompatibility-policy-reduce=Conservez la technologie en réduisant ses packs scientifiques au plus grand ensemble accepté par un laboratoire actif. Valeur par défaut la plus sûre pour les packs de mods.
mir-lab-incompatibility-policy-skip=Ignorez la technologie si aucun laboratoire actif ne peut rechercher l'ensemble de packs scientifiques sélectionné. Plus strict et plus facile à auditer.
mir-lab-incompatibility-policy-engine-default=Ne réécrivez jamais l'ensemble de packs scientifiques sélectionné. MIR préserve inchangé un ensemble pouvant être recherché en toute sécurité et omet la technologie générée lorsque Factorio ne peut pas rechercher cet ensemble exact.
mir-prototype-productivity-cap-engine-default=Laissez le plafond de productivité existant de chaque recette seul. Les recettes sans plafond personnalisé utilisent la limite normale de bonus de productivité de + 300 % de Factorio.
mir-prototype-productivity-cap-percent-25=Définissez les plafonds de productivité des recettes non paramétriques à +25 %. Il s’agit d’un plafond précoce strict.
mir-prototype-productivity-cap-percent-50=Définissez les plafonds de productivité des recettes non paramétriques à +50 %. Ce chiffre est inférieur au plafond normal et fait que la recherche sur la productivité cesse plus tôt d’être utile.
mir-prototype-productivity-cap-percent-75=Définissez les plafonds de productivité des recettes non paramétriques à +75 %. Ce chiffre est inférieur au plafond normal et fait que la recherche sur la productivité cesse plus tôt d’être utile.
mir-prototype-productivity-cap-percent-100=Définissez les plafonds de productivité des recettes non paramétriques à +100 %. Ce chiffre est inférieur au plafond normal et fait que la recherche sur la productivité cesse plus tôt d’être utile.
mir-prototype-productivity-cap-percent-125=Définissez les plafonds de productivité des recettes non paramétriques à +125 %.
mir-prototype-productivity-cap-percent-150=Définissez les plafonds de productivité des recettes non paramétriques à +150 %.
mir-prototype-productivity-cap-percent-200=Définissez les plafonds de productivité des recettes non paramétriques à +200 %. Ce chiffre est inférieur au plafond normal et fait que la recherche sur la productivité cesse plus tôt d’être utile.
mir-prototype-productivity-cap-percent-250=Définissez les plafonds de productivité des recettes non paramétriques à +250 %. C'est légèrement en dessous du plafond normal.
mir-prototype-productivity-cap-percent-400=Définissez les plafonds de productivité des recettes non paramétriques à +400 %. Cela étend l’échelle de productivité au-delà du plafond normal.
mir-prototype-productivity-cap-percent-500=Définissez les plafonds de productivité des recettes non paramétriques à +500 %. Cela étend l’échelle de productivité au-delà du plafond normal.
mir-prototype-productivity-cap-percent-750=Définissez les plafonds de productivité des recettes non paramétriques à +750 %.
mir-prototype-productivity-cap-percent-1000=Définissez les plafonds de productivité des recettes non paramétriques à +1 000 %. À utiliser pour des sauvegardes longues là où la recherche sur la productivité devrait rester importante.
mir-prototype-productivity-cap-percent-2500=Définissez les plafonds de productivité des recettes non paramétriques à +2 500 %. À utiliser pour des sauvegardes très longues.
mir-prototype-productivity-cap-percent-5000=Définissez les plafonds de productivité des recettes non paramétriques à +5 000 %.
mir-prototype-productivity-cap-percent-10000=Définissez les plafonds de productivité des recettes non paramétriques à +10 000 %. À utiliser uniquement pour une mise à l’échelle à très long terme.
mir-prototype-productivity-cap-percent-25000=Définissez les plafonds de productivité des recettes non paramétriques à +25 000 %. À utiliser uniquement pour une mise à l’échelle à très long terme.
mir-prototype-productivity-cap-percent-100000=Définissez les plafonds de productivité des recettes non paramétriques à +100 000 %. Ceci n’est effectivement pas plafonné pour la plupart des sauvegardes.
mir-recycling-return-chance-engine-default=Laissez chaque recette de recyclage inchangée.
mir-recycling-return-chance-match-productivity-cap=Réduction automatique sécurisée contre les exploits pour les recettes de recyclage générées cachées. Utilise 1 / (1 + bonus de productivité), plafonné au rendement normal de 25 % : +400 % devient 20 %, et +1 000 % devient environ 9,09 %.
mir-recycling-return-chance-percent-25=Conservez les recettes de recyclage générées cachées au retour de matière normal de 25 %.
mir-recycling-return-chance-percent-20=Adaptez les recettes de recyclage générées cachées à un retour de matière de 20 %.
mir-recycling-return-chance-percent-15=Adaptez les recettes de recyclage générées cachées à un retour de matière de 15 %.
mir-recycling-return-chance-percent-12-5=Adaptez les recettes de recyclage générées cachées à un retour matière de 12,5 %.
mir-recycling-return-chance-percent-10=Adaptez les recettes de recyclage générées cachées à un retour de matière de 10 %.
mir-recycling-return-chance-percent-7-5=Adaptez les recettes de recyclage générées cachées à un retour de matière de 7,5 %.
mir-recycling-return-chance-percent-5=Adaptez les recettes de recyclage générées cachées à un retour de matière de 5 %.
mir-recycling-return-chance-percent-2-5=Adaptez les recettes de recyclage générées cachées à un retour de matière de 2,5 %.
mir-recycling-return-chance-percent-1=Adaptez les recettes de recyclage générées cachées à un retour de matière de 1 %.
mir-recycling-return-chance-percent-0-5=Adaptez les recettes de recyclage générées cachées à un retour de matière de 0,5 %.
mir-recycling-return-chance-percent-0-1=Adaptez les recettes de recyclage générées cachées à un retour de matière de 0,1 %.
mir-prototype-efficiency-cap-engine-default=Laissez la limite d'effet de consommation d'énergie de chaque machine seule. Les machines sans limite personnalisée utilisent le plafond d'effet de consommation d'énergie normal de Factorio -80 %, de sorte que les effets ne peuvent pas réduire l'utilisation active en dessous de 20 %.
mir-prototype-efficiency-cap-saving-25=Écrivez un plafond de consommation d'énergie de -25 %. La consommation d'énergie active reste à 75 % ou plus après les effets de la consommation d'énergie.
mir-prototype-efficiency-cap-saving-50=Écrivez un plafond de consommation d'énergie de -50 %. La consommation d'énergie active reste à 50 % ou plus après les effets de consommation d'énergie sur les machines prises en charge.
mir-prototype-efficiency-cap-saving-75=Écrivez un plafond de consommation d'énergie de -75 %. La consommation d'énergie active reste à 25 % ou plus après les effets de consommation d'énergie sur les machines prises en charge.
mir-prototype-efficiency-cap-saving-90=Écrivez un plafond de consommation d'énergie de -90 %. La consommation d’énergie active peut tomber à 10 %, ce qui est inférieur au plancher normal de 20 %.
mir-prototype-efficiency-cap-saving-95=Écrivez un plafond de consommation d'énergie de -95 %. La consommation d'énergie active peut chuter jusqu'à 5 %.
mir-prototype-efficiency-cap-saving-99=Écrivez un plafond de consommation d'énergie de -99 %. La consommation d'énergie active peut tomber à 1 %.
mir-prototype-efficiency-cap-saving-999=Écrivez un plafond de consommation d'énergie de -99,9 %. La consommation active d'énergie peut tomber à 0,1 %.
mir-prototype-efficiency-cap-saving-9999=Écrivez un plafond de consommation d'énergie de -99,99 %. Il s’agit d’une consommation d’énergie active proche de zéro, et non d’une réécriture d’un prototype à consommation nulle.
mir-prototype-pollution-cap-engine-default=Laissez la limite d'effet de pollution de chaque machine seule. Les machines sans limite personnalisée utilisent le plafond normal d'effet de pollution de -80 % de Factorio.
mir-prototype-pollution-cap-saving-25=Écrire un plafond de pollution de -25%. La pollution reste à 75 % ou plus après les effets de la pollution.
mir-prototype-pollution-cap-saving-50=Écrire un plafond de pollution de -50%. La pollution reste à 50 % ou plus après les effets de la pollution sur les machines prises en charge.
mir-prototype-pollution-cap-saving-75=Écrivez un plafond de pollution de -75%. La pollution reste à 25 % ou plus après les effets de la pollution sur les machines prises en charge.
mir-prototype-pollution-cap-saving-90=Écrire un plafond de pollution de -90%. La pollution peut tomber à 10 %, ce qui est inférieur au plancher normal de 20 %.
mir-prototype-pollution-cap-saving-95=Écrivez un plafond de pollution de -95%. La pollution peut descendre jusqu'à 5 %.
mir-prototype-pollution-cap-saving-99=Écrivez un plafond de pollution de -99%. La pollution peut descendre jusqu'à 1%.
mir-prototype-pollution-cap-saving-999=Écrivez un plafond de pollution de -99,9%. La pollution peut descendre jusqu'à 0,1%.
mir-prototype-pollution-cap-saving-9999=Écrivez un plafond de pollution de -99,99%. Il s’agit d’une pollution proche de zéro, et non d’un script de pollution d’exécution.
mir-prototype-speed-floor-engine-default=Laissez la limite de vitesse négative de chaque machine seule. Les machines sans limite personnalisée utilisent le plancher normal de -80 % de Factorio et conservent une vitesse d'au moins 20 %.
mir-prototype-speed-floor-saving-25=Limitez les effets de vitesse négatifs à -25 %, en laissant au moins 75 % de vitesse.
mir-prototype-speed-floor-saving-50=Limitez les effets de vitesse négatifs à -50 %, en laissant au moins 50 % de vitesse.
mir-prototype-speed-floor-saving-75=Limitez les effets de vitesse négatifs à -75 %, en laissant au moins 25 % de vitesse.
mir-prototype-speed-floor-saving-90=Autoriser les effets de vitesse négatifs jusqu'à -90 %, en laissant au moins 10 % de vitesse.
mir-prototype-speed-floor-saving-95=Autoriser les effets de vitesse négatifs jusqu'à -95 %, en laissant au moins 5 % de vitesse.
mir-prototype-speed-floor-saving-99=Autoriser les effets de vitesse négatifs jusqu'à -99 %, en laissant au moins 1 % de vitesse.
mir-prototype-speed-floor-saving-999=Autorise les effets de vitesse négatifs jusqu'à -99,9 %, en laissant au moins 0,1 % de vitesse.
mir-prototype-speed-floor-saving-9999=Autorise les effets de vitesse négatifs jusqu'à -99,99 %, la limite la plus basse du prototype Factorio. Il s’agit d’une vitesse de fabrication proche de l’arrêt, et non nulle ou négative.
mir-prototype-speed-cap-engine-default=Laissez la limite de vitesse de chaque machine seule. Les machines sans limite personnalisée utilisent le plafond d'effet de vitesse très élevé de Factorio, +100 000 %.
mir-prototype-speed-cap-bonus-25=Limiter les effets de vitesse positifs à +25%.
mir-prototype-speed-cap-bonus-50=Fixez les effets de vitesse positifs à +50%. Utilisez-le pour limiter étroitement les bonus de vitesse.
mir-prototype-speed-cap-bonus-75=Fixez les effets de vitesse positifs à +75%.
mir-prototype-speed-cap-bonus-100=Fixez les effets de vitesse positifs à +100%.
mir-prototype-speed-cap-bonus-125=Fixez les effets de vitesse positifs à +125%.
mir-prototype-speed-cap-bonus-150=Fixez les effets de vitesse positifs à +150%.
mir-prototype-speed-cap-bonus-200=Fixez les effets de vitesse positifs à +200%.
mir-prototype-speed-cap-bonus-250=Fixez les effets de vitesse positifs à +250%.
mir-prototype-speed-cap-bonus-300=Fixez les effets de vitesse positifs à +300%.
mir-prototype-speed-cap-bonus-400=Fixez les effets de vitesse positifs à +400%.
mir-prototype-speed-cap-bonus-500=Fixez les effets de vitesse positifs à +500%.
mir-prototype-speed-cap-bonus-750=Fixez les effets de vitesse positifs à +750%.
mir-prototype-speed-cap-bonus-1000=Fixez les effets de vitesse positifs à +1000%.
mir-prototype-speed-cap-bonus-2500=Fixez les effets de vitesse positifs à +2500%.
mir-prototype-speed-cap-bonus-5000=Fixez les effets de vitesse positifs à +5000%.
mir-prototype-speed-cap-bonus-10000=Fixez les effets de vitesse positifs à +10 000 %.
mir-prototype-speed-cap-bonus-25000=Fixez les effets de vitesse positifs à +25 000 %.
mir-prototype-speed-cap-bonus-100000=Écrivez explicitement le plafond d'effet de vitesse maximal de Factorio. Contrairement aux valeurs inchangées, cela écrase les limites inférieures personnalisées.
mir-prototype-quality-cap-engine-default=Laissez la limite d'effet qualité de chaque machine seule. Les machines sans limite personnalisée utilisent le plafond d'effet qualité très élevé de Factorio +100 000 %.
