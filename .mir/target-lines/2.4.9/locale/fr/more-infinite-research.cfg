[mod-setting-description]
ips-require-space-gate=Lorsqu'elles sont activées, ces technologies restent verrouillées jusqu'à ce que la science spatiale soit étudiée dans Vanilla ou que la science du prométhium soit étudiée dans Space Age.
mir-science-pack-ingredient-policy=Choisit comment MIR ajoute des packs scientifiques aux technologies générées. Les options sont classées du conservateur au large : packs par défaut, packs de fin de partie, packs basés sur la progression, puis tous les packs disponibles.
mir-automatic-productivity-action=Choisit ce que MIR fait avec les opportunités de productivité sûres trouvées dans les recettes de mods installés. Désactivé n’effectue aucune découverte automatique. Prévisualisez les modifications enregistrées des candidats acceptés et ignorés dans le journal Factorio sans modifier la recherche. Appliquer les modifications sécurisées (par défaut) ajoute les recettes éligibles uniquement aux recherches MIR existantes compatibles. Cela contrôle l'action, et non la force ou la maturité ; les cases de création ci-dessous sont distinctes. Les contrôles de propriété, de recyclage, de probabilité, de catalyseur, de science, de laboratoire, de prérequis, de cible, d'identité, de progression et de cycle s'appliquent toujours.
mir-automatic-create-research=Par défaut : désactivé. Hors limites Appliquer des modifications sûres aux recherches MIR existantes compatibles ; les candidats sans filière appropriée sont ignorés et signalés. On permet à un fournisseur enregistré éligible de créer une technologie générique stable à productivité infinie lorsqu'aucune recherche existante ne correspond. La case à cocher des données examinées ci-dessous détermine si les prestataires expérimentaux sont éligibles. MIR ne crée jamais une seule technologie par mod ou recette, et toutes les portes de sécurité, de science, de propriété, d'identité, de progression et de cycle s'appliquent toujours.
mir-automatic-require-reviewed-data=Par défaut : activé. Cela n'a d'importance que lorsque l'option Autoriser la création de nouvelles recherches est activée ; cela ne bloque jamais un attachement sûr à la recherche existante. Sur les permis, seules les familles de prestataires marquées comme révisées et étayées par des preuves de version exacte applicables, de sorte que les familles expérimentales sont ignorées. Off permet aux fournisseurs expérimentaux enregistrés de créer à partir de preuves structurelles génériques. Pour le comportement expérimental le plus large, activez la création de recherches et désactivez cette exigence. Aucune valeur ne peut contourner une barrière de sécurité rigide.
mir-automatic-compiler-mode=Pont de compatibilité caché pour les profils créés avant les contrôles de productivité automatiques fractionnés. Une valeur héritée autre que celle par défaut est honorée uniquement tant que tous les nouveaux contrôles conservent leurs valeurs par défaut. Modifiez tout nouveau contrôle pour prendre un contrôle explicite.
ips-enable-stream=Crée la technologie infinie générée pour __1__ lorsque ses recettes, effets, prérequis et packs scientifiques sont disponibles. Désactivez cette option pour empêcher MIR de générer cette technologie.
ips-cost-base-stream=Unités de recherche requises pour le premier niveau généré de __1__. Doit être au moins égal à 1. Les niveaux ultérieurs sont calculés à partir de cette valeur et du facteur de croissance des coûts.
ips-cost-growth-stream=Multiplicateur appliqué à chaque niveau ultérieur de __1__. Utilisez 1 pour les coûts fixes, 1,5 pour une croissance de 50 % par niveau ou 2 pour doubler les coûts.
ips-max-level-stream=Niveau généré le plus élevé pour __1__. Réglez sur 0 pour des niveaux infinis.
ips-research-time-stream=Secondes par unité de recherche pour __1__. Réglez sur 0 pour utiliser la valeur par défaut de MIR pour cette technologie. Il ne s’agit pas d’un temps de recherche total ; la durée totale dépend également du coût de la recherche, du nombre de laboratoires, de la vitesse du laboratoire et des modules.
mir-enable-base-tech=Permet à __1__ de continuer au-delà de son plafond vanille en tant que technologie infinie. Désactivez cette option si vous souhaitez que MIR ajoute de nouvelles lignes de recherche sans étendre cette chaîne vanille.
mir-cost-base=Unités de recherche requises pour le premier niveau de continuation MIR de __1__. Définissez sur 0 pour hériter du modèle de coût de la chaîne Vanilla lorsque cela est possible.
mir-cost-growth=Multiplicateur appliqué à chaque niveau de continuation MIR ultérieur de __1__. Réglez sur 0 pour hériter du modèle de croissance de la chaîne vanille lorsque cela est possible.
mir-max-level=Niveau de continuation MIR le plus élevé pour __1__. Réglez sur 0 pour des niveaux infinis.
mir-research-time=Secondes par unité de recherche pour la suite MIR de __1__. Réglez sur 0 pour hériter du temps de l'unité de recherche de la chaîne Vanilla lorsque cela est possible.
mir-prefer-this-mod-for-competing-techs=Lorsqu'il est activé, ce mod supprime les extensions infinies concurrentes sélectionnées et utilise ses propres versions. Désactivez pour conserver les versions concurrentes des autres mods.
mir-adjust-vanilla-weapon-speed-techs=Contrôle si MIR supprime les bonus de vitesse des roquettes et des obus de canon de la continuation de la vitesse de tir des armes générée lorsqu'une couverture de remplacement infinie exacte est disponible. Les technologies de vitesse de tir des armes vanille finies conservent leurs bonus d’origine.
mir-use-installed-space-age-icons=Lorsqu'il est activé, MIR peut faire référence aux fichiers d'icônes DLC officiels installés, y compris Space Age et Elevated Rails, même lorsque ces mods sont désactivés pour une exécution de jeu de base. Laissez cette option désactivée si ces fichiers DLC ne sont pas installés ; Factorio ne peut pas récupérer correctement les fichiers d'icônes manquants lors du chargement du prototype.
mir-pipeline-extent-multiplier=Multiplicateur de liste déroulante réservé au démarrage uniquement pour les champs d'étendue de pipeline de boîte à fluide reconnus dans les prototypes, et pas seulement dans les entités de canalisation. 100 % laisse les prototypes inchangés et ne charge pas le passage du pipeline ni ne scanne les boîtes de fluides. Les valeurs non 100 % sont expérimentales et peuvent affecter les machines, les réservoirs, les propulseurs et les prototypes modifiés qui définissent les boîtes à fluides.
mir-unrestricted-modules=Expérimental et révolutionnaire. Lorsqu'elle est activée, chaque recette existante accepte les cinq effets de module et chaque récepteur de module existant avec emplacements accepte chaque catégorie de module découverte. Cela n'ajoute pas d'emplacements de modules ni ne modifie les prototypes de modules, et peut permettre des boucles de productivité, de qualité et de modules modifiés.
mir-prototype-productivity-cap=Choisissez si MIR laisse les plafonds de productivité des recettes seuls ou écrit un plafond de démarrage pour chaque recette sans paramètre et sans recyclage. +300 % (inchangé) préserve les plafonds de recettes existants ; des valeurs plus faibles raccourcissent l’échelle de productivité, tandis que des valeurs plus élevées la prolongent.
mir-recycling-return-chance=Contrôle uniquement les recettes de recyclage générées cachées. Le mode automatique réduit le retour matière normal de 25 % à au plus 1 divisé par le multiplicateur de production total au plafond de productivité sélectionné. Les choix fixes mettent directement à l’échelle les mêmes rendements générés. Les processus visibles et les plafonds de productivité des recettes ne sont jamais modifiés.
mir-productivity-cap-self-recycling-only=Au-dessus de 1 / retour recycleur - 1, seules les recettes de production avec un parcours d'auto-recyclage non génératif éprouvé reçoivent le plafond supérieur sélectionné. À ou en dessous de ce seuil, cette case à cocher n'a aucun effet. Le moteur inchangé utilise le rendement normal de 25 % comme seuil conservateur de +300 % sans modifier les recettes de recyclage.
mir-prototype-efficiency-cap=Choisissez dans quelle mesure les effets d'efficacité peuvent réduire la consommation d'énergie active de la machine. -80 % (inchangé) laisse de côté les limites de consommation d'énergie existantes. Des réductions plus importantes peuvent permettre d’approcher une consommation d’énergie active nulle sans modifier les limites de pollution.
mir-prototype-pollution-cap=Choisissez dans quelle mesure les effets de réduction de la pollution peuvent réduire la pollution de la machine. -80 % (inchangé) laisse de côté les limites de pollution existantes. Des réductions plus importantes peuvent approcher une pollution nulle sans modifier la consommation d’énergie.
mir-prototype-speed-floor=Choisissez dans quelle mesure les effets de vitesse négatifs peuvent ralentir les machines prises en charge. -80 % (inchangé) laisse les limites existantes seules ; des valeurs plus profondes font descendre le plancher normal jusqu'à un quasi-stop à -99,99 %.
mir-prototype-speed-cap=Choisissez si MIR laisse seules les limites d'effet de vitesse de la machine ou écrit une nouvelle limite de vitesse positive. +100 000 % (inchangé) préserve les limites existantes ; des valeurs inférieures bloquent intentionnellement de très gros bonus de vitesse.
mir-prototype-quality-cap=Choisissez si MIR laisse seules les limites d'effet de qualité de la machine ou écrit un nouveau plafond de qualité positif. +100 000 % (inchangé) préserve les limites existantes et ne modifie pas les niveaux de qualité ou les formules de probabilité des objets.
mir-prototype-positive-power-floor=Désactivé par défaut. Lorsqu'il est activé, MIR modifie les prototypes explicites d'utilisation d'énergie active de 0 W en 1 W pendant le chargement du prototype afin que les icônes d'avertissement de faible consommation n'apparaissent pas sur les entités qui devraient consommer une petite quantité non nulle. Laissez de côté pour préserver exactement les prototypes à puissance nulle.
mir-settings-profile-import=Collez ici une chaîne de profil de paramètres MIR pour appliquer les valeurs de paramètres de démarrage exportées en tant que couche de remplacement lors de la génération du prototype. Laissez vide pour les paramètres normaux. Exportez avec /mir-settings-export depuis une sauvegarde active, puis redémarrez après avoir modifié cette valeur.
mir-debug-generation-report=Lorsqu'il est activé, écrit une ligne de journal structuré par flux et extension de base générés ou ignorés, y compris les packs scientifiques, les prérequis, le nombre d'effets, l'état de compatibilité du laboratoire et la source des icônes.
mir-debug-recipe-matches=Lorsqu'il est activé, écrit les noms de recettes correspondants pour chaque flux de productivité généré. Cela peut être bruyant dans les grands packs de mods.
mir-debug-scripted-effects=Lorsqu'il est activé, écrit les entrées du journal d'exécution lorsque les technologies scriptées recalculent les effets globaux ou pilotés par des événements.
mir-lab-incompatibility-policy=Choisit ce que fait MIR lorsque les packs scientifiques sélectionnés ne peuvent être recherchés par aucun laboratoire actif.
ips-effect-per-level-stream=Définit l'effet de niveau de base principal par niveau pour __1__. Les niveaux et effets ultérieurs associés sont mis à l’échelle proportionnellement. Les effets de pourcentage utilisent des points de pourcentage ; les effets de comptage et de distance utilisent leurs unités natives.
mir-effect-per-level=Définit l'effet canonique par niveau pour la suite infinie __1__. Les effets associés sont dimensionnés proportionnellement à la ligne de base finale de la vanille. Les effets de pourcentage utilisent des points de pourcentage ; les effets de comptage et de distance utilisent leurs unités natives.
mir-note-experimental-spoilage=Expérimental et désactivé par défaut dans la v2.1.0. Il s'agit d'un effet scripté global/à l'échelle de la carte. Le comportement de pile spoilable existant n'est pas revendiqué tant qu'il n'a pas été validé manuellement.
mir-note-agriculture-growth=S'applique aux cultures en tour agricoles nouvellement plantées. Les cultures plantées existantes ne sont pas redimensionnées.
mir-note-cargo-pad-count=Recherche logistique spéciale de l'ère spatiale. Augmente les aires d'atterrissage du fret par surface et peut modifier considérablement l'équilibre logistique.
mir-note-inserter-capacity=Désactivé par défaut. Une capacité supplémentaire de mise sous pli peut interrompre les mises sous pli contrôlées par circuit et réduire les optimisations du moteur.
mir-note-native-owner-managed-stream=Si une technologie infinie installée possède déjà cette famille de recherche, ces mêmes paramètres de démarrage configurent ce propriétaire au lieu de créer un doublon. Les valeurs par défaut MIR inchangées préservent exactement le prototype final du propriétaire. Les remplacements explicites de coût, de temps, de niveau maximum et d'effet ne s'appliquent qu'après une correspondance de propriétaire sûre ; la désactivation du flux laisse la technologie externe intacte. Redémarrez Factorio après avoir modifié les paramètres de démarrage. Un niveau maximum de 0 signifie infini et les valeurs d'effet sont des points de pourcentage par niveau.

