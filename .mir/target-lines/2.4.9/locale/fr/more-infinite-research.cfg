[mod-name]
more-infinite-research=Plus de Recherches Infinies

[mod-description]
more-infinite-research=Ajoute des recherches infinies configurables de productivité et de bonus pour les intermédiaires, la logistique, le combat, les bonus du joueur et les lacunes de Space Age.

