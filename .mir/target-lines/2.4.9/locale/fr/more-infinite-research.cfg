[technology-description]
more-infinite-research.recipe_productivity=Augmente la productivité des recettes sélectionnées. La limite maximale de productivité de Factorio s'applique toujours ; les niveaux infinis supplémentaires peuvent n'avoir aucun effet pratique une fois qu'une recette atteint sa limite.
more-infinite-research.direct_effect=Ajoute un bonus répétable à l'infini. Les packs de science sont choisis à partir des laboratoires actifs afin que la technologie reste recherchable avec les ensembles de mods compatibles.
more-infinite-research.cargo_bay_unloading_distance=Augmente la distance maximale entre une aire d'atterrissage de fret et les baies de déchargement connectées.
more-infinite-research.cargo_landing_pad_count=Augmente le nombre d'aires d'atterrissage de fret que chaque force peut construire par surface.
more-infinite-research.flamethrower_shooting_speed=Augmente la vitesse de tir des armes lance-flammes et des tourelles lance-flammes.
more-infinite-research.electric_shooting_speed=Augmente la vitesse de tir des armes électriques. Chez la vanille, cela affecte la défense contre les décharges ; avec Space Age, cela affecte également les armes Tesla lorsque la catégorie de munitions Tesla est disponible.
more-infinite-research.spoilage_preservation=Augmente le modificateur global du temps de détérioration grâce à un effet scripté limité. Les objets susceptibles d'être endommagés existants peuvent conserver leurs délais de destruction actuels jusqu'à ce qu'ils soient testés dans le jeu.
more-infinite-research.agricultural_growth_speed=Raccourcit le temps de croissance restant pour les plantes agricoles en tour nouvellement plantées grâce à un effet script limité.
more-infinite-research.lab_productivity=Augmente les progrès de recherche obtenus à partir de chaque pack scientifique consommé, en utilisant le modificateur natif de productivité de recherche en laboratoire.

