[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Nagsasagawa ng walang awtomatikong pagtuklas, attachment, o paglikha. Ang nakapirming pananaliksik ng MIR ay nananatiling hindi nagbabago.
mir-automatic-productivity-action-preview=Tumuklas at nag-uuri ng mga kandidato, pagkatapos ay isusulat ang mga tinanggap at nilaktawan na desisyon sa Factorio log. Hindi ito nag-attach ng mga recipe o lumikha ng pananaliksik.
mir-automatic-productivity-action-apply=Default. Nakatuklas ng mga kandidato at nag-attach lamang ng mga recipe na napatunayan sa kaligtasan sa katugmang umiiral na pananaliksik sa MIR. Hindi ito lumilikha ng pananaliksik sa sarili; ang dalawang checkbox sa ibaba ay namamahala sa paggawa.
mir-automatic-compiler-mode-off=Legacy na katumbas ng Disabled.
mir-automatic-compiler-mode-report=Legacy na katumbas ng mga pagbabago sa Preview.
mir-automatic-compiler-mode-safe-attach=Legacy na katumbas ng Ilapat ang mga ligtas na pagbabago nang hindi pinagana ang paggawa ng pananaliksik.
mir-automatic-compiler-mode-exact-pack=Legacy na katumbas ng Ilapat ang mga ligtas na pagbabago nang pinagana ang paggawa ng pananaliksik at kinakailangang data ng compatibility na sinuri.
mir-automatic-compiler-mode-safe-generate=Legacy na katumbas ng Ilapat ang mga ligtas na pagbabago na may naka-enable na paggawa ng pananaliksik para sa mga nakarehistrong eksperimental na provider.
mir-adjust-vanilla-weapon-speed-techs-off=Huwag paganahin ang opsyonal na overlapping na rocket/cannon na paglilinis ng MIR.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Alisin ang nagsasapawan na mga bonus ng rocket/cannon ng MIR kapag ang isang naka-enable, naaabot na walang katapusang teknolohiya ay nagbibigay ng eksaktong kapalit na epekto.
mir-adjust-vanilla-weapon-speed-techs-always=Palaging tanggalin ang nagsasapawan na mga bonus ng rocket/cannon ng MIR. Gamitin lamang kung gusto mo ng mahigpit na paghihiwalay.
mir-science-pack-ingredient-policy-configured=Gamitin ang bawat nabuong teknolohiya na naka-configure na mga science pack nang walang opsyonal na pagpapalawak ng sangkap. MIR default.
mir-science-pack-ingredient-policy-space=Magdagdag ng space science kapag available. Isang simpleng pagtaas ng kahirapan sa post-rocket.
mir-science-pack-ingredient-policy-space-and-promethium=Magdagdag ng espasyo at promethium science kapag available. Pinakamahusay para sa napakahuli na paglubog ng pananaliksik sa Space Age.
mir-science-pack-ingredient-policy-space-age-progression=Magdagdag lamang ng mga pack ng pag-unlad ng Space Age na ipinahiwatig ng mga napiling pack. Hindi nagdaragdag ng hindi nauugnay na mga modded pack.
mir-science-pack-ingredient-policy-official-progression=Magdagdag ng nawawalang opisyal na mga prerequisite-style pack na ipinahiwatig ng pinaka-advanced na opisyal na pack na napili na.
mir-science-pack-ingredient-policy-mod-progression=Magdagdag ng nawawalang mga lab-compatible na pack na hinuhulaan mula sa modded science-pack progression at unlock prerequisites.
mir-science-pack-ingredient-policy-all-official=Gamitin ang bawat opisyal na base at Space Age science pack na umiiral sa kasalukuyang set ng mod.
mir-science-pack-ingredient-policy-all=Gamitin ang bawat aktibong lab-compatible na science pack, kabilang ang mga modded science pack.
mir-lab-incompatibility-policy-reduce=Panatilihin ang teknolohiya sa pamamagitan ng pagbabawas ng mga science pack nito sa pinakamalaking set na tinatanggap ng isang aktibong lab. Pinakaligtas na default para sa mga mod pack.
mir-lab-incompatibility-policy-skip=Laktawan ang teknolohiya kung walang aktibong lab ang makakapagsaliksik sa napiling set ng science-pack nito. Mas mahigpit at mas madaling i-audit.
mir-lab-incompatibility-policy-engine-default=Huwag kailanman muling isulat ang napiling science-pack set. Pinapanatili ng MIR ang isang ligtas na masasaliksik na hanay na hindi nababago at tinatanggal ang nabuong teknolohiya kapag hindi ma-research ng Factorio ang eksaktong hanay na iyon.
mir-prototype-productivity-cap-engine-default=Iwanan ang kasalukuyang productivity cap ng bawat recipe. Ang mga recipe na walang custom na cap ay gumagamit ng normal na +300% productivity bonus na limitasyon ng Factorio.
mir-prototype-productivity-cap-percent-25=Itakda ang mga limitasyon sa pagiging produktibo ng recipe na hindi parameter sa +25%. Ito ay isang mahigpit na maagang takip.
mir-prototype-productivity-cap-percent-50=Itakda ang mga limitasyon sa pagiging produktibo ng recipe na hindi parameter sa +50%. Ito ay mas mababa sa normal na limitasyon at pinapahinto ang pananaliksik sa pagiging produktibo nang mas maaga.
mir-prototype-productivity-cap-percent-75=Itakda ang mga limitasyon sa pagiging produktibo ng recipe na hindi parameter sa +75%. Ito ay mas mababa sa normal na limitasyon at pinapahinto ang pananaliksik sa pagiging produktibo nang mas maaga.
mir-prototype-productivity-cap-percent-100=Itakda ang mga limitasyon sa pagiging produktibo ng recipe na hindi parameter sa +100%. Ito ay mas mababa sa normal na limitasyon at pinapahinto ang pananaliksik sa pagiging produktibo nang mas maaga.
mir-prototype-productivity-cap-percent-125=Itakda ang mga limitasyon sa pagiging produktibo ng recipe na hindi parameter sa +125%.
mir-prototype-productivity-cap-percent-150=Itakda ang mga limitasyon sa pagiging produktibo ng recipe na hindi parameter sa +150%.
mir-prototype-productivity-cap-percent-200=Itakda ang mga limitasyon sa pagiging produktibo ng recipe na hindi parameter sa +200%. Ito ay mas mababa sa normal na limitasyon at pinapahinto ang pananaliksik sa pagiging produktibo nang mas maaga.
mir-prototype-productivity-cap-percent-250=Itakda ang mga limitasyon sa pagiging produktibo ng recipe na hindi parameter sa +250%. Ito ay bahagyang mas mababa sa normal na takip.
mir-prototype-productivity-cap-percent-400=Itakda ang mga limitasyon sa pagiging produktibo ng recipe na hindi parameter sa +400%. Pinapalawak nito ang pag-scale ng pagiging produktibo nang higit sa normal na limitasyon.
mir-prototype-productivity-cap-percent-500=Itakda ang mga limitasyon sa pagiging produktibo ng recipe na hindi parameter sa +500%. Pinapalawak nito ang pag-scale ng pagiging produktibo nang higit sa normal na limitasyon.
mir-prototype-productivity-cap-percent-750=Itakda ang mga limitasyon sa pagiging produktibo ng recipe na hindi parameter sa +750%.
mir-prototype-productivity-cap-percent-1000=Itakda ang non-parameter recipe productivity caps sa +1000%. Gamitin para sa mahabang pag-save kung saan dapat panatilihing mahalaga ang pananaliksik sa pagiging produktibo.
mir-prototype-productivity-cap-percent-2500=Itakda ang non-parameter recipe productivity caps sa +2500%. Gamitin para sa napakatagal na pag-save.
mir-prototype-productivity-cap-percent-5000=Itakda ang non-parameter recipe productivity caps sa +5000%.
mir-prototype-productivity-cap-percent-10000=Itakda ang non-parameter recipe productivity caps sa +10000%. Gamitin lamang para sa matinding pangmatagalang scaling.
mir-prototype-productivity-cap-percent-25000=Itakda ang non-parameter recipe productivity caps sa +25000%. Gamitin lamang para sa matinding pangmatagalang scaling.
mir-prototype-productivity-cap-percent-100000=Itakda ang non-parameter recipe productivity caps sa +100000%. Ito ay epektibong hindi natatakpan para sa karamihan ng mga pag-save.
mir-recycling-return-chance-engine-default=Iwanan ang bawat recipe ng pag-recycle na hindi nagbabago.
mir-recycling-return-chance-match-productivity-cap=Exploit-safe na awtomatikong pagbabawas para sa mga nakatagong nabuong recipe ng pag-recycle. Gumagamit ng 1 / (1 + productivity bonus), na nilimitahan sa normal na 25% return: +400% ay nagiging 20%, at +1000% ay nagiging 9.09%.
mir-recycling-return-chance-percent-25=Panatilihin ang mga nakatagong nabuong recipe ng pag-recycle sa normal na 25% na pagbabalik ng materyal.
mir-recycling-return-chance-percent-20=I-scale ang mga nakatagong nabuong recipe ng pag-recycle sa isang 20% ​​na pagbabalik ng materyal.
mir-recycling-return-chance-percent-15=I-scale ang mga nakatagong nabuong recipe ng pag-recycle sa 15% na pagbabalik ng materyal.
mir-recycling-return-chance-percent-12-5=I-scale ang mga nakatagong nabuong recipe ng pag-recycle sa isang 12.5% ​​na pagbabalik ng materyal.
mir-recycling-return-chance-percent-10=I-scale ang mga nakatagong nabuong recipe ng pag-recycle sa 10% na pagbabalik ng materyal.
mir-recycling-return-chance-percent-7-5=I-scale ang mga nakatagong nabuong recipe ng pag-recycle sa 7.5% na pagbabalik ng materyal.
mir-recycling-return-chance-percent-5=I-scale ang mga nakatagong nabuong recipe ng pag-recycle sa 5% na pagbabalik ng materyal.
mir-recycling-return-chance-percent-2-5=I-scale ang mga nakatagong nabuong recipe ng pag-recycle sa isang 2.5% na pagbabalik ng materyal.
mir-recycling-return-chance-percent-1=I-scale ang mga nakatagong nabuong recipe ng pag-recycle sa isang 1% na pagbabalik ng materyal.
mir-recycling-return-chance-percent-0-5=I-scale ang mga nakatagong nabuong recipe ng pag-recycle sa isang 0.5% na pagbabalik ng materyal.
mir-recycling-return-chance-percent-0-1=I-scale ang mga nakatagong nabuong recipe ng pag-recycle sa isang 0.1% na pagbabalik ng materyal.
mir-prototype-efficiency-cap-engine-default=Iwanan ang limitasyon ng epekto ng paggamit ng enerhiya ng bawat makina. Ginagamit ng mga makinang walang custom na limitasyon ang normal na -80% na cap ng epekto ng paggamit ng enerhiya ng Factorio, kaya hindi mababawasan ng mga epekto ang aktibong paggamit nang mas mababa sa 20%.
mir-prototype-efficiency-cap-saving-25=Sumulat ng -25% na takip sa paggamit ng enerhiya. Ang aktibong paggamit ng enerhiya ay nananatili sa 75% o higit pa pagkatapos ng mga epekto sa paggamit ng enerhiya.
mir-prototype-efficiency-cap-saving-50=Sumulat ng isang -50% na takip sa paggamit ng enerhiya. Ang aktibong paggamit ng enerhiya ay nananatili sa 50% o higit pa pagkatapos ng mga epekto sa paggamit ng enerhiya sa mga sinusuportahang makina.
mir-prototype-efficiency-cap-saving-75=Sumulat ng -75% na takip sa paggamit ng enerhiya. Ang aktibong paggamit ng enerhiya ay nananatili sa 25% o higit pa pagkatapos ng mga epekto sa paggamit ng enerhiya sa mga sinusuportahang machine.
mir-prototype-efficiency-cap-saving-90=Sumulat ng -90% na takip sa paggamit ng enerhiya. Ang aktibong paggamit ng enerhiya ay maaaring bumaba sa 10%, na mas mababa sa normal na 20% na palapag.
mir-prototype-efficiency-cap-saving-95=Sumulat ng -95% na takip sa paggamit ng enerhiya. Ang aktibong paggamit ng enerhiya ay maaaring bumaba sa 5%.
mir-prototype-efficiency-cap-saving-99=Sumulat ng -99% na takip sa paggamit ng enerhiya. Ang aktibong paggamit ng enerhiya ay maaaring bumaba sa 1%.
mir-prototype-efficiency-cap-saving-999=Sumulat ng -99.9% na takip sa paggamit ng enerhiya. Ang aktibong paggamit ng enerhiya ay maaaring bumaba sa 0.1%.
mir-prototype-efficiency-cap-saving-9999=Sumulat ng -99.99% na takip sa paggamit ng enerhiya. Ito ay malapit sa zero na aktibong paggamit ng enerhiya, hindi isang zero-power na prototype na muling pagsulat.
mir-prototype-pollution-cap-engine-default=Iwanan ang limitasyon ng epekto ng polusyon ng bawat makina. Ang mga makina na walang custom na limitasyon ay gumagamit ng normal na -80% pollution-effect cap ng Factorio.
mir-prototype-pollution-cap-saving-25=Sumulat ng -25% na takip sa polusyon. Ang polusyon ay nananatili sa 75% o higit pa pagkatapos ng mga epekto ng polusyon.
mir-prototype-pollution-cap-saving-50=Sumulat ng isang -50% na takip sa polusyon. Ang polusyon ay nananatili sa 50% o higit pa pagkatapos ng mga epekto ng polusyon sa mga sinusuportahang makina.
mir-prototype-pollution-cap-saving-75=Sumulat ng -75% na takip sa polusyon. Ang polusyon ay nananatili sa 25% o higit pa pagkatapos ng mga epekto ng polusyon sa mga sinusuportahang makina.
mir-prototype-pollution-cap-saving-90=Sumulat ng -90% na takip sa polusyon. Ang polusyon ay maaaring bumaba sa 10%, na mas mababa sa normal na 20% na palapag.
mir-prototype-pollution-cap-saving-95=Sumulat ng isang -95% na takip sa polusyon. Ang polusyon ay maaaring bumaba sa 5%.
mir-prototype-pollution-cap-saving-99=Sumulat ng -99% na takip sa polusyon. Ang polusyon ay maaaring bumaba sa 1%.
mir-prototype-pollution-cap-saving-999=Sumulat ng -99.9% pollution cap. Ang polusyon ay maaaring bumaba sa 0.1%.
mir-prototype-pollution-cap-saving-9999=Sumulat ng -99.99% na takip sa polusyon. Ito ay malapit sa zero na polusyon, hindi isang runtime na script ng polusyon.
mir-prototype-speed-floor-engine-default=Iwanan ang negatibong limitasyon ng bilis ng bawat makina. Ang mga makina na walang custom na limitasyon ay gumagamit ng normal na -80% na palapag ng Factorio at pinapanatili ang hindi bababa sa 20% na bilis.
mir-prototype-speed-floor-saving-25=I-clamp ang mga negatibong epekto ng bilis sa -25%, na nag-iiwan ng hindi bababa sa 75% na bilis.
mir-prototype-speed-floor-saving-50=I-clamp ang mga negatibong epekto ng bilis sa -50%, na nag-iiwan ng hindi bababa sa 50% na bilis.
mir-prototype-speed-floor-saving-75=I-clamp ang mga negatibong epekto ng bilis sa -75%, na nag-iiwan ng hindi bababa sa 25% na bilis.
mir-prototype-speed-floor-saving-90=Pahintulutan ang mga negatibong epekto ng bilis hanggang -90%, na nag-iiwan ng hindi bababa sa 10% na bilis.
mir-prototype-speed-floor-saving-95=Pahintulutan ang mga negatibong epekto ng bilis hanggang -95%, na nag-iiwan ng hindi bababa sa 5% na bilis.
mir-prototype-speed-floor-saving-99=Pahintulutan ang mga negatibong epekto ng bilis hanggang -99%, na nag-iiwan ng hindi bababa sa 1% na bilis.
mir-prototype-speed-floor-saving-999=Pahintulutan ang mga negatibong epekto ng bilis hanggang -99.9%, na nag-iiwan ng hindi bababa sa 0.1% na bilis.
mir-prototype-speed-floor-saving-9999=Pahintulutan ang mga negatibong epekto ng bilis hanggang -99.99%, ang pinakamababang limitasyon ng Factorio prototype. Ito ay malapit-hinto, hindi zero o negatibong bilis ng paggawa.
mir-prototype-speed-cap-engine-default=Iwanan ang limitasyon ng bilis ng bawat makina. Ang mga makina na walang custom na limitasyon ay gumagamit ng napakataas na +100000% speed-effect ceiling ng Factorio.
