[mod-name]
more-infinite-research=Higit pang Infinite Research

[mod-description]
more-infinite-research=Nagdaragdag ng na-configure na walang katapusang produktibidad at mga pagsasaliksik ng bonus para sa mga intermediate, logistik, labanan, mga bonus ng manlalaro, at mga puwang sa Space Age.

