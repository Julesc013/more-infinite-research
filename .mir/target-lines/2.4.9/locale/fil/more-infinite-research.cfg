[mod-setting-description]
ips-require-space-gate=Kapag naka-enable, mananatiling naka-lock ang mga teknolohiyang ito hanggang sa masaliksik ang agham sa kalawakan sa vanilla, o masaliksik ang agham ng promethium sa Space Age.
mir-science-pack-ingredient-policy=Pinipili kung paano idinaragdag ng MIR ang mga science pack sa mga nabuong teknolohiya. Inayos ang mga opsyon mula konserbatibo hanggang malawak: mga default na pack, late-game pack, progression-based pack, pagkatapos ay lahat ng available na pack.
mir-automatic-productivity-action=Pinipili kung ano ang ginagawa ng MIR sa ligtas na mga pagkakataon sa pagiging produktibo na makikita sa mga naka-install na mod na recipe. Walang awtomatikong pagtuklas ang na-disable. I-preview ang mga pagbabago sa mga rekord na tinanggap at nilaktawan ang mga kandidato sa Factorio log nang hindi binabago ang pananaliksik. Ilapat ang mga ligtas na pagbabago (default) ay nagdaragdag ng mga karapat-dapat na recipe lamang sa katugmang umiiral na pananaliksik sa MIR. Kinokontrol nito ang pagkilos, hindi ang lakas o kapanahunan; hiwalay ang mga checkbox sa paggawa sa ibaba. Palaging nalalapat ang pagmamay-ari, pag-recycle, posibilidad, katalista, agham, lab, kinakailangan, target, pagkakakilanlan, pag-unlad, at cycle.
mir-automatic-create-research=Default: naka-off. Mga walang limitasyon Maglapat ng mga ligtas na pagbabago sa katugmang umiiral na pananaliksik sa MIR; ang mga kandidatong walang angkop na stream ay nilaktawan at iniuulat. Binibigyang-daan ng On ang isang karapat-dapat na nakarehistrong provider na lumikha ng isang matatag na generic na walang katapusang teknolohiya sa pagiging produktibo kapag walang umiiral na pananaliksik na umaangkop. Ang checkbox ng sinuri na data sa ibaba ay nagpapasya kung ang mga pang-eksperimentong provider ay karapat-dapat. Ang MIR ay hindi kailanman gumagawa ng isang teknolohiya sa bawat mod o recipe, at bawat mahirap na kaligtasan, agham, pagmamay-ari, pagkakakilanlan, pag-unlad, at cycle gate ay nalalapat pa rin.
mir-automatic-require-reviewed-data=Default: naka-on. Ito ay mahalaga lamang kapag ang Payagan ang bagong paggawa ng pananaliksik ay naka-on; hindi nito hinaharangan ang ligtas na pagkakabit sa umiiral na pananaliksik. Sa mga permit lang, ang mga pamilya ng provider na minarkahan ng pagsusuri at sinusuportahan ng naaangkop na eksaktong bersyon na ebidensya, kaya ang mga pang-eksperimentong pamilya ay nilaktawan. Pinahihintulutan ng off ang mga nakarehistrong eksperimental na provider na lumikha mula sa generic na ebidensyang istruktura. Para sa pinakamalawak na pang-eksperimentong gawi, paganahin ang paggawa ng pananaliksik at i-off ang kinakailangan na ito. Walang halaga ang makakalampas sa isang hard safety gate.
mir-automatic-compiler-mode=Hidden compatibility bridge para sa mga profile na ginawa bago ang split automatic-productivity controls. Ang isang hindi default na legacy na halaga ay pinarangalan lamang habang ang lahat ng mga bagong kontrol ay nananatili sa kanilang mga default. Baguhin ang anumang bagong kontrol upang magkaroon ng tahasang kontrol.
ips-enable-stream=Lumilikha ng nabuong walang katapusang teknolohiya para sa __1__ kapag available ang mga recipe, effect, prerequisite, at science pack nito. Huwag paganahin ito upang maiwasan ang MIR sa pagbuo ng teknolohiyang ito.
ips-cost-base-stream=Mga unit ng pananaliksik na kailangan para sa unang nabuong antas ng __1__. Dapat ay hindi bababa sa 1. Ang mga susunod na antas ay kinakalkula mula sa halagang ito at sa kadahilanan ng paglago ng gastos.
ips-cost-growth-stream=Multiplier na inilapat sa bawat susunod na antas ng __1__. Gumamit ng 1 para sa mga flat na gastos, 1.5 para sa 50% na paglago bawat antas, o 2 para sa pagdodoble ng mga gastos.
ips-max-level-stream=Pinakamataas na nabuong antas para sa __1__. Itakda sa 0 para sa walang katapusang antas.
ips-research-time-stream=Segundo bawat research unit para sa __1__. Itakda sa 0 para gamitin ang default ng MIR para sa teknolohiyang ito. Hindi ito kabuuang oras ng pananaliksik; Ang kabuuang oras ay nakasalalay din sa gastos sa pananaliksik, bilang ng lab, bilis ng lab, at mga module.
mir-enable-base-tech=Nagbibigay-daan sa __1__ na magpatuloy sa paglampas ng vanilla cap nito bilang isang walang katapusang teknolohiya. Huwag paganahin ito kung gusto mong magdagdag ng mga bagong linya ng pananaliksik ang MIR nang hindi pinapahaba ang vanilla chain na ito.
mir-cost-base=Mga unit ng pananaliksik na kailangan para sa unang antas ng pagpapatuloy ng MIR na __1__. Itakda sa 0 para mamana ang pattern ng gastos ng vanilla chain kapag posible.
mir-cost-growth=Multiplier na inilapat sa bawat susunod na antas ng pagpapatuloy ng MIR ng __1__. Itakda sa 0 para mamana ang pattern ng paglago ng vanilla chain kapag posible.
mir-max-level=Pinakamataas na antas ng pagpapatuloy ng MIR para sa __1__. Itakda sa 0 para sa walang katapusang antas.
mir-research-time=Mga segundo bawat yunit ng pananaliksik para sa pagpapatuloy ng MIR ng __1__. Itakda sa 0 para mamana ang oras ng research unit ng vanilla chain kung posible.
mir-prefer-this-mod-for-competing-techs=Kapag pinagana, ang mod na ito ay nag-aalis ng mga piling nakikipagkumpitensyang walang katapusang extension at gumagamit ng sarili nitong mga bersyon. Huwag paganahin upang mapanatili ang mga nakikipagkumpitensyang bersyon mula sa iba pang mga mod.
mir-adjust-vanilla-weapon-speed-techs=Kinokontrol kung aalisin ng MIR ang mga bonus ng rocket at cannon-shell speed mula sa nabuo nitong pagpapatuloy ng bilis ng pagbaril ng armas kapag available ang eksaktong walang katapusang kapalit na coverage. Ang mga teknolohiya ng bilis ng pagbaril ng sandata ng vanilla ay nagpapanatili ng kanilang mga orihinal na bonus.
mir-use-installed-space-age-icons=Kapag naka-enable, maaaring tukuyin ng MIR ang mga naka-install na opisyal na DLC icon file, kabilang ang Space Age at Elevated Rails, kahit na ang mga mod na iyon ay hindi pinagana para sa isang base-game run. Iwanan ito kung hindi naka-install ang mga DLC file na iyon; Ang Factorio ay hindi makakabawi nang maganda mula sa nawawalang mga icon na file habang naglo-load ng prototype.
mir-pipeline-extent-multiplier=Startup-only na dropdown multiplier para sa kinikilalang fluid box pipeline extent na mga field sa mga prototype, hindi lamang sa mga pipe entity. 100% ay nag-iiwan ng mga prototype na hindi nagbabago at hindi naglo-load ng pipeline pass o nag-scan ng mga fluid box. Ang mga hindi 100% na value ay pang-eksperimento at maaaring makaapekto sa mga makina, tank, thruster, at modded na mga prototype na tumutukoy sa mga fluid box.
mir-unrestricted-modules=Eksperimento at pagbabalanse. Kapag pinagana, tinatanggap ng bawat umiiral na recipe ang lahat ng limang module effect at bawat umiiral na module receiver na may mga slot ay tinatanggap ang bawat natuklasang kategorya ng module. Hindi ito nagdaragdag ng mga puwang ng module o nagbabago ng mga prototype ng module, at maaaring paganahin ang pagiging produktibo, kalidad, at mga modded-module na loop.
mir-prototype-productivity-cap=Pinipili kung iiwan ng MIR ang mga limitasyon ng pagiging produktibo ng recipe nang mag-isa o magsusulat ng startup cap sa bawat hindi parameter, hindi recycling na recipe. Pinapanatili ng +300% (hindi nagbabago) ang mga umiiral nang takip ng recipe; ang mas mababang halaga ay nagpapaikli sa productivity scaling, habang ang mas matataas na halaga ay nagpapahaba nito.
mir-recycling-return-chance=Kinokontrol lamang ang mga nakatagong nabuong recipe ng pag-recycle. Binabawasan ng awtomatikong mode ang normal na 25% na pagbabalik ng materyal sa hindi hihigit sa 1 na hinati sa kabuuang output multiplier sa napiling cap ng produktibidad. Ang mga nakapirming pagpipilian ay direktang sumusukat sa parehong nabuong mga pagbabalik. Ang mga nakikitang proseso at mga limitasyon ng pagiging produktibo ng recipe ay hindi kailanman nababago.
mir-productivity-cap-self-recycling-only=Above 1 / recycler return - 1, tanging ang mga production recipe na may napatunayang non-generative self-recycling path ang makakatanggap ng napiling mas mataas na cap. Sa o mas mababa sa threshold na iyon, walang epekto ang checkbox na ito. Ang engine na hindi nabago ay gumagamit ng normal na 25% return bilang isang konserbatibong +300% threshold nang hindi binabago ang mga recipe ng pag-recycle.
mir-prototype-efficiency-cap=Pinipili kung gaano kalayo ang mga epekto ng kahusayan ay maaaring mabawasan ang aktibong paggamit ng enerhiya ng makina. -80% (hindi nagbabago) ay nag-iisa sa umiiral na mga limitasyon sa paggamit ng enerhiya. Ang mas malalim na pagbawas ay maaaring lumapit sa zero na aktibong paggamit ng enerhiya nang hindi binabago ang mga limitasyon ng polusyon.
mir-prototype-pollution-cap=Pinipili kung gaano kalayo ang epekto ng pagbabawas ng polusyon sa polusyon sa makina. -80% (hindi nagbabago) ay nag-iisa sa mga umiiral na limitasyon ng polusyon. Ang mas malalim na pagbawas ay maaaring lumapit sa zero na polusyon nang hindi binabago ang paggamit ng enerhiya.
mir-prototype-speed-floor=Pinipili kung gaano kalayo ang mga negatibong epekto ng bilis ay maaaring makapagpabagal sa mga sinusuportahang makina. -80% (hindi nagbabago) ay nag-iisa sa mga umiiral na limitasyon; ang mas malalim na mga halaga ay nag-aalis ng normal na palapag pababa sa malapit na huminto sa -99.99%.
mir-prototype-speed-cap=Pinipili kung iiwan ng MIR ang mga limitasyon sa bilis-epekto ng makina o magsusulat ng bagong positive speed cap. Pinapanatili ng +100000% (hindi nagbabago) ang mga umiiral na limitasyon; sinadyang i-clamp ng mas mababang mga halaga ang mga bonus na napakalaking bilis.
mir-prototype-quality-cap=Pinipili kung iiwan ng MIR ang mga limitasyon sa kalidad-epekto ng makina o magsusulat ng bagong cap na may positibong kalidad. Pinapanatili ng +100000% (hindi nagbabago) ang mga umiiral na limitasyon at hindi binabago ang mga tier ng kalidad o mga formula ng posibilidad ng item.
mir-prototype-positive-power-floor=Naka-off ang default. Kapag naka-enable, binabago ng MIR ang tahasang 0W na aktibong energy_usage na mga prototype sa 1W habang naglo-load ang prototype para hindi lumalabas ang mga icon ng babala na may mababang kapangyarihan sa mga entity na dapat gumuhit ng maliit na hindi zero na halaga. Iwanan upang mapanatili ang zero-power na mga prototype nang eksakto.
mir-settings-profile-import=Mag-paste ng string ng profile ng mga setting ng MIR dito para ilapat ang mga na-export na value ng setting ng startup bilang override layer sa panahon ng pagbuo ng prototype. Iwanang blangko para sa mga normal na setting. I-export gamit ang /mir-settings-export mula sa isang aktibong pag-save, pagkatapos ay i-restart pagkatapos baguhin ang halagang ito.
mir-debug-generation-report=Kapag naka-enable, magsusulat ng isang structured log row sa bawat nabuo o nilaktawan na stream at base extension, kasama ang mga science pack, mga kinakailangan, bilang ng epekto, katayuan ng pagiging tugma sa lab, at pinagmulan ng icon.
mir-debug-recipe-matches=Kapag pinagana, nagsusulat ng mga katugmang pangalan ng recipe para sa bawat nabuong stream ng produktibidad. Maaari itong maging maingay sa malalaking mod pack.
mir-debug-scripted-effects=Kapag naka-enable, nagsusulat ng runtime log entries kapag ang mga scripted na teknolohiya ay muling nag-compute ng mga epektong pandaigdigan o batay sa kaganapan.
mir-lab-incompatibility-policy=Pinipili kung ano ang ginagawa ng MIR kapag ang mga napiling science pack ay hindi masasaliksik ng anumang aktibong lab.
ips-effect-per-level-stream=Itinatakda ang pangunahing base-tier na epekto sa bawat antas para sa __1__. Ang mga kaugnay na mga tier at epekto sa ibang pagkakataon ay nasusukat nang proporsyonal. Ang mga epekto ng porsyento ay gumagamit ng mga puntos ng porsyento; ang bilang at mga epekto ng distansya ay gumagamit ng kanilang mga katutubong yunit.
mir-effect-per-level=Itinatakda ang canonical per-level effect para sa walang katapusang __1__ pagpapatuloy. Ang mga kaugnay na epekto ay nasusukat nang proporsyonal mula sa huling vanilla baseline. Ang mga epekto ng porsyento ay gumagamit ng mga puntos ng porsyento; ang bilang at mga epekto ng distansya ay gumagamit ng kanilang mga katutubong yunit.
mir-note-experimental-spoilage=Eksperimento at hindi pinagana bilang default sa v2.1.0. Ito ay isang global/map-wide scripted effect. Ang kasalukuyang spoilable-stack na gawi ay hindi kine-claim hanggang sa manu-manong napatunayan.
mir-note-agriculture-growth=Nalalapat sa mga bagong tanim na pananim sa tore ng agrikultura. Ang mga dati nang nakatanim na pananim ay hindi na nirescale.
mir-note-cargo-pad-count=Pananaliksik sa logistik ng Espesyal na Edad ng Kalawakan. Pinapataas ang mga landing pad ng kargamento sa bawat ibabaw at maaaring makabuluhang baguhin ang balanse ng logistik.
mir-note-inserter-capacity=Naka-disable bilang default. Maaaring masira ng sobrang kapasidad ng inserter ang mga insert na kontrolado ng circuit at mabawasan ang mga pag-optimize ng engine.
mir-note-native-owner-managed-stream=Kung pagmamay-ari na ng isang naka-install na infinite na teknolohiya ang pamilya ng pananaliksik na ito, kino-configure ng parehong mga setting ng startup na iyon ang may-ari sa halip na gumawa ng duplicate. Ang hindi nabagong mga default ng MIR ay nagpapanatili ng panghuling prototype ng may-ari nang eksakto. Ang tahasang gastos, oras, pinakamataas na antas, at epekto ay nalalapat lamang pagkatapos ng isang ligtas na pagtutugma ng may-ari; ang hindi pagpapagana ng stream ay nag-iiwan sa panlabas na teknolohiya na hindi nagalaw. I-restart ang Factorio pagkatapos baguhin ang mga setting ng startup. Ang maximum na antas na 0 ay nangangahulugang walang katapusan, at ang mga halaga ng epekto ay mga porsyentong puntos bawat antas.

