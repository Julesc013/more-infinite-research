[technology-description]
more-infinite-research.recipe_productivity=Pinapataas ang pagiging produktibo ng recipe para sa mga napiling recipe. Nalalapat pa rin ang maximum productivity cap ng Factorio; Maaaring walang praktikal na epekto ang mga karagdagang infinite level kapag naabot na ng recipe ang cap nito.
more-infinite-research.direct_effect=Nagdaragdag ng walang katapusang nauulit na bonus. Pinipili ang mga science pack mula sa mga aktibong lab upang manatiling masasaliksik ang teknolohiya sa mga katugmang mod set.
more-infinite-research.cargo_bay_unloading_distance=Pinapataas ang maximum na distansya sa pagitan ng cargo landing pad at konektadong unloading bays.
more-infinite-research.cargo_landing_pad_count=Pinapataas ang bilang ng mga landing pad ng kargamento na maaaring itayo ng bawat puwersa sa bawat ibabaw.
more-infinite-research.flamethrower_shooting_speed=Pinapataas ang bilis ng pagbaril para sa mga flamethrower na armas at flamethrower turrets.
more-infinite-research.electric_shooting_speed=Pinapataas ang bilis ng pagbaril para sa mga de-kuryenteng armas. Sa vanilla ito ay nakakaapekto sa pagtatanggol sa paglabas; kasama ang Space Age naaapektuhan din nito ang mga sandata ng Tesla kapag available ang kategorya ng tesla ammo.
more-infinite-research.spoilage_preservation=Pinapataas ang pandaigdigang spoil time modifier sa pamamagitan ng bounded scripted effect. Maaaring panatilihin ng mga kasalukuyang nasisira na item ang kanilang kasalukuyang mga deadline ng sira hanggang sa masuri sa laro.
more-infinite-research.agricultural_growth_speed=Pinaiikli ang natitirang oras ng paglago para sa mga bagong nakatanim na agricultural tower plants sa pamamagitan ng bounded scripted effect.
more-infinite-research.lab_productivity=Pinapataas ang pag-unlad ng pananaliksik na nakuha mula sa bawat natupok na science pack, gamit ang native lab research productivity modifier.

