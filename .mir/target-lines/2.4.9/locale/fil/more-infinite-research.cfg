mir-prototype-quality-cap-engine-default=Iwanan ang limitasyon sa kalidad-epekto ng bawat makina. Ang mga makinang walang custom na limitasyon ay gumagamit ng napakataas na +100000% na kalidad na epekto ng kisame ng Factorio.
mir-prototype-quality-cap-bonus-50=I-clamp ang mga positibong epekto sa kalidad sa +50%. Nililimitahan nito ang mga epekto ng bonus sa kalidad ng makina, hindi ang mga tier ng kalidad o mga formula ng posibilidad ng item.
