[mod-setting-description]
ips-require-space-gate=As ynskeakele, bliuwe dizze technologyen op slot oant romtewittenskip wurdt ûndersocht yn vanille, of promethiumwittenskip wurdt ûndersocht yn Space Age.
mir-science-pack-ingredient-policy=Kiest hoe't MIR wittenskipspakketten tafoegje oan generearre technologyen. Opsjes wurde besteld fan konservatyf oant breed: standertpakketten, pakketten foar lette spultsjes, pakketten basearre op progression, dan alle beskikbere pakketten.
mir-automatic-productivity-action=Kiest wat MIR docht mei feilige produktiviteitskânsen fûn yn ynstalleare mod-resepten. Utskeakele fiert gjin automatyske ûntdekking. Foarbyld fan feroarings records aksepteare en oerslein kandidaten yn it Factorio-logboek sûnder ûndersyk te feroarjen. Feilige wizigingen tapasse (standert) foeget yn oanmerking komme resepten allinich ta oan kompatibel besteande MIR-ûndersyk. Dit kontrolearret aksje, net sterkte of folwoeksenheid; de oanmeitsjen karfakjes hjirûnder binne apart. Eigner, recycling, kâns, katalysator, wittenskip, laboratoarium, betingst, doel, identiteit, foarútgong en sykluskontrôles jilde altyd.
mir-automatic-create-research=Standert: út. Off limiten Tapasse feilige wizigingen op kompatibel besteande MIR-ûndersyk; kandidaten sûnder in geskikte stream wurde oerslein en rapportearre. Op lit in yn oanmerking komme registrearre provider ien stabile generyske technology foar ûneinige produktiviteit meitsje as gjin besteande ûndersyk past. It karfakje foar besjoen gegevens hjirûnder beslút oft eksperimintele providers yn oanmerking komme. MIR makket nea ien technology per mod of resept, en elke hurde feiligens, wittenskip, eigendom, identiteit, foarútgong en fytspoarte jildt noch.
mir-automatic-require-reviewed-data=Standert: oan. Dit is allinich fan belang as Tastean nij ûndersyk oanmeitsje is oan; it blokkearret noait feilige hechting oan besteande ûndersyk. Op fergunnings allinnich provider famyljes markearre reviewed en stipe troch tapassing eksakte ferzje bewiis, sadat eksperimintele famyljes wurde oerslein. Off fergunnings registrearre eksperimintele providers te meitsjen fan generyk struktureel bewiis. Foar it breedste eksperimintele gedrach, skeakelje de skepping fan ûndersyk yn en skeakelje dizze eask út. Gjin wearde kin omgean in hurde feiligens poarte.
mir-automatic-compiler-mode=Ferburgen kompatibiliteitsbrêge foar profilen makke foar de splitsing fan automatyske produktiviteitskontrôles. In net-standert legacy wearde wurdt allinnich honorearre wylst alle nije kontrôles bliuwe op harren standerts. Feroarje elke nije kontrôle om eksplisite kontrôle te nimmen.
ips-enable-stream=Makket de generearre ûneinige technology foar __1__ as har resepten, effekten, betingsten en wittenskiplike pakketten beskikber binne. Skeakelje dit út om te foarkommen dat MIR dizze technology generearret.
ips-cost-base-stream=Undersykseenheden nedich foar it earste generearre nivo fan __1__. Moat op syn minst 1. Lettere nivo's wurde berekkene út dizze wearde en de kosten groei faktor.
ips-cost-growth-stream=Multiplikator tapast op elk letter nivo fan __1__. Brûk 1 foar platte kosten, 1,5 foar 50% groei per nivo, of 2 foar ferdûbeling fan kosten.
ips-max-level-stream=Heechste generearre nivo foar __1__. Stel op 0 foar ûneinige nivo's.
ips-research-time-stream=Sekonden per ûndersyksienheid foar __1__. Stel op 0 om MIR's standert te brûken foar dizze technology. Dit is net totale ûndersyk tiid; totale tiid hinget ek ôf fan ûndersykskosten, laboratoariumtelling, laboratoariumsnelheid en modules.
mir-enable-base-tech=Stelt __1__ ta om troch te gean foarby syn vanillekap as in ûneinige technology. Skeakelje dit út as jo wolle dat MIR nije ûndersyksrigels tafoegje sûnder dizze vanilleketen te ferlingjen.
mir-cost-base=Undersykseenheden nedich foar it earste MIR-ferfolchnivo fan __1__. Stel op 0 om as mooglik it kostenpatroan fan 'e vanilleketen te erven.
mir-cost-growth=Multiplikator tapast op elk lettere MIR-ferfolchnivo fan __1__. Stel op 0 om as mooglik it groeipatroan fan 'e vanilleketen te erven.
mir-max-level=Heechste MIR-ferfolchnivo foar __1__. Stel op 0 foar ûneinige nivo's.
mir-research-time=Sekonden per ûndersyksienheid foar de MIR fuortsetting fan __1__. Stel op 0 om de tiid fan 'e ûndersyksienheid fan' e vanilleketen as mooglik te erven.
mir-prefer-this-mod-for-competing-techs=As ynskeakele, ferwideret dizze mod selektearre konkurrearjende ûneinige útwreidingen en brûkt syn eigen ferzjes. Skeakelje om konkurrearjende ferzjes fan oare mods te hâlden.
mir-adjust-vanilla-weapon-speed-techs=Kontrolearret oft MIR raket- en kanon-shell snelheidsbonussen ferwideret fan syn oanmakke wapensjitsnelheidsferfolch as krekte ûneinige ferfangende dekking beskikber is. Finite vanille wapen shooting snelheid technologyen hâlde harren orizjinele bonussen.
mir-use-installed-space-age-icons=As ynskeakele, kin MIR ferwize nei ynstalleare offisjele DLC-ikoanbestannen, ynklusyf Space Age en Elevated Rails, sels as dy mods útskeakele binne foar in basisspultsje. Lit dit út as dy DLC triemmen binne net ynstallearre; Factorio kin net sierlik herstelle fan ûntbrekkende ikoanbestannen by it laden fan prototype.
mir-pipeline-extent-multiplier=Opstart-allinich dropdown-multiplikator foar erkende floeistofkastpipeline-omfangfjilden oer prototypen, net allinich pipe-entiteiten. 100% lit prototypen ûnferoare en laadt de pipelinepass net of scan floeistofdoazen. Non-100% wearden binne eksperiminteel en kinne ynfloed op masines, tanks, thrusters, en modded prototypes dy't definiearje floeibere doazen.
mir-unrestricted-modules=Eksperiminteel en lykwichtbrekkend. As ynskeakele, akseptearret elk besteande resept alle fiif module effekten en elke besteande module ûntfanger mei slots akseptearret eltse ûntdutsen module kategory. Dit foeget gjin module slots of feroarje module prototypes, en kin ynskeakelje produktiviteit, kwaliteit, en modded-module loops.
mir-prototype-productivity-cap=Kiest of MIR produktiviteitskapten foar resepten allinich lit litte of in opstartkap skriuwt foar elk net-parameter, net-recycling resept. + 300% (net feroare) behâldt besteande resept caps; legere wearden koarter skaalfergrutting fan produktiviteit, wylst hegere wearden it útwreidzje.
mir-recycling-return-chance=Kontrolearret allinich ferburgen generearre recyclingresepten. Automatyske modus ferleget de normale 25% materiaal werom nei op syn meast 1 dield troch de totale útfier multiplier op de selektearre produktiviteit cap. Fêste karren skaalje deselde generearre rendemint direkt. Sichtbere prosessen en resepten produktiviteit caps wurde nea feroare.
mir-productivity-cap-self-recycling-only=Boppe 1 / recycler return - 1, allinich produksjeresepten mei in bewiisd net-generatyf selsrecyclingpaad krije de selekteare hegere pet. Op of ûnder dy drompel hat dit karfakje gjin effekt. Motor ûnferoare brûkt de normale 25% werom as in konservative +300% drompel sûnder feroarjen recycling resepten.
mir-prototype-efficiency-cap=Kiest hoe fier effisjinsje-effekten aktyf enerzjygebrûk fan masines kinne ferminderje. -80% (net feroare) lit besteande enerzjygebrûksgrinzen allinnich. Djippere reduksjes kinne nul aktyf enerzjygebrûk benaderje sûnder fersmoargingsgrinzen te feroarjen.
mir-prototype-pollution-cap=Kiest hoe fier fersmoarging-reduksje-effekten masinefersmoarging kinne ferminderje. -80% (net feroare) lit besteande fersmoarging grinzen allinnich. Djippere reduksjes kinne nul fersmoarging benaderje sûnder enerzjyferbrûk te feroarjen.
mir-prototype-speed-floor=Kiest hoe fier negative snelheidseffekten stipe masines kinne fertrage. -80% (net feroare) lit besteande grinzen allinnich; djippere wearden ferwiderje de normale flier nei in near-stop by -99.99%.
mir-prototype-speed-cap=Kiest oft MIR de grinzen fan masinesnelheidseffekt allinich lit of in nije positive snelheidslimyt skriuwt. +100000% (net feroare) behâldt besteande grinzen; legere wearden opsetsin clamp hiel grutte snelheid bonussen.
mir-prototype-quality-cap=Kiest of MIR de grinzen fan masinekwaliteit-effekt allinich lit litte of in nije positive kwaliteitskap skriuwt. + 100000% (net feroare) behâldt besteande grinzen en feroaret gjin kwaliteitsnivo's of formules foar wierskynlikheidsproblemen.
mir-prototype-positive-power-floor=Standert út. As ynskeakele, feroaret MIR eksplisite 0W aktive energy_usage prototypes nei 1W tidens it laden fan prototype, sadat ikoanen foar lege macht net ferskine op entiteiten dy't in lyts net-nul bedrach moatte lûke. Ferlitte om prototypes mei nul-krêft krekt te behâlden.
mir-settings-profile-import=Plak hjir in MIR-ynstellingsprofylstring om eksportearre opstartynstellingswearden oan te passen as in oerskriuwlaach by prototypegeneraasje. Lit leech foar normale ynstellings. Eksportearje mei /mir-settings-export fan in aktive opslach, start dan op 'e nij nei't jo dizze wearde wizigje.
mir-debug-generation-report=As ynskeakele, skriuwt ien strukturearre log-rige per generearre of oersleine stream en basisútwreiding, ynklusyf wittenskipspakketten, betingsten, effekttelling, lab-kompatibiliteitsstatus en byldkaikeboarne.
mir-debug-recipe-matches=As ynskeakele, skriuwt oerienkommende reseptnammen foar elke generearre produktiviteitsstream. Dit kin lawaaierich wêze yn grutte modpakketten.
mir-debug-scripted-effects=As ynskeakele, skriuwt runtime-log-yngongen as skripttechnologyen globale of evenemint-oandreaune effekten opnij berekkenje.
mir-lab-incompatibility-policy=Kiest wat MIR docht as de selektearre wittenskiplike pakketten net kinne wurde ûndersocht troch in aktyf laboratoarium.
ips-effect-per-level-stream=Stelt it primêre basis-tier-effekt per nivo yn foar __1__. Related lettere tiers en effekten wurde proporsjoneel skalearre. Persintaazje effekten brûke persintaazje punten; count en ôfstân effekten brûke harren lânseigen ienheden.
mir-effect-per-level=Stelt it kanonike effekt per nivo yn foar de ûneinige __1__ fuortsetting. Besibbe effekten wurde proporsjoneel skale fan 'e definitive vanillebasisline. Persintaazje effekten brûke persintaazje punten; count en ôfstân effekten brûke harren lânseigen ienheden.
mir-note-experimental-spoilage=Eksperiminteel en standert útskeakele yn v2.1.0. Dit is in wrâldwide / map-wide skripteffekt. Besteande spoilable-stack-gedrach wurdt net opeaske oant mei de hân validearre.
mir-note-agriculture-growth=Jildt foar nij oanplante agraryske toergewaaksen. Besteande beplante gewaaksen wurde net op 'e nij skaleard.
mir-note-cargo-pad-count=Special Space Age logistykûndersyk. Fergruttet lading landing pads per oerflak en kin substansjeel feroarje logistyk lykwicht.
mir-note-inserter-capacity=Standert útskeakele. Ekstra ynstekkerkapasiteit kin circuit-kontroleare ynstekkers brekke en motoroptimisaasjes ferminderje.
mir-note-native-owner-managed-stream=As in ynstallearre ûneinige technology al dizze ûndersyksfamylje hat, konfigurearje deselde opstartynstellingen dy eigner ynstee fan in duplikaat te meitsjen. Net feroare MIR-standerts behâlde it definitive prototype fan de eigner krekt. Eksplisite kosten, tiid, maksimum-nivo, en effekt overrides jilde allinnich nei in feilige eigner wedstriid; it útskeakeljen fan de stream lit de eksterne technology ûnoantaaste. Restart Factorio nei it feroarjen fan opstartynstellingen. In maksimum nivo fan 0 betsjut ûneinich, en effekt wearden binne persintaazje punten per nivo.

