[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Fiert gjin automatyske ûntdekking, taheaksel of oanmeitsjen út. It fêste ûndersyk fan MIR bliuwt net feroare.
mir-automatic-productivity-action-preview=Untdekt en klassifisearret kandidaten, skriuwt dan akseptearre en oersleine besluten nei it Factorio-log. It hechtet gjin resepten oan of makket gjin ûndersyk.
mir-automatic-productivity-action-apply=Standert. Untdekt kandidaten en hechtet allinich feiligens-bewiisde resepten oan kompatibel besteande MIR-ûndersyk. It makket gjin ûndersyk op himsels; de twa karfakjes hjirûnder regelje skepping.
mir-automatic-compiler-mode-off=Legacy ekwivalint fan útskeakele.
mir-automatic-compiler-mode-report=Legacy ekwivalint fan Preview feroarings.
mir-automatic-compiler-mode-safe-attach=Legacy-ekwivalint fan Feilige wizigingen tapasse mei oanmeitsjen fan ûndersyk útskeakele.
mir-automatic-compiler-mode-exact-pack=Legacy ekwivalint fan Feilige wizigingen tapasse mei oanmeitsjen fan ûndersyk ynskeakele en hifke kompatibiliteitsgegevens fereaske.
mir-automatic-compiler-mode-safe-generate=Legacy ekwivalint fan Feilige wizigingen tapasse mei oanmeitsjen fan ûndersyk ynskeakele foar registrearre eksperimintele providers.
mir-adjust-vanilla-weapon-speed-techs-off=Skeakelje MIR's opsjonele oerlappende raket-/kanonbonusopruiming út.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Ferwiderje de oerlappende raket-/kanonbonussen fan MIR allinich as in ynskeakele, berikbere ûneinige technology it krekte ferfangende effekt leveret.
mir-adjust-vanilla-weapon-speed-techs-always=Ferwiderje altyd de oerlappende raket-/kanonbonussen fan MIR. Brûk allinich as jo strikte skieding wolle.
mir-science-pack-ingredient-policy-configured=Brûk de konfigureare wittenskiplike pakketten fan elke generearre technology sûnder opsjonele útwreiding fan yngrediïnten. MIR standert.
mir-science-pack-ingredient-policy-space=Foegje romtewittenskip ta as beskikber. In ienfâldige post-raket muoite tanimmen.
mir-science-pack-ingredient-policy-space-and-promethium=Foegje romte en promethiumwittenskip ta as beskikber. Bêste foar heul lette Space Age-ûndersyksinks.
mir-science-pack-ingredient-policy-space-age-progression=Foegje allinich Space Age-progressionspakket ta ymplisearre troch de selekteare pakketten. Foegje net-relatearre modded packs ta.
mir-science-pack-ingredient-policy-official-progression=Foegje ûntbrekkende offisjele pakketten yn betingststyl ta ymplisearre troch it meast avansearre offisjele pakket dat al is selektearre.
mir-science-pack-ingredient-policy-mod-progression=Foegje ûntbrekkende lab-kompatibele pakketten ta ôflaat fan moddeare science-pack-progression en ûntsluten betingsten.
mir-science-pack-ingredient-policy-all-official=Brûk elk offisjele basis- en Space Age-wittenskippakket dat bestiet yn 'e hjoeddeistige mod-set.
mir-science-pack-ingredient-policy-all=Brûk elk aktyf lab-kompatibel wittenskipspakket, ynklusyf moddearre wittenskipspakketten.
mir-lab-incompatibility-policy-reduce=Hâld de technology troch syn wittenskiplike pakketten te ferminderjen nei de grutste set akseptearre troch in aktyf laboratoarium. Feilichste standert foar modpakketten.
mir-lab-incompatibility-policy-skip=Sla de technology oer as gjin aktyf laboratoarium syn selektearre science-pack-set kin ûndersykje. Strikter en makliker te kontrolearjen.
mir-lab-incompatibility-policy-engine-default=Skriuw de selekteare science-pack-set nea oer. MIR behâldt in feilich ûndersiikbere set ûnferoare en ferlit de generearre technology as Factorio dy krekte set net kin ûndersykje.
mir-prototype-productivity-cap-engine-default=Lit de besteande produktiviteitspet fan elk resept stean. Resepten sûnder in oanpaste pet brûke Factorio syn normale +300% produktiviteit bonus limyt.
mir-prototype-productivity-cap-percent-25=Stel produktiviteitskappen foar net-parameter resept op +25%. Dit is in strang betiid pet.
mir-prototype-productivity-cap-percent-50=Stel produktiviteitskappen foar net-parameterrezept yn op +50%. Dit is ûnder de normale pet en makket dat produktiviteitsûndersyk earder stopet te helpen.
mir-prototype-productivity-cap-percent-75=Stel produktiviteitskappen foar net-parameterrezept yn op +75%. Dit is ûnder de normale pet en makket dat produktiviteitsûndersyk earder stopet te helpen.
mir-prototype-productivity-cap-percent-100=Stel produktiviteitskappen foar net-parameterrezept yn op +100%. Dit is ûnder de normale pet en makket dat produktiviteitsûndersyk earder stopet te helpen.
mir-prototype-productivity-cap-percent-125=Set net-parameterrezeptproduktiviteitkappen op +125%.
mir-prototype-productivity-cap-percent-150=Stel produktiviteitskappen foar net-parameterrezept yn op +150%.
mir-prototype-productivity-cap-percent-200=Stel produktiviteitskappen foar net-parameter resept op +200%. Dit is ûnder de normale pet en makket dat produktiviteitsûndersyk earder stopet te helpen.
mir-prototype-productivity-cap-percent-250=Stel produktiviteitskappen foar net-parameterrezept yn op +250%. Dit is in bytsje ûnder de normale kap.
mir-prototype-productivity-cap-percent-400=Stel produktiviteitskappen foar net-parameterrezept yn op +400%. Dit wreidet skaalfergrutting fan produktiviteit út foarby de normale kap.
mir-prototype-productivity-cap-percent-500=Set net-parameterrezeptproduktiviteitkappen op +500%. Dit wreidet skaalfergrutting fan produktiviteit út foarby de normale kap.
mir-prototype-productivity-cap-percent-750=Set net-parameterrezeptproduktiviteitskappen op +750%.
mir-prototype-productivity-cap-percent-1000=Set net-parameterrezeptproduktiviteitkappen op +1000%. Brûk foar lange besparrings wêr't produktiviteitsûndersyk wichtich bliuwe moat.
mir-prototype-productivity-cap-percent-2500=Set net-parameterrezeptproduktiviteitkappen op +2500%. Brûk foar heul lange besparrings.
mir-prototype-productivity-cap-percent-5000=Stel produktiviteitskappen foar net-parameterrezept yn op +5000%.
mir-prototype-productivity-cap-percent-10000=Stel produktiviteitskappen foar net-parameterrezept yn op +10000%. Brûk allinich foar ekstreme skaalfergrutting op lange termyn.
mir-prototype-productivity-cap-percent-25000=Set net-parameterrezeptproduktiviteitskappen op +25000%. Brûk allinich foar ekstreme skaalfergrutting op lange termyn.
mir-prototype-productivity-cap-percent-100000=Set net-parameterrezeptproduktiviteitskappen op +100000%. Dit is effektyf uncapped foar de measte besparrings.
mir-recycling-return-chance-engine-default=Lit elk recyclingresept net feroare wurde.
mir-recycling-return-chance-match-productivity-cap=Eksploityffeilige automatyske reduksje foar ferburgen generearre recyclingresepten. Brûkt 1 / (1 + produktiviteit bonus), capped by de normale 25% werom: +400% wurdt 20%, en +1000% wurdt oer 9,09%.
mir-recycling-return-chance-percent-25=Hâld ferburgen generearre recyclingresepten by it normale rendemint fan 25% materiaal.
mir-recycling-return-chance-percent-20=Skaal ferburgen generearre recyclingresepten nei in rendemint fan 20% materiaal.
mir-recycling-return-chance-percent-15=Skaal ferburgen generearre recyclingresepten nei in 15% materiaalrendemint.
mir-recycling-return-chance-percent-12-5=Skaal ferburgen generearre recyclingresepten nei in materiaalrendemint fan 12,5%.
mir-recycling-return-chance-percent-10=Skaal ferburgen generearre recyclingresepten nei in 10% materiaalrendemint.
mir-recycling-return-chance-percent-7-5=Skaal ferburgen generearre recyclingresepten nei in materiaalrendemint fan 7,5%.
mir-recycling-return-chance-percent-5=Skaal ferburgen generearre recyclingresepten nei in materiaalrendemint fan 5%.
mir-recycling-return-chance-percent-2-5=Skaal ferburgen generearre recyclingresepten nei in materiaalrendemint fan 2,5%.
mir-recycling-return-chance-percent-1=Skaal ferburgen generearre recyclingresepten nei in materiaalrendemint fan 1%.
mir-recycling-return-chance-percent-0-5=Skaal ferburgen generearre recyclingresepten nei in materiaalrendemint fan 0,5%.
mir-recycling-return-chance-percent-0-1=Skaal ferburgen generearre recyclingresepten nei in 0,1% materiaalrendemint.
mir-prototype-efficiency-cap-engine-default=Lit de limyt foar enerzjygebrûk fan elke masine allinich. Masines sûnder in oanpaste limyt brûke Factorio syn normale -80% enerzjy-gebrûk effekt cap, sadat effekten kinne net ferminderje aktyf gebrûk ûnder 20%.
mir-prototype-efficiency-cap-saving-25=Skriuw in -25% enerzjygebrûkkap. Aktyf enerzjygebrûk bliuwt op 75% of mear nei effekten fan enerzjygebrûk.
mir-prototype-efficiency-cap-saving-50=Skriuw in -50% enerzjygebrûkkap. Aktyf enerzjygebrûk bliuwt op 50% of mear nei effekten fan enerzjygebrûk op stipe masines.
mir-prototype-efficiency-cap-saving-75=Skriuw in -75% enerzjygebrûkkap. Aktyf enerzjygebrûk bliuwt op 25% of mear nei effekten fan enerzjygebrûk op stipe masines.
mir-prototype-efficiency-cap-saving-90=Skriuw in -90% enerzjygebrûkkap. Aktive enerzjyferbrûk kin falle oant 10%, dat is ûnder de normale 20% flier.
mir-prototype-efficiency-cap-saving-95=Skriuw in -95% enerzjygebrûkkap. Aktive enerzjyferbrûk kin falle oant 5%.
mir-prototype-efficiency-cap-saving-99=Skriuw in -99% enerzjygebrûkkap. Aktive enerzjyferbrûk kin falle oant 1%.
mir-prototype-efficiency-cap-saving-999=Skriuw in -99.9% enerzjygebrûkkap. Aktive enerzjyferbrûk kin falle oant 0,1%.
mir-prototype-efficiency-cap-saving-9999=Skriuw in -99,99% enerzjygebrûkkap. Dit is hast nul aktyf enerzjygebrûk, net in nul-power prototype herskriuwen.
mir-prototype-pollution-cap-engine-default=Lit de limyt foar fersmoarging-effekt fan elke masine allinich. Masines sûnder in oanpaste limyt brûke Factorio syn normale -80% fersmoarging-effekt cap.
mir-prototype-pollution-cap-saving-25=Skriuw in -25% fersmoarging cap. Fersmoarging bliuwt op 75% of mear nei fersmoarging effekten.
mir-prototype-pollution-cap-saving-50=Skriuw in -50% fersmoarging cap. Fersmoarging bliuwt op 50% of mear nei fersmoarging effekten op stipe masines.
mir-prototype-pollution-cap-saving-75=Skriuw in -75% fersmoarging cap. Fersmoarging bliuwt op 25% of mear nei fersmoarging effekten op stipe masines.
mir-prototype-pollution-cap-saving-90=Skriuw in -90% fersmoarging cap. Fersmoarging kin falle oant 10%, dat is ûnder de normale 20% flier.
mir-prototype-pollution-cap-saving-95=Skriuw in -95% fersmoarging cap. Fersmoarging kin falle oant 5%.
mir-prototype-pollution-cap-saving-99=Skriuw in -99% fersmoarging cap. Fersmoarging kin falle oant 1%.
mir-prototype-pollution-cap-saving-999=Skriuw in -99.9% fersmoarging cap. Fersmoarging kin falle oant 0,1%.
mir-prototype-pollution-cap-saving-9999=Skriuw in -99.99% fersmoarging cap. Dit is hast nul fersmoarging, gjin runtime fersmoarging skript.
mir-prototype-speed-floor-engine-default=Lit de negative snelheidslimyt fan elke masine allinnich. Masines sûnder in oanpaste limyt brûke Factorio syn normale -80% flier en hâld op syn minst 20% snelheid.
mir-prototype-speed-floor-saving-25=Klem negative snelheidseffekten op -25%, wêrtroch op syn minst 75% snelheid bliuwt.
mir-prototype-speed-floor-saving-50=Klem negative snelheidseffekten op -50%, wêrtroch op syn minst 50% snelheid bliuwt.
mir-prototype-speed-floor-saving-75=Klem negative snelheidseffekten op -75%, wêrtroch op syn minst 25% snelheid bliuwt.
mir-prototype-speed-floor-saving-90=Tastean negative snelheidseffekten oant -90%, wêrtroch op syn minst 10% snelheid oerbliuwt.
mir-prototype-speed-floor-saving-95=Tastean negative snelheidseffekten oant -95%, wêrtroch op syn minst 5% snelheid oerbliuwt.
mir-prototype-speed-floor-saving-99=Tastean negative snelheidseffekten oant -99%, wêrtroch op syn minst 1% snelheid oerbliuwt.
mir-prototype-speed-floor-saving-999=Tastean negative snelheidseffekten oant -99.9%, wêrtroch op syn minst 0.1% snelheid oerbliuwt.
mir-prototype-speed-floor-saving-9999=Tastean negative snelheidseffekten oant -99.99%, de leechste Factorio-prototypelimyt. Dit is in near-stop, net nul of negative crafting snelheid.
mir-prototype-speed-cap-engine-default=Lit de snelheidslimyt fan elke masine allinnich. Masines sûnder in oanpaste limyt brûke Factorio's heul hege +100000% snelheidseffekt-plafond.
mir-prototype-speed-cap-bonus-25=Klem positive snelheidseffekten op +25%.
mir-prototype-speed-cap-bonus-50=Klem positive snelheidseffekten op +50%. Brûk dit te hâlden snelheid bonussen strak beheine.
