[technology-description]
more-infinite-research.recipe_productivity=Fergruttet de produktiviteit fan resepten foar de selekteare resepten. Factorio syn maksimale produktiviteit cap jildt noch; ekstra ûneinige nivo's kinne gjin praktysk effekt hawwe as ienris in resept har pet berikt.
more-infinite-research.direct_effect=Foeget in ûneinige werhelle bonus ta. Wittenskipspakketten wurde selektearre út aktive laboratoaren, sadat de technology ûndersiikber bliuwt mei kompatibele mod-sets.
more-infinite-research.cargo_bay_unloading_distance=Fergruttet de maksimale ôfstân tusken in frachtlandingsplak en oansletten losbaaien.
more-infinite-research.cargo_landing_pad_count=Fergruttet it oantal ladinglandingspaden dy't elke krêft per oerflak kin bouwe.
more-infinite-research.flamethrower_shooting_speed=Fergruttet sjitsnelheid foar flamethrower-wapens en flamethrower-turrets.
more-infinite-research.electric_shooting_speed=Fergruttet sjitsnelheid foar elektryske wapens. Yn vanille dit beynfloedet discharge ferdigening; mei Space Age hat it ek ynfloed op Tesla-wapens as de tesla-ammo-kategory beskikber is.
more-infinite-research.spoilage_preservation=Fergruttet de wiziging fan 'e globale bederftiid troch in beheine skripteffekt. Besteande bedoarbere items kinne har hjoeddeistige bederfdeadlines hâlde oant se yn-spultsje testen.
more-infinite-research.agricultural_growth_speed=Ferkoart de oerbleaune groeitiid foar nij oanplante lânboutoerplanten troch in beheind skripteffekt.
more-infinite-research.lab_productivity=Fergruttet de foarútgong fan ûndersyk krigen fan elk konsumearre wittenskipspakket, mei de eigen produktiviteitsmodifikaasje foar laboratoariumûndersyk.

