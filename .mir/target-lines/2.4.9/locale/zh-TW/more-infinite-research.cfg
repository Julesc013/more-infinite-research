[technology-description]
more-infinite-research.recipe_productivity=提高所選配方的配方生產率。異星工廠的最高生產力上限仍然適用；一旦配方達到上限，額外的無限等級可能沒有實際效果。
more-infinite-research.direct_effect=添加無限可重複的獎勵。科學包是從活躍的實驗室中選擇的，因此該技術仍然可以透過相容的模組集進行研究。
more-infinite-research.cargo_bay_unloading_distance=增加貨物著陸場和連接的卸貨港之間的最大距離。
more-infinite-research.cargo_landing_pad_count=增加每個部隊可以在每個表面建造的貨物著陸場的數量。
more-infinite-research.flamethrower_shooting_speed=提高火焰噴射器武器和火焰噴射器砲塔的射擊速度。
more-infinite-research.electric_shooting_speed=提高電動武器的射擊速度。在原版中，這會影響放電防禦；在太空時代，當特斯拉彈藥類別可用時，它也會影響特斯拉武器。
more-infinite-research.spoilage_preservation=透過有界腳本效果增加全域破壞時間修改器。現有的可破壞物品可能會保留當前的破壞期限，直到在遊戲中進行測試。
more-infinite-research.agricultural_growth_speed=透過有限的腳本效果縮短新種植的農業塔式植物的剩餘生長時間。
more-infinite-research.lab_productivity=使用本機實驗室研究生產力修改器，增加從每個消耗的科學套件中獲得的研究進度。

