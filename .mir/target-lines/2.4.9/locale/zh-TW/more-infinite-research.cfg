[mod-setting-description]
ips-require-space-gate=啟用後，這些技術將保持鎖定狀態，直到在普通版中研究太空科學，或在太空時代中研究鯛科學。
mir-science-pack-ingredient-policy=選擇 MIR 如何將科學套件加入產生的技術。選項按從保守到廣泛的順序排列：預設包、遊戲後期包、基於進度的包，然後是所有可用包。
mir-automatic-productivity-action=選擇 MIR 透過在已安裝的模組配方中找到的安全生產力機會來執行的操作。禁用不執行自動發現。預覽更改異星工廠日誌中接受和跳過的候選人記錄，而不更改研究。應用安全變更（預設）僅將符合條件的配方新增至相容的現有 MIR 研究中。這控制著行動，而不是力量或成熟度；下面的創建複選框是單獨的。所有權、回收、機率、催化劑、科學、實驗室、先決條件、目標、身分、進度和週期檢查始終適用。
mir-automatic-create-research=預設：關閉。禁止 對相容的現有 MIR 研究應用安全更改；沒有合適流的候選人將被跳過並報告。 On 讓合格的註冊提供者在現有研究不適合時創建穩定的通用無限生產力技術。下面的審核資料複選框決定實驗提供者是否符合資格。 MIR 從未為每個模組或配方創造一種技術，每一項硬安全、科學、所有權、身分、進度和循環門仍然適用。
mir-automatic-require-reviewed-data=預設：開啟。只有當啟用「允許新的研究創建」時，這才重要；它永遠不會阻礙對現有研究的安全依戀。在許可證上，只有提供者家庭被標記為經過適用的精確版本證據的審查和支持，因此實驗家庭會被跳過。 Off 允許註冊實驗提供者根據通用結構證據進行建立。對於最廣泛的實驗行為，啟用研究創建並關閉此要求。任何價值都無法繞過硬安全門。
mir-automatic-compiler-mode=在分割自動生產力控制之前建立的設定檔的隱藏相容性橋。只有當所有新控制項保持預設值時，才會採用非預設舊值。變更任何新控制項以進行明確控制。
ips-enable-stream=當其配方、效果、先決條件和科學包可用時，為__1__創建生成的無限技術。停用此選項可防止 MIR 產生該技術。
ips-cost-base-stream=第一個生成等級__1__所需的研究單位。必須至少為 1。後續等級根據該值和成本增長因子計算。
ips-cost-growth-stream=乘數應用於__1__ 的每個後續等級。使用 1 表示固定成本，使用 1.5 表示每等級成長 50%，或使用 2 表示成本加倍。
ips-max-level-stream=__1__ 的最高生成等級。設定為 0 表示無限等級。
ips-research-time-stream=__1__ 每個研究單位的秒數。設定為 0 以使用 MIR 對此技術的預設設定。這不是總的研究時間；總時間還取決於研究成本、實驗室數量、實驗室速度和模組。
mir-enable-base-tech=允許__1__ 繼續超越其香草上限作為無限技術。如果您希望 MIR 新增的研究線而不擴展此香草鏈，請停用此選項。
mir-cost-base=第一個 MIR 延續等級__1__ 所需的研究單位。如果可能，則設定為 0 以繼承普通鏈的成本模式。
mir-cost-growth=乘數應用於__1__ 的每個後續 MIR 延續等級。如果可能，則設定為 0 以繼承原版鏈的成長模式。
mir-max-level=__1__ 的最高 MIR 延續等級。設定為 0 表示無限等級。
mir-research-time=MIR 延續__1__ 的每個研究單位的秒數。如果可能，設定為 0 以繼承原版鏈的研究單位時間。
mir-prefer-this-mod-for-competing-techs=啟用後，此 mod 會刪除選取的競爭無限擴充並使用自己的版本。停用以保留其他模組的競爭版本。
mir-adjust-vanilla-weapon-speed-techs=控制當精確的無限替換覆蓋範圍可用時，MIR 是否從其產生的武器射擊速度延續中刪除火箭和砲彈速度加成。有限的香草武器射擊速度技術保留了原有的獎勵。
mir-use-installed-space-age-icons=啟用後，MIR 可能會引用已安裝的官方 DLC 圖示文件，包括 Space Age 和 Elevated Rails，即使這些 mod 在基礎遊戲運行中被停用。如果未安裝這些 DLC 文件，請將其關閉； Factorio 無法在原型載入期間從遺失的圖示檔案中正常恢復。
mir-pipeline-extent-multiplier=僅啟動下拉乘數，用於跨原型（而不僅僅是管道實體）識別流體盒管道範圍欄位。 100% 使原型保持不變，並且不載入管道通道或掃描流體盒。非 100% 值是實驗性的，可能會影響定義流體箱的機器、坦克、推進器和改裝原型。
mir-unrestricted-modules=實驗性且打破平衡。啟用後，每個現有配方都會接受所有五個模組效果，每個帶有插槽的現有模組接收器都會接受每個發現的模組類別。這不會添加模組插槽或更改模組原型，並且可以實現生產力、品質和模組化模組循環。
mir-prototype-productivity-cap=選擇 MIR 是單獨保留配方生產力上限，還是為每個非參數、非循環配方寫入啟動上限。 +300%（不變）保留現有配方上限；較低的值會縮短生產力擴展，而較高的值則會延長生產力擴展。
mir-recycling-return-chance=僅控制隱藏生成的回收配方。自動模式將正常 25% 的材料回收率減少到最多 1 除以所選生產率上限的總產量乘數。固定選擇直接縮放相同的生成回報。可見的流程和配方生產力上限永遠不會改變。
mir-productivity-cap-self-recycling-only=高於 1 / 回收商返回 - 1，只有具有經過驗證的非生成自回收路徑的生產配方才會收到所選的更高上限。等於或低於該閾值時，此複選框不起作用。引擎不變，使用正常的 25% 回報作為保守的+300% 閾值，而不改變回收配方。
mir-prototype-efficiency-cap=選擇效率效果可減少機器主動能源使用的程度。 -80%（不變），不考慮現有的能源使用限制。更深入的減少可以在不改變污染限制的情況下接近零主動能源使用。
mir-prototype-pollution-cap=選擇污染減少效果可以減少機器污染的程度。 -80%（不變），不考慮現有的污染限制。更深入的減排可以在不改變能源使用的情況下實現零污染。
mir-prototype-speed-floor=選擇負速度影響可能會減慢受支援機器的速度。 -80%（不變）不考慮現有限制；較深的值將正常下限移除到接近停止的 -99.99%。
mir-prototype-speed-cap=選擇 MIR 單獨保留機器速度影響限制還是寫入新的正速度上限。 +100000%（不變）保留現有限制；較低的值會故意限制非常大的速度獎勵。
mir-prototype-quality-cap=選擇 MIR 是否單獨保留機器品質影響限製或寫入新的正質量上限。 +100000%（不變）保留現有限制，且不會更改品質等級或物品機率公式。
mir-prototype-positive-power-floor=預設關閉。啟用後，MIR 在原型載入期間將明確 0W 活動 energy_usage 原型變更為 1W，因此低功耗警告圖示不會出現在應繪製微小非零量的實體上。保留零功耗原型。
mir-settings-profile-import=在此處貼上 MIR 設定設定檔字串，以在原型產生期間套用匯出的啟動設定值作為覆蓋層。對於正常設定留空。使用 /mir-settings-export 從活動保存匯出，然後在變更此值後重新啟動。
mir-debug-generation-report=啟用後，為每個產生或跳過的流和基本擴充寫入一個結構化日誌行，包括科學包、先決條件、效果計數、實驗室相容性狀態和圖示來源。
mir-debug-recipe-matches=啟用後，為每個產生的生產力流寫入匹配的配方名稱。這在大型模組包中可能會很吵。
mir-debug-scripted-effects=啟用後，當腳本技術重新計算全域或事件驅動效果時寫入執行時間日誌條目。
mir-lab-incompatibility-policy=選擇當所選科學包無法被任何活躍實驗室研究時 MIR 執行的操作。
ips-effect-per-level-stream=設定__1__每個等級的主要基礎層效果。相關的後續層和效果按比例縮放。百分比效應使用百分點；計數和距離效果使用其原生單位。
mir-effect-per-level=設定無限延續的規範每級效果__1__。相關效應從最終的原始基線按比例縮放。百分比效應使用百分點；計數和距離效果使用其原生單位。
mir-note-experimental-spoilage=實驗性的，在 v2.1.0 中預設為停用。這是全域/地圖範圍內的腳本效果。在手動驗證之前，不會聲明現有的破壞堆疊行為。
mir-note-agriculture-growth=適用於新種植的塔式作物。現有種植作物不會重新調整規模。
mir-note-cargo-pad-count=特殊太空時代物流研究。增加每個表面的貨物著陸場，可以顯著改變物流平衡。
mir-note-inserter-capacity=預設禁用。額外的插入器容量可能會破壞電路控制的插入器並減少引擎最佳化。
mir-note-native-owner-managed-stream=如果已安裝的無限技術已擁有此研究系列，則這些相同的啟動設定將配置該所有者，而不是建立副本。未更改的 MIR 預設值準確地保留了所有者的最終原型。明確的成本、時間、最大等級和效果覆蓋僅在安全性所有者匹配後適用；禁用流不會影響外部技術。更改啟動設定後重新啟動異星工廠。最大等級 0 表示無限，效果值為每個等級的百分點。

