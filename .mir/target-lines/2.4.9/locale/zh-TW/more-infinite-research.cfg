[string-mod-setting-description]
mir-automatic-productivity-action-disabled=不執行自動發現、附加或建立。 MIR的固定研究維持不變。
mir-automatic-productivity-action-preview=發現候選者並對其進行分類，然後將接受和跳過的決策寫入異星工廠日誌。它不附加食譜或創建研究。
mir-automatic-productivity-action-apply=預設。發現候選者並僅將經過安全驗證的配方附加到相容的現有 MIR 研究中。它本身並沒有創造研究；下面的兩個複選框控制創建。
mir-automatic-compiler-mode-off=舊版的「停用」等效項。
mir-automatic-compiler-mode-report=預覽版更改的舊版等效項。
mir-automatic-compiler-mode-safe-attach=舊版相當於套用安全變更並停用研究建立。
mir-automatic-compiler-mode-exact-pack=舊版相當於應用安全更改，啟用研究創建並審查所需的兼容性資料。
mir-automatic-compiler-mode-safe-generate=舊版相當於為註冊實驗提供者應用安全變更並啟用研究創建。
mir-adjust-vanilla-weapon-speed-techs-off=停用 MIR 可選的重疊火箭/加農炮獎勵清理。
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=僅當啟用的、可達到的無限技術提供精確的替代效果時，才刪除 MIR 的重疊火箭/加農炮獎勵。
mir-adjust-vanilla-weapon-speed-techs-always=始終移除 MIR 重疊的火箭/加農炮獎勵。僅當您想要嚴格分離時才使用。
mir-science-pack-ingredient-policy-configured=使用每種生成技術的配置科學包，無需可選的成分擴展。米爾預設值。
mir-science-pack-ingredient-policy-space=加入空間科學（如果有）。簡單的火箭後難度增加。
mir-science-pack-ingredient-policy-space-and-promethium=添加空間和釩科學（如果有）。最適合太空時代晚期的研究水槽。
mir-science-pack-ingredient-policy-space-age-progression=僅添加所選包暗示的太空時代進度包。不添加不相關的模組包。
mir-science-pack-ingredient-policy-official-progression=添加已選擇的最高級官方包所暗示的缺少的官方先決條件樣式包。
mir-science-pack-ingredient-policy-mod-progression=加入從修改後的科學包進程中推斷出的缺失的實驗室相容包並解鎖先決條件。
mir-science-pack-ingredient-policy-all-official=使用目前模組集中存在的每個官方基地和太空時代科學包。
mir-science-pack-ingredient-policy-all=使用每個活躍的實驗室相容科學包，包括改裝的科學包。
mir-lab-incompatibility-policy-reduce=透過將其科學包減少到活躍實驗室接受的最大組來保留技術。模組包的最安全預設值。
mir-lab-incompatibility-policy-skip=如果沒有活躍實驗室可以研究其選定的科學包集，則跳過該技術。更嚴格、更容易審核。
mir-lab-incompatibility-policy-engine-default=切勿重寫選定的科學包集。 MIR 會保留可安全研究的集合不變，並在異星工廠無法研究該確切集合時忽略生成的技術。
mir-prototype-productivity-cap-engine-default=保留每個配方現有的生產力上限。沒有自訂上限的配方使用異星工廠的正常 +300% 生產力獎勵限制。
mir-prototype-productivity-cap-percent-25=將非參數配方生產率上限設定為 +25%。這是嚴格的早期上限。
mir-prototype-productivity-cap-percent-50=將非參數配方生產率上限設定為 +50%。這低於正常上限，使生產力研究更快停止提供幫助。
mir-prototype-productivity-cap-percent-75=將非參數配方生產率上限設定為 +75%。這低於正常上限，使生產力研究更快停止提供幫助。
mir-prototype-productivity-cap-percent-100=將非參數配方生產率上限設定為 +100%。這低於正常上限，使生產力研究更快停止提供幫助。
mir-prototype-productivity-cap-percent-125=將非參數配方生產率上限設定為 +125%。
mir-prototype-productivity-cap-percent-150=將非參數配方生產率上限設定為 +150%。
mir-prototype-productivity-cap-percent-200=將非參數配方生產率上限設定為 +200%。這低於正常上限，使生產力研究更快停止提供幫助。
mir-prototype-productivity-cap-percent-250=將非參數配方生產率上限設定為 +250%。這略低於正常上限。
mir-prototype-productivity-cap-percent-400=將非參數配方生產率上限設定為 +400%。這使得生產力擴展超出了正常上限。
mir-prototype-productivity-cap-percent-500=將非參數配方生產率上限設定為 +500%。這使得生產力擴展超出了正常上限。
mir-prototype-productivity-cap-percent-750=將非參數配方生產率上限設定為 +750%。
mir-prototype-productivity-cap-percent-1000=將非參數配方生產率上限設定為 +1000%。用於長時間保存，生產力研究應該保持重要。
mir-prototype-productivity-cap-percent-2500=將非參數配方生產率上限設定為 +2500%。用於很長時間的保存。
mir-prototype-productivity-cap-percent-5000=將非參數配方生產率上限設定為 +5000%。
mir-prototype-productivity-cap-percent-10000=將非參數配方生產率上限設定為 +10000%。僅用於極端長期擴展。
mir-prototype-productivity-cap-percent-25000=將非參數配方生產率上限設定為 +25000%。僅用於極端長期擴展。
mir-prototype-productivity-cap-percent-100000=將非參數配方生產率上限設定為 +100000%。對於大多數保存來說，這實際上是不受限制的。
mir-recycling-return-chance-engine-default=保持每個回收配方不變。
mir-recycling-return-chance-match-productivity-cap=隱藏產生的回收配方的安全漏洞自動還原。使用 1 / (1 + 生產力獎金)，上限為正常的 25% 回報：+400% 變為 20%，+1000% 變為約 9.09%。
mir-recycling-return-chance-percent-25=以正常 25% 的材料回報率保留隱藏生成的回收配方。
mir-recycling-return-chance-percent-20=將隱藏生成的回收配方擴大到 20% 的材料回報。
mir-recycling-return-chance-percent-15=將隱藏生成的回收配方擴大到 15% 的材料回報。
mir-recycling-return-chance-percent-12-5=將隱藏生成的回收配方擴大到 12.5% 的材料回報率。
mir-recycling-return-chance-percent-10=將隱藏生成的回收配方擴大到 10% 的材料回報。
mir-recycling-return-chance-percent-7-5=將隱藏生成的回收配方擴大到 7.5% 的材料回報率。
mir-recycling-return-chance-percent-5=將隱藏生成的回收配方擴大到 5% 的材料回報。
mir-recycling-return-chance-percent-2-5=將隱藏生成的回收配方擴大到 2.5% 的材料回報。
mir-recycling-return-chance-percent-1=將隱藏生成的回收配方擴大到 1% 的材料回報。
mir-recycling-return-chance-percent-0-5=將隱藏生成的回收配方擴大到 0.5% 的材料回報。
mir-recycling-return-chance-percent-0-1=將隱藏生成的回收配方擴大到 0.1% 的材料回報。
mir-prototype-efficiency-cap-engine-default=不考慮每台機器的能源使用效果限制。沒有自訂限制的機器使用異星工廠的正常 -80% 能量使用效果上限，因此效果無法將活躍使用減少到 20% 以下。
mir-prototype-efficiency-cap-saving-25=寫入-25% 的能源使用上限。能量使用效果後，主動能量使用維持在75%以上。
mir-prototype-efficiency-cap-saving-50=寫入 -50% 的能源使用上限。在對受支援的機器產生能源使用影響後，主動能源使用率維持在 50% 或更高。
mir-prototype-efficiency-cap-saving-75=寫入-75% 的能源使用上限。在對受支援的機器產生能源使用影響後，主動能源使用率維持在 25% 或更高。
mir-prototype-efficiency-cap-saving-90=寫入-90% 的能源使用上限。主動能源使用量可降至 10%，低於正常的 20% 下限。
mir-prototype-efficiency-cap-saving-95=寫入-95% 的能源使用上限。主動能源使用量可降至 5%。
mir-prototype-efficiency-cap-saving-99=寫入-99% 的能源使用上限。主動能源使用量可降至 1%。
mir-prototype-efficiency-cap-saving-999=寫入-99.9% 的能源使用上限。主動能源使用量可降至 0.1%。
mir-prototype-efficiency-cap-saving-9999=寫入-99.99% 的能源使用上限。這是接近零的有功能耗，而不是零功耗原型重寫。
mir-prototype-pollution-cap-engine-default=不考慮每台機器的污染影響限制。沒有自訂限制的機器使用異星工廠的正常 -80% 污染影響上限。
mir-prototype-pollution-cap-saving-25=寫入-25% 的污染上限。污染影響後污染度維持在75%以上。
mir-prototype-pollution-cap-saving-50=寫入-50% 污染上限。在污染影響到支援的機器後，污染保持在 50% 或更高。
mir-prototype-pollution-cap-saving-75=寫入-75% 的污染上限。在污染影響到支援的機器後，污染保持在 25% 或更高。
mir-prototype-pollution-cap-saving-90=寫入-90% 污染上限。污染可以降至 10%，低於正常的 20% 下限。
mir-prototype-pollution-cap-saving-95=寫入-95% 的污染上限。污染可降至5%。
mir-prototype-pollution-cap-saving-99=寫入-99% 的污染上限。污染可降至1%。
mir-prototype-pollution-cap-saving-999=寫入-99.9% 的污染上限。污染可降至0.1%。
mir-prototype-pollution-cap-saving-9999=寫入-99.99% 的污染上限。這是近乎零污染的，而不是運行時污染腳本。
mir-prototype-speed-floor-engine-default=保留每台機器的負速度限制。沒有自訂限制的機器使用異星工廠的正常 -80% 底線並保持至少 20% 的速度。
mir-prototype-speed-floor-saving-25=將負速度影響限制在 -25%，保留至少 75% 的速度。
mir-prototype-speed-floor-saving-50=將負速度影響限制在 -50%，至少保留 50% 的速度。
mir-prototype-speed-floor-saving-75=將負速度影響限制在 -75%，保留至少 25% 的速度。
mir-prototype-speed-floor-saving-90=允許負速度影響降至-90%，至少保留 10% 的速度。
mir-prototype-speed-floor-saving-95=允許負速度影響降至-95%，至少保留 5% 的速度。
