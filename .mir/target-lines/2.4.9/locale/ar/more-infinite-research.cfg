[technology-description]
more-infinite-research.recipe_productivity=يزيد من إنتاجية الوصفات للوصفات المختارة. لا يزال الحد الأقصى للإنتاجية الخاص بـ Factorio ساريًا؛ قد لا يكون للمستويات اللانهائية الإضافية أي تأثير عملي بمجرد وصول الوصفة إلى الحد الأقصى.
more-infinite-research.direct_effect=يضيف مكافأة لا حصر لها قابلة للتكرار. يتم اختيار حزم العلوم من المعامل النشطة بحيث تظل التكنولوجيا قابلة للبحث باستخدام مجموعات التعديل المتوافقة.
more-infinite-research.cargo_bay_unloading_distance=يزيد الحد الأقصى للمسافة بين منصة هبوط البضائع وخلجان التفريغ المتصلة.
more-infinite-research.cargo_landing_pad_count=يزيد من عدد منصات هبوط البضائع التي يمكن لكل قوة بناءها على كل سطح.
more-infinite-research.flamethrower_shooting_speed=يزيد من سرعة إطلاق النار لأسلحة قاذف اللهب وأبراج قاذف اللهب.
more-infinite-research.electric_shooting_speed=يزيد من سرعة إطلاق النار للأسلحة الكهربائية. في الفانيليا يؤثر هذا على الدفاع عن التفريغ. مع Space Age، فإنه يؤثر أيضًا على أسلحة Tesla عند توفر فئة ذخيرة Tesla.
more-infinite-research.spoilage_preservation=يزيد معدل وقت التدمير العالمي من خلال تأثير مكتوب محدد. قد تحتفظ العناصر الموجودة القابلة للتلف بالمواعيد النهائية الحالية للتلف حتى يتم اختبارها داخل اللعبة.
more-infinite-research.agricultural_growth_speed=يعمل على تقصير وقت النمو المتبقي لنباتات الأبراج الزراعية المزروعة حديثًا من خلال تأثير مكتوب محدد.
more-infinite-research.lab_productivity=يزيد من التقدم البحثي المكتسب من كل حزمة علمية مستهلكة، باستخدام معدّل إنتاجية أبحاث المختبر الأصلي.

