[mod-setting-description]
ips-require-space-gate=عند التمكين، تظل هذه التقنيات مغلقة حتى يتم البحث في علوم الفضاء في الفانيليا، أو يتم البحث في علوم البروميثيوم في عصر الفضاء.
mir-science-pack-ingredient-policy=يختار كيفية إضافة MIR للحزم العلمية إلى التقنيات التي تم إنشاؤها. يتم ترتيب الخيارات من المحافظ إلى الواسع: الحزم الافتراضية، وحزم اللعبة المتأخرة، والحزم القائمة على التقدم، ثم جميع الحزم المتاحة.
mir-automatic-productivity-action=يختار ما تفعله MIR بفرص الإنتاجية الآمنة الموجودة في الوصفات المثبتة. معطل لا يؤدي إلى اكتشاف تلقائي. معاينة سجلات التغييرات المقبولة والمرشحين الذين تم تخطيهم في سجل Factorio دون تغيير البحث. يؤدي تطبيق التغييرات الآمنة (افتراضي) إلى إضافة الوصفات المؤهلة فقط إلى أبحاث MIR الحالية المتوافقة. وهذا يتحكم في الفعل، وليس القوة أو النضج؛ مربعات اختيار الإنشاء أدناه منفصلة. يتم دائمًا تطبيق الملكية، وإعادة التدوير، والاحتمالية، والمحفز، والعلوم، والمختبر، والمتطلبات الأساسية، والهدف، والهوية، والتقدم، والفحوصات الدورية.
mir-automatic-create-research=الافتراضي: إيقاف. خارج الحدود تطبيق تغييرات آمنة على أبحاث MIR الحالية المتوافقة؛ يتم تخطي المرشحين الذين ليس لديهم تدفق مناسب والإبلاغ عنهم. يسمح On لموفر خدمة مسجل مؤهل بإنشاء تقنية إنتاجية عامة لا نهائية ومستقرة عندما لا يكون هناك بحث موجود مناسبًا. يحدد مربع اختيار البيانات التي تمت مراجعتها أدناه ما إذا كان مقدمو الخدمة التجريبيون مؤهلين أم لا. لا تقوم MIR أبدًا بإنشاء تقنية واحدة لكل تعديل أو وصفة، ولا تزال كل إجراءات السلامة والعلم والملكية والهوية والتقدم وبوابة الدورة سارية.
mir-automatic-require-reviewed-data=الافتراضي: تشغيل. وهذا مهم فقط عندما يكون السماح بإنشاء بحث جديد قيد التشغيل؛ فهو لا يمنع أبدًا الارتباط الآمن بالأبحاث الموجودة. في التصاريح، تم وضع علامة "مراجعة" ومدعومة بأدلة النسخة الدقيقة المعمول بها فقط على العائلات المقدمة، لذلك يتم تخطي العائلات التجريبية. يسمح Off لمقدمي الخدمات التجريبية المسجلين بالإنشاء من الأدلة الهيكلية العامة. بالنسبة للسلوك التجريبي الأوسع، قم بتمكين إنشاء الأبحاث وإيقاف تشغيل هذا المطلب. لا يمكن لأي قيمة أن تتجاوز بوابة الأمان الصلبة.
mir-automatic-compiler-mode=جسر التوافق المخفي للملفات الشخصية التي تم إنشاؤها قبل عناصر التحكم في الإنتاجية التلقائية المنقسمة. يتم احترام القيمة القديمة غير الافتراضية فقط عندما تظل كافة عناصر التحكم الجديدة في إعداداتها الافتراضية. قم بتغيير أي عنصر تحكم جديد للحصول على تحكم صريح.
ips-enable-stream=ينشئ التكنولوجيا اللانهائية التي تم إنشاؤها لـ __1__ عندما تتوفر وصفاتها وتأثيراتها ومتطلباتها الأساسية وحزمها العلمية. قم بتعطيل هذا لمنع MIR من إنشاء هذه التقنية.
ips-cost-base-stream=الوحدات البحثية المطلوبة للمستوى الأول المتولد من __1__. يجب أن تكون على الأقل 1. ويتم حساب المستويات اللاحقة من هذه القيمة وعامل نمو التكلفة.
ips-cost-growth-stream=يتم تطبيق المضاعف على كل مستوى لاحق من __1__. استخدم 1 للتكاليف الثابتة، أو 1.5 للنمو بنسبة 50% لكل مستوى، أو 2 لمضاعفة التكاليف.
ips-max-level-stream=أعلى مستوى تم إنشاؤه لـ __1__. اضبط على 0 لمستويات لا نهائية.
ips-research-time-stream=ثانية لكل وحدة بحث لـ __1__. اضبط على 0 لاستخدام الإعداد الافتراضي لـ MIR لهذه التقنية. هذا ليس وقت البحث الإجمالي؛ يعتمد الوقت الإجمالي أيضًا على تكلفة البحث وعدد المعامل وسرعة المعمل والوحدات النمطية.
mir-enable-base-tech=يسمح لـ __1__ بالاستمرار في تجاوز غطاء الفانيليا كتقنية لا نهائية. قم بتعطيل هذا إذا كنت تريد من MIR إضافة خطوط بحث جديدة دون توسيع سلسلة الفانيليا هذه.
mir-cost-base=الوحدات البحثية المطلوبة للمستوى الأول الاستمراري MIR لـ __1__. اضبط على 0 لترث نمط تكلفة سلسلة الفانيليا عندما يكون ذلك ممكنًا.
mir-cost-growth=يتم تطبيق المضاعف على كل مستوى استمرار MIR لاحق لـ __1__. اضبط على 0 لترث نمط نمو سلسلة الفانيليا عندما يكون ذلك ممكنًا.
mir-max-level=أعلى مستوى استمرار MIR لـ __1__. اضبط على 0 لمستويات لا نهائية.
mir-research-time=ثانية لكل وحدة بحث لاستمرار MIR لـ __1__. اضبط على 0 لترث وقت وحدة البحث الخاصة بسلسلة الفانيليا عندما يكون ذلك ممكنًا.
mir-prefer-this-mod-for-competing-techs=عند التمكين، يقوم هذا الوضع بإزالة الامتدادات اللانهائية المتنافسة المحددة ويستخدم إصداراته الخاصة. تعطيل للاحتفاظ بالإصدارات المنافسة من التعديلات الأخرى.
mir-adjust-vanilla-weapon-speed-techs=يتحكم فيما إذا كانت MIR تزيل مكافآت سرعة الصواريخ وقذائف المدفع من استمرار سرعة إطلاق الأسلحة الناتجة عند توفر تغطية بديلة لا نهائية دقيقة. تحتفظ تقنيات سرعة إطلاق أسلحة الفانيليا المحدودة بمكافآتها الأصلية.
mir-use-installed-space-age-icons=عند التمكين، قد تشير MIR إلى ملفات أيقونات DLC الرسمية المثبتة، بما في ذلك Space Age وElevated Rails، حتى عندما يتم تعطيل هذه التعديلات لتشغيل اللعبة الأساسية. اترك هذا معطلاً إذا لم يتم تثبيت ملفات DLC هذه؛ لا يمكن لـ Factorio استرداد ملفات الأيقونات المفقودة بأمان أثناء تحميل النموذج الأولي.
mir-pipeline-extent-multiplier=مضاعف القائمة المنسدلة لبدء التشغيل فقط لحقول امتداد خط أنابيب صندوق السوائل المعترف بها عبر النماذج الأولية، وليس فقط كيانات الأنابيب. 100% يترك النماذج الأولية دون تغيير ولا يقوم بتحميل ممر خط الأنابيب أو مسح صناديق السوائل. تعتبر القيم غير 100% تجريبية ويمكن أن تؤثر على الآلات والخزانات وأجهزة الدفع والنماذج الأولية المعدلة التي تحدد صناديق السوائل.
mir-unrestricted-modules=التجريبية وكسر التوازن. عند التمكين، تقبل كل وصفة موجودة جميع تأثيرات الوحدة الخمسة، ويقبل كل مستقبل وحدة موجود به فتحات كل فئة وحدة تم اكتشافها. لا يؤدي هذا إلى إضافة فتحات الوحدة أو تغيير النماذج الأولية للوحدة، وقد يؤدي إلى تمكين الإنتاجية والجودة وحلقات الوحدة المعدلة.
mir-prototype-productivity-cap=يختار ما إذا كان MIR يترك الحدود القصوى لإنتاجية الوصفة بمفردها أو يكتب حدًا أقصى لبدء التشغيل لكل وصفة غير معلمة وغير قابلة لإعادة التدوير. +300% (بدون تغيير) يحافظ على الحد الأقصى للوصفة الحالية؛ تعمل القيم المنخفضة على تقصير مقياس الإنتاجية، بينما تعمل القيم الأعلى على توسيع نطاقه.
mir-recycling-return-chance=يتحكم في وصفات إعادة التدوير المخفية فقط. يعمل الوضع التلقائي على تقليل العائد الطبيعي للمادة بنسبة 25% إلى 1 مقسومًا على إجمالي مضاعف الإنتاج عند الحد الأقصى للإنتاجية المحدد. تعمل الاختيارات الثابتة على قياس نفس العوائد التي تم إنشاؤها مباشرةً. لا يتم تغيير العمليات المرئية والحد الأقصى لإنتاجية الوصفة أبدًا.
mir-productivity-cap-self-recycling-only=أعلاه 1 / عودة إعادة التدوير - 1، فقط وصفات الإنتاج ذات مسار إعادة التدوير الذاتي غير التوليدي المثبت هي التي تحصل على الحد الأقصى المحدد. عند هذا الحد أو أقل منه، لن يكون لمربع الاختيار هذا أي تأثير. يستخدم المحرك دون تغيير العائد الطبيعي بنسبة 25% كحد أدنى +300% دون تغيير وصفات إعادة التدوير.
mir-prototype-efficiency-cap=يختار إلى أي مدى قد تؤدي تأثيرات الكفاءة إلى تقليل الاستخدام النشط للطاقة في الماكينة. -80% (بدون تغيير) تترك حدود استخدام الطاقة الحالية كما هي. يمكن أن تقترب التخفيضات الأعمق من استخدام الطاقة النشطة دون تغيير حدود التلوث.
mir-prototype-pollution-cap=يختار إلى أي مدى قد تؤدي تأثيرات تقليل التلوث إلى تقليل تلوث الماكينة. -80% (بدون تغيير) تترك حدود التلوث الحالية كما هي. يمكن أن تؤدي التخفيضات الأعمق إلى الوصول إلى مستوى الصفر من التلوث دون تغيير استخدام الطاقة.
mir-prototype-speed-floor=يختار إلى أي مدى قد تؤدي تأثيرات السرعة السلبية إلى إبطاء الأجهزة المدعومة. -80% (بدون تغيير) تترك الحدود الحالية كما هي؛ تؤدي القيم الأعمق إلى إزالة الأرضية العادية وصولاً إلى نقطة التوقف القريبة عند -99.99%.
mir-prototype-speed-cap=يختار ما إذا كان MIR يترك حدود تأثير سرعة الماكينة بمفردها أو يكتب حدًا أقصى للسرعة الإيجابية. +100000% (بدون تغيير) يحافظ على الحدود الحالية؛ القيم المنخفضة تفرض مكافآت سرعة كبيرة جدًا عن قصد.
mir-prototype-quality-cap=يختار ما إذا كان MIR يترك حدود تأثير جودة الماكينة بمفردها أو يكتب سقفًا إيجابيًا جديدًا للجودة. +100000% (بدون تغيير) يحافظ على الحدود الحالية ولا يغير مستويات الجودة أو صيغ احتمالية العنصر.
mir-prototype-positive-power-floor=إيقاف افتراضي. عند التمكين، يقوم MIR بتغيير النماذج الأولية لاستخدام الطاقة النشطة البالغة 0 واط إلى 1 واط أثناء تحميل النموذج الأولي، لذلك لا تظهر أيقونات التحذير من انخفاض الطاقة على الكيانات التي يجب أن تسحب كمية صغيرة غير الصفر. اتركه للحفاظ على النماذج الأولية ذات الطاقة الصفرية تمامًا.
mir-settings-profile-import=الصق سلسلة ملف تعريف إعدادات MIR هنا لتطبيق قيم إعداد بدء التشغيل المُصدَّرة كطبقة تجاوز أثناء إنشاء النموذج الأولي. اتركه فارغًا للإعدادات العادية. قم بالتصدير باستخدام /mir-settings-export من الحفظ النشط، ثم أعد تشغيله بعد تغيير هذه القيمة.
mir-debug-generation-report=عند التمكين، يكتب صف سجل منظم واحدًا لكل تيار تم إنشاؤه أو تخطيه وملحق أساسي، بما في ذلك الحزم العلمية والمتطلبات الأساسية وعدد التأثيرات وحالة التوافق المعملي ومصدر الأيقونة.
mir-debug-recipe-matches=عند التمكين، يكتب أسماء الوصفات المطابقة لكل تدفق إنتاجي تم إنشاؤه. يمكن أن يكون هذا صاخبًا في حزم التعديل الكبيرة.
mir-debug-scripted-effects=عند التمكين، يكتب إدخالات سجل وقت التشغيل عندما تقوم التقنيات المكتوبة بإعادة حساب التأثيرات العالمية أو المستندة إلى الأحداث.
mir-lab-incompatibility-policy=يختار ما يفعله MIR عندما لا يمكن لأي مختبر نشط البحث في الحزم العلمية المحددة.
ips-effect-per-level-stream=يضبط تأثير الطبقة الأساسية لكل مستوى لـ __1__. يتم قياس المستويات والتأثيرات اللاحقة ذات الصلة بشكل متناسب. تستخدم تأثيرات النسبة المئوية النقاط المئوية؛ تستخدم تأثيرات العد والمسافة وحداتها الأصلية.
mir-effect-per-level=يضبط التأثير الأساسي لكل مستوى لاستمرار __1__ اللانهائي. يتم قياس التأثيرات ذات الصلة بشكل متناسب من خط الأساس النهائي للفانيليا. تستخدم تأثيرات النسبة المئوية النقاط المئوية؛ تستخدم تأثيرات العد والمسافة وحداتها الأصلية.
mir-note-experimental-spoilage=تجريبي ومعطل افتراضيًا في الإصدار 2.1.0. هذا تأثير مكتوب عالمي/على مستوى الخريطة. لا تتم المطالبة بسلوك المكدس القابل للتلف الموجود حتى يتم التحقق من صحته يدويًا.
mir-note-agriculture-growth=ينطبق على المحاصيل البرجية الزراعية المزروعة حديثاً. ولا يتم إعادة قياس المحاصيل المزروعة الحالية.
mir-note-cargo-pad-count=الأبحاث اللوجستية الخاصة بعصر الفضاء. يزيد من منصات هبوط البضائع لكل سطح ويمكن أن يغير التوازن اللوجستي بشكل كبير.
mir-note-inserter-capacity=معطل افتراضيًا. يمكن أن تؤدي سعة الإدخال الإضافية إلى كسر أدوات الإدخال التي يتم التحكم فيها بالدائرة وتقليل تحسينات المحرك.
mir-note-native-owner-managed-stream=إذا كانت إحدى التقنيات اللانهائية المثبتة تمتلك عائلة البحث هذه بالفعل، فإن إعدادات بدء التشغيل نفسها تقوم بتكوين هذا المالك بدلاً من إنشاء نسخة مكررة. تحافظ إعدادات MIR الافتراضية غير المتغيرة على النموذج الأولي النهائي للمالك تمامًا. لا تنطبق تجاوزات التكلفة والوقت والحد الأقصى والتأثير الصريح إلا بعد مطابقة المالك الآمن؛ يؤدي تعطيل الدفق إلى ترك التكنولوجيا الخارجية دون تغيير. أعد تشغيل Factorio بعد تغيير إعدادات بدء التشغيل. الحد الأقصى للمستوى 0 يعني أنه لا نهائي، وقيم التأثير هي نقاط مئوية لكل مستوى.

