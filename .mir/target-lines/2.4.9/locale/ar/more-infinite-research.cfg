[string-mod-setting-description]
mir-automatic-productivity-action-disabled=لا يقوم باكتشاف أو إرفاق أو إنشاء تلقائي. يبقى بحث MIR الثابت دون تغيير.
mir-automatic-productivity-action-preview=يكتشف المرشحين ويصنفهم، ثم يكتب القرارات المقبولة والمتخطية في سجل فاكتوريو. ولا يرفق وصفات أو ينشئ بحثًا.
mir-automatic-productivity-action-apply=الافتراضي. يكتشف المرشحين ويرفق فقط الوصفات التي أثبتت سلامتها بأبحاث MIR الحالية المتوافقة. فهو لا يخلق بحثًا في حد ذاته؛ مربعي الاختيار أدناه يحكمان عملية الإنشاء.
mir-automatic-compiler-mode-off=المعادل القديم للمعاق.
mir-automatic-compiler-mode-report=المعادل القديم لتغييرات المعاينة.
mir-automatic-compiler-mode-safe-attach=المعادل القديم لتطبيق التغييرات الآمنة مع تعطيل إنشاء البحث.
mir-automatic-compiler-mode-exact-pack=المعادل القديم لتطبيق التغييرات الآمنة مع تمكين إنشاء البحث ومراجعة بيانات التوافق المطلوبة.
mir-automatic-compiler-mode-safe-generate=المعادل القديم لتطبيق التغييرات الآمنة مع تمكين إنشاء الأبحاث لمقدمي الخدمات التجريبية المسجلين.
mir-adjust-vanilla-weapon-speed-techs-off=قم بتعطيل التنظيف الإضافي الاختياري للصاروخ/المدفع المتداخل من MIR.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=قم بإزالة مكافآت الصواريخ/المدافع المتداخلة من MIR فقط عندما توفر تقنية لا نهائية ممكّنة ويمكن الوصول إليها تأثير الاستبدال الدقيق.
mir-adjust-vanilla-weapon-speed-techs-always=قم دائمًا بإزالة مكافآت الصاروخ/المدفع المتداخلة من MIR. استخدم فقط إذا كنت تريد الانفصال الصارم.
mir-science-pack-ingredient-policy-configured=استخدم الحزم العلمية التي تم تكوينها لكل تقنية تم إنشاؤها دون توسيع المكونات الاختيارية. مير الافتراضي.
mir-science-pack-ingredient-policy-space=إضافة علوم الفضاء عند توفرها. زيادة صعوبة بسيطة بعد الصاروخ.
mir-science-pack-ingredient-policy-space-and-promethium=أضف المساحة وعلم البروميثيوم عند توفرهما. الأفضل لأحواض أبحاث عصر الفضاء المتأخرة جدًا.
mir-science-pack-ingredient-policy-space-age-progression=أضف فقط حزم التقدم في عصر الفضاء التي تتضمنها الحزم المحددة. لا يضيف حزم معدلة غير ذات صلة.
mir-science-pack-ingredient-policy-official-progression=أضف الحزم الرسمية المفقودة ذات النمط المسبق والتي تتضمنها الحزمة الرسمية الأكثر تقدمًا التي تم تحديدها بالفعل.
mir-science-pack-ingredient-policy-mod-progression=أضف الحزم المفقودة المتوافقة مع المعمل والتي تم استنتاجها من تقدم الحزمة العلمية المعدلة وفتح المتطلبات الأساسية.
mir-science-pack-ingredient-policy-all-official=استخدم كل قاعدة رسمية وحزمة علوم عصر الفضاء الموجودة في مجموعة التعديل الحالية.
mir-science-pack-ingredient-policy-all=استخدم كل حزمة علمية نشطة متوافقة مع المختبر، بما في ذلك الحزم العلمية المعدلة.
mir-lab-incompatibility-policy-reduce=حافظ على التكنولوجيا من خلال تقليل حزمها العلمية إلى أكبر مجموعة يقبلها المختبر النشط. الافتراضي الأكثر أمانًا لحزم التعديل.
mir-lab-incompatibility-policy-skip=تخطي التكنولوجيا إذا لم يتمكن أي مختبر نشط من البحث في مجموعة الحزم العلمية المختارة. أكثر صرامة وأسهل للتدقيق.
mir-lab-incompatibility-policy-engine-default=لا تقم أبدًا بإعادة كتابة مجموعة الحزم العلمية المحددة. تحافظ MIR على مجموعة قابلة للبحث بشكل آمن دون تغيير وتتجاهل التكنولوجيا التي تم إنشاؤها عندما لا يتمكن Factorio من البحث عن تلك المجموعة بالضبط.
