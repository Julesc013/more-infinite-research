[mod-name]
more-infinite-research=Mehr Unendliche Forschung

[mod-description]
more-infinite-research=Fügt konfigurierbare unendliche Produktivitäts- und Bonusforschungen für Zwischenprodukte, Logistik, Kampf, Spielerboni und Space-Age-Lücken hinzu.

