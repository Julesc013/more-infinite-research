[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Führt keine automatische Erkennung, Anlage oder Erstellung durch. Die feste Forschung von MIR bleibt unverändert.
mir-automatic-productivity-action-preview=Erkennt und klassifiziert Kandidaten und schreibt dann akzeptierte und übersprungene Entscheidungen in das Factorio-Protokoll. Es werden keine Rezepte angehängt oder Forschungsergebnisse erstellt.
mir-automatic-productivity-action-apply=Standard. Erkennt Kandidaten und fügt nur sicherheitserprobte Rezepte der kompatiblen bestehenden MIR-Forschung hinzu. Es schafft keine eigene Forschung; Die beiden Kontrollkästchen unten regeln die Erstellung.
mir-automatic-compiler-mode-off=Legacy-Äquivalent von Deaktiviert.
mir-automatic-compiler-mode-report=Legacy-Äquivalent zu Vorschauänderungen.
mir-automatic-compiler-mode-safe-attach=Legacy-Äquivalent von „Sichere Änderungen anwenden bei deaktivierter Forschungserstellung“.
mir-automatic-compiler-mode-exact-pack=Legacy-Äquivalent von „Sichere Änderungen anwenden“ mit aktivierter Forschungserstellung und überprüften Kompatibilitätsdaten erforderlich.
mir-automatic-compiler-mode-safe-generate=Legacy-Äquivalent von „Sichere Änderungen anwenden“ mit aktivierter Forschungserstellung für registrierte experimentelle Anbieter.
mir-adjust-vanilla-weapon-speed-techs-off=Deaktivieren Sie die optionale Bereinigung des überlappenden Raketen-/Kanonenbonus von MIR.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Entfernen Sie die überlappenden Raketen-/Kanonenboni von MIR nur, wenn eine aktivierte, erreichbare unendliche Technologie den genauen Ersatzeffekt bietet.
mir-adjust-vanilla-weapon-speed-techs-always=Entfernen Sie immer die überlappenden Raketen-/Kanonenboni von MIR. Verwenden Sie es nur, wenn Sie eine strikte Trennung wünschen.
mir-science-pack-ingredient-policy-configured=Verwenden Sie die konfigurierten Wissenschaftspakete jeder generierten Technologie ohne optionale Zutatenerweiterung. MIR-Standard.
mir-science-pack-ingredient-policy-space=Fügen Sie Weltraumwissenschaften hinzu, sofern verfügbar. Eine einfache Erhöhung des Schwierigkeitsgrads nach der Rakete.
mir-science-pack-ingredient-policy-space-and-promethium=Fügen Sie Weltraum- und Promethium-Wissenschaft hinzu, sofern verfügbar. Am besten für Forschungssenken im Spätzeitalter des Weltraumzeitalters geeignet.
mir-science-pack-ingredient-policy-space-age-progression=Fügen Sie nur Space Age-Fortschrittspakete hinzu, die in den ausgewählten Paketen enthalten sind. Fügt keine unabhängigen modifizierten Pakete hinzu.
mir-science-pack-ingredient-policy-official-progression=Fügen Sie fehlende offizielle Pakete im Voraussetzungsstil hinzu, die durch das bereits ausgewählte fortschrittlichste offizielle Paket impliziert werden.
mir-science-pack-ingredient-policy-mod-progression=Fügen Sie fehlende laborkompatible Pakete hinzu, die aus dem Fortschritt des modifizierten Wissenschaftspakets abgeleitet wurden, und schalten Sie die Voraussetzungen frei.
mir-science-pack-ingredient-policy-all-official=Verwenden Sie alle offiziellen Basis- und Weltraumzeitalter-Wissenschaftspakete, die im aktuellen Mod-Set vorhanden sind.
mir-science-pack-ingredient-policy-all=Verwenden Sie jedes aktive, laborkompatible Wissenschaftspaket, einschließlich modifizierter Wissenschaftspakete.
mir-lab-incompatibility-policy-reduce=Behalten Sie die Technologie bei, indem Sie die Wissenschaftspakete auf den größten Satz reduzieren, der von einem aktiven Labor akzeptiert wird. Sicherste Standardeinstellung für Mod-Packs.
mir-lab-incompatibility-policy-skip=Überspringen Sie die Technologie, wenn kein aktives Labor sein ausgewähltes Wissenschaftspaket-Set erforschen kann. Strenger und einfacher zu prüfen.
mir-lab-incompatibility-policy-engine-default=Schreiben Sie niemals das ausgewählte Science-Pack-Set neu. MIR behält einen sicher erforschbaren Satz unverändert bei und lässt die generierte Technologie weg, wenn Factorio diesen genauen Satz nicht erforschen kann.
mir-prototype-productivity-cap-engine-default=Lassen Sie die bestehende Produktivitätsobergrenze jedes Rezepts unverändert. Rezepte ohne benutzerdefinierte Obergrenze nutzen Factorios normales Produktivitätsbonuslimit von +300 %.
mir-prototype-productivity-cap-percent-25=Setzen Sie die Produktivitätsobergrenzen für nicht-parameterbasierte Rezepte auf +25 %. Dies ist eine strikte frühe Obergrenze.
mir-prototype-productivity-cap-percent-50=Setzen Sie die Produktivitätsobergrenzen für nicht-parameterbasierte Rezepte auf +50 %. Dies liegt unter der normalen Obergrenze und führt dazu, dass die Produktivitätsforschung früher nicht mehr hilft.
mir-prototype-productivity-cap-percent-75=Setzen Sie die Produktivitätsobergrenzen für nicht-parameterbasierte Rezepte auf +75 %. Dies liegt unter der normalen Obergrenze und führt dazu, dass die Produktivitätsforschung früher nicht mehr hilft.
mir-prototype-productivity-cap-percent-100=Setzen Sie die Produktivitätsobergrenzen für Rezepte ohne Parameter auf +100 %. Dies liegt unter der normalen Obergrenze und führt dazu, dass die Produktivitätsforschung früher nicht mehr hilft.
mir-prototype-productivity-cap-percent-125=Setzen Sie die Produktivitätsobergrenzen für nicht-parameterbasierte Rezepte auf +125 %.
mir-prototype-productivity-cap-percent-150=Setzen Sie die Produktivitätsobergrenzen für nicht-parameterbasierte Rezepte auf +150 %.
mir-prototype-productivity-cap-percent-200=Setzen Sie die Produktivitätsobergrenzen für nicht-parameterbasierte Rezepte auf +200 %. Dies liegt unter der normalen Obergrenze und führt dazu, dass die Produktivitätsforschung früher nicht mehr hilft.
mir-prototype-productivity-cap-percent-250=Legen Sie die Produktivitätsobergrenzen für nicht-parameterbasierte Rezepte auf +250 % fest. Dies liegt etwas unter der normalen Obergrenze.
mir-prototype-productivity-cap-percent-400=Legen Sie die Produktivitätsobergrenzen für nicht-parameterbasierte Rezepte auf +400 % fest. Dadurch wird die Produktivitätsskalierung über die normale Obergrenze hinaus erweitert.
mir-prototype-productivity-cap-percent-500=Setzen Sie die Produktivitätsobergrenzen für nicht-parameterbasierte Rezepte auf +500 %. Dadurch wird die Produktivitätsskalierung über die normale Obergrenze hinaus erweitert.
mir-prototype-productivity-cap-percent-750=Setzen Sie die Produktivitätsobergrenzen für nicht-parameterbasierte Rezepte auf +750 %.
mir-prototype-productivity-cap-percent-1000=Setzen Sie die Produktivitätsobergrenzen für Rezepte ohne Parameter auf +1000 %. Verwenden Sie es für lange Speicherungen, bei denen die Produktivitätsforschung weiterhin von Bedeutung sein sollte.
mir-prototype-productivity-cap-percent-2500=Setzen Sie die Produktivitätsobergrenzen für nicht-parameterbasierte Rezepte auf +2500 %. Für sehr lange Speicherungen verwenden.
mir-prototype-productivity-cap-percent-5000=Setzen Sie die Produktivitätsobergrenzen für Rezepte ohne Parameter auf +5000 %.
mir-prototype-productivity-cap-percent-10000=Setzen Sie die Produktivitätsobergrenzen für nicht-parameterbasierte Rezepte auf +10000 %. Nur für extreme Langzeitskalierung verwenden.
mir-prototype-productivity-cap-percent-25000=Setzen Sie die Produktivitätsobergrenzen für Rezepte ohne Parameter auf +25.000 %. Nur für extreme Langzeitskalierung verwenden.
mir-prototype-productivity-cap-percent-100000=Setzen Sie die Produktivitätsobergrenzen für Rezepte ohne Parameter auf +100000 %. Dies ist für die meisten Speicherungen praktisch unbegrenzt.
mir-recycling-return-chance-engine-default=Lassen Sie jedes Recycling-Rezept unverändert.
mir-recycling-return-chance-match-productivity-cap=Exploit-sichere automatische Reduzierung für versteckt generierte Recycling-Rezepte. Verwendet 1 / (1 + Produktivitätsbonus), begrenzt auf die normale Rendite von 25 %: +400 % werden zu 20 % und +1000 % werden zu etwa 9,09 %.
mir-recycling-return-chance-percent-25=Bewahren Sie versteckt generierte Recyclingrezepte bei der normalen Materialrückgabe von 25 % auf.
mir-recycling-return-chance-percent-20=Skalieren Sie versteckt generierte Recyclingrezepte auf eine Materialrendite von 20 %.
mir-recycling-return-chance-percent-15=Skalieren Sie versteckt generierte Recyclingrezepte auf eine Materialrendite von 15 %.
mir-recycling-return-chance-percent-12-5=Skalieren Sie versteckt generierte Recyclingrezepte auf eine Materialrendite von 12,5 %.
mir-recycling-return-chance-percent-10=Skalieren Sie versteckt generierte Recyclingrezepte auf eine Materialrendite von 10 %.
mir-recycling-return-chance-percent-7-5=Skalieren Sie versteckt generierte Recyclingrezepte auf eine Materialrendite von 7,5 %.
mir-recycling-return-chance-percent-5=Skalieren Sie versteckt generierte Recyclingrezepte auf eine Materialrendite von 5 %.
mir-recycling-return-chance-percent-2-5=Skalieren Sie versteckt generierte Recyclingrezepte auf eine Materialrendite von 2,5 %.
mir-recycling-return-chance-percent-1=Skalieren Sie versteckt generierte Recyclingrezepte auf eine Materialrendite von 1 %.
mir-recycling-return-chance-percent-0-5=Skalieren Sie versteckt generierte Recyclingrezepte auf eine Materialrendite von 0,5 %.
mir-recycling-return-chance-percent-0-1=Skalieren Sie versteckt generierte Recyclingrezepte auf eine Materialrendite von 0,1 %.
mir-prototype-efficiency-cap-engine-default=Lassen Sie die Grenzwerte für den Energieverbrauch jeder Maschine unverändert. Maschinen ohne benutzerdefiniertes Limit nutzen Factorios normale Energieverbrauchseffektobergrenze von -80 %, sodass Effekte die aktive Nutzung nicht unter 20 % reduzieren können.
mir-prototype-efficiency-cap-saving-25=Schreiben Sie eine Obergrenze für den Energieverbrauch von -25 %. Der aktive Energieverbrauch bleibt nach Energieverbrauchseffekten bei 75 % oder mehr.
mir-prototype-efficiency-cap-saving-50=Schreiben Sie eine Obergrenze für den Energieverbrauch von -50 %. Der aktive Energieverbrauch bleibt nach Energieverbrauchseffekten auf unterstützten Maschinen bei 50 % oder mehr.
mir-prototype-efficiency-cap-saving-75=Schreiben Sie eine Obergrenze für den Energieverbrauch von -75 %. Der aktive Energieverbrauch bleibt nach Energieverbrauchseffekten auf unterstützten Maschinen bei 25 % oder mehr.
mir-prototype-efficiency-cap-saving-90=Schreiben Sie eine Obergrenze für den Energieverbrauch von -90 %. Der aktive Energieverbrauch kann auf 10 % sinken, was unter der normalen Untergrenze von 20 % liegt.
mir-prototype-efficiency-cap-saving-95=Schreiben Sie eine Obergrenze für den Energieverbrauch von -95 %. Der aktive Energieverbrauch kann auf 5 % sinken.
mir-prototype-efficiency-cap-saving-99=Schreiben Sie eine Obergrenze für den Energieverbrauch von -99 %. Der aktive Energieverbrauch kann auf 1 % sinken.
mir-prototype-efficiency-cap-saving-999=Schreiben Sie eine Obergrenze für den Energieverbrauch von -99,9 %. Der aktive Energieeinsatz kann auf 0,1 % sinken.
mir-prototype-efficiency-cap-saving-9999=Schreiben Sie eine Obergrenze für den Energieverbrauch von -99,99 %. Dabei handelt es sich um einen aktiven Energieverbrauch von nahezu Null, nicht um eine Neufassung des Null-Strom-Prototyps.
mir-prototype-pollution-cap-engine-default=Lassen Sie die Grenzwerte für die Schadstoffauswirkungen jeder Maschine unverändert. Maschinen ohne benutzerdefiniertes Limit verwenden Factorios normale -80 %-Grenze für den Verschmutzungseffekt.
mir-prototype-pollution-cap-saving-25=Schreiben Sie eine Schadstoffobergrenze von -25 %. Die Verschmutzung bleibt nach Verschmutzungseffekten bei 75 % oder mehr.
mir-prototype-pollution-cap-saving-50=Schreiben Sie eine Verschmutzungsobergrenze von -50 %. Die Verschmutzung bleibt nach Verschmutzungseffekten auf unterstützten Maschinen bei 50 % oder mehr.
mir-prototype-pollution-cap-saving-75=Schreiben Sie eine Schadstoffobergrenze von -75 %. Die Verschmutzung bleibt nach Verschmutzungseffekten auf unterstützten Maschinen bei 25 % oder mehr.
mir-prototype-pollution-cap-saving-90=Schreiben Sie eine Schadstoffobergrenze von -90 %. Die Verschmutzung kann auf 10 % sinken, was unter der normalen Untergrenze von 20 % liegt.
mir-prototype-pollution-cap-saving-95=Schreiben Sie eine Schadstoffobergrenze von -95 %. Die Verschmutzung kann auf 5 % sinken.
mir-prototype-pollution-cap-saving-99=Schreiben Sie eine Schadstoffobergrenze von -99 %. Die Verschmutzung kann auf 1 % sinken.
mir-prototype-pollution-cap-saving-999=Schreiben Sie eine Schadstoffobergrenze von -99,9 %. Die Verschmutzung kann auf 0,1 % sinken.
mir-prototype-pollution-cap-saving-9999=Schreiben Sie eine Schadstoffobergrenze von -99,99 %. Dabei handelt es sich um eine nahezu Null-Verschmutzung, kein Laufzeit-Verschmutzungsskript.
mir-prototype-speed-floor-engine-default=Lassen Sie die negative Geschwindigkeitsbegrenzung jeder Maschine in Ruhe. Maschinen ohne benutzerdefiniertes Limit nutzen den normalen -80 %-Boden von Factorio und behalten eine Geschwindigkeit von mindestens 20 % bei.
mir-prototype-speed-floor-saving-25=Negative Geschwindigkeitseffekte auf -25 % beschränken, so dass mindestens 75 % Geschwindigkeit übrig bleiben.
mir-prototype-speed-floor-saving-50=Negative Geschwindigkeitseffekte auf -50 % beschränken, so dass mindestens 50 % Geschwindigkeit übrig bleiben.
mir-prototype-speed-floor-saving-75=Negative Geschwindigkeitseffekte auf -75 % beschränken, so dass mindestens 25 % Geschwindigkeit übrig bleiben.
mir-prototype-speed-floor-saving-90=Erlauben Sie negative Geschwindigkeitseffekte bis zu -90 %, wobei die Geschwindigkeit mindestens 10 % beträgt.
mir-prototype-speed-floor-saving-95=Erlauben Sie negative Geschwindigkeitseffekte bis zu -95 %, wobei die Geschwindigkeit mindestens 5 % beträgt.
mir-prototype-speed-floor-saving-99=Erlauben Sie negative Geschwindigkeitseffekte bis zu -99 %, wobei die Geschwindigkeit mindestens 1 % beträgt.
mir-prototype-speed-floor-saving-999=Erlauben Sie negative Geschwindigkeitseffekte bis zu -99,9 %, sodass die Geschwindigkeit mindestens 0,1 % beträgt.
mir-prototype-speed-floor-saving-9999=Erlauben Sie negative Geschwindigkeitseffekte bis zu -99,99 %, dem niedrigsten Grenzwert des Factorio-Prototyps. Dies ist eine Nahezu-Stopp-Geschwindigkeit, nicht Null oder eine negative Herstellungsgeschwindigkeit.
mir-prototype-speed-cap-engine-default=Lassen Sie die Geschwindigkeitsbegrenzung jeder Maschine unverändert. Maschinen ohne benutzerdefiniertes Limit nutzen Factorios sehr hohe Geschwindigkeitseffektobergrenze von +100.000 %.
