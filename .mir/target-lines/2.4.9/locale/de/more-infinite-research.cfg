[mod-setting-description]
ips-require-space-gate=Wenn diese Technologien aktiviert sind, bleiben sie gesperrt, bis die Weltraumwissenschaft in Vanilla oder die Promethiumwissenschaft in Space Age erforscht wird.
mir-science-pack-ingredient-policy=Wählt aus, wie MIR Wissenschaftspakete zu generierten Technologien hinzufügt. Die Optionen sind von konservativ bis breit geordnet: Standardpakete, Spätspielpakete, fortschrittsbasierte Pakete und dann alle verfügbaren Pakete.
mir-automatic-productivity-action=Wählt aus, was MIR mit sicheren Produktivitätsmöglichkeiten macht, die in Rezepten für installierte Mods enthalten sind. Deaktiviert führt keine automatische Erkennung durch. Vorschau der Änderungsdatensätze akzeptierter und übersprungener Kandidaten im Factorio-Protokoll, ohne die Recherche zu ändern. „Sichere Änderungen anwenden“ (Standard) fügt geeignete Rezepte nur zu kompatibler bestehender MIR-Forschung hinzu. Dadurch wird das Handeln gesteuert, nicht die Stärke oder Reife; Die unten aufgeführten Kontrollkästchen für die Erstellung sind separat. Es gelten immer Eigentums-, Recycling-, Wahrscheinlichkeits-, Katalysator-, Wissenschafts-, Labor-, Voraussetzungs-, Ziel-, Identitäts-, Fortschritts- und Zyklusprüfungen.
mir-automatic-create-research=Standard: aus. Verboten. Sichere Änderungen an kompatibler vorhandener MIR-Forschung anwenden. Kandidaten ohne passenden Stream werden übersprungen und gemeldet. On ermöglicht es einem berechtigten registrierten Anbieter, eine stabile generische Technologie mit unendlicher Produktivität zu entwickeln, wenn keine vorhandene Forschung passt. Das Kontrollkästchen „Überprüfte Daten“ unten entscheidet darüber, ob experimentelle Anbieter berechtigt sind. MIR erstellt niemals eine Technologie pro Mod oder Rezept, und alle harten Sicherheits-, Wissenschafts-, Eigentums-, Identitäts-, Fortschritts- und Zyklustore gelten weiterhin.
mir-automatic-require-reviewed-data=Standard: ein. Dies ist nur wichtig, wenn „Neue Forschungserstellung zulassen“ aktiviert ist. Es blockiert niemals die sichere Bindung an bestehende Forschungsergebnisse. Bei Genehmigungen werden nur Anbieterfamilien als überprüft gekennzeichnet und durch entsprechende, exakte Versionsnachweise untermauert, daher werden experimentelle Familien übersprungen. Off erlaubt registrierten experimentellen Anbietern, aus generischen Strukturdaten zu erstellen. Für ein möglichst umfassendes experimentelles Verhalten aktivieren Sie die Erstellung von Forschungsergebnissen und deaktivieren Sie diese Anforderung. Kein Wert kann eine harte Sicherheitstür umgehen.
mir-automatic-compiler-mode=Versteckte Kompatibilitätsbrücke für Profile, die vor der Aufteilung der automatischen Produktivitätskontrollen erstellt wurden. Ein nicht standardmäßiger Legacy-Wert wird nur berücksichtigt, während alle neuen Steuerelemente ihre Standardwerte beibehalten. Ändern Sie jedes neue Steuerelement, um die explizite Steuerung zu übernehmen.
ips-enable-stream=Erstellt die generierte unendliche Technologie für __1__, wenn deren Rezepte, Effekte, Voraussetzungen und Wissenschaftspakete verfügbar sind. Deaktivieren Sie dies, um zu verhindern, dass MIR diese Technologie generiert.
ips-cost-base-stream=Forschungseinheiten, die für das erste generierte Level von __1__ erforderlich sind. Muss mindestens 1 sein. Spätere Stufen werden aus diesem Wert und dem Kostenwachstumsfaktor berechnet.
ips-cost-growth-stream=Multiplikator wird auf jede spätere Ebene von __1__ angewendet. Verwenden Sie 1 für Pauschalkosten, 1,5 für 50 % Wachstum pro Ebene oder 2 für Verdoppelung der Kosten.
ips-max-level-stream=Höchste generierte Ebene für __1__. Für unendliche Level auf 0 setzen.
ips-research-time-stream=Sekunden pro Forschungseinheit für __1__. Auf 0 setzen, um die MIR-Standardeinstellung für diese Technologie zu verwenden. Dabei handelt es sich nicht um die gesamte Recherchezeit; Die Gesamtzeit hängt auch von den Forschungskosten, der Laboranzahl, der Laborgeschwindigkeit und den Modulen ab.
mir-enable-base-tech=Ermöglicht __1__, über seine Vanilla-Kappe hinaus als unendliche Technologie weiterzumachen. Deaktivieren Sie dies, wenn Sie möchten, dass MIR neue Forschungslinien hinzufügt, ohne diese Vanilla-Kette zu erweitern.
mir-cost-base=Forschungseinheiten, die für die erste MIR-Fortsetzungsstufe von __1__ erforderlich sind. Auf 0 setzen, um nach Möglichkeit das Kostenmuster der Vanilla-Kette zu übernehmen.
mir-cost-growth=Multiplikator, der auf jede spätere MIR-Fortsetzungsebene von __1__ angewendet wird. Auf 0 setzen, um nach Möglichkeit das Wachstumsmuster der Vanilla-Kette zu übernehmen.
mir-max-level=Höchste MIR-Fortsetzungsebene für __1__. Für unendliche Level auf 0 setzen.
mir-research-time=Sekunden pro Forschungseinheit für die MIR-Fortsetzung von __1__. Auf 0 setzen, um nach Möglichkeit die Forschungseinheitenzeit der Vanilla-Kette zu übernehmen.
mir-prefer-this-mod-for-competing-techs=Wenn dieser Mod aktiviert ist, entfernt er ausgewählte konkurrierende unendliche Erweiterungen und verwendet seine eigenen Versionen. Deaktivieren Sie diese Option, um konkurrierende Versionen anderer Mods beizubehalten.
mir-adjust-vanilla-weapon-speed-techs=Steuert, ob MIR Geschwindigkeitsboni für Raketen und Kanonengranaten aus der generierten Schussgeschwindigkeitsfortsetzung seiner Waffe entfernt, wenn eine exakt unbegrenzte Ersatzabdeckung verfügbar ist. Finite-Vanilla-Waffen-Schussgeschwindigkeitstechnologien behalten ihre ursprünglichen Boni.
mir-use-installed-space-age-icons=Wenn MIR aktiviert ist, verweist es möglicherweise auf installierte offizielle DLC-Symboldateien, einschließlich Space Age und Elevated Rails, selbst wenn diese Mods für einen Lauf im Basisspiel deaktiviert sind. Lassen Sie dies deaktiviert, wenn diese DLC-Dateien nicht installiert sind. Factorio kann beim Laden des Prototyps fehlende Symboldateien nicht ordnungsgemäß wiederherstellen.
mir-pipeline-extent-multiplier=Nur beim Start verfügbarer Dropdown-Multiplikator für erkannte Fluidbox-Pipeline-Ausdehnungsfelder über Prototypen hinweg, nicht nur für Rohrelemente. 100 % lässt die Prototypen unverändert und belastet weder den Pipeline-Pass noch die Scan-Fluid-Boxen. Nicht 100 %-Werte sind experimentell und können sich auf Maschinen, Tanks, Triebwerke und modifizierte Prototypen auswirken, die Fluidboxen definieren.
mir-unrestricted-modules=Experimentell und aus dem Gleichgewicht geraten. Wenn aktiviert, akzeptiert jedes vorhandene Rezept alle fünf Moduleffekte und jeder vorhandene Modulempfänger mit Steckplätzen akzeptiert jede entdeckte Modulkategorie. Dadurch werden keine Modulsteckplätze hinzugefügt oder Modulprototypen geändert und möglicherweise Produktivität, Qualität und modifizierte Modulschleifen ermöglicht.
mir-prototype-productivity-cap=Wählt aus, ob MIR die Produktivitätsobergrenzen für Rezepte unverändert lässt oder für jedes Rezept ohne Parameter und ohne Recycling eine Startobergrenze schreibt. +300 % (unverändert) behält bestehende Rezeptobergrenzen bei; Niedrigere Werte verkürzen die Produktivitätsskalierung, während höhere Werte sie verlängern.
mir-recycling-return-chance=Steuert nur versteckte generierte Recyclingrezepte. Der automatische Modus reduziert die normale Materialrückgabe von 25 % auf höchstens 1 dividiert durch den Gesamtleistungsmultiplikator bei der ausgewählten Produktivitätsobergrenze. Feste Auswahlmöglichkeiten skalieren die gleichen generierten Renditen direkt. Sichtbare Prozesse und Rezeptproduktivitätsobergrenzen werden niemals geändert.
mir-productivity-cap-self-recycling-only=Über 1 / Recycler-Rückgabe – 1 erhalten nur Produktionsrezepte mit einem nachgewiesenen nicht-generativen Selbstrecyclingpfad die ausgewählte höhere Obergrenze. Bei oder unterhalb dieses Schwellenwerts hat dieses Kontrollkästchen keine Wirkung. Der unveränderte Motor verwendet die normale Rückführung von 25 % als konservativen Schwellenwert von +300 %, ohne die Recyclingrezepte zu ändern.
mir-prototype-efficiency-cap=Wählt aus, inwieweit Effizienzeffekte den aktiven Energieverbrauch der Maschine reduzieren können. -80 % (unverändert) lässt die bestehenden Grenzwerte für den Energieverbrauch unverändert. Tiefgreifendere Reduzierungen können einen aktiven Energieverbrauch von Null erreichen, ohne die Schadstoffgrenzwerte zu ändern.
mir-prototype-pollution-cap=Wählt aus, inwieweit Schadstoffreduzierungseffekte die Maschinenverschmutzung reduzieren können. -80 % (unverändert) lässt bestehende Schadstoffgrenzwerte unverändert. Durch tiefgreifendere Reduzierungen kann eine Null-Schadens-Reduktion erreicht werden, ohne dass sich der Energieverbrauch ändert.
mir-prototype-speed-floor=Wählt aus, wie stark negative Geschwindigkeitseffekte unterstützte Maschinen verlangsamen können. -80 % (unverändert) lässt bestehende Grenzwerte unverändert; Tiefere Werte entfernen den normalen Boden bis hin zu einem Beinahe-Stopp bei -99,99 %.
mir-prototype-speed-cap=Wählt aus, ob MIR die Grenzwerte für Maschinengeschwindigkeitseffekte beibehält oder eine neue positive Geschwindigkeitsobergrenze schreibt. +100000 % (unverändert) behält bestehende Grenzwerte bei; Niedrigere Werte begrenzen absichtlich sehr große Geschwindigkeitsboni.
mir-prototype-quality-cap=Wählt aus, ob MIR die Grenzwerte für maschinelle Qualitätsauswirkungen außer Acht lässt oder eine neue positive Qualitätsobergrenze schreibt. +100000 % (unverändert) behält bestehende Grenzwerte bei und ändert weder Qualitätsstufen noch Artikelwahrscheinlichkeitsformeln.
mir-prototype-positive-power-floor=Standardmäßig ausgeschaltet. Wenn aktiviert, ändert MIR beim Laden des Prototyps explizite 0-W-Aktivenergieverbrauchsprototypen in 1 W, sodass bei Entitäten, die einen winzigen Betrag ungleich Null verbrauchen sollten, keine Warnsymbole für niedrigen Stromverbrauch angezeigt werden. Lassen Sie es weg, um Zero-Power-Prototypen genau zu erhalten.
mir-settings-profile-import=Fügen Sie hier eine MIR-Einstellungsprofilzeichenfolge ein, um exportierte Starteinstellungswerte als Überschreibungsebene während der Prototypenerstellung anzuwenden. Für normale Einstellungen leer lassen. Exportieren Sie mit /mir-settings-export aus einem aktiven Speicherstand und starten Sie dann neu, nachdem Sie diesen Wert geändert haben.
mir-debug-generation-report=Wenn diese Option aktiviert ist, wird eine strukturierte Protokollzeile pro generiertem oder übersprungenem Stream und Basiserweiterung geschrieben, einschließlich Wissenschaftspaketen, Voraussetzungen, Effektanzahl, Laborkompatibilitätsstatus und Symbolquelle.
mir-debug-recipe-matches=Wenn aktiviert, werden übereinstimmende Rezeptnamen für jeden generierten Produktivitätsstrom geschrieben. Dies kann in großen Mod-Packs laut sein.
mir-debug-scripted-effects=Wenn aktiviert, werden Laufzeitprotokolleinträge geschrieben, wenn Skripttechnologien globale oder ereignisgesteuerte Effekte neu berechnen.
mir-lab-incompatibility-policy=Wählt aus, was MIR tun soll, wenn die ausgewählten Wissenschaftspakete von keinem aktiven Labor erforscht werden können.
ips-effect-per-level-stream=Legt den primären Basisstufeneffekt pro Ebene für __1__ fest. Zugehörige spätere Stufen und Effekte werden proportional skaliert. Prozentuale Effekte verwenden Prozentpunkte; Zähl- und Distanzeffekte verwenden ihre nativen Einheiten.
mir-effect-per-level=Legt den kanonischen Effekt pro Ebene für die unendliche Fortsetzung __1__ fest. Zugehörige Effekte werden proportional von der endgültigen Vanilla-Basislinie skaliert. Prozentuale Effekte verwenden Prozentpunkte; Zähl- und Distanzeffekte verwenden ihre nativen Einheiten.
mir-note-experimental-spoilage=Experimentell und standardmäßig in Version 2.1.0 deaktiviert. Dies ist ein globaler/kartenweiter Skripteffekt. Vorhandenes „Spoilable-Stack“-Verhalten wird erst beansprucht, wenn es manuell validiert wird.
mir-note-agriculture-growth=Gilt für neu gepflanzte landwirtschaftliche Hochkulturen. Bestehende Kulturpflanzen werden nicht neu skaliert.
mir-note-cargo-pad-count=Spezielle Logistikforschung im Weltraumzeitalter. Erhöht die Frachtlandeplätze pro Fläche und kann das Logistikgleichgewicht erheblich verändern.
mir-note-inserter-capacity=Standardmäßig deaktiviert. Zusätzliche Kuvertierkapazität kann kreisgesteuerte Kuvertiermaschinen unterbrechen und Motoroptimierungen reduzieren.
mir-note-native-owner-managed-stream=Wenn eine installierte Infinite-Technologie diese Forschungsfamilie bereits besitzt, konfigurieren dieselben Starteinstellungen diesen Besitzer, anstatt ein Duplikat zu erstellen. Unveränderte MIR-Standardeinstellungen bewahren exakt den endgültigen Prototyp des Besitzers. Explizite Kosten-, Zeit-, Höchststufen- und Effektüberschreibungen gelten erst nach einer sicheren Besitzerübereinstimmung; Durch die Deaktivierung des Streams bleibt die externe Technologie unberührt. Starten Sie Factorio neu, nachdem Sie die Starteinstellungen geändert haben. Eine maximale Stufe von 0 bedeutet unendlich und die Effektwerte sind Prozentpunkte pro Stufe.

