[technology-description]
more-infinite-research.recipe_productivity=Erhöht die Rezeptproduktivität für die ausgewählten Rezepte. Die maximale Produktivitätsgrenze von Factorio gilt weiterhin; zusätzliche unendliche Stufen haben möglicherweise keine praktische Wirkung, sobald ein Rezept seine Grenze erreicht hat.
more-infinite-research.direct_effect=Fügt einen unendlich wiederholbaren Bonus hinzu. Wissenschaftspakete werden aus aktiven Laboren ausgewählt, damit die Technologie mit kompatiblen Mod-Sätzen erforschbar bleibt.
more-infinite-research.cargo_bay_unloading_distance=Erhöht die maximale Entfernung zwischen einem Frachtlandepad und verbundenen Entladebuchten.
more-infinite-research.cargo_landing_pad_count=Erhöht die Anzahl der Frachtlandepads, die jede Partei pro Oberfläche bauen kann.
more-infinite-research.flamethrower_shooting_speed=Erhöht die Schussgeschwindigkeit für Flammenwerferwaffen und Flammenwerfertürme.
more-infinite-research.electric_shooting_speed=Erhöht die Schussgeschwindigkeit für Elektrowaffen. Bei Vanille wirkt sich dies auf die Entladungsabwehr aus; Mit Space Age betrifft es auch Tesla-Waffen, wenn die Tesla-Munitionskategorie verfügbar ist.
more-infinite-research.spoilage_preservation=Erhöht den globalen Verderbzeitmodifikator durch einen begrenzten Skripteffekt. Bestehende verderbbare Gegenstände können ihre aktuellen Verderbfristen behalten, bis sie im Spiel getestet werden.
more-infinite-research.agricultural_growth_speed=Verkürzt die verbleibende Wachstumszeit für neu gepflanzte landwirtschaftliche Turmpflanzen durch einen begrenzten Skripteffekt.
more-infinite-research.lab_productivity=Erhöht den Forschungsfortschritt, der durch jedes verbrauchte Wissenschaftspaket erzielt wird, mithilfe des nativen Produktivitätsmodifikators für Laborforschung.

