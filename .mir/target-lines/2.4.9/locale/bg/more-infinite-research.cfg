[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Не извършва автоматично откриване, прикачване или създаване. Фиксираните изследвания на MIR остават непроменени.
mir-automatic-productivity-action-preview=Открива и класифицира кандидати, след което записва приетите и пропуснатите решения в дневника на Factorio. Не прикачва рецепти и не създава изследвания.
mir-automatic-productivity-action-apply=По подразбиране. Открива кандидати и прикачва само доказани за безопасност рецепти към съвместими съществуващи MIR изследвания. Тя не създава изследвания сама по себе си; двете квадратчета за отметка по-долу управляват създаването.
mir-automatic-compiler-mode-off=Наследен еквивалент на Disabled.
mir-automatic-compiler-mode-report=Наследен еквивалент на промените в предварителния преглед.
mir-automatic-compiler-mode-safe-attach=Наследен еквивалент на Прилагане на безопасни промени с деактивирано създаване на изследвания.
mir-automatic-compiler-mode-exact-pack=Наследен еквивалент на Прилагане на безопасни промени с активирано създаване на проучване и необходими прегледани данни за съвместимост.
mir-automatic-compiler-mode-safe-generate=Наследен еквивалент на Прилагане на безопасни промени с активирано създаване на изследвания за регистрирани експериментални доставчици.
mir-adjust-vanilla-weapon-speed-techs-off=Деактивирайте незадължителното припокриващо се бонус почистване на ракета/оръдие на MIR.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Премахнете припокриващите се бонуси за ракети/оръдия на MIR само когато активирана, достижима безкрайна технология осигурява точния заместващ ефект.
mir-adjust-vanilla-weapon-speed-techs-always=Винаги премахвайте припокриващите се бонуси за ракети/оръдия на MIR. Използвайте само ако искате строго разделение.
mir-science-pack-ingredient-policy-configured=Използвайте конфигурираните научни пакети на всяка генерирана технология без допълнително разширяване на съставките. MIR по подразбиране.
mir-science-pack-ingredient-policy-space=Добавете космическа наука, когато е налична. Просто увеличение на трудността след ракета.
mir-science-pack-ingredient-policy-space-and-promethium=Добавете наука за пространство и прометий, когато е налично. Най-доброто за много късни изследователски мивки от космическата ера.
mir-science-pack-ingredient-policy-space-age-progression=Добавете само пакети за прогресиране на Space Age, подразбиращи се от избраните пакети. Не добавя несвързани модифицирани пакети.
mir-science-pack-ingredient-policy-official-progression=Добавете липсващи официални пакети в стила на предпоставките, подразбиращи се от най-модерния вече избран официален пакет.
mir-science-pack-ingredient-policy-mod-progression=Добавете липсващи пакети, съвместими с лабораторни условия, изведени от прогресията на модифицирания научен пакет и отключете предпоставки.
mir-science-pack-ingredient-policy-all-official=Използвайте всяка официална база и научен пакет за космическата ера, който съществува в текущия набор от модове.
mir-science-pack-ingredient-policy-all=Използвайте всеки активен научен пакет, съвместим с лаборатория, включително модифицирани научни пакети.
mir-lab-incompatibility-policy-reduce=Запазете технологията, като намалите нейните научни пакети до най-големия набор, приеман от активна лаборатория. Най-сигурната подразбиране за мод пакети.
mir-lab-incompatibility-policy-skip=Пропуснете технологията, ако никоя активна лаборатория не може да изследва избрания от нея набор от научни пакети. По-строги и по-лесни за одит.
mir-lab-incompatibility-policy-engine-default=Никога не пренаписвайте избрания набор от научни пакети. MIR запазва безопасно изследван набор непроменен и пропуска генерираната технология, когато Factorio не може да проучи този точен набор.
mir-prototype-productivity-cap-engine-default=Оставете съществуващото ограничение на производителността на всяка рецепта. Рецептите без персонализирано ограничение използват нормалния лимит за бонус от +300% на Factorio.
mir-prototype-productivity-cap-percent-25=Задайте ограничения за производителност на непараметрични рецепти на +25%. Това е строга ранна граница.
mir-prototype-productivity-cap-percent-50=Задайте ограничения за производителност на непараметрични рецепти на +50%. Това е под нормалната горна граница и кара изследването на производителността да спре да помага по-рано.
mir-prototype-productivity-cap-percent-75=Задайте ограничения за производителност на непараметрични рецепти на +75%. Това е под нормалната горна граница и кара изследването на производителността да спре да помага по-рано.
mir-prototype-productivity-cap-percent-100=Задайте ограничения за производителност на непараметрични рецепти на +100%. Това е под нормалната горна граница и кара изследването на производителността да спре да помага по-рано.
mir-prototype-productivity-cap-percent-125=Задайте ограничения за производителност на непараметрични рецепти на +125%.
mir-prototype-productivity-cap-percent-150=Задайте ограничения за производителност на непараметрични рецепти на +150%.
mir-prototype-productivity-cap-percent-200=Задайте ограничения за производителност на непараметрични рецепти на +200%. Това е под нормалната горна граница и кара изследването на производителността да спре да помага по-рано.
mir-prototype-productivity-cap-percent-250=Задайте ограничения за производителност на непараметрични рецепти на +250%. Това е малко под нормалната горна граница.
mir-prototype-productivity-cap-percent-400=Задайте ограничения за производителност на непараметрични рецепти на +400%. Това разширява мащабирането на производителността отвъд нормалното ограничение.
mir-prototype-productivity-cap-percent-500=Задайте ограничения за производителност на непараметрични рецепти на +500%. Това разширява мащабирането на производителността отвъд нормалното ограничение.
mir-prototype-productivity-cap-percent-750=Задайте ограничения за производителност на непараметрични рецепти на +750%.
mir-prototype-productivity-cap-percent-1000=Задайте ограничения за производителност на непараметрични рецепти на +1000%. Използвайте за дълги запазвания, където изследванията на производителността трябва да продължат да имат значение.
mir-prototype-productivity-cap-percent-2500=Задайте ограничения за производителност на непараметрични рецепти на +2500%. Използвайте за много дълги запазвания.
mir-prototype-productivity-cap-percent-5000=Задайте ограничения за производителност на непараметрични рецепти на +5000%.
mir-prototype-productivity-cap-percent-10000=Задайте ограничения за производителност на непараметрични рецепти на +10000%. Използвайте само за екстремно дългосрочно мащабиране.
mir-prototype-productivity-cap-percent-25000=Задайте ограничения за производителност на непараметрични рецепти на +25000%. Използвайте само за екстремно дългосрочно мащабиране.
mir-prototype-productivity-cap-percent-100000=Задайте ограничения за производителност на непараметрични рецепти на +100000%. Това на практика е неограничено за повечето спасявания.
mir-recycling-return-chance-engine-default=Оставете всяка рецепта за рециклиране непроменена.
mir-recycling-return-chance-match-productivity-cap=Защитено от експлоатация автоматично намаляване за скрити генерирани рецепти за рециклиране. Използва 1 / (1 + бонус за производителност), ограничен до нормалната възвръщаемост от 25%: +400% става 20%, а +1000% става около 9,09%.
mir-recycling-return-chance-percent-25=Съхранявайте скрити генерирани рецепти за рециклиране при нормална връщане на материала от 25%.
mir-recycling-return-chance-percent-20=Мащабирайте скрити генерирани рецепти за рециклиране до 20% материална възвръщаемост.
mir-recycling-return-chance-percent-15=Мащабирайте скрити генерирани рецепти за рециклиране до 15% материална възвръщаемост.
mir-recycling-return-chance-percent-12-5=Мащабирайте скрити генерирани рецепти за рециклиране до 12,5% материална възвръщаемост.
mir-recycling-return-chance-percent-10=Мащабирайте скрити генерирани рецепти за рециклиране до 10% материална възвръщаемост.
mir-recycling-return-chance-percent-7-5=Мащабирайте скрити генерирани рецепти за рециклиране до 7,5% материална възвръщаемост.
mir-recycling-return-chance-percent-5=Мащабирайте скрити генерирани рецепти за рециклиране до 5% материална възвръщаемост.
mir-recycling-return-chance-percent-2-5=Мащабирайте скрити генерирани рецепти за рециклиране до 2,5% материална възвръщаемост.
mir-recycling-return-chance-percent-1=Мащабирайте скрити генерирани рецепти за рециклиране до 1% материална възвръщаемост.
mir-recycling-return-chance-percent-0-5=Мащабирайте скрити генерирани рецепти за рециклиране до 0,5% материална възвръщаемост.
mir-recycling-return-chance-percent-0-1=Мащабирайте скрити генерирани рецепти за рециклиране до 0,1% материална възвръщаемост.
mir-prototype-efficiency-cap-engine-default=Оставете ограничението за ефекта на потребление на енергия на всяка машина. Машините без персонализирано ограничение използват нормалното ограничение на ефекта от -80% на Factorio, така че ефектите не могат да намалят активното използване под 20%.
mir-prototype-efficiency-cap-saving-25=Напишете ограничение за -25% потребление на енергия. Активното използване на енергия остава на 75% или повече след ефектите от потреблението на енергия.
mir-prototype-efficiency-cap-saving-50=Напишете ограничение за -50% потребление на енергия. Активното използване на енергия остава на 50% или повече след ефектите на потреблението на енергия върху поддържаните машини.
mir-prototype-efficiency-cap-saving-75=Напишете ограничение за -75% потребление на енергия. Активното потребление на енергия остава на 25% или повече след ефектите от използването на енергия върху поддържаните машини.
mir-prototype-efficiency-cap-saving-90=Напишете ограничение за -90% потребление на енергия. Използването на активна енергия може да падне до 10%, което е под нормалния праг от 20%.
mir-prototype-efficiency-cap-saving-95=Напишете ограничение за -95% потребление на енергия. Използването на активна енергия може да падне до 5%.
mir-prototype-efficiency-cap-saving-99=Напишете ограничение за -99% потребление на енергия. Използването на активна енергия може да падне до 1%.
mir-prototype-efficiency-cap-saving-999=Напишете ограничение за -99,9% потребление на енергия. Използването на активна енергия може да падне до 0,1%.
mir-prototype-efficiency-cap-saving-9999=Напишете ограничение за -99,99% потребление на енергия. Това е почти нулево използване на активна енергия, а не пренаписване на прототип с нулева мощност.
mir-prototype-pollution-cap-engine-default=Оставете ограничението за въздействие върху замърсяването на всяка машина. Машините без персонализирано ограничение използват нормалното ограничение на ефекта на замърсяване от -80% на Factorio.
mir-prototype-pollution-cap-saving-25=Напишете -25% таван на замърсяването. Замърсяването остава на 75% или повече след въздействието на замърсяването.
mir-prototype-pollution-cap-saving-50=Напишете -50% таван на замърсяването. Замърсяването остава на 50% или повече след въздействието на замърсяването върху поддържаните машини.
mir-prototype-pollution-cap-saving-75=Напишете -75% горна граница на замърсяване. Замърсяването остава на 25% или повече след въздействието на замърсяването върху поддържаните машини.
mir-prototype-pollution-cap-saving-90=Напишете горна граница на замърсяване от -90%. Замърсяването може да падне до 10%, което е под нормалния под от 20%.
mir-prototype-pollution-cap-saving-95=Напишете горна граница на замърсяване от -95%. Замърсяването може да падне до 5%.
mir-prototype-pollution-cap-saving-99=Напишете -99% горна граница на замърсяване. Замърсяването може да падне до 1%.
mir-prototype-pollution-cap-saving-999=Напишете горна граница на замърсяване от -99,9%. Замърсяването може да падне до 0,1%.
mir-prototype-pollution-cap-saving-9999=Напишете горна граница на замърсяване от -99,99%. Това е почти нулево замърсяване, а не скрипт за замърсяване по време на изпълнение.
mir-prototype-speed-floor-engine-default=Оставете отрицателното ограничение на скоростта на всяка машина. Машините без персонализирано ограничение използват нормалния -80% под на Factorio и поддържат поне 20% скорост.
mir-prototype-speed-floor-saving-25=Ограничете отрицателните ефекти на скоростта при -25%, оставяйки поне 75% скорост.
mir-prototype-speed-floor-saving-50=Ограничете отрицателните ефекти на скоростта при -50%, оставяйки поне 50% скорост.
mir-prototype-speed-floor-saving-75=Ограничете отрицателните ефекти на скоростта при -75%, оставяйки поне 25% скорост.
mir-prototype-speed-floor-saving-90=Позволява отрицателни ефекти на скоростта до -90%, оставяйки поне 10% скорост.
mir-prototype-speed-floor-saving-95=Позволява отрицателни ефекти на скоростта до -95%, оставяйки поне 5% скорост.
mir-prototype-speed-floor-saving-99=Позволява отрицателни ефекти на скоростта до -99%, оставяйки поне 1% скорост.
mir-prototype-speed-floor-saving-999=Позволява отрицателни ефекти на скоростта до -99,9%, оставяйки поне 0,1% скорост.
mir-prototype-speed-floor-saving-9999=Позволява отрицателни ефекти на скоростта до -99,99%, най-ниската граница на прототипа на Factorio. Това е почти стоп, а не нулева или отрицателна скорост на изработка.
mir-prototype-speed-cap-engine-default=Оставете ограничението на скоростта на всяка машина. Машините без персонализирано ограничение използват много високия +100 000% таван на скоростта на Factorio.
mir-prototype-speed-cap-bonus-25=Положителни ефекти на скоростта при +25%.
mir-prototype-speed-cap-bonus-50=Положителни ефекти на скоростта при +50%. Използвайте това, за да запазите бонусите за скорост строго ограничени.
mir-prototype-speed-cap-bonus-75=Положителни ефекти на скоростта при +75%.
mir-prototype-speed-cap-bonus-100=Положителни ефекти на скоростта при +100%.
mir-prototype-speed-cap-bonus-125=Положителни ефекти на скоростта при +125%.
mir-prototype-speed-cap-bonus-150=Захващайте положителни ефекти на скоростта при +150%.
mir-prototype-speed-cap-bonus-200=Положителни ефекти на скоростта при +200%.
mir-prototype-speed-cap-bonus-250=Положителни ефекти на скоростта на затягане при +250%.
mir-prototype-speed-cap-bonus-300=Положителни ефекти на скоростта при +300%.
mir-prototype-speed-cap-bonus-400=Положителни ефекти на скоростта при +400%.
mir-prototype-speed-cap-bonus-500=Положителни ефекти на скоростта при +500%.
mir-prototype-speed-cap-bonus-750=Положителни ефекти на скоростта при +750%.
mir-prototype-speed-cap-bonus-1000=Положителни ефекти на скоростта при +1000%.
mir-prototype-speed-cap-bonus-2500=Положителни ефекти на скоростта при +2500%.
mir-prototype-speed-cap-bonus-5000=Положителни ефекти на скоростта при +5000%.
mir-prototype-speed-cap-bonus-10000=Положителни ефекти на скоростта при +10000%.
mir-prototype-speed-cap-bonus-25000=Положителни ефекти на скоростта при +25000%.
mir-prototype-speed-cap-bonus-100000=Напишете изрично тавана на максималния скоростен ефект на Factorio. За разлика от непроменените, това презаписва персонализираните долни граници.
mir-prototype-quality-cap-engine-default=Оставете ограничението за качество-ефект на всяка машина. Машините без персонализирано ограничение използват много високия +100 000% таван на качествения ефект на Factorio.
mir-prototype-quality-cap-bonus-50=Стяга положителни качествени ефекти при +50%. Това ограничава бонус ефектите на качеството на машината, а не нивата на качеството или формулите за вероятност на артикулите.
mir-prototype-quality-cap-bonus-25=Затягане на положителни качествени ефекти при +25%. Това не променя нивата на качество или формулите за вероятност на артикула.
mir-prototype-quality-cap-bonus-75=Стяга положителни качествени ефекти при +75%. Това не променя нивата на качество или формулите за вероятност на артикула.
mir-prototype-quality-cap-bonus-100=Стяга положителни качествени ефекти при +100%. Това не променя нивата на качество или формулите за вероятност на артикула.
mir-prototype-quality-cap-bonus-125=Стяга положителни качествени ефекти при +125%. Това не променя нивата на качество или формулите за вероятност на артикула.
mir-prototype-quality-cap-bonus-150=Стяга положителни качествени ефекти при +150%. Това не променя нивата на качество или формулите за вероятност на артикула.
mir-prototype-quality-cap-bonus-200=Стяга положителни качествени ефекти при +200%. Това не променя нивата на качество или формулите за вероятност на артикула.
mir-prototype-quality-cap-bonus-250=Стяга положителни качествени ефекти при +250%. Това не променя нивата на качество или формулите за вероятност на артикула.
mir-prototype-quality-cap-bonus-300=Стяга положителни качествени ефекти при +300%. Това не променя нивата на качество или формулите за вероятност на артикула.
mir-prototype-quality-cap-bonus-400=Стяга положителни качествени ефекти при +400%. Това не променя нивата на качество или формулите за вероятност на артикула.
mir-prototype-quality-cap-bonus-500=Стяга положителни качествени ефекти при +500%. Това не променя нивата на качество или формулите за вероятност на артикула.
mir-prototype-quality-cap-bonus-750=Стяга положителни качествени ефекти при +750%. Това не променя нивата на качество или формулите за вероятност на артикула.
mir-prototype-quality-cap-bonus-1000=Стяга положителни качествени ефекти при +1000%. Това не променя нивата на качество или формулите за вероятност на артикула.
mir-prototype-quality-cap-bonus-2500=Стяга положителни качествени ефекти при +2500%. Това не променя нивата на качество или формулите за вероятност на артикула.
mir-prototype-quality-cap-bonus-5000=Стяга положителни качествени ефекти при +5000%. Това не променя нивата на качество или формулите за вероятност на артикула.
mir-prototype-quality-cap-bonus-10000=Стяга положителни качествени ефекти при +10000%. Това не променя нивата на качество или формулите за вероятност на артикула.
mir-prototype-quality-cap-bonus-25000=Захваща положителни качествени ефекти при +25000%. Това не променя нивата на качество или формулите за вероятност на артикула.
mir-prototype-quality-cap-bonus-100000=Напишете изрично тавана за максимален качествен ефект на Factorio. За разлика от непроменените, това презаписва персонализираните долни граници.
