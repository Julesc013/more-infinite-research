[mod-setting-description]
ips-require-space-gate=Когато са активирани, тези технологии остават заключени, докато космическата наука не бъде изследвана във ванилия или науката за прометий в Космическата ера.
mir-science-pack-ingredient-policy=Избира как MIR добавя научни пакети към генерираните технологии. Опциите са подредени от консервативни към широки: пакети по подразбиране, пакети за късна игра, пакети, базирани на прогресия, след това всички налични пакети.
mir-automatic-productivity-action=Избира какво прави MIR с възможностите за безопасна производителност, открити в рецептите за инсталиран мод. Disabled не извършва автоматично откриване. Прегледайте записите за промени, приети и пропуснати кандидати в дневника на Factorio, без да променяте изследванията. Прилагане на безопасни промени (по подразбиране) добавя отговарящи на условията рецепти само към съвместими съществуващи MIR изследвания. Това контролира действието, а не силата или зрелостта; квадратчетата за създаване по-долу са отделни. Винаги се прилагат проверки на собственост, рециклиране, вероятност, катализатор, наука, лаборатория, предпоставка, цел, идентичност, прогресия и цикъл.
mir-automatic-create-research=По подразбиране: изключено. Изключени ограничения Приложете безопасни промени към съвместими съществуващи MIR изследвания; кандидатите без подходящ поток се пропускат и докладват. On позволява на отговарящ на условията регистриран доставчик да създаде една стабилна генерична технология за безкрайна производителност, когато нито едно съществуващо изследване не е подходящо. Квадратчето за прегледани данни по-долу решава дали експерименталните доставчици отговарят на условията. MIR никога не създава една технология за мод или рецепта и всяка твърда безопасност, наука, собственост, идентичност, прогресия и врата за цикъл все още се прилагат.
mir-automatic-require-reviewed-data=По подразбиране: включено. Това има значение само когато е включено Разрешаване на създаване на нови изследвания; никога не блокира безопасното привързване към съществуващите изследвания. При разрешителни само семействата на доставчиците са маркирани като прегледани и подкрепени от приложими доказателства за точна версия, така че експерименталните семейства се пропускат. Off позволява на регистрирани експериментални доставчици да създават от общи структурни доказателства. За най-широко експериментално поведение активирайте създаването на изследвания и изключете това изискване. Никоя ценност не може да заобиколи твърда защитна врата.
mir-automatic-compiler-mode=Скрит мост за съвместимост за профили, създадени преди разделените контроли за автоматична производителност. Наследена стойност, която не е по подразбиране, се зачита само докато всички нови контроли остават по подразбиране. Променете всеки нов контрол, за да поемете изричен контрол.
ips-enable-stream=Създава генерираната безкрайна технология за __1__, когато нейните рецепти, ефекти, предпоставки и научни пакети са налични. Деактивирайте това, за да попречите на MIR да генерира тази технология.
ips-cost-base-stream=Изследователски единици, необходими за първото генерирано ниво на __1__. Трябва да бъде поне 1. По-късните нива се изчисляват от тази стойност и коефициента на растеж на разходите.
ips-cost-growth-stream=Множител, приложен към всяко следващо ниво на __1__. Използвайте 1 за фиксирани разходи, 1,5 за 50% растеж на ниво или 2 за удвояване на разходите.
ips-max-level-stream=Най-високото генерирано ниво за __1__. Задайте 0 за безкрайни нива.
ips-research-time-stream=Секунди на изследователска единица за __1__. Задайте 0, за да използвате MIR по подразбиране за тази технология. Това не е общото време за изследване; общото време също зависи от разходите за изследване, броя на лабораториите, скоростта на лабораторията и модулите.
mir-enable-base-tech=Позволява на __1__ да продължи отвъд своята ванилова капачка като безкрайна технология. Деактивирайте това, ако искате MIR да добавя нови изследователски линии, без да разширява тази ванилия верига.
mir-cost-base=Изследователски единици, необходими за първото ниво на продължаване на MIR на __1__. Задайте 0, за да наследите модела на разходите на ваниловата верига, когато е възможно.
mir-cost-growth=Множител, приложен към всяко следващо ниво на продължаване на MIR от __1__. Задайте на 0, за да наследите модела на растеж на ваниловата верига, когато е възможно.
mir-max-level=Най-високото ниво на продължаване на MIR за __1__. Задайте 0 за безкрайни нива.
mir-research-time=Секунди на изследователска единица за продължението на MIR на __1__. Задайте на 0, за да наследите времето за изследователска единица на ваниловата верига, когато е възможно.
mir-prefer-this-mod-for-competing-techs=Когато е активиран, този мод премахва избрани конкурентни безкрайни разширения и използва свои собствени версии. Деактивирайте, за да запазите конкурентни версии от други модификации.
mir-adjust-vanilla-weapon-speed-techs=Контролира дали MIR премахва бонусите за скорост на ракети и оръдия от своето генерирано продължаване на скоростта на стрелба с оръжие, когато е налично точно безкрайно покритие за замяна. Технологиите за ограничена скорост на стрелба с оръжия Vanilla запазват първоначалните си бонуси.
mir-use-installed-space-age-icons=Когато е активиран, MIR може да препраща към инсталирани официални DLC файлове с икони, включително Space Age и Elevated Rails, дори когато тези модификации са деактивирани за стартиране на базова игра. Оставете това изключено, ако тези DLC файлове не са инсталирани; Factorio не може да се възстанови елегантно от липсващи файлове с икони по време на зареждане на прототип.
mir-pipeline-extent-multiplier=Падащ множител само при стартиране за разпознати полета за разширение на тръбопровода на флуидна кутия в прототипи, не само в тръбопроводни обекти. 100% оставя прототипите непроменени и не зарежда прохода на тръбопровода или сканира флуидните кутии. Стойностите, различни от 100%, са експериментални и могат да повлияят на машини, резервоари, тласкащи устройства и модифицирани прототипи, които дефинират флуидни кутии.
mir-unrestricted-modules=Експериментален и нарушаващ баланса. Когато е активирана, всяка съществуваща рецепта приема всичките пет модулни ефекта и всеки съществуващ модулен приемник със слотове приема всяка открита категория модули. Това не добавя слотове за модули или променя прототипите на модули и може да активира производителност, качество и цикли на модифицирани модули.
mir-prototype-productivity-cap=Избира дали MIR оставя ограниченията за производителност на рецептите сами или записва ограничение при стартиране към всяка непараметрична и нерециклираща рецепта. +300% (непроменени) запазва съществуващите капачки на рецептите; по-ниските стойности съкращават мащабирането на производителността, докато по-високите стойности го удължават.
mir-recycling-return-chance=Контролира само скрити генерирани рецепти за рециклиране. Автоматичният режим намалява нормалната възвръщаемост на материала от 25% до най-много 1, разделено на множителя на общия изход при избраната граница на производителността. Фиксираните избори мащабират същата генерирана възвръщаемост директно. Видимите процеси и границите на производителността на рецептите никога не се променят.
mir-productivity-cap-self-recycling-only=Над 1 / връщане на рециклиращо устройство - 1, само производствени рецепти с доказан негенеративен път на саморециклиране получават избраната по-висока граница. При или под този праг това квадратче няма ефект. Непроменен двигател използва нормалната възвръщаемост от 25% като консервативен праг от +300%, без да променя рецептите за рециклиране.
mir-prototype-efficiency-cap=Избира доколко ефектите на ефективност могат да намалят активното използване на енергия от машината. -80% (непроменен) оставя съществуващите ограничения за потребление на енергия. По-дълбоките намаления могат да се доближат до нулево използване на активна енергия, без да се променят границите на замърсяване.
mir-prototype-pollution-cap=Избира доколко ефектите за намаляване на замърсяването могат да намалят замърсяването от машината. -80% (непроменен) оставя съществуващите граници на замърсяване само. По-дълбоките намаления могат да доближат нулево замърсяване, без да променят потреблението на енергия.
mir-prototype-speed-floor=Избира до каква степен отрицателните ефекти на скоростта могат да забавят поддържаните машини. -80% (непроменен) оставя съществуващите ограничения; по-дълбоките стойности премахват нормалния под до почти стоп при -99,99%.
mir-prototype-speed-cap=Избира дали MIR оставя границите на ефекта на скоростта на машината само или записва ново положително ограничение на скоростта. +100000% (непроменен) запазва съществуващите лимити; по-ниските стойности умишлено ограничават много големи бонуси за скорост.
mir-prototype-quality-cap=Избира дали MIR оставя границите на ефекта върху качеството на машината само или записва нова граница за положително качество. +100 000% (непроменен) запазва съществуващите лимити и не променя нивата на качество или формулите за вероятност на артикула.
mir-prototype-positive-power-floor=По подразбиране изключено. Когато е активиран, MIR променя изричните прототипи за използване на активна енергия от 0 W на 1 W по време на зареждане на прототип, така че предупредителните икони за ниска мощност не се появяват на обекти, които трябва да черпят малко ненулево количество. Прекъснете, за да запазите точно прототипите с нулева мощност.
mir-settings-profile-import=Поставете тук профилен низ за настройки на MIR, за да приложите експортираните стойности на началните настройки като заместващ слой по време на генерирането на прототип. Оставете празно за нормални настройки. Експортирайте с /mir-settings-export от активно запазване, след което рестартирайте след промяна на тази стойност.
mir-debug-generation-report=Когато е активирано, записва по един структуриран регистрационен ред на генериран или пропуснат поток и базово разширение, включително научни пакети, предпоставки, брой ефекти, състояние на лабораторна съвместимост и източник на икони.
mir-debug-recipe-matches=Когато е активирано, записва съответстващи имена на рецепти за всеки генериран поток за продуктивност. Това може да е шумно в големи мод пакети.
mir-debug-scripted-effects=Когато е активирано, записва записи в журнала по време на изпълнение, когато скриптираните технологии преизчисляват глобални или управлявани от събития ефекти.
mir-lab-incompatibility-policy=Избира какво прави MIR, когато избраните научни пакети не могат да бъдат изследвани от никоя активна лаборатория.
ips-effect-per-level-stream=Задава основния ефект на основното ниво за ниво за __1__. Свързаните по-късни нива и ефекти се мащабират пропорционално. Процентните ефекти използват процентни точки; Ефектите за броене и разстояние използват собствените си единици.
mir-effect-per-level=Задава каноничния ефект на ниво за безкрайното продължение __1__. Свързаните ефекти се мащабират пропорционално от крайната ванилова базова линия. Процентните ефекти използват процентни точки; Ефектите за броене и разстояние използват собствените си единици.
mir-note-experimental-spoilage=Експериментален и деактивиран по подразбиране във v2.1.0. Това е глобален/за цялата карта скриптов ефект. Съществуващото поведение на развалящ се стек не се претендира, докато не бъде валидирано ръчно.
mir-note-agriculture-growth=Отнася се за новозасадени селскостопански култури. Съществуващите засадени култури не се мащабират повторно.
mir-note-cargo-pad-count=Специални логистични изследвания за космическата ера. Увеличава площадките за кацане на товари на повърхност и може значително да промени логистичния баланс.
mir-note-inserter-capacity=Деактивирано по подразбиране. Допълнителният капацитет на устройството за вкарване може да повреди устройствата за вкарване, управлявани от веригата, и да намали оптимизациите на двигателя.
mir-note-native-owner-managed-stream=Ако инсталирана безкрайна технология вече притежава това изследователско семейство, същите тези настройки за стартиране конфигурират този собственик, вместо да създават дубликат. Непроменените MIR настройки по подразбиране запазват точно крайния прототип на собственика. Изричните замени на цената, времето, максималното ниво и ефекта се прилагат само след съвпадение на безопасен собственик; деактивирането на потока оставя външната технология недокосната. Рестартирайте Factorio след промяна на настройките за стартиране. Максимално ниво от 0 означава безкрайно, а стойностите на ефекта са процентни точки за ниво.

