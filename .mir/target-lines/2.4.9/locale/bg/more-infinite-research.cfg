[technology-description]
more-infinite-research.recipe_productivity=Увеличава производителността на рецептите за избраните рецепти. Таванът за максимална производителност на Factorio все още се прилага; допълнителните безкрайни нива може да нямат практически ефект, след като рецептата достигне своя таван.
more-infinite-research.direct_effect=Добавя безкраен повторяем бонус. Научните пакети се избират от активни лаборатории, така че технологията остава изследваема със съвместими комплекти модове.
more-infinite-research.cargo_bay_unloading_distance=Увеличава максималното разстояние между площадката за кацане на товара и свързаните разтоварни площадки.
more-infinite-research.cargo_landing_pad_count=Увеличава броя площадки за кацане на товари, които всяка сила може да изгради на повърхност.
more-infinite-research.flamethrower_shooting_speed=Увеличава скоростта на стрелба за огнехвъргачни оръжия и огнехвъргачни кули.
more-infinite-research.electric_shooting_speed=Увеличава скоростта на стрелба за електрически оръжия. Във ванилията това засяга защитата при отделяне; с Space Age засяга и оръжията на Tesla, когато е налична категорията амуниции tesla.
more-infinite-research.spoilage_preservation=Увеличава глобалния модификатор на времето за разваляне чрез ограничен скриптов ефект. Съществуващите артикули, подлежащи на разваляне, могат да запазят текущите си срокове за разваляне, докато не бъдат тествани в играта.
more-infinite-research.agricultural_growth_speed=Съкращава оставащото време за растеж за новозасадени селскостопански култови растения чрез ограничен скриптов ефект.
more-infinite-research.lab_productivity=Увеличава научноизследователския напредък, получен от всеки използван научен пакет, като използва родния модификатор на продуктивността на лабораторните изследвания.

