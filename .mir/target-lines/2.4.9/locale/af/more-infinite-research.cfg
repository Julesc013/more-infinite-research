[mod-setting-description]
ips-require-space-gate=Wanneer dit geaktiveer word, bly hierdie tegnologieë gesluit totdat ruimtewetenskap in vanielje nagevors word, of promethiumwetenskap in die Ruimtetydperk nagevors word.
mir-science-pack-ingredient-policy=Kies hoe MIR wetenskappakkette by gegenereerde tegnologieë voeg. Opsies word van konserwatief tot wyd gerangskik: verstekpakke, laat-speletjie-pakke, vordering-gebaseerde pakke, dan alle beskikbare pakke.
mir-automatic-productivity-action=Kies wat MIR doen met veilige produktiwiteitsgeleenthede wat in geïnstalleerde-mod resepte gevind word. Gedeaktiveer voer geen outomatiese ontdekking uit nie. Voorskou veranderingsrekords aanvaar en oorgeslaan kandidate in die Factorio log sonder om navorsing te verander. Pas veilige veranderinge toe (verstek) voeg kwalifiserende resepte slegs by versoenbare bestaande MIR-navorsing. Dit beheer aksie, nie krag of volwassenheid nie; die skeppingsmerkblokkies hieronder is apart. Eienaarskap, herwinning, waarskynlikheid, katalisator, wetenskap, laboratorium, voorvereiste, teiken, identiteit, vordering en sikluskontroles is altyd van toepassing.
mir-automatic-create-research=Verstek: af. Buite perke Pas veilige veranderinge toe op versoenbare bestaande MIR-navorsing; kandidate sonder 'n geskikte stroom word oorgeslaan en gerapporteer. Aan laat 'n kwalifiserende geregistreerde verskaffer toe om een ​​stabiele generiese oneindige produktiwiteitstegnologie te skep wanneer geen bestaande navorsing pas nie. Die hersiene-data-merkblokkie hieronder besluit of eksperimentele verskaffers in aanmerking kom. MIR skep nooit een tegnologie per mod of resep nie, en elke harde veiligheids-, wetenskap-, eienaarskap-, identiteit-, progressie- en siklushek geld steeds.
mir-automatic-require-reviewed-data=Verstek: aan. Dit maak slegs saak wanneer Laat nuwe navorsingskepping toe is; dit blokkeer nooit veilige gehegtheid aan bestaande navorsing nie. Op permitte word slegs verskaffergesinne gemerk as hersien en gerugsteun deur toepaslike presiese weergawebewyse, dus word eksperimentele families oorgeslaan. Off laat geregistreerde eksperimentele verskaffers toe om van generiese strukturele bewyse te skep. Vir die wydste eksperimentele gedrag, aktiveer navorsingskepping en skakel hierdie vereiste af. Geen waarde kan 'n harde veiligheidshek omseil nie.
mir-automatic-compiler-mode=Versteekte verenigbaarheidsbrug vir profiele geskep voor die verdeelde outomatiese produktiwiteitskontroles. 'n Nie-verstek erfeniswaarde word slegs geëer terwyl alle nuwe kontroles op hul verstek bly. Verander enige nuwe beheer om eksplisiete beheer te neem.
ips-enable-stream=Skep die gegenereerde oneindige tegnologie vir __1__ wanneer die resepte, effekte, voorvereistes en wetenskappakkette beskikbaar is. Deaktiveer dit om te verhoed dat MIR hierdie tegnologie genereer.
ips-cost-base-stream=Navorsingseenhede benodig vir die eerste gegenereerde vlak van __1__. Moet ten minste 1 wees. Latere vlakke word uit hierdie waarde en die kostegroeifaktor bereken.
ips-cost-growth-stream=Vermenigvuldiger toegepas op elke latere vlak van __1__. Gebruik 1 vir vaste koste, 1,5 vir 50% groei per vlak, of 2 vir verdubbeling van koste.
ips-max-level-stream=Hoogste gegenereerde vlak vir __1__. Stel op 0 vir oneindige vlakke.
ips-research-time-stream=Sekondes per navorsingseenheid vir __1__. Stel op 0 om MIR se verstek vir hierdie tegnologie te gebruik. Dit is nie totale navorsingstyd nie; totale tyd hang ook af van navorsingskoste, laboratoriumtelling, laboratoriumspoed en modules.
mir-enable-base-tech=Laat __1__ toe om verby sy vanieljedop voort te gaan as 'n oneindige tegnologie. Deaktiveer dit as jy wil hê dat MIR nuwe navorsingslyne moet byvoeg sonder om hierdie vanieljeketting te verleng.
mir-cost-base=Navorsingseenhede benodig vir die eerste MIR-voortsettingsvlak van __1__. Stel op 0 om die vanieljeketting se kostepatroon te erf wanneer moontlik.
mir-cost-growth=Vermenigvuldiger toegepas op elke latere MIR-voortsettingsvlak van __1__. Stel op 0 om die vanieljeketting se groeipatroon te erf wanneer moontlik.
mir-max-level=Hoogste MIR-voortsettingsvlak vir __1__. Stel op 0 vir oneindige vlakke.
mir-research-time=Sekondes per navorsingseenheid vir die MIR-voortsetting van __1__. Stel op 0 om die vanieljeketting se navorsingseenheidtyd te erf waar moontlik.
mir-prefer-this-mod-for-competing-techs=Wanneer dit geaktiveer is, verwyder hierdie mod geselekteerde mededingende oneindige uitbreidings en gebruik sy eie weergawes. Deaktiveer om mededingende weergawes van ander mods te hou.
mir-adjust-vanilla-weapon-speed-techs=Beheer of MIR vuurpyl- en kanondop-spoedbonusse van sy gegenereerde wapenskietspoedvoortsetting verwyder wanneer presiese oneindige vervangingsdekking beskikbaar is. Eindige vanielje-wapenskiet-spoedtegnologieë behou hul oorspronklike bonusse.
mir-use-installed-space-age-icons=Wanneer dit geaktiveer is, kan MIR na geïnstalleerde amptelike DLC-ikoonlêers verwys, insluitend Space Age en Elevated Rails, selfs wanneer daardie mods gedeaktiveer is vir 'n basisspeletjie. Laat dit af as daardie DLC-lêers nie geïnstalleer is nie; Factorio kan nie grasieus herstel van ontbrekende ikoonlêers tydens prototipe-laai nie.
mir-pipeline-extent-multiplier=Opstart-alleen-aftrekvermenigvuldiger vir erkende vloeistofbokspyplyn-omvangvelde oor prototipes, nie net pyp-entiteite nie. 100% laat prototipes onveranderd en laai nie die pyplynpass of skandeer vloeistofbokse nie. Nie-100%-waardes is eksperimenteel en kan masjiene, tenks, stuwers en gemodifiseerde prototipes wat vloeistofbokse definieer, beïnvloed.
mir-unrestricted-modules=Eksperimenteel en balansverbrekend. Wanneer dit geaktiveer is, aanvaar elke bestaande resep al vyf module-effekte en elke bestaande module-ontvanger met gleuwe aanvaar elke ontdekte modulekategorie. Dit voeg nie modulegleuwe by of verander moduleprototipes nie, en kan produktiwiteit, kwaliteit en gemodifiseerde-module-lusse moontlik maak.
mir-prototype-productivity-cap=Kies of MIR resepproduktiwiteitsdoppies alleen laat of 'n beginlimiet skryf vir elke nie-parameter, nie-herwinningsresep. +300% (onveranderd) bewaar bestaande resepdoppe; laer waardes verkort produktiwiteitskaal, terwyl hoër waardes dit uitbrei.
mir-recycling-return-chance=Beheer slegs versteekte gegenereerde herwinningsresepte. Outomatiese modus verminder die normale 25% materiaalopbrengs tot hoogstens 1 gedeel deur die totale uitsetvermenigvuldiger by die gekose produktiwiteitsperk. Vaste keuses skaal dieselfde gegenereerde opbrengs direk. Sigbare prosesse en resepproduktiwiteitsbeperkings word nooit verander nie.
mir-productivity-cap-self-recycling-only=Bo 1 / herwinner terugkeer - 1, slegs produksie resepte met 'n bewese nie-generatiewe self-herwinning pad ontvang die geselekteerde hoër pet. By of onder daardie drempel het hierdie merkblokkie geen effek nie. Enjin onveranderd gebruik die normale 25% opbrengs as 'n konserwatiewe +300% drempel sonder om herwinningsresepte te verander.
mir-prototype-efficiency-cap=Kies in hoeverre doeltreffendheidseffekte aktiewe masjienenergieverbruik kan verminder. -80% (onveranderd) laat bestaande energieverbruiklimiete alleen. Dieper verlagings kan nul aktiewe energieverbruik nader sonder om besoedelingsgrense te verander.
mir-prototype-pollution-cap=Kies hoe ver besoedeling-vermindering effekte masjienbesoedeling kan verminder. -80% (onveranderd) laat bestaande besoedelingsperke alleen. Dieper reduksies kan geen besoedeling benader sonder om energieverbruik te verander nie.
mir-prototype-speed-floor=Kies hoe ver negatiewe spoedeffekte ondersteunde masjiene kan vertraag. -80% (onveranderd) laat bestaande perke alleen; dieper waardes verwyder die normale vloer tot by 'n stop by -99.99%.
mir-prototype-speed-cap=Kies of MIR masjienspoed-effekgrense alleen laat of 'n nuwe positiewe spoedlimiet skryf. +100000% (onveranderd) bewaar bestaande limiete; laer waardes opsetlik klem baie groot spoed bonusse.
mir-prototype-quality-cap=Kies of MIR masjien kwaliteit-effek limiete alleen laat of 'n nuwe positiewe kwaliteit cap skryf. +100000% (onveranderd) behou bestaande limiete en verander nie kwaliteitvlakke of itemwaarskynlikheidsformules nie.
mir-prototype-positive-power-floor=Verstek af. Wanneer dit geaktiveer is, verander MIR eksplisiete 0W aktiewe energiegebruik prototipes na 1W tydens prototipe laai sodat laekrag waarskuwingsikone nie op entiteite verskyn wat 'n klein nie-nul hoeveelheid moet trek nie. Laat staan ​​om nul-krag prototipes presies te bewaar.
mir-settings-profile-import=Plak 'n MIR-instellingsprofielstring hier om uitgevoerde opstartinstellingswaardes as 'n oorheersingslaag tydens prototipe-generering toe te pas. Laat leeg vir normale instellings. Voer uit met /mir-settings-export vanaf 'n aktiewe stoor, en herbegin dan nadat jy hierdie waarde verander het.
mir-debug-generation-report=Wanneer dit geaktiveer is, skryf een gestruktureerde logboekry per gegenereerde of oorgeslaande stroom en basisuitbreiding, insluitend wetenskappakkette, voorvereistes, effektelling, laboratoriumversoenbaarheidstatus en ikoonbron.
mir-debug-recipe-matches=Wanneer geaktiveer, skryf ooreenstemmende resepname vir elke gegenereerde produktiwiteitstroom. Dit kan raserig wees in groot mod-pakke.
mir-debug-scripted-effects=Wanneer geaktiveer, skryf runtime loginskrywings wanneer skriftegnologieë globale of gebeurtenisgedrewe effekte herbereken.
mir-lab-incompatibility-policy=Kies wat MIR doen wanneer die geselekteerde wetenskappakke nie deur enige aktiewe laboratorium nagevors kan word nie.
ips-effect-per-level-stream=Stel die primêre basisvlak-effek per vlak vir __1__. Verwante latere vlakke en effekte word proporsioneel afgeskaal. Persentasie-effekte gebruik persentasiepunte; telling en afstand effekte gebruik hul inheemse eenhede.
mir-effect-per-level=Stel die kanonieke per-vlak effek vir die oneindige __1__ voortsetting. Verwante effekte word proporsioneel vanaf die finale vanieljebasislyn afgeskaal. Persentasie-effekte gebruik persentasiepunte; telling en afstand effekte gebruik hul inheemse eenhede.
mir-note-experimental-spoilage=Eksperimenteel en by verstek gedeaktiveer in v2.1.0. Dit is 'n globale/kaartwye geskrewe effek. Bestaande bederfbare stapelgedrag word nie opgeëis totdat dit handmatig bekragtig is nie.
mir-note-agriculture-growth=Van toepassing op nuut aangeplante landboutoringgewasse. Bestaande aangeplante gewasse word nie herskaal nie.
mir-note-cargo-pad-count=Spesiale Ruimtetydperk logistieke navorsing. Verhoog vraglandingsblokke per oppervlak en kan logistieke balans aansienlik verander.
mir-note-inserter-capacity=By verstek gedeaktiveer. Ekstra invoegerkapasiteit kan stroombaanbeheerde invoegers breek en enjinoptimalisasies verminder.
mir-note-native-owner-managed-stream=As 'n geïnstalleerde oneindige tegnologie reeds hierdie navorsingsfamilie besit, konfigureer dieselfde opstartinstellings daardie eienaar in plaas daarvan om 'n duplikaat te skep. Onveranderde MIR-standaarde behou die eienaar se finale prototipe presies. Eksplisiete koste-, tyd-, maksimumvlak- en effek-oorskrywings is slegs van toepassing na 'n veilige eienaar-passing; deaktiveer die stroom laat die eksterne tegnologie onaangeraak. Herbegin Factorio nadat u opstartinstellings verander het. 'n Maksimum vlak van 0 beteken oneindig, en effekwaardes is persentasiepunte per vlak.

