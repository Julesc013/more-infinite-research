[technology-description]
more-infinite-research.recipe_productivity=Verhoog resepproduktiwiteit vir die geselekteerde resepte. Factorio se maksimum produktiwiteitsperk geld steeds; addisionele oneindige vlakke mag geen praktiese effek hê sodra 'n resep sy pet bereik het nie.
more-infinite-research.direct_effect=Voeg 'n oneindige herhaalbare bonus by. Wetenskappakkette word uit aktiewe laboratoriums gekies, sodat die tegnologie navorsbaar bly met versoenbare mod-stelle.
more-infinite-research.cargo_bay_unloading_distance=Verhoog die maksimum afstand tussen 'n vraglandingsplek en gekoppelde aflaaiplekke.
more-infinite-research.cargo_landing_pad_count=Verhoog die aantal vraglandingsblokke wat elke krag per oppervlak kan bou.
more-infinite-research.flamethrower_shooting_speed=Verhoog skietspoed vir vlamwerperwapens en vlamwerpertorings.
more-infinite-research.electric_shooting_speed=Verhoog skietspoed vir elektriese wapens. In vanielje beïnvloed dit afskeidingsverdediging; met Space Age beïnvloed dit ook Tesla-wapens wanneer die tesla-ammunisiekategorie beskikbaar is.
more-infinite-research.spoilage_preservation=Verhoog die globale bederftydwysiger deur 'n begrensde skrif-effek. Bestaande bederfbare items kan hul huidige bederf-sperdatums hou totdat dit in die speletjie getoets word.
more-infinite-research.agricultural_growth_speed=Verkort oorblywende groeityd vir nuutgeplante landboutoringplante deur 'n begrensde skrif-effek.
more-infinite-research.lab_productivity=Verhoog navorsingsvordering wat verkry word uit elke verbruikte wetenskappakket, deur die inheemse laboratoriumnavorsingsproduktiwiteitswysiger te gebruik.

