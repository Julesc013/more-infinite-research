[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Voer geen outomatiese ontdekking, aanhegting of skepping uit nie. MIR se vaste navorsing bly onveranderd.
mir-automatic-productivity-action-preview=Ontdek en klassifiseer kandidate, skryf dan aanvaarde en oorgeslaande besluite na die Factorio-logboek. Dit heg nie resepte aan of skep navorsing nie.
mir-automatic-productivity-action-apply=Verstek. Ontdek kandidate en heg slegs veiligheidsbewese resepte aan versoenbare bestaande MIR-navorsing. Dit skep nie navorsing op sigself nie; die twee merkblokkies hieronder beheer skepping.
mir-automatic-compiler-mode-off=Erfenis-ekwivalent van Gestremdes.
mir-automatic-compiler-mode-report=Verouderde ekwivalent van voorskou-veranderinge.
mir-automatic-compiler-mode-safe-attach=Erfenis-ekwivalent van Pas veilige veranderinge toe met navorsingskepping gedeaktiveer.
mir-automatic-compiler-mode-exact-pack=Oud-ekwivalent van Pas veilige veranderinge toe met navorsingskepping geaktiveer en hersiene versoenbaarheidsdata word vereis.
mir-automatic-compiler-mode-safe-generate=Erfenis-ekwivalent van Pas veilige veranderinge toe met navorsingskepping geaktiveer vir geregistreerde eksperimentele verskaffers.
mir-adjust-vanilla-weapon-speed-techs-off=Deaktiveer MIR se opsionele oorvleuelende vuurpyl-/kanonbonusopruiming.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Verwyder MIR se oorvleuelende vuurpyl-/kanonbonusse slegs wanneer 'n geaktiveerde, bereikbare oneindige tegnologie die presiese vervangingseffek verskaf.
mir-adjust-vanilla-weapon-speed-techs-always=Verwyder altyd MIR se oorvleuelende vuurpyl-/kanonbonusse. Gebruik slegs as jy streng skeiding wil hê.
mir-science-pack-ingredient-policy-configured=Gebruik elke gegenereerde tegnologie se gekonfigureerde wetenskappakkette sonder opsionele bestanddeeluitbreiding. MIR verstek.
mir-science-pack-ingredient-policy-space=Voeg ruimtewetenskap by wanneer beskikbaar. 'N Eenvoudige post-vuurpyl moeilikheid toename.
mir-science-pack-ingredient-policy-space-and-promethium=Voeg spasie en promethiumwetenskap by wanneer beskikbaar. Beste vir baie laat ruimtetydperk-navorsingsputte.
mir-science-pack-ingredient-policy-space-age-progression=Voeg slegs Space Age-vorderingspakke by wat deur die geselekteerde pakke geïmpliseer word. Voeg nie onverwante modded packs by nie.
mir-science-pack-ingredient-policy-official-progression=Voeg ontbrekende amptelike voorvereiste-styl pakke by wat geïmpliseer word deur die mees gevorderde amptelike pakket wat reeds gekies is.
mir-science-pack-ingredient-policy-mod-progression=Voeg ontbrekende laboratoriumversoenbare pakke by wat afgelei word uit gemodifiseerde wetenskappak-vordering en ontsluit voorvereistes.
mir-science-pack-ingredient-policy-all-official=Gebruik elke amptelike basis- en Space Age-wetenskappak wat in die huidige mod-stel bestaan.
mir-science-pack-ingredient-policy-all=Gebruik elke aktiewe laboratorium-versoenbare wetenskappakket, insluitend gemodifiseerde wetenskappakkies.
mir-lab-incompatibility-policy-reduce=Hou die tegnologie deur sy wetenskappakkette te verminder tot die grootste stel wat deur 'n aktiewe laboratorium aanvaar word. Veiligste verstek vir mod-pakke.
mir-lab-incompatibility-policy-skip=Slaan die tegnologie oor as geen aktiewe laboratorium sy geselekteerde wetenskappakstel kan navors nie. Strenger en makliker om te oudit.
mir-lab-incompatibility-policy-engine-default=Moet nooit die geselekteerde wetenskappakstel herskryf nie. MIR bewaar 'n veilig navorsbare stel onveranderd en laat die gegenereerde tegnologie weg wanneer Factorio nie daardie presiese stel kan navors nie.
mir-prototype-productivity-cap-engine-default=Los elke resep se bestaande produktiwiteitspet uit. Resepte sonder 'n pasgemaakte pet gebruik Factorio se normale +300% produktiwiteitsbonuslimiet.
mir-prototype-productivity-cap-percent-25=Stel nie-parameter resep produktiwiteit caps op +25%. Dit is 'n streng vroeë pet.
mir-prototype-productivity-cap-percent-50=Stel nie-parameter resep produktiwiteit caps op +50%. Dit is onder die normale limiet en maak dat produktiwiteitsnavorsing gouer ophou help.
mir-prototype-productivity-cap-percent-75=Stel nie-parameter resep produktiwiteit caps op +75%. Dit is onder die normale limiet en maak dat produktiwiteitsnavorsing gouer ophou help.
mir-prototype-productivity-cap-percent-100=Stel nie-parameter resep produktiwiteit caps op +100%. Dit is onder die normale limiet en maak dat produktiwiteitsnavorsing gouer ophou help.
mir-prototype-productivity-cap-percent-125=Stel nie-parameter resep produktiwiteitsbeperkings op +125%.
mir-prototype-productivity-cap-percent-150=Stel nie-parameter resep produktiwiteit caps op +150%.
mir-prototype-productivity-cap-percent-200=Stel nie-parameter resep produktiwiteit caps op +200%. Dit is onder die normale limiet en maak dat produktiwiteitsnavorsing gouer ophou help.
mir-prototype-productivity-cap-percent-250=Stel nie-parameter resep produktiwiteit caps op +250%. Dit is effens onder die normale dop.
mir-prototype-productivity-cap-percent-400=Stel nie-parameter resep produktiwiteit caps op +400%. Dit vergroot produktiwiteitskaal verder as die normale limiet.
mir-prototype-productivity-cap-percent-500=Stel nie-parameter resep produktiwiteit caps op +500%. Dit vergroot produktiwiteitskaal verder as die normale limiet.
mir-prototype-productivity-cap-percent-750=Stel nie-parameter resep produktiwiteit caps op +750%.
mir-prototype-productivity-cap-percent-1000=Stel nie-parameter resep produktiwiteit caps op +1000%. Gebruik vir lang besparings waar produktiwiteitsnavorsing belangrik moet bly.
mir-prototype-productivity-cap-percent-2500=Stel nie-parameter resep produktiwiteit caps op +2500%. Gebruik vir baie lang besparings.
mir-prototype-productivity-cap-percent-5000=Stel nie-parameter resep produktiwiteit caps op +5000%.
mir-prototype-productivity-cap-percent-10000=Stel nie-parameter resep produktiwiteit caps op +10000%. Gebruik slegs vir uiterste langtermyn-skaal.
mir-prototype-productivity-cap-percent-25000=Stel nie-parameter resep produktiwiteit caps op +25000%. Gebruik slegs vir uiterste langtermyn-skaal.
mir-prototype-productivity-cap-percent-100000=Stel nie-parameter resep produktiwiteit caps op +100000%. Dit is effektief onbeperk vir die meeste besparings.
mir-recycling-return-chance-engine-default=Laat elke herwinningsresep onveranderd.
mir-recycling-return-chance-match-productivity-cap=Ontgin-veilige outomatiese vermindering vir versteekte gegenereerde herwinningsresepte. Gebruik 1 / (1 + produktiwiteitsbonus), beperk tot die normale opbrengs van 25%: +400% word 20%, en +1000% word ongeveer 9.09%.
mir-recycling-return-chance-percent-25=Hou versteekte gegenereerde herwinningsresepte teen die normale 25% materiaal opbrengs.
mir-recycling-return-chance-percent-20=Skaal versteekte gegenereerde herwinningsresepte tot 'n 20% materiaalopbrengs.
mir-recycling-return-chance-percent-15=Skaal versteekte gegenereerde herwinningsresepte na 'n 15% materiaalopbrengs.
mir-recycling-return-chance-percent-12-5=Skaal versteekte gegenereerde herwinningsresepte tot 'n 12,5% materiaalopbrengs.
mir-recycling-return-chance-percent-10=Skaal versteekte gegenereerde herwinningsresepte tot 'n 10% materiaalopbrengs.
mir-recycling-return-chance-percent-7-5=Skaal versteekte gegenereerde herwinningsresepte tot 'n 7.5% materiaalopbrengs.
mir-recycling-return-chance-percent-5=Skaal versteekte gegenereerde herwinningsresepte tot 'n 5% materiaalopbrengs.
mir-recycling-return-chance-percent-2-5=Skaal versteekte gegenereerde herwinningsresepte tot 'n 2,5% materiaalopbrengs.
mir-recycling-return-chance-percent-1=Skaal verborge gegenereerde herwinningsresepte tot 'n 1% materiaalopbrengs.
mir-recycling-return-chance-percent-0-5=Skaal verborge gegenereerde herwinningsresepte na 'n 0,5% materiaalopbrengs.
mir-recycling-return-chance-percent-0-1=Skaal versteekte gegenereerde herwinningsresepte na 'n 0.1% materiaalopbrengs.
mir-prototype-efficiency-cap-engine-default=Los elke masjien se energieverbruik-effeklimiet uit. Masjiene sonder 'n pasgemaakte limiet gebruik Factorio se normale -80% energieverbruik effek cap, so effekte kan nie aktiewe gebruik onder 20% verminder nie.
mir-prototype-efficiency-cap-saving-25=Skryf 'n -25% energieverbruik-pet. Aktiewe energieverbruik bly op 75% of meer na energiegebruik-effekte.
mir-prototype-efficiency-cap-saving-50=Skryf 'n -50% energieverbruik-pet. Aktiewe energieverbruik bly op 50% of meer na energiegebruik-effekte op ondersteunde masjiene.
mir-prototype-efficiency-cap-saving-75=Skryf 'n -75% energieverbruik-pet. Aktiewe energieverbruik bly op 25% of meer na energiegebruik-effekte op ondersteunde masjiene.
mir-prototype-efficiency-cap-saving-90=Skryf 'n -90% energieverbruik-pet. Aktiewe energieverbruik kan tot 10% daal, wat onder die normale 20% vloer is.
mir-prototype-efficiency-cap-saving-95=Skryf 'n -95% energieverbruik-pet. Aktiewe energieverbruik kan tot 5% daal.
mir-prototype-efficiency-cap-saving-99=Skryf 'n -99% energieverbruik-pet. Aktiewe energieverbruik kan tot 1% daal.
mir-prototype-efficiency-cap-saving-999=Skryf 'n -99.9% energieverbruik-pet. Aktiewe energieverbruik kan tot 0,1% daal.
mir-prototype-efficiency-cap-saving-9999=Skryf 'n -99.99% energieverbruik-pet. Dit is amper-nul aktiewe energiegebruik, nie 'n nulkrag-prototipe-herskryf nie.
mir-prototype-pollution-cap-engine-default=Los elke masjien se besoedeling-effek limiet uit. Masjiene sonder 'n pasgemaakte limiet gebruik Factorio se normale -80% besoedeling-effek cap.
mir-prototype-pollution-cap-saving-25=Skryf 'n -25% besoedelingsbeperking. Besoedeling bly by 75% of meer ná besoedelingseffekte.
mir-prototype-pollution-cap-saving-50=Skryf 'n -50% besoedelingsbeperking. Besoedeling bly op 50% of meer na besoedeling-effekte op ondersteunde masjiene.
mir-prototype-pollution-cap-saving-75=Skryf 'n -75% besoedelingsbeperking. Besoedeling bly op 25% of meer na besoedeling-effekte op ondersteunde masjiene.
mir-prototype-pollution-cap-saving-90=Skryf 'n -90% besoedelingsbeperking. Besoedeling kan tot 10% daal, wat onder die normale 20%-vloer is.
mir-prototype-pollution-cap-saving-95=Skryf 'n -95% besoedelingsbeperking. Besoedeling kan tot 5% daal.
mir-prototype-pollution-cap-saving-99=Skryf 'n -99% besoedelingsbeperking. Besoedeling kan tot 1% daal.
mir-prototype-pollution-cap-saving-999=Skryf 'n -99.9% besoedelingsbeperking. Besoedeling kan tot 0,1% daal.
mir-prototype-pollution-cap-saving-9999=Skryf 'n -99.99% besoedelingsbeperking. Dit is byna-nul besoedeling, nie 'n runtime besoedeling script.
mir-prototype-speed-floor-engine-default=Los elke masjien se negatiewe spoedgrens uit. Masjiene sonder 'n pasgemaakte limiet gebruik Factorio se normale -80% vloer en hou ten minste 20% spoed.
mir-prototype-speed-floor-saving-25=Klem negatiewe spoedeffekte vas by -25%, wat minstens 75% spoed laat.
mir-prototype-speed-floor-saving-50=Klem negatiewe spoedeffekte by -50% vas, wat minstens 50% spoed laat.
mir-prototype-speed-floor-saving-75=Klem negatiewe spoedeffekte vas by -75%, wat minstens 25% spoed laat.
mir-prototype-speed-floor-saving-90=Laat negatiewe spoedeffekte tot -90% toe, wat minstens 10% spoed laat.
mir-prototype-speed-floor-saving-95=Laat negatiewe spoedeffekte tot -95% toe, wat minstens 5% spoed laat.
mir-prototype-speed-floor-saving-99=Laat negatiewe spoedeffekte tot -99% toe, wat minstens 1% spoed laat.
mir-prototype-speed-floor-saving-999=Laat negatiewe spoedeffekte tot -99.9% toe, wat minstens 0.1% spoed laat.
mir-prototype-speed-floor-saving-9999=Laat negatiewe spoedeffekte toe tot -99.99%, die laagste Factorio-prototipe-limiet. Dit is 'n naby-stop, nie nul of negatiewe handwerkspoed nie.
mir-prototype-speed-cap-engine-default=Los elke masjien se spoedgrens uit. Masjiene sonder 'n pasgemaakte limiet gebruik Factorio se baie hoë +100000% spoed-effek plafon.
mir-prototype-speed-cap-bonus-25=Klem positiewe spoedeffekte by +25%.
mir-prototype-speed-cap-bonus-50=Klem positiewe spoedeffekte by +50%. Gebruik dit om spoedbonusse streng begrens te hou.
mir-prototype-speed-cap-bonus-75=Klem positiewe spoedeffekte by +75%.
mir-prototype-speed-cap-bonus-100=Klem positiewe spoedeffekte by +100%.
mir-prototype-speed-cap-bonus-125=Klem positiewe spoedeffekte by +125%.
mir-prototype-speed-cap-bonus-150=Klem positiewe spoedeffekte vas by +150%.
mir-prototype-speed-cap-bonus-200=Klem positiewe spoedeffekte by +200%.
mir-prototype-speed-cap-bonus-250=Klem positiewe spoedeffekte by +250%.
mir-prototype-speed-cap-bonus-300=Klem positiewe spoedeffekte by +300%.
mir-prototype-speed-cap-bonus-400=Klem positiewe spoedeffekte vas by +400%.
mir-prototype-speed-cap-bonus-500=Klem positiewe spoedeffekte by +500%.
mir-prototype-speed-cap-bonus-750=Klem positiewe spoedeffekte by +750%.
mir-prototype-speed-cap-bonus-1000=Klem positiewe spoedeffekte vas by +1000%.
mir-prototype-speed-cap-bonus-2500=Klem positiewe spoedeffekte vas by +2500%.
mir-prototype-speed-cap-bonus-5000=Klem positiewe spoedeffekte by +5000%.
mir-prototype-speed-cap-bonus-10000=Klem positiewe spoedeffekte vas by +10000%.
