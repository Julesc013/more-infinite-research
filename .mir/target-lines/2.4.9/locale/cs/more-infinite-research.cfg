mir-prototype-pollution-cap-saving-9999=Napište limit znečištění -99,99 %. Toto je téměř nulové znečištění, ne běhový skript znečištění.
mir-prototype-speed-floor-engine-default=Ponechte záporný rychlostní limit každého stroje na pokoji. Stroje bez vlastního limitu používají normální -80% podlahu Factorio a udržují alespoň 20% rychlost.
