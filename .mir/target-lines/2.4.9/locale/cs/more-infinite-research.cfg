mir-prototype-efficiency-cap-saving-9999=Napište limit spotřeby energie -99,99 %. Toto je téměř nulová spotřeba aktivní energie, nikoli přepis prototypu s nulovou spotřebou.
mir-prototype-pollution-cap-engine-default=Ponechte limit vlivu znečištění každého stroje na pokoji. Stroje bez vlastního limitu používají normální limit -80 % znečištění od společnosti Factorio.
mir-prototype-pollution-cap-saving-25=Napište limit znečištění -25 %. Znečištění zůstává na 75 % nebo více po dopadech znečištění.
mir-prototype-pollution-cap-saving-50=Napište limit znečištění -50 %. Po dopadu znečištění na podporované stroje zůstává znečištění na 50 % nebo více.
mir-prototype-pollution-cap-saving-75=Napište limit znečištění -75 %. Po dopadu znečištění na podporované stroje zůstává znečištění na 25 % nebo více.
mir-prototype-pollution-cap-saving-90=Napište limit znečištění -90 %. Znečištění může klesnout na 10 %, což je pod běžnou 20% spodní hranicí.
mir-prototype-pollution-cap-saving-95=Napište limit znečištění -95 %. Znečištění může klesnout až na 5 %.
