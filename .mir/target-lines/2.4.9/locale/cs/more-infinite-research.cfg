[mod-setting-description]
ips-require-space-gate=Pokud jsou tyto technologie povoleny, zůstanou uzamčeny, dokud nebude vesmírná věda zkoumána ve vanilce nebo promethium ve vesmírném věku.
mir-science-pack-ingredient-policy=Vybírá, jak MIR přidá vědecké balíčky k generovaným technologiím. Možnosti jsou seřazeny od konzervativních po široké: výchozí balíčky, balíčky pro pozdní hru, balíčky založené na postupu a poté všechny dostupné balíčky.
mir-automatic-productivity-action=Vybírá, co MIR udělá s bezpečnými možnostmi produktivity, které najdete v receptech nainstalovaných modů. Zakázáno neprovádí žádné automatické zjišťování. Náhled záznamů změn přijatých a přeskočených kandidátů v protokolu Factorio beze změny výzkumu. Použít bezpečné změny (výchozí) přidá vhodné receptury pouze do kompatibilního existujícího výzkumu MIR. To řídí činnost, nikoli sílu nebo zralost; níže uvedená zaškrtávací políčka pro vytvoření jsou samostatná. Vždy platí vlastnictví, recyklace, pravděpodobnost, katalyzátor, věda, laboratoř, předpoklad, cíl, identita, postup a kontrola cyklu.
mir-automatic-create-research=Výchozí: vypnuto. Mimo limity Aplikujte bezpečné změny na kompatibilní existující výzkum MIR; kandidáti bez vhodného streamu jsou přeskočeni a nahlášeni. On umožňuje oprávněnému registrovanému poskytovateli vytvořit jednu stabilní generickou technologii s nekonečnou produktivitou, když nevyhovuje žádný stávající výzkum. O tom, zda jsou experimentální poskytovatelé způsobilí, rozhoduje zaškrtávací políčko zkontrolovaná data níže. MIR nikdy nevytváří jednu technologii pro každý mod nebo recept a stále platí každá tvrdá bezpečnost, věda, vlastnictví, identita, postup a brána cyklu.
mir-automatic-require-reviewed-data=Výchozí: zapnuto. To je důležité pouze tehdy, když je zapnuto Povolit vytváření nového výzkumu; nikdy neblokuje bezpečné připojení k existujícímu výzkumu. Na povolení pouze rodiny poskytovatelů označené jako zkontrolované a podložené příslušnými důkazy přesné verze, takže experimentální rodiny jsou přeskočeny. Vypnuto umožňuje registrovaným experimentálním poskytovatelům vytvářet z obecných strukturálních důkazů. Pro co nejširší experimentální chování povolte vytváření výzkumu a vypněte tento požadavek. Žádná hodnota nemůže obejít pevnou bezpečnostní bránu.
mir-automatic-compiler-mode=Skrytý most kompatibility pro profily vytvořené před rozdělením automatických ovládacích prvků produktivity. Jiná než výchozí starší hodnota je respektována pouze v případě, že všechny nové ovládací prvky zůstanou na výchozích hodnotách. Změňte jakýkoli nový ovládací prvek tak, aby převzal explicitní kontrolu.
ips-enable-stream=Vytvoří vygenerovanou nekonečnou technologii pro __1__, když jsou k dispozici její recepty, efekty, předpoklady a vědecké balíčky. Deaktivujte toto, abyste zabránili MIR ve generování této technologie.
ips-cost-base-stream=Výzkumné jednotky požadované pro první vygenerovanou úroveň __1__. Musí být alespoň 1. Pozdější úrovně se vypočítají z této hodnoty a faktoru růstu nákladů.
ips-cost-growth-stream=Násobitel použitý na každou pozdější úroveň __1__. Použijte 1 pro paušální náklady, 1,5 pro 50% růst na úroveň nebo 2 pro zdvojnásobení nákladů.
ips-max-level-stream=Nejvyšší vygenerovaná úroveň pro __1__. Nastavte na 0 pro nekonečné úrovně.
ips-research-time-stream=Sekundy na výzkumnou jednotku za __1__. Chcete-li pro tuto technologii použít výchozí nastavení MIR, nastavte na 0. Toto není celková doba výzkumu; celkový čas také závisí na nákladech na výzkum, počtu laboratoří, rychlosti laboratoře a modulech.
mir-enable-base-tech=Umožňuje __1__ pokračovat přes svůj vanilkový uzávěr jako nekonečná technologie. Deaktivujte toto, pokud chcete, aby MIR přidal nové výzkumné linie bez prodlužování tohoto vanilkového řetězce.
mir-cost-base=Výzkumné jednotky požadované pro první úroveň pokračování MIR __1__. Pokud je to možné, nastavte na 0, abyste zdědili nákladový vzorec vanilkového řetězce.
mir-cost-growth=Násobitel použitý na každou pozdější úroveň pokračování MIR __1__. Pokud je to možné, nastavte na 0, abyste zdědili vzor růstu vanilkového řetězce.
mir-max-level=Nejvyšší úroveň pokračování MIR pro __1__. Nastavte na 0 pro nekonečné úrovně.
mir-research-time=Sekundy na výzkumnou jednotku pro pokračování MIR __1__. Pokud je to možné, nastavte na 0, abyste zdědili čas výzkumné jednotky vanilkového řetězce.
mir-prefer-this-mod-for-competing-techs=Je-li povoleno, tento mod odstraňuje vybraná konkurenční nekonečná rozšíření a používá své vlastní verze. Zakázat, chcete-li zachovat konkurenční verze z jiných modů.
mir-adjust-vanilla-weapon-speed-techs=Ovládá, zda MIR odebere bonusy za rychlost rakety a kanónu z pokračování rychlosti střelby ze zbraně, když je k dispozici přesné nekonečné pokrytí výměny. Technologie rychlosti střelby zbraní Finite vanilla si zachovávají své původní bonusy.
mir-use-installed-space-age-icons=Pokud je povoleno, MIR může odkazovat na nainstalované oficiální soubory ikon DLC, včetně Space Age a Elevated Rails, i když jsou tyto mody zakázány pro spuštění základní hry. Nechte toto vypnuté, pokud tyto soubory DLC nejsou nainstalovány; Factorio se nemůže bez problémů zotavit z chybějících souborů ikon během načítání prototypu.
mir-pipeline-extent-multiplier=Rozbalovací násobitel pouze při spuštění pro rozpoznaná pole rozsahu potrubí boxu tekutiny napříč prototypy, nejen entity potrubí. 100% ponechá prototypy beze změny a nezatíží průchod potrubím ani skenovací boxy s tekutinou. Jiné než 100% hodnoty jsou experimentální a mohou ovlivnit stroje, nádrže, trysky a upravené prototypy, které definují kapalinové boxy.
mir-unrestricted-modules=Experimentální a narušující rovnováhu. Je-li povoleno, každý existující recept přijímá všech pět modulových efektů a každý existující modulový přijímač se sloty přijímá každou objevenou kategorii modulu. To nepřidává modulové sloty ani nemění prototypy modulů a může umožnit produktivitu, kvalitu a smyčky modifikovaných modulů.
mir-prototype-productivity-cap=Zvolí, zda MIR ponechá omezení produktivity receptury na pokoji, nebo zapíše spouštěcí limit ke každému neparametrickému, nerecyklačnímu receptu. +300 % (nezměněno) zachovává stávající uzávěry receptur; nižší hodnoty zkracují škálování produktivity, zatímco vyšší hodnoty ji prodlužují.
mir-recycling-return-chance=Ovládá pouze skryté generované receptury recyklace. Automatický režim snižuje normální 25% návratnost materiálu na maximálně 1 děleno násobitelem celkového výstupu při zvoleném omezení produktivity. Pevné volby škálují přímo vygenerované výnosy. Viditelné procesy a limity produktivity receptur se nikdy nemění.
mir-productivity-cap-self-recycling-only=Nad 1 / návratnost recyklátoru - 1, pouze výrobní receptury s prokázanou negenerativní cestou seberecyklace získají vybraný vyšší strop. Při nebo pod touto hranicí nemá toto zaškrtávací políčko žádný účinek. Motor beze změny používá normální 25% návratnost jako konzervativní +300% práh beze změny recyklačních receptur.
mir-prototype-efficiency-cap=Vybírá, do jaké míry mohou efekty účinnosti snížit spotřebu energie aktivního stroje. -80 % (beze změny) ponechává stávající limity spotřeby energie samotné. Hlubší snížení se může přiblížit nulové spotřebě aktivní energie beze změny limitů znečištění.
mir-prototype-pollution-cap=Vybírá, do jaké míry mohou efekty snížení znečištění snížit znečištění stroje. -80 % (beze změny) ponechává stávající limity znečištění samotné. Hlubší snížení se může přiblížit nulovému znečištění, aniž by se změnila spotřeba energie.
mir-prototype-speed-floor=Vybírá, do jaké míry mohou negativní efekty rychlosti zpomalit podporované počítače. -80 % (nezměněno) ponechá stávající limity v klidu; hlubší hodnoty snižují normální podlahu až téměř na doraz na -99,99 %.
mir-prototype-speed-cap=Zvolí, zda MIR ponechá limity rychlosti stroje samotné, nebo zapíše nové kladné omezení rychlosti. +100000 % (nezměněno) zachovává stávající limity; nižší hodnoty záměrně ukládají velmi velké rychlostní bonusy.
mir-prototype-quality-cap=Zvolí, zda MIR ponechává limity kvality stroje na pokoji, nebo zapíše nový pozitivní limit kvality. +100000 % (nezměněno) zachovává stávající limity a nemění úrovně kvality ani vzorce pravděpodobnosti položek.
mir-prototype-positive-power-floor=Výchozí vypnuto. Je-li povoleno, MIR změní explicitní 0W prototypy aktivní spotřeby energie na 1W během načítání prototypu, takže varovné ikony nízké spotřeby se nezobrazují u entit, které by měly čerpat malé nenulové množství. Vynechejte, chcete-li přesně zachovat prototypy s nulovou spotřebou.
mir-settings-profile-import=Sem vložte řetězec profilu nastavení MIR, chcete-li použít exportované hodnoty spouštěcího nastavení jako přepisovací vrstvu během generování prototypu. Pro normální nastavení ponechte prázdné. Exportujte pomocí /mir-settings-export z aktivního uložení a po změně této hodnoty restartujte.
mir-debug-generation-report=Je-li povoleno, zapíše jeden řádek strukturovaného protokolu na vygenerovaný nebo přeskočený stream a základní rozšíření, včetně vědeckých balíčků, předpokladů, počtu efektů, stavu kompatibility laboratoře a zdroje ikon.
mir-debug-recipe-matches=Je-li povoleno, zapisuje odpovídající názvy receptů pro každý generovaný proud produktivity. Ve velkých balíčcích modů to může být hlučné.
mir-debug-scripted-effects=Pokud je povoleno, zapisuje záznamy běhového protokolu, když skriptované technologie přepočítávají globální efekty nebo efekty řízené událostmi.
mir-lab-incompatibility-policy=Vybere, co udělá MIR, když vybrané vědecké balíčky nemůže prozkoumat žádná aktivní laboratoř.
ips-effect-per-level-stream=Nastavuje primární efekt základní úrovně na úroveň pro __1__. Související pozdější úrovně a efekty jsou úměrně škálovány. Procentuální efekty používají procentní body; efekty počtu a vzdálenosti využívají své původní jednotky.
mir-effect-per-level=Nastavuje kanonický efekt na úrovni pro nekonečné pokračování __1__. Související účinky jsou škálovány proporcionálně od konečné vanilkové základní linie. Procentuální efekty používají procentní body; efekty počtu a vzdálenosti využívají své původní jednotky.
mir-note-experimental-spoilage=Experimentální a ve výchozím nastavení ve verzi 2.1.0 zakázáno. Toto je globální/mapový skriptovaný efekt. Stávající chování zkažitelného zásobníku není nárokováno, dokud není ručně ověřeno.
mir-note-agriculture-growth=Platí pro nově vysazené zemědělské věžové plodiny. Stávající vysazené plodiny se nemění.
mir-note-cargo-pad-count=Logistický výzkum speciálního vesmírného věku. Zvyšuje přistávací plochy pro náklad na každý povrch a může podstatně změnit logistickou rovnováhu.
mir-note-inserter-capacity=Ve výchozím nastavení zakázáno. Extra kapacita zavaděče může přerušit zavaděče řízené okruhem a snížit optimalizaci motoru.
mir-note-native-owner-managed-stream=Pokud instalovaná nekonečná technologie již vlastní tuto výzkumnou rodinu, tato stejná spouštěcí nastavení konfigurují tohoto vlastníka namísto vytváření duplikátu. Nezměněné výchozí hodnoty MIR přesně zachovají konečný prototyp vlastníka. Explicitní přepsání nákladů, času, maximální úrovně a efektu se uplatní pouze po bezpečné shodě vlastníka; vypnutím streamu zůstane externí technologie nedotčena. Po změně nastavení spouštění restartujte Factorio. Maximální úroveň 0 znamená nekonečno a hodnoty účinku jsou procentní body na úroveň.

