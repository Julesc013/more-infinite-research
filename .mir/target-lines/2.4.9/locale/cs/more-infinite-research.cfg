[technology-description]
more-infinite-research.recipe_productivity=Zvyšuje produktivitu receptur pro vybrané receptury. Stále platí limit maximální produktivity Factorio; další nekonečné úrovně nemusí mít žádný praktický účinek, jakmile recept dosáhne svého stropu.
more-infinite-research.direct_effect=Přidá nekonečný opakovatelný bonus. Vědecké balíčky jsou vybírány z aktivních laboratoří, takže technologii lze zkoumat pomocí kompatibilních sad modů.
more-infinite-research.cargo_bay_unloading_distance=Zvyšuje maximální vzdálenost mezi přistávací plochou pro náklad a připojenými vykládacími prostory.
more-infinite-research.cargo_landing_pad_count=Zvyšuje počet přistávacích ploch, které může každá síla postavit na povrchu.
more-infinite-research.flamethrower_shooting_speed=Zvyšuje rychlost střelby pro plamenometné zbraně a plamenometné věže.
more-infinite-research.electric_shooting_speed=Zvyšuje rychlost střelby pro elektrické zbraně. U vanilky to ovlivňuje obranu proti vypouštění; s Space Age to také ovlivňuje zbraně Tesla, když je k dispozici kategorie tesla munice.
more-infinite-research.spoilage_preservation=Zvyšuje globální modifikátor doby znehodnocení prostřednictvím ohraničeného skriptovaného efektu. Existující zkazitelné položky si mohou ponechat své aktuální lhůty, dokud nebudou testovány ve hře.
more-infinite-research.agricultural_growth_speed=Zkracuje zbývající dobu růstu pro nově vysazené zemědělské věžové rostliny prostřednictvím omezeného skriptovaného efektu.
more-infinite-research.lab_productivity=Zvyšuje pokrok ve výzkumu získaný z každého spotřebovaného vědeckého balíčku pomocí nativního modifikátoru produktivity laboratorního výzkumu.

