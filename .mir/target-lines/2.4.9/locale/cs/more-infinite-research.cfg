[string-mod-setting-description]
mir-automatic-productivity-action-disabled=Neprovádí žádné automatické zjišťování, připojování nebo vytváření. Fixní výzkum MIR zůstává nezměněn.
mir-automatic-productivity-action-preview=Vyhledá a klasifikuje kandidáty a poté zapíše přijatá a přeskočená rozhodnutí do protokolu Factorio. Nepřipojuje recepty ani nevytváří výzkum.
mir-automatic-productivity-action-apply=Výchozí. Objevuje kandidáty a ke kompatibilnímu stávajícímu výzkumu MIR připojuje pouze receptury ověřené bezpečností. Sama o sobě nevytváří výzkum; dvě níže uvedená zaškrtávací políčka řídí tvorbu.
mir-automatic-compiler-mode-off=Starší ekvivalent Disabled.
mir-automatic-compiler-mode-report=Starší ekvivalent náhledu změn.
mir-automatic-compiler-mode-safe-attach=Starší ekvivalent aplikace Použít bezpečné změny s deaktivovaným vytvářením výzkumu.
mir-automatic-compiler-mode-exact-pack=Starší ekvivalent aplikace Aplikujte bezpečné změny s povoleným vytvářením výzkumu a jsou vyžadována data o kompatibilitě.
mir-automatic-compiler-mode-safe-generate=Starší ekvivalent aplikace Použít bezpečné změny s povoleným vytvářením výzkumu pro registrované poskytovatele experimentů.
mir-adjust-vanilla-weapon-speed-techs-off=Zakažte volitelné čištění bonusů k překrývajícím se raketám/kanónům MIR.
mir-adjust-vanilla-weapon-speed-techs-only-when-dedicated-tech-enabled=Odstraňte překrývající se bonusy k raketě/kanónu MIR pouze v případě, že aktivovaná, dosažitelná nekonečná technologie poskytuje přesný efekt nahrazení.
mir-adjust-vanilla-weapon-speed-techs-always=Vždy odstraňte překrývající se bonusy k raketě/kanónu MIR. Používejte pouze v případě, že chcete striktní oddělení.
mir-science-pack-ingredient-policy-configured=Použijte konfigurované vědecké balíčky každé vygenerované technologie bez volitelného rozšíření přísad. Výchozí MIR.
mir-science-pack-ingredient-policy-space=Přidejte vesmírnou vědu, pokud je k dispozici. Jednoduché zvýšení obtížnosti po raketě.
mir-science-pack-ingredient-policy-space-and-promethium=Přidejte prostor a vědu promethium, pokud je k dispozici. Nejlepší pro propady výzkumu velmi pozdního vesmírného věku.
mir-science-pack-ingredient-policy-space-age-progression=Přidejte pouze balíčky progrese Space Age implikované vybranými balíčky. Nepřidává nesouvisející modifikované balíčky.
mir-science-pack-ingredient-policy-official-progression=Přidejte chybějící oficiální balíčky ve stylu nezbytných předpokladů vyplývající z nejpokročilejšího oficiálního balíčku, který již byl vybrán.
mir-science-pack-ingredient-policy-mod-progression=Přidejte chybějící balíčky kompatibilní s laboratoří odvozené z modifikovaného postupu vědeckého balíčku a odemkněte předpoklady.
mir-science-pack-ingredient-policy-all-official=Použijte každou oficiální základnu a vědecký balíček Space Age, který existuje v aktuální sadě modů.
mir-science-pack-ingredient-policy-all=Používejte všechny aktivní vědecké balíčky kompatibilní s laboratoří, včetně modifikovaných vědeckých balíčků.
mir-lab-incompatibility-policy-reduce=Udržujte technologii snížením jejích vědeckých balíčků na největší sadu akceptovanou aktivní laboratoří. Nejbezpečnější výchozí nastavení pro balíčky modulů.
mir-lab-incompatibility-policy-skip=Přeskočte technologii, pokud žádná aktivní laboratoř nemůže zkoumat vybranou sadu vědeckých balíčků. Přísnější a snadněji auditovatelné.
mir-lab-incompatibility-policy-engine-default=Nikdy nepřepisujte vybranou sadu vědeckých balíčků. MIR zachovává bezpečně zjistitelnou sadu beze změny a vynechává vygenerovanou technologii, když Factorio nemůže tuto přesnou sadu prozkoumat.
mir-prototype-productivity-cap-engine-default=Ponechte stávající limit produktivity každého receptu na pokoji. Recepty bez vlastního víčka využívají normální bonusový limit +300 % produktivity Factorio.
mir-prototype-productivity-cap-percent-25=Nastavte limity produktivity neparametrových receptur na +25 %. Jedná se o přísný časný strop.
mir-prototype-productivity-cap-percent-50=Nastavit limity produktivity neparametrových receptur na +50 %. To je pod normálním limitem a výzkum produktivity přestane dříve pomáhat.
mir-prototype-productivity-cap-percent-75=Nastavit limity produktivity neparametrových receptur na +75 %. To je pod normálním limitem a výzkum produktivity přestane dříve pomáhat.
mir-prototype-productivity-cap-percent-100=Nastavit limity produktivity neparametrových receptur na +100 %. To je pod normálním limitem a výzkum produktivity přestane dříve pomáhat.
mir-prototype-productivity-cap-percent-125=Nastavit limity produktivity neparametrových receptur na +125 %.
mir-prototype-productivity-cap-percent-150=Nastavit limity produktivity neparametrových receptur na +150 %.
mir-prototype-productivity-cap-percent-200=Nastavte limity produktivity neparametrových receptur na +200 %. To je pod normálním limitem a výzkum produktivity přestane dříve pomáhat.
mir-prototype-productivity-cap-percent-250=Nastavte limity produktivity neparametrových receptur na +250 %. To je mírně pod normálním uzávěrem.
mir-prototype-productivity-cap-percent-400=Nastavte limity produktivity neparametrových receptur na +400 %. To rozšiřuje škálování produktivity za normální limit.
mir-prototype-productivity-cap-percent-500=Nastavit limity produktivity neparametrových receptur na +500 %. To rozšiřuje škálování produktivity za normální limit.
mir-prototype-productivity-cap-percent-750=Nastavit limity produktivity neparametrových receptur na +750 %.
mir-prototype-productivity-cap-percent-1000=Nastavit limity produktivity neparametrových receptur na +1000 %. Použijte pro dlouhé ukládání tam, kde by mělo záležet na výzkumu produktivity.
mir-prototype-productivity-cap-percent-2500=Nastavte limity produktivity neparametrových receptur na +2500 %. Používejte pro velmi dlouhé ukládání.
mir-prototype-productivity-cap-percent-5000=Nastavte limity produktivity neparametrových receptur na +5000 %.
mir-prototype-productivity-cap-percent-10000=Nastavte limity produktivity neparametrových receptur na +10 000 %. Používejte pouze pro extrémně dlouhodobé škálování.
mir-prototype-productivity-cap-percent-25000=Nastavit limity produktivity neparametrových receptur na +25000 %. Používejte pouze pro extrémně dlouhodobé škálování.
mir-prototype-productivity-cap-percent-100000=Nastavit limity produktivity neparametrových receptur na +100000 %. U většiny uložení je tato možnost prakticky bez omezení.
mir-recycling-return-chance-engine-default=Nechte každý recyklační recept beze změny.
mir-recycling-return-chance-match-productivity-cap=Exploit-safe automatická redukce pro skryté generované receptury recyklace. Používá 1 / (1 + bonus za produktivitu), omezený na normální 25% návratnost: +400 % se stane 20 % a +1000 % bude asi 9,09 %.
mir-recycling-return-chance-percent-25=Uchovávejte skrytě generované receptury recyklace při běžné 25% návratnosti materiálu.
mir-recycling-return-chance-percent-20=Škálujte skryté generované receptury recyklace na 20% návratnost materiálu.
mir-recycling-return-chance-percent-15=Škálujte skryté generované receptury recyklace na 15% návratnost materiálu.
mir-recycling-return-chance-percent-12-5=Škálujte skryté generované receptury recyklace na 12,5% návratnost materiálu.
mir-recycling-return-chance-percent-10=Škálujte skryté generované receptury recyklace na 10% návratnost materiálu.
mir-recycling-return-chance-percent-7-5=Škálujte skryté generované receptury recyklace na 7,5% návratnost materiálu.
mir-recycling-return-chance-percent-5=Škálujte skryté generované receptury recyklace na 5% návratnost materiálu.
mir-recycling-return-chance-percent-2-5=Škálujte skryté generované receptury recyklace na 2,5% návratnost materiálu.
mir-recycling-return-chance-percent-1=Škálujte skryté generované receptury recyklace na 1% návratnost materiálu.
mir-recycling-return-chance-percent-0-5=Škálujte skryté generované receptury recyklace na 0,5% návratnost materiálu.
mir-recycling-return-chance-percent-0-1=Škálujte skryté generované receptury recyklace na 0,1% návratnost materiálu.
mir-prototype-efficiency-cap-engine-default=Ponechte limit energetické spotřeby každého stroje na pokoji. Stroje bez vlastního limitu používají normální limit spotřeby energie Factorio -80 %, takže efekty nemohou snížit aktivní využití pod 20 %.
mir-prototype-efficiency-cap-saving-25=Napište -25% limit spotřeby energie. Aktivní spotřeba energie zůstává na 75 % nebo více po účincích spotřeby energie.
mir-prototype-efficiency-cap-saving-50=Napište -50% limit spotřeby energie. Aktivní spotřeba energie zůstává na 50 % nebo více po účincích spotřeby energie na podporovaných strojích.
mir-prototype-efficiency-cap-saving-75=Napište -75% limit spotřeby energie. Aktivní spotřeba energie zůstává na 25 % nebo více po účincích spotřeby energie na podporovaných strojích.
mir-prototype-efficiency-cap-saving-90=Napište -90% limit spotřeby energie. Aktivní spotřeba energie může klesnout na 10 %, což je pod běžnou spodní hranicí 20 %.
mir-prototype-efficiency-cap-saving-95=Napište -95% limit spotřeby energie. Aktivní spotřeba energie může klesnout až na 5 %.
mir-prototype-efficiency-cap-saving-99=Napište limit -99% spotřeby energie. Aktivní spotřeba energie může klesnout až na 1 %.
