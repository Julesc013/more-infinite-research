schema: 1

canonical_machine_record: fixtures/compat-matrix/claims.json
canonical_support_lanes: fixtures/compat-matrix/support-lanes.json
target_docs_root: docs/compatibility/targets

claims:
  allowed_levels:
    - loads
    - observed
    - cooperates
    - diagnostic-only
    - partial-support
    - full-family-support
    - full-pack-support

targets:
  docs_root: docs/compatibility/targets

rules:
  - every public compatibility claim has a compatibility page
  - every generated stream in a claim exists in the stream manifest
  - full-family support requires fixture evidence
  - full-pack support requires a locked behavior matrix
  - public text must describe the tested family, not broad external mod support
