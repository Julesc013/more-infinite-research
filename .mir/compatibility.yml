schema: 1

canonical_machine_record: fixtures/compat-matrix/claims.json
canonical_support_lanes: fixtures/compat-matrix/support-lanes.json
lua_report_registry: prototypes/mir/compatibility/claim_registry.lua
target_docs_root: docs/compatibility/targets

compatibility_packs:
  schema: 2
  validator: prototypes/mir/compatibility/packs/schema.lua
  registry: prototypes/mir/compatibility/packs/registry.lua
  external_transport: more-infinite-research-compatibility-pack
  fixture_only_profiles_allowed_in_production_registry: false

campaigns:
  evidence_contract: mir-modpack-campaign-evidence-v1
  exact_mir_archive_sha256_required: true
  exact_mir_source_commit_required: true
  dependency_lock_sha256_required: true
  actual_executed_roots_required: true
  root_versions_required: true
  resolved_archive_sha256_required: true
  result_and_claim_level_required: true
  mega_smash_qualifies_individual_ecosystems: false
  pre_renumber_load_characterization:
    - .mir/evidence/pre-3.1-renumber-bz-bob-load-campaign-summary.json
    - .mir/evidence/pre-3.1-renumber-core-ecosystems-load-campaign.json
    - .mir/evidence/pre-3.1-renumber-aai-load-campaign.json
  final_3_1_0_load_evidence:
    available_ecosystems: .mir/evidence/3.1.0-rc4-ecosystem-campaign.json
    status: 9-passed-load-claims-including-planet-cluster
    current_archive_status: passed
    source_commit: 3699fecb021ee64e0fcdeaf741e32b1b89cf27b3
    archive_sha256: BD89A34D1EACA6C7FD93412072FFC1434F38DE90FA7E1156B75CE23DC07DDDA3
    dependency_lock_sha256: 6135C3F6FF5D980BBDCA1C59B291A68A67097017DD53771CEBB46946C1748388
    missing_dependency_closures:
      - angels
      - space-exploration
      - pyanodon
    missing_dependency_evidence: .mir/evidence/3.1.0-rc4-missing-overhaul-closures.json

claims:
  allowed_levels:
    - loads
    - observed
    - cooperates
    - diagnostic-only
    - partial-support
    - full-family-support
    - full-pack-support

targets:
  docs_root: docs/compatibility/targets
  records:
    air-scrubbing:
      mod: atan-air-scrubbing
      doc: docs/compatibility/targets/atan-air-scrubbing.md
      claim_level: full-family-support
      public_claim: clean-filter crafting productivity only
      fixtures:
        - fixtures/air-scrubbing
        - fixtures/assert-air-scrubbing-clean-filter
      streams:
        - mir-prod-air-scrubbing-clean-filter
      generated:
        - atan-pollution-filter
        - atan-spore-filter
      diagnostic_only:
        - scrubbing-environmental
        - cleaning-recovery

    atan-ash:
      mod: atan-ash
      doc: docs/compatibility/targets/atan-ash.md
      claim_level: full-family-support
      public_claim: ash separation productivity only
      fixtures:
        - fixtures/atan-ash
        - fixtures/assert-atan-ash-separation
      streams:
        - mir-prod-atan-ash-separation
      generated:
        - atan-ash-seperation
      diagnostic_only:
        - ash-sinks
        - tile-surface
        - resource-recovery
      schema_repairs:
        - factorio_2_1_recipe_schema:atan-ash_2.2.1

    atan-nuclear-science:
      mod: atan-nuclear-science
      doc: docs/compatibility/targets/atan-nuclear-science.md
