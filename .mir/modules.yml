schema: 1

current_roots:
  factorio_shell:
    root_files:
      - settings.lua
      - data.lua
      - data-updates.lua
      - data-final-fixes.lua
      - control.lua
    runtime_directories:
      - control
      - locale
      - migrations
      - prototypes

stage_entrypoints:
  settings.lua: prototypes/mir/stage/settings.lua
  data.lua: prototypes/mir/stage/data.lua
  data-updates.lua: prototypes/mir/stage/data_updates.lua
  data-final-fixes.lua: prototypes/mir/stage/data_final_fixes.lua
  control.lua: prototypes/mir/stage/control.lua

runtime_boundaries:
  control.lua:
    stage_entrypoint: prototypes/mir/stage/control.lua
    runtime_modules:
      - control/scripted-techs.lua
      - control/settings-resolver.lua
      - control/productivity-family-adoption.lua
      - control/effects/agricultural-growth-speed.lua
      - control/effects/spoilage-preservation.lua
    allowed_globals:
      - script
      - storage
      - settings
      - defines
      - game
      - prototypes
      - log
    forbidden_globals:
      - data
      - data.raw
      - data:extend
    rule: runtime registration and event handling only; no prototype generation

namespace_shims:
  schema: prototypes/mir/core/schema.lua
  deepcopy: prototypes/mir/core/deepcopy.lua
  table_utils: prototypes/mir/core/table.lua
  factorio_data_raw: prototypes/mir/platform/factorio/data_raw.lua
  factorio_mods: prototypes/mir/platform/factorio/mods.lua
  factorio_prototype_lookup: prototypes/mir/platform/factorio/prototype_lookup.lua
  settings_registry: prototypes/mir/settings/registry.lua
  settings_visibility: prototypes/mir/settings/visibility.lua
  settings_builder: prototypes/mir/settings/builder.lua
  settings_legacy_adapter: prototypes/mir/settings/legacy_adapter.lua
  adoption_policy: prototypes/mir/policy/adoption_policy.lua
  owner_policy: prototypes/mir/policy/owner_policy.lua
  competing_productivity_policy: prototypes/mir/policy/competing_productivity.lua
  competing_base_extensions_policy: prototypes/mir/policy/competing_base_extensions.lua
  productivity_family_adoption_policy: prototypes/mir/policy/productivity_family_adoption.lua
  technology_cleanup_policy: prototypes/mir/policy/technology_cleanup.lua
  capability_policy: prototypes/mir/policy/capabilities.lua
  fact_registry: prototypes/mir/index/registry_builder.lua
  index_productivity_owners: prototypes/mir/index/productivity_owners.lua
  legacy_fact_registry_shim: prototypes/lib/facts/registry.lua
  domain_fact_registry_shim: prototypes/mir/domain/facts/registry.lua
  index_recipes: prototypes/mir/index/recipes.lua
  index_technologies: prototypes/mir/index/technologies.lua
  index_labs: prototypes/mir/index/labs.lua
  index_owners: prototypes/mir/index/owners.lua
  index_rule_surfaces: prototypes/mir/index/rule_surfaces.lua
  decision_record: prototypes/mir/domain/decisions/decision_record.lua
  stream_spec: prototypes/mir/domain/streams/stream_spec.lua
  capability_contract: prototypes/mir/capabilities/contract.lua
  capability_registry: prototypes/mir/capabilities/registry.lua
  recipe_productivity_planner: prototypes/mir/capabilities/recipe_productivity/planner.lua
  technology_builder: prototypes/mir/emit/technology_builder.lua
  legacy_stream_adapter: prototypes/mir/emit/legacy_stream_adapter.lua
  decision_export: prototypes/mir/report/decision_export.lua
  compatibility_diagnostics_report: prototypes/mir/report/compatibility_diagnostics.lua
  diagnostics_sink: prototypes/mir/report/diagnostics_sink.lua
  planner_compiler: prototypes/mir/planner/compiler.lua
  planner_direct_effects: prototypes/mir/planner/direct_effects.lua
  planner_native_modifiers: prototypes/mir/planner/native_modifiers.lua
  planner_requirements: prototypes/mir/planner/requirements.lua
  planner_technology_requirements: prototypes/mir/planner/technology_requirements.lua
  planner_science: prototypes/mir/planner/science.lua
  planner_stream_compiler: prototypes/mir/planner/stream_compiler.lua
  data_final_fixes_stage: prototypes/mir/stage/data_final_fixes.lua
  data_final_fixes_steps: prototypes/mir/stage/data_final_fixes_steps.lua
  compatibility_registry: prototypes/mir/compatibility/registry.lua
  compatibility_profiles: prototypes/mir/compatibility/profiles.lua
  compatibility_planner: prototypes/mir/compatibility/planner.lua
  compatibility_overlay_loader: prototypes/mir/compatibility/overlay_loader.lua
  compatibility_claim_registry: prototypes/mir/compatibility/claim_registry.lua
  air_scrubbing_policy_overlay: prototypes/mir/compatibility/overlays/air_scrubbing.lua
  atan_ash_policy_overlay: prototypes/mir/compatibility/overlays/atan_ash.lua
  exact_recipe_policy_diagnostics: prototypes/mir/compatibility/diagnostics/exact_recipe_policy.lua
  exact_recipe_diagnostics_registry: prototypes/mir/compatibility/diagnostics/registry.lua
  air_scrubbing_diagnostics: prototypes/mir/compatibility/diagnostics/air_scrubbing.lua
  atan_ash_diagnostics: prototypes/mir/compatibility/diagnostics/atan_ash.lua
  legacy_stream_emitter_shim: prototypes/mir/legacy/stream_emitter.lua

target_layers:
  stage:
    path: prototypes/mir/stage
    may_require:
      - core
      - platform
      - planner
    may_mutate_data_raw: false

  core:
    path: prototypes/mir/core
    may_require: []
    may_mutate_data_raw: false

  platform:
    path: prototypes/mir/platform
    may_require:
      - core
    may_read_factorio_globals: true
    may_mutate_data_raw: false

  domain:
    path: prototypes/mir/domain
    may_require:
      - core
    may_read_factorio_globals: false
    may_mutate_data_raw: false

  index:
    path: prototypes/mir/index
    may_require:
      - core
      - platform
      - domain
    may_mutate_data_raw: false

  graph:
    path: prototypes/mir/graph
    may_require:
      - core
      - domain
    may_mutate_data_raw: false

  classify:
    path: prototypes/mir/classify
    may_require:
      - core
      - domain
      - graph
    may_mutate_data_raw: false

  policy:
    path: prototypes/mir/policy
    may_require:
      - core
      - domain
      - platform
    may_mutate_data_raw: false

  settings:
    path: prototypes/mir/settings
    may_require:
      - core
      - platform
    may_read_factorio_globals: false
    may_mutate_data_raw: false

  capabilities:
    path: prototypes/mir/capabilities
    may_require:
      - core
      - domain
      - graph
      - classify
      - policy
    may_mutate_data_raw: false

  planner:
    path: prototypes/mir/planner
    may_require:
      - core
      - domain
      - capabilities
      - policy
    may_mutate_data_raw: false

  emit:
    path: prototypes/mir/emit
    may_require:
      - core
      - domain
      - platform
    may_mutate_data_raw: true

  report:
    path: prototypes/mir/report
    may_require:
      - core
      - domain
    may_mutate_data_raw: false

  compatibility:
    path: prototypes/mir/compatibility
    may_require:
      - core
      - policy
      - platform
      - report
    may_mutate_data_raw: false
    overlay_path: prototypes/mir/compatibility/overlays

  legacy:
    path: prototypes/mir/legacy
    may_require:
      - core
      - platform
      - domain
      - planner
      - emit
    may_mutate_data_raw: false

current_boundary_allowlist:
  prototype_mutators:
    - prototypes/mir/stage/data_final_fixes_steps.lua
    - prototypes/mir/planner/stream_compiler.lua
    - prototypes/base-tech-extensions.lua
    - prototypes/pipeline-extent.lua
    - prototypes/max-level-control.lua
    - prototypes/weapon-speed-adjustments.lua
    - prototypes/mir/policy/competing_productivity.lua
    - prototypes/mir/policy/competing_base_extensions.lua
    - prototypes/mir/policy/productivity_family_adoption.lua

forbidden_imports:
  - from: prototypes/mir/domain
    to: prototypes/mir/emit
  - from: prototypes/mir/classify
    to: prototypes/mir/platform/factorio/data_raw.lua
  - from: prototypes/mir/compatibility/overlays
    to: prototypes/mir/emit

rules:
  - only emission code mutates generated technologies
  - compatibility overlays register policy only
  - domain modules do not read Factorio globals
  - report modules do not mutate prototypes
  - legacy wrappers do not introduce new behavior
