mutation_commands:
  registry: prototypes/mir/pipeline/commands.lua
  rules:
    - every prototype-changing pass has a stable command id
    - every command declares positive target feature requirements
    - every command declares a phase and explicit dependencies
    - command dependencies are acyclic and enforced before execution
    - only emission commands may create generated technology prototypes
    - mutation commands may change existing prototypes only through their listed implementation
    - CompilationPlan schema 2 globally finalizes stream adoption and base-extension operations before emission
    - output validation compares numeric effects technology shape and generated-registry identity
    - reviewed compatibility data cannot override hard prototype safety facts
    - exact-version compatibility repairs remain separately bounded
  ids:
    - compatibility-repairs
    - module-permissions
    - prototype-limits
    - pipeline-extent
    - prepare-competing-productivity
    - prepare-competing-base-extensions
    - compile-generation-plan
    - emit-streams
    - apply-competing-productivity
    - emit-base-extensions
    - apply-competing-base-extensions
    - weapon-speed-adjustments
    - max-level-control
    - assert-technology-safety
    - emit-compatibility-diagnostics
    - emit-compiler-reports
    - emit-compatibility-planner
    - assert-plan-output
    - flush-diagnostics

target_layers:
  stage:
    path: prototypes/mir/stage
    may_mutate_data_raw: false
  runtime:
    path: prototypes/mir/runtime
    may_read_runtime_globals: true
    may_mutate_data_raw: false
  core:
    path: prototypes/mir/core
    may_mutate_data_raw: false
  platform:
    path: prototypes/mir/platform
    may_read_factorio_globals: true
    may_mutate_data_raw: false
  settings:
    path: prototypes/mir/settings
    may_read_factorio_globals: true
    may_require:
      - core
      - domain
    may_register_settings: true
    may_mutate_data_raw: false
  pipeline:
    path: prototypes/mir/pipeline
    may_require:
      - core
      - platform
      - settings
    may_mutate_data_raw: true
  domain:
    path: prototypes/mir/domain
    may_read_factorio_globals: false
    may_mutate_data_raw: false
  index:
    path: prototypes/mir/index
    may_require:
      - platform
      - domain
    may_mutate_data_raw: false
  policy:
    path: prototypes/mir/policy
    may_require:
      - domain
      - platform
      - index
    may_mutate_data_raw: false
  capabilities:
    path: prototypes/mir/capabilities
    may_require:
      - policy
      - domain
    may_mutate_data_raw: false
  families:
    path: prototypes/mir/families
    may_require:
      - core
      - index
      - providers
    may_mutate_data_raw: false
  providers:
    path: prototypes/mir/providers
    may_require:
      - core
      - domain
    may_mutate_data_raw: false
  planner:
    path: prototypes/mir/planner
    may_require:
      - capabilities
      - families
      - providers
      - policy
      - domain
    may_mutate_data_raw: false
  emit:
    path: prototypes/mir/emit
    may_require:
      - platform
      - domain
    may_mutate_data_raw: true
  report:
    path: prototypes/mir/report
    may_require:
      - domain
    may_mutate_data_raw: false
  compatibility:
    path: prototypes/mir/compatibility
    overlay_path: prototypes/mir/compatibility/overlays
    repair_path: prototypes/mir/compatibility/repairs
    may_require:
      - policy
      - platform
      - report
    may_mutate_data_raw: repairs-only

rules:
  - Factorio root entrypoints stay as thin lifecycle wrappers.
  - Active shipped implementation lives under prototypes/mir except stream data tables.
  - No old compat/lib/legacy/control/planner shim directories are allowed.
  - No broad root helper shims are allowed.
  - Only settings/stage_builder.lua may register setting prototypes directly.
  - Generated technologies and mod-data prototypes emit through prototypes/mir/emit.
  - Compatibility overlays register policy only.
  - Compatibility repairs may normalize exact-version upstream loader schemas or remove one topology-proven cross-mod cycle edge.
  - Domain modules do not read Factorio globals.
  - Report modules do not mutate prototypes.
  - Target and convergence policy live in machine-readable .mir manifests.
  - Historical branches provide behavior evidence and do not define a parallel core.
  - CompilerProvider schema 1 is the stable data-only family extension boundary in 3.1.5.
  - Providers may discover and normalize candidates but remain planning-only; emission owns generated prototype mutation.
  - Automatic family creation maturity is declarative; reviewed creation cannot promote experimental providers.
  - Top-level MIR Lua module dependencies must remain acyclic.

validation_tooling:
  facade: scripts/Invoke-MIRValidation.ps1
  modules:
    package_identity: scripts/validation/PackageIdentity.ps1
    target_metadata: scripts/validation/TargetProfiles.ps1
    scenario_groups: scripts/validation/ScenarioGroups.ps1
    structured_evidence: scripts/validation/ResultAggregation.ps1
    factorio_process: scripts/validation/FactorioProcess.ps1
    settings_overrides: scripts/validation/SettingsOverrides.ps1
    scenario_registry: scripts/validation/ScenarioRegistry.ps1
    golden_plans: scripts/Test-MIRGoldenPlans.ps1
    campaign_scenarios: scripts/Test-MIRScenarioManifests.ps1
    planner_artifacts: scripts/Test-MIRPlannerTools.ps1
    compiler_schema_drift: scripts/Test-MIRCompilerSchemaDrift.ps1
    museum_catalog: .mir/museum-targets.json
    museum_compiler: scripts/Museum/MuseumCompiler.psm1
    museum_build: scripts/Build-MIRMuseumTarget.ps1
    museum_static_gate: scripts/Test-MIRMuseumCompiler.ps1
    museum_runtime_gate: scripts/Test-MIRMuseumRuntime.ps1
    museum_qualification: scripts/New-MIRMuseumQualification.ps1
    museum_seal_writer: scripts/New-MIRMuseumSeal.ps1
    museum_seal_check: scripts/Test-MIRMuseumSeal.ps1
  rules:
    - the facade preserves its public parameters and structured result schema
    - process launch and copied-mod filesystem safety are reusable modules
    - settings overrides are declarative and isolated from scenario orchestration
    - every executed scenario resolves through a target-bound declaration record
    - compatibility campaign records own setup roots settings expectations timeout and claim level
    - scenarios retain stable names and explicit groups while decomposition proceeds
    - museum compilation runs only in the development environment and emits finite target-era Lua
    - museum target packages contain no compiler tooling manifests evidence fixtures or modern runtime source
    - each museum technology is emitted from a stable manifest row and a matching-base effect proof
