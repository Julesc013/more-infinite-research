rules:
  - Factorio root entrypoints stay as thin lifecycle wrappers.
  - Active shipped implementation lives under prototypes/mir except stream data tables.
  - No old compat/lib/legacy/control/planner shim directories are allowed.
  - No broad root helper shims are allowed.
  - Only settings/stage_builder.lua may register setting prototypes directly.
  - Generated technologies and target-supported mod-data prototypes emit through prototypes/mir/emit.
  - Prototype-family emission must consult the current target profile before calling the Factorio data adapter.
  - Compatibility overlays register policy only.
  - Compatibility repairs may normalize exact-version upstream loader schemas or remove one topology-proven cross-mod cycle edge.
  - Domain modules do not read Factorio globals.
  - Report modules do not mutate prototypes.
  - Target and convergence policy live in machine-readable .mir manifests.
  - Historical branches provide behavior evidence and do not define a parallel core.
  - CompilerProvider schema 1 is the stable data-only family extension boundary in 3.1.9.
  - Providers may discover and normalize candidates but remain planning-only; emission owns generated prototype mutation.
  - ProviderDecision schema 3 is the canonical family-resolution decision; capability diagnostics adapt it without rediscovery.
  - RecipeRiskFact is the sole recipe-risk authority consumed by family rules providers packs plans and diagnostics.
  - Provider cardinality overflow is review-required and cannot silently reach emission.
  - Automatic family creation maturity is declarative; reviewed creation cannot promote experimental providers.
  - Top-level MIR Lua module dependencies are checked against .mir/module-dependencies.json, including an exact bounded legacy-cycle baseline.
  - Domain graph and planner layers cannot import emit implementation modules.
  - Mutable state derived from prototypes settings active mods or a compilation pass is owned by CompilerContext schema 3.
  - CompilerContext services are context-owned, freezeable, and never configured through process-global callbacks.
  - State replacement requires an explicit matching epoch and snapshots are observationally pure.
  - The shared graph kernel owns snapshot SCC condensation reachability researchability qualification diff and evidence semantics for virtual and actual graphs.
  - Only immutable built-in policy catalogs may retain process-wide canonical caches.

compiler_context:
  path: prototypes/mir/pipeline/compiler_context.lua
  schema: 3
  owns:
