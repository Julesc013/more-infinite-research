mutation_commands:
  registry: prototypes/mir/pipeline/commands.lua
  rules:
    - every prototype-changing pass has a stable command id
    - every command declares positive target feature requirements
    - every command declares a phase and explicit dependencies
    - command dependencies are acyclic and enforced before execution
    - only emission commands may create generated technology prototypes
    - mutation commands may change existing prototypes only through their listed implementation
    - CompilationPlan schema 2 globally finalizes stream adoption and base-extension operations before emission
    - output validation compares numeric effects graph presentation save identity and generated-registry projections
    - input technology sanitation runs after compatibility repairs and before every index or planning pass and records content-addressed original retained removed and sanitized effects
    - final technology safety reruns target-aware sanitation before reporting and output validation as a defensive postcondition
    - no sanitation-covered target prototype family may be created or removed after input sanitation
    - CompilationPlan separates compilation qualification and run fingerprints
    - postcondition publication emits target-neutral content-addressed compiler evidence with mod-data and validation-log adapters
    - stream planning and emission consume TechnologyDesign schema 2 without changing released technology identities
    - every emitted GenerationPlan row carries one validated TechnologyDesign and legacy fields are derived compatibility projections only
    - every adopted GenerationPlan row carries one patch-existing TechnologyDesign binding the immutable owner input and complete expected output
    - the schema-2 TechnologyCatalog is a context-owned canonical inventory built for every compilation before deterministic current selection; it has no mutation or publication authority
    - every GenerationPlan is an exact projection of the catalog selection policy
    - SafetyQualification DesignAssessment and PromotionAuthorization are independent fingerprinted decisions
    - only MIR-owned mir-reviewed or protected-release promotion authorizations may satisfy reviewed automatic generation
    - approval promotion demotion quarantine and migration records are independently fingerprinted governance decisions
    - approved structural applicability is a fingerprinted data-only envelope with exact mods positive examples negative examples and bounded new matches
    - family providers flow through explicit discovery normalization classification pack-policy hazard-policy owner-arbitration decision and budget stages
    - provider budgets suppress only new-unreviewed proposals and preserve exact-reviewed attachments and hard-blocker diagnostics
    - compatibility policy authority is the only planning facade that composes overlays active packs claims and policy fingerprints
    - stream planning cannot import the stream executor or adoption mutation transaction
    - stream emission and fingerprint-verified patch-existing adoption mutation are applied only by the emission-owned stream executor
    - reviewed compatibility data cannot override hard prototype safety facts
    - exact-version compatibility repairs remain separately bounded
  ids:
    - compatibility-repairs
    - sanitize-input-technology-effects
    - module-permissions
    - prototype-limits
    - pipeline-extent
    - prepare-competing-productivity
    - prepare-competing-base-extensions
    - compile-generation-plan
    - emit-streams
    - apply-competing-productivity
    - emit-base-extensions
    - apply-competing-base-extensions
    - weapon-speed-adjustments
    - max-level-control
    - assert-technology-safety
    - emit-compatibility-diagnostics
    - emit-compiler-reports
    - emit-compatibility-planner
    - assert-plan-output
    - publish-compiler-artifacts
    - flush-diagnostics

