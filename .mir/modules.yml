schema: 1

museum_target_override:
  factorio: "0.10"
  mir_version: "0.10.0"
  root_files: [config.lua, data.lua, info.json]
  emitted_by: scripts/Museum/MuseumCompiler.psm1
  only_emitter_creates_technology_prototypes: true
  release_package_files: [config.lua, data.lua, info.json, locale/en/more-infinite-research.cfg]

current_roots:
  factorio_shell:
    root_files:
      - settings.lua
      - data.lua
      - data-updates.lua
      - data-final-fixes.lua
      - control.lua
    shipped_directories:
      - locale
      - migrations
      - prototypes
    forbidden_shim_directories:
      - control
      - prototypes/compat
      - prototypes/lib
      - prototypes/mir/legacy
      - prototypes/planner
    forbidden_root_helpers:
      - defaults.lua
      - prototypes/base-tech-extensions.lua
      - prototypes/config.lua
      - prototypes/diagnostics.lua
      - prototypes/max-level-control.lua
      - prototypes/pipeline-extent.lua
      - prototypes/pipeline-extent-settings.lua
      - prototypes/settings-resolver.lua
      - prototypes/tech-gen.lua
      - prototypes/technology-effect-safety.lua
      - prototypes/util.lua
      - prototypes/weapon-speed-adjustments.lua

stage_entrypoints:
  settings.lua: prototypes/mir/stage/settings.lua
  data.lua: prototypes/mir/stage/data.lua
  data-updates.lua: prototypes/mir/stage/data_updates.lua
  data-final-fixes.lua: prototypes/mir/stage/data_final_fixes.lua
  control.lua: prototypes/mir/stage/control.lua

runtime_boundaries:
  control.lua:
    stage_entrypoint: prototypes/mir/stage/control.lua
    runtime_modules:
      - prototypes/mir/runtime/scripted_techs.lua
      - prototypes/mir/runtime/settings_resolver.lua
      - prototypes/mir/runtime/settings_profile.lua
      - prototypes/mir/runtime/productivity_family_adoption.lua
      - prototypes/mir/runtime/effects/agricultural_growth_speed.lua
      - prototypes/mir/runtime/effects/spoilage_preservation.lua
    allowed_globals:
      - script
      - storage
      - settings
      - defines
      - game
      - helpers
      - commands
      - remote
      - prototypes
      - log
    forbidden_globals:
      - data
      - data.raw
      - data:extend
    rule: runtime registration and event handling only; no prototype generation

